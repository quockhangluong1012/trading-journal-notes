<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="1" y="1" width="758" height="458" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Không đủ RR: đo sai khoảng cách Risk vs Reward</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">RR thực tế phải đo tới liquidity THẬT gần nhất — không phải tới một mức TP tùy ý</text>

  <!-- panel -->
  <rect x="24" y="70" width="712" height="368" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- External real liquidity target line -->
  <line x1="150" y1="110" x2="712" y2="110" stroke="#16A34A" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="470" y="103" font-size="12.5" fill="#15803D" font-weight="600">External liquidity thật (draw on liquidity) — ~4R</text>

  <!-- Opposing pool box -->
  <rect x="370" y="150" width="110" height="70" rx="6" fill="#D97706" fill-opacity="0.14" stroke="#D97706" stroke-width="1.5"/>
  <text x="378" y="170" font-size="11.5" fill="#B45309" font-weight="600">Opposing pool /</text>
  <text x="378" y="184" font-size="11.5" fill="#B45309" font-weight="600">unfilled FVG</text>
  <text x="378" y="198" font-size="11" fill="#B45309">(chặn/hút reward)</text>

  <!-- Naive TP line -->
  <line x1="150" y1="218" x2="380" y2="218" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="150" y="234" font-size="12.5" fill="#B91C1C" font-weight="600">TP đặt theo pip tùy ý — chỉ ~1.3R</text>

  <!-- price path realized -->
  <path d="M 60 345 L 100 300 L 150 270 L 220 278 L 300 250" fill="none" stroke="#374151" stroke-width="1.8"/>
  <!-- projected path (uncertain) -->
  <path d="M 300 250 L 420 210 L 560 150 L 680 112" fill="none" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Entry line -->
  <line x1="150" y1="270" x2="712" y2="270" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="586" y="266" font-size="12.5" fill="#1D4ED8" font-weight="600">Entry (POI)</text>

  <!-- SL line -->
  <line x1="100" y1="310" x2="712" y2="310" stroke="#DC2626" stroke-width="1.8"/>
  <text x="600" y="306" font-size="12.5" fill="#B91C1C" font-weight="600">SL structural (behind sweep)</text>

  <!-- sweep marker -->
  <circle cx="60" cy="345" r="4" fill="#374151"/>
  <text x="34" y="368" font-size="11" fill="#4B5563">Sweep low</text>

  <!-- Risk bracket -->
  <line x1="95" y1="270" x2="95" y2="310" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="95,270 91,278 99,278" fill="#DC2626"/>
  <polygon points="95,310 91,302 99,302" fill="#DC2626"/>
  <text x="18" y="294" font-size="12" fill="#B91C1C" font-weight="700">Risk</text>
  <text x="14" y="308" font-size="11" fill="#B91C1C">= 1R</text>

  <!-- Reward to naive TP bracket -->
  <line x1="200" y1="218" x2="200" y2="270" stroke="#B91C1C" stroke-width="1.5"/>
  <polygon points="200,218 196,226 204,226" fill="#B91C1C"/>
  <polygon points="200,270 196,262 204,262" fill="#B91C1C"/>
  <text x="207" y="248" font-size="11.5" fill="#B91C1C" font-weight="600">≈1.3R</text>

  <!-- Reward to real target bracket -->
  <line x1="655" y1="110" x2="655" y2="270" stroke="#15803D" stroke-width="1.5"/>
  <polygon points="655,110 651,118 659,118" fill="#15803D"/>
  <polygon points="655,270 651,262 659,262" fill="#15803D"/>
  <text x="662" y="195" font-size="11.5" fill="#15803D" font-weight="700">≈4R</text>
  <text x="662" y="209" font-size="10.5" fill="#15803D">(nếu không</text>
  <text x="662" y="221" font-size="10.5" fill="#15803D">thoát sớm)</text>

  <!-- callout bottom -->
  <rect x="44" y="396" width="672" height="30" rx="6" fill="#DC2626" fill-opacity="0.08" stroke="#DC2626" stroke-width="1"/>
  <text x="56" y="416" font-size="12.5" fill="#991B1B" font-weight="600">Chốt lời tại "TP tùy ý" bỏ lại ~2.7R trên bàn — và pool đối ứng ở giữa có thể đảo giá trước khi tới đó.</text>
</svg>
