<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Risk of ruin: % drawdown sau N lenh thua lien tiep</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">So sanh 0.5% / 1% / 2% risk-per-trade - sizing tinh lai theo equity hien tai</text>

  <rect x="24" y="72" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- axis -->
  <line x1="60" y1="100" x2="60" y2="380" stroke="#9CA3AF" stroke-width="1.2"/>
  <line x1="60" y1="380" x2="720" y2="380" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="20" y="104" font-size="10" fill="#6B7280">35%</text>
  <text x="20" y="304" font-size="10" fill="#6B7280">10%</text>
  <text x="20" y="344" font-size="10" fill="#6B7280">5%</text>
  <text x="30" y="384" font-size="10" fill="#6B7280">0%</text>

  <!-- threshold lines -->
  <line x1="60" y1="340" x2="720" y2="340" stroke="#D97706" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="628" y="335" font-size="10.5" fill="#B45309" font-weight="700">5% daily limit</text>
  <line x1="60" y1="300" x2="720" y2="300" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="628" y="295" font-size="10.5" fill="#B91C1C" font-weight="700">10% max limit</text>

  <!-- N=5 group -->
  <rect x="100" y="360.2" width="34" height="19.8" fill="#16A34A"/>
  <rect x="142" y="340.8" width="34" height="39.2" fill="#3B82F6"/>
  <rect x="184" y="303.1" width="34" height="76.9" fill="#DC2626"/>
  <text x="130" y="396" font-size="11" fill="#374151" text-anchor="middle">N=5</text>

  <!-- N=10 group -->
  <rect x="260" y="340.9" width="34" height="39.1" fill="#16A34A"/>
  <rect x="302" y="303.5" width="34" height="76.5" fill="#3B82F6"/>
  <rect x="344" y="233.7" width="34" height="146.3" fill="#DC2626"/>
  <text x="290" y="396" font-size="11" fill="#374151" text-anchor="middle">N=10</text>

  <!-- N=15 group -->
  <rect x="420" y="322.1" width="34" height="57.9" fill="#16A34A"/>
  <rect x="462" y="268.1" width="34" height="111.9" fill="#3B82F6"/>
  <rect x="504" y="170.9" width="34" height="209.1" fill="#DC2626"/>
  <text x="450" y="396" font-size="11" fill="#374151" text-anchor="middle">N=15</text>

  <!-- N=20 group -->
  <rect x="580" y="303.7" width="34" height="76.3" fill="#16A34A"/>
  <rect x="622" y="234.3" width="34" height="145.7" fill="#3B82F6"/>
  <rect x="664" y="114.1" width="34" height="265.9" fill="#DC2626"/>
  <text x="610" y="396" font-size="11" fill="#374151" text-anchor="middle">N=20</text>

  <!-- legend -->
  <rect x="100" y="418" width="16" height="10" fill="#16A34A"/>
  <text x="120" y="427" font-size="12" fill="#374151">0.5% - vua qua 9% o N=20, chua breach max</text>

  <rect x="440" y="418" width="16" height="10" fill="#3B82F6"/>
  <text x="460" y="427" font-size="12" fill="#374151">1% - breach max ~N=11</text>

  <rect x="100" y="436" width="16" height="10" fill="#DC2626"/>
  <text x="120" y="445" font-size="12" fill="#374151">2% - breach daily ~N=3, breach max ~N=6 (N=10/15/20 la gia dinh neu bi ep tiep tuc)</text>

  <text x="24" y="418" font-size="0" fill="none"></text>
</svg>
