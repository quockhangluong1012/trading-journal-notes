<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vi du sai: mua FVG khi equal lows chua bi quet</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Entry ngay tai FVG "dep" -&gt; gia spike qua equal lows -&gt; dinh SL -&gt; roi moi rally</text>

  <rect x="24" y="76" width="712" height="352" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- FVG zone trader enters -->
  <rect x="260" y="200" width="70" height="35" fill="#3B82F6" fill-opacity="0.14" stroke="#1D4ED8"/>
  <text x="248" y="192" font-size="11" fill="#1D4ED8" font-weight="600">FVG "dep" (inducement)</text>

  <!-- equal lows untouched, right below entry -->
  <line x1="60" y1="290" x2="700" y2="290" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="66" y="282" font-size="11.5" fill="#B91C1C" font-weight="600">SSL - Equal Lows (chua quet, ngay duoi entry)</text>

  <!-- price path: small dip into FVG, trader buys, then spikes down through equal lows, hits stop, then rallies -->
  <path d="M 70 150 L 150 200 L 230 180 L 300 220 L 340 210 L 400 250 L 460 330 L 510 300 L 560 210 L 620 130 L 680 90"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- entry marker at first touch -->
  <circle cx="300" cy="220" r="5" fill="#D97706"/>
  <polygon points="300,220 292,207 308,207" fill="#D97706"/>
  <text x="230" y="204" font-size="11.5" fill="#B45309" font-weight="600">Entry som tai FVG</text>

  <!-- SL placement -->
  <line x1="300" y1="296" x2="620" y2="296" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="330" y="312" font-size="10.5" fill="#B91C1C">SL ngay tren SSL - bi quet</text>

  <!-- sweep / stop out -->
  <circle cx="460" cy="330" r="5" fill="#DC2626"/>
  <text x="430" y="352" font-size="11.5" fill="#B91C1C" font-weight="600">Gia spike qua SSL -&gt; dinh SL</text>

  <!-- then rallies without trader -->
  <polygon points="680,90 670,108 692,106" fill="#16A34A"/>
  <text x="540" y="78" font-size="11.5" fill="#15803D" font-weight="600">Sau do gia rally dung bias - nhung ban da bi out</text>
</svg>
