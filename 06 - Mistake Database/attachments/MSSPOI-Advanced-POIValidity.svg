<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">POI Validity Criteria — 5 tiêu chí xác định POI hợp lệ</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Một vùng chỉ đủ điều kiện làm địa chỉ cho MSS khi thỏa đồng thời cả 5 tiêu chí.</text>

  <!-- 5 criteria cards -->
  <g>
    <rect x="24" y="72" width="222" height="140" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
    <text x="38" y="96" font-size="11.5" font-weight="700" fill="#1D4ED8">1. Origin Displacement</text>
    <text x="38" y="118" font-size="9.5" fill="#4B5563">Vùng được tạo bởi cú</text>
    <text x="38" y="132" font-size="9.5" fill="#4B5563">di chuyển giá mạnh,</text>
    <text x="38" y="146" font-size="9.5" fill="#4B5563">dứt khoát — không phải</text>
    <text x="38" y="160" font-size="9.5" fill="#4B5563">nến doji lình xình.</text>
    <path d="M38 185 L60 175 L75 195 L100 165" fill="none" stroke="#3B82F6" stroke-width="2"/>
  </g>

  <g>
    <rect x="270" y="72" width="222" height="140" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
    <text x="284" y="96" font-size="11.5" font-weight="700" fill="#1D4ED8">2. Unmitigated</text>
    <text x="284" y="118" font-size="9.5" fill="#4B5563">Chưa từng bị giá quay</text>
    <text x="284" y="132" font-size="9.5" fill="#4B5563">lại lấp đầy/test kể từ</text>
    <text x="284" y="146" font-size="9.5" fill="#4B5563">khi hình thành. Đã test</text>
    <text x="284" y="160" font-size="9.5" fill="#4B5563">1 lần → xác suất giảm.</text>
    <rect x="290" y="172" width="70" height="18" rx="2" fill="#3B82F6" opacity="0.20" stroke="#1D4ED8"/>
    <text x="296" y="185" font-size="8.5" fill="#1D4ED8">lần đầu chạm</text>
  </g>

  <g>
    <rect x="516" y="72" width="222" height="140" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
    <text x="530" y="96" font-size="11.5" font-weight="700" fill="#1D4ED8">3. Đúng Premium/Discount</text>
    <text x="530" y="118" font-size="9.5" fill="#4B5563">POI long phải nằm</text>
    <text x="530" y="132" font-size="9.5" fill="#4B5563">trong Discount; POI</text>
    <text x="530" y="146" font-size="9.5" fill="#4B5563">short phải nằm trong</text>
    <text x="530" y="160" font-size="9.5" fill="#4B5563">Premium của range.</text>
    <rect x="530" y="172" width="192" height="14" fill="#DC2626" opacity="0.10"/>
    <rect x="530" y="186" width="192" height="14" fill="#16A34A" opacity="0.14"/>
  </g>

  <g>
    <rect x="24" y="228" width="342" height="130" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
    <text x="38" y="252" font-size="11.5" font-weight="700" fill="#1D4ED8">4. Aligned với Draw on Liquidity</text>
    <text x="38" y="274" font-size="9.5" fill="#4B5563">Phía sau POI phải có một đích thanh khoản hợp lý</text>
    <text x="38" y="290" font-size="9.5" fill="#4B5563">(BSL/SSL, PDH/PDL) để giải thích "tại sao giá</text>
    <text x="38" y="306" font-size="9.5" fill="#4B5563">cần đi tới đó" — không chỉ là một mức giá đẹp.</text>
    <path d="M38 335 L120 335" stroke="#374151" stroke-width="1.6"/>
    <line x1="150" y1="320" x2="150" y2="350" stroke="#D97706" stroke-width="1.4" stroke-dasharray="3 3"/>
    <text x="130" y="316" font-size="8.5" fill="#B45309">BSL/SSL</text>
    <polygon points="120,335 112,331 112,339" fill="#374151"/>
  </g>

  <g>
    <rect x="396" y="228" width="342" height="130" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
    <text x="410" y="252" font-size="11.5" font-weight="700" fill="#1D4ED8">5. Timeframe đủ trọng lượng</text>
    <text x="410" y="274" font-size="9.5" fill="#4B5563">Với entry M5/M1, POI nên đến từ H4/H1 trở lên.</text>
    <text x="410" y="290" font-size="9.5" fill="#4B5563">Một "OB" tự vẽ trên M5 không đủ trọng lượng</text>
    <text x="410" y="306" font-size="9.5" fill="#4B5563">để làm địa chỉ cho một MSS quan trọng.</text>
    <rect x="410" y="320" width="60" height="22" rx="3" fill="#3B82F6" opacity="0.20" stroke="#1D4ED8"/>
    <text x="420" y="335" font-size="9" fill="#1D4ED8">H1/H4</text>
    <text x="478" y="335" font-size="12" fill="#6B7280">&#8594;</text>
    <rect x="500" y="320" width="60" height="22" rx="3" fill="#6B7280" opacity="0.15" stroke="#6B7280"/>
    <text x="512" y="335" font-size="9" fill="#374151">M5/M1</text>
  </g>

  <rect x="24" y="374" width="714" height="106" rx="8" fill="#16A34A" opacity="0.06" stroke="#16A34A"/>
  <text x="40" y="400" font-size="12" font-weight="700" fill="#15803D">Chỉ khi cả 5 tiêu chí đều đúng, MSS xảy ra tại vùng đó mới nên được tin là confirmation thật.</text>
  <text x="40" y="422" font-size="10.5" fill="#4B5563">Thiếu dù chỉ 1 tiêu chí (thường là #2 unmitigated hoặc #3 đúng phía Premium/Discount) — mặc định</text>
  <text x="40" y="440" font-size="10.5" fill="#4B5563">coi MSS là internal repricing / induced move, không phải tín hiệu đảo chiều đáng tin cậy.</text>
  <text x="40" y="462" font-size="10.5" fill="#4B5563">Ghi `MSS_in_POI: yes/no` trong journal để đo lường tác động thực tế của tiêu chí này lên win rate.</text>
</svg>
