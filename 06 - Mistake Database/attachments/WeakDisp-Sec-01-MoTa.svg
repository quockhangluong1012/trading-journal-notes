<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Weak Displacement — cú đẩy thiếu năng lượng</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng phá qua một mức, nhưng displacement yếu (trái) không mang bằng chứng order flow như displacement mạnh (phải).</text>

  <!-- LEFT weak -->
  <rect x="24" y="72" width="350" height="386" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="40" y="96" font-size="13" font-weight="700" fill="#B91C1C">YẾU — thân nhỏ, nhiều wick, chồng lấn, KHÔNG FVG</text>
  <line x1="42" y1="250" x2="356" y2="250" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="46" y="245" font-size="9.5" fill="#4B5563">Mức cần phá</text>
  <!-- weak candles: small bodies, big wicks, overlapping, grinding up -->
  <g>
    <line x1="70" y1="300" x2="70" y2="360" stroke="#B91C1C" stroke-width="1.2"/><rect x="65" y="320" width="10" height="14" fill="#DC2626"/>
    <line x1="95" y1="290" x2="95" y2="355" stroke="#15803D" stroke-width="1.2"/><rect x="90" y="315" width="10" height="12" fill="#16A34A"/>
    <line x1="120" y1="280" x2="120" y2="345" stroke="#B91C1C" stroke-width="1.2"/><rect x="115" y="305" width="10" height="13" fill="#DC2626"/>
    <line x1="145" y1="270" x2="145" y2="335" stroke="#15803D" stroke-width="1.2"/><rect x="140" y="295" width="10" height="12" fill="#16A34A"/>
    <line x1="170" y1="255" x2="170" y2="320" stroke="#15803D" stroke-width="1.2"/><rect x="165" y="278" width="10" height="14" fill="#16A34A"/>
    <line x1="195" y1="235" x2="195" y2="300" stroke="#15803D" stroke-width="1.2"/><rect x="190" y="258" width="10" height="15" fill="#16A34A"/>
    <line x1="220" y1="228" x2="220" y2="290" stroke="#B91C1C" stroke-width="1.2"/><rect x="215" y="250" width="10" height="13" fill="#DC2626"/>
    <line x1="245" y1="222" x2="245" y2="285" stroke="#15803D" stroke-width="1.2"/><rect x="240" y="245" width="10" height="14" fill="#16A34A"/>
  </g>
  <text x="120" y="215" font-size="10" fill="#B91C1C" font-weight="600">Grinding qua mức — không dứt khoát</text>
  <rect x="40" y="376" width="318" height="70" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-opacity="0.5"/>
  <text x="50" y="396" font-size="10.5" fill="#991B1B">• Body/range thấp (&lt;50%), wick dài hai đầu</text>
  <text x="50" y="414" font-size="10.5" fill="#991B1B">• Các nến chồng lấn nhau, không để lại FVG</text>
  <text x="50" y="432" font-size="10.5" fill="#991B1B">→ Không có bằng chứng SM đổi hướng thật</text>

  <!-- RIGHT strong -->
  <rect x="386" y="72" width="350" height="386" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="402" y="96" font-size="13" font-weight="700" fill="#15803D">MẠNH — thân lớn, ít wick, để lại FVG</text>
  <line x1="404" y1="250" x2="718" y2="250" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="408" y="245" font-size="9.5" fill="#4B5563">Mức cần phá</text>
  <g>
    <line x1="440" y1="300" x2="440" y2="360" stroke="#B91C1C" stroke-width="1.2"/><rect x="435" y="320" width="10" height="14" fill="#DC2626"/>
    <line x1="465" y1="298" x2="465" y2="356" stroke="#B91C1C" stroke-width="1.2"/><rect x="460" y="320" width="10" height="14" fill="#DC2626"/>
    <line x1="490" y1="296" x2="490" y2="352" stroke="#15803D" stroke-width="1.2"/><rect x="485" y="318" width="10" height="14" fill="#16A34A"/>
  </g>
  <!-- big displacement candles -->
  <line x1="520" y1="180" x2="520" y2="330" stroke="#15803D" stroke-width="1.4"/><rect x="512" y="195" width="16" height="120" fill="#16A34A"/>
  <line x1="560" y1="130" x2="560" y2="205" stroke="#15803D" stroke-width="1.4"/><rect x="552" y="140" width="16" height="60" fill="#16A34A"/>
  <text x="470" y="176" font-size="10" fill="#15803D" font-weight="600">Displacement đóng dứt khoát qua mức</text>
  <!-- FVG -->
  <rect x="528" y="195" width="40" height="30" fill="#3B82F6" fill-opacity="0.22" stroke="#1D4ED8"/>
  <text x="575" y="214" font-size="10" fill="#1D4ED8" font-weight="600">FVG</text>
  <rect x="402" y="376" width="318" height="70" rx="5" fill="#DCFCE7" stroke="#16A34A" stroke-opacity="0.5"/>
  <text x="412" y="396" font-size="10.5" fill="#166534">• Body/range cao (&gt;60%), ít wick ngược</text>
  <text x="412" y="414" font-size="10.5" fill="#166534">• Bỏ qua nhiều giá nhanh → tạo FVG rõ</text>
  <text x="412" y="432" font-size="10.5" fill="#166534">→ Dấu vết order flow tổ chức thật</text>
</svg>
