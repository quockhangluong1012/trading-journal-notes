<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bias Tiers A/B/C — không phải mọi bias đáng risk như nhau</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chấm điểm độ tin cậy của bias TRƯỚC khi vào lệnh, rồi scale risk theo tier — không phải all-or-nothing.</text>

  <!-- Tier A -->
  <rect x="24" y="72" width="712" height="120" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <rect x="24" y="72" width="10" height="120" fill="#16A34A"/>
  <text x="50" y="96" font-size="13" font-weight="700" fill="#15803D">Tier A — Full Risk (0.5%)</text>
  <text x="50" y="118" font-size="10.5" fill="#374151">• HTF array-to-array rõ ràng + POI chưa bị vi phạm</text>
  <text x="50" y="136" font-size="10.5" fill="#374151">• Weekly profile khớp (đúng ngày trong nhịp tuần)</text>
  <text x="50" y="154" font-size="10.5" fill="#374151">• Midnight open + PD-array cùng chiều bias</text>
  <text x="50" y="172" font-size="10.5" fill="#374151">• Không phải ngày tin lớn chi phối (non-NFP/FOMC/CPI)</text>
  <rect x="560" y="94" width="150" height="70" rx="6" fill="#16A34A" opacity="0.10" stroke="#16A34A"/>
  <text x="580" y="122" font-size="20" font-weight="700" fill="#15803D">0.5%</text>
  <text x="580" y="142" font-size="9.5" fill="#15803D">risk đầy đủ theo rule</text>
  <text x="580" y="156" font-size="9.5" fill="#15803D">vault (tối đa)</text>

  <!-- Tier B -->
  <rect x="24" y="200" width="712" height="120" rx="8" fill="#FFFFFF" stroke="#D97706"/>
  <rect x="24" y="200" width="10" height="120" fill="#D97706"/>
  <text x="50" y="224" font-size="13" font-weight="700" fill="#B45309">Tier B — Half Risk (0.25%)</text>
  <text x="50" y="246" font-size="10.5" fill="#374151">• Đích draw on liquidity rõ, nhưng POI chưa hoàn toàn sạch</text>
  <text x="50" y="264" font-size="10.5" fill="#374151">• Weekly profile mơ hồ (giữa tuần chưa rõ manip/expansion)</text>
  <text x="50" y="282" font-size="10.5" fill="#374151">• Có tin tầm trung trong phiên, hoặc mới đổi bias gần đây</text>
  <text x="50" y="300" font-size="10.5" fill="#374151">• MTF (H4/H1) và LTF (M15) chưa đồng thuận hoàn toàn</text>
  <rect x="560" y="222" width="150" height="70" rx="6" fill="#D97706" opacity="0.10" stroke="#D97706"/>
  <text x="578" y="250" font-size="20" font-weight="700" fill="#B45309">0.25%</text>
  <text x="580" y="270" font-size="9.5" fill="#B45309">giảm size, giữ</text>
  <text x="580" y="284" font-size="9.5" fill="#B45309">kỷ luật entry</text>

  <!-- Tier C -->
  <rect x="24" y="328" width="712" height="120" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <rect x="24" y="328" width="10" height="120" fill="#DC2626"/>
  <text x="50" y="352" font-size="13" font-weight="700" fill="#B91C1C">Tier C — No Risk / Chỉ quan sát</text>
  <text x="50" y="374" font-size="10.5" fill="#374151">• Bias thật sự Neutral / dealing range co lại, chưa rõ đích</text>
  <text x="50" y="392" font-size="10.5" fill="#374151">• Ngày Seek &amp; Destroy hoặc pre-FOMC/CPI/NFP — biến động giả</text>
  <text x="50" y="410" font-size="10.5" fill="#374151">• Vừa bias sai trong phiên trước, chưa map lại HTF</text>
  <text x="50" y="428" font-size="10.5" fill="#374151">• Midnight open, weekly profile, HTF POI mâu thuẫn nhau</text>
  <rect x="560" y="350" width="150" height="70" rx="6" fill="#DC2626" opacity="0.10" stroke="#DC2626"/>
  <text x="590" y="378" font-size="20" font-weight="700" fill="#B91C1C">0%</text>
  <text x="574" y="398" font-size="9.5" fill="#B91C1C">Stand down —</text>
  <text x="574" y="412" font-size="9.5" fill="#B91C1C">chỉ backtest/quan sát</text>

  <text x="24" y="472" font-size="11" font-weight="700" fill="#374151">Nguyên tắc: risk phải phản ánh ĐỘ TIN CẬY của bias, không phải "hôm nay muốn trade".</text>
  <text x="24" y="490" font-size="10.5" fill="#6B7280">Ghi tier vào nhật ký mỗi ngày — đối chiếu với `bias_correct` và kết quả để hiệu chỉnh cách chấm điểm.</text>
</svg>
