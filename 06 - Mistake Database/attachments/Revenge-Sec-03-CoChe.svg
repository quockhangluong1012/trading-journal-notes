<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế: Tilt Cycle &amp; Circuit Breaker</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vòng lặp thua → cảm xúc → oversized xoáy sâu dần — phải bẻ gãy CÀNG SỚM CÀNG TỐT</text>

  <rect x="24" y="72" width="712" height="412" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Row 1: 5 cycle boxes -->
  <rect x="34" y="96" width="128" height="76" rx="6" fill="#374151" fill-opacity="0.07" stroke="#4B5563"/>
  <text x="44" y="118" font-size="11.5" font-weight="700" fill="#1F2937">1. Thua lệnh</text>
  <text x="44" y="136" font-size="10" fill="#374151">(dù đúng kế</text>
  <text x="44" y="150" font-size="10" fill="#374151">hoạch, -0.5%)</text>

  <rect x="176" y="96" width="128" height="76" rx="6" fill="#D97706" fill-opacity="0.08" stroke="#D97706"/>
  <text x="186" y="118" font-size="11.5" font-weight="700" fill="#B45309">2. Thất vọng</text>
  <text x="186" y="136" font-size="10" fill="#374151">tự trách</text>
  <text x="186" y="150" font-size="10" fill="#374151">bản thân</text>

  <rect x="318" y="96" width="128" height="76" rx="6" fill="#D97706" fill-opacity="0.14" stroke="#B45309"/>
  <text x="328" y="114" font-size="10.8" font-weight="700" fill="#B45309">3. "Thị trường</text>
  <text x="328" y="130" font-size="10.8" font-weight="700" fill="#B45309">nợ tôi"</text>
  <text x="328" y="148" font-size="10" fill="#374151">phải lấy lại ngay</text>

  <rect x="460" y="96" width="128" height="76" rx="6" fill="#DC2626" fill-opacity="0.10" stroke="#DC2626"/>
  <text x="470" y="116" font-size="11" font-weight="700" fill="#B91C1C">4. Oversized</text>
  <text x="470" y="132" font-size="11" font-weight="700" fill="#B91C1C">entry</text>
  <text x="470" y="150" font-size="10" fill="#374151">bỏ qua checklist</text>

  <rect x="602" y="96" width="128" height="76" rx="6" fill="#DC2626" fill-opacity="0.18" stroke="#B91C1C"/>
  <text x="612" y="118" font-size="11.5" font-weight="700" fill="#B91C1C">5. Thua</text>
  <text x="612" y="134" font-size="11.5" font-weight="700" fill="#B91C1C">lớn hơn</text>
  <text x="612" y="150" font-size="10" fill="#374151">size tiếp tục tăng</text>

  <!-- forward arrows row1 -->
  <polygon points="174,132 164,126 164,138" fill="#6B7280"/>
  <polygon points="316,132 306,126 306,138" fill="#6B7280"/>
  <polygon points="458,132 448,126 448,138" fill="#B45309"/>
  <polygon points="600,132 590,126 590,138" fill="#B91C1C"/>

  <!-- spiral loop-back arc: box5 bottom -> box2 bottom -->
  <path d="M 666,172 C 666,230 240,230 240,172" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="5 4"/>
  <polygon points="240,172 233,158 247,160" fill="#DC2626"/>
  <text x="453" y="222" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="middle">SPIRAL — lặp lại, size tăng dần mỗi vòng</text>

  <!-- circuit breaker exit -->
  <text x="44" y="256" font-size="12" font-weight="700" fill="#15803D">Lối thoát: bẻ gãy vòng lặp ngay tại bước 1 — trước khi cảm xúc leo thang</text>

  <line x1="98" y1="172" x2="98" y2="272" stroke="#16A34A" stroke-width="1.8" stroke-dasharray="4 3"/>
  <polygon points="98,272 91,260 105,260" fill="#16A34A"/>

  <rect x="34" y="276" width="702" height="100" rx="6" fill="#16A34A" fill-opacity="0.07" stroke="#16A34A"/>
  <text x="50" y="298" font-size="12.5" font-weight="700" fill="#15803D">CIRCUIT BREAKER — quy tắc dừng đã định trước (viết ra TRƯỚC khi vào phiên)</text>
  <text x="50" y="318" font-size="11" fill="#374151">1) Dừng ngay khi chạm ngưỡng: lệnh thua đầu tiên trong ngày HOẶC 2 lệnh thua liên tiếp</text>
  <text x="50" y="336" font-size="11" fill="#374151">2) Cooldown timer bắt buộc (30–60 phút) — rời khỏi màn hình, không nhìn chart</text>
  <text x="50" y="354" font-size="11" fill="#374151">3) Khóa lệnh cả ngày nếu đã chạm giới hạn lỗ ngày đã định trước (vd: -1%)</text>
  <text x="50" y="368" font-size="10" font-style="italic" fill="#4B5563">Càng bẻ gãy sớm (ngay tại bước 1–2), thiệt hại càng nhỏ và spiral không bao giờ khởi động.</text>

  <rect x="34" y="386" width="702" height="60" rx="6" fill="#374151" fill-opacity="0.05" stroke="#4B5563" stroke-opacity="0.3"/>
  <text x="50" y="406" font-size="11.5" font-weight="700" fill="#374151">Nguy hiểm thật sự không phải lệnh thua ĐẦU TIÊN (đã nằm trong kế hoạch) —</text>
  <text x="50" y="424" font-size="11.5" fill="#374151">mà là CHUỖI lệnh phản ứng theo sau, đủ để phá vỡ giới hạn lỗ ngày/tuần và đe dọa cả challenge.</text>
</svg>
