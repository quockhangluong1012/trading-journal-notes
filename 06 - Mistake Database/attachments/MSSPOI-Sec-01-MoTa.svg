<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Entry When MSS not in POI Zone</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng một chuỗi sweep → displacement → MSS → FVG, khác nhau ở VỊ TRÍ xảy ra trong dealing range.</text>

  <!-- LEFT: valid -->
  <rect x="24" y="70" width="340" height="390" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="38" y="94" font-size="13" font-weight="700" fill="#15803D">ĐÚNG — MSS tại POI H1 hợp lệ</text>
  <rect x="42" y="108" width="304" height="270" rx="4" fill="none" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="42" y="108" width="304" height="127" fill="#DC2626" opacity="0.06"/>
  <rect x="42" y="235" width="304" height="143" fill="#16A34A" opacity="0.06"/>
  <line x1="42" y1="235" x2="346" y2="235" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="350" y="239" font-size="9.5" fill="#6B7280">EQ 50%</text>
  <text x="48" y="122" font-size="10" fill="#B91C1C">Premium</text>
  <text x="48" y="372" font-size="10" fill="#15803D">Discount</text>
  <rect x="70" y="330" width="130" height="26" rx="3" fill="#3B82F6" opacity="0.18" stroke="#1D4ED8"/>
  <text x="76" y="347" font-size="9.5" fill="#1D4ED8">POI: Bullish OB (H1)</text>
  <path d="M100 356 L100 330" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3 3"/>
  <path d="M60 300 C 90 320, 130 340, 160 345 C 180 348, 190 310, 220 260 C 240 225, 270 180, 310 150" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="160" cy="345" r="3.5" fill="#D97706"/>
  <text x="160" y="365" font-size="9" fill="#B45309">Sweep SSL</text>
  <rect x="205" y="250" width="34" height="18" rx="2" fill="#3B82F6" opacity="0.22" stroke="#1D4ED8"/>
  <text x="204" y="245" font-size="8.5" fill="#1D4ED8">FVG entry</text>
  <text x="185" y="228" font-size="9" font-weight="700" fill="#15803D">MSS (tại POI)</text>
  <polygon points="310,150 300,158 302,144" fill="#16A34A"/>
  <text x="60" y="404" font-size="10.5" font-weight="700" fill="#15803D">MSS xảy ra ngay bên trong/ ngay sau khi rời POI.</text>
  <text x="60" y="422" font-size="10" fill="#4B5563">Có địa chỉ (POI) + có xác nhận (MSS) → confirmation có chủ.</text>
  <text x="60" y="440" font-size="10" fill="#4B5563">Target: BSL — draw on liquidity phía trên.</text>

  <!-- RIGHT: invalid -->
  <rect x="396" y="70" width="340" height="390" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="410" y="94" font-size="13" font-weight="700" fill="#B91C1C">SAI — MSS ở giữa range (no man's land)</text>
  <rect x="414" y="108" width="304" height="270" rx="4" fill="none" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="414" y="108" width="304" height="127" fill="#DC2626" opacity="0.06"/>
  <rect x="414" y="235" width="304" height="143" fill="#16A34A" opacity="0.06"/>
  <line x1="414" y1="235" x2="718" y2="235" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="722" y="239" font-size="9.5" fill="#6B7280">EQ 50%</text>
  <rect x="470" y="205" width="120" height="60" fill="#D97706" opacity="0.14" stroke="#D97706" stroke-dasharray="4 3"/>
  <text x="476" y="200" font-size="9" fill="#B45309">Không có POI ở đây</text>
  <path d="M432 280 C 460 260, 490 250, 520 240 C 540 234, 550 220, 560 210 C 566 205, 590 190, 620 165" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="520" cy="240" r="3.5" fill="#D97706"/>
  <text x="500" y="300" font-size="9" fill="#B45309">Quét micro-swing nội bộ</text>
  <rect x="555" y="196" width="32" height="16" rx="2" fill="#3B82F6" opacity="0.18" stroke="#1D4ED8"/>
  <text x="548" y="192" font-size="8.5" fill="#1D4ED8">FVG "đẹp"</text>
  <text x="560" y="182" font-size="9" font-weight="700" fill="#B91C1C">Mini-MSS (giữa EQ)</text>
  <polygon points="620,165 610,172 613,158" fill="#DC2626"/>
  <path d="M620 165 C 640 195, 610 260, 560 310" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="560,310 570,302 570,316" fill="#DC2626"/>
  <text x="410" y="404" font-size="10.5" font-weight="700" fill="#B91C1C">Có xác nhận (MSS) nhưng KHÔNG có địa chỉ (POI).</text>
  <text x="410" y="422" font-size="10" fill="#4B5563">Giá thường quay lại tiếp diễn, quét SL vừa đặt trên đường</text>
  <text x="410" y="440" font-size="10" fill="#4B5563">đi tới POI thật nằm sâu hơn.</text>
</svg>
