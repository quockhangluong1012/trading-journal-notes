<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="1" y="1" width="758" height="478" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">✅ Đúng: entry tại POI, stop chặt, đường chạy rõ tới 2 mục tiêu</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Internal liquidity ≥2R làm TP1 · External draw 3–5R làm TP2 · Không có pool đối ứng chặn giữa đường</text>

  <rect x="24" y="70" width="712" height="388" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- external target -->
  <line x1="120" y1="102" x2="712" y2="102" stroke="#16A34A" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="480" y="96" font-size="12" fill="#15803D" font-weight="600">External draw (old high / BSL) — TP2 ≈4R</text>

  <!-- internal liquidity TP1 -->
  <line x1="120" y1="210" x2="530" y2="210" stroke="#16A34A" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="330" y="204" font-size="12" fill="#15803D" font-weight="600">Internal liquidity (equal highs) — TP1 ≈2R</text>

  <!-- clear runway shading -->
  <rect x="120" y="102" width="592" height="196" fill="#16A34A" fill-opacity="0.05"/>
  <text x="600" y="130" font-size="11" fill="#15803D">runway sạch — không FVG/pool đối ứng</text>

  <!-- price path: sweep -> displacement -> MSS -> entry -> rally through TP1 to TP2 -->
  <path d="M 60 300 L 110 360 L 150 340 L 200 250 L 240 265 L 300 200 L 380 208 L 450 165 L 540 130 L 620 112 L 700 100"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- sweep marker -->
  <circle cx="110" cy="360" r="4" fill="#374151"/>
  <text x="60" y="382" font-size="10.5" fill="#4B5563">Sweep SSL</text>

  <!-- MSS marker -->
  <circle cx="200" cy="250" r="4" fill="#3B82F6"/>
  <text x="188" y="238" font-size="10.5" fill="#1D4ED8" font-weight="600">MSS</text>

  <!-- entry / POI box (FVG/OB) -->
  <rect x="222" y="255" width="60" height="30" rx="5" fill="#3B82F6" fill-opacity="0.14" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="228" y="275" font-size="10.5" fill="#1D4ED8" font-weight="600">Entry POI</text>

  <!-- entry line -->
  <line x1="120" y1="265" x2="712" y2="265" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="640" y="260" font-size="11.5" fill="#1D4ED8" font-weight="600">Entry</text>

  <!-- SL structural, behind sweep -->
  <line x1="120" y1="345" x2="712" y2="345" stroke="#DC2626" stroke-width="1.8"/>
  <text x="600" y="341" font-size="11.5" fill="#B91C1C" font-weight="600">SL — dưới điểm sweep (structural)</text>

  <!-- risk bracket -->
  <line x1="95" y1="265" x2="95" y2="345" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="95,265 91,273 99,273" fill="#DC2626"/>
  <polygon points="95,345 91,337 99,337" fill="#DC2626"/>
  <text x="34" y="309" font-size="12" fill="#B91C1C" font-weight="700">1R</text>

  <!-- reward TP1 bracket -->
  <line x1="700" y1="210" x2="700" y2="265" stroke="#15803D" stroke-width="1.5"/>
  <polygon points="700,210 696,218 704,218" fill="#15803D"/>
  <polygon points="700,265 696,257 704,257" fill="#15803D"/>
  <text x="666" y="242" font-size="11.5" fill="#15803D" font-weight="700">2R</text>

  <!-- reward TP2 bracket -->
  <line x1="722" y1="102" x2="722" y2="265" stroke="#15803D" stroke-width="1.3"/>
  <text x="686" y="184" font-size="11.5" fill="#15803D" font-weight="700">~4R</text>

  <!-- callout -->
  <rect x="44" y="404" width="672" height="42" rx="6" fill="#16A34A" fill-opacity="0.08" stroke="#16A34A"/>
  <text x="56" y="422" font-size="12" fill="#15803D" font-weight="600">Stop chặt vì đặt tại cấu trúc (sau sweep) — không phải vì "hy vọng".</text>
  <text x="56" y="438" font-size="12" fill="#15803D" font-weight="600">Reward đo tới liquidity thật, có runway sạch — RR ≥1:2 tới TP1, tốt hơn nữa nếu chạy runner tới TP2.</text>
</svg>
