<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Nâng cao: thang điểm displacement &amp; energy footprint</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chấm điểm 0-5 trước khi tin vào cú break. ≥4 = strong, 2-3 = weak (giảm size), &lt;2 = bỏ qua.</text>

  <!-- anatomy of a candle -->
  <rect x="24" y="76" width="330" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="100" font-size="12.5" font-weight="700" fill="#1F2937">Giải phẫu body-to-range</text>
  <!-- strong candle -->
  <line x1="110" y1="130" x2="110" y2="270" stroke="#15803D" stroke-width="1.4"/>
  <rect x="100" y="145" width="20" height="105" fill="#16A34A"/>
  <text x="80" y="290" font-size="10.5" fill="#15803D" font-weight="600">Mạnh: body ~75%</text>
  <!-- weak candle -->
  <line x1="250" y1="130" x2="250" y2="270" stroke="#B91C1C" stroke-width="1.4"/>
  <rect x="240" y="185" width="20" height="30" fill="#DC2626"/>
  <text x="215" y="290" font-size="10.5" fill="#B91C1C" font-weight="600">Yếu: body ~20%</text>
  <text x="130" y="205" font-size="9.5" fill="#6B7280">wick nhỏ</text>
  <text x="268" y="160" font-size="9.5" fill="#6B7280">wick dài</text>
  <text x="268" y="250" font-size="9.5" fill="#6B7280">wick dài</text>

  <!-- scoring table -->
  <rect x="370" y="76" width="366" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="386" y="100" font-size="12.5" font-weight="700" fill="#1F2937">Thang điểm (1đ/tiêu chí)</text>
  <g font-size="11" fill="#4B5563">
    <text x="386" y="128">☐ Body-to-range &gt; 60%</text>
    <text x="386" y="152">☐ Range &gt; 1.5x ATR các nến trước</text>
    <text x="386" y="176">☐ Tạo FVG rõ ràng</text>
    <text x="386" y="200">☐ Ít chồng lấn (không grinding)</text>
    <text x="386" y="224">☐ ĐÓNG cửa qua mức (không chỉ wick)</text>
  </g>
  <line x1="386" y1="238" x2="716" y2="238" stroke="#E5E7EB"/>
  <text x="386" y="262" font-size="11" fill="#15803D" font-weight="600">≥4đ → strong (full size)</text>
  <text x="386" y="282" font-size="11" fill="#D97706" font-weight="600">2-3đ → weak (giảm size / chờ thêm)</text>
  <text x="386" y="300" font-size="11" fill="#B91C1C" font-weight="600">&lt;2đ → không phải displacement, bỏ qua</text>

  <!-- chain footer -->
  <rect x="24" y="322" width="712" height="130" rx="8" fill="#F8FAFC" stroke="#E5E7EB"/>
  <text x="40" y="346" font-size="12.5" font-weight="700" fill="#1F2937">Chuỗi phụ thuộc: displacement là gốc</text>
  <g font-size="11.5">
    <rect x="40" y="360" width="150" height="44" rx="6" fill="#EFF6FF" stroke="#1D4ED8"/>
    <text x="52" y="380" fill="#1D4ED8" font-weight="600">Displacement</text>
    <text x="52" y="396" fill="#6B7280" font-size="10">chất lượng thật</text>

    <rect x="230" y="360" width="150" height="44" rx="6" fill="#EFF6FF" stroke="#1D4ED8"/>
    <text x="242" y="380" fill="#1D4ED8" font-weight="600">MSS hợp lệ</text>
    <text x="242" y="396" fill="#6B7280" font-size="10">đóng qua swing</text>

    <rect x="420" y="360" width="150" height="44" rx="6" fill="#EFF6FF" stroke="#1D4ED8"/>
    <text x="432" y="380" fill="#1D4ED8" font-weight="600">FVG valid</text>
    <text x="432" y="396" fill="#6B7280" font-size="10">POI để entry</text>

    <rect x="610" y="360" width="106" height="44" rx="6" fill="#DCFCE7" stroke="#16A34A"/>
    <text x="622" y="380" fill="#166534" font-weight="600">Entry A+</text>
  </g>
  <path d="M190 382 L228 382" stroke="#6B7280" stroke-width="1.6" marker-end="url(#aW)"/>
  <path d="M380 382 L418 382" stroke="#6B7280" stroke-width="1.6" marker-end="url(#aW)"/>
  <path d="M570 382 L608 382" stroke="#6B7280" stroke-width="1.6" marker-end="url(#aW)"/>
  <text x="40" y="432" font-size="10.5" fill="#B91C1C" font-weight="600">Nếu displacement yếu ngay từ gốc → MSS yếu → FVG không đáng tin → toàn bộ entry sụp.</text>

  <defs>
    <marker id="aW" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
