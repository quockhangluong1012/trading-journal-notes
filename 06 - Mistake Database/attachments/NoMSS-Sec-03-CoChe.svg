<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế &amp; Vì sao nguy hiểm</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Sweep không kèm MSS thường chỉ nạp thanh khoản cho continuation — MSS thật chỉ xuất hiện sau đó, ở vùng sâu hơn.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- price path -->
  <line x1="60" y1="330" x2="60" y2="110" stroke="#D8DBE2" stroke-width="1"/>
  <text x="34" y="115" font-size="9" fill="#9CA3AF">Giá</text>

  <!-- POI zone 1 (shallow) -->
  <rect x="150" y="200" width="90" height="30" fill="#3B82F6" opacity="0.12" stroke="#1D4ED8"/>
  <text x="152" y="196" font-size="8.5" fill="#1D4ED8">POI nông (touch 1)</text>

  <!-- real POI (deep) -->
  <rect x="560" y="300" width="120" height="34" fill="#3B82F6" opacity="0.14" stroke="#1D4ED8"/>
  <text x="562" y="296" font-size="8.5" fill="#1D4ED8">POI thật (sâu hơn)</text>

  <path d="M70 130 C 100 150, 130 170, 160 195 C 180 210, 195 218, 210 222" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="210" cy="222" r="3.5" fill="#D97706"/>
  <text x="178" y="242" font-size="9" fill="#B45309">① Sweep tại POI nông</text>

  <!-- fake wick reaction, no close through -->
  <path d="M210 222 C 225 210, 235 205, 245 202" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <line x1="245" y1="185" x2="285" y2="185" stroke="#6B7280" stroke-dasharray="6 4" stroke-width="1.2"/>
  <text x="248" y="180" font-size="8.5" fill="#4B5563">Protected swing — không bị đóng nến qua khỏi</text>
  <polygon points="245,202 238,192 252,196" fill="#D97706"/>
  <text x="246" y="266" font-size="9" font-weight="700" fill="#B45309">② Không có displacement/close qua khỏi = không MSS</text>

  <!-- entry trap -->
  <circle cx="245" cy="202" r="4" fill="#1D4ED8"/>
  <text x="248" y="205" font-size="8.5" fill="#1D4ED8">Entry sớm (chỉ vì đã sweep)</text>

  <!-- continuation down, stop out -->
  <path d="M245 202 C 270 220, 300 250, 340 275 C 380 298, 430 305, 480 312" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="480,312 470,308 472,320" fill="#DC2626"/>
  <text x="330" y="296" font-size="9" font-weight="700" fill="#B91C1C">③ Continuation — quét SL của entry sớm</text>

  <!-- real MSS deeper -->
  <path d="M480 312 C 520 322, 560 328, 590 318" fill="none" stroke="#374151" stroke-width="1.8"/>
  <line x1="600" y1="270" x2="660" y2="270" stroke="#6B7280" stroke-dasharray="6 4" stroke-width="1.2"/>
  <text x="600" y="264" font-size="8.5" fill="#4B5563">Protected swing thật</text>
  <path d="M590 318 C 610 290, 625 265, 635 245 C 645 225, 655 200, 665 175" fill="none" stroke="#15803D" stroke-width="2.4"/>
  <polygon points="665,175 655,182 660,167" fill="#16A34A"/>
  <rect x="640" y="205" width="24" height="22" fill="#3B82F6" opacity="0.22" stroke="#1D4ED8"/>
  <text x="642" y="200" font-size="8" fill="#1D4ED8">FVG</text>
  <text x="530" y="352" font-size="9" font-weight="700" fill="#15803D">④ MSS thật: displacement qua protected swing + FVG</text>
  <text x="560" y="368" font-size="9" fill="#4B5563">— chỉ bây giờ mới có bằng chứng đảo chiều</text>

  <text x="36" y="418" font-size="10.5" fill="#4B5563">Không có MSS = không có bằng chứng order flow đã đổi hướng. Sweep một mình chỉ là</text>
  <text x="36" y="434" font-size="10.5" fill="#4B5563">khả năng, không phải xác nhận — phần lớn dẫn tới tiếp diễn trước khi đảo chiều thật xảy ra.</text>
</svg>
