<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Mo ta loi: Enter before liquidity sweep</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vao lenh tai OB/FVG khi thanh khoan phia sau (SSL/BSL) van con nguyen</text>

  <rect x="24" y="76" width="712" height="352" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- equal lows liquidity line -->
  <line x1="60" y1="360" x2="700" y2="360" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="66" y="352" font-size="12" fill="#B91C1C" font-weight="600">SSL - Equal Lows (chua bi quet)</text>

  <!-- price path: down into POI, small reaction, entry too early, does NOT sweep, then price dives through liquidity -->
  <path d="M 70 140 L 160 220 L 230 190 L 300 260 L 360 240 L 420 300 L 470 285 L 520 340 L 560 330 L 610 400 L 660 320 L 700 150"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- OB / FVG zone where trader enters too early -->
  <rect x="440" y="270" width="90" height="45" fill="#3B82F6" fill-opacity="0.14" stroke="#1D4ED8" stroke-width="1.2"/>
  <text x="444" y="264" font-size="11.5" fill="#1D4ED8" font-weight="600">OB/FVG ("clean" - inducement)</text>

  <!-- early entry marker -->
  <circle cx="470" cy="285" r="5" fill="#D97706"/>
  <polygon points="470,285 462,272 478,272" fill="#D97706"/>
  <text x="486" y="282" font-size="11.5" fill="#B45309" font-weight="600">Entry som (chua sweep)</text>

  <!-- stop loss line -->
  <line x1="440" y1="322" x2="660" y2="322" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="486" y="316" font-size="11" fill="#B91C1C">SL ngay tren SSL - de bi quet</text>

  <!-- sweep event -->
  <circle cx="610" cy="400" r="5" fill="#DC2626"/>
  <text x="600" y="418" font-size="11.5" fill="#B91C1C" font-weight="600">SSL bi quet -&gt; SL bay</text>

  <!-- then true move -->
  <polygon points="700,150 690,168 712,166" fill="#16A34A"/>
  <text x="600" y="140" font-size="11.5" fill="#15803D" font-weight="600">Gia moi that su di dung huong (sau khi ban da bi quet)</text>

  <!-- annotation box -->
  <rect x="60" y="90" width="330" height="58" rx="6" fill="#DC2626" fill-opacity="0.07" stroke="#DC2626" stroke-opacity="0.4"/>
  <text x="70" y="108" font-size="12.5" fill="#991B1B" font-weight="700">Ban vao lenh truoc khi thuat toan</text>
  <text x="70" y="126" font-size="12.5" fill="#991B1B">chay xong: SSL van con "treo" ngay</text>
  <text x="70" y="144" font-size="12.5" fill="#991B1B">duoi entry -&gt; ban chinh la thanh khoan.</text>
</svg>
