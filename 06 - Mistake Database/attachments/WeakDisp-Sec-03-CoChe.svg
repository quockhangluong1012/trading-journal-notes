<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế: weak displacement = không có imbalance thật</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Displacement mạnh là dấu vết của order flow áp đảo. Yếu = giằng co cân bằng → dễ bị reclaim.</text>

  <rect x="24" y="74" width="712" height="308" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <line x1="60" y1="200" x2="700" y2="200" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="194" font-size="10.5" fill="#4B5563">Protected swing / mức cần phá</text>

  <!-- weak break grinding above then reclaimed -->
  <path d="M 70 300 L 130 285 L 190 270 L 250 250 L 300 205 L 340 185 L 370 195 L 410 220 L 460 265 L 520 310 L 590 345"
        fill="none" stroke="#374151" stroke-width="2"/>
  <!-- weak break marker -->
  <circle cx="340" cy="185" r="5" fill="#D97706"/>
  <text x="300" y="172" font-size="10" fill="#B45309" font-weight="600">Break yếu (grinding, không FVG)</text>
  <!-- reclaim -->
  <circle cx="410" cy="220" r="5" fill="#DC2626"/>
  <text x="418" y="216" font-size="10" fill="#B91C1C" font-weight="600">Giá reclaim ngược qua mức</text>
  <polygon points="590,345 580,330 598,332" fill="#B91C1C"/>
  <text x="500" y="360" font-size="10.5" fill="#B91C1C" font-weight="600">Tiếp diễn hướng cũ → SL của entry yếu bị quét</text>

  <text x="120" y="115" font-size="11" fill="#4B5563" font-weight="600">Không có FVG = không có "nhiên liệu" hỗ trợ pullback → không có nơi để giá tựa vào.</text>

  <rect x="24" y="392" width="712" height="40" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-opacity="0.4"/>
  <text x="38" y="416" font-size="11" fill="#991B1B" font-weight="600">Weak displacement thường sinh ra weak MSS + invalid FVG → cả chuỗi entry mất nền tảng bằng chứng.</text>
</svg>
