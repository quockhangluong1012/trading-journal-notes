<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế — vì sao smart money "ăn" đúng lỗi bias sai</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Bias sai = bạn tự nguyện đứng vào phía thanh khoản mà thuật toán CẦN quét, không phải phía nó bảo vệ.</text>

  <!-- AMD/PO3 schematic with Judas swing -->
  <rect x="24" y="70" width="440" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="92" font-size="12" font-weight="700" fill="#374151">PO3: Accumulation → Manipulation (Judas) → Distribution</text>
  <rect x="46" y="230" width="90" height="30" rx="3" fill="#3B82F6" opacity="0.12" stroke="#1D4ED8"/>
  <text x="52" y="250" font-size="9.5" fill="#1D4ED8">Accumulation (Á/Âu)</text>
  <line x1="46" y1="200" x2="400" y2="200" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="360" y="195" font-size="9" fill="#B91C1C">BSL phía trên (bẫy)</text>
  <line x1="46" y1="280" x2="400" y2="280" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="356" y="295" font-size="9" fill="#15803D">SSL thật (đích)</text>
  <!-- judas up spike -->
  <rect x="150" y="150" width="14" height="90" fill="#16A34A" rx="1"/>
  <circle cx="157" cy="152" r="9" fill="none" stroke="#D97706" stroke-width="2"/>
  <text x="90" y="140" font-size="10" font-weight="700" fill="#B45309">Judas swing: quét BSL London open</text>
  <text x="120" y="160" font-size="9" fill="#4B5563">← nơi bias sai "xác nhận long"</text>
  <!-- reversal displacement down -->
  <rect x="190" y="220" width="14" height="70" fill="#DC2626" rx="1"/>
  <rect x="230" y="260" width="14" height="60" fill="#DC2626" rx="1"/>
  <rect x="270" y="290" width="14" height="55" fill="#DC2626" rx="1"/>
  <rect x="310" y="320" width="14" height="20" fill="#DC2626" rx="1"/>
  <text x="230" y="360" font-size="10" font-weight="700" fill="#B91C1C">Displacement thật đi NGƯỢC bias sai → SSL bị quét</text>
  <path d="M164 155 C 200 190, 220 230, 260 300" fill="none" stroke="#4B5563" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="46" y="378" font-size="10" fill="#4B5563">Người vào long tại Judas = thanh khoản (SL của họ) chính là fuel cho move đối ứng.</text>

  <!-- EV side panel -->
  <rect x="480" y="70" width="256" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="494" y="92" font-size="12" font-weight="700" fill="#374151">Vì sao vẫn thua dù entry "chuẩn ICT"?</text>
  <text x="494" y="118" font-size="10.5" fill="#4B5563">• Sweep + MSS + FVG có thể xuất hiện</text>
  <text x="494" y="136" font-size="10.5" fill="#4B5563">  ở CẢ hai hướng — bias chọn hướng nào</text>
  <text x="494" y="154" font-size="10.5" fill="#4B5563">  mới quyết định bạn đọc đúng phe.</text>
  <text x="494" y="178" font-size="10.5" fill="#4B5563">• Nếu đích (draw on liquidity) đã bị</text>
  <text x="494" y="196" font-size="10.5" fill="#4B5563">  deliver rồi → "còn room" = ảo giác.</text>
  <text x="494" y="220" font-size="10.5" fill="#4B5563">• Bias sai → mua premium / bán discount</text>
  <text x="494" y="238" font-size="10.5" fill="#4B5563">  → RR thật thấp hơn RR trên chart.</text>
  <rect x="494" y="252" width="228" height="1" fill="#E5E7EB"/>
  <text x="494" y="274" font-size="11" font-weight="700" fill="#B91C1C">EV = P(đúng) × R(thắng) − P(sai) × R(thua)</text>
  <text x="494" y="294" font-size="10.5" fill="#4B5563">Bias sai kéo P(đúng) &lt; 50% một cách hệ</text>
  <text x="494" y="312" font-size="10.5" fill="#4B5563">thống, dù entry mechanics hoàn hảo.</text>
  <text x="494" y="336" font-size="10.5" fill="#4B5563">Hệ quả: lỗi tương quan — nhiều lệnh</text>
  <text x="494" y="354" font-size="10.5" fill="#4B5563">thua CÙNG một nguyên nhân gốc, dễ</text>
  <text x="494" y="372" font-size="10.5" fill="#4B5563">chạm daily loss limit trong 1 phiên.</text>
</svg>
