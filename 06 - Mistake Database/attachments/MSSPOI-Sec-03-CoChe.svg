<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế: mini-MSS dụ entry rồi mới đến POI thật</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Đường đi thật của giá — vì sao "pattern đẹp giữa range" thường dẫn tới SL bị quét.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- dealing range shading -->
  <rect x="60" y="90" width="640" height="105" fill="#DC2626" opacity="0.05"/>
  <rect x="60" y="195" width="640" height="115" fill="#D97706" opacity="0.06"/>
  <rect x="60" y="310" width="640" height="100" fill="#16A34A" opacity="0.08"/>
  <line x1="60" y1="252" x2="700" y2="252" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="704" y="256" font-size="9.5" fill="#6B7280">EQ 50%</text>
  <text x="66" y="104" font-size="10" fill="#B91C1C">Premium</text>
  <text x="66" y="326" font-size="10" fill="#15803D">Discount</text>

  <!-- valid POI marker at bottom -->
  <rect x="520" y="360" width="150" height="30" rx="3" fill="#3B82F6" opacity="0.20" stroke="#1D4ED8"/>
  <text x="528" y="379" font-size="10" fill="#1D4ED8">POI thật (H1 OB, unmitigated)</text>

  <!-- mini-MSS trap zone -->
  <rect x="230" y="215" width="140" height="70" fill="#D97706" opacity="0.16" stroke="#D97706" stroke-dasharray="4 3"/>
  <text x="238" y="210" font-size="9.5" fill="#B45309">Mini-MSS "bẫy" (giữa EQ)</text>

  <!-- price path -->
  <path d="M90 120 C 140 160, 190 200, 250 240 C 280 260, 300 270, 330 250 C 355 235, 375 225, 400 205"
        fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="330" cy="250" r="4" fill="#D97706"/>
  <text x="330" y="300" font-size="9.5" fill="#B45309">① Quét micro-swing nội bộ</text>
  <text x="330" y="196" font-size="9.5" font-weight="700" fill="#B45309">② Mini-MSS + FVG → trader vào long</text>

  <path d="M400 205 C 440 190, 470 210, 500 250 C 530 285, 560 330, 595 372" fill="none" stroke="#DC2626" stroke-width="2.2"/>
  <polygon points="595,372 585,364 587,378" fill="#DC2626"/>
  <text x="415" y="245" font-size="9.5" fill="#B91C1C">③ Giá quay lại — quét SL vừa đặt</text>

  <path d="M595 372 C 615 385, 640 335, 660 280 C 675 240, 685 190, 690 140" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <polygon points="690,140 680,148 684,132" fill="#16A34A"/>
  <text x="565" y="410" font-size="9.5" font-weight="700" fill="#15803D">④ MSS thật tại POI H1 → đảo chiều đúng nghĩa</text>

  <text x="60" y="440" font-size="10.5" fill="#4B5563">Lệnh long tại ② chính là thanh khoản mà giá "cần" quét trước khi đi đúng hướng phân tích ban đầu.</text>
</svg>
