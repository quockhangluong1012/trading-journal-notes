<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Các tell cảnh báo FOMO</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Dấu hiệu tâm lý (trong đầu) và dấu hiệu kỹ thuật (trên chart) đi kèm entry FOMO.</text>

  <!-- psychological -->
  <rect x="24" y="76" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#D97706"/>
  <text x="40" y="100" font-size="13" font-weight="700" fill="#B45309">Tâm lý (nội tâm)</text>
  <g font-size="11.5" fill="#4B5563">
    <circle cx="46" cy="128" r="3.5" fill="#D97706"/><text x="58" y="132">"Nó chạy mất rồi, phải vào ngay!"</text>
    <circle cx="46" cy="158" r="3.5" fill="#D97706"/><text x="58" y="162">Tim đập nhanh, tay run khi bấm lệnh</text>
    <circle cx="46" cy="188" r="3.5" fill="#D97706"/><text x="58" y="192">Bỏ qua checklist vì "không kịp"</text>
    <circle cx="46" cy="218" r="3.5" fill="#D97706"/><text x="58" y="222">Tiếc nuối vì đã bỏ lỡ entry "đẹp" trước đó</text>
    <circle cx="46" cy="248" r="3.5" fill="#D97706"/><text x="58" y="252">Nhìn giá chạy trên khung nhỏ (M1) liên tục</text>
    <circle cx="46" cy="278" r="3.5" fill="#D97706"/><text x="58" y="282">Tự nhủ "lần này khác, chắc chắn lên"</text>
    <circle cx="46" cy="308" r="3.5" fill="#D97706"/><text x="58" y="312">Đã đóng lệnh sớm, giờ muốn "vào lại"</text>
  </g>
  <rect x="40" y="330" width="318" height="58" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-opacity="0.5"/>
  <text x="50" y="352" font-size="10.5" fill="#92400E">FOMO là cảm xúc — khi thấy các tell này,</text>
  <text x="50" y="370" font-size="10.5" fill="#92400E">tay phải rời chuột trước khi lý trí quay lại.</text>

  <!-- technical -->
  <rect x="386" y="76" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="402" y="100" font-size="13" font-weight="700" fill="#B91C1C">Kỹ thuật (trên chart)</text>
  <g font-size="11.5" fill="#4B5563">
    <circle cx="408" cy="128" r="3.5" fill="#DC2626"/><text x="420" y="132">Giá đã đi 3-5 nến displacement liên tiếp</text>
    <circle cx="408" cy="158" r="3.5" fill="#DC2626"/><text x="420" y="162">Entry rơi vào vùng Premium (mua) / Discount (bán)</text>
    <circle cx="408" cy="188" r="3.5" fill="#DC2626"/><text x="420" y="192">Không có POI phía trước — giá đang "trống"</text>
    <circle cx="408" cy="218" r="3.5" fill="#DC2626"/><text x="420" y="222">Đuổi theo ngay sau tin (news spike)</text>
    <circle cx="408" cy="248" r="3.5" fill="#DC2626"/><text x="420" y="252">Đã quét xong ERL — draw on liquidity cạn</text>
    <circle cx="408" cy="278" r="3.5" fill="#DC2626"/><text x="420" y="282">SL buộc phải rất rộng để "theo" giá</text>
    <circle cx="408" cy="308" r="3.5" fill="#DC2626"/><text x="420" y="312">Vào giữa range, không phải tại rìa (extreme)</text>
  </g>
  <rect x="402" y="330" width="318" height="58" rx="5" fill="#FEE2E2" stroke="#DC2626" stroke-opacity="0.5"/>
  <text x="412" y="352" font-size="10.5" fill="#991B1B">Chỉ cần 1 tell kỹ thuật đỏ + 1 tell tâm lý</text>
  <text x="412" y="370" font-size="10.5" fill="#991B1B">= dừng lại, đánh dấu "no-trade", chờ setup mới.</text>
</svg>
