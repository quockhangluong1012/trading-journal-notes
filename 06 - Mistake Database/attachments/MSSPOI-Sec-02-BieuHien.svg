<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Biểu hiện &amp; Dấu hiệu nhận biết</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vị trí MSS trong dealing range quyết định đây là setup hợp lệ hay chỉ là nhiễu giữa EQ.</text>

  <!-- Range panel -->
  <rect x="24" y="70" width="330" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="94" font-size="12.5" font-weight="700" fill="#374151">Dealing Range — vùng nào MSS mới đáng tin?</text>
  <rect x="46" y="112" width="290" height="300" rx="4" fill="none" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="46" y="112" width="290" height="90" fill="#DC2626" opacity="0.14"/>
  <rect x="46" y="202" width="290" height="90" fill="#D97706" opacity="0.10"/>
  <rect x="46" y="292" width="290" height="120" fill="#16A34A" opacity="0.14"/>
  <line x1="46" y1="257" x2="336" y2="257" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="342" y="261" font-size="9.5" fill="#6B7280">EQ 50%</text>
  <text x="52" y="128" font-size="10.5" fill="#B91C1C">Premium (POI short)</text>
  <text x="52" y="220" font-size="10" fill="#B45309">Vùng 45–55% — "No man's land"</text>
  <text x="52" y="234" font-size="9.5" fill="#B45309">MSS ở đây = nhiễu nếu không trùng POI</text>
  <text x="52" y="400" font-size="10.5" fill="#15803D">Discount (POI long)</text>
  <rect x="70" y="330" width="110" height="20" rx="3" fill="#3B82F6" opacity="0.20" stroke="#1D4ED8"/>
  <text x="76" y="344" font-size="9" fill="#1D4ED8">Valid POI zone (OTE 62-79%)</text>
  <rect x="70" y="140" width="110" height="20" rx="3" fill="#3B82F6" opacity="0.20" stroke="#1D4ED8"/>
  <text x="76" y="154" font-size="9" fill="#1D4ED8">Valid POI zone (OTE 62-79%)</text>

  <!-- checklist -->
  <rect x="376" y="70" width="360" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="392" y="94" font-size="12.5" font-weight="700" fill="#374151">Checklist trước khi tin một MSS</text>

  <rect x="392" y="110" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 120 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="124" font-size="10.5" fill="#374151">Nêu được tên/mức giá POI cụ thể đang phản ứng</text>

  <rect x="392" y="142" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 152 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="156" font-size="10.5" fill="#374151">Entry nằm ở Discount/Premium sâu, không phải EQ</text>

  <rect x="392" y="174" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 184 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="188" font-size="10.5" fill="#374151">Swing bị quét gắn với liquidity pool đã biết</text>

  <rect x="392" y="206" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 216 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="220" font-size="10.5" fill="#374151">POI unmitigated — chưa từng bị test lại</text>

  <rect x="392" y="238" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 248 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="252" font-size="10.5" fill="#374151">POI đến từ H4/H1, không tự vẽ trên M5</text>

  <rect x="392" y="270" width="20" height="20" rx="3" fill="none" stroke="#16A34A" stroke-width="1.6"/>
  <path d="M395 280 l4 5 l9 -11" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="422" y="284" font-size="10.5" fill="#374151">Hướng MSS cùng chiều draw on liquidity HTF</text>

  <line x1="392" y1="308" x2="722" y2="308" stroke="#E5E7EB" stroke-width="1"/>
  <text x="392" y="330" font-size="11" font-weight="700" fill="#B91C1C">Thiếu 1 mục &gt; mặc định coi MSS là nhiễu nội bộ</text>
  <text x="392" y="350" font-size="10" fill="#4B5563">(internal repricing), chỉ quan sát — không entry,</text>
  <text x="392" y="368" font-size="10" fill="#4B5563">dù mô hình FVG/OB nhìn "đủ điều kiện" đến đâu.</text>
  <rect x="392" y="388" width="330" height="46" rx="6" fill="#D97706" opacity="0.10" stroke="#D97706"/>
  <text x="404" y="408" font-size="10" fill="#B45309" font-weight="700">Câu hỏi bắt buộc mỗi lần thấy MSS:</text>
  <text x="404" y="424" font-size="10" fill="#B45309">"MSS này đang xác nhận cho POI nào?"</text>
</svg>
