<svg viewBox="0 0 760 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="450" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#15803D">ĐÚNG — bỏ lỡ sóng đầu, chờ pullback về POI</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Không đuổi. Chờ giá hồi về Discount FVG/OB, có MSS LTF xác nhận, rồi mới vào.</text>

  <rect x="24" y="74" width="712" height="356" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-opacity="0.5"/>

  <line x1="50" y1="240" x2="710" y2="240" stroke="#9CA3AF" stroke-width="1.1" stroke-dasharray="6 4"/>
  <text x="640" y="234" font-size="10" fill="#6B7280">50% (EQ)</text>
  <text x="58" y="104" font-size="10.5" fill="#B91C1C">PREMIUM (không mua ở đây)</text>
  <text x="58" y="410" font-size="10.5" fill="#15803D">DISCOUNT (chỉ mua trong vùng này)</text>

  <!-- first impulse up (missed) -->
  <path d="M 70 380 L 130 330 L 190 280 L 250 210 L 300 165" fill="none" stroke="#94A3B8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="180" y="200" font-size="10.5" fill="#64748B">Sóng 1 (đã bỏ lỡ — không sao)</text>

  <!-- pullback into discount POI -->
  <path d="M 300 165 L 350 215 L 400 275 L 440 315" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="410" y="300" width="120" height="40" fill="#3B82F6" fill-opacity="0.16" stroke="#1D4ED8"/>
  <text x="410" y="294" font-size="10.5" fill="#1D4ED8" font-weight="600">Discount FVG/OB (POI)</text>

  <!-- MSS confirmation and entry -->
  <path d="M 440 315 L 470 285 L 500 300 L 540 250 L 590 190 L 650 140" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <line x1="440" y1="270" x2="560" y2="270" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="5 3"/>
  <text x="466" y="264" font-size="10" fill="#15803D" font-weight="600">MSS (LTF) xác nhận</text>
  <circle cx="500" cy="300" r="6" fill="#16A34A"/>
  <polygon points="500,300 492,314 508,314" fill="#16A34A"/>
  <text x="510" y="322" font-size="10.5" fill="#15803D" font-weight="600">Entry tại POI</text>

  <line x1="440" y1="348" x2="700" y2="348" stroke="#DC2626" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="560" y="362" font-size="10" fill="#B91C1C">SL dưới POI/sweep — chặt chẽ</text>
  <polygon points="650,140 641,156 659,152" fill="#16A34A"/>
  <text x="600" y="128" font-size="10.5" fill="#15803D" font-weight="600">Target: BSL</text>

  <text x="80" y="422" font-size="10.5" fill="#4B5563">Bỏ lỡ ≠ mất tiền. Kiên nhẫn chờ chiết khấu cho SL chặt + RR cao. Luôn còn sóng sau.</text>
</svg>
