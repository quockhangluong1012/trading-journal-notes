<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">FOMO Entry — đuổi theo giá đã chạy</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vào lệnh MUA khi sóng đã kéo dài vào vùng Premium, không có POI/plan — chỉ vì sợ bỏ lỡ.</text>

  <rect x="24" y="74" width="712" height="372" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- premium / discount split -->
  <rect x="50" y="96" width="660" height="120" fill="#DC2626" fill-opacity="0.06" stroke="#DC2626" stroke-opacity="0.35"/>
  <text x="58" y="112" font-size="11" fill="#B91C1C" font-weight="600">PREMIUM — vùng SM phân phối (bán ra)</text>
  <rect x="50" y="296" width="660" height="120" fill="#16A34A" fill-opacity="0.06" stroke="#16A34A" stroke-opacity="0.35"/>
  <text x="58" y="410" font-size="11" fill="#15803D" font-weight="600">DISCOUNT — vùng POI hợp lệ cho lệnh mua</text>
  <line x1="50" y1="256" x2="710" y2="256" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="640" y="270" font-size="10" fill="#6B7280">50% (EQ)</text>

  <!-- rising price path already extended -->
  <path d="M 70 390 L 130 360 L 190 340 L 250 300 L 310 260 L 370 210 L 430 165 L 480 135"
        fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <!-- reversal after entry -->
  <path d="M 480 135 L 520 170 L 560 220 L 600 275 L 650 320"
        fill="none" stroke="#B91C1C" stroke-width="2.2" stroke-dasharray="1 0"/>

  <!-- FOMO entry marker at top -->
  <circle cx="480" cy="135" r="7" fill="#DC2626"/>
  <polygon points="480,135 471,120 489,120" fill="#DC2626"/>
  <text x="430" y="112" font-size="11.5" font-weight="700" fill="#B91C1C">FOMO BUY tại đỉnh Premium</text>
  <text x="452" y="152" font-size="10" fill="#6B7280">(nến xanh lớn → nhảy vào)</text>

  <!-- SL -->
  <line x1="480" y1="150" x2="700" y2="150" stroke="#DC2626" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="560" y="145" font-size="10" fill="#B91C1C">SL nhỏ → dính ngay khi đảo chiều</text>

  <text x="120" y="440" font-size="11" fill="#4B5563">Đáng lẽ chờ pullback về Discount POI + MSS, thì lại mua đúng nơi SM đang thoát hàng.</text>
</svg>
