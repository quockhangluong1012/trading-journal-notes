<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Biểu hiện khi bias sai — nhận ra ngay trong phiên</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chuỗi hành vi lặp lại: đuổi giá trong premium, coi mọi phản ứng là "confirmation", đổi bias liên tục trong ngày.</text>

  <!-- chart schematic -->
  <rect x="24" y="70" width="440" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="92" font-size="12" font-weight="700" fill="#374151">Kịch bản điển hình: "long theo D1 xanh"</text>
  <line x1="46" y1="330" x2="440" y2="330" stroke="#9CA3AF" stroke-width="1"/>
  <line x1="46" y1="120" x2="440" y2="120" stroke="#D97706" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="360" y="115" font-size="9.5" fill="#B45309">BSL pool (đã yếu)</text>
  <!-- price grinding up into premium then judas swing rejection -->
  <rect x="60" y="290" width="14" height="34" fill="#16A34A" rx="1"/>
  <rect x="90" y="255" width="14" height="46" fill="#16A34A" rx="1"/>
  <rect x="120" y="215" width="14" height="52" fill="#16A34A" rx="1"/>
  <text x="60" y="212" font-size="9.5" fill="#4B5563">"tăng đẹp, chắc long"</text>
  <rect x="160" y="175" width="14" height="52" fill="#16A34A" rx="1"/>
  <rect x="200" y="150" width="14" height="40" fill="#16A34A" rx="1"/>
  <circle cx="207" cy="150" r="9" fill="none" stroke="#D97706" stroke-width="2"/>
  <text x="222" y="145" font-size="9.5" fill="#B45309">chạm BSL cũ — "vào thêm"</text>
  <!-- FOMO chase entries marked -->
  <circle cx="167" cy="185" r="4" fill="#DC2626"/>
  <circle cx="207" cy="160" r="4" fill="#DC2626"/>
  <text x="145" y="240" font-size="9" fill="#B91C1C">entry đuổi giá #1</text>
  <!-- reversal -->
  <rect x="240" y="170" width="14" height="70" fill="#DC2626" rx="1"/>
  <rect x="280" y="220" width="14" height="80" fill="#DC2626" rx="1"/>
  <circle cx="287" cy="222" r="4" fill="#DC2626"/>
  <text x="270" y="255" font-size="9" fill="#B91C1C">entry đuổi giá #2 (đổi bias)</text>
  <rect x="320" y="280" width="14" height="46" fill="#DC2626" rx="1"/>
  <rect x="360" y="300" width="14" height="26" fill="#DC2626" rx="1"/>
  <text x="330" y="345" font-size="10" font-weight="700" fill="#B91C1C">Kết quả: 2-3 lệnh thua liên tiếp, cùng phe sai</text>
  <text x="60" y="365" font-size="10" fill="#4B5563">Đặc trưng: entry sau khi giá ĐÃ chạy xa, không phải sau sweep + MSS sạch.</text>

  <!-- side checklist panel -->
  <rect x="480" y="70" width="256" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="494" y="92" font-size="12" font-weight="700" fill="#374151">Dấu hiệu nhận biết (tự hỏi)</text>
  <text x="494" y="116" font-size="10.5" fill="#4B5563">• Đang mua ở Premium / bán ở Discount?</text>
  <text x="494" y="138" font-size="10.5" fill="#4B5563">• "Confirmation" chỉ là 1 nến phản ứng nhỏ?</text>
  <text x="494" y="160" font-size="10.5" fill="#4B5563">• Không biết đích draw on liquidity là gì?</text>
  <text x="494" y="182" font-size="10.5" fill="#4B5563">• Đổi bias 2-3 lần trong 1 phiên?</text>
  <text x="494" y="204" font-size="10.5" fill="#4B5563">• Bỏ qua weekly profile / midnight open?</text>
  <text x="494" y="226" font-size="10.5" fill="#4B5563">• Vào lệnh vì "sợ bỏ lỡ" theo hướng D1?</text>
  <text x="494" y="248" font-size="10.5" fill="#4B5563">• SL bị quét nhiều lần cùng 1 hướng?</text>
  <rect x="494" y="266" width="228" height="1" fill="#E5E7EB"/>
  <text x="494" y="288" font-size="11" font-weight="700" fill="#B91C1C">Càng ≥3 dấu hiệu → dừng lại,</text>
  <text x="494" y="306" font-size="11" font-weight="700" fill="#B91C1C">map lại HTF trước khi vào thêm lệnh.</text>
  <text x="494" y="332" font-size="10" fill="#6B7280">Bias sai không tự sửa bằng cách</text>
  <text x="494" y="348" font-size="10" fill="#6B7280">"vào thêm để gỡ" — nó nhân đôi lỗi.</text>
</svg>
