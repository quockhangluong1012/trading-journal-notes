<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="1" y="1" width="758" height="478" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">❌ Sai: chase entry giữa sóng, SL rộng, TP vào ngay pool gần</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vào trễ sau displacement → stop phải đặt xa (volatility-based) → TP &lt;1.5R chạm resting pool rồi đảo</text>

  <rect x="24" y="70" width="712" height="388" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- external real target far away, unreached -->
  <line x1="120" y1="102" x2="712" y2="102" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <text x="480" y="96" font-size="11.5" fill="#6B7280">External liquidity thật — không bao giờ tới vì đã thoát/đảo sớm</text>

  <!-- resting pool very close to entry, acting as TP -->
  <rect x="470" y="196" width="90" height="46" rx="6" fill="#D97706" fill-opacity="0.16" stroke="#D97706" stroke-width="1.5"/>
  <text x="480" y="216" font-size="10.5" fill="#B45309" font-weight="600">Resting pool</text>
  <text x="480" y="230" font-size="10.5" fill="#B45309" font-weight="600">(TP đặt tại đây)</text>

  <!-- price path: sweep already happened, displacement already ran, chaser enters mid-move -->
  <path d="M 60 360 L 120 300 L 180 220 L 250 200 L 320 240 L 400 260 L 460 220 L 520 260 L 600 300 L 680 340"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <!-- displacement already happened before chase entry -->
  <text x="140" y="270" font-size="10.5" fill="#6B7280" font-style="italic">displacement đã chạy trước đó</text>

  <!-- chase entry marker mid-move -->
  <circle cx="320" cy="240" r="5" fill="#DC2626"/>
  <text x="298" y="228" font-size="10.5" fill="#B91C1C" font-weight="700">Chase entry</text>

  <!-- entry line -->
  <line x1="120" y1="240" x2="712" y2="240" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="640" y="235" font-size="11.5" fill="#1D4ED8" font-weight="600">Entry (trễ)</text>

  <!-- naive TP line into resting pool -->
  <line x1="320" y1="205" x2="560" y2="205" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="330" y="196" font-size="11.5" fill="#B91C1C" font-weight="600">TP &lt;1.5R — ngay trong resting pool</text>

  <!-- wide SL, volatility-based, not structural -->
  <line x1="120" y1="330" x2="712" y2="330" stroke="#DC2626" stroke-width="1.8"/>
  <text x="560" y="326" font-size="11.5" fill="#B91C1C" font-weight="600">SL rộng (volatility-based, không có cấu trúc gần)</text>

  <!-- risk bracket wide -->
  <line x1="95" y1="240" x2="95" y2="330" stroke="#DC2626" stroke-width="1.5"/>
  <polygon points="95,240 91,248 99,248" fill="#DC2626"/>
  <polygon points="95,330 91,322 99,322" fill="#DC2626"/>
  <text x="30" y="290" font-size="12" fill="#B91C1C" font-weight="700">Risk lớn</text>
  <text x="34" y="304" font-size="11" fill="#B91C1C">(≈1R nhưng</text>
  <text x="34" y="317" font-size="11" fill="#B91C1C">xa gấp đôi)</text>

  <!-- reward bracket small -->
  <line x1="600" y1="205" x2="600" y2="240" stroke="#B91C1C" stroke-width="1.5"/>
  <polygon points="600,205 596,213 604,213" fill="#B91C1C"/>
  <polygon points="600,240 596,232 604,232" fill="#B91C1C"/>
  <text x="608" y="228" font-size="11.5" fill="#B91C1C" font-weight="700">&lt;1.5R</text>

  <!-- reversal after pool -->
  <text x="600" y="322" font-size="10.5" fill="#4B5563" font-style="italic">giá đảo ngay sau khi ăn pool, dính SL trước khi hồi lại</text>

  <rect x="44" y="404" width="672" height="42" rx="6" fill="#DC2626" fill-opacity="0.08" stroke="#DC2626"/>
  <text x="56" y="422" font-size="12" fill="#991B1B" font-weight="600">Vào trễ buộc SL xa (volatility, không structural) trong khi TP bị nén vào pool gần nhất.</text>
  <text x="56" y="438" font-size="12" fill="#991B1B" font-weight="600">RR thực &lt;1.5R dù bias đúng hướng — pool đối ứng đảo giá trước khi tới liquidity thật.</text>
</svg>
