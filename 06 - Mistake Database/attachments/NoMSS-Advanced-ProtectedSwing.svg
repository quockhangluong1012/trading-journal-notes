<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Protected Swing vs Unprotected Swing</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chỉ break có displacement qua đúng protected swing (swing đang giữ hướng leg hiện tại) mới được tính là MSS.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- downtrend swing structure: HH area then lower highs/lows -->
  <path d="M56 130 C 90 150, 110 165, 140 180" fill="none" stroke="#374151" stroke-width="1.8"/>
  <!-- LH1 unprotected micro swing -->
  <path d="M140 180 C 158 190, 168 196, 176 200" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="176" cy="200" r="4" fill="#9CA3AF"/>
  <text x="150" y="192" font-size="9" fill="#6B7280">Unprotected LH (micro)</text>
  <path d="M176 200 C 190 214, 205 226, 220 236" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="220" cy="236" r="3.5" fill="#9CA3AF"/>

  <path d="M220 236 C 236 224, 248 216, 260 210" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="260" cy="210" r="4" fill="#9CA3AF"/>
  <text x="240" y="202" font-size="9" fill="#6B7280">Unprotected LH (micro)</text>
  <path d="M260 210 C 276 226, 292 244, 308 262" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="308" cy="262" r="3.5" fill="#9CA3AF"/>

  <!-- protected swing: the LH that guards the whole leg -->
  <path d="M308 262 C 326 244, 344 228, 364 218" fill="none" stroke="#1D4ED8" stroke-width="2.2"/>
  <circle cx="364" cy="218" r="6" fill="#3B82F6" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="330" y="200" font-size="10.5" font-weight="700" fill="#1D4ED8">PROTECTED SWING (last LH của downleg)</text>
  <line x1="364" y1="218" x2="700" y2="218" stroke="#1D4ED8" stroke-width="1.4" stroke-dasharray="6 4"/>

  <path d="M364 218 C 384 236, 404 258, 424 284" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="424" cy="284" r="3.5" fill="#9CA3AF"/>
  <text x="400" y="300" font-size="9" fill="#6B7280">Sweep SSL</text>

  <!-- displacement candles closing through the protected swing -->
  <line x1="452" y1="150" x2="452" y2="280" stroke="#15803D" stroke-width="1.4"/>
  <rect x="444" y="170" width="16" height="95" fill="#16A34A" stroke="#15803D"/>
  <text x="380" y="140" font-size="10" font-weight="700" fill="#15803D">Displacement — đóng nến qua khỏi protected swing = MSS hợp lệ</text>

  <rect x="460" y="190" width="26" height="26" fill="#3B82F6" opacity="0.22" stroke="#1D4ED8"/>
  <text x="490" y="206" font-size="9" fill="#1D4ED8">FVG</text>

  <polygon points="452,148 445,160 459,160" fill="#16A34A"/>

  <!-- compare: hypothetical break of unprotected swing only -->
  <path d="M424 284 C 440 292, 455 296, 470 298" fill="none" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="426" y="316" font-size="9" fill="#B91C1C">Nếu chỉ phá vỡ unprotected LH (micro) — vẫn là noise, KHÔNG phải MSS</text>

  <!-- legend box -->
  <rect x="48" y="356" width="664" height="56" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <circle cx="70" cy="376" r="5" fill="#9CA3AF"/>
  <text x="82" y="380" font-size="9.5" fill="#4B5563">Unprotected swing — micro high/low nội bộ, phá vỡ chỉ là nhiễu giá</text>
  <circle cx="70" cy="398" r="5" fill="#3B82F6" stroke="#1D4ED8"/>
  <text x="82" y="402" font-size="9.5" fill="#1D4ED8">Protected swing — swing đang giữ hướng leg hiện tại; phá vỡ có displacement = MSS</text>
</svg>
