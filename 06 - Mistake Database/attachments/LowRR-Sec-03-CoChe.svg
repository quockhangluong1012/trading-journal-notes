<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="1" y="1" width="758" height="458" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Win rate hòa vốn (breakeven) theo RR</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Expectancy = (WR × avgWin) − (LR × avgLoss). RR càng thấp, breakeven WR càng cao.</text>

  <rect x="24" y="70" width="712" height="368" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- typical discretionary WR band -->
  <rect x="80" y="126" width="620" height="81" fill="#3B82F6" fill-opacity="0.08"/>
  <line x1="80" y1="126" x2="700" y2="126" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="6 4"/>
  <line x1="80" y1="207" x2="700" y2="207" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="565" y="120" font-size="11.5" fill="#1D4ED8" font-weight="600">Vùng win rate ICT discretionary điển hình (40–55%)</text>

  <!-- axis baseline -->
  <line x1="80" y1="380" x2="700" y2="380" stroke="#9CA3AF" stroke-width="1.2"/>
  <text x="46" y="130" font-size="11" fill="#6B7280">50%</text>
  <text x="46" y="228" font-size="11" fill="#6B7280">30%</text>
  <text x="46" y="332" font-size="11" fill="#6B7280">10%</text>
  <text x="52" y="384" font-size="11" fill="#6B7280">0%</text>

  <!-- bars: value*5.2 height, baseline 380 -->
  <!-- 1:1 -> 50% h=260 red -->
  <rect x="100" y="120" width="70" height="260" rx="4" fill="#DC2626" fill-opacity="0.75"/>
  <text x="120" y="112" font-size="13" fill="#B91C1C" font-weight="700">50%</text>
  <text x="112" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 1</text>

  <!-- 1:1.5 -> 40% h=208 amber -->
  <rect x="200" y="172" width="70" height="208" rx="4" fill="#D97706" fill-opacity="0.75"/>
  <text x="220" y="164" font-size="13" fill="#B45309" font-weight="700">40%</text>
  <text x="203" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 1.5</text>

  <!-- 1:2 -> 33% h=172 green -->
  <rect x="300" y="208" width="70" height="172" rx="4" fill="#16A34A" fill-opacity="0.75"/>
  <text x="320" y="200" font-size="13" fill="#15803D" font-weight="700">33%</text>
  <text x="317" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 2</text>

  <!-- 1:3 -> 25% h=130 green darker -->
  <rect x="400" y="250" width="70" height="130" rx="4" fill="#15803D" fill-opacity="0.8"/>
  <text x="420" y="242" font-size="13" fill="#15803D" font-weight="700">25%</text>
  <text x="417" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 3</text>

  <!-- 1:4 -> 20% h=104 -->
  <rect x="500" y="276" width="70" height="104" rx="4" fill="#15803D" fill-opacity="0.85"/>
  <text x="520" y="268" font-size="13" fill="#15803D" font-weight="700">20%</text>
  <text x="517" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 4</text>

  <!-- 1:5 -> 17% h=88 -->
  <rect x="600" y="292" width="70" height="88" rx="4" fill="#15803D" fill-opacity="0.9"/>
  <text x="620" y="284" font-size="13" fill="#15803D" font-weight="700">17%</text>
  <text x="617" y="400" font-size="12.5" fill="#374151" font-weight="600">1 : 5</text>

  <text x="24" y="452" font-size="11.5" fill="#6B7280">RR (đơn vị R) →   Cột màu = win rate tối thiểu để hòa vốn (chưa tính spread/slippage/phí)</text>
</svg>
