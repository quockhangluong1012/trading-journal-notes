<svg viewBox="0 0 760 522" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="522" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Biểu hiện &amp; Dấu hiệu nhận biết</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Tells hành vi — càng nhiều dấu Đỏ xuất hiện cùng lúc, càng cần dừng lại ngay</text>

  <rect x="24" y="72" width="712" height="434" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <text x="44" y="92" font-size="11" font-weight="700" fill="#6B7280">DẤU HIỆU</text>
  <text x="672" y="92" font-size="11" font-weight="700" fill="#6B7280" text-anchor="end">MỨC ĐỘ</text>

  <rect x="44" y="100" width="628" height="28" rx="4" fill="#DC2626" fill-opacity="0.06"/>
  <circle cx="58" cy="114" r="5" fill="#DC2626"/>
  <text x="72" y="118" font-size="11" fill="#374151">Vào lệnh trong vài phút sau khi bị stop out</text>
  <text x="628" y="118" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="end">Đỏ</text>
  <rect x="44" y="134" width="628" height="28" rx="4" fill="#DC2626" fill-opacity="0.06"/>
  <circle cx="58" cy="148" r="5" fill="#DC2626"/>
  <text x="72" y="152" font-size="11" fill="#374151">Size lệnh tiếp theo lớn hơn kế hoạch ban đầu</text>
  <text x="628" y="152" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="end">Đỏ</text>
  <rect x="44" y="168" width="628" height="28" rx="4" fill="#DC2626" fill-opacity="0.06"/>
  <circle cx="58" cy="182" r="5" fill="#DC2626"/>
  <text x="72" y="186" font-size="11" fill="#374151">Bỏ qua checklist — không chờ bias, POI, sweep, MSS</text>
  <text x="628" y="186" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="end">Đỏ</text>
  <rect x="44" y="202" width="628" height="28" rx="4" fill="#D97706" fill-opacity="0.06"/>
  <circle cx="58" cy="216" r="5" fill="#D97706"/>
  <text x="72" y="220" font-size="11" fill="#374151">Không chụp ảnh chart, không ghi lý do entry</text>
  <text x="628" y="220" font-size="11" font-weight="700" fill="#B45309" text-anchor="end">Amber</text>
  <rect x="44" y="236" width="628" height="28" rx="4" fill="#DC2626" fill-opacity="0.06"/>
  <circle cx="58" cy="250" r="5" fill="#DC2626"/>
  <text x="72" y="254" font-size="11" fill="#374151">Tự nhủ: "phải lấy lại hôm nay", "thị trường nợ tôi"</text>
  <text x="628" y="254" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="end">Đỏ</text>
  <rect x="44" y="270" width="628" height="28" rx="4" fill="#D97706" fill-opacity="0.06"/>
  <circle cx="58" cy="284" r="5" fill="#D97706"/>
  <text x="72" y="288" font-size="11" fill="#374151">Vào lệnh ngoài khung giờ Kill Zone đã định trước</text>
  <text x="628" y="288" font-size="11" font-weight="700" fill="#B45309" text-anchor="end">Amber</text>
  <rect x="44" y="304" width="628" height="28" rx="4" fill="#DC2626" fill-opacity="0.06"/>
  <circle cx="58" cy="318" r="5" fill="#DC2626"/>
  <text x="72" y="322" font-size="11" fill="#374151">Nhiều lệnh liên tiếp cùng hướng, cùng symbol sau khi bị quét</text>
  <text x="628" y="322" font-size="11" font-weight="700" fill="#B91C1C" text-anchor="end">Đỏ</text>
  <rect x="44" y="338" width="628" height="28" rx="4" fill="#D97706" fill-opacity="0.06"/>
  <circle cx="58" cy="352" r="5" fill="#D97706"/>
  <text x="72" y="356" font-size="11" fill="#374151">Nhịp tim tăng, tay run, thở gấp khi đặt lệnh (dấu hiệu sinh lý)</text>
  <text x="628" y="356" font-size="11" font-weight="700" fill="#B45309" text-anchor="end">Amber</text>

  <rect x="44" y="386" width="628" height="98" rx="6" fill="#374151" fill-opacity="0.05" stroke="#4B5563" stroke-opacity="0.3"/>
  <text x="60" y="406" font-size="12" font-weight="700" fill="#374151">Checklist tự soát trước khi bấm lệnh tiếp theo:</text>
  <rect x="60" y="416" width="12" height="12" rx="2" fill="none" stroke="#4B5563"/>
  <text x="80" y="426" font-size="10.5" fill="#374151">Lệnh này có cách lệnh thua gần nhất ít nhất X phút (theo circuit breaker) không?</text>
  <rect x="60" y="434" width="12" height="12" rx="2" fill="none" stroke="#4B5563"/>
  <text x="80" y="444" font-size="10.5" fill="#374151">Size lệnh này có đúng bằng % risk kế hoạch, không lớn hơn không?</text>
  <rect x="60" y="452" width="12" height="12" rx="2" fill="none" stroke="#4B5563"/>
  <text x="80" y="462" font-size="10.5" fill="#374151">Tôi có đủ bias + POI + sweep + MSS, hay đang vào vì cảm xúc?</text>
  <rect x="60" y="470" width="12" height="12" rx="2" fill="none" stroke="#4B5563"/>
  <text x="80" y="480" font-size="10.5" fill="#374151">Tôi có đang tự nhủ "phải lấy lại" thay vì đọc setup một cách khách quan?</text>
</svg>
