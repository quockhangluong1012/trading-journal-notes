<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="1" y="1" width="758" height="458" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Dấu hiệu nhận biết RR không đủ</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Tự kiểm trước khi bấm lệnh — mỗi dấu Đỏ là một lý do để không vào</text>

  <!-- table header -->
  <rect x="24" y="72" width="712" height="34" rx="6" fill="#374151"/>
  <text x="40" y="94" font-size="12.5" fill="#F9FAFB" font-weight="700">Dấu hiệu</text>
  <text x="600" y="94" font-size="12.5" fill="#F9FAFB" font-weight="700">Mức cảnh báo</text>

  <!-- rows -->
  <!-- row template height 42, start y=106 -->
  <g font-size="12.5" fill="#374151">
    <rect x="24" y="106" width="712" height="42" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="40" y="132">TP đặt theo số pip cố định, không tại một mức liquidity cụ thể</text>
    <rect x="590" y="114" width="60" height="26" rx="5" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626"/>
    <text x="602" y="131" fill="#B91C1C" font-weight="700">Đỏ</text>

    <rect x="24" y="148" width="712" height="42" fill="#FBFBFD" stroke="#E5E7EB"/>
    <text x="40" y="174">Không thể gọi tên pool thanh khoản mà TP đang nhắm tới</text>
    <rect x="590" y="156" width="60" height="26" rx="5" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626"/>
    <text x="602" y="173" fill="#B91C1C" font-weight="700">Đỏ</text>

    <rect x="24" y="190" width="712" height="42" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="40" y="216">RR kế hoạch &lt; 1:2 tới liquidity thật gần nhất</text>
    <rect x="590" y="198" width="60" height="26" rx="5" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626"/>
    <text x="602" y="215" fill="#B91C1C" font-weight="700">Đỏ</text>

    <rect x="24" y="232" width="712" height="42" fill="#FBFBFD" stroke="#E5E7EB"/>
    <text x="40" y="258">Có pool đối ứng / FVG chưa lấp nằm giữa entry và TP</text>
    <rect x="590" y="240" width="60" height="26" rx="5" fill="#DC2626" fill-opacity="0.15" stroke="#DC2626"/>
    <text x="602" y="257" fill="#B91C1C" font-weight="700">Đỏ</text>

    <rect x="24" y="274" width="712" height="42" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="40" y="300">"Chắc sẽ chạm TP" — không đo khoảng cách thật bằng số</text>
    <rect x="590" y="282" width="70" height="26" rx="5" fill="#D97706" fill-opacity="0.16" stroke="#D97706"/>
    <text x="600" y="299" fill="#B45309" font-weight="700">Amber</text>

    <rect x="24" y="316" width="712" height="42" fill="#FBFBFD" stroke="#E5E7EB"/>
    <text x="40" y="342">Dời TP lại gần hơn vì sợ giá quay đầu (chốt non)</text>
    <rect x="590" y="324" width="70" height="26" rx="5" fill="#D97706" fill-opacity="0.16" stroke="#D97706"/>
    <text x="600" y="341" fill="#B45309" font-weight="700">Amber</text>

    <rect x="24" y="358" width="712" height="42" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="40" y="384">SL đặt theo số tròn / thói quen, không theo cấu trúc (sweep/OB)</text>
    <rect x="590" y="366" width="70" height="26" rx="5" fill="#D97706" fill-opacity="0.16" stroke="#D97706"/>
    <text x="600" y="383" fill="#B45309" font-weight="700">Amber</text>
  </g>

  <rect x="24" y="404" width="712" height="34" rx="6" fill="#16A34A" fill-opacity="0.08" stroke="#16A34A"/>
  <text x="40" y="426" font-size="12.5" fill="#15803D" font-weight="600">≥2 dấu Đỏ → dừng lại, đo lại RR tới liquidity thật trước khi cân nhắc vào lệnh.</text>
</svg>
