<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế: người FOMO là thanh khoản thoát hàng của SM</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Retail mua muộn ở Premium = đối ứng cho lệnh bán chốt lời của smart money.</text>

  <rect x="24" y="74" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- BSL target already taken -->
  <line x1="60" y1="120" x2="700" y2="120" stroke="#B91C1C" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="64" y="114" font-size="11" fill="#B91C1C" font-weight="600">BSL / ERL — draw on liquidity (đã bị quét)</text>

  <!-- price rally into BSL then reverse -->
  <path d="M 70 340 L 140 300 L 210 265 L 290 215 L 360 165 L 430 130 L 470 118"
        fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <path d="M 470 118 L 520 160 L 580 220 L 640 285 L 690 330"
        fill="none" stroke="#B91C1C" stroke-width="2.2"/>

  <!-- SM sell zone -->
  <rect x="430" y="110" width="90" height="40" fill="#DC2626" fill-opacity="0.14" stroke="#B91C1C"/>
  <text x="415" y="104" font-size="10.5" fill="#B91C1C" font-weight="600">SM phân phối (bán ra)</text>

  <!-- FOMO buy arrows feeding the top -->
  <g fill="#D97706">
    <polygon points="455,175 449,192 461,192"/>
    <polygon points="478,180 472,197 484,197"/>
    <polygon points="500,185 494,202 506,202"/>
  </g>
  <text x="440" y="225" font-size="10.5" fill="#B45309" font-weight="600">Lệnh MUA FOMO đổ vào</text>
  <text x="452" y="240" font-size="9.5" fill="#B45309">= đối ứng cho SM bán</text>

  <text x="150" y="360" font-size="10.5" fill="#4B5563">Sóng tăng đã hoàn tất mục tiêu thanh khoản → không còn "nhiên liệu" để đi tiếp.</text>

  <!-- bottom takeaway -->
  <rect x="24" y="386" width="712" height="42" rx="6" fill="#FEF2F2" stroke="#DC2626" stroke-opacity="0.4"/>
  <text x="38" y="404" font-size="11.5" fill="#991B1B" font-weight="600">EV âm: entry FOMO sai cả 3 — sai vị trí (Premium), sai thời điểm (draw đã cạn), sai SL (quá rộng).</text>
  <text x="38" y="420" font-size="10.5" fill="#7F1D1D">Bạn không sai hướng dài hạn — bạn mua đúng lúc đối thủ có kinh nghiệm đang bán cho bạn.</text>
</svg>
