<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — Wick Rejection tại POI, Không Displacement, Không MSS</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Entry ngay vì "đã sweep" — giá tiếp tục hướng cũ, quét SL, MSS thật chỉ xảy ra sau đó ở vùng sâu hơn.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#DC2626"/>

  <line x1="60" y1="190" x2="700" y2="190" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="185" font-size="9.5" fill="#4B5563">Protected swing (last LH)</text>

  <rect x="70" y="240" width="140" height="40" fill="#3B82F6" opacity="0.14" stroke="#1D4ED8"/>
  <text x="74" y="236" font-size="9.5" fill="#1D4ED8">POI: Bullish OB (H1)</text>

  <!-- downtrend candles -->
  <g stroke="#B91C1C" stroke-width="1.3">
    <line x1="96" y1="110" x2="96" y2="138"/><rect x="90" y="116" width="12" height="16" fill="#DC2626"/>
    <line x1="124" y1="126" x2="124" y2="154"/><rect x="118" y="132" width="12" height="16" fill="#DC2626"/>
    <line x1="152" y1="144" x2="152" y2="174"/><rect x="146" y="150" width="12" height="18" fill="#DC2626"/>
    <line x1="180" y1="164" x2="180" y2="196"/><rect x="174" y="170" width="12" height="18" fill="#DC2626"/>
    <line x1="208" y1="186" x2="208" y2="220"/><rect x="202" y="192" width="12" height="20" fill="#DC2626"/>
  </g>

  <!-- sweep candle into POI -->
  <line x1="236" y1="210" x2="236" y2="270" stroke="#B91C1C" stroke-width="1.3"/>
  <rect x="230" y="240" width="12" height="14" fill="#DC2626" stroke="#B91C1C"/>
  <circle cx="236" cy="267" r="4" fill="#D97706"/>
  <text x="192" y="298" font-size="10" fill="#B45309">① Sweep SSL tại POI</text>

  <!-- rejection candle: wick approaches but no close through, no displacement -->
  <line x1="264" y1="185" x2="264" y2="248" stroke="#15803D" stroke-width="1.3"/>
  <rect x="257" y="215" width="14" height="24" fill="#16A34A" stroke="#15803D"/>
  <polygon points="264,183 257,196 271,196" fill="#D97706"/>
  <text x="216" y="168" font-size="10" font-weight="700" fill="#B45309">② Wick rejection — KHÔNG đóng nến qua protected swing, không FVG</text>

  <circle cx="264" cy="212" r="4.5" fill="#1D4ED8"/>
  <text x="278" y="216" font-size="10" font-weight="700" fill="#1D4ED8">③ Entry ngay — chỉ vì "đã sweep xong"</text>

  <!-- SL -->
  <line x1="220" y1="270" x2="420" y2="270" stroke="#DC2626" stroke-dasharray="4 4" stroke-width="1.2"/>
  <text x="300" y="284" font-size="9.5" fill="#B91C1C">SL đặt cảm tính dưới wick sweep</text>

  <!-- continuation down, stop out -->
  <path d="M264 239 C 290 260, 330 285, 380 300 C 420 312, 460 318, 500 322" fill="none" stroke="#DC2626" stroke-width="2.2" stroke-dasharray="6 4"/>
  <polygon points="500,322 489,320 494,332" fill="#DC2626"/>
  <text x="330" y="342" font-size="10" font-weight="700" fill="#B91C1C">④ Giá tiếp tục hướng cũ — quét SL của entry sớm</text>

  <!-- deeper POI and real MSS -->
  <rect x="540" y="330" width="150" height="40" fill="#3B82F6" opacity="0.14" stroke="#1D4ED8"/>
  <text x="544" y="326" font-size="9.5" fill="#1D4ED8">POI thật — sâu hơn</text>
  <line x1="600" y1="290" x2="660" y2="290" stroke="#6B7280" stroke-dasharray="6 4" stroke-width="1.2"/>
  <text x="600" y="285" font-size="8.5" fill="#4B5563">Protected swing thật</text>

  <path d="M500 322 C 520 335, 545 345, 560 352" fill="none" stroke="#374151" stroke-width="1.6"/>
  <line x1="560" y1="345" x2="560" y2="360" stroke="#B91C1C" stroke-width="1.2"/>
  <rect x="554" y="345" width="12" height="10" fill="#DC2626" stroke="#B91C1C"/>

  <line x1="590" y1="270" x2="590" y2="358" stroke="#15803D" stroke-width="1.4"/>
  <rect x="583" y="278" width="14" height="70" fill="#16A34A" stroke="#15803D"/>
  <rect x="600" y="255" width="26" height="22" fill="#3B82F6" opacity="0.22" stroke="#1D4ED8"/>
  <text x="604" y="250" font-size="8" fill="#1D4ED8">FVG</text>
  <text x="536" y="390" font-size="10" font-weight="700" fill="#15803D">⑤ MSS thật chỉ xảy ra ở đây</text>

  <text x="36" y="416" font-size="10.5" fill="#4B5563">Wick chạm đúng POI không phải là MSS. Bias đúng bị phá hỏng bởi việc entry sai thời điểm —</text>
  <text x="36" y="432" font-size="10.5" fill="#4B5563">kiên nhẫn chờ displacement qua protected swing mới là điều kiện đủ để entry.</text>
</svg>
