<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Nâng cao: Liquidity Reflexivity &amp; giải phẫu vòng lặp FOMO</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">FOMO không ngẫu nhiên — nó được thiết kế. Càng "hiển nhiên phải mua", càng gần đỉnh.</text>

  <!-- cycle boxes -->
  <g font-size="11">
    <rect x="30" y="86" width="160" height="70" rx="8" fill="#EFF6FF" stroke="#1D4ED8"/>
    <text x="42" y="110" font-size="11.5" font-weight="700" fill="#1D4ED8">1. Displacement</text>
    <text x="42" y="128" fill="#4B5563">Giá bứt phá mạnh,</text>
    <text x="42" y="144" fill="#4B5563">tin tức + chú ý tăng</text>

    <rect x="300" y="86" width="160" height="70" rx="8" fill="#FEF3C7" stroke="#D97706"/>
    <text x="312" y="110" font-size="11.5" font-weight="700" fill="#B45309">2. Đám đông thấy</text>
    <text x="312" y="128" fill="#4B5563">"Rõ ràng phải lên"</text>
    <text x="312" y="144" fill="#4B5563">→ mua muộn hàng loạt</text>

    <rect x="570" y="86" width="160" height="70" rx="8" fill="#FEE2E2" stroke="#DC2626"/>
    <text x="582" y="110" font-size="11.5" font-weight="700" fill="#B91C1C">3. SM phân phối</text>
    <text x="582" y="128" fill="#4B5563">Bán vào chính lệnh</text>
    <text x="582" y="144" fill="#4B5563">mua của đám đông</text>
  </g>
  <path d="M190 121 L296 121" stroke="#6B7280" stroke-width="1.6" marker-end="url(#aR)"/>
  <path d="M460 121 L566 121" stroke="#6B7280" stroke-width="1.6" marker-end="url(#aR)"/>
  <path d="M650 156 C 650 210, 400 210, 340 176" fill="none" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#aR)"/>
  <text x="360" y="205" font-size="10" fill="#6B7280">4. Đảo chiều → FOMO buyers thành thanh khoản thoát, vòng lặp lặp lại</text>

  <!-- premium/discount map -->
  <rect x="30" y="240" width="700" height="196" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="46" y="256" width="668" height="70" fill="#DC2626" fill-opacity="0.06"/>
  <rect x="46" y="326" width="668" height="94" fill="#16A34A" fill-opacity="0.06"/>
  <line x1="46" y1="326" x2="714" y2="326" stroke="#9CA3AF" stroke-dasharray="6 4"/>
  <text x="54" y="274" font-size="11" fill="#B91C1C" font-weight="600">PREMIUM — nơi FOMO buy xảy ra nhiều nhất (SAI cho lệnh mua)</text>
  <text x="54" y="412" font-size="11" fill="#15803D" font-weight="600">DISCOUNT — nơi entry mua có xác suất/RR tốt (ít "hấp dẫn" về cảm xúc)</text>

  <!-- inverse relationship note -->
  <path d="M 60 400 C 220 300, 420 270, 690 262" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="360" y="360" font-size="10.5" fill="#4B5563">Sức hấp dẫn cảm xúc (FOMO) ↑ khi giá càng cao → tỷ lệ nghịch với edge thực tế.</text>
  <text x="180" y="392" font-size="9.5" fill="#15803D">edge cao, FOMO thấp</text>
  <text x="560" y="278" font-size="9.5" fill="#B91C1C">edge thấp, FOMO cao</text>

  <defs>
    <marker id="aR" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6B7280"/>
    </marker>
  </defs>
</svg>
