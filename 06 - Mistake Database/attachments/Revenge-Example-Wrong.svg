<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai: tái vào lệnh oversized ngay lập tức</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Không cooldown, không circuit breaker → spiral trong dưới 1 giờ</text>

  <rect x="24" y="72" width="712" height="432" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- 5-step wrong sequence -->
  <rect x="40" y="90" width="680" height="150" rx="6" fill="#DC2626" fill-opacity="0.06" stroke="#DC2626"/>
  <text x="56" y="110" font-size="12" font-weight="700" fill="#B91C1C">Chuỗi phản ứng cảm xúc (không có cooldown)</text>
  <text x="56" y="130" font-size="11" fill="#374151">1. Lệnh thua đầu tiên → không dừng, không cooldown, mở lại chart ngay</text>
  <text x="56" y="148" font-size="11" fill="#374151">2. Vào lại trong vài phút, size gấp đôi/gấp ba kế hoạch ban đầu</text>
  <text x="56" y="166" font-size="11" fill="#374151">3. Không chờ bias/POI/sweep/MSS — vào theo cảm xúc "phải lấy lại"</text>
  <text x="56" y="184" font-size="11" fill="#374151">4. Thua tiếp, thất vọng tăng, mở lệnh thứ 3 với size còn lớn hơn</text>
  <text x="56" y="202" font-size="11" fill="#374151">5. Chuỗi lệnh liên tiếp chạm/breach giới hạn lỗ ngày → nguy cơ mất challenge</text>
  <text x="56" y="224" font-size="10.5" font-style="italic" fill="#B91C1C">Kết quả: -0.5% ban đầu trở thành -3% đến -5% chỉ trong một buổi chiều.</text>

  <!-- equity curve -->
  <text x="40" y="264" font-size="13" font-weight="700" fill="#1F2937">Equity curve: revenge cluster xuyên thủng giới hạn lỗ ngày</text>

  <line x1="60" y1="400" x2="700" y2="400" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="66" y="392" font-size="10.5" fill="#B91C1C" font-weight="600">Giới hạn lỗ ngày (vd -1%)</text>

  <path d="M 70 300 L 150 320 L 230 316 L 300 360 L 340 355 L 420 420 L 460 410 L 540 470 L 600 460 L 680 490"
        fill="none" stroke="#DC2626" stroke-width="2.2"/>

  <circle cx="230" cy="316" r="5" fill="#D97706"/>
  <text x="150" y="336" font-size="10" fill="#B45309" font-weight="600">Lệnh thua 1 (-0.5%, đúng kế hoạch)</text>

  <circle cx="420" cy="420" r="5" fill="#DC2626"/>
  <text x="330" y="440" font-size="10" fill="#B91C1C" font-weight="600">Lệnh revenge 2 (size x2) — xuyên giới hạn</text>

  <circle cx="600" cy="460" r="5" fill="#B91C1C"/>
  <text x="470" y="500" font-size="10.5" fill="#B91C1C" font-weight="700">Lệnh revenge 3 (size x3) — breach nặng, spiral</text>
</svg>
