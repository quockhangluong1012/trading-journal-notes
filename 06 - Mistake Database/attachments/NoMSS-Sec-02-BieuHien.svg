<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Biểu hiện &amp; Dấu hiệu nhận biết</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">4 tell cảnh báo khi coi một cú sweep/break là MSS mà chưa đủ điều kiện.</text>

  <!-- mini candle illustration: wick vs close-through -->
  <rect x="24" y="70" width="230" height="150" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="90" font-size="11" font-weight="700" fill="#374151">Wick xuyên vs Đóng nến qua khỏi</text>
  <line x1="46" y1="150" x2="230" y2="150" stroke="#6B7280" stroke-dasharray="6 4" stroke-width="1.2"/>
  <text x="46" y="145" font-size="8.5" fill="#4B5563">Protected swing</text>

  <line x1="80" y1="120" x2="80" y2="175" stroke="#B91C1C" stroke-width="1.2"/>
  <rect x="75" y="152" width="10" height="16" fill="#DC2626" stroke="#B91C1C"/>
  <text x="60" y="192" font-size="8.5" fill="#B91C1C">Wick chạm — không MSS</text>

  <line x1="150" y1="112" x2="150" y2="168" stroke="#15803D" stroke-width="1.2"/>
  <rect x="145" y="118" width="10" height="42" fill="#16A34A" stroke="#15803D"/>
  <text x="126" y="192" font-size="8.5" fill="#15803D">Đóng nến qua khỏi — MSS</text>
  <polygon points="150,116 144,128 156,128" fill="#16A34A"/>

  <!-- FVG check mini -->
  <rect x="284" y="70" width="452" height="150" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="296" y="90" font-size="11" font-weight="700" fill="#374151">4 tiêu chí bắt buộc để gọi là MSS</text>
  <g font-size="10" fill="#374151">
    <circle cx="304" cy="112" r="6" fill="#16A34A"/><text x="298" y="116" font-size="8" fill="#fff">1</text>
    <text x="318" y="116">Đóng nến (close) qua đúng protected swing — không chỉ wick</text>
    <circle cx="304" cy="138" r="6" fill="#16A34A"/><text x="298" y="142" font-size="8" fill="#fff">2</text>
    <text x="318" y="142">Displacement thật: thân lớn, dứt khoát, nổi bật so với các nến trước</text>
    <circle cx="304" cy="164" r="6" fill="#16A34A"/><text x="298" y="168" font-size="8" fill="#fff">3</text>
    <text x="318" y="168">Có FVG (hoặc origin OB rõ ràng) hình thành ngay sau break</text>
    <circle cx="304" cy="190" r="6" fill="#16A34A"/><text x="298" y="194" font-size="8" fill="#fff">4</text>
    <text x="318" y="194">Swing bị phá là protected swing của leg hiện tại — không phải micro-swing</text>
  </g>

  <!-- comparison table -->
  <rect x="24" y="232" width="712" height="210" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="252" font-size="11" font-weight="700" fill="#374151">Dấu hiệu lỗi vs Dấu hiệu an toàn</text>

  <line x1="36" y1="262" x2="724" y2="262" stroke="#E5E7EB"/>
  <text x="36" y="278" font-size="9.5" font-weight="700" fill="#6B7280">Câu hỏi</text>
  <text x="330" y="278" font-size="9.5" font-weight="700" fill="#B91C1C">Dấu hiệu lỗi</text>
  <text x="540" y="278" font-size="9.5" font-weight="700" fill="#15803D">Dấu hiệu an toàn</text>

  <g font-size="9.3" fill="#374151">
    <text x="36" y="302">Đã có nến đóng cửa qua swing đối diện chưa?</text>
    <text x="330" y="302" fill="#B91C1C">Chưa — chỉ wick chạm rồi rút</text>
    <text x="540" y="302" fill="#15803D">Có — close rõ ràng bên kia swing</text>

    <text x="36" y="326">Nến phá vỡ có phải displacement không?</text>
    <text x="330" y="326" fill="#B91C1C">Thân nhỏ, giằng co, chậm</text>
    <text x="540" y="326" fill="#15803D">Thân lớn, dứt khoát, nhanh</text>

    <text x="36" y="350">Có FVG hình thành sau break không?</text>
    <text x="330" y="350" fill="#B91C1C">Không có FVG nào</text>
    <text x="540" y="350" fill="#15803D">Có FVG rõ ràng ngay sau</text>

    <text x="36" y="374">Swing bị phá là swing gì?</text>
    <text x="330" y="374" fill="#B91C1C">Micro-swing 1-3 nến trước</text>
    <text x="540" y="374" fill="#15803D">Protected swing của leg hiện tại</text>

    <text x="36" y="398">Lý do entry chính là gì?</text>
    <text x="330" y="398" fill="#B91C1C">"Đã sweep xong rồi" — chỉ vậy</text>
    <text x="540" y="398" fill="#15803D">Sweep + MSS đã xác nhận đầy đủ</text>

    <text x="36" y="422">Nhìn lại 5 nến sau, cấu trúc thế nào?</text>
    <text x="330" y="422" fill="#B91C1C">Quay lại pullback/tiếp diễn cũ</text>
    <text x="540" y="422" fill="#15803D">Cấu trúc mới được xác nhận, continuation</text>
  </g>
</svg>
