<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ đúng — Sweep → Displacement qua Protected Swing → FVG → Entry</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chờ MSS hoàn tất trước khi entry, không entry ngay khi vừa thấy sweep.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#16A34A"/>

  <line x1="60" y1="230" x2="700" y2="230" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="225" font-size="9.5" fill="#4B5563">Protected swing (last LH của downleg)</text>

  <rect x="70" y="330" width="140" height="46" fill="#3B82F6" opacity="0.14" stroke="#1D4ED8"/>
  <text x="74" y="326" font-size="9.5" fill="#1D4ED8">POI: Bullish OB/FVG (H1) — Discount</text>

  <!-- downtrend candles -->
  <g stroke="#B91C1C" stroke-width="1.3">
    <line x1="96" y1="140" x2="96" y2="168"/><rect x="90" y="146" width="12" height="16" fill="#DC2626"/>
    <line x1="124" y1="156" x2="124" y2="184"/><rect x="118" y="162" width="12" height="16" fill="#DC2626"/>
    <line x1="152" y1="174" x2="152" y2="204"/><rect x="146" y="180" width="12" height="18" fill="#DC2626"/>
    <line x1="180" y1="194" x2="180" y2="226"/><rect x="174" y="200" width="12" height="18" fill="#DC2626"/>
    <line x1="208" y1="216" x2="208" y2="250"/><rect x="202" y="222" width="12" height="20" fill="#DC2626"/>
    <line x1="236" y1="238" x2="236" y2="274"/><rect x="230" y="244" width="12" height="20" fill="#DC2626"/>
  </g>

  <!-- sweep candle wick into POI -->
  <line x1="264" y1="260" x2="264" y2="360" stroke="#B91C1C" stroke-width="1.3"/>
  <rect x="258" y="300" width="12" height="14" fill="#DC2626" stroke="#B91C1C"/>
  <circle cx="264" cy="356" r="4" fill="#D97706"/>
  <text x="220" y="392" font-size="10" fill="#B45309">① Sweep SSL cục bộ tại POI H1</text>

  <!-- displacement candle 1 -->
  <line x1="296" y1="180" x2="296" y2="320" stroke="#15803D" stroke-width="1.4"/>
  <rect x="288" y="195" width="16" height="115" fill="#16A34A" stroke="#15803D"/>
  <text x="256" y="168" font-size="10" font-weight="700" fill="#15803D">② Displacement — đóng nến qua protected swing</text>

  <!-- displacement candle 2 -->
  <line x1="330" y1="120" x2="330" y2="205" stroke="#15803D" stroke-width="1.4"/>
  <rect x="322" y="128" width="16" height="62" fill="#16A34A" stroke="#15803D"/>

  <!-- FVG between candle1 high area and candle2 -->
  <rect x="300" y="150" width="30" height="34" fill="#3B82F6" opacity="0.22" stroke="#1D4ED8"/>
  <text x="334" y="170" font-size="10" fill="#1D4ED8">③ FVG hình thành</text>

  <!-- retracement / entry candle -->
  <line x1="368" y1="150" x2="368" y2="200" stroke="#15803D" stroke-width="1.3"/>
  <rect x="361" y="158" width="14" height="30" fill="#16A34A" stroke="#15803D"/>
  <path d="M368 205 L368 184" stroke="#1D4ED8" stroke-width="1.6" marker-end="url(#arrowBlue4)"/>
  <text x="330" y="222" font-size="10" font-weight="700" fill="#1D4ED8">④ Entry tại FVG — sau khi MSS đã xác nhận</text>

  <!-- continuation to target -->
  <path d="M382 165 C 430 140, 480 120, 540 100 C 580 88, 620 78, 660 66" fill="none" stroke="#16A34A" stroke-width="2.2" stroke-dasharray="6 4"/>
  <polygon points="660,66 649,68 655,55" fill="#16A34A"/>
  <text x="520" y="94" font-size="10" fill="#15803D">Target: BSL (draw on liquidity)</text>

  <!-- SL marker -->
  <line x1="230" y1="360" x2="700" y2="360" stroke="#DC2626" stroke-dasharray="4 4" stroke-width="1.2"/>
  <text x="600" y="374" font-size="9.5" fill="#B91C1C">SL — dưới điểm sweep / protected swing vừa bị phá</text>

  <text x="36" y="408" font-size="11" font-weight="700" fill="#15803D">Thứ tự đầy đủ: Sweep → Displacement qua protected swing → FVG → Entry.</text>
  <text x="36" y="424" font-size="10" fill="#4B5563">Entry là kết quả của bằng chứng cấu trúc đã xác nhận, không phải phản ứng tức thời tại POI.</text>

  <defs>
    <marker id="arrowBlue4" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1D4ED8"/>
    </marker>
  </defs>
</svg>
