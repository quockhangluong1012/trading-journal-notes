<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Inducement vs POI that (advanced)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">OB "ro rang" thuong nam TREN POI that (cho lenh mua) - do la bay</text>

  <rect x="24" y="76" width="712" height="404" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- HTF dealing range with premium/discount -->
  <text x="48" y="102" font-size="12.5" font-weight="700" fill="#1F2937">Dealing range (Premium / Discount)</text>

  <line x1="60" y1="120" x2="700" y2="120" stroke="#6B7280" stroke-width="1.2"/>
  <text x="706" y="124" font-size="10.5" fill="#6B7280">High</text>
  <line x1="60" y1="380" x2="700" y2="380" stroke="#6B7280" stroke-width="1.2"/>
  <text x="706" y="384" font-size="10.5" fill="#6B7280">Low</text>
  <line x1="60" y1="250" x2="700" y2="250" stroke="#4B5563" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="706" y="254" font-size="10.5" fill="#4B5563">EQ</text>

  <rect x="60" y="250" width="640" height="130" fill="#16A34A" fill-opacity="0.06"/>
  <text x="66" y="270" font-size="11" fill="#15803D" font-weight="600">Discount (vung mua)</text>

  <!-- inducement OB - obvious, sits above real POI -->
  <rect x="380" y="270" width="80" height="34" fill="#D97706" fill-opacity="0.16" stroke="#D97706"/>
  <text x="360" y="262" font-size="11" fill="#B45309" font-weight="700">Inducement OB (ro, "dep")</text>

  <!-- real POI lower, near true discount extreme -->
  <rect x="380" y="330" width="80" height="34" fill="#3B82F6" fill-opacity="0.16" stroke="#1D4ED8"/>
  <text x="380" y="380" font-size="11" fill="#1D4ED8" font-weight="700">POI that (sau sweep)</text>

  <!-- inducement low between them -->
  <line x1="340" y1="304" x2="500" y2="304" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="506" y="308" font-size="10.5" fill="#B91C1C" font-weight="600">Inducement low</text>

  <!-- price path showing reaction at inducement OB (fake), then sweep of inducement low into real POI -->
  <path d="M 90 200 L 200 240 L 300 220 L 400 285 L 430 300 L 470 320 L 500 304 L 540 345 L 560 300 L 620 200 L 680 140"
        fill="none" stroke="#374151" stroke-width="1.8"/>

  <circle cx="400" cy="285" r="4.5" fill="#D97706"/>
  <text x="330" y="230" font-size="10.5" fill="#B45309" font-weight="600">Phan ung yeu tai inducement OB (bay)</text>

  <circle cx="540" cy="345" r="5" fill="#3B82F6"/>
  <text x="470" y="466" font-size="11" fill="#1D4ED8" font-weight="600">Quet inducement low -&gt; vao that trong POI</text>

  <polygon points="680,140 670,158 692,156" fill="#16A34A"/>
  <text x="580" y="128" font-size="11" fill="#15803D" font-weight="600">Displacement that su</text>

  <!-- guidance box -->
  <rect x="60" y="392" width="640" height="70" rx="6" fill="#374151" fill-opacity="0.05" stroke="#4B5563" stroke-opacity="0.3"/>
  <text x="70" y="410" font-size="11.5" fill="#374151" font-weight="700">Nguyen tac: neu OB dau tien qua "sach" va gia phan ung ngay, nghi</text>
  <text x="70" y="426" font-size="11.5" fill="#374151">ngo do la inducement. Cho gia quet qua inducement low/high de lo</text>
  <text x="70" y="442" font-size="11.5" fill="#374151">ra POI that (thuong sau/sau hon, gan cuc tri discount/premium).</text>
</svg>
