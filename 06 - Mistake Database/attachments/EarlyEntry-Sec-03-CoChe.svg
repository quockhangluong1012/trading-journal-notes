  <text x="60" y="136" font-size="11" fill="#374151">Tao OB/FVG "dep"</text>
  <text x="60" y="151" font-size="11" fill="#374151">de trap early entry</text>

  <polygon points="198,128 220,122 220,134" fill="#6B7280"/>

  <rect x="222" y="94" width="150" height="68" rx="6" fill="#D97706" fill-opacity="0.08" stroke="#D97706"/>
  <text x="234" y="118" font-size="12.5" font-weight="700" fill="#B45309">2. Ban vao lenh</text>
  <text x="234" y="136" font-size="11" fill="#374151">Ban cung cap thanh</text>
  <text x="234" y="151" font-size="11" fill="#374151">khoan doi ung (SL)</text>

  <polygon points="372,128 394,122 394,134" fill="#6B7280"/>

