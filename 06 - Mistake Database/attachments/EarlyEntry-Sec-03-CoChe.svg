  <text x="408" y="118" font-size="12.5" font-weight="700" fill="#B91C1C">3. Sweep that su</text>
  <text x="408" y="136" font-size="11" fill="#374151">Gia chay ve pool</text>
  <text x="408" y="151" font-size="11" fill="#374151">SSL/BSL that</text>

  <polygon points="546,128 568,122 568,134" fill="#6B7280"/>

  <rect x="570" y="94" width="150" height="68" rx="6" fill="#16A34A" fill-opacity="0.08" stroke="#16A34A"/>
  <text x="582" y="118" font-size="12.5" font-weight="700" fill="#15803D">4. Draw on Liquidity</text>
  <text x="582" y="136" font-size="11" fill="#374151">MM fill size xong,</text>
  <text x="582" y="151" font-size="11" fill="#374151">gia di dung huong</text>

  <!-- EV note -->
  <rect x="48" y="176" width="672" height="52" rx="6" fill="#374151" fill-opacity="0.05" stroke="#4B5563" stroke-opacity="0.3"/>
