<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#15803D">ĐÚNG — displacement mạnh, đóng qua swing, để lại FVG</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Sweep → 2-3 nến thân lớn đóng dứt khoát qua protected swing → FVG → entry tại FVG.</text>

  <rect x="24" y="74" width="712" height="346" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-opacity="0.5"/>

  <line x1="60" y1="200" x2="700" y2="200" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="194" font-size="10.5" fill="#4B5563">Protected swing (last LH)</text>

  <!-- downtrend into POI -->
  <g stroke="#B91C1C" stroke-width="1.2">
    <line x1="80" y1="230" x2="80" y2="255"/><rect x="75" y="234" width="10" height="16" fill="#DC2626"/>
    <line x1="105" y1="242" x2="105" y2="268"/><rect x="100" y="246" width="10" height="16" fill="#DC2626"/>
    <line x1="130" y1="256" x2="130" y2="282"/><rect x="125" y="260" width="10" height="16" fill="#DC2626"/>
    <line x1="155" y1="270" x2="155" y2="300"/><rect x="150" y="274" width="10" height="18" fill="#DC2626"/>
  </g>
  <!-- sweep -->
  <line x1="180" y1="285" x2="180" y2="345" stroke="#B91C1C" stroke-width="1.2"/><rect x="175" y="300" width="10" height="12" fill="#DC2626"/>
  <circle cx="180" cy="342" r="4" fill="#D97706"/>
  <text x="150" y="362" font-size="9.5" fill="#B45309">Sweep SSL</text>

  <!-- strong displacement up through swing -->
  <line x1="210" y1="150" x2="210" y2="315" stroke="#15803D" stroke-width="1.4"/><rect x="202" y="165" width="16" height="130" fill="#16A34A"/>
  <line x1="245" y1="115" x2="245" y2="180" stroke="#15803D" stroke-width="1.4"/><rect x="237" y="125" width="16" height="50" fill="#16A34A"/>
  <text x="255" y="145" font-size="10.5" fill="#15803D" font-weight="600">Displacement mạnh, đóng qua swing = MSS</text>

  <!-- FVG -->
  <rect x="218" y="165" width="42" height="35" fill="#3B82F6" fill-opacity="0.2" stroke="#1D4ED8"/>
  <text x="266" y="188" font-size="10" fill="#1D4ED8" font-weight="600">FVG</text>

  <!-- retrace entry -->
  <line x1="290" y1="140" x2="290" y2="200" stroke="#15803D" stroke-width="1.2"/><rect x="285" y="170" width="10" height="14" fill="#16A34A"/>
  <circle cx="290" cy="182" r="5" fill="#16A34A"/>
  <polygon points="290,182 282,196 298,196" fill="#16A34A"/>
  <text x="300" y="205" font-size="10" fill="#15803D" font-weight="600">Entry tại FVG</text>

  <!-- continuation -->
  <path d="M 320 175 L 380 140 L 450 115 L 540 95" fill="none" stroke="#16A34A" stroke-width="2"/>
  <polygon points="540,95 531,111 549,108" fill="#16A34A"/>
  <text x="440" y="88" font-size="10.5" fill="#15803D" font-weight="600">Target BSL</text>

  <text x="90" y="405" font-size="10.5" fill="#4B5563">Body-to-range cao, bỏ giá nhanh, có FVG để tựa vào — pullback được hỗ trợ, entry có nền tảng.</text>
</svg>
