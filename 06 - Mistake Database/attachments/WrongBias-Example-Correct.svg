<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">✅ Ví dụ ĐÚNG — Bias từ Array-to-Array + Weekly Profile</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Discount + POI hợp lệ + Tue/Wed low-of-week + midnight open trên giá → mua hướng về BSL/PDH.</text>

  <rect x="24" y="70" width="440" height="330" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="38" y="92" font-size="11.5" font-weight="700" fill="#15803D">Weekly timeline — Mon → Fri</text>
  <text x="60" y="110" font-size="9.5" fill="#6B7280">Mon</text>
  <text x="140" y="110" font-size="9.5" fill="#6B7280">Tue</text>
  <text x="230" y="110" font-size="9.5" fill="#6B7280">Wed</text>
  <text x="320" y="110" font-size="9.5" fill="#6B7280">Thu</text>
  <text x="400" y="110" font-size="9.5" fill="#6B7280">Fri</text>
  <rect x="46" y="120" width="400" height="220" rx="4" fill="none" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="46" y="120" width="400" height="90" fill="#DC2626" opacity="0.05"/>
  <rect x="46" y="210" width="400" height="130" fill="#16A34A" opacity="0.07"/>
  <line x1="46" y1="210" x2="446" y2="210" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="452" y="214" font-size="9" fill="#6B7280">EQ</text>
  <!-- midnight open line above price -->
  <line x1="46" y1="170" x2="446" y2="170" stroke="#4B5563" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="352" y="165" font-size="9" fill="#4B5563">Midnight Open (trên giá)</text>
  <!-- Mon range -->
  <rect x="60" y="230" width="12" height="30" fill="#6B7280" rx="1"/>
  <rect x="85" y="220" width="12" height="35" fill="#6B7280" rx="1"/>
  <!-- Tue manipulation down: sweep SSL, low of week -->
  <rect x="115" y="240" width="12" height="45" fill="#DC2626" rx="1"/>
  <rect x="140" y="270" width="12" height="55" fill="#DC2626" rx="1"/>
  <circle cx="151" cy="322" r="9" fill="none" stroke="#D97706" stroke-width="2"/>
  <text x="105" y="345" font-size="9" font-weight="700" fill="#B45309">SSL swept — Low of Week</text>
  <!-- bullish OB POI at low -->
  <rect x="150" y="300" width="60" height="20" rx="3" fill="#3B82F6" opacity="0.18" stroke="#1D4ED8"/>
  <text x="152" y="316" font-size="8.5" fill="#1D4ED8">Bullish OB (POI hợp lệ)</text>
  <!-- Wed reversal up through discount -->
  <rect x="215" y="255" width="12" height="60" fill="#16A34A" rx="1"/>
  <rect x="240" y="220" width="12" height="55" fill="#16A34A" rx="1"/>
  <rect x="265" y="185" width="12" height="55" fill="#16A34A" rx="1"/>
  <path d="M156 300 C 190 260, 230 220, 275 190" fill="none" stroke="#16A34A" stroke-width="2"/>
  <polygon points="275,190 264,193 270,180" fill="#16A34A"/>
  <!-- Thu/Fri continuation to target -->
  <rect x="300" y="155" width="12" height="50" fill="#16A34A" rx="1"/>
  <rect x="330" y="130" width="12" height="45" fill="#16A34A" rx="1"/>
  <rect x="360" y="120" width="12" height="30" fill="#16A34A" rx="1"/>
  <line x1="46" y1="122" x2="446" y2="122" stroke="#D97706" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="352" y="118" font-size="9" fill="#B45309">Target: BSL / PDH</text>
  <text x="46" y="356" font-size="9.5" fill="#374151">Bias: mua từ discount, đúng array-to-array, đúng nhịp tuần.</text>

  <rect x="480" y="70" width="256" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="494" y="92" font-size="12" font-weight="700" fill="#15803D">Vì sao bias đúng</text>
  <text x="494" y="118" font-size="10.5" fill="#4B5563">• Giá ở Discount, tại POI hợp lệ (HTF OB)</text>
  <text x="494" y="140" font-size="10.5" fill="#4B5563">• Origin = OB vừa hình thành sau sweep</text>
  <text x="494" y="158" font-size="10.5" fill="#4B5563">  SSL; Destination = BSL/PDH còn nguyên</text>
  <text x="494" y="180" font-size="10.5" fill="#4B5563">• Weekly profile khớp: Tue/Wed tạo</text>
  <text x="494" y="198" font-size="10.5" fill="#4B5563">  low-of-week trước khi expansion</text>
  <text x="494" y="220" font-size="10.5" fill="#4B5563">• Midnight open nằm TRÊN giá hiện tại</text>
  <text x="494" y="238" font-size="10.5" fill="#4B5563">  → ủng hộ tìm long dưới midnight open</text>
  <text x="494" y="260" font-size="10.5" fill="#4B5563">• Không phải ngày tin quan trọng chi phối</text>
  <rect x="494" y="276" width="228" height="1" fill="#E5E7EB"/>
  <text x="494" y="298" font-size="11" font-weight="700" fill="#15803D">→ Bias Tier A: đủ điều kiện risk đầy đủ</text>
  <text x="494" y="318" font-size="10.5" fill="#4B5563">(xem mục Advanced — Bias Tiers).</text>
</svg>
