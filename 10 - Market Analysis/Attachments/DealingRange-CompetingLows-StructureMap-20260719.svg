<text x="40" y="530" font-size="10.5" fill="#9aa0a6">Ghi chu: gia va vi tri tren truc thoi gian mang tinh minh hoa lai dung thu tu/tuong quan da thao luan; can Khang doi chieu voi chart that de co so pip chinh xac.</text>
