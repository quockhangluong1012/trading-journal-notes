<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="920" height="600" rx="10" fill="#191b1f"/>
<defs>
<marker id="arC" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9aa0a6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text x="460" y="26" font-size="14" fill="#e6e8ea" text-anchor="middle" font-weight="600">6 Dieu Kien Remap DR Low len "duong do" (minh hoa nguyen ly)</text>

<!-- descending structure (lower highs / lower lows) leading to red line -->
<g stroke-width="1.3">
<line x1="60" y1="120" x2="60" y2="165" stroke="#fa5252"/><rect x="53" y="128" width="14" height="30" fill="#fa5252"/>
<line x1="105" y1="150" x2="105" y2="200" stroke="#fa5252"/><rect x="98" y="158" width="14" height="34" fill="#fa5252"/>
<line x1="150" y1="185" x2="150" y2="235" stroke="#40c057"/><rect x="143" y="192" width="14" height="30" fill="#40c057"/>
<line x1="195" y1="210" x2="195" y2="265" stroke="#fa5252"/><rect x="188" y="218" width="14" height="34" fill="#fa5252"/>
<line x1="240" y1="245" x2="240" y2="300" stroke="#fa5252"/><rect x="233" y="252" width="14" height="34" fill="#fa5252"/>
<line x1="285" y1="280" x2="285" y2="335" stroke="#40c057"/><rect x="278" y="288" width="14" height="30" fill="#40c057"/>
<line x1="330" y1="310" x2="330" y2="365" stroke="#fa5252"/><rect x="323" y="318" width="14" height="34" fill="#fa5252"/>
</g>
<text x="55" y="105" font-size="10.5" fill="#9aa0a6">Distribution xuong - lower highs / lower lows</text>

<!-- equal-lows pool just above the sweep (condition 1 target) -->
<line x1="345" y1="358" x2="420" y2="358" stroke="#9aa0a6" stroke-width="1.2" stroke-dasharray="3 3"/>
<text x="348" y="352" font-size="9.5" fill="#9aa0a6">old low / equal lows (SSL pool)</text>

<!-- sweep candle wick below the pool, then reclaim -->
<line x1="375" y1="345" x2="375" y2="415" stroke="#fa5252" stroke-width="1.6"/><rect x="368" y="352" width="14" height="45" fill="#fa5252"/>
<!-- the red line = actual low of the wick -->
<line x1="360" y1="410" x2="700" y2="410" stroke="#e03131" stroke-width="2.2"/>
<text x="705" y="414" font-size="11" fill="#e03131" font-weight="600">"duong do"</text>

<!-- annotation 1: sweep -->
<path d="M420 405 C 450 420, 470 425, 500 428" stroke="#9aa0a6" stroke-width="1.2" fill="none" marker-end="url(#arC)"/>
<circle cx="392" cy="405" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="388" y="409" font-size="10.5" fill="#f0a500" font-weight="700">1</text>
<text x="505" y="424" font-size="10.5" fill="#e6e8ea">Sweep that: wick lay old low / equal lows</text>
<text x="505" y="438" font-size="10.5" fill="#e6e8ea">roi RECLAIM (dong nen quay len tren)</text>

<!-- displacement candle up + MSS -->
<line x1="420" y1="200" x2="420" y2="405" stroke="#40c057" stroke-width="2"/><rect x="410" y="210" width="20" height="185" fill="#40c057"/>
<circle cx="420" cy="205" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="416" y="209" font-size="10.5" fill="#f0a500" font-weight="700">2</text>
<text x="450" y="200" font-size="10.5" fill="#e6e8ea">Displacement + MSS: pha vo swing high</text>
<text x="450" y="214" font-size="10.5" fill="#e6e8ea">gan nhat cua leg giam (structure break len)</text>

<!-- MSS broken level (a minor high in the decline) marked -->
<line x1="240" y1="245" x2="470" y2="245" stroke="#e6e8ea" stroke-width="1.2" stroke-dasharray="5 3"/>
<text x="475" y="249" font-size="9.5" fill="#e6e8ea">minor high bi pha = MSS</text>

<!-- FVG on displacement leg -->
<rect x="412" y="250" width="120" height="40" fill="none" stroke="#f0a500" stroke-width="1.2" stroke-dasharray="5 4" rx="3"/>
<circle cx="540" cy="270" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="536" y="274" font-size="10.5" fill="#f0a500" font-weight="700">3</text>
<text x="560" y="264" font-size="10.5" fill="#e6e8ea">FVG con nguyen (chua bi lap) = CE</text>
<text x="560" y="278" font-size="10.5" fill="#e6e8ea">lam POI cho range moi</text>

<!-- continuation candles after displacement (still above red line = no invalidation) -->
<g stroke-width="1.2" opacity="0.85">
<line x1="450" y1="150" x2="450" y2="205" stroke="#40c057"/><rect x="443" y="158" width="14" height="34" fill="#40c057"/>
<line x1="480" y1="130" x2="480" y2="175" stroke="#fa5252"/><rect x="473" y="138" width="14" height="26" fill="#fa5252"/>
<line x1="510" y1="110" x2="510" y2="160" stroke="#40c057"/><rect x="503" y="118" width="14" height="30" fill="#40c057"/>
</g>
<circle cx="490" cy="405" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="486" y="409" font-size="10.5" fill="#f0a500" font-weight="700">4</text>
<path d="M500 400 L 500 415" stroke="#9aa0a6" stroke-width="1.1" marker-end="url(#arC)"/>
<text x="505" y="450" font-size="10.5" fill="#e6e8ea">Khong co nen nao dong cua duoi</text>
<text x="505" y="464" font-size="10.5" fill="#e6e8ea">"duong do" sau do (invalidation check)</text>

<!-- DR High resync marker -->
<circle cx="150" cy="185" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="146" y="189" font-size="10.5" fill="#f0a500" font-weight="700">5</text>
<path d="M160 178 C 200 150, 260 140, 300 138" stroke="#9aa0a6" stroke-width="1.1" fill="none" marker-end="url(#arC)"/>
<text x="60" y="475" font-size="10.5" fill="#e6e8ea">DR High MOI dong bo: swing high lien ke</text>
<text x="60" y="489" font-size="10.5" fill="#e6e8ea">truoc leg giam (khong giu high cua range cu)</text>

<!-- Kill zone / session context -->
<rect x="620" y="70" width="270" height="60" fill="none" stroke="#4dabf7" stroke-width="1.2" stroke-dasharray="4 3" rx="6"/>
<circle cx="640" cy="100" r="10" fill="none" stroke="#f0a500" stroke-width="2"/>
<text x="636" y="104" font-size="10.5" fill="#f0a500" font-weight="700">6</text>
<text x="660" y="92" font-size="10.5" fill="#4dabf7">Boi canh Kill Zone / phien phu hop</text>
<text x="660" y="106" font-size="10.5" fill="#4dabf7">(London/NY tin cay hon Asia thanh</text>
<text x="660" y="120" font-size="10.5" fill="#4dabf7">khoan mong) - dieu kien bo tro</text>

<line x1="20" y1="545" x2="900" y2="545" stroke="#2b2f36" stroke-width="1"/>
<text x="20" y="565" font-size="11.5" fill="#9aa0a6">Du CA 6 dieu kien -&gt; remap DR Low len "duong do" la hop le; thieu dieu kien 1 hoac 2 -&gt; chi la pullback, KHONG remap.</text>
<text x="20" y="580" font-size="10.5" fill="#6b7280">Xem chi tiet nguyen tac tai [[37 - Re-mapping Dealing Range sau Displacement]] va [[12 - Dealing Range]].</text>
</svg>
