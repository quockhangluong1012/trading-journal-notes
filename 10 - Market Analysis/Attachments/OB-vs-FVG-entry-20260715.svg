<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="560" rx="12" fill="#191b1f"/>
<defs>
<marker id="ad" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#fa5252" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#868e96" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text x="28" y="32" font-size="16" fill="#e6e8ea" font-weight="bold">EURUSD M5 - Split entry 50/50: FVG (fill cao) + Bearish OB (gia tot) - va vi sao gia di</text>

<!-- LEFT: price schematic -->
<rect x="28" y="48" width="446" height="430" rx="6" fill="#202329" stroke="#2a2d33"/>
<rect x="42" y="66" width="418" height="34" fill="#4b5563" opacity="0.20"/>
<text x="322" y="62" font-size="9.5" fill="#9aa0a6">H1 OB / premium zone (1.0658-1.0667)</text>
<line x1="42" y1="66" x2="460" y2="66" stroke="#fa5252" stroke-width="1.3" stroke-dasharray="5 4"/>
<text x="46" y="63" font-size="10" fill="#fa5252">SL ~1.0667 (tren sweep high) - CHUNG cho ca 2 leg</text>
<rect x="42" y="86" width="418" height="9" fill="#40c057" opacity="0.22" stroke="#40c057" stroke-width="1"/>
<text x="46" y="83" font-size="10" fill="#40c057" font-weight="bold">Bearish OB 1.06591-1.06610 = leg A (0.5) - KHONG khop (gia chi len ~1.0655)</text>
<rect x="42" y="138" width="418" height="14" fill="#f0a500" opacity="0.20" stroke="#f0a500" stroke-width="1"/>
<text x="46" y="167" font-size="10" fill="#f0a500" font-weight="bold">FVG 1.06414-1.06453 = leg B (0.5) - KHOP va WIN</text>
<line x1="42" y1="178" x2="460" y2="178" stroke="#9aa0a6" stroke-width="1" stroke-dasharray="2 3"/>
<text x="322" y="190" font-size="9.5" fill="#e6e8ea">gia luc len KH 1.06395</text>
<!-- up move + displacement -->
<polyline points="60,340 92,300 118,250 150,180 176,92 206,175 232,205 258,178 286,80" fill="none" stroke="#40c057" stroke-width="2"/>
<polyline points="286,80 306,120 322,152 338,178" fill="none" stroke="#fa5252" stroke-width="2.4"/>
<circle cx="286" cy="80" r="4.5" fill="#fa5252"/>
<text x="292" y="78" font-size="9.5" fill="#fa5252">BSL swept</text>
<!-- realized path: sweep above FVG then drop to TP -->
<polyline points="338,178 356,120 372,150 386,300 398,410" fill="none" stroke="#868e96" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ad)"/>
<text x="150" y="360" font-size="9.5" fill="#9aa0a6">displacement pha 2 internal low = MSS</text>
<text x="360" y="112" font-size="9" fill="#868e96">quet len tren FVG (~1.0655)</text>
<text x="360" y="270" font-size="9" fill="#868e96">roi drop manh</text>
<!-- targets -->
<line x1="42" y1="372" x2="460" y2="372" stroke="#40c057" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="46" y="369" font-size="10" fill="#40c057">TP1 ~1.0620 (leg A) / partial</text>
<line x1="42" y1="418" x2="460" y2="418" stroke="#40c057" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="46" y="415" font-size="10" fill="#40c057">TP2 ~1.0588-1.0595 = H1 Bullish OB / SSL (leg B WIN)</text>

<!-- RIGHT: comparison table -->
<rect x="492" y="48" width="380" height="300" rx="6" fill="#202329" stroke="#2a2d33"/>
<text x="508" y="72" font-size="13" fill="#e6e8ea" font-weight="bold">So sanh 2 leg (va ket qua that)</text>
<line x1="508" y1="84" x2="856" y2="84" stroke="#2a2d33" stroke-width="1"/>
<text x="508" y="106" font-size="10.5" fill="#9aa0a6">Tieu chi</text>
<text x="648" y="106" font-size="10.5" fill="#40c057" font-weight="bold">A: OB (premium)</text>
<text x="770" y="106" font-size="10.5" fill="#f0a500" font-weight="bold">B: FVG</text>
<line x1="508" y1="118" x2="856" y2="118" stroke="#2a2d33" stroke-width="1"/>
<text x="508" y="140" font-size="10.5" fill="#e6e8ea">SL risk</text>
<text x="648" y="140" font-size="10.5" fill="#40c057">~7-8 pip</text>
<text x="770" y="140" font-size="10.5" fill="#fa5252">~24 pip (SL xa)</text>
<text x="508" y="168" font-size="10.5" fill="#e6e8ea">RR</text>
<text x="648" y="168" font-size="10.5" fill="#40c057">cao (~10R)</text>
<text x="770" y="168" font-size="10.5" fill="#fa5252">thap (~2.5R)</text>
<text x="508" y="196" font-size="10.5" fill="#e6e8ea">Fill prob.</text>
<text x="648" y="196" font-size="10.5" fill="#fa5252">THAP</text>
<text x="770" y="196" font-size="10.5" fill="#40c057">CAO</text>
<text x="508" y="224" font-size="10.5" fill="#e6e8ea">Ket qua THAT</text>
<text x="648" y="224" font-size="10.5" fill="#fa5252">KHONG khop</text>
<text x="770" y="224" font-size="10.5" fill="#40c057">KHOP -> WIN</text>
<line x1="508" y1="240" x2="856" y2="240" stroke="#2a2d33" stroke-width="1"/>
<text x="508" y="262" font-size="10" fill="#f0a500" font-weight="bold">=> Neu cho OB-only: MISS ca keo.</text>
<text x="508" y="282" font-size="10" fill="#9aa0a6">SL xa cua leg FVG chinh la thu cuu no</text>
<text x="508" y="300" font-size="10" fill="#9aa0a6">khi gia quet len tren FVG roi moi dao.</text>
<text x="508" y="326" font-size="10" fill="#fa5252">Canh bao: 1 ket qua khong chung minh.</text>

<!-- bottom decision strip -->
<rect x="28" y="392" width="844" height="0" opacity="0"/>
<rect x="492" y="360" width="380" height="118" rx="6" fill="#20262b" stroke="#2a2d33"/>
<text x="508" y="382" font-size="11.5" fill="#e6e8ea" font-weight="bold">Split 50/50 (scale-in) - giai phap</text>
<text x="508" y="402" font-size="9.8" fill="#40c057">0.5 @ FVG (SL xa) + 0.5 @ OB premium.</text>
<text x="508" y="418" font-size="9.8" fill="#40c057">Vua co fill (FVG) vua co gia tot (OB).</text>
<text x="508" y="436" font-size="9.8" fill="#f0a500">FVG leg BAT BUOC SL xa - gia hay quet</text>
<text x="508" y="450" font-size="9.8" fill="#f0a500">len tren FVG roi moi dao (dung case nay).</text>
<text x="508" y="468" font-size="9.8" fill="#9aa0a6">Danh gia bang expectancy tren sample.</text>

<rect x="28" y="490" width="844" height="56" rx="6" fill="#20262b" stroke="#2a2d33"/>
<text x="44" y="512" font-size="11" fill="#e6e8ea" font-weight="bold">Vi sao gia di:</text>
<text x="140" y="512" font-size="10.5" fill="#cbd0d4">len quet BSL o premium (lay doi ung de SELL) -> giao xuong SSL/discount OB (draw on liquidity).</text>
<text x="44" y="532" font-size="10.5" fill="#9aa0a6">Nhip retrace quet len tren FVG = grab internal buy-side (IRL) truoc khi tiep dien ve external target (ERL).</text>
</svg>
