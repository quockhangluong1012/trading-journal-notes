<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="480" rx="12" fill="#191b1f"/>
<text x="28" y="32" font-size="16" fill="#e6e8ea" font-weight="bold">Tieu chi (e): Phan ung tai vung test - ACCEPT hay REJECT?</text>
<text x="28" y="50" font-size="10.5" fill="#9aa0a6">Ap dung cho vung 1.305 (launch pad) ma EURUSD dang test lai trong chart cua Khang</text>

<!-- LEFT: reject -->
<rect x="28" y="66" width="404" height="380" rx="6" fill="#202329" stroke="#2a2d33"/>
<text x="46" y="90" font-size="12.5" fill="#40c057" font-weight="bold">A. REJECT tai vung = Pullback sau hop le</text>
<line x1="46" y1="270" x2="414" y2="270" stroke="#f0a500" stroke-width="1.4" stroke-dasharray="5 4"/>
<text x="330" y="266" font-size="9.5" fill="#f0a500">vung 1.305</text>
<polyline points="60,150 100,190 140,230 180,260 215,280 240,260" fill="none" stroke="#fa5252" stroke-width="2.2"/>
<!-- wick candle -->
<line x1="255" y1="240" x2="255" y2="310" stroke="#e6e8ea" stroke-width="1.6"/>
<rect x="248" y="245" width="14" height="30" fill="#40c057"/>
<text x="200" y="330" font-size="9.3" fill="#e6e8ea">Wick tho sau vao vung 1.305,</text>
<text x="200" y="344" font-size="9.3" fill="#e6e8ea">nhung dong cua NGAY BEN TREN vung</text>
<polyline points="262,255 300,220 340,190 380,170 405,150" fill="none" stroke="#40c057" stroke-width="2.4"/>
<text x="290" y="150" font-size="9.3" fill="#40c057" font-weight="bold">Displacement tang bat len ngay sau</text>
<rect x="46" y="368" width="368" height="66" rx="5" fill="#20262b" stroke="#2a2d33"/>
<text x="56" y="386" font-size="9.8" fill="#e6e8ea">Chi WICK, khong dong cua duoi vung.</text>
<text x="56" y="402" font-size="9.8" fill="#40c057" font-weight="bold">=> HL van duoc bao ve. Pullback sau</text>
<text x="56" y="418" font-size="9.8" fill="#40c057" font-weight="bold">vao dung HL/OB - bias tang con nguyen.</text>

<!-- RIGHT: accept -->
<rect x="468" y="66" width="404" height="380" rx="6" fill="#202329" stroke="#2a2d33"/>
<text x="486" y="90" font-size="12.5" fill="#fa5252" font-weight="bold">B. ACCEPT duoi vung = MSS that</text>
<line x1="486" y1="270" x2="854" y2="270" stroke="#f0a500" stroke-width="1.4" stroke-dasharray="5 4"/>
<text x="780" y="266" font-size="9.5" fill="#f0a500">vung 1.305</text>
<polyline points="500,150 540,190 580,230 620,260 650,280" fill="none" stroke="#fa5252" stroke-width="2.2"/>
<!-- close-through candle -->
<rect x="655" y="280" width="14" height="40" fill="#fa5252"/>
<text x="600" y="340" font-size="9.3" fill="#e6e8ea">Nen dong cua THAT SU duoi vung 1.305,</text>
<text x="600" y="354" font-size="9.3" fill="#e6e8ea">gia giu ben ngoai (khong reclaim ngay)</text>
<polyline points="669,310 710,290 745,275 780,285 805,300" fill="none" stroke="#fa5252" stroke-width="2.2"/>
<circle cx="745" cy="275" r="4" fill="#fa5252"/>
<text x="700" y="255" font-size="9.3" fill="#fa5252" font-weight="bold">Retest tu duoi len - bi TU CHOI</text>
<text x="700" y="242" font-size="9.3" fill="#fa5252">(vung 1.305 gio la resistance)</text>
<rect x="486" y="368" width="368" height="66" rx="5" fill="#20262b" stroke="#2a2d33"/>
<text x="496" y="386" font-size="9.8" fill="#e6e8ea">Dong BODY qua HL + giu ngoai + retest</text>
<text x="496" y="402" font-size="9.8" fill="#fa5252" font-weight="bold">tu duoi bi tu choi = MSS/CHoCH xac nhan.</text>
<text x="496" y="418" font-size="9.8" fill="#fa5252" font-weight="bold">Bias doi sang giam/trung lap, target HL#1.</text>
</svg>
