<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="500" rx="12" fill="#191b1f"/>
<text x="28" y="32" font-size="16" fill="#e6e8ea" font-weight="bold">Tieu chi (c): Boi canh Liquidity - vi sao dinh 1.370 la mot BSL sweep, khong phai ngau nhien</text>

<rect x="28" y="52" width="844" height="410" rx="6" fill="#202329" stroke="#2a2d33"/>

<!-- ERL top zone -->
<rect x="46" y="70" width="812" height="14" fill="#fa5252" opacity="0.18"/>
<text x="56" y="80" font-size="10" fill="#fa5252" font-weight="bold">ERL tren (BSL): equal highs ~1.315 / ~1.31 (Sep + Dec) - pool tich luy nhieu lan cham</text>

<!-- ERL bottom zone -->
<rect x="46" y="400" width="812" height="14" fill="#40c057" opacity="0.18"/>
<text x="56" y="428" font-size="10" fill="#40c057" font-weight="bold">ERL duoi (SSL): HL#1 ~1.280 (Oct-Nov) - target neu MSS that xay ra</text>

<!-- price path -->
<polyline points="60,380 110,300 150,250 190,180 230,140 270,110 300,95" fill="none" stroke="#40c057" stroke-width="2.2"/>
<circle cx="300" cy="95" r="5" fill="#fa5252"/>
<text x="230" y="80" font-size="9.8" fill="#fa5252" font-weight="bold">Dinh 1.370 = quet sach BSL cua 1.315/1.31</text>
<polyline points="300,95 350,160 400,220 450,280 500,320 550,350 600,370" fill="none" stroke="#fa5252" stroke-width="2.4"/>
<circle cx="600" cy="370" r="6" fill="#f0a500" stroke="#191b1f" stroke-width="1.5"/>
<text x="560" y="392" font-size="9.8" fill="#f0a500" font-weight="bold">Gia quay ve dung vung launch pad 1.305</text>

<!-- IRL/ERL rotation labels -->
<rect x="640" y="100" width="216" height="240" rx="6" fill="#20262b" stroke="#2a2d33"/>
<text x="652" y="122" font-size="11" fill="#e6e8ea" font-weight="bold">Vong xoay IRL/ERL</text>
<text x="652" y="146" font-size="9.5" fill="#e6e8ea">1. Gia quet ERL dinh (BSL 1.315/1.31)</text>
<text x="652" y="164" font-size="9.5" fill="#e6e8ea">   tai 1.370 - "external taken"</text>
<text x="652" y="188" font-size="9.5" fill="#e6e8ea">2. Sau khi het "nhien lieu" mua (het</text>
<text x="652" y="204" font-size="9.5" fill="#e6e8ea">   BSL de lay), gia co xu huong quay</text>
<text x="652" y="220" font-size="9.5" fill="#e6e8ea">   ve internal / ERL doi dien</text>
<text x="652" y="244" font-size="9.5" fill="#f0a500" font-weight="bold">3. Cau hoi: draw tiep theo la IRL</text>
<text x="652" y="260" font-size="9.5" fill="#f0a500" font-weight="bold">   (rebalance FVG noi bo, gan 1.305)</text>
<text x="652" y="276" font-size="9.5" fill="#f0a500" font-weight="bold">   hay ERL doi dien (SSL 1.28, sau</text>
<text x="652" y="292" font-size="9.5" fill="#f0a500" font-weight="bold">   hon la 1.21)?</text>
<text x="652" y="316" font-size="9.3" fill="#9aa0a6">Sweep BSL that + displacement giam</text>
<text x="652" y="330" font-size="9.3" fill="#9aa0a6">= dieu kien can cho mot MSS dang tin</text>

<rect x="28" y="472" width="844" height="0" opacity="0"/>
<text x="28" y="486" font-size="10.3" fill="#9aa0a6">Nhac lai (MSS concept note): "Chat luong MSS phu thuoc lon vao loai pool bi quet ngay truoc no" - equal highs = Tier cao nhat. Day la mot phan ung ho gia thuyet MSS that.</text>
</svg>
