<text x="30" y="34" font-size="16" fill="#e6e8ea" font-weight="bold">M5: Hai kich ban tai FVG - dung pre-commit, xuong M1</text>

<!-- LEFT panel: bearish -->
<rect x="30" y="60" width="380" height="252" rx="6" fill="#202329" stroke="#2a2d33"/>
