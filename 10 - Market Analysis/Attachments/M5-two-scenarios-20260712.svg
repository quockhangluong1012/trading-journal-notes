<polyline points="60,214 92,180 120,150 142,130 158,124" fill="none" stroke="#40c057" stroke-width="2"/>
<polyline points="158,124 178,158 200,206 224,252 246,292" fill="none" stroke="#fa5252" stroke-width="2.2" marker-end="url(#ad)"/>
