<text x="470" y="284" font-size="10.8" fill="#9aa0a6">quet SSL duoi hop (bear trap) -&gt; reclaim manh</text>
<text x="600" y="104" font-size="10.5" fill="#e6e8ea">len lay BSL tren</text>

<!-- decision strip -->
<rect x="30" y="330" width="800" height="80" rx="6" fill="#20262b" stroke="#2a2d33"/>
<text x="44" y="352" font-size="12" fill="#e6e8ea" font-weight="bold">Quyet dinh: KHONG doan chieu. Xuong M1 de thi truong lo tay.</text>
<text x="44" y="374" font-size="11" fill="#40c057">M1 MSS xuong + lower highs tai CE  =&gt;  short (SL tren dinh FVG, target SSL).</text>
<text x="44" y="393" font-size="11" fill="#fa5252">M1 dong nen tren CE roi tren FVG High  =&gt;  thesis short chet, dung ngoai / lat kich ban bo.</text>
