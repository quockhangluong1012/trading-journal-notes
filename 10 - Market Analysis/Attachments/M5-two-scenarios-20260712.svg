<polyline points="478,150 500,190 520,236 540,262" fill="none" stroke="#fa5252" stroke-width="2"/>
<polyline points="540,262 566,214 596,168 628,132 660,108" fill="none" stroke="#40c057" stroke-width="2.4" marker-end="url(#au)"/>
