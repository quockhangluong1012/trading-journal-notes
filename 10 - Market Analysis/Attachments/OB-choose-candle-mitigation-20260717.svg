<svg xmlns="http://www.w3.org/2000/svg" width="760" height="500" viewBox="0 0 760 500" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="760" height="500" rx="10" fill="#191b1f"/>
<defs>
<marker id="ar2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9aa0a6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text x="20" y="28" font-size="13" fill="#9aa0a6">Daily - vung dinh truoc displacement giam (khong nhan gia/symbol, minh hoa nguyen ly)</text>

<!-- decline leg (context, further left, faded) -->
<g stroke-width="1.3" opacity="0.55">
<line x1="40" y1="150" x2="40" y2="210" stroke="#fa5252"/><rect x="33" y="158" width="14" height="34" fill="#fa5252"/>
<line x1="70" y1="185" x2="70" y2="255" stroke="#fa5252"/><rect x="63" y="195" width="14" height="42" fill="#fa5252"/>
<line x1="100" y1="235" x2="100" y2="300" stroke="#fa5252"/><rect x="93" y="245" width="14" height="40" fill="#fa5252"/>
</g>
<text x="30" y="130" font-size="11" fill="#6b7280">(nhip giam truoc do - context)</text>

<!-- rally leg up to candle 1 -->
<g stroke-width="1.4">
<line x1="140" y1="300" x2="140" y2="345" stroke="#40c057"/><rect x="133" y="308" width="14" height="30" fill="#40c057"/>
<line x1="180" y1="255" x2="180" y2="310" stroke="#40c057"/><rect x="173" y="265" width="14" height="35" fill="#40c057"/>
<line x1="220" y1="205" x2="220" y2="265" stroke="#40c057"/><rect x="213" y="215" width="14" height="42" fill="#40c057"/>
<line x1="260" y1="150" x2="260" y2="220" stroke="#40c057"/><rect x="253" y="162" width="14" height="50" fill="#40c057"/>
</g>

<!-- candle 1 : swing high, larger body -->
<line x1="300" y1="95" x2="300" y2="175" stroke="#40c057" stroke-width="1.4"/>
<rect x="293" y="108" width="14" height="55" fill="#40c057"/>
<circle cx="300" cy="98" r="5" fill="none" stroke="#f0a500" stroke-width="2"/>

<!-- 3 bearish candles between 1 and 2 -->
<g stroke-width="1.4">
<line x1="340" y1="118" x2="340" y2="195" stroke="#fa5252"/><rect x="333" y="128" width="14" height="45" fill="#fa5252"/>
<line x1="380" y1="150" x2="380" y2="235" stroke="#fa5252"/><rect x="373" y="160" width="14" height="52" fill="#fa5252"/>
<line x1="420" y1="188" x2="420" y2="265" stroke="#fa5252"/><rect x="413" y="198" width="14" height="48" fill="#fa5252"/>
</g>
<rect x="322" y="110" width="120" height="165" fill="none" stroke="#fa5252" stroke-width="1.1" stroke-dasharray="4 3" rx="4" opacity="0.8"/>
<text x="326" y="288" font-size="11" fill="#fa5252">3 nen bearish - ngat quang</text>
<text x="326" y="301" font-size="11" fill="#fa5252">KHONG gop nen 1 &amp; nen 2 qua day</text>

<!-- candle 2 : small body -->
<line x1="460" y1="185" x2="460" y2="240" stroke="#40c057" stroke-width="1.4"/>
<rect x="453" y="205" width="14" height="18" fill="#40c057"/>
<circle cx="460" cy="188" r="5" fill="none" stroke="#f0a500" stroke-width="2"/>

<!-- big bearish displacement candle -->
<line x1="510" y1="215" x2="510" y2="420" stroke="#fa5252" stroke-width="1.6"/>
<rect x="500" y="225" width="20" height="185" fill="#fa5252"/>

<!-- FVG boxes on displacement leg -->
<rect x="496" y="250" width="150" height="34" fill="none" stroke="#f0a500" stroke-width="1.2" stroke-dasharray="5 4" rx="3"/>
<text x="650" y="272" font-size="11.5" fill="#f0a500">FVG 1</text>
<rect x="496" y="310" width="150" height="34" fill="none" stroke="#f0a500" stroke-width="1.2" stroke-dasharray="5 4" rx="3"/>
<text x="650" y="332" font-size="11.5" fill="#f0a500">FVG 2</text>

<!-- continuation smaller bearish candles -->
<g stroke-width="1.3" opacity="0.7">
<line x1="550" y1="380" x2="550" y2="430" stroke="#fa5252"/><rect x="543" y="388" width="14" height="30" fill="#fa5252"/>
<line x1="590" y1="400" x2="590" y2="450" stroke="#fa5252"/><rect x="583" y="408" width="14" height="30" fill="#fa5252"/>
</g>

<!-- annotation candle 1 -->
<path d="M300 60 L300 88" stroke="#9aa0a6" stroke-width="1.3" marker-end="url(#ar2)"/>
<text x="248" y="52" font-size="13" fill="#e6e8ea" font-weight="600">1</text>
<text x="150" y="70" font-size="11.5" fill="#e6e8ea">Swing high - co the DA bi test</text>
<text x="150" y="84" font-size="11.5" fill="#e6e8ea">(kiem tra: 3 nen bearish sau do co</text>
<text x="150" y="98" font-size="11.5" fill="#e6e8ea">chay nguoc vao than nen 1 khong?)</text>

<!-- annotation candle 2 -->
<path d="M545 190 C 520 175, 500 178, 470 188" stroke="#9aa0a6" stroke-width="1.3" fill="none" marker-end="url(#ar2)"/>
<text x="548" y="180" font-size="13" fill="#e6e8ea" font-weight="600">2</text>
<text x="470" y="140" font-size="11.5" fill="#e6e8ea">OB hop le - lien ke truc tiep</text>
<text x="470" y="154" font-size="11.5" fill="#e6e8ea">truoc displacement -&gt; CHUA bi test</text>
<text x="470" y="168" font-size="11.5" fill="#e6e8ea">(than nho khong loai bo tinh hop le)</text>

<!-- bottom note -->
<line x1="20" y1="465" x2="740" y2="465" stroke="#2b2f36" stroke-width="1"/>
<text x="20" y="485" font-size="11.5" fill="#9aa0a6">Xac nhan: 2 FVG lon tu displacement + Bearish MSS tren LTF -&gt; ung ho nen 2 la POI chinh.</text>
</svg>
