<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="520" rx="12" fill="#191b1f"/>
<text x="28" y="32" font-size="16" fill="#e6e8ea" font-weight="bold">Tieu chi (d): OTE (62-79%) vs Full retracement - leg 3 (1.305 to 1.370)</text>
<text x="28" y="50" font-size="10.5" fill="#9aa0a6">Fib keo tu 1.305 (100%, day leg) len 1.370 (0%, dinh leg) - gia hien tai ~1.3075 nam gan sat 100%</text>

<rect x="28" y="66" width="500" height="430" rx="6" fill="#202329" stroke="#2a2d33"/>

<!-- fib levels -->
<line x1="42" y1="90" x2="514" y2="90" stroke="#868e96" stroke-width="1"/>
<text x="520" y="94" font-size="10.5" fill="#e6e8ea">0% = 1.370 (dinh leg)</text>

<line x1="42" y1="231" x2="514" y2="231" stroke="#9aa0a6" stroke-width="1" stroke-dasharray="3 3"/>
<text x="520" y="235" font-size="10" fill="#9aa0a6">50% EQ = 1.3375 (khong phai OTE)</text>

<rect x="42" y="281" width="472" height="78" fill="#f0a500" opacity="0.15"/>
<line x1="42" y1="281" x2="514" y2="281" stroke="#f0a500" stroke-width="1.2"/>
<text x="520" y="285" font-size="10" fill="#f0a500" font-weight="bold">62% = 1.328 (mep tren OTE)</text>
<line x1="42" y1="323" x2="514" y2="323" stroke="#f0a500" stroke-width="1.4" stroke-dasharray="2 2"/>
<text x="520" y="327" font-size="10" fill="#f0a500" font-weight="bold">70.5% sweet spot = 1.320</text>
<line x1="42" y1="359" x2="514" y2="359" stroke="#f0a500" stroke-width="1.2"/>
<text x="520" y="363" font-size="10" fill="#f0a500" font-weight="bold">79% = 1.313 (mep sau OTE)</text>

<line x1="42" y1="401" x2="514" y2="401" stroke="#fa5252" stroke-width="1.6"/>
<text x="520" y="405" font-size="10.5" fill="#fa5252" font-weight="bold">100% = 1.305 (day leg / launch pad)</text>

<!-- current price -->
<line x1="42" y1="388" x2="514" y2="388" stroke="#e6e8ea" stroke-width="2" stroke-dasharray="6 3"/>
<circle cx="480" cy="388" r="6" fill="#e6e8ea" stroke="#191b1f" stroke-width="1.5"/>
<text x="42" y="382" font-size="10.5" fill="#e6e8ea" font-weight="bold">Gia hien tai ~1.3075</text>

<!-- price path -->
<polyline points="60,401 90,340 130,231 170,150 200,90" fill="none" stroke="#40c057" stroke-width="2.2"/>
<polyline points="200,90 260,200 320,323 380,370 430,388" fill="none" stroke="#fa5252" stroke-width="2.4"/>
<text x="90" y="130" font-size="9.3" fill="#40c057">Leg 3: displacement tang manh</text>
<text x="280" y="410" font-size="9.3" fill="#fa5252">Retracement Feb-Mar (nhip dang xet)</text>

<!-- right side commentary -->
<rect x="540" y="66" width="332" height="430" rx="6" fill="#20262b" stroke="#2a2d33"/>
<text x="556" y="90" font-size="12" fill="#e6e8ea" font-weight="bold">Doc ket qua</text>
<text x="556" y="114" font-size="10" fill="#9aa0a6">- Mot pullback khoe manh thuong dung</text>
<text x="556" y="128" font-size="10" fill="#9aa0a6">  lai trong vung OTE (62-79%), hiem khi</text>
<text x="556" y="142" font-size="10" fill="#9aa0a6">  an het 100% cua leg vua tao ra no.</text>
<text x="556" y="168" font-size="10" fill="#fa5252" font-weight="bold">- Gia hien tai ~1.3075 nam GIUA</text>
<text x="556" y="182" font-size="10" fill="#fa5252" font-weight="bold">  79% (1.313) va 100% (1.305) - da</text>
<text x="556" y="196" font-size="10" fill="#fa5252" font-weight="bold">  an gan het toan bo leg 3.</text>
<text x="556" y="222" font-size="10" fill="#e6e8ea">- Day la mot canh bao quan trong:</text>
<text x="556" y="236" font-size="10" fill="#e6e8ea">  retracement sau toi muc nay nghieng</text>
<text x="556" y="250" font-size="10" fill="#e6e8ea">  ve phia MSS that hon la Pullback</text>
<text x="556" y="264" font-size="10" fill="#e6e8ea">  thong thuong noi OTE.</text>
<text x="556" y="290" font-size="10" fill="#9aa0a6">- Neu gia DONG CUA vuot han qua</text>
<text x="556" y="304" font-size="10" fill="#9aa0a6">  100% (1.305) va giu ngoai - nhip</text>
<text x="556" y="318" font-size="10" fill="#9aa0a6">  impulse (leg 3) coi nhu that bai</text>
<text x="556" y="332" font-size="10" fill="#9aa0a6">  (theo dung quy tac OTE muc 5).</text>
<rect x="556" y="352" width="300" height="130" rx="5" fill="#191b1f" stroke="#f0a500" stroke-width="1"/>
<text x="566" y="372" font-size="10" fill="#f0a500" font-weight="bold">Cau hoi con lai (chi Khang tra</text>
<text x="566" y="386" font-size="10" fill="#f0a500" font-weight="bold">loi duoc tu chart that):</text>
<text x="566" y="406" font-size="9.5" fill="#e6e8ea">Nen dong cua gan nhat DA hay CHUA</text>
<text x="566" y="420" font-size="9.5" fill="#e6e8ea">dong duoi 1.305? Do la ranh gioi</text>
<text x="566" y="434" font-size="9.5" fill="#e6e8ea">quyet dinh giua "OTE sau van hop le"</text>
<text x="566" y="448" font-size="9.5" fill="#e6e8ea">va "nhip that bai / MSS xac nhan".</text>
</svg>
