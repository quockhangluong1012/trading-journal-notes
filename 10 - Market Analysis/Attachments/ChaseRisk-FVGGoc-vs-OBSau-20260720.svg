<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="480" rx="12" fill="#191b1f"/>
<text x="28" y="32" font-size="16" fill="#e6e8ea" font-weight="bold">War Story W1 ap dung: FVG goc cua displacement vs OB sau - dau moi la entry dung?</text>
<text x="28" y="50" font-size="10.5" fill="#9aa0a6">Displacement cang manh, retrace ve FVG cang nong - chase vao vung sau la mot leg da chay het</text>

<!-- LEFT: correct FVG -->
<rect x="28" y="66" width="404" height="380" rx="6" fill="#202329" stroke="#40c057"/>
<text x="46" y="90" font-size="12.5" fill="#40c057" font-weight="bold">A. FVG dung cua displacement (1.1660-1.1680)</text>
<polyline points="60,120 100,110 140,140 180,190 220,240 260,270" fill="none" stroke="#fa5252" stroke-width="2.2"/>
<rect x="200" y="215" width="90" height="35" fill="#1e2a20" stroke="#40c057" stroke-dasharray="3 3"/>
<text x="245" y="237" font-size="9" fill="#40c057" text-anchor="middle">FVG</text>
<polyline points="260,270 285,255 300,240 320,255 340,275" fill="none" stroke="#40c057" stroke-width="2.2"/>
<text x="60" y="310" font-size="9.5" fill="#e6e8ea">Retrace nong 25-50% leg - dung ngay</text>
<text x="60" y="324" font-size="9.5" fill="#e6e8ea">chan cua cu displacement lon</text>
<rect x="46" y="368" width="368" height="66" rx="5" fill="#20262b" stroke="#2a2d33"/>
<text x="56" y="386" font-size="9.8" fill="#e6e8ea">Neu da vao day: stop ngan, RR tot,</text>
<text x="56" y="402" font-size="9.8" fill="#40c057" font-weight="bold">dung entry theo mo hinh - khong can</text>
<text x="56" y="418" font-size="9.8" fill="#40c057" font-weight="bold">doi them tin hieu o tang sau.</text>

<!-- RIGHT: chase -->
<rect x="468" y="66" width="404" height="380" rx="6" fill="#202329" stroke="#fa5252"/>
<text x="486" y="90" font-size="12.5" fill="#fa5252" font-weight="bold">B. OB sau (1.1632-1.1642) - dang bi chase</text>
<polyline points="500,120 540,110 580,140 620,190 640,230 655,270 668,300 678,320" fill="none" stroke="#fa5252" stroke-width="2.2"/>
<rect x="650" y="300" width="90" height="35" fill="#2a1f1f" stroke="#f0a500" stroke-width="1.6"/>
<text x="695" y="322" font-size="9" fill="#f0a500" text-anchor="middle">OB tang 2</text>
<circle cx="678" cy="320" r="4" fill="#f0a500"/>
<text x="620" y="350" font-size="9.5" fill="#e6e8ea">Nen cuoi vua cham mep, dong gan day,</text>
<text x="620" y="364" font-size="9.5" fill="#e6e8ea">CHUA co phan ung nguoc (chua reclaim)</text>
<rect x="486" y="368" width="368" height="66" rx="5" fill="#20262b" stroke="#2a2d33"/>
<text x="496" y="386" font-size="9.8" fill="#e6e8ea">Da chay het mot quang duong dai tu dinh</text>
<text x="496" y="402" font-size="9.8" fill="#fa5252" font-weight="bold">sweep. Vao day ma khong co mini sweep +</text>
<text x="496" y="418" font-size="9.8" fill="#fa5252" font-weight="bold">MSS rieng cua tang nay = chase, khong phai retrace.</text>
</svg>
