<text x="44" y="419" font-size="10.8" fill="#9aa0a6">- POI = ca vung (canh duoi -&gt; CE), khong phai 1 duong.</text>
<text x="44" y="436" font-size="10.8" fill="#f0a500">- Dong tren CE = canh bao som | tren FVG High = huy.</text>
