  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Sơ đồ quyết định khi nào rời H1 xuống M15 để quan sát, và khi nào đủ điều kiện xuống M5/M1 để vào lệnh, cho một setup Short sau khi D1 và H1 đã đồng bias Bearish.</desc>

