<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540" font-family="Segoe UI, Arial, sans-serif">
<rect x="0" y="0" width="900" height="540" rx="10" fill="#191b1f"/>
<defs>
<marker id="arB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#9aa0a6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<text x="450" y="26" font-size="14" fill="#e6e8ea" text-anchor="middle" font-weight="600">Re-map Dealing Range Low - Truoc va Sau (minh hoa nguyen ly, khong phai chart that)</text>
<line x1="450" y1="40" x2="450" y2="520" stroke="#2b2f36" stroke-width="1.5"/>

<!-- ============ LEFT PANEL: BEFORE (old range) ============ -->
<text x="30" y="58" font-size="13.5" fill="#fa5252" font-weight="600">TRUOC - Range CU (da het hieu luc)</text>

