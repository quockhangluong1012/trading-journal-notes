<!-- displacement candle -->
<line x1="345" y1="358" x2="345" y2="398" stroke="#40c057" stroke-width="1.8"/><rect x="340" y="362" width="10" height="34" fill="#40c057"/>
<rect x="342" y="368" width="70" height="16" fill="none" stroke="#f0a500" stroke-width="1.1" stroke-dasharray="4 3" rx="3"/>
