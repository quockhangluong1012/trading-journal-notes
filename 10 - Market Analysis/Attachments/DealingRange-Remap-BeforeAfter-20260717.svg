<line x1="72" y1="398" x2="72" y2="418" stroke="#fa5252"/><rect x="68" y="402" width="8" height="12" fill="#fa5252"/>
<line x1="89" y1="392" x2="89" y2="415" stroke="#40c057"/><rect x="85" y="397" width="8" height="13" fill="#40c057"/>
