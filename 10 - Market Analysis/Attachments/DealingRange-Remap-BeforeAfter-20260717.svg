<line x1="330" y1="392" x2="400" y2="392" stroke="#e03131" stroke-width="1.6" stroke-dasharray="6 3"/>
<text x="332" y="406" font-size="10" fill="#e03131">"duong do" - chi la 1 diem giua range CU</text>

<line x1="340" y1="360" x2="340" y2="400" stroke="#40c057" stroke-width="1.6"/><rect x="336" y="365" width="8" height="30" fill="#40c057"/>

<text x="30" y="470" font-size="11" fill="#9aa0a6">Do Premium/Discount tren range CU -&gt; vi tri hien tai</text>
<text x="30" y="484" font-size="11" fill="#9aa0a6">van con nam GIUA range -&gt; khong ro dao/tiep dien.</text>
<text x="30" y="500" font-size="11.5" fill="#fa5252" font-weight="600">SAI: range da het vai tro, con dung so lieu cu.</text>

<!-- ============ RIGHT PANEL: AFTER (new range) ============ -->
<text x="480" y="58" font-size="13.5" fill="#40c057" font-weight="600">SAU - Range MOI (da remap)</text>

