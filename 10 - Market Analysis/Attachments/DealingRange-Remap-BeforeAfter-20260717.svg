<!-- new equilibrium -->
<line x1="150" y1="288" x2="400" y2="288" stroke="#e6e8ea" stroke-width="1" stroke-dasharray="3 3"/>
<text x="360" y="284" font-size="9.5" fill="#e6e8ea">EQ MOI 50%</text>

<!-- premium / discount shading -->
<rect x="150" y="184" width="250" height="104" fill="#fa5252" opacity="0.06"/>
