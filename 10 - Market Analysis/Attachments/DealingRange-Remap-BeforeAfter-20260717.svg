<line x1="274" y1="255" x2="274" y2="300" stroke="#40c057"/><rect x="270" y="262" width="8" height="30" fill="#40c057"/>
<line x1="291" y1="275" x2="291" y2="325" stroke="#fa5252"/><rect x="287" y="282" width="8" height="34" fill="#fa5252"/>
<line x1="308" y1="300" x2="308" y2="345" stroke="#fa5252"/><rect x="304" y="307" width="8" height="30" fill="#fa5252"/>
<line x1="325" y1="330" x2="325" y2="395" stroke="#fa5252"/><rect x="321" y="345" width="8" height="45" fill="#fa5252"/>
</g>

<!-- new DR Low = red line, sweep wick -->
<line x1="330" y1="392" x2="330" y2="405" stroke="#fa5252" stroke-width="1.6"/>
<line x1="325" y1="392" x2="400" y2="392" stroke="#e03131" stroke-width="2"/>
