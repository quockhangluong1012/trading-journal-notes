<g stroke-width="1.1" opacity="0.85">
<line x1="202" y1="195" x2="202" y2="230" stroke="#fa5252"/><rect x="198" y="200" width="8" height="24" fill="#fa5252"/>
<line x1="219" y1="180" x2="219" y2="222" stroke="#40c057"/><rect x="215" y="188" width="8" height="28" fill="#40c057"/>
<line x1="240" y1="205" x2="240" y2="255" stroke="#fa5252"/><rect x="236" y="212" width="8" height="34" fill="#fa5252"/>
