<text x="480" y="470" font-size="11" fill="#9aa0a6">Do lai Premium/Discount tren range MOI (Low=do, High=</text>
<text x="480" y="484" font-size="11" fill="#9aa0a6">swing truoc leg giam) -&gt; vi tri hien tai dang o discount.</text>
<text x="480" y="500" font-size="11.5" fill="#40c057" font-weight="600">DUNG: POI moi (FVG) trung discount range moi.</text>
