<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Protected Low — hai kịch bản: GIỮ (tiếp diễn) vs THỦNG (CHoCH)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Protected Low = ITL/LTL tạo ra ngay trước BOS gần nhất. Nó là "công tắc" bias: còn giữ = bullish còn hiệu lực.</text>

  <!-- ===== Left: hold scenario ===== -->
  <rect x="24" y="70" width="350" height="360" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="38" y="94" font-size="13" font-weight="700" fill="#16A34A">Kịch bản 1 — Protected Low GIỮ</text>

  <polyline points="50,300 95,380 140,250 175,330 230,180 265,260 310,140"
            fill="none" stroke="#374151" stroke-width="2"/>
  <!-- protected low -->
  <circle cx="95" cy="380" r="9" fill="none" stroke="#7C3AED" stroke-width="3"/>
  <line x1="60" y1="392" x2="340" y2="392" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="110" y="408" font-size="11" font-weight="700" fill="#7C3AED">Protected Low (ITL/LTL) — KHÔNG bị đóng nến thủng</text>
  <!-- BOS labels -->
  <line x1="120" y1="250" x2="240" y2="250" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="243" y="254" font-size="10.5" fill="#16A34A">BOS ①</text>
  <line x1="210" y1="180" x2="316" y2="180" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="318" y="184" font-size="10.5" fill="#16A34A">BOS ②</text>
  <!-- pullback annotation -->
  <text x="150" y="345" font-size="10.5" fill="#6B7280">Pullback tạo STL/ITL cao dần</text>
  <text x="150" y="359" font-size="10.5" fill="#6B7280">→ chỉ là nội bộ, KHÔNG đổi bias</text>
  <text x="38" y="120" font-size="11" fill="#374151">Mỗi BOS mới → protected low được "dời lên"</text>
  <text x="38" y="135" font-size="11" fill="#374151">theo ITL gần nhất trước cú phá.</text>

  <!-- ===== Right: break scenario ===== -->
  <rect x="386" y="70" width="350" height="360" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="400" y="94" font-size="13" font-weight="700" fill="#DC2626">Kịch bản 2 — THỦNG protected low = CHoCH</text>

  <polyline points="410,300 445,360 490,220 525,300 570,170 610,280 640,240 675,380"
            fill="none" stroke="#374151" stroke-width="2"/>
  <!-- protected low -->
  <circle cx="525" cy="300" r="8" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
  <line x1="420" y1="312" x2="700" y2="312" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="402" y="330" font-size="10.5" font-weight="700" fill="#7C3AED">Protected Low</text>
  <!-- breaking candle -->
  <rect x="668" y="300" width="2" height="85" fill="#DC2626"/>
  <rect x="662" y="308" width="14" height="66" fill="#DC2626" rx="1"/>
  <text x="600" y="402" font-size="11" font-weight="700" fill="#DC2626">ĐÓNG NẾN thủng (body,</text>
  <text x="600" y="416" font-size="11" font-weight="700" fill="#DC2626">không chỉ wick) + displacement</text>
  <!-- LH label -->
  <text x="628" y="228" font-size="10.5" fill="#DC2626">Lower ITH đầu tiên</text>
  <text x="400" y="120" font-size="11" fill="#374151">CHoCH = cảnh báo, CHƯA phải lệnh Short ngay.</text>
  <text x="400" y="135" font-size="11" fill="#374151">Chờ chuỗi lower ITH + lower ITL xác nhận downtrend mới.</text>
</svg>
