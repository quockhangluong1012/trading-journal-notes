  <text x="574" y="432" font-size="10" fill="#78350F">thay vì cả breaker rộng.</text>

  <!-- bottom -->
  <rect x="24" y="464" width="712" height="80" rx="8" fill="#F3F4F6"/>
  <text x="38" y="488" font-size="12.5" font-weight="700" fill="#1F2937">Why — vì sao Breaker ∩ FVG (Unicorn) mạnh hơn từng thành phần cộng lại?</text>
  <text x="38" y="508" font-size="11" fill="#374151">Breaker nói: "vị thế Long cũ đã kẹt ở đây và bị lật". FVG nói: "nhịp lật đó mạnh tới mức giá không kịp giao dịch hai chiều". Khi hai dấu vết</text>
  <text x="38" y="526" font-size="11" fill="#374151">cùng chỉ về MỘT dải giá hẹp, retest vào đó vừa khớp lệnh người kẹt thoát hàng (bán ra) vừa rebalance inefficiency — hai lực bán cộng hưởng.</text>
