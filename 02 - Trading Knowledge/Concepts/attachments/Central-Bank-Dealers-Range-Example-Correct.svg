  <rect x="138" y="218" width="2" height="26" fill="#16A34A"/><rect x="132" y="224" width="14" height="13" fill="#16A34A" rx="1"/>
  <rect x="164" y="220" width="2" height="26" fill="#DC2626"/><rect x="158" y="226" width="14" height="12" fill="#DC2626" rx="1"/>
  <rect x="190" y="216" width="2" height="28" fill="#16A34A"/><rect x="184" y="222" width="14" height="14" fill="#16A34A" rx="1"/>
