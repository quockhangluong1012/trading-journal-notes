  <rect x="242" y="218" width="2" height="26" fill="#16A34A"/><rect x="236" y="224" width="14" height="12" fill="#16A34A" rx="1"/>
  <rect x="268" y="220" width="2" height="26" fill="#DC2626"/><rect x="262" y="226" width="14" height="13" fill="#DC2626" rx="1"/>

