<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Xác nhận / Vô hiệu hóa — sweep external vs phá range thật</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng chạm range high nhưng hai kết cục ngược nhau — phân xử bằng cách giá ĐÓNG nến</text>

  <!-- LEFT: sweep, range still valid -->
  <rect x="24" y="70" width="352" height="310" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="13" font-weight="700" fill="#15803D">SWEEP external — range CÒN hiệu lực</text>

  <line x1="40" y1="140" x2="340" y2="140" stroke="#DC2626" stroke-width="2"/>
  <text x="44" y="133" font-size="10.5" font-weight="700" fill="#B91C1C">Range High (BSL)</text>
  <line x1="120" y1="195" x2="120" y2="245" stroke="#16A34A" stroke-width="1.5"/><rect x="114" y="200" width="12" height="40" fill="#16A34A"/>
  <line x1="150" y1="152" x2="150" y2="208" stroke="#16A34A" stroke-width="1.5"/><rect x="144" y="160" width="12" height="45" fill="#16A34A"/>
  <line x1="180" y1="118" x2="180" y2="190" stroke="#DC2626" stroke-width="1.5"/><rect x="174" y="165" width="12" height="20" fill="#DC2626"/>
  <line x1="210" y1="170" x2="210" y2="265" stroke="#DC2626" stroke-width="1.5"/><rect x="204" y="175" width="12" height="85" fill="#DC2626"/>
  <text x="192" y="112" font-size="10" font-weight="700" fill="#D97706">lấy BSL (wick)</text>
  <text x="226" y="230" font-size="10" font-weight="700" fill="#B91C1C">displacement ngược ↓</text>
  <text x="226" y="246" font-size="10" fill="#6B7280">đóng LẠI trong range</text>

  <text x="40" y="292" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Wick qua đỉnh/đáy, đóng trở lại trong range</text>
  <text x="40" y="314" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Kèm displacement ngược → tín hiệu đảo chiều</text>
  <text x="40" y="336" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Kỳ vọng: quay về internal đối diện</text>
  <text x="40" y="358" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> KHÔNG vẽ lại — external vừa được "sạc" liquidity</text>

  <!-- RIGHT: real break, re-draw -->
  <rect x="384" y="70" width="352" height="310" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="396" y="94" font-size="13" font-weight="700" fill="#B91C1C">PHÁ range thật — VẼ LẠI range</text>

  <line x1="400" y1="140" x2="700" y2="140" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="404" y="133" font-size="10.5" font-weight="700" fill="#B91C1C">Range High cũ</text>
  <line x1="480" y1="195" x2="480" y2="250" stroke="#16A34A" stroke-width="1.5"/><rect x="474" y="200" width="12" height="45" fill="#16A34A"/>
  <line x1="510" y1="155" x2="510" y2="208" stroke="#16A34A" stroke-width="1.5"/><rect x="504" y="160" width="12" height="45" fill="#16A34A"/>
  <line x1="540" y1="92" x2="540" y2="170" stroke="#16A34A" stroke-width="1.5"/><rect x="534" y="100" width="12" height="65" fill="#16A34A"/>
  <line x1="570" y1="110" x2="570" y2="150" stroke="#DC2626" stroke-width="1.5"/><rect x="564" y="115" width="12" height="20" fill="#DC2626"/>
  <line x1="600" y1="82" x2="600" y2="135" stroke="#16A34A" stroke-width="1.5"/><rect x="594" y="90" width="12" height="40" fill="#16A34A"/>
  <text x="616" y="100" font-size="10" font-weight="700" fill="#D97706">acceptance ↑</text>
  <text x="616" y="116" font-size="10" fill="#6B7280">pullback không reclaim</text>
  <line x1="440" y1="250" x2="660" y2="250" stroke="#0F766E" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="440" y="266" font-size="10" fill="#0F766E">origin của displacement leg → biên dưới range MỚI</text>

  <text x="400" y="292" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Thân nến đóng qua đầu range + giữ acceptance ngoài</text>
  <text x="400" y="314" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Pullback không reclaim lại vào range</text>
  <text x="400" y="336" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> External đã bị lấy → range cũ CHẾT ngay lập tức</text>
  <text x="400" y="358" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Vẽ range mới từ origin displacement, đo lại P/D</text>

  <!-- footer -->
  <rect x="24" y="394" width="712" height="58" rx="8" fill="#FFFFFF" stroke="#D97706"/>
  <text x="40" y="418" font-size="11.5" font-weight="700" fill="#D97706">⚠ Vô hiệu khi: external bị lấy • displacement phá + acceptance ngoài • BOS HTF ngược có ý nghĩa • range sai / sai timeframe</text>
  <text x="40" y="438" font-size="11.5" fill="#374151">Sweep ≠ re-map: chỉ ACCEPTANCE (đóng thân + giữ ngoài) mới buộc vẽ lại range và cascade xuống các range con.</text>
</svg>
