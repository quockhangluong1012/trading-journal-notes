<svg viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="780" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Kill Zone — dòng thời gian 24 giờ (giờ New York)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vị trí các cửa sổ Kill Zone chính trong một ngày giao dịch, cùng giờ Việt Nam tương ứng (mùa hè EDT).</text>

  <rect x="24" y="70" width="732" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Timeline base: 24h mapped 0..24 -> x=50..730 (width 680, 28.33px/hour) -->
  <!-- Hour gridlines every 2h -->
  <g stroke="#F3F4F6" stroke-width="1">
    <line x1="50" y1="110" x2="50" y2="330"/>
    <line x1="107" y1="110" x2="107" y2="330"/>
    <line x1="163" y1="110" x2="163" y2="330"/>
    <line x1="220" y1="110" x2="220" y2="330"/>
    <line x1="277" y1="110" x2="277" y2="330"/>
    <line x1="333" y1="110" x2="333" y2="330"/>
    <line x1="390" y1="110" x2="390" y2="330"/>
    <line x1="447" y1="110" x2="447" y2="330"/>
    <line x1="503" y1="110" x2="503" y2="330"/>
    <line x1="560" y1="110" x2="560" y2="330"/>
    <line x1="617" y1="110" x2="617" y2="330"/>
    <line x1="673" y1="110" x2="673" y2="330"/>
    <line x1="730" y1="110" x2="730" y2="330"/>
  </g>

  <!-- Base axis -->
  <line x1="50" y1="200" x2="730" y2="200" stroke="#D8DBE2" stroke-width="1.5"/>

  <!-- Hour labels (NY time), every 2h starting 00:00 -->
  <g font-size="9" fill="#9CA3AF" text-anchor="middle">
    <text x="50" y="345">00</text>
    <text x="107" y="345">02</text>
    <text x="163" y="345">04</text>
    <text x="220" y="345">06</text>
    <text x="277" y="345">08</text>
    <text x="333" y="345">10</text>
    <text x="390" y="345">12</text>
    <text x="447" y="345">14</text>
    <text x="503" y="345">16</text>
    <text x="560" y="345">18</text>
    <text x="617" y="345">20</text>
    <text x="673" y="345">22</text>
    <text x="730" y="345">24</text>
  </g>
  <text x="390" y="360" font-size="10" fill="#6B7280" text-anchor="middle">Giờ New York (EST/EDT)</text>

  <!-- Kill zone blocks. Scale: x = 50 + hour*28.33 -->
  <!-- Asian Range 20:00-24:00 (=> also wraps from 0, but draw as single block 20-24) -->
  <rect x="616.6" y="120" width="113.4" height="26" rx="4" fill="#6B7280" opacity="0.25" stroke="#6B7280"/>
  <text x="673" y="137" font-size="10" font-weight="700" fill="#374151" text-anchor="middle">Asian Range</text>
  <text x="673" y="108" font-size="9" fill="#6B7280" text-anchor="middle">20:00–00:00</text>

  <!-- London Open KZ 02:00-05:00 -->
  <rect x="107" y="150" width="85" height="26" rx="4" fill="#3B82F6" opacity="0.25" stroke="#3B82F6"/>
  <text x="149.5" y="167" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="middle">London Open KZ</text>
  <text x="149.5" y="138" font-size="9" fill="#1D4ED8" text-anchor="middle">02:00–05:00</text>

  <!-- Silver Bullet London 03:00-04:00 (nested marker) -->
  <rect x="135" y="150" width="28.3" height="26" rx="3" fill="#16A34A" opacity="0.35" stroke="#15803D" stroke-dasharray="2,2"/>

  <!-- NY AM KZ 07:00-10:00 -->
  <rect x="248" y="180" width="85" height="26" rx="4" fill="#16A34A" opacity="0.25" stroke="#16A34A"/>
  <text x="290.5" y="197" font-size="10" font-weight="700" fill="#166534" text-anchor="middle">NY AM KZ</text>
  <text x="290.5" y="168" font-size="9" fill="#166534" text-anchor="middle">07:00–10:00</text>

  <!-- London Close KZ 10:00-12:00 -->
  <rect x="333" y="150" width="56.6" height="26" rx="4" fill="#3B82F6" opacity="0.22" stroke="#3B82F6"/>
  <text x="361" y="196" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="middle">London</text>
  <text x="361" y="207" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="middle">Close KZ</text>
  <text x="361" y="138" font-size="9" fill="#1D4ED8" text-anchor="middle">10:00–12:00</text>

  <!-- Silver Bullet NY 10:00-11:00 -->
  <rect x="333" y="180" width="28.3" height="26" rx="3" fill="#F59E0B" opacity="0.5" stroke="#B45309"/>
  <text x="347" y="230" font-size="8.5" font-weight="700" fill="#92400E" text-anchor="middle">Silver</text>
  <text x="347" y="240" font-size="8.5" font-weight="700" fill="#92400E" text-anchor="middle">Bullet</text>

  <!-- NY Lunch dead zone 11:30-13:00 -->
  <rect x="376.6" y="210" width="43" height="20" rx="4" fill="#DC2626" opacity="0.15" stroke="#DC2626" stroke-dasharray="3,2"/>
  <text x="398" y="248" font-size="8.5" fill="#B91C1C" text-anchor="middle">NY Lunch</text>
  <text x="398" y="258" font-size="8" fill="#B91C1C" text-anchor="middle">(vùng chết)</text>

  <!-- NY PM KZ 13:30-16:00 -->
  <rect x="423" y="180" width="71" height="26" rx="4" fill="#16A34A" opacity="0.18" stroke="#16A34A" stroke-dasharray="1,0"/>
  <text x="458.5" y="197" font-size="9.5" font-weight="700" fill="#166534" text-anchor="middle">NY PM KZ</text>
  <text x="458.5" y="168" font-size="9" fill="#166534" text-anchor="middle">13:30–16:00</text>

  <!-- Vietnam time row -->
  <line x1="50" y1="270" x2="730" y2="270" stroke="#E5E7EB" stroke-width="1"/>
  <text x="52" y="266" font-size="9.5" font-weight="700" fill="#6B7280">Giờ Việt Nam (UTC+7, mùa hè / EDT, lệch +11h)</text>

  <g font-size="9" fill="#6B7280" text-anchor="middle">
    <text x="673" y="288">07:00–11:00</text>
    <text x="149.5" y="288">13:00–16:00</text>
    <text x="290.5" y="288">18:00–21:00</text>
    <text x="361" y="288">21:00–23:00</text>
    <text x="347" y="300">(SB 21:00–22:00)</text>
    <text x="398" y="312">22:30–00:00</text>
    <text x="458.5" y="288">00:30–03:00</text>
  </g>
  <text x="52" y="325" font-size="8.5" fill="#9CA3AF">Asian = tối/đêm VN</text>

  <!-- Legend -->
  <g font-size="9" fill="#374151">
    <rect x="600" y="352" width="10" height="10" fill="#6B7280" opacity="0.35"/>
    <text x="614" y="361">Asian</text>
    <rect x="650" y="352" width="10" height="10" fill="#3B82F6" opacity="0.3"/>
    <text x="664" y="361">London</text>
  </g>
  <g font-size="9" fill="#374151">
    <rect x="24" y="392" width="10" height="10" fill="#16A34A" opacity="0.3"/>
    <text x="38" y="401">NY AM/PM</text>
    <rect x="130" y="392" width="10" height="10" fill="#F59E0B" opacity="0.5"/>
    <text x="144" y="401">Silver Bullet</text>
    <rect x="250" y="392" width="10" height="10" fill="#DC2626" opacity="0.2"/>
    <text x="264" y="401">Vùng chết (lunch)</text>
  </g>
</svg>
