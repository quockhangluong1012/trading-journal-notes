<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ba tầng manipulation leg: session vs daily vs weekly Judas</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Chọn sai quy mô anchor → target chiếu sai lệch quy mô trade</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- shared price path (simplified swings) -->
  <path d="M50,340 L100,300 L140,360 L180,250 L230,320 L280,150 L330,290 L400,90 L470,260 L560,60 L650,220 L700,70"
        fill="none" stroke="#374151" stroke-width="1.8" opacity="0.55"/>

  <!-- Tier 1: session Judas (small, M15) -->
  <circle cx="140" cy="360" r="5" fill="#DC2626"/>
  <circle cx="180" cy="250" r="5" fill="none" stroke="#DC2626" stroke-width="2"/>
  <line x1="140" y1="360" x2="180" y2="360" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 2"/>
  <text x="120" y="378" font-size="9.5" font-weight="700" fill="#B91C1C">① Session Judas (M15)</text>
  <!-- session SD ladder (small, tight) -->
  <line x1="185" y1="290" x2="330" y2="290" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="335" y="294" font-size="9" fill="#B91C1C">-1 SD (session)</text>
  <line x1="185" y1="220" x2="330" y2="220" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="335" y="224" font-size="9" font-weight="700" fill="#B91C1C">-2 SD (session, target intraday)</text>

  <!-- Tier 2: daily Judas (medium, H1) -->
  <circle cx="230" cy="320" r="6" fill="#F59E0B"/>
  <circle cx="280" cy="150" r="6" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <line x1="230" y1="320" x2="280" y2="320" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="200" y="336" font-size="9.5" font-weight="700" fill="#B45309">② Daily Judas (H1)</text>
  <line x1="285" y1="170" x2="470" y2="170" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="475" y="174" font-size="9" fill="#B45309">-1 SD (daily)</text>
  <line x1="285" y1="70" x2="470" y2="70" stroke="#F59E0B" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="475" y="74" font-size="9" font-weight="700" fill="#B45309">-2 SD (daily, target swing 1-2 ngày)</text>

  <!-- Tier 3: weekly Judas (large, H4/D1) -->
  <circle cx="330" cy="290" r="7" fill="#3B82F6"/>
  <circle cx="400" cy="90" r="7" fill="none" stroke="#3B82F6" stroke-width="2.4"/>
  <line x1="330" y1="290" x2="400" y2="290" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="325" y="308" font-size="9.5" font-weight="700" fill="#1D4ED8">③ Weekly Judas (H4/D1)</text>
  <line x1="405" y1="200" x2="700" y2="200" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="600" y="196" font-size="9.5" fill="#1D4ED8">-1 SD (weekly)</text>
  <line x1="405" y1="30" x2="700" y2="30" stroke="#3B82F6" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="590" y="26" font-size="9.5" font-weight="700" fill="#1D4ED8">-2 SD (weekly, target swing đa ngày/tuần)</text>

  <!-- legend box -->
  <rect x="44" y="380" width="672" height="0" fill="none"/>
  <text x="44" y="392" font-size="10" fill="#6B7280">④ Ba anchor cùng tồn tại đồng thời trên một chart — mỗi tầng phục vụ một loại trade khác nhau</text>

  <rect x="24" y="410" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Cùng một thời điểm có thể tồn tại 3 manipulation leg lồng nhau ở 3 khung khác nhau. Neo SD</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">vào leg session cho target intraday nhỏ; neo vào leg daily/weekly cho target swing lớn hơn nhiều.</text>
  <text x="36" y="466" font-size="11.5" font-weight="700" fill="#92400E">Trộn lẫn quy mô anchor với quy mô trade là nguyên nhân phổ biến gây target sai lệch.</text>
</svg>
