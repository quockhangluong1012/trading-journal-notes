<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Giải phẫu RDRB — cặp 2 nến deliver → redeliver (Bullish)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Range nằm GIỮA wick của nến TRƯỚC và nến SAU cặp RDRB — KHÔNG phải trên thân 2 nến RDRB.</text>

  <rect x="24" y="72" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- RDRB range band: between before-candle HIGH (y=215) and after-candle LOW (y=180) -->
  <rect x="110" y="180" width="560" height="35" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.2"/>
  <line x1="110" y1="180" x2="712" y2="180" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="110" y1="215" x2="712" y2="215" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="612" y="203" font-size="11" font-weight="700" fill="#1D4ED8">RDRB range</text>

  <!-- Candle BEFORE (140) -->
  <line x1="140" y1="215" x2="140" y2="300" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="118" y="230" width="44" height="50" fill="#16A34A"/>
  <circle cx="140" cy="215" r="6" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <text x="90" y="332" font-size="11" font-weight="700" fill="#374151">Nến TRƯỚC</text>
  <text x="70" y="164" font-size="10.5" fill="#1D4ED8">wick nến trước (high)</text>
  <line x1="140" y1="216" x2="128" y2="172" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- RDRB candle A (300) : deliver up then pull back, upper wick on close -->
  <line x1="300" y1="150" x2="300" y2="245" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="278" y="200" width="44" height="30" fill="#16A34A"/>
  <text x="256" y="332" font-size="11" font-weight="700" fill="#166534">RDRB #1 (A)</text>
  <text x="240" y="130" font-size="10.5" font-weight="700" fill="#B45309">① deliver ↑ rồi kéo lại</text>
  <line x1="300" y1="150" x2="300" y2="200" stroke="#B45309" stroke-width="3.2" opacity="0.55"/>

  <!-- RDRB candle B (440) : open &amp; redeliver up, close higher -->
  <line x1="440" y1="130" x2="440" y2="205" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="418" y="140" width="44" height="60" fill="#16A34A"/>
  <text x="396" y="332" font-size="11" font-weight="700" fill="#166534">RDRB #2 (B)</text>
  <text x="470" y="128" font-size="10.5" font-weight="700" fill="#166534">② redeliver ↑, đóng cao hơn</text>

  <!-- Candle AFTER (600) -->
  <line x1="600" y1="105" x2="600" y2="180" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="578" y="115" width="44" height="25" fill="#16A34A"/>
  <circle cx="600" cy="180" r="6" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <text x="562" y="332" font-size="11" font-weight="700" fill="#374151">Nến SAU</text>
  <text x="628" y="184" font-size="10.5" fill="#1D4ED8">wick nến sau (low)</text>

  <text x="36" y="398" font-size="11.5" fill="#374151">① Nến A deliver lên rồi kéo lại, để lại UPPER WICK khi đóng nến.</text>
  <text x="36" y="420" font-size="11.5" fill="#374151">② Nến B mở ra &amp; redeliver cùng chiều (lên), đóng ở mức cao hơn — delivery cân bằng, KHÔNG để lại gap.</text>
  <text x="36" y="444" font-size="11.5" font-weight="700" fill="#1D4ED8">③ RDRB range = khoảng giữa WICK nến TRƯỚC (high) và WICK nến SAU (low). KHÔNG đánh dấu trên thân 2 nến RDRB.</text>
</svg>
