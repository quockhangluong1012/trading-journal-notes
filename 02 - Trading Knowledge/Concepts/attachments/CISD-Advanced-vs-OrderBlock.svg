<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="340" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">CISD vs Order Block — LEVEL (đường) vs ZONE (vùng)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">CISD là một MỨC GIÁ (open chuỗi đẩy) dùng làm trigger; Order Block là một VÙNG nến. Chúng thường trùng nhau → confluence mạnh.</text>

  <rect x="24" y="72" width="352" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="96" font-size="13" font-weight="700" fill="#0284C7">CISD = trigger tuyến tính</text>
  <rect x="70" y="150" width="14" height="60" fill="#DC2626"/><rect x="94" y="160" width="14" height="56" fill="#DC2626"/><rect x="118" y="170" width="14" height="56" fill="#DC2626"/>
  <line x1="64" y1="150" x2="356" y2="150" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="7 4"/>
  <text x="150" y="144" font-size="10.5" font-weight="700" fill="#0284C7">CISD level (open nến đầu)</text>
  <rect x="160" y="120" width="14" height="70" fill="#16A34A"/>
  <text x="40" y="250" font-size="11" fill="#374151">• Một đường ngang, dễ đặt alert.</text>
  <text x="40" y="270" font-size="11" fill="#374151">• Trigger = nến đóng qua đường.</text>
  <text x="40" y="290" font-size="11" fill="#374151">• Nhạy → in sớm, cần lọc bằng sweep + POI.</text>

  <rect x="392" y="72" width="344" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="408" y="96" font-size="13" font-weight="700" fill="#B45309">Order Block = vùng phản ứng</text>
  <rect x="440" y="130" width="280" height="46" fill="#FEF3C7" stroke="#F59E0B" stroke-dasharray="4 3"/>
  <text x="450" y="122" font-size="10.5" font-weight="700" fill="#B45309">Vùng OB (thân + wick nến gốc)</text>
  <rect x="470" y="140" width="14" height="36" fill="#DC2626"/>
  <rect x="500" y="120" width="14" height="80" fill="#16A34A"/>
  <text x="408" y="220" font-size="11" fill="#374151">• Một khoảng giá (high–low nến gốc).</text>
  <text x="408" y="240" font-size="11" fill="#374151">• Phản ứng khi giá quay lại chạm vùng.</text>
  <text x="408" y="260" font-size="11" fill="#374151">• Kém chính xác về điểm trigger hơn CISD.</text>

  <rect x="408" y="276" width="312" height="26" rx="5" fill="#DCFCE7"/>
  <text x="416" y="293" font-size="10.5" font-weight="700" fill="#166534">★ Đỉnh cao: OB nằm ngay tại CISD level → entry chính xác + xác nhận cấu trúc.</text>
</svg>
