<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Sweep ≠ BOS — cùng "vượt swing", hai số phận ngược nhau</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Nhìn vào BODY CLOSE và displacement, không nhìn wick. Đây là phân biệt sống còn khi đọc cấu trúc.</text>

  <!-- Left: sweep -->
  <rect x="24" y="70" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="38" y="94" font-size="13" font-weight="700" fill="#DC2626">Liquidity Sweep (bẫy) — wick xuyên, đóng quay lại</text>
  <!-- swing high line -->
  <line x1="50" y1="180" x2="340" y2="180" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="52" y="172" font-size="10.5" fill="#6B7280">Swing high trước (BSL nằm trên)</text>
  <!-- candles rising -->
  <rect x="90" y="240" width="2" height="60" fill="#16A34A"/><rect x="84" y="248" width="14" height="44" fill="#16A34A" rx="1"/>
  <rect x="130" y="205" width="2" height="70" fill="#16A34A"/><rect x="124" y="215" width="14" height="48" fill="#16A34A" rx="1"/>
  <!-- sweep candle: long upper wick above line, body closes below -->
  <rect x="170" y="140" width="2" height="120" fill="#DC2626"/><rect x="164" y="195" width="14" height="55" fill="#DC2626" rx="1"/>
  <circle cx="171" cy="150" r="10" fill="none" stroke="#DC2626" stroke-width="2"/>
  <text x="188" y="150" font-size="10.5" fill="#DC2626">wick lấy BSL rồi bị từ chối</text>
  <!-- reversal down -->
  <rect x="210" y="215" width="2" height="90" fill="#DC2626"/><rect x="204" y="222" width="14" height="72" fill="#DC2626" rx="1"/>
  <rect x="250" y="270" width="2" height="80" fill="#DC2626"/><rect x="244" y="278" width="14" height="60" fill="#DC2626" rx="1"/>
  <text x="38" y="376" font-size="11" fill="#B91C1C" font-weight="700">Body đóng LẠI TRONG range → không phải phá cấu trúc.</text>
  <text x="38" y="392" font-size="11" fill="#6B7280">Đọc là: lấy thanh khoản xong → cảnh giác đảo chiều.</text>

  <!-- Right: BOS -->
  <rect x="386" y="70" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="400" y="94" font-size="13" font-weight="700" fill="#16A34A">BOS thật (đúng degree) — body close + displacement</text>
  <line x1="412" y1="180" x2="700" y2="180" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="414" y="172" font-size="10.5" fill="#6B7280">ITH bị phá (đúng degree đang xét)</text>
  <rect x="450" y="240" width="2" height="60" fill="#16A34A"/><rect x="444" y="248" width="14" height="44" fill="#16A34A" rx="1"/>
  <rect x="490" y="205" width="2" height="70" fill="#16A34A"/><rect x="484" y="215" width="14" height="48" fill="#16A34A" rx="1"/>
  <!-- displacement candle closing well above -->
  <rect x="530" y="120" width="2" height="130" fill="#16A34A"/><rect x="524" y="128" width="14" height="100" fill="#16A34A" rx="1"/>
  <!-- FVG left behind -->
  <rect x="516" y="192" width="120" height="26" fill="#3B82F6" opacity="0.15"/>
  <text x="596" y="209" font-size="10.5" fill="#1D4ED8">FVG để lại</text>
  <!-- continuation -->
  <rect x="570" y="105" width="2" height="70" fill="#16A34A"/><rect x="564" y="112" width="14" height="50" fill="#16A34A" rx="1"/>
  <rect x="610" y="130" width="2" height="55" fill="#DC2626"/><rect x="604" y="136" width="14" height="38" fill="#DC2626" rx="1"/>
  <rect x="650" y="90" width="2" height="70" fill="#16A34A"/><rect x="644" y="98" width="14" height="52" fill="#16A34A" rx="1"/>
  <text x="614" y="200" font-size="10.5" fill="#16A34A" transform="translate(0,-70)">giữ giá, pullback không reclaim</text>
  <text x="400" y="376" font-size="11" fill="#15803D" font-weight="700">Body ĐÓNG HẲN qua swing + để lại FVG → tiếp diễn xác nhận.</text>
  <text x="400" y="392" font-size="11" fill="#6B7280">Protected low mới = ITL cuối trước cú phá; dealing range mở rộng.</text>
</svg>
