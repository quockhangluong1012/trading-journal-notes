<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Trọng lượng Liquidity theo Degree — pool nào đáng làm target?</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Degree càng cao, stop dồn phía dưới/trên swing càng nhiều → sweep tại đó càng có sức đảo chiều / làm target càng "nặng".</text>

  <!-- Price path downtrend into 3 lows of increasing degree -->
  <rect x="24" y="70" width="440" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <polyline points="60,120 110,220 145,170 190,280 230,225 270,350 320,260 360,300 420,180"
            fill="none" stroke="#374151" stroke-width="2"/>

  <!-- STL pool -->
  <circle cx="110" cy="220" r="4" fill="#9CA3AF"/>
  <line x1="92" y1="228" x2="132" y2="228" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="88" y="245" font-size="10.5" fill="#B45309">SSL nhỏ (dưới STL)</text>

  <!-- ITL pool -->
  <circle cx="190" cy="280" r="7" fill="none" stroke="#2563EB" stroke-width="2.5"/>
  <line x1="165" y1="290" x2="219" y2="290" stroke="#F59E0B" stroke-width="3.5" stroke-dasharray="5 3"/>
  <text x="152" y="308" font-size="11" font-weight="700" fill="#B45309">SSL trung bình (dưới ITL)</text>

  <!-- LTL pool -->
  <circle cx="270" cy="350" r="11" fill="none" stroke="#7C3AED" stroke-width="3"/>
  <line x1="235" y1="364" x2="308" y2="364" stroke="#F59E0B" stroke-width="6" stroke-dasharray="6 3"/>
  <text x="216" y="384" font-size="12" font-weight="700" fill="#B45309">SSL LỚN (dưới LTL) — pool "nặng" nhất</text>

  <text x="40" y="94" font-size="12" font-weight="700" fill="#1F2937">Ba đáy — ba trọng lượng liquidity khác nhau</text>
  <text x="300" y="180" font-size="10.5" fill="#6B7280">Sweep LTL → phản ứng đảo chiều</text>
  <text x="300" y="194" font-size="10.5" fill="#6B7280">mạnh nhất, mở leg lớn nhất</text>

  <!-- Right panel: usage table -->
  <rect x="480" y="70" width="256" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="494" y="96" font-size="13" font-weight="700" fill="#1F2937">Cách dùng theo degree</text>

  <rect x="494" y="110" width="228" height="88" rx="6" fill="#F3F4F6"/>
  <text x="504" y="130" font-size="12" font-weight="700" fill="#4B5563">Short Term (STL/STH)</text>
  <text x="504" y="148" font-size="10.5" fill="#374151">• Execution LTF (M1–M5)</text>
  <text x="504" y="163" font-size="10.5" fill="#374151">• Stop logic sau swing thật</text>
  <text x="504" y="178" font-size="10.5" fill="#374151">• Inducement / sweep nội bộ</text>
  <text x="504" y="193" font-size="10.5" fill="#B91C1C">✗ KHÔNG dùng đo BOS xu hướng</text>

  <rect x="494" y="206" width="228" height="88" rx="6" fill="#DBEAFE"/>
  <text x="504" y="226" font-size="12" font-weight="700" fill="#1E40AF">Intermediate (ITL/ITH)</text>
  <text x="504" y="244" font-size="10.5" fill="#374151">• Dealing range thực (M15–H1)</text>
  <text x="504" y="259" font-size="10.5" fill="#374151">• BOS/MSS có ý nghĩa</text>
  <text x="504" y="274" font-size="10.5" fill="#374151">• Target internal liquidity</text>
  <text x="504" y="289" font-size="10.5" fill="#1E40AF">✓ Khung "làm việc" chính</text>

  <rect x="494" y="302" width="228" height="88" rx="6" fill="#EDE9FE"/>
  <text x="504" y="322" font-size="12" font-weight="700" fill="#5B21B6">Long Term (LTL/LTH)</text>
  <text x="504" y="340" font-size="10.5" fill="#374151">• Protected high/low của bias</text>
  <text x="504" y="355" font-size="10.5" fill="#374151">• External liquidity / draw chính</text>
  <text x="504" y="370" font-size="10.5" fill="#374151">• Invalidation của cả narrative</text>
  <text x="504" y="385" font-size="10.5" fill="#5B21B6">✓ Khung "phán quyết" bias</text>

  <text x="494" y="410" font-size="10" fill="#6B7280">Degree tương đối với timeframe quan sát —</text>
  <text x="494" y="424" font-size="10" fill="#6B7280">thứ bậc (cái gom cái) mới là điều cố định.</text>
</svg>
