<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Liquidity Void — các thành phần chuẩn</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Điểm sweep, dải displacement, FVG con bên trong, CE, và cụm thanh khoản làm target.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- sweep point -->
  <line x1="60" y1="360" x2="220" y2="360" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <path d="M70,300 L110,340 L150,362" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="150" cy="362" r="7" fill="#B45309"/>
  <text x="60" y="380" font-size="10.5" font-weight="700" fill="#92400E">① Điểm sweep — "nhiên liệu" tạo void</text>

  <!-- displacement candle stack forming void -->
  <g>
    <rect x="200" y="300" width="18" height="60" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="207" y="292" width="4" height="76" fill="#15803D"/>
    <rect x="228" y="252" width="18" height="56" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="235" y="244" width="4" height="72" fill="#15803D"/>
    <rect x="256" y="206" width="18" height="52" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="263" y="198" width="4" height="68" fill="#15803D"/>
    <rect x="284" y="164" width="18" height="48" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="291" y="156" width="4" height="64" fill="#15803D"/>
  </g>
  <text x="200" y="148" font-size="10.5" font-weight="700" fill="#15803D">② Dải displacement thiếu overlap</text>

  <!-- void envelope -->
  <rect x="196" y="164" width="112" height="196" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="314" y="172" font-size="10" font-weight="700" fill="#B45309">void_high</text>
  <text x="314" y="356" font-size="10" font-weight="700" fill="#B45309">void_low</text>

  <!-- internal FVGs -->
  <rect x="204" y="252" width="42" height="56" fill="#3B82F6" opacity="0.12" stroke="#1D4ED8" stroke-dasharray="3 2"/>
  <rect x="252" y="206" width="42" height="52" fill="#3B82F6" opacity="0.12" stroke="#1D4ED8" stroke-dasharray="3 2"/>
  <text x="330" y="230" font-size="9.5" fill="#1D4ED8">③ FVG con bên trong void</text>

  <!-- CE line -->
  <line x1="196" y1="262" x2="308" y2="262" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="330" y="266" font-size="10" font-weight="700" fill="#B91C1C">④ CE — 50% fill zone (retest kỳ vọng)</text>

  <!-- full fill zone marker near void_low -->
  <rect x="196" y="310" width="112" height="50" fill="#DC2626" opacity="0.06"/>
  <text x="330" y="345" font-size="9.5" fill="#B91C1C">Full-fill zone (hiếm khi cần thiết)</text>

  <!-- far liquidity target -->
  <line x1="304" y1="164" x2="716" y2="164" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <path d="M300,164 L400,120 L500,100 L620,80" fill="none" stroke="#16A34A" stroke-width="2.2" stroke-dasharray="2 2"/>
  <circle cx="620" cy="80" r="7" fill="#16A34A"/>
  <text x="560" y="70" font-size="10.5" font-weight="700" fill="#166534">⑤ Cụm thanh khoản phía xa — target</text>

  <rect x="24" y="410" width="712" height="52" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Dùng sơ đồ này làm khuôn mẫu: mỗi void cần xác định rõ 2 biên, các FVG con, CE, và</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">target phía xa — trước khi coi nó là draw on liquidity đáng trade.</text>
</svg>
