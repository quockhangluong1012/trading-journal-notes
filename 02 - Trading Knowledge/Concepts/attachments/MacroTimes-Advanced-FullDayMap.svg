<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bản đồ Macro Times trong một ngày giao dịch (giờ New York/ET)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Killzone là dải phiên rộng; macro là những cửa sổ hẹp ~5-20 phút bên trong. Sao vàng = macro xác suất cao nhất (10:10).</text>

  <rect x="24" y="72" width="712" height="378" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- timeline axis -->
  <line x1="70" y1="410" x2="710" y2="410" stroke="#374151" stroke-width="2"/>
  <text x="60" y="432" font-size="10.5" fill="#6B7280">00:00</text>
  <text x="180" y="432" font-size="10.5" fill="#6B7280">02:00</text>
  <text x="300" y="432" font-size="10.5" fill="#6B7280">05:00</text>
  <text x="400" y="432" font-size="10.5" fill="#6B7280">08:00</text>
  <text x="510" y="432" font-size="10.5" fill="#6B7280">11:00</text>
  <text x="610" y="432" font-size="10.5" fill="#6B7280">13:00</text>
  <text x="690" y="432" font-size="10.5" fill="#6B7280">16:00</text>

  <!-- session bands -->
  <rect x="70" y="96" width="110" height="26" rx="4" fill="#E5E7EB"/>
  <text x="82" y="113" font-size="11" font-weight="700" fill="#4B5563">ASIA (tích luỹ)</text>
  <rect x="180" y="96" width="120" height="26" rx="4" fill="#DBEAFE"/>
  <text x="196" y="113" font-size="11" font-weight="700" fill="#1E40AF">LONDON KZ</text>
  <rect x="400" y="96" width="150" height="26" rx="4" fill="#DCFCE7"/>
  <text x="430" y="113" font-size="11" font-weight="700" fill="#166534">NEW YORK AM KZ</text>
  <rect x="550" y="96" width="60" height="26" rx="4" fill="#FEF3C7"/>
  <text x="558" y="113" font-size="10" font-weight="700" fill="#92400E">LUNCH</text>
  <rect x="610" y="96" width="100" height="26" rx="4" fill="#EDE9FE"/>
  <text x="628" y="113" font-size="11" font-weight="700" fill="#5B21B6">NY PM KZ</text>

  <!-- Asia: no macro -->
  <text x="82" y="150" font-size="10.5" fill="#9CA3AF">Không có macro</text>
  <text x="82" y="164" font-size="10.5" fill="#9CA3AF">→ không trade</text>

  <!-- macro markers: vertical lines with labels -->
  <!-- London 02:33 -->
  <line x1="200" y1="130" x2="200" y2="410" stroke="#1D4ED8" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="185" y="185" font-size="10" font-weight="700" fill="#1D4ED8">02:33</text>
  <text x="150" y="199" font-size="9" fill="#6B7280">-03:00</text>
  <!-- London 04:03 -->
  <line x1="255" y1="130" x2="255" y2="410" stroke="#1D4ED8" stroke-width="2"/>
  <text x="240" y="220" font-size="10" font-weight="700" fill="#1D4ED8">04:03</text>
  <text x="230" y="234" font-size="9" fill="#6B7280">-04:30 (FX/Gold)</text>

  <!-- NY AM 08:50 -->
  <line x1="420" y1="130" x2="420" y2="410" stroke="#166534" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="404" y="185" font-size="10" font-weight="700" fill="#166534">08:50</text>
  <!-- 09:50 -->
  <line x1="460" y1="130" x2="460" y2="410" stroke="#166534" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="444" y="200" font-size="10" font-weight="700" fill="#166534">09:50</text>
  <!-- 10:10 STAR -->
  <line x1="500" y1="130" x2="500" y2="410" stroke="#DC2626" stroke-width="2.5"/>
  <text x="480" y="220" font-size="11" font-weight="700" fill="#DC2626">10:10 Silver Bullet</text>
  <path d="M500,140 l4,9 10,1 -7,7 2,10 -9,-5 -9,5 2,-10 -7,-7 10,-1 z" fill="#F59E0B" stroke="#D97706" stroke-width="0.8"/>
  <!-- 10:50 -->
  <line x1="535" y1="150" x2="535" y2="410" stroke="#166534" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="519" y="240" font-size="10" font-weight="700" fill="#166534">10:50</text>

  <!-- Lunch 11:50 -->
  <line x1="575" y1="150" x2="575" y2="410" stroke="#92400E" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="559" y="260" font-size="10" font-weight="700" fill="#92400E">11:50</text>

  <!-- PM 13:10 -->
  <line x1="620" y1="150" x2="620" y2="410" stroke="#5B21B6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="604" y="185" font-size="10" font-weight="700" fill="#5B21B6">13:10</text>
  <!-- 14:50 -->
  <line x1="660" y1="150" x2="660" y2="410" stroke="#5B21B6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="644" y="205" font-size="10" font-weight="700" fill="#5B21B6">14:50</text>
  <!-- 15:15 -->
  <line x1="695" y1="150" x2="695" y2="410" stroke="#5B21B6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="672" y="225" font-size="10" font-weight="700" fill="#5B21B6">15:15</text>

  <!-- legend -->
  <rect x="70" y="335" width="330" height="60" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="82" y="354" font-size="10.5" font-weight="700" fill="#374151">Bộ 9 macro cổ điển (ET):</text>
  <text x="82" y="370" font-size="9.5" fill="#4B5563">London 02:33-03:00 · 04:03-04:30 | NY AM 08:50-09:10 · 09:50-10:10 · 10:50-11:10</text>
  <text x="82" y="385" font-size="9.5" fill="#4B5563">Lunch 11:50-12:10 | NY PM 13:10-13:40 · 14:50-15:10 · 15:15-15:45</text>
</svg>