<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bản đồ Macro Times trong ngày (giờ New York / ET)</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Macro nằm BÊN TRONG killzone — là những cửa sổ ~5–20 phút thuật toán thực sự "khai hỏa".</text>
<rect x="24" y="86" width="712" height="60" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><rect x="40" y="92" width="80" height="30" fill="#E5E7EB" stroke="#CBD5E1"/><text x="80" y="112" font-size="10" fill="#334155" text-anchor="middle">Asian (tích lũy)</text><rect x="130" y="92" width="120" height="30" fill="#DBEAFE" stroke="#CBD5E1"/><text x="190" y="112" font-size="10" fill="#334155" text-anchor="middle">London KZ</text><rect x="260" y="92" width="210" height="30" fill="#DCFCE7" stroke="#CBD5E1"/><text x="365" y="112" font-size="10" fill="#334155" text-anchor="middle">NY AM KZ</text><rect x="480" y="92" width="80" height="30" fill="#FEF9C3" stroke="#CBD5E1"/><text x="520" y="112" font-size="10" fill="#334155" text-anchor="middle">NY Lunch</text><rect x="570" y="92" width="150" height="30" fill="#FCE7F3" stroke="#CBD5E1"/><text x="645" y="112" font-size="10" fill="#334155" text-anchor="middle">NY PM KZ</text><text x="24" y="138" font-size="10" fill="#94A3B8">Trục thời gian (không theo tỉ lệ) — dải rộng = killzone; vạch đỏ = macro.</text><rect x="24" y="160" width="712" height="290" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="186" font-size="13" font-weight="700" fill="#1F2937">9 Macro cổ điển của ICT (ET):</text><circle cx="48" cy="202" r="4" fill="#1D4ED8"/><text x="62" y="206" font-size="11.5" font-weight="700" fill="#111827">London 1</text><text x="150" y="206" font-size="11.5" fill="#374151">02:33 – 03:00</text><text x="280" y="206" font-size="11" fill="#4B5563">Judas London bắt đầu</text><circle cx="48" cy="228" r="4" fill="#1D4ED8"/><text x="62" y="232" font-size="11.5" font-weight="700" fill="#111827">London 2</text><text x="150" y="232" font-size="11.5" fill="#374151">04:03 – 04:30</text><text x="280" y="232" font-size="11" fill="#4B5563">★ Cửa sổ London xác suất cao nhất (forex/vàng)</text><circle cx="48" cy="254" r="4" fill="#16A34A"/><text x="62" y="258" font-size="11.5" font-weight="700" fill="#111827">NY AM 1</text><text x="150" y="258" font-size="11.5" fill="#374151">08:50 – 09:10</text><text x="280" y="258" font-size="11" fill="#4B5563">Hoàn tất range pre-market, set BSL/SSL</text><circle cx="48" cy="280" r="4" fill="#15803D"/><text x="62" y="284" font-size="11.5" font-weight="700" fill="#111827">NY AM 2</text><text x="150" y="284" font-size="11.5" fill="#374151">09:50 – 10:10</text><text x="280" y="284" font-size="11" fill="#4B5563">★ Lõi Silver Bullet (NQ/ES) — MSS + FVG entry</text><circle cx="48" cy="306" r="4" fill="#16A34A"/><text x="62" y="310" font-size="11.5" font-weight="700" fill="#111827">NY AM 3</text><text x="150" y="310" font-size="11.5" fill="#374151">10:50 – 11:10</text><text x="280" y="310" font-size="11" fill="#4B5563">Kết thúc phân phối buổi sáng, T1 IRL</text><circle cx="48" cy="332" r="4" fill="#B45309"/><text x="62" y="336" font-size="11.5" font-weight="700" fill="#111827">NY Lunch</text><text x="150" y="336" font-size="11.5" fill="#374151">11:50 – 12:10</text><text x="280" y="336" font-size="11" fill="#4B5563">Thanh khoản thấp, dễ bẫy</text><circle cx="48" cy="358" r="4" fill="#BE185D"/><text x="62" y="362" font-size="11.5" font-weight="700" fill="#111827">NY PM 1</text><text x="150" y="362" font-size="11.5" fill="#374151">13:10 – 13:40</text><text x="280" y="362" font-size="11" fill="#4B5563">Bắt đầu chu kỳ phân phối buổi chiều</text><circle cx="48" cy="384" r="4" fill="#BE185D"/><text x="62" y="388" font-size="11.5" font-weight="700" fill="#111827">NY PM 2</text><text x="150" y="388" font-size="11.5" fill="#374151">14:50 – 15:10</text><text x="280" y="388" font-size="11" fill="#4B5563">Repricing chiều; FOMC = macro biến động nhất năm</text><circle cx="48" cy="410" r="4" fill="#BE185D"/><text x="62" y="414" font-size="11.5" font-weight="700" fill="#111827">NY PM 3</text><text x="150" y="414" font-size="11.5" fill="#374151">15:15 – 15:45</text><text x="280" y="414" font-size="11" fill="#4B5563">Macro đóng cửa, hướng về ERL/đóng tuần</text>
