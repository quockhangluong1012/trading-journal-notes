<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Đồng pha đa khung — HTF CHoCH cho HƯỚNG, LTF CHoCH cho THỜI ĐIỂM</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">HTF flip bias trước; LTF chỉ để timing entry đồng pha tại HTF POI sau sweep.</text>

  <!-- LEFT: HTF -->
  <rect x="24" y="72" width="348" height="298" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.6"/>
  <rect x="24" y="72" width="348" height="30" rx="8" fill="#1D4ED8"/>
  <text x="198" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">HTF (D1 / H4) — CHoCH cho HƯỚNG</text>

  <!-- downtrend then bullish CHoCH -->
  <path d="M50,150 L95,225 L125,180 L170,270 L205,225 L245,320" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="60" y="140" font-size="10" fill="#6B7280">downtrend LH/LL</text>
  <!-- protected lower-high -->
  <circle cx="205" cy="225" r="5" fill="none" stroke="#1D4ED8" stroke-width="2"/>
  <line x1="205" y1="225" x2="352" y2="225" stroke="#1D4ED8" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="120" y="218" font-size="9" fill="#1D4ED8">protected lower-high</text>
  <!-- sweep SSL -->
  <circle cx="245" cy="320" r="7" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="205" y="340" font-size="9" fill="#B45309">sweep SSL discount</text>
  <!-- bullish displacement break up -->
  <path d="M245,320 L285,245 L300,262 L340,150" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <rect x="330" y="200" width="12" height="55" fill="#16A34A" rx="1"/>
  <text x="150" y="360" font-size="10.5" font-weight="700" fill="#15803D">HTF CHoCH: body close qua protected LH → FLIP BIAS sang bull</text>

  <!-- RIGHT: LTF -->
  <rect x="388" y="72" width="348" height="298" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="388" y="72" width="348" height="30" rx="8" fill="#16A34A"/>
  <text x="562" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">LTF (M5 / M1) — CHoCH cho THỜI ĐIỂM</text>

  <!-- HTF POI zone -->
  <rect x="408" y="230" width="308" height="60" fill="#3B82F6" opacity="0.06"/>
  <text x="414" y="246" font-size="9.5" fill="#1D4ED8">giá retrace về HTF POI (bullish FVG)</text>
  <!-- micro downtrend into POI -->
  <path d="M410,150 L445,215 L470,190 L505,255 L540,225 L575,285" fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- LTF sweep -->
  <circle cx="575" cy="285" r="7" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="540" y="305" font-size="9" fill="#B45309">LTF sweep low</text>
  <!-- LTF micro lower-high -->
  <circle cx="540" cy="225" r="4" fill="none" stroke="#16A34A" stroke-width="1.8"/>
  <line x1="540" y1="225" x2="716" y2="225" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="5 3"/>
  <!-- LTF bullish CHoCH break up -->
  <path d="M575,285 L610,225 L625,240 L680,150" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <circle cx="625" cy="255" r="6" fill="#16A34A"/>
  <text x="440" y="330" font-size="10.5" font-weight="700" fill="#15803D">LTF CHoCH đồng pha HTF tại POI → entry Long</text>
  <text x="440" y="346" font-size="10" fill="#6B7280">đúng thứ tự: HTF flip → retrace POI → LTF sweep → LTF CHoCH</text>

  <rect x="24" y="378" width="712" height="52" rx="6" fill="#FEF3C7"/>
  <text x="36" y="398" font-size="11.5" font-weight="700" fill="#92400E">CẢNH BÁO: LTF CHoCH ngược HTF khi HTF CHƯA CHoCH = pullback nội bộ, KHÔNG trade reversal.</text>
  <text x="36" y="416" font-size="11.5" font-weight="700" fill="#92400E">Một CHoCH M1 không phủ định trend D1. Chỉ trade khi HTF đã flip và LTF xác nhận đồng pha.</text>
</svg>
