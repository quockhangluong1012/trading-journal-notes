<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">FVG thuật toán vs FVG news candle — cùng hình dạng, khác hẳn "chất liệu"</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Gap sinh từ displacement có cấu trúc được respect tại CE; gap sinh từ spike tin là vùng "chân không" — giá cắt xuyên như không có gì.</text>

  <!-- LEFT: algo FVG -->
  <rect x="24" y="72" width="352" height="366" rx="8" fill="#FFFFFF" stroke="#86EFAC"/>
  <text x="40" y="96" font-size="13" font-weight="800" fill="#15803D">✓ FVG từ displacement có cấu trúc</text>

  <!-- candles: sweep, displacement, continuation -->
  <line x1="70" y1="290" x2="70" y2="360" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="64" y="296" width="12" height="40" fill="#DC2626"/>
  <line x1="96" y1="310" x2="96" y2="386" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="90" y="316" width="12" height="24" fill="#16A34A"/>
  <text x="60" y="402" font-size="9.5" fill="#6B7280">sweep SSL trước</text>
  <!-- displacement candle -->
  <line x1="122" y1="180" x2="122" y2="330" stroke="#16A34A" stroke-width="1.8"/>
  <rect x="115" y="188" width="15" height="128" fill="#16A34A"/>
  <!-- candle 3 -->
  <line x1="148" y1="150" x2="148" y2="212" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="142" y="158" width="12" height="46" fill="#16A34A"/>

  <!-- FVG zone -->
  <rect x="134" y="252" width="200" height="40" fill="#86EFAC" opacity="0.4"/>
  <line x1="134" y1="272" x2="334" y2="272" stroke="#15803D" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="234" y="266" font-size="10" font-weight="700" fill="#166534">CE</text>

  <!-- retrace respecting CE -->
  <polyline points="160,170 190,220 214,204 244,268 268,272 292,236 316,180 336,150"
            fill="none" stroke="#1F2937" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="268" cy="272" r="5" fill="#16A34A"/>
  <text x="212" y="312" font-size="10" font-weight="700" fill="#15803D">chạm CE → reject → chạy tiếp</text>

  <text x="40" y="352" font-size="10" fill="#374151">• có sweep đứng trước, displacement phá cấu trúc</text>
  <text x="40" y="368" font-size="10" fill="#374151">• gap = dấu vết lệnh thật của thuật toán tại mức giá đó</text>
  <text x="40" y="384" font-size="10" fill="#374151">• CE được phòng thủ vì có position thật cần bảo vệ</text>

  <!-- RIGHT: news FVG -->
  <rect x="386" y="72" width="352" height="366" rx="8" fill="#FFFFFF" stroke="#FCA5A5"/>
  <text x="402" y="96" font-size="13" font-weight="800" fill="#B91C1C">✗ FVG từ news spike (CPI/NFP/FOMC)</text>

  <!-- spread band -->
  <rect x="452" y="120" width="52" height="280" fill="#FB923C" opacity="0.15"/>

  <!-- pre-news candles -->
  <line x1="428" y1="300" x2="428" y2="340" stroke="#9CA3AF" stroke-width="1.5"/>
  <rect x="422" y="308" width="11" height="22" fill="#9CA3AF"/>
  <!-- news candle: giant -->
  <line x1="478" y1="140" x2="478" y2="392" stroke="#16A34A" stroke-width="2"/>
  <rect x="470" y="150" width="16" height="220" fill="#16A34A"/>
  <text x="490" y="146" font-size="10" font-weight="700" fill="#C2410C">nến tin 8:30</text>
  <!-- candle 3 -->
  <line x1="510" y1="120" x2="510" y2="176" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="504" y="128" width="12" height="40" fill="#16A34A"/>

  <!-- news FVG zone (wide) -->
  <rect x="496" y="210" width="196" height="70" fill="#FCA5A5" opacity="0.32"/>
  <line x1="496" y1="245" x2="692" y2="245" stroke="#B91C1C" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="600" y="240" font-size="10" font-weight="700" fill="#B91C1C">CE</text>

  <!-- price slicing through -->
  <polyline points="524,140 550,196 574,182 600,250 622,232 648,312 672,296 700,360"
            fill="none" stroke="#1F2937" stroke-width="2" stroke-linejoin="round"/>
  <text x="560" y="336" font-size="10" font-weight="700" fill="#B91C1C">cắt xuyên CE và cả gap — không phản ứng</text>

  <text x="402" y="368" font-size="10" fill="#7F1D1D">• gap in ra trong lúc spread giãn / quote đóng băng —</text>
  <text x="402" y="382" font-size="10" fill="#7F1D1D">  KHÔNG có lệnh thuật toán thật nằm ở các mức bên trong</text>
  <text x="402" y="396" font-size="10" fill="#7F1D1D">• vùng "chân không": không ai phòng thủ CE của nó</text>
  <text x="402" y="412" font-size="10" fill="#7F1D1D">• chỉ dùng được sau khi giá RE-DELIVER qua vùng này</text>
  <text x="402" y="426" font-size="10" fill="#7F1D1D">  bằng displacement có cấu trúc (tự tay xác nhận lại)</text>
</svg>
