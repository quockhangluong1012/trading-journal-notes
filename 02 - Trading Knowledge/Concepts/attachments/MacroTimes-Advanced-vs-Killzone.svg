<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="340" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Killzone ≠ Macro Time</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Killzone = khung phiên rộng (được phép trade). Macro = phút chính xác bên trong (thuật toán bóp cò).</text>
<rect x="24" y="80" width="712" height="90" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="104" font-size="12.5" font-weight="700" fill="#1F2937">NY AM Killzone (08:30 – 11:00 ET)</text><rect x="40" y="116" width="680" height="34" rx="4" fill="#DCFCE7" stroke="#86EFAC"/><rect x="120" y="116" width="26" height="34" fill="#DC2626" opacity="0.75"/><text x="133" y="164" font-size="10" fill="#991B1B" text-anchor="middle">08:50</text><rect x="360" y="116" width="26" height="34" fill="#DC2626" opacity="0.75"/><text x="373" y="164" font-size="10" fill="#991B1B" text-anchor="middle">09:50</text><rect x="470" y="116" width="26" height="34" fill="#DC2626" opacity="0.75"/><text x="483" y="164" font-size="10" fill="#991B1B" text-anchor="middle">10:10</text><rect x="600" y="116" width="26" height="34" fill="#DC2626" opacity="0.75"/><text x="613" y="164" font-size="10" fill="#991B1B" text-anchor="middle">10:50</text><text x="470" y="108" font-size="10.5" fill="#6B7280">← các dải đỏ hẹp = macro; khoảng giữa thường chỉ là drift</text><rect x="24" y="188" width="712" height="128" rx="6" fill="#F8FAFC" stroke="#E5E7EB"/><text x="40" y="214" font-size="12.5" font-weight="700" fill="#334155">Hệ quả thực chiến</text><text x="40" y="240" font-size="11.5" fill="#374151">• Giá KHÔNG di chuyển đều trong suốt killzone.</text><text x="40" y="262" font-size="11.5" fill="#374151">• Phần lớn displacement dồn vào 5–15 phút quanh macro.</text><text x="40" y="284" font-size="11.5" fill="#374151">• Đánh dấu macro bằng đường dọc, chỉ tập trung ±5 phút — giảm ~60% thời gian nhìn màn hình.</text><text x="40" y="306" font-size="11.5" fill="#374151">• Macro dùng để TINH CHỈNH bên trong killzone, KHÔNG thay thế phân tích killzone.</text>
</svg>
