<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Breaker = MỒI NHỬ (bait) — Reaper IFVG = BẪY / ENTRY THẬT (trap)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Gần như cùng một chỗ nhưng giao dịch khác hẳn: đám đông vào Breaker → bị thu; tổ chức lấp tại Reaper.</text>

  <rect x="24" y="70" width="712" height="316" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- equilibrium -->
  <line x1="40" y1="238" x2="720" y2="238" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="646" y="233" font-size="9.5" fill="#9CA3AF">Equilibrium 50%</text>
  <text x="40" y="150" font-size="10" font-weight="700" fill="#B45309">PREMIUM</text>
  <text x="40" y="340" font-size="10" font-weight="700" fill="#166534">DISCOUNT</text>

  <!-- Breaker band (bait) -->
  <rect x="180" y="176" width="520" height="24" fill="#FDE68A" opacity="0.55" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="430" y="171" font-size="10.5" font-weight="700" fill="#B45309">Breaker Block = MỒI NHỬ (đám đông vào long ở đây)</text>

  <!-- Reaper IFVG band (trap) -->
  <rect x="300" y="278" width="400" height="34" fill="#DBEAFE" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="430" y="304" font-size="10.5" font-weight="700" fill="#1D4ED8">Reaper IFVG = BẪY / ENTRY THẬT (tổ chức lấp ở đây)</text>

  <!-- prev highs -->
  <line x1="300" y1="120" x2="716" y2="120" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="590" y="114" font-size="9.5" fill="#166534">Prev highs / BSL</text>

  <!-- up leg (green) -->
  <line x1="80" y1="320" x2="80" y2="360" stroke="#16A34A" stroke-width="1.4"/><rect x="74.5" y="330" width="11" height="26" fill="#16A34A"/>
  <line x1="102" y1="240" x2="102" y2="330" stroke="#16A34A" stroke-width="1.4"/><rect x="96.5" y="252" width="11" height="70" fill="#16A34A"/>
  <line x1="124" y1="200" x2="124" y2="264" stroke="#16A34A" stroke-width="1.4"/><rect x="118.5" y="210" width="11" height="46" fill="#16A34A"/>
  <line x1="146" y1="172" x2="146" y2="222" stroke="#16A34A" stroke-width="1.4"/><rect x="140.5" y="182" width="11" height="32" fill="#16A34A"/>
  <line x1="168" y1="150" x2="168" y2="196" stroke="#16A34A" stroke-width="1.4"/><rect x="162.5" y="160" width="11" height="26" fill="#16A34A"/>
  <!-- retrace: crowd enters at breaker, price runs through (red) -->
  <line x1="200" y1="150" x2="200" y2="200" stroke="#DC2626" stroke-width="1.4"/><rect x="194.5" y="160" width="11" height="30" fill="#DC2626"/>
  <line x1="222" y1="176" x2="222" y2="230" stroke="#DC2626" stroke-width="1.4"/><rect x="216.5" y="186" width="11" height="38" fill="#DC2626"/>
  <line x1="244" y1="200" x2="244" y2="258" stroke="#DC2626" stroke-width="1.4"/><rect x="238.5" y="210" width="11" height="42" fill="#DC2626"/>
  <line x1="266" y1="228" x2="266" y2="288" stroke="#DC2626" stroke-width="1.4"/><rect x="260.5" y="238" width="11" height="46" fill="#DC2626"/>
  <line x1="288" y1="252" x2="288" y2="314" stroke="#DC2626" stroke-width="1.4"/><rect x="282.5" y="262" width="11" height="48" fill="#DC2626"/>
  <!-- support at reaper, reverse up (green) -->
  <line x1="310" y1="272" x2="310" y2="318" stroke="#16A34A" stroke-width="1.4"/><rect x="304.5" y="284" width="11" height="26" fill="#16A34A"/>
  <line x1="332" y1="220" x2="332" y2="300" stroke="#16A34A" stroke-width="1.4"/><rect x="326.5" y="232" width="11" height="58" fill="#16A34A"/>
  <line x1="354" y1="180" x2="354" y2="248" stroke="#16A34A" stroke-width="1.4"/><rect x="348.5" y="190" width="11" height="48" fill="#16A34A"/>
  <line x1="376" y1="148" x2="376" y2="208" stroke="#16A34A" stroke-width="1.4"/><rect x="370.5" y="158" width="11" height="40" fill="#16A34A"/>
  <line x1="398" y1="122" x2="398" y2="172" stroke="#16A34A" stroke-width="1.4"/><rect x="392.5" y="132" width="11" height="30" fill="#16A34A"/>

  <!-- crowd stopped marker -->
  <text x="205" y="150" font-size="14" font-weight="700" fill="#B91C1C">✕</text>
  <text x="150" y="404" font-size="10.5" font-weight="700" fill="#B91C1C">Đám đông long tại Breaker → giá chạy qua → bị stop-out (họ TRỞ THÀNH thanh khoản)</text>

  <!-- institution filled marker -->
  <circle cx="310" cy="308" r="8" fill="none" stroke="#166534" stroke-width="2.4"/>
  <text x="420" y="404" font-size="10.5" font-weight="700" fill="#166534">Tổ chức lấp tại Reaper IFVG → đảo chiều lên</text>

  <!-- boxes -->
  <rect x="470" y="330" width="128" height="44" rx="6" fill="#FEF3C7" stroke="#D97706"/>
  <text x="534" y="349" font-size="10" font-weight="700" fill="#B45309" text-anchor="middle">Breaker = ALERT</text>
  <text x="534" y="365" font-size="9.5" fill="#92400E" text-anchor="middle">(cảnh báo, chưa vào)</text>
  <rect x="606" y="330" width="118" height="44" rx="6" fill="#DBEAFE" stroke="#2563EB"/>
  <text x="665" y="349" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="middle">Reaper = ENTRY</text>
  <text x="665" y="365" font-size="9.5" fill="#1E40AF" text-anchor="middle">(điểm vào thật)</text>

  <rect x="24" y="420" width="712" height="30" rx="6" fill="#F3F4F6"/>
  <text x="36" y="439" font-size="11" font-weight="700" fill="#374151">"The Breaker attracts the crowd. The Reaper collects the crowd. Then the real move begins."</text>
</svg>
