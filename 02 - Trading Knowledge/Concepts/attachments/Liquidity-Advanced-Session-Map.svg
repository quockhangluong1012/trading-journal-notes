<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bản đồ liquidity theo phiên — Asia tạo, London quét, NY giao</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Ngày bullish điển hình: mỗi phiên để lại liquidity cho phiên sau tiêu thụ</text>

  <!-- session bands -->
  <rect x="60" y="80" width="200" height="350" fill="#6366F1" opacity="0.07"/>
  <rect x="260" y="80" width="220" height="350" fill="#DC2626" opacity="0.06"/>
  <rect x="480" y="80" width="240" height="350" fill="#16A34A" opacity="0.06"/>

  <text x="120" y="100" font-size="13" font-weight="700" fill="#4338CA">ASIA (19:00–02:00)</text>
  <text x="316" y="100" font-size="13" font-weight="700" fill="#B91C1C">LONDON (02:00–05:00)</text>
  <text x="546" y="100" font-size="13" font-weight="700" fill="#15803D">NEW YORK (07:00–11:00)</text>

  <!-- Asia range box -->
  <rect x="72" y="220" width="180" height="80" fill="none" stroke="#4338CA" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="80" y="214" font-size="11" fill="#4338CA" font-weight="700">Asia Range = kho liquidity 2 phía</text>

  <!-- Asia high/low lines extended -->
  <line x1="72" y1="220" x2="470" y2="220" stroke="#4338CA" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="384" y="214" font-size="10.5" fill="#4338CA">Asia High (BSL)</text>
  <line x1="72" y1="300" x2="360" y2="300" stroke="#4338CA" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="276" y="316" font-size="10.5" fill="#4338CA">Asia Low (SSL)</text>

  <!-- price path -->
  <path d="M80 262 L110 248 L135 274 L160 252 L185 282 L210 258 L235 270 L255 262
           L285 292 L310 328 L335 306 L350 336
           L370 300 L395 258 L420 232 L445 210 L465 196
           L490 226 L515 202 L540 172 L565 186 L590 150 L620 158 L650 128 L680 138 L705 112"
        fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- London sweep marker -->
  <circle cx="350" cy="336" r="5" fill="#DC2626"/>
  <text x="268" y="360" font-size="11" fill="#B91C1C" font-weight="700">Judas swing: quét Asia Low</text>
  <text x="268" y="375" font-size="11" fill="#B91C1C">(sell stops = nhiên liệu Long)</text>

  <!-- London high annotation -->
  <line x1="445" y1="196" x2="600" y2="196" stroke="#B91C1C" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="452" y="188" font-size="10.5" fill="#B91C1C">London High → mồi cho NY</text>

  <!-- NY continuation -->
  <text x="560" y="240" font-size="11" fill="#15803D" font-weight="700">NY: retrace vào FVG London</text>
  <text x="560" y="255" font-size="11" fill="#15803D">→ continuation lấy PDH/BSL</text>

  <!-- PDH target -->
  <line x1="480" y1="112" x2="720" y2="112" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="608" y="106" font-size="11.5" fill="#15803D" font-weight="700">DRAW: PDH / BSL</text>

  <!-- bottom summary -->
  <rect x="60" y="446" width="660" height="40" rx="8" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="74" y="463" font-size="11.5" fill="#3730A3" font-weight="700">Trình tự kinh điển: Asia TÍCH LŨY liquidity → London QUÉT một đầu Asia (manipulation, tạo high/low của ngày)</text>
  <text x="74" y="479" font-size="11.5" fill="#3730A3" font-weight="700">→ NY REBALANCE vào FVG của London rồi expansion tới draw HTF (PDH/PDL). Mỗi phiên "ăn" liquidity phiên trước.</text>
</svg>
