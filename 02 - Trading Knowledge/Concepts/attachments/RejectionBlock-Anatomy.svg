<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Bearish Rejection Block tại swing high</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Body = entry zone; wick = vùng từ chối; wick extreme = invalidation. Mép body là ranh giới giữa hai vai trò.</text>

  <rect x="24" y="70" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- approach up to swing high -->
  <path d="M80,320 L160,260 L230,200 L290,150" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="84" y="336" font-size="10.5" fill="#6B7280">Up-move tiếp cận swing high</text>

  <!-- the rejection candle, large scale, exaggerated wick vs small body -->
  <!-- wick (upper tail) -->
  <rect x="330" y="90" width="4" height="70" fill="#DC2626"/>
  <!-- body (small) -->
  <rect x="316" y="160" width="32" height="24" fill="#DC2626" opacity="0.85" rx="1"/>
  <!-- lower wick small -->
  <rect x="330" y="184" width="4" height="14" fill="#DC2626"/>

  <!-- labels with leader lines -->
  <line x1="332" y1="95" x2="470" y2="95" stroke="#B91C1C" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="474" y="99" font-size="11" font-weight="700" fill="#B91C1C">High của wick = INVALIDATION</text>
  <text x="474" y="114" font-size="9.5" fill="#7F1D1D">(đóng cửa TRÊN mức này = RB chết)</text>

  <line x1="334" y1="125" x2="470" y2="140" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="474" y="144" font-size="11" font-weight="700" fill="#DC2626">Wick trên = vùng TỪ CHỐI / sweep buy-side</text>

  <line x1="348" y1="172" x2="470" y2="185" stroke="#B45309" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="474" y="189" font-size="11" font-weight="700" fill="#B45309">Body (open/close) = ENTRY ZONE</text>
  <text x="474" y="204" font-size="9.5" fill="#92400E">mép body trên/dưới = RB zone</text>

  <!-- RB zone box: from body edge (bottom of body) to wick high -->
  <rect x="312" y="90" width="40" height="94" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="356" y="234" font-size="11" font-weight="700" fill="#92400E">RB zone: mép body dưới → high wick</text>

  <!-- mep body boundary line -->
  <line x1="300" y1="184" x2="470" y2="184" stroke="#374151" stroke-width="1.3" stroke-dasharray="2 3"/>
  <text x="474" y="220" font-size="10" fill="#374151">Mép body = ranh giới entry / wick</text>

  <!-- price rejecting down after the candle -->
  <path d="M334,198 L380,240 L430,270 L500,330" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="360" y="300" font-size="10.5" fill="#6B7280">Giá bị đẩy xuống sau khi từ chối tại swing high</text>

  <!-- retest arrow -->
  <path d="M500,330 L560,270 L600,220" fill="none" stroke="#3B82F6" stroke-width="2" stroke-dasharray="5 3"/>
  <circle cx="560" cy="270" r="6" fill="#3B82F6"/>
  <text x="565" y="266" font-size="10" fill="#1D4ED8">Retest RB → phản ứng lại (nếu còn fresh)</text>

  <rect x="24" y="386" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="406" font-size="11.5" font-weight="700" fill="#92400E">Nguyên tắc: RB lấy WICK, không lấy body như Order Block. Vào lệnh tại mép body (entry), thoát nếu</text>
  <text x="36" y="424" font-size="11.5" font-weight="700" fill="#92400E">đóng cửa vượt wick extreme (invalidation). Hai mốc này không bao giờ đảo vai trò cho nhau.</text>
</svg>
