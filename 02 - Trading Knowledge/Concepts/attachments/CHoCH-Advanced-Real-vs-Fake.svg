<svg viewBox="0 0 760 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="450" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CHoCH thật vs Fake CHoCH (Inducement) — bẫy reversal trader</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Khác biệt sống còn: BODY close + displacement (thật) vs chỉ WICK rồi reclaim vào range (giả).</text>

  <!-- LEFT: real CHoCH -->
  <rect x="24" y="72" width="348" height="326" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="24" y="72" width="348" height="30" rx="8" fill="#16A34A"/>
  <text x="198" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CHoCH THẬT ( ≈ MSS )</text>

  <!-- external liquidity swept before -->
  <line x1="44" y1="150" x2="352" y2="150" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="48" y="145" font-size="9.5" fill="#B45309">external liquidity (BSL)</text>
  <!-- uptrend path with protected swing -->
  <path d="M50,320 L90,255 L120,290 L160,215 L195,255 L230,145" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="230" cy="145" r="7" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="212" y="132" font-size="9" fill="#B45309">sweep external + reject</text>
  <!-- protected swing low -->
  <circle cx="195" cy="255" r="5" fill="none" stroke="#16A34A" stroke-width="2"/>
  <line x1="195" y1="255" x2="352" y2="255" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="120" y="248" font-size="9" fill="#15803D">protected swing</text>
  <!-- displacement body close below -->
  <path d="M230,145 L265,210 L282,192 L330,315" fill="none" stroke="#DC2626" stroke-width="2.8"/>
  <rect x="334" y="255" width="2" height="70" fill="#DC2626"/><rect x="329" y="262" width="12" height="55" fill="#DC2626" rx="1"/>
  <text x="240" y="345" font-size="10" font-weight="700" fill="#B91C1C">BODY CLOSE qua protected swing</text>
  <text x="240" y="360" font-size="10" fill="#B91C1C">+ displacement + để lại FVG</text>
  <text x="240" y="380" font-size="10" fill="#15803D">giá GIỮ ngoài swing, không reclaim ✓</text>
  <rect x="290" y="205" width="46" height="18" fill="#DC2626" opacity="0.15"/>
  <text x="294" y="218" font-size="8.5" fill="#B91C1C">FVG</text>

  <!-- RIGHT: fake CHoCH -->
  <rect x="388" y="72" width="348" height="326" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <rect x="388" y="72" width="348" height="30" rx="8" fill="#DC2626"/>
  <text x="562" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">FAKE CHoCH ( Inducement )</text>

  <!-- uptrend path with micro swing -->
  <path d="M410,320 L450,255 L482,290 L520,220 L560,260 L600,180" fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- micro swing low -->
  <circle cx="482" cy="290" r="4" fill="none" stroke="#9CA3AF" stroke-width="1.8"/>
  <line x1="482" y1="290" x2="716" y2="290" stroke="#9CA3AF" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="440" y="283" font-size="9" fill="#9CA3AF">micro swing / inducement (không phải protected)</text>
  <!-- wick-only spike below then reclaim -->
  <path d="M600,180 L628,255 L640,300 L648,235 L690,150" fill="none" stroke="#374151" stroke-width="2.2"/>
  <line x1="640" y1="300" x2="640" y2="255" stroke="#DC2626" stroke-width="4"/>
  <rect x="634" y="245" width="12" height="12" fill="#16A34A" rx="1"/>
  <text x="500" y="330" font-size="10" font-weight="700" fill="#B91C1C">Chỉ WICK xuyên micro swing rồi ĐÓNG LẠI</text>
  <text x="500" y="345" font-size="10" fill="#B91C1C">trên swing — không displacement, không FVG</text>
  <text x="500" y="365" font-size="10" fill="#DC2626">trader Short → giá bullish displacement + BOS lên</text>
  <text x="500" y="380" font-size="10" font-weight="700" fill="#B91C1C">→ Short bị stop ✗</text>

  <rect x="24" y="406" width="712" height="34" rx="6" fill="#FEF3C7"/>
  <text x="36" y="425" font-size="11.5" font-weight="700" fill="#92400E">Luôn hỏi: phá để ĐẢO CHIỀU (body + displacement + giữ giá) hay chỉ INDUCEMENT rồi tiếp diễn (wick + reclaim)?</text>
</svg>
