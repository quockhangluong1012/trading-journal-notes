<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Sunday Reopen vs "True Week Open" — hai mốc dễ bị nhầm lẫn</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Giá mở cửa Chủ Nhật (~18:00 ET) khác với mốc "true week open" (nửa đêm Thứ 2 NY) mà một số cách dạy ICT dùng làm gốc tuần.</text>

  <rect x="24" y="70" width="712" height="260" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Friday close -->
  <line x1="60" y1="150" x2="180" y2="150" stroke="#374151" stroke-width="1.6"/>
  <circle cx="180" cy="150" r="5" fill="#374151"/>
  <text x="62" y="142" font-size="10" fill="#374151">Friday Close (~17:00 ET)</text>

  <!-- Sunday reopen literal -->
  <rect x="180" y="150" width="30" height="70" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <line x1="210" y1="220" x2="330" y2="220" stroke="#3B82F6" stroke-width="1.8"/>
  <circle cx="210" cy="220" r="5" fill="#3B82F6"/>
  <text x="212" y="238" font-size="10.5" font-weight="700" fill="#1D4ED8">① Sunday Reopen literal (~17:00–18:00 ET) — cạnh NWOG thực tế</text>

  <!-- erratic sunday candle: thin, choppy, wide spread -->
  <g>
    <rect x="220" y="205" width="10" height="10" fill="#9CA3AF" opacity="0.8" rx="1"/>
    <rect x="224" y="185" width="3" height="45" fill="#9CA3AF"/>
    <path d="M230,215 L245,195 L255,225 L270,205 L285,222" fill="none" stroke="#9CA3AF" stroke-width="1.6" stroke-dasharray="2 3"/>
    <text x="220" y="180" font-size="9.5" fill="#6B7280">Nến Chủ Nhật: thanh khoản mỏng, spread rộng, dễ nhiễu</text>
  </g>

  <!-- gap from erratic zone to Monday midnight (true week open) -->
  <line x1="330" y1="170" x2="480" y2="170" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="6 3"/>
  <circle cx="480" cy="170" r="6" fill="#DC2626"/>
  <text x="486" y="164" font-size="10.5" font-weight="700" fill="#B91C1C">② "True Week Open" (một số cách dạy: 00:00 NY Thứ 2)</text>

  <!-- Monday candles after true week open -->
  <g>
    <rect x="500" y="150" width="14" height="30" fill="#16A34A" rx="1"/>
    <rect x="506" y="140" width="4" height="50" fill="#16A34A"/>
    <rect x="530" y="130" width="14" height="28" fill="#16A34A" rx="1"/>
    <rect x="536" y="120" width="4" height="46" fill="#16A34A"/>
    <path d="M544,130 L580,110 L640,95 L700,80" fill="none" stroke="#16A34A" stroke-width="2.2"/>
    <text x="560" y="200" font-size="9.5" fill="#166534">Nến Thứ 2 chính thức — dữ liệu đáng tin hơn để đọc cấu trúc tuần</text>
  </g>

  <!-- bracket comparing the two reference points -->
  <path d="M210,250 L210,258 L480,258 L480,250" fill="none" stroke="#6B7280" stroke-width="1.2"/>
  <text x="280" y="272" font-size="9.5" fill="#6B7280">Khoảng cách giữa 2 mốc — nơi dễ đọc sai "week open" nếu không nhất quán</text>

  <rect x="24" y="340" width="712" height="106" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="360" font-size="11.5" font-weight="700" fill="#1F2937">Cách xử lý thực chiến</text>
  <text x="36" y="380" font-size="10.5" fill="#374151">• NWOG luôn dùng cạnh <tspan font-weight="700">Sunday Reopen literal</tspan> (giá mở cửa thật khi futures resume) — đây là mốc khách quan, ai vẽ cũng giống nhau.</text>
  <text x="36" y="398" font-size="10.5" fill="#374151">• "True week open" (00:00 NY Thứ 2) là một <tspan font-weight="700">tham chiếu bias bổ sung</tspan> ở một số cách dạy — không thay thế cạnh NWOG.</text>
  <text x="36" y="416" font-size="10.5" fill="#374151">• Dữ liệu nến Chủ Nhật đầu tiên thường mỏng/nhiễu — <tspan font-weight="700">đừng vội kết luận cấu trúc</tspan> tuần chỉ từ 1-2 nến đó.</text>
  <text x="36" y="434" font-size="10.5" fill="#374151">• Nếu thấy hai nguồn ICT dùng mốc "week open" khác nhau, kiểm tra rõ họ định nghĩa theo Sunday reopen hay true week open.</text>

  <rect x="24" y="0" width="0" height="0"/>
</svg>
