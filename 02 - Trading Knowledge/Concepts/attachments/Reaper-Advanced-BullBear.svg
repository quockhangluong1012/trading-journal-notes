<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Bullish Reaper vs Bearish Reaper</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Bullish: Reaper IFVG nằm DƯỚI Breaker, trong discount. Bearish: nằm TRÊN Breaker, trong premium.</text>

  <!-- LEFT: bullish -->
  <rect x="24" y="72" width="350" height="316" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="24" y="72" width="350" height="26" rx="8" fill="#16A34A"/>
  <text x="199" y="90" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">BULLISH REAPER (đảo lên)</text>

  <line x1="40" y1="238" x2="358" y2="238" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="288" y="233" font-size="9" fill="#9CA3AF">Equilibrium</text>
  <text x="40" y="130" font-size="9.5" font-weight="700" fill="#B45309">PREMIUM</text>
  <text x="40" y="360" font-size="9.5" font-weight="700" fill="#166534">DISCOUNT</text>

  <rect x="120" y="190" width="230" height="20" fill="#FDE68A" opacity="0.55" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="124" y="185" font-size="9.5" font-weight="700" fill="#B45309">Bullish Breaker (trên)</text>
  <rect x="150" y="278" width="200" height="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="154" y="298" font-size="9.5" font-weight="700" fill="#1D4ED8">Reaper IFVG (dưới, discount)</text>

  <!-- down into reaper then up -->
  <line x1="70" y1="150" x2="70" y2="200" stroke="#DC2626" stroke-width="1.4"/><rect x="64.5" y="160" width="11" height="32" fill="#DC2626"/>
  <line x1="92" y1="180" x2="92" y2="234" stroke="#DC2626" stroke-width="1.4"/><rect x="86.5" y="190" width="11" height="38" fill="#DC2626"/>
  <line x1="114" y1="212" x2="114" y2="270" stroke="#DC2626" stroke-width="1.4"/><rect x="108.5" y="222" width="11" height="42" fill="#DC2626"/>
  <line x1="136" y1="244" x2="136" y2="308" stroke="#DC2626" stroke-width="1.4"/><rect x="130.5" y="254" width="11" height="48" fill="#DC2626"/>
  <line x1="158" y1="272" x2="158" y2="314" stroke="#16A34A" stroke-width="1.4"/><rect x="152.5" y="284" width="11" height="26" fill="#16A34A"/>
  <line x1="180" y1="220" x2="180" y2="300" stroke="#16A34A" stroke-width="1.4"/><rect x="174.5" y="232" width="11" height="58" fill="#16A34A"/>
  <line x1="202" y1="180" x2="202" y2="248" stroke="#16A34A" stroke-width="1.4"/><rect x="196.5" y="190" width="11" height="48" fill="#16A34A"/>
  <line x1="224" y1="148" x2="224" y2="208" stroke="#16A34A" stroke-width="1.4"/><rect x="218.5" y="158" width="11" height="40" fill="#16A34A"/>
  <line x1="246" y1="122" x2="246" y2="172" stroke="#16A34A" stroke-width="1.4"/><rect x="240.5" y="132" width="11" height="30" fill="#16A34A"/>
  <path d="M150 314 Q200 250 250 130" fill="none" stroke="#166534" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="255" y="122" font-size="10" font-weight="700" fill="#166534">↑ Long</text>

  <!-- RIGHT: bearish -->
  <rect x="386" y="72" width="350" height="316" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <rect x="386" y="72" width="350" height="26" rx="8" fill="#DC2626"/>
  <text x="561" y="90" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">BEARISH REAPER (đảo xuống)</text>

  <line x1="402" y1="222" x2="720" y2="222" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="650" y="217" font-size="9" fill="#9CA3AF">Equilibrium</text>
  <text x="402" y="130" font-size="9.5" font-weight="700" fill="#B45309">PREMIUM</text>
  <text x="402" y="360" font-size="9.5" font-weight="700" fill="#166534">DISCOUNT</text>

  <rect x="512" y="152" width="200" height="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="516" y="147" font-size="9.5" font-weight="700" fill="#1D4ED8">Reaper IFVG (trên, premium)</text>
  <rect x="482" y="250" width="230" height="20" fill="#FDE68A" opacity="0.55" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="486" y="286" font-size="9.5" font-weight="700" fill="#B45309">Bearish Breaker (dưới)</text>

  <!-- up into reaper then down -->
  <line x1="432" y1="290" x2="432" y2="340" stroke="#16A34A" stroke-width="1.4"/><rect x="426.5" y="300" width="11" height="32" fill="#16A34A"/>
  <line x1="454" y1="256" x2="454" y2="310" stroke="#16A34A" stroke-width="1.4"/><rect x="448.5" y="266" width="11" height="38" fill="#16A34A"/>
  <line x1="476" y1="222" x2="476" y2="280" stroke="#16A34A" stroke-width="1.4"/><rect x="470.5" y="232" width="11" height="42" fill="#16A34A"/>
  <line x1="498" y1="186" x2="498" y2="250" stroke="#16A34A" stroke-width="1.4"/><rect x="492.5" y="196" width="11" height="48" fill="#16A34A"/>
  <line x1="520" y1="150" x2="520" y2="200" stroke="#DC2626" stroke-width="1.4"/><rect x="514.5" y="160" width="11" height="30" fill="#DC2626"/>
  <line x1="542" y1="164" x2="542" y2="242" stroke="#DC2626" stroke-width="1.4"/><rect x="536.5" y="174" width="11" height="58" fill="#DC2626"/>
  <line x1="564" y1="200" x2="564" y2="286" stroke="#DC2626" stroke-width="1.4"/><rect x="558.5" y="210" width="11" height="66" fill="#DC2626"/>
  <line x1="586" y1="248" x2="586" y2="320" stroke="#DC2626" stroke-width="1.4"/><rect x="580.5" y="258" width="11" height="52" fill="#DC2626"/>
  <line x1="608" y1="288" x2="608" y2="350" stroke="#DC2626" stroke-width="1.4"/><rect x="602.5" y="298" width="11" height="42" fill="#DC2626"/>
  <path d="M520 190 Q560 260 610 350" fill="none" stroke="#B91C1C" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="615" y="352" font-size="10" font-weight="700" fill="#B91C1C">↓ Short</text>

  <rect x="24" y="398" width="712" height="30" rx="6" fill="#F3F4F6"/>
  <text x="36" y="417" font-size="11" font-weight="700" fill="#374151">Quy tắc gương: Bullish → Reaper trong DISCOUNT (dưới Breaker) · Bearish → Reaper trong PREMIUM (trên Breaker).</text>
</svg>
