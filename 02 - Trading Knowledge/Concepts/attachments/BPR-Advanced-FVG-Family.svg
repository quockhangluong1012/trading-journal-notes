<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Gia đình Imbalance — FVG → iFVG → BPR (cùng gốc, khác trạng thái)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cả ba đều sinh từ FVG. Khác nhau ở chỗ order flow đã đi qua vùng đó MẤY LẦN và theo hướng nào.</text>

  <!-- FVG panel -->
  <rect x="24" y="76" width="228" height="290" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="100" font-size="13" font-weight="700" fill="#1D4ED8">FVG — 1 chiều</text>
  <rect x="60" y="170" width="160" height="60" fill="#3B82F6" opacity="0.15"/>
  <path d="M70,300 L100,240 L120,255 L150,150 L180,170 L210,120" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="36" y="260" font-size="10.5" fill="#374151" transform="translate(0,60)">Gap để lại bởi MỘT displacement.</text>
  <text x="36" y="334" font-size="10.5" fill="#374151">Order flow: 1 dấu vết, 1 chiều.</text>
  <text x="36" y="352" font-size="10.5" fill="#6B7280">Độ tin: cơ bản (FVG ở khắp nơi).</text>

  <!-- iFVG panel -->
  <rect x="266" y="76" width="228" height="290" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="278" y="100" font-size="13" font-weight="700" fill="#B45309">iFVG — bị đảo vai</text>
  <rect x="302" y="170" width="160" height="60" fill="#3B82F6" opacity="0.15"/>
  <rect x="302" y="170" width="160" height="60" fill="#F59E0B" opacity="0.12"/>
  <path d="M312,290 L340,230 L355,245 L380,160 L395,200 L410,255 L430,235 L455,300" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="278" y="320" font-size="10.5" fill="#374151">Bullish FVG bị giá ĐÓNG NẾN xuyên</text>
  <text x="278" y="334" font-size="10.5" fill="#374151">thủng → đổi vai thành resistance.</text>
  <text x="278" y="352" font-size="10.5" fill="#6B7280">Tín hiệu: order flow vừa ĐỔI phía.</text>

  <!-- BPR panel -->
  <rect x="508" y="76" width="228" height="290" rx="8" fill="#FFFFFF" stroke="#7C3AED"/>
  <text x="520" y="100" font-size="13" font-weight="700" fill="#5B21B6">BPR — 2 chiều chồng nhau</text>
  <rect x="544" y="160" width="160" height="65" fill="#EF4444" opacity="0.12"/>
  <rect x="544" y="185" width="160" height="65" fill="#3B82F6" opacity="0.13"/>
  <rect x="544" y="185" width="160" height="40" fill="#7C3AED" opacity="0.25"/>
  <path d="M554,120 L580,230 L600,300 L620,250 L640,140 L660,190 L680,215 L700,150" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="520" y="320" font-size="10.5" fill="#374151">SIBI + BISI đè nhau: vùng đã được</text>
  <text x="520" y="334" font-size="10.5" fill="#374151">giao dịch CẢ HAI chiều → "balanced".</text>
  <text x="520" y="352" font-size="10.5" fill="#6B7280">Độ tin: cao nhất trong gia đình.</text>

  <!-- Bottom: lifecycle arrow -->
  <rect x="24" y="382" width="712" height="40" rx="6" fill="#EDE9FE"/>
  <text x="36" y="398" font-size="11.5" font-weight="700" fill="#5B21B6">Vòng đời: FVG (imbalance 1 chiều) —bị xuyên→ iFVG (đổi vai) —FVG ngược chồng lên→ BPR (cân bằng 2 chiều).</text>
  <text x="36" y="414" font-size="11" fill="#4B5563">Nhìn theo vòng đời này, BPR chính là một iFVG "hoàn chỉnh": FVG cũ đã bị đảo VÀ được xác nhận bằng một FVG mới ngược chiều.</text>
</svg>
