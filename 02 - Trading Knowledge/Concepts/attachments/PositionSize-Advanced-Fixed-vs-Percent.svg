<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="300" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Fixed Fractional vs Fixed Dollar — chọn cái nào?</text>

  <rect x="24" y="54" width="352" height="216" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="40" y="80" font-size="13" font-weight="700" fill="#166534">% cố định (Fixed Fractional)</text>
  <text x="40" y="106" font-size="11" fill="#374151">Risk $ = Balance × % → risk co giãn</text>
  <text x="40" y="124" font-size="11" fill="#374151">theo vốn. Thắng → risk $ tăng;</text>
  <text x="40" y="142" font-size="11" fill="#374151">thua → risk $ giảm (tự bảo vệ).</text>
  <text x="40" y="168" font-size="11" fill="#166534">✓ Lãi kép khi thắng</text>
  <text x="40" y="186" font-size="11" fill="#166534">✓ Giảm rủi ro tự động khi drawdown</text>
  <text x="40" y="210" font-size="10.5" fill="#6B7280">Phù hợp: tài khoản cá nhân dài hạn.</text>
  <text x="40" y="232" font-size="10.5" fill="#6B7280">Vault dùng cái này: ≤0,5% × balance.</text>

  <rect x="392" y="54" width="344" height="216" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="408" y="80" font-size="13" font-weight="700" fill="#1D4ED8">$ cố định (Fixed Dollar)</text>
  <text x="408" y="106" font-size="11" fill="#374151">Risk $ = con số cố định mỗi lệnh</text>
  <text x="408" y="124" font-size="11" fill="#374151">(vd $500) bất kể balance.</text>
  <text x="408" y="150" font-size="11" fill="#1D4ED8">✓ Đơn giản, dễ theo dõi limit</text>
  <text x="408" y="168" font-size="11" fill="#1D4ED8">✓ Hợp prop firm (limit là $ tuyệt đối)</text>
  <text x="408" y="192" font-size="11" fill="#B45309">✗ Không tự giảm khi drawdown sâu</text>
  <text x="408" y="214" font-size="10.5" fill="#6B7280">Phù hợp: giai đoạn thi prop firm khi</text>
  <text x="408" y="232" font-size="10.5" fill="#6B7280">giới hạn tính bằng $ cố định.</text>
</svg>
