<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu New Day Opening Gap (NDOG)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Prior Day Close → giờ nghỉ bảo trì → Reopen; CE 50% là mức phản ứng chính; Midnight Open 00:00 ET nằm bên trong hành trình giá.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Prior Day Close line -->
  <line x1="60" y1="140" x2="716" y2="140" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="66" y="134" font-size="11" font-weight="700" fill="#1D4ED8">Prior Day Close (~16:00–16:15 ET) — cạnh trên NDOG</text>

  <!-- price path down into the halt -->
  <path d="M80,140 L150,150 L200,160" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="90" y="175" font-size="10" fill="#6B7280">Regular session trước giờ đóng cửa</text>

  <!-- maintenance halt block -->
  <rect x="210" y="140" width="90" height="120" fill="#6B7280" opacity="0.12" stroke="#6B7280" stroke-dasharray="3 3"/>
  <text x="216" y="210" font-size="10" font-weight="700" fill="#374151">Giờ nghỉ</text>
  <text x="216" y="224" font-size="10" font-weight="700" fill="#374151">bảo trì</text>
  <text x="216" y="238" font-size="9.5" fill="#6B7280">17:00–18:00 ET</text>
  <text x="216" y="251" font-size="9.5" fill="#6B7280">(không giao dịch)</text>

  <!-- Reopen line -->
  <line x1="300" y1="260" x2="716" y2="260" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="306" y="276" font-size="11" font-weight="700" fill="#1D4ED8">Reopen (~18:00 ET) — cạnh dưới NDOG</text>

  <!-- NDOG range box -->
  <rect x="300" y="140" width="60" height="120" fill="#F59E0B" opacity="0.16" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="150" y="120" font-size="10.5" font-weight="700" fill="#92400E">NDOG range = khoảng giữa Prior Close và Reopen</text>

  <!-- CE 50% line -->
  <line x1="300" y1="200" x2="716" y2="200" stroke="#DC2626" stroke-width="2" stroke-dasharray="2 3"/>
  <text x="580" y="196" font-size="11" font-weight="700" fill="#B91C1C">CE (50%) — mức phản ứng chính / nam châm</text>

  <!-- Midnight open marker within the day's path -->
  <path d="M360,260 L420,240 L470,225 L520,205 L560,200" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="520" cy="205" r="7" fill="#16A34A"/>
  <text x="420" y="290" font-size="10.5" font-weight="700" fill="#166534">Midnight Open (00:00 ET) — mốc bias trong-ngày</text>
  <line x1="520" y1="205" x2="520" y2="330" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- price path continuing into the day, reacting at CE -->
  <path d="M560,200 L600,220 L640,200 L680,175" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="600" y="160" font-size="10" fill="#6B7280">Giá phản ứng quanh CE trong phiên London/NY</text>

  <!-- annotation numbers -->
  <circle cx="70" cy="140" r="10" fill="none" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="65" y="144" font-size="10" font-weight="700" fill="#1D4ED8">①</text>
  <circle cx="330" cy="260" r="10" fill="none" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="325" y="264" font-size="10" font-weight="700" fill="#1D4ED8">②</text>
  <circle cx="620" cy="200" r="10" fill="none" stroke="#B91C1C" stroke-width="1.6"/>
  <text x="615" y="204" font-size="10" font-weight="700" fill="#B91C1C">③</text>
  <circle cx="520" cy="205" r="10" fill="none" stroke="#166534" stroke-width="1.6"/>
  <text x="515" y="209" font-size="10" font-weight="700" fill="#166534">④</text>

  <rect x="24" y="336" width="712" height="120" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="356" font-size="11.5" font-weight="700" fill="#1F2937">Chú thích</text>
  <text x="36" y="374" font-size="10.5" fill="#374151">① Prior Day Close (~16:00–16:15 ET) — cạnh trên của NDOG, chốt phiên regular ngày hôm trước.</text>
  <text x="36" y="392" font-size="10.5" fill="#374151">② Reopen (~18:00 ET) — cạnh dưới của NDOG, giá mở lại sau giờ nghỉ bảo trì 17:00–18:00 ET.</text>
  <text x="36" y="410" font-size="10.5" fill="#374151">③ CE (50% của NDOG) — mức nam châm/SR chính, nơi giá thường bị hút về và phản ứng.</text>
  <text x="36" y="428" font-size="10.5" fill="#374151">④ Midnight Open (00:00 ET) — mốc riêng nằm TRONG hành trình giá của ngày, dùng làm bias lọc hướng cùng NDOG.</text>
  <text x="36" y="446" font-size="10" fill="#6B7280">Giữ 1–3 NDOG gần nhất trên chart (kể cả đã fill) làm mốc tham chiếu, so với 3–5 NWOG của tuần.</text>
</svg>
