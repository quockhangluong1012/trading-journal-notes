<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Quy trình vào lệnh đảo chiều 3 tầng</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">HTF PD array → chuỗi 3 tầng → chờ RETEST post-MSS PD array → entry. Stop ngoài đỉnh MSS, TP cực đối diện.</text>

  <!-- Row 1 -->
  <rect x="24" y="80" width="164" height="58" rx="8" fill="#3B82F6" opacity="0.92"/>
  <text x="106" y="104" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">① HTF PD array</text>
  <text x="106" y="122" font-size="9.5" fill="#DBEAFE" text-anchor="middle">Daily/4h FVG, OB, prem/disc</text>

  <rect x="212" y="80" width="164" height="58" rx="8" fill="#F59E0B"/>
  <text x="294" y="104" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">② Giá chạm array</text>
  <text x="294" y="122" font-size="9.5" fill="#FEF3C7" text-anchor="middle">chờ giá tới, không đuổi</text>

  <rect x="400" y="80" width="164" height="58" rx="8" fill="#FFFFFF" stroke="#B45309" stroke-width="2"/>
  <text x="482" y="104" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">③ Tầng 1: IFVG/BPR</text>
  <text x="482" y="122" font-size="9.5" fill="#6B7280" text-anchor="middle">yếu đi — chỉ quan sát</text>

  <rect x="588" y="80" width="148" height="58" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="2"/>
  <text x="662" y="104" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">④ Tầng 2: CISD</text>
  <text x="662" y="122" font-size="9.5" fill="#6B7280" text-anchor="middle">candle xác nhận</text>

  <line x1="188" y1="109" x2="208" y2="109" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="376" y1="109" x2="396" y2="109" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="564" y1="109" x2="584" y2="109" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="662" y1="138" x2="662" y2="168" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 2 (reverse) -->
  <rect x="588" y="176" width="148" height="58" rx="8" fill="#FFFFFF" stroke="#166534" stroke-width="2.2"/>
  <text x="662" y="200" font-size="11.5" font-weight="700" fill="#166534" text-anchor="middle">⑤ Tầng 3: MSS</text>
  <text x="662" y="218" font-size="9.5" fill="#6B7280" text-anchor="middle">phá cấu trúc ngược</text>

  <rect x="400" y="176" width="164" height="58" rx="8" fill="#FFFFFF" stroke="#5B21B6" stroke-width="1.8"/>
  <text x="482" y="196" font-size="11.5" font-weight="700" fill="#5B21B6" text-anchor="middle">⑥ Retest post-MSS</text>
  <text x="482" y="212" font-size="9.5" fill="#6B7280" text-anchor="middle">Breaker/BPR/IFVG/FVG</text>
  <text x="482" y="226" font-size="9" fill="#B91C1C" text-anchor="middle">BẮT BUỘC chờ — đừng vào cây MSS</text>

  <rect x="212" y="176" width="164" height="58" rx="8" fill="#FFFFFF" stroke="#374151" stroke-width="1.8"/>
  <text x="294" y="200" font-size="11.5" font-weight="700" fill="#1F2937" text-anchor="middle">⑦ Entry</text>
  <text x="294" y="218" font-size="9.5" fill="#4B5563" text-anchor="middle">theo hướng mới tại POI</text>

  <rect x="24" y="176" width="164" height="58" rx="8" fill="#B91C1C"/>
  <text x="106" y="200" font-size="11.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">⑧ Stop</text>
  <text x="106" y="218" font-size="9.5" fill="#FEE2E2" text-anchor="middle">ngoài đỉnh/đáy MSS + buffer</text>

  <line x1="588" y1="205" x2="568" y2="205" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="205" x2="380" y2="205" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="212" y1="205" x2="192" y2="205" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="106" y1="234" x2="106" y2="264" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Row 3: TP -->
  <rect x="24" y="272" width="712" height="58" rx="8" fill="#166534"/>
  <text x="40" y="296" font-size="11.5" font-weight="700" fill="#FFFFFF">⑨ Take Profit = cực đối diện của leg trước</text>
  <text x="40" y="316" font-size="10" fill="#DCFCE7">ERL đối diện + relative equal highs/lows + HTF FVG — draw on liquidity (xem [[16 - IRL &amp; ERL]]).</text>

  <rect x="24" y="346" width="712" height="58" rx="6" fill="#FEF3C7"/>
  <text x="36" y="368" font-size="11" font-weight="700" fill="#92400E">2 trên 3 tầng thường là ĐỦ để giao dịch; đủ cả 3 theo thứ tự = tín hiệu mạnh nhất.</text>
  <text x="36" y="388" font-size="10.5" fill="#92400E">Bỏ bước ⑥ (retest) là lỗi phổ biến nhất: vào ngay cây MSS thường bị quét stop trước khi giá đi.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
