<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Bullish RDRB (support) vs Bearish RDRB (resistance)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Dùng như mọi PD array: giá retrace về range → mua (bullish) hoặc bán (bearish).</text>

  <!-- LEFT: Bullish RDRB as support -->
  <rect x="24" y="72" width="344" height="352" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="13" font-weight="700" fill="#16A34A">Bullish RDRB → support</text>
  <rect x="55" y="192" width="290" height="35" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.2"/>
  <text x="278" y="215" font-size="10" font-weight="700" fill="#1D4ED8">range</text>
  <!-- before -->
  <line x1="75" y1="227" x2="75" y2="312" stroke="#16A34A" stroke-width="1.5"/><rect x="62" y="242" width="26" height="50" fill="#16A34A"/>
  <!-- A: deliver up, pull back, UPPER wick -->
  <line x1="140" y1="162" x2="140" y2="257" stroke="#16A34A" stroke-width="1.5"/><rect x="127" y="212" width="26" height="30" fill="#16A34A"/>
  <text x="96" y="150" font-size="9.5" fill="#B45309">upper wick</text>
  <!-- B: redeliver up -->
  <line x1="205" y1="142" x2="205" y2="217" stroke="#16A34A" stroke-width="1.5"/><rect x="192" y="152" width="26" height="60" fill="#16A34A"/>
  <!-- after -->
  <line x1="270" y1="117" x2="270" y2="192" stroke="#16A34A" stroke-width="1.5"/><rect x="257" y="127" width="26" height="25" fill="#16A34A"/>
  <!-- retest + long -->
  <path d="M283 130 Q318 165 328 208" fill="none" stroke="#374151" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M328 208 Q332 165 342 110" fill="none" stroke="#16A34A" stroke-width="1.8"/>
  <path d="M342 110 l -8 12 l 12 2 z" fill="#16A34A"/>
  <circle cx="328" cy="210" r="5" fill="#16A34A"/>
  <text x="250" y="345" font-size="10.5" font-weight="700" fill="#16A34A">retest → BUY (support)</text>

  <!-- RIGHT: Bearish RDRB as resistance -->
  <rect x="392" y="72" width="344" height="352" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="408" y="94" font-size="13" font-weight="700" fill="#DC2626">Bearish RDRB → resistance</text>
  <rect x="423" y="202" width="290" height="35" fill="#FEF3C7" stroke="#B45309" stroke-width="1.2"/>
  <text x="646" y="225" font-size="10" font-weight="700" fill="#B45309">range</text>
  <!-- before (down move) -->
  <line x1="443" y1="117" x2="443" y2="202" stroke="#DC2626" stroke-width="1.5"/><rect x="430" y="137" width="26" height="50" fill="#DC2626"/>
  <!-- A: deliver down, pull back, LOWER wick -->
  <line x1="508" y1="172" x2="508" y2="267" stroke="#DC2626" stroke-width="1.5"/><rect x="495" y="187" width="26" height="30" fill="#DC2626"/>
  <text x="466" y="285" font-size="9.5" fill="#B45309">lower wick</text>
  <!-- B: redeliver down -->
  <line x1="573" y1="212" x2="573" y2="287" stroke="#DC2626" stroke-width="1.5"/><rect x="560" y="217" width="26" height="60" fill="#DC2626"/>
  <!-- after -->
  <line x1="638" y1="237" x2="638" y2="312" stroke="#DC2626" stroke-width="1.5"/><rect x="625" y="277" width="26" height="25" fill="#DC2626"/>
  <!-- retest up + short -->
  <path d="M651 300 Q686 265 696 221" fill="none" stroke="#374151" stroke-width="1.6" stroke-dasharray="5 4"/>
  <path d="M696 221 Q700 265 710 320" fill="none" stroke="#DC2626" stroke-width="1.8"/>
  <path d="M710 320 l -8 -12 l 12 -2 z" fill="#DC2626"/>
  <circle cx="696" cy="219" r="5" fill="#DC2626"/>
  <text x="600" y="360" font-size="10.5" font-weight="700" fill="#DC2626">retest → SELL (resistance)</text>

  <text x="24" y="446" font-size="11.5" fill="#374151">Bullish: deliver ↑ → wick TRÊN → redeliver ↑. Bearish: deliver ↓ → wick DƯỚI → redeliver ↓. Range luôn giữa wick nến trước &amp; sau.</text>
</svg>
