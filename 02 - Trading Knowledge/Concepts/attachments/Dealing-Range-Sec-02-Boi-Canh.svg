<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bối cảnh sử dụng — khi nào dùng, khi nào bỏ qua</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Một Dealing Range chuẩn có liquidity ở CẢ HAI đầu đã được thị trường tôn trọng</text>

  <!-- LEFT: high value -->
  <rect x="24" y="70" width="352" height="345" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="13" font-weight="700" fill="#15803D">✓ Giá trị cao — dùng range này</text>

  <rect x="48" y="115" width="272" height="45" fill="#DC2626" opacity="0.06"/>
  <rect x="48" y="160" width="272" height="45" fill="#16A34A" opacity="0.08"/>
  <line x1="48" y1="115" x2="320" y2="115" stroke="#DC2626" stroke-width="2"/>
  <text x="230" y="110" font-size="10" font-weight="700" fill="#B91C1C">BSL còn mở</text>
  <line x1="48" y1="205" x2="320" y2="205" stroke="#16A34A" stroke-width="2"/>
  <line x1="48" y1="160" x2="320" y2="160" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="6 4"/>
  <rect x="125" y="183" width="34" height="14" fill="#3B82F6" opacity="0.2" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3 2"/>
  <circle cx="142" cy="190" r="4" fill="#16A34A"/>
  <line x1="90" y1="205" x2="90" y2="216" stroke="#D97706" stroke-width="1.5"/>
  <text x="56" y="229" font-size="10" fill="#D97706">SSL đã quét</text>
  <line x1="180" y1="185" x2="278" y2="126" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5 4"/>
  <polygon points="282,122 270,126 277,134" fill="#D97706"/>
  <text x="205" y="147" font-size="10" font-weight="700" fill="#D97706">draw: BSL</text>
  <text x="166" y="197" font-size="9.5" fill="#1D4ED8">POI (FVG)</text>

  <text x="40" y="255" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Hai đầu là swing rõ, có displacement/BOS</text>
  <text x="40" y="279" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Hai đầu đã quét liquidity (BSL / SSL)</text>
  <text x="40" y="303" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Đúng timeframe &amp; narrative đang phân tích</text>
  <text x="40" y="327" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Giá ở premium/discount rõ — không ở EQ</text>
  <text x="40" y="351" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Có internal POI (FVG/OB) hợp lệ trong range</text>
  <text x="40" y="375" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> External phía draw on liquidity còn mở</text>
  <text x="40" y="400" font-size="10.5" font-weight="700" fill="#15803D">→ Được phép đo Premium/Discount &amp; viết luồng kỳ vọng</text>

  <!-- RIGHT: skip -->
  <rect x="384" y="70" width="352" height="345" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="396" y="94" font-size="13" font-weight="700" fill="#B91C1C">✗ Bỏ qua — range không đáng tin</text>

  <line x1="408" y1="115" x2="680" y2="115" stroke="#DC2626" stroke-width="2" stroke-dasharray="3 3" opacity="0.6"/>
  <line x1="600" y1="115" x2="600" y2="100" stroke="#D97706" stroke-width="1.5"/>
  <text x="560" y="96" font-size="10" font-weight="700" fill="#D97706">external đã bị lấy ✗</text>
  <line x1="408" y1="205" x2="680" y2="205" stroke="#16A34A" stroke-width="2" opacity="0.6"/>
  <line x1="408" y1="160" x2="680" y2="160" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="6 4"/>
  <circle cx="500" cy="160" r="4" fill="#6B7280"/>
  <text x="428" y="147" font-size="10" fill="#6B7280">giá lửng lơ quanh EQ ?</text>
  <line x1="590" y1="172" x2="650" y2="172" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="590" y1="190" x2="650" y2="190" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="590" y="228" font-size="9.5" fill="#6B7280">swing nhỏ/cũ, chưa quét stops</text>

  <text x="400" y="255" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Hai đầu là swing nhỏ/cũ, chưa quét liquidity</text>
  <text x="400" y="279" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Giá lửng lơ quanh equilibrium</text>
  <text x="400" y="303" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> External đã bị lấy → range chết, chưa vẽ lại</text>
  <text x="400" y="327" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Đo trên sai timeframe so với narrative</text>
  <text x="400" y="351" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Draw hai phía tương đương → bias không rõ</text>
  <text x="400" y="375" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Không có internal POI để chờ reaction</text>
  <text x="400" y="400" font-size="10.5" font-weight="700" fill="#B91C1C">→ Không đo Premium/Discount trên range này — vẽ lại trước</text>
</svg>
