<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ SAI / dễ nhầm</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Hai lỗi kinh điển: (A) so tài sản KHÔNG tương quan; (B) SMT giữa range, xa pool.</text><rect x="24" y="72" width="352" height="270" rx="8" fill="#FEF2F2" stroke="#FECACA"/><text x="40" y="94" font-size="12" font-weight="700" fill="#B91C1C">✗ A. Sai cặp tương quan</text><text x="40" y="130" font-size="10.5" fill="#374151">NQ (chỉ số) vs XAUUSD (vàng)</text><text x="40" y="150" font-size="10.5" fill="#374151">— hai thứ KHÔNG cùng dòng vốn.</text><line x1="65.0" y1="170" x2="65.0" y2="220" stroke="#DC2626" stroke-width="1.3"/><rect x="60" y="180" width="10" height="30" fill="#DC2626"/><line x1="85.0" y1="190" x2="85.0" y2="285" stroke="#DC2626" stroke-width="1.3"/><rect x="80" y="200" width="10" height="50" fill="#DC2626"/><text x="60" y="305" font-size="9.5" fill="#6B7280">NQ ↓</text><line x1="205.0" y1="170" x2="205.0" y2="220" stroke="#16A34A" stroke-width="1.3"/><rect x="200" y="180" width="10" height="30" fill="#16A34A"/><line x1="225.0" y1="140" x2="225.0" y2="210" stroke="#16A34A" stroke-width="1.3"/><rect x="220" y="150" width="10" height="50" fill="#16A34A"/><text x="200" y="305" font-size="9.5" fill="#6B7280">Gold ↑</text><text x="40" y="330" font-size="10" font-weight="700" fill="#B91C1C">"Lệch pha" chỉ là ngẫu nhiên → vô nghĩa</text><rect x="392" y="72" width="344" height="270" rx="8" fill="#FFFBEB" stroke="#FDE68A"/><text x="408" y="94" font-size="12" font-weight="700" fill="#B45309">✗ B. SMT giữa range (xa pool)</text><line x1="408" y1="120" x2="720" y2="120" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/><text x="655" y="115" font-size="9" fill="#6B7280">BSL (xa)</text><line x1="408" y1="320" x2="720" y2="320" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/><text x="655" y="315" font-size="9" fill="#6B7280">SSL (xa)</text><rect x="440" y="180" width="250" height="70" fill="#FEF3C7" opacity="0.5"/><text x="470" y="220" font-size="10.5" font-weight="700" fill="#B45309">vùng "no man's land"</text><line x1="455.0" y1="195" x2="455.0" y2="235" stroke="#DC2626" stroke-width="1.3"/><rect x="450" y="200" width="10" height="30" fill="#DC2626"/><line x1="475.0" y1="205" x2="475.0" y2="248" stroke="#16A34A" stroke-width="1.3"/><rect x="470" y="210" width="10" height="30" fill="#16A34A"/><line x1="565.0" y1="198" x2="565.0" y2="242" stroke="#DC2626" stroke-width="1.3"/><rect x="560" y="205" width="10" height="30" fill="#DC2626"/><line x1="585.0" y1="208" x2="585.0" y2="246" stroke="#16A34A" stroke-width="1.3"/><rect x="580" y="215" width="10" height="25" fill="#16A34A"/><text x="408" y="335" font-size="10" fill="#374151">Divergence ở đây = nhiễu, không có pool để sweep.</text><rect x="24" y="352" width="712" height="62" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/><text x="36" y="374" font-size="11" font-weight="700" fill="#1F2937">Bài học:</text><text x="36" y="394" font-size="10.5" fill="#374151">1) Chỉ so cặp tương quan THẬT. 2) SMT phải nằm TẠI pool (SSL/BSL/equal). 3) SMT ≠ trigger — thiếu sweep+CISD thì chỉ là quan sát.</text>
</svg>
