<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Advance Market Structure — phân cấp đúng (uptrend)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">STL có higher-low hai bên → ITL gồm các STL → LTL gồm các ITL. Đo BOS theo đúng degree.</text>

  <!-- Helper: an uptrend made of fractal swings -->
  <!-- candles low->high path. Bullish green, bearish red -->

  <!-- Wave 1 up (forms STL a) -->
  <rect x="70" y="330" width="2" height="40" fill="#DC2626"/><rect x="64" y="335" width="14" height="25" fill="#DC2626" rx="1"/>
  <rect x="96" y="320" width="2" height="55" fill="#16A34A"/><rect x="90" y="325" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="122" y="295" width="2" height="50" fill="#16A34A"/><rect x="116" y="300" width="14" height="38" fill="#16A34A" rx="1"/>
  <!-- pullback (STL low_b higher than start) -->
  <rect x="148" y="300" width="2" height="50" fill="#DC2626"/><rect x="142" y="305" width="14" height="35" fill="#DC2626" rx="1"/>
  <rect x="174" y="312" width="2" height="48" fill="#DC2626"/><rect x="168" y="317" width="14" height="30" fill="#DC2626" rx="1"/>
  <!-- Wave 2 up -->
  <rect x="200" y="280" width="2" height="60" fill="#16A34A"/><rect x="194" y="285" width="14" height="45" fill="#16A34A" rx="1"/>
  <rect x="226" y="250" width="2" height="55" fill="#16A34A"/><rect x="220" y="255" width="14" height="42" fill="#16A34A" rx="1"/>
  <!-- pullback 2 -->
  <rect x="252" y="258" width="2" height="55" fill="#DC2626"/><rect x="246" y="263" width="14" height="38" fill="#DC2626" rx="1"/>
  <rect x="278" y="268" width="2" height="52" fill="#DC2626"/><rect x="272" y="273" width="14" height="32" fill="#DC2626" rx="1"/>
  <!-- Wave 3 up -->
  <rect x="304" y="235" width="2" height="60" fill="#16A34A"/><rect x="298" y="240" width="14" height="45" fill="#16A34A" rx="1"/>
  <rect x="330" y="205" width="2" height="55" fill="#16A34A"/><rect x="324" y="210" width="14" height="42" fill="#16A34A" rx="1"/>
  <!-- deeper pullback (ITL) -->
  <rect x="356" y="218" width="2" height="60" fill="#DC2626"/><rect x="350" y="223" width="14" height="42" fill="#DC2626" rx="1"/>
  <rect x="382" y="232" width="2" height="62" fill="#DC2626"/><rect x="376" y="237" width="14" height="40" fill="#DC2626" rx="1"/>
  <!-- Wave 4 up to new high -->
  <rect x="408" y="198" width="2" height="65" fill="#16A34A"/><rect x="402" y="203" width="14" height="48" fill="#16A34A" rx="1"/>
  <rect x="434" y="165" width="2" height="58" fill="#16A34A"/><rect x="428" y="170" width="14" height="45" fill="#16A34A" rx="1"/>
  <rect x="460" y="135" width="2" height="55" fill="#16A34A"/><rect x="454" y="140" width="14" height="42" fill="#16A34A" rx="1"/>

  <!-- STL markers (small) -->
  <circle cx="123" cy="350" r="4" fill="#2563EB"/><text x="112" y="372" font-size="11" fill="#2563EB">STL</text>
  <circle cx="227" cy="312" r="4" fill="#2563EB"/><text x="216" y="334" font-size="11" fill="#2563EB">STL</text>
  <circle cx="331" cy="265" r="4" fill="#2563EB"/><text x="320" y="287" font-size="11" fill="#2563EB">STL</text>

  <!-- ITL markers (medium) at the deeper pivots -->
  <circle cx="175" cy="365" r="5" fill="#7C3AED"/><text x="163" y="388" font-size="11" font-weight="600" fill="#7C3AED">ITL</text>
  <circle cx="383" cy="299" r="5" fill="#7C3AED"/><text x="371" y="322" font-size="11" font-weight="600" fill="#7C3AED">ITL</text>

  <!-- LTL marker (large) -->
  <circle cx="71" cy="375" r="6" fill="#DC2626"/><text x="58" y="398" font-size="12" font-weight="700" fill="#DC2626">LTL</text>

  <!-- Protected low (dashed) -->
  <line x1="56" y1="375" x2="700" y2="375" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="600" y="370" font-size="12" fill="#2563EB">Protected Low (LTL)</text>

  <!-- BOS arrow at swing high break -->
  <line x1="335" y1="205" x2="700" y2="205" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="610" y="200" font-size="12" fill="#16A34A">BOS đúng degree</text>
  <path d="M455 150 l 20 -8 l -4 10 z" fill="#16A34A"/>
  <text x="475" y="148" font-size="12" fill="#16A34A">Higher Highs nối tiếp</text>

  <text x="24" y="440" font-size="15" font-weight="700" fill="#16A34A">✓ Đúng</text>
  <text x="80" y="440" font-size="12" fill="#374151">— mỗi degree (STL→ITL→LTL) đều có higher-low hai bên; xu hướng tăng được xác nhận đúng cấp.</text>
</svg>
