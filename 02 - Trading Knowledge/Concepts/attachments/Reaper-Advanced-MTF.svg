<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Reaper IFVG đa khung — HTF đánh dấu, LTF xác nhận</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">H1/M15: bias + dealing range + Breaker + Reaper IFVG. Xuống M5/M3 chờ MSS / displacement / sweep tại IFVG.</text>

  <!-- LEFT HTF -->
  <rect x="24" y="72" width="350" height="316" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.4"/>
  <rect x="24" y="72" width="350" height="26" rx="8" fill="#1D4ED8"/>
  <text x="199" y="90" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">H1 / M15 — BIAS &amp; MAP</text>

  <line x1="40" y1="230" x2="358" y2="230" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="286" y="225" font-size="9" fill="#9CA3AF">Equilibrium</text>
  <text x="40" y="130" font-size="9.5" font-weight="700" fill="#B45309">PREMIUM</text>
  <text x="40" y="350" font-size="9.5" font-weight="700" fill="#166534">DISCOUNT</text>
