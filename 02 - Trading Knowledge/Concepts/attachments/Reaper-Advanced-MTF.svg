  <text x="154" y="312" font-size="9.5" font-weight="700" fill="#1D4ED8">Reaper IFVG (HTF, discount)</text>

  <line x1="80" y1="150" x2="80" y2="210" stroke="#DC2626" stroke-width="1.4"/><rect x="74.5" y="160" width="11" height="40" fill="#DC2626"/>
