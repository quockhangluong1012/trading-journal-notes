  <line x1="490" y1="230" x2="490" y2="304" stroke="#DC2626" stroke-width="1.4"/><rect x="484.5" y="240" width="11" height="52" fill="#DC2626"/>
  <circle cx="490" cy="304" r="8" fill="none" stroke="#B45309" stroke-width="2.4"/>
  <text x="470" y="326" font-size="9.5" font-weight="700" fill="#B45309">① sweep + rejection tại IFVG</text>
  <line x1="512" y1="240" x2="512" y2="300" stroke="#16A34A" stroke-width="1.4"/><rect x="506.5" y="252" width="11" height="40" fill="#16A34A"/>
  <line x1="534" y1="170" x2="534" y2="272" stroke="#16A34A" stroke-width="1.4"/><rect x="528.5" y="182" width="11" height="82" fill="#16A34A"/>
