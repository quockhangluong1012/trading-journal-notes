  <path d="M356 284 L400 284" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#374151"/></marker></defs>
  <text x="360" y="278" font-size="9" fill="#374151">zoom</text>

