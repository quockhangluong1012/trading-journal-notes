  <line x1="556" y1="150" x2="556" y2="212" stroke="#16A34A" stroke-width="1.4"/><rect x="550.5" y="160" width="11" height="44" fill="#16A34A"/>
  <line x1="578" y1="176" x2="578" y2="228" stroke="#DC2626" stroke-width="1.4"/><rect x="572.5" y="186" width="11" height="34" fill="#DC2626"/>
