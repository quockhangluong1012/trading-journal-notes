  <text x="560" y="356" font-size="9.5" font-weight="700" fill="#166534">③ retest → Entry Long</text>

  <rect x="24" y="398" width="712" height="30" rx="6" fill="#F3F4F6"/>
  <text x="36" y="417" font-size="11" font-weight="700" fill="#374151">Khung trên quyết định HƯỚNG &amp; vùng POI · khung dưới quyết định GIỜ vào (sweep + MSS + displacement tại IFVG).</text>
