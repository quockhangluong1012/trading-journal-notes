<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — fade một real breakout / một wick không hiển nhiên</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Hai lỗi thường gặp: (trái) mức bị quét không phải liquidity pool hiển nhiên; (phải) giá có acceptance — breakout thật, không reclaim.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- divider -->
  <line x1="380" y1="80" x2="380" y2="390" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="150" y="94" font-size="11" font-weight="700" fill="#6B7280">CASE A — mức không hiển nhiên</text>
  <text x="430" y="94" font-size="11" font-weight="700" fill="#6B7280">CASE B — real breakout, fade sai</text>

  <!-- CASE A: minor internal wick, not a real liquidity pool -->
  <line x1="60" y1="260" x2="330" y2="260" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="64" y="254" font-size="9.5" fill="#6B7280">"mức" chỉ là 1 wick nội bộ nhỏ, không ai để ý</text>

  <path d="M70,180 L110,220 L150,250 L180,258" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="176" y="256" width="12" height="10" fill="#DC2626" opacity="0.7" rx="1"/>
  <rect x="181" y="266" width="3" height="18" fill="#DC2626" opacity="0.7"/>
  <circle cx="200" cy="270" r="12" fill="none" stroke="#B45309" stroke-width="1.5"/>
  <text x="70" y="300" font-size="10" font-weight="700" fill="#B91C1C">① Trader gọi đây là "Turtle Soup" vì thấy wick nhỏ</text>
  <text x="70" y="314" font-size="9.5" fill="#6B7280">Nhưng đây không phải equal highs/lows, PDH/PDL,</text>
  <text x="70" y="327" font-size="9.5" fill="#6B7280">hay swing cấu trúc rõ — chỉ là nhiễu giữa range.</text>

  <path d="M184,270 L220,290 L260,320 L300,340" fill="none" stroke="#DC2626" stroke-width="2.2"/>
  <text x="200" y="360" font-size="10" font-weight="700" fill="#B91C1C">② Không có thanh khoản thật để "ăn" → tín hiệu vô nghĩa</text>

  <!-- CASE B: real breakout with acceptance, continuation -->
  <line x1="400" y1="230" x2="640" y2="230" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="404" y="224" font-size="9.5" fill="#374151">Old high hiển nhiên — BSL</text>

  <path d="M400,300 L440,270 L470,245 L500,225" fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="498" y="185" width="16" height="42" fill="#16A34A" opacity="0.85" rx="1"/>
  <text x="404" y="345" font-size="10" font-weight="700" fill="#15803D">③ Nến đóng cửa CHẤP NHẬN (acceptance) hẳn ngoài mức</text>

  <path d="M514,206 L545,190 L580,175 L620,150" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <circle cx="580" cy="175" r="6" fill="none" stroke="#16A34A" stroke-width="2"/>
  <text x="520" y="145" font-size="10" font-weight="700" fill="#15803D">④ Giá tiếp tục đi — BOS cùng chiều, KHÔNG reclaim</text>

  <!-- trader fades it wrongly -->
  <line x1="580" y1="175" x2="716" y2="175" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="600" y="192" font-size="10" fill="#B91C1C">Trader short "đoán đỉnh" tại đây</text>
  <path d="M620,175 L660,220 L700,270" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="630" y="290" font-size="9.5" fill="#B91C1C">⑤ Bị cuốn theo continuation — stop bị quét</text>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEE2E2"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#B91C1C">Case A: mức bị quét phải HIỂN NHIÊN/EXTERNAL (PDH/PDL, equal H/L, swing rõ) — không phải wick ngẫu nhiên.</text>
  <text x="36" y="450" font-size="11.5" font-weight="700" fill="#B91C1C">Case B: nếu có ACCEPTANCE ngoài mức và không reclaim → real breakout, KHÔNG fade. Chờ phản ứng, đừng đoán.</text>
</svg>
