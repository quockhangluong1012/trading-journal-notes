<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ 2 — EURUSD, London Open, CISD bearish (thuận bias giảm)</text>
  <text x="24" y="55" font-size="12.5" fill="#6B7280">Bias D1 bearish (premium). London quét đỉnh Á (BSL) → nến đỏ đóng dưới open chuỗi tăng = CISD short.</text>

  <rect x="24" y="72" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- BSL swept at top -->
  <line x1="70" y1="120" x2="700" y2="120" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="76" y="114" font-size="9.5" font-weight="700" fill="#B91C1C">BSL — đỉnh phiên Á (equal highs)</text>

  <!-- bullish delivery leg up into sweep -->
  <rect x="110" y="240" width="2" height="70" fill="#16A34A"/><rect x="103" y="248" width="14" height="54" fill="#16A34A" rx="1"/>
  <rect x="138" y="200" width="2" height="80" fill="#16A34A"/><rect x="131" y="210" width="14" height="62" fill="#16A34A" rx="1"/>
  <rect x="166" y="150" width="2" height="90" fill="#16A34A"/><rect x="159" y="160" width="14" height="72" fill="#16A34A" rx="1"/>
  <rect x="194" y="110" width="2" height="82" fill="#16A34A"/><rect x="187" y="118" width="14" height="52" fill="#16A34A" rx="1"/>
  <circle cx="195" cy="115" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="180" y="104" font-size="9.5" font-weight="700" fill="#B45309">① Sweep BSL + reject</text>

  <!-- CISD level = open of first bullish candle -->
  <line x1="103" y1="248" x2="560" y2="248" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="8 4"/>
  <rect x="565" y="239" width="170" height="18" rx="3" fill="#E0F2FE"/><text x="571" y="252" font-size="9.5" font-weight="700" fill="#0284C7">CISD = open nến xanh đầu</text>

  <!-- bearish displacement closing below CISD level -->
  <rect x="222" y="150" width="2" height="130" fill="#DC2626"/><rect x="215" y="158" width="14" height="112" fill="#DC2626" rx="1"/>
  <circle cx="223" cy="264" r="6" fill="#0EA5E9"/>
  <text x="238" y="150" font-size="10.5" font-weight="700" fill="#B91C1C">② Nến đỏ ĐÓNG dưới CISD = xác nhận</text>
  <!-- FVG left by displacement -->
  <rect x="210" y="200" width="42" height="34" fill="#FEE2E2" stroke="#DC2626" stroke-dasharray="3 3"/>
  <text x="256" y="192" font-size="9.5" font-weight="700" fill="#B91C1C">③ FVG → vùng entry short (retrace)</text>

  <!-- retrace into FVG then drop -->
  <rect x="250" y="216" width="2" height="70" fill="#16A34A"/><rect x="243" y="222" width="14" height="42" fill="#16A34A" rx="1"/>
  <rect x="278" y="230" width="2" height="120" fill="#DC2626"/><rect x="271" y="238" width="14" height="98" fill="#DC2626" rx="1"/>
  <rect x="306" y="300" width="2" height="90" fill="#DC2626"/><rect x="299" y="310" width="14" height="70" fill="#DC2626" rx="1"/>

  <!-- SSL target -->
  <line x1="330" y1="366" x2="700" y2="366" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="560" y="360" font-size="9.5" font-weight="700" fill="#166534">SSL — draw on liquidity (T2)</text>

  <text x="40" y="392" font-size="10" fill="#6B7280">Stop trên wick sweep BSL; entry limit tại FVG (50% CE); T1 = IRL, T2 = SSL. Thuận bias D1 = xác suất cao.</text>
</svg>