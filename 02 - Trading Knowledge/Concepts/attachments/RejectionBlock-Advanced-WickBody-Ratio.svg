<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Định lượng tỉ lệ Wick/Body — ba tier chất lượng Rejection Block</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">So sánh trực quan: wick càng dài so với body và so với range trung bình gần đó, RB càng đáng tin.</text>

  <rect x="24" y="70" width="712" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- baseline -->
  <line x1="60" y1="260" x2="716" y2="260" stroke="#D8DBE2" stroke-width="1"/>

  <!-- Weak candle: short wick, ratio < 1x body -->
  <g>
    <rect x="150" y="210" width="30" height="40" fill="#6B7280" opacity="0.7" rx="1"/>
    <rect x="163" y="196" width="4" height="14" fill="#6B7280"/>
    <rect x="163" y="250" width="4" height="10" fill="#6B7280"/>
    <text x="110" y="288" font-size="12" font-weight="700" fill="#374151">YẾU (weak)</text>
    <text x="98" y="304" font-size="10" fill="#6B7280">wick ≈ 0.5x body</text>
    <text x="90" y="318" font-size="10" fill="#6B7280">&lt; 40% total range</text>
  </g>

  <!-- Moderate candle: ratio ~1.5-2x -->
  <g>
    <rect x="365" y="220" width="28" height="30" fill="#F59E0B" opacity="0.75" rx="1"/>
    <rect x="377" y="150" width="4" height="70" fill="#B45309"/>
    <rect x="377" y="250" width="4" height="12" fill="#B45309"/>
    <text x="330" y="288" font-size="12" font-weight="700" fill="#92400E">VỪA (moderate)</text>
    <text x="320" y="304" font-size="10" fill="#92400E">wick ≈ 1.5–2x body</text>
    <text x="315" y="318" font-size="10" fill="#92400E">≈ 50–65% total range</text>
  </g>

  <!-- Strong candle: ratio > 2.5x, wick dominates -->
  <g>
    <rect x="580" y="235" width="26" height="15" fill="#16A34A" opacity="0.85" rx="1"/>
    <rect x="591" y="90" width="4" height="145" fill="#15803D"/>
    <rect x="591" y="250" width="4" height="10" fill="#15803D"/>
    <text x="545" y="288" font-size="12" font-weight="700" fill="#15803D">MẠNH (strong)</text>
    <text x="540" y="304" font-size="10" fill="#15803D">wick &gt; 2.5x body</text>
    <text x="535" y="318" font-size="10" fill="#15803D">≥ 70% total range</text>
  </g>

  <text x="60" y="100" font-size="10.5" fill="#6B7280">Cùng vị trí swing, ba mức wick khác nhau → ba tier RB khác nhau</text>

  <!-- Decision table -->
  <rect x="24" y="330" width="712" height="112" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="350" font-size="12" font-weight="700" fill="#1F2937">Bảng quyết định: tỉ lệ wick/body → tier RB</text>

  <line x1="36" y1="360" x2="724" y2="360" stroke="#E5E7EB"/>
  <text x="42" y="376" font-size="10.5" font-weight="700" fill="#374151">Tỉ lệ wick/body</text>
  <text x="230" y="376" font-size="10.5" font-weight="700" fill="#374151">% wick / total range</text>
  <text x="430" y="376" font-size="10.5" font-weight="700" fill="#374151">Tier</text>
  <text x="560" y="376" font-size="10.5" font-weight="700" fill="#374151">Hành động</text>
  <line x1="36" y1="384" x2="724" y2="384" stroke="#F3F4F6"/>

  <text x="42" y="400" font-size="10.5" fill="#374151">&lt; 1x body</text>
  <text x="230" y="400" font-size="10.5" fill="#374151">&lt; 40%</text>
  <text x="430" y="400" font-size="10.5" fill="#6B7280">Yếu — nghi ngờ noise</text>
  <text x="560" y="400" font-size="10.5" fill="#6B7280">Bỏ qua / chỉ theo dõi</text>

  <text x="42" y="416" font-size="10.5" fill="#92400E">1.5x – 2x body</text>
  <text x="230" y="416" font-size="10.5" fill="#92400E">50% – 65%</text>
  <text x="430" y="416" font-size="10.5" fill="#92400E">Vừa — cần thêm confluence</text>
  <text x="560" y="416" font-size="10.5" fill="#92400E">Trade nếu có sweep + MSS</text>

  <text x="42" y="432" font-size="10.5" fill="#15803D">&gt; 2.5x body</text>
  <text x="230" y="432" font-size="10.5" fill="#15803D">≥ 70%</text>
  <text x="430" y="432" font-size="10.5" fill="#15803D">Mạnh — RB chất lượng cao</text>
  <text x="560" y="432" font-size="10.5" fill="#15803D">Ưu tiên làm POI chính</text>
</svg>
