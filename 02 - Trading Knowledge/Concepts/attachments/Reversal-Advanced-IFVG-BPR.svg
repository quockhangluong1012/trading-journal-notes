<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Tầng 1: IFVG vs BPR — hai mức độ dấu hiệu yếu</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">IFVG = MỘT FVG bị close phá ngược (support↔resistance flip). BPR = HAI FVG ngược chiều chồng nhau — mạnh hơn.</text>

  <!-- Panel A: IFVG -->
  <rect x="24" y="72" width="352" height="308" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="12.5" font-weight="700" fill="#B45309">IFVG (Inversion FVG) — tín hiệu YẾU</text>
  <!-- down candles leaving bearish FVG -->
  <line x1="66" y1="120" x2="66" y2="158" stroke="#DC2626" stroke-width="1.4"/><rect x="60.5" y="128" width="11" height="24" fill="#DC2626"/>
  <line x1="88" y1="140" x2="88" y2="185" stroke="#DC2626" stroke-width="1.4"/><rect x="82.5" y="148" width="11" height="30" fill="#DC2626"/>
  <line x1="110" y1="205" x2="110" y2="248" stroke="#DC2626" stroke-width="1.4"/><rect x="104.5" y="213" width="11" height="30" fill="#DC2626"/>
  <!-- FVG gap (between candle 2 low and candle 3 high) -->
  <rect x="52" y="178" width="200" height="27" fill="#FEF3C7"/>
  <text x="150" y="196" font-size="10" fill="#B45309">bearish FVG (support khi giá trên)</text>
  <!-- bullish candle closing above the FVG => inversion -->
  <line x1="132" y1="150" x2="132" y2="252" stroke="#16A34A" stroke-width="1.4"/><rect x="126.5" y="160" width="11" height="88" fill="#16A34A"/>
  <text x="145" y="160" font-size="9" font-weight="700" fill="#166534">close phá lên trên FVG</text>
  <!-- retest becomes resistance flip -->
  <line x1="156" y1="140" x2="156" y2="182" stroke="#16A34A" stroke-width="1.4"/><rect x="150.5" y="148" width="11" height="28" fill="#16A34A"/>
  <line x1="178" y1="120" x2="178" y2="160" stroke="#16A34A" stroke-width="1.4"/><rect x="172.5" y="128" width="11" height="26" fill="#16A34A"/>
  <path d="M60 300 Q120 300 132 250 Q150 210 200 130" fill="none" stroke="#166534" stroke-width="1.4" stroke-dasharray="4 4"/>
  <text x="200" y="128" font-size="9.5" font-weight="700" fill="#166534">flip → hỗ trợ</text>
  <rect x="40" y="318" width="320" height="52" rx="6" fill="#FEF3C7"/>
  <text x="50" y="338" font-size="10" fill="#92400E">FVG cũ bị phá bằng CLOSE → đảo vai (support</text>
  <text x="50" y="352" font-size="10" fill="#92400E">thành resistance / ngược lại). Chỉ 1 FVG =</text>
  <text x="50" y="366" font-size="10" fill="#92400E">xác nhận yếu, dễ bị phủ nhận.</text>

  <!-- Panel B: BPR -->
  <rect x="392" y="72" width="344" height="308" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="408" y="94" font-size="12.5" font-weight="700" fill="#5B21B6">BPR (Balanced Price Range) — tín hiệu MẠNH</text>
  <!-- down leg leaving bearish FVG -->
  <line x1="432" y1="120" x2="432" y2="160" stroke="#DC2626" stroke-width="1.4"/><rect x="426.5" y="128" width="11" height="26" fill="#DC2626"/>
  <line x1="454" y1="150" x2="454" y2="235" stroke="#DC2626" stroke-width="1.4"/><rect x="448.5" y="158" width="11" height="60" fill="#DC2626"/>
  <line x1="476" y1="230" x2="476" y2="275" stroke="#DC2626" stroke-width="1.4"/><rect x="470.5" y="238" width="11" height="30" fill="#DC2626"/>
  <!-- bearish FVG band -->
  <rect x="418" y="218" width="300" height="30" fill="#FCA5A5" opacity="0.35"/>
  <!-- reversal + bullish leg leaving bullish FVG overlapping -->
  <line x1="498" y1="235" x2="498" y2="288" stroke="#16A34A" stroke-width="1.4"/><rect x="492.5" y="243" width="11" height="30" fill="#16A34A"/>
  <line x1="520" y1="180" x2="520" y2="250" stroke="#16A34A" stroke-width="1.4"/><rect x="514.5" y="190" width="11" height="55" fill="#16A34A"/>
  <line x1="542" y1="150" x2="542" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="536.5" y="158" width="11" height="30" fill="#16A34A"/>
  <!-- bullish FVG band -->
  <rect x="418" y="200" width="300" height="30" fill="#93C5FD" opacity="0.40"/>
  <!-- overlap = BPR -->
  <rect x="418" y="218" width="300" height="12" fill="#7C3AED" opacity="0.45"/>
  <text x="418" y="192" font-size="9.5" fill="#1D4ED8">bullish FVG (BISI)</text>
  <text x="586" y="262" font-size="9.5" fill="#B91C1C">bearish FVG (SIBI)</text>
  <text x="560" y="228" font-size="9.5" font-weight="700" fill="#5B21B6">OVERLAP = BPR</text>
  <line x1="418" y1="224" x2="718" y2="224" stroke="#5B21B6" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="620" y="220" font-size="9" fill="#5B21B6">CE (vào lệnh)</text>
  <rect x="408" y="318" width="320" height="52" rx="6" fill="#EDE9FE"/>
  <text x="418" y="338" font-size="10" fill="#5B21B6">Hai FVG ngược chiều đè lên nhau tạo vùng cân</text>
  <text x="418" y="352" font-size="10" fill="#5B21B6">bằng. Sau khi BPR hình thành, vào lệnh khi giá</text>
  <text x="418" y="366" font-size="10" fill="#5B21B6">retrace về BPR theo chiều BPR. MẠNH hơn IFVG.</text>

  <text x="24" y="404" font-size="11.5" font-weight="700" fill="#1D4ED8">Cả hai vẫn là Tầng 1 — dấu hiệu YẾU đầu tiên. Chưa phải trigger; chờ CISD và MSS xác nhận tiếp.</text>
</svg>
