<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Fair Value Gap — Định nghĩa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Imbalance 3 nến do displacement • CE (50%) là mức tham chiếu quan trọng nhất</text>

  <!-- Panel trái: BISI -->
  <rect x="24" y="68" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="92" font-size="14" font-weight="700" fill="#16A34A">Bullish FVG — BISI</text>
  <text x="40" y="109" font-size="11" fill="#6B7280">Buyside Imbalance Sellside Inefficiency</text>
  <rect x="96" y="245" width="180" height="45" fill="#3B82F6" opacity="0.10"/>
  <rect x="96" y="245" width="180" height="45" fill="none" stroke="#3B82F6" stroke-dasharray="4 3"/>
  <line x1="96" y1="267" x2="276" y2="267" stroke="#1D4ED8" stroke-dasharray="5 3" stroke-width="1.5"/>
  <text x="104" y="261" font-size="11" font-weight="700" fill="#1D4ED8">Gap (BISI)</text>
  <text x="284" y="249" font-size="11" fill="#374151">Low nến 3</text>
  <text x="284" y="271" font-size="11" fill="#1D4ED8">CE (50%)</text>
  <text x="284" y="293" font-size="11" fill="#374151">High nến 1</text>
  <line x1="110" y1="290" x2="110" y2="345" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="104" y="300" width="12" height="35" fill="#16A34A"/>
  <line x1="160" y1="150" x2="160" y2="350" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="154" y="160" width="12" height="180" fill="#16A34A"/>
  <line x1="210" y1="130" x2="210" y2="245" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="204" y="140" width="12" height="90" fill="#16A34A"/>
  <text x="107" y="362" font-size="11" fill="#6B7280">1</text>
  <text x="157" y="366" font-size="11" fill="#6B7280">2</text>
  <text x="207" y="124" font-size="11" fill="#6B7280">3</text>
  <text x="40" y="386" font-size="11" fill="#6B7280">Nến 2 = displacement tăng → gap chưa được lấp bởi phía bán</text>

  <!-- Panel phải: SIBI -->
  <rect x="386" y="68" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="92" font-size="14" font-weight="700" fill="#DC2626">Bearish FVG — SIBI</text>
  <text x="402" y="109" font-size="11" fill="#6B7280">Sellside Imbalance Buyside Inefficiency</text>
  <rect x="458" y="205" width="180" height="45" fill="#3B82F6" opacity="0.10"/>
  <rect x="458" y="205" width="180" height="45" fill="none" stroke="#3B82F6" stroke-dasharray="4 3"/>
  <line x1="458" y1="227" x2="638" y2="227" stroke="#1D4ED8" stroke-dasharray="5 3" stroke-width="1.5"/>
  <text x="560" y="221" font-size="11" font-weight="700" fill="#1D4ED8">Gap (SIBI)</text>
  <text x="646" y="209" font-size="11" fill="#374151">Low nến 1</text>
  <text x="646" y="231" font-size="11" fill="#1D4ED8">CE (50%)</text>
  <text x="646" y="253" font-size="11" fill="#374151">High nến 3</text>
  <line x1="472" y1="150" x2="472" y2="205" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="466" y="160" width="12" height="35" fill="#DC2626"/>
  <line x1="522" y1="145" x2="522" y2="345" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="516" y="155" width="12" height="180" fill="#DC2626"/>
  <line x1="572" y1="250" x2="572" y2="365" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="566" y="265" width="12" height="90" fill="#DC2626"/>
  <text x="469" y="142" font-size="11" fill="#6B7280">1</text>
  <text x="519" y="362" font-size="11" fill="#6B7280">2</text>
  <text x="569" y="381" font-size="11" fill="#6B7280">3</text>
  <text x="402" y="386" font-size="11" fill="#6B7280">Nến 2 = displacement giảm → gap chưa được lấp bởi phía mua</text>

  <text x="380" y="418" text-anchor="middle" font-size="12" fill="#374151">FVG = POI để chờ entry khi giá retrace • DRAW để giá bị hút về rebalance</text>
</svg>
