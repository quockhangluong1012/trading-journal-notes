<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="540" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Breakaway Gap lồng nhau đa khung thời gian (nested / fractal)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Một HTF breakaway gap (H4/D1) thường được dệt từ chuỗi 2-3 LTF breakaway gap (M15/M5) trong cùng leg.</text>

  <rect x="24" y="70" width="712" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="90" font-size="11.5" font-weight="700" fill="#1F2937">Khung lớn (H4/D1) — một breakaway gap duy nhất</text>

  <!-- HTF range then big displacement -->
  <rect x="50" y="180" width="120" height="50" fill="#6B7280" opacity="0.12" stroke="#6B7280" stroke-dasharray="4 3"/>
  <text x="56" y="176" font-size="10" fill="#374151">HTF range / consolidation</text>

  <rect x="200" y="110" width="26" height="110" fill="#16A34A" opacity="0.85" rx="1"/>
  <rect x="210" y="100" width="4" height="130" fill="#15803D"/>
  <rect x="180" y="150" width="55" height="45" fill="#F59E0B" opacity="0.25" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="240" y="130" font-size="10.5" font-weight="700" fill="#15803D">HTF Breakaway Gap (H4/D1)</text>

  <!-- zoom inset box around the displacement leg -->
  <rect x="185" y="105" width="380" height="130" fill="none" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 3"/>
  <text x="560" y="100" font-size="10" fill="#1D4ED8">Vùng zoom →</text>

  <path d="M226,215 L280,190 L340,160 L420,130 L480,115" fill="none" stroke="#16A34A" stroke-width="2" opacity="0.5"/>

  <!-- Zoomed inset panel below -->
  <rect x="24" y="290" width="712" height="150" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="36" y="310" font-size="11.5" font-weight="700" fill="#1D4ED8">Zoom LTF (M15/M5) — cùng một leg, gồm 2-3 breakaway gap nhỏ nối tiếp</text>

  <!-- LTF breakaway gap 1 -->
  <rect x="60" y="380" width="70" height="30" fill="#6B7280" opacity="0.1" stroke="#6B7280" stroke-dasharray="3 2"/>
  <rect x="140" y="355" width="14" height="55" fill="#16A34A" opacity="0.85"/>
  <rect x="128" y="368" width="30" height="20" fill="#F59E0B" opacity="0.3" stroke="#B45309" stroke-dasharray="3 2"/>
  <text x="60" y="425" font-size="9.5" font-weight="700" fill="#15803D">LTF Gap #1 (M15)</text>

  <!-- LTF breakaway gap 2 -->
  <rect x="200" y="360" width="60" height="30" fill="#6B7280" opacity="0.1" stroke="#6B7280" stroke-dasharray="3 2"/>
  <rect x="270" y="325" width="14" height="60" fill="#16A34A" opacity="0.85"/>
  <rect x="258" y="340" width="30" height="20" fill="#F59E0B" opacity="0.3" stroke="#B45309" stroke-dasharray="3 2"/>
  <text x="200" y="405" font-size="9.5" font-weight="700" fill="#15803D">LTF Gap #2 (M15)</text>

  <!-- LTF breakaway gap 3 -->
  <rect x="330" y="330" width="60" height="30" fill="#6B7280" opacity="0.1" stroke="#6B7280" stroke-dasharray="3 2"/>
  <rect x="400" y="300" width="14" height="55" fill="#16A34A" opacity="0.85"/>
  <rect x="388" y="312" width="30" height="20" fill="#F59E0B" opacity="0.3" stroke="#B45309" stroke-dasharray="3 2"/>
  <text x="330" y="375" font-size="9.5" font-weight="700" fill="#15803D">LTF Gap #3 (M5)</text>

  <path d="M60,395 L140,382 L200,375 L270,355 L330,345 L400,327 L460,310 L520,300" fill="none" stroke="#374151" stroke-width="1.8"/>

  <text x="460" y="330" font-size="10" fill="#374151">Cùng một nhịp displacement lớn</text>
  <text x="460" y="345" font-size="10" fill="#374151">nhìn trên H4/D1 — chia nhỏ thành</text>
  <text x="460" y="360" font-size="10" fill="#374151">3 leg con trên M15/M5</text>

  <rect x="24" y="460" width="712" height="66" rx="6" fill="#FEF3C7"/>
  <text x="36" y="480" font-size="11.5" font-weight="700" fill="#92400E">Các LTF breakaway gap nằm TRONG một HTF breakaway gap là POI tiếp diễn bổ sung, không phải</text>
  <text x="36" y="498" font-size="11.5" font-weight="700" fill="#92400E">tín hiệu mâu thuẫn — dùng chúng để refine entry (retest gap M15/M5 gần nhất) thay vì chỉ chờ</text>
  <text x="36" y="516" font-size="11.5" font-weight="700" fill="#92400E">retest toàn bộ gap H4/D1, vốn có thể không bao giờ quay lại đủ sâu.</text>
</svg>
