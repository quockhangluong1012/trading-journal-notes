<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obd1" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vì sao độ sâu retracement vào OB khác nhau — 3 nguyên nhân gốc</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng là Bullish OB nhưng phản ứng có thể dừng ở 3 vùng khác nhau — do 3 yếu tố nguyên nhân, không phải ngẫu nhiên</text>

  <!-- Panel 1: Shallow -->
  <rect x="24" y="72" width="228" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="13.5" font-weight="700" fill="#0D9488">① Shallow (giữa CE–đỉnh)</text>
  <text x="36" y="109" font-size="10" fill="#6B7280">Chưa lấp nửa OB đã bật</text>

  <!-- OB zone -->
  <rect x="36" y="200" width="204" height="110" fill="#16A34A" opacity="0.12"/>
  <text x="40" y="196" font-size="8" fill="#6B7280">đỉnh OB (proximal)</text>
  <text x="40" y="322" font-size="8" fill="#6B7280">đáy OB (distal / râu)</text>
  <line x1="36" y1="255" x2="240" y2="255" stroke="#1D4ED8" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="196" y="251" font-size="8.5" fill="#1D4ED8" font-weight="700" text-anchor="end">CE 50%</text>

  <!-- nested FVG band inside shallow zone -->
  <rect x="36" y="205" width="204" height="30" fill="#0D9488" opacity="0.18"/>
  <text x="40" y="221" font-size="8" fill="#0F766E" font-weight="700">Nested FVG/OB con</text>

  <!-- candles -->
  <rect x="60" y="130" width="2" height="34" fill="#DC2626"/><rect x="54" y="136" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="88" y="160" width="2" height="34" fill="#DC2626"/><rect x="82" y="166" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="116" y="190" width="2" height="34" fill="#DC2626"/><rect x="110" y="196" width="12" height="26" fill="#DC2626" rx="1"/>
  <rect x="144" y="208" width="2" height="24" fill="#0D9488"/><rect x="138" y="212" width="12" height="16" fill="#0D9488" rx="1"/>
  <path d="M156 215 L200 150" stroke="#0D9488" stroke-width="2" marker-end="url(#obd1)"/>
  <rect x="204" y="120" width="2" height="30" fill="#0D9488"/><rect x="198" y="126" width="12" height="20" fill="#0D9488" rx="1"/>

  <!-- driver box -->
  <rect x="36" y="332" width="204" height="80" rx="6" fill="#0D9488" opacity="0.08" stroke="#0D9488" stroke-width="1"/>
  <text x="44" y="348" font-size="10" font-weight="700" fill="#0F766E">Nguyên nhân:</text>
  <text x="44" y="362" font-size="9" fill="#134E4A">• Có nested FVG/OB con ngay</text>
  <text x="50" y="374" font-size="9" fill="#134E4A">trên CE — hút giá sớm</text>
  <text x="44" y="388" font-size="9" fill="#134E4A">• Liquidity draw phía trên</text>
  <text x="50" y="400" font-size="9" fill="#134E4A">rất gần &amp; rõ ràng</text>

  <!-- Panel 2: CE -->
  <rect x="266" y="72" width="228" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="278" y="94" font-size="13.5" font-weight="700" fill="#1D4ED8">② Đúng CE (50%)</text>
  <text x="278" y="109" font-size="10" fill="#6B7280">Phản ứng "chuẩn" — baseline</text>

  <rect x="278" y="200" width="204" height="110" fill="#16A34A" opacity="0.12"/>
  <text x="282" y="196" font-size="8" fill="#6B7280">đỉnh OB (proximal)</text>
  <text x="282" y="322" font-size="8" fill="#6B7280">đáy OB (distal / râu)</text>
  <line x1="278" y1="255" x2="482" y2="255" stroke="#1D4ED8" stroke-width="1.6" stroke-dasharray="6 3"/>
  <text x="438" y="251" font-size="8.5" fill="#1D4ED8" font-weight="700" text-anchor="end">CE 50%</text>

  <rect x="302" y="130" width="2" height="34" fill="#DC2626"/><rect x="296" y="136" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="330" y="160" width="2" height="34" fill="#DC2626"/><rect x="324" y="166" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="358" y="190" width="2" height="34" fill="#DC2626"/><rect x="352" y="196" width="12" height="34" fill="#DC2626" rx="1"/>
  <rect x="386" y="240" width="2" height="30" fill="#1D4ED8"/><rect x="380" y="248" width="12" height="18" fill="#1D4ED8" rx="1"/>
  <path d="M398 255 L442 150" stroke="#1D4ED8" stroke-width="2" marker-end="url(#obd1)"/>
  <rect x="446" y="120" width="2" height="30" fill="#1D4ED8"/><rect x="440" y="126" width="12" height="20" fill="#1D4ED8" rx="1"/>

  <rect x="278" y="332" width="204" height="80" rx="6" fill="#1D4ED8" opacity="0.07" stroke="#1D4ED8" stroke-width="1"/>
  <text x="286" y="348" font-size="10" font-weight="700" fill="#1D4ED8">Nguyên nhân:</text>
  <text x="286" y="362" font-size="9" fill="#1E3A8A">• Không có nested structure</text>
  <text x="286" y="376" font-size="9" fill="#1E3A8A">chen phía trên hoặc dưới</text>
  <text x="286" y="390" font-size="9" fill="#1E3A8A">• Mật độ order tập trung</text>
  <text x="292" y="402" font-size="9" fill="#1E3A8A">quanh open/CE — baseline</text>

  <!-- Panel 3: Full -->
  <rect x="508" y="72" width="228" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="520" y="94" font-size="13.5" font-weight="700" fill="#B45309">③ Full (chạm đáy râu)</text>
  <text x="520" y="109" font-size="10" fill="#6B7280">Xuyên gần hết / qua đáy OB</text>

  <rect x="520" y="200" width="204" height="110" fill="#16A34A" opacity="0.12"/>
  <text x="524" y="196" font-size="8" fill="#6B7280">đỉnh OB (proximal)</text>
  <text x="524" y="322" font-size="8" fill="#6B7280">đáy OB (distal / râu)</text>
  <line x1="520" y1="255" x2="724" y2="255" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="680" y="251" font-size="8.5" fill="#1D4ED8" font-weight="700" text-anchor="end">CE 50%</text>

  <!-- SSL pool below OB -->
  <line x1="520" y1="325" x2="724" y2="325" stroke="#B45309" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text x="524" y="337" font-size="8" fill="#B45309" font-weight="700">SSL pool (equal lows)</text>

  <rect x="544" y="130" width="2" height="34" fill="#DC2626"/><rect x="538" y="136" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="572" y="160" width="2" height="34" fill="#DC2626"/><rect x="566" y="166" width="12" height="24" fill="#DC2626" rx="1"/>
  <rect x="600" y="190" width="2" height="90" fill="#DC2626"/><rect x="594" y="196" width="12" height="80" fill="#DC2626" rx="1"/>
  <rect x="628" y="288" width="2" height="40" fill="#DC2626"/><rect x="622" y="294" width="12" height="30" fill="#DC2626" rx="1"/>
  <path d="M634 322 L678 150" stroke="#B45309" stroke-width="2" marker-end="url(#obd1)"/>
  <rect x="682" y="120" width="2" height="30" fill="#B45309"/><rect x="676" y="126" width="12" height="20" fill="#B45309" rx="1"/>

  <rect x="520" y="332" width="204" height="80" rx="6" fill="#B45309" opacity="0.08" stroke="#B45309" stroke-width="1"/>
  <text x="528" y="348" font-size="10" font-weight="700" fill="#92400E">Nguyên nhân:</text>
  <text x="528" y="362" font-size="9" fill="#78350F">• SSL/liquidity pool nằm</text>
  <text x="534" y="374" font-size="9" fill="#78350F">ngay dưới đáy OB cần bị quét</text>
  <text x="528" y="388" font-size="9" fill="#78350F">• Hoặc OB giữa leg (không phải</text>
  <text x="534" y="400" font-size="9" fill="#78350F">origin) — cần discount sâu hơn</text>
</svg>
