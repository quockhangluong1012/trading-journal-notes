<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Bullish 1st FVG vs Bearish 1st FVG</text>
<text x="24" y="54" font-size="12.5" fill="#6B7280">Bullish = hỗ trợ / tiếp diễn cho lệnh mua. Bearish = kháng cự / tiếp diễn cho lệnh bán.</text>
<!-- Bullish -->
<rect x="24" y="70" width="352" height="340" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
<text x="40" y="94" font-size="13" font-weight="700" fill="#166534">Bullish 1st FVG (hỗ trợ — tìm LONG)</text>
<line x1="55" y1="285" x2="55" y2="335" stroke="#DC2626" stroke-width="1.4"/><rect x="49.5" y="295" width="11" height="35" fill="#DC2626"/>
<line x1="77" y1="230" x2="77" y2="335" stroke="#16A34A" stroke-width="1.4"/><rect x="71.5" y="240" width="11" height="90" fill="#16A34A"/>
<line x1="99" y1="185" x2="99" y2="250" stroke="#16A34A" stroke-width="1.4"/><rect x="93.5" y="195" width="11" height="52" fill="#16A34A"/>
<rect x="55" y="250" width="150" height="35" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.4"/>
<text x="130" y="272" font-size="10" font-weight="700" fill="#1D4ED8">1st FVG (bullish)</text>
<line x1="205" y1="250" x2="345" y2="250" stroke="#93C5FD" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="205" y1="285" x2="345" y2="285" stroke="#93C5FD" stroke-width="1.2" stroke-dasharray="4 3"/>
<!-- retrace into FVG then up -->
<line x1="135" y1="150" x2="135" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="129.5" y="160" width="11" height="35" fill="#16A34A"/>
<line x1="157" y1="170" x2="157" y2="272" stroke="#DC2626" stroke-width="1.4"/><rect x="151.5" y="180" width="11" height="80" fill="#DC2626"/>
<line x1="179" y1="200" x2="179" y2="278" stroke="#DC2626" stroke-width="1.4"/><rect x="173.5" y="255" width="11" height="20" fill="#DC2626"/>
<circle cx="179" cy="278" r="8" fill="none" stroke="#166534" stroke-width="2.2"/>
<text x="192" y="300" font-size="10" fill="#166534">retest → phản ứng bật lên</text>
<line x1="201" y1="140" x2="201" y2="260" stroke="#16A34A" stroke-width="1.4"/><rect x="195.5" y="150" width="11" height="105" fill="#16A34A"/>
<line x1="223" y1="115" x2="223" y2="165" stroke="#16A34A" stroke-width="1.4"/><rect x="217.5" y="125" width="11" height="35" fill="#16A34A"/>
<path d="M300 340 Q320 250 340 130" fill="none" stroke="#166534" stroke-width="1.6" stroke-dasharray="4 4"/>
<text x="250" y="355" font-size="10.5" font-weight="700" fill="#166534">Giá dùng FVG làm sàn để đi tiếp lên</text>
<!-- Bearish -->
<rect x="392" y="70" width="344" height="340" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
<text x="408" y="94" font-size="13" font-weight="700" fill="#B91C1C">Bearish 1st FVG (kháng cự — tìm SHORT)</text>
<line x1="423" y1="145" x2="423" y2="195" stroke="#16A34A" stroke-width="1.4"/><rect x="417.5" y="155" width="11" height="35" fill="#16A34A"/>
<line x1="445" y1="145" x2="445" y2="255" stroke="#DC2626" stroke-width="1.4"/><rect x="439.5" y="155" width="11" height="90" fill="#DC2626"/>
<line x1="467" y1="235" x2="467" y2="300" stroke="#DC2626" stroke-width="1.4"/><rect x="461.5" y="245" width="11" height="52" fill="#DC2626"/>
<rect x="423" y="195" width="150" height="40" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.4"/>
<text x="498" y="219" font-size="10" font-weight="700" fill="#1D4ED8">1st FVG (bearish)</text>
<line x1="573" y1="195" x2="713" y2="195" stroke="#93C5FD" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="573" y1="235" x2="713" y2="235" stroke="#93C5FD" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="503" y1="270" x2="503" y2="320" stroke="#DC2626" stroke-width="1.4"/><rect x="497.5" y="280" width="11" height="35" fill="#DC2626"/>
<line x1="525" y1="200" x2="525" y2="295" stroke="#16A34A" stroke-width="1.4"/><rect x="519.5" y="210" width="11" height="80" fill="#16A34A"/>
<line x1="547" y1="188" x2="547" y2="235" stroke="#16A34A" stroke-width="1.4"/><rect x="541.5" y="205" width="11" height="20" fill="#16A34A"/>
<circle cx="547" cy="188" r="8" fill="none" stroke="#B91C1C" stroke-width="2.2"/>
<text x="558" y="180" font-size="10" fill="#B91C1C">retest → phản ứng ép xuống</text>
<line x1="569" y1="205" x2="569" y2="320" stroke="#DC2626" stroke-width="1.4"/><rect x="563.5" y="215" width="11" height="100" fill="#DC2626"/>
<line x1="591" y1="300" x2="591" y2="355" stroke="#DC2626" stroke-width="1.4"/><rect x="585.5" y="310" width="11" height="40" fill="#DC2626"/>
<path d="M620 100 Q645 220 670 350" fill="none" stroke="#B91C1C" stroke-width="1.6" stroke-dasharray="4 4"/>
<text x="612" y="385" font-size="10.5" font-weight="700" fill="#B91C1C">Giá dùng FVG làm trần để đi tiếp xuống</text>
</svg>
