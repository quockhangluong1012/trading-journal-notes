<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="32" font-size="18" font-weight="700" fill="#1F2937">Top-down theo thời gian — Session &amp; AMD cycle</text>
  <text x="24" y="52" font-size="13" fill="#6B7280">Biết giá ở ĐÂU (HTF POI) chưa đủ — phải biết KHI NÀO trong ngày để bắt đầu tìm trigger LTF.</text>

  <!-- session timeline -->
  <rect x="40" y="80" width="680" height="46" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="40" y="80" width="180" height="46" fill="#9CA3AF" opacity="0.18"/>
  <rect x="220" y="80" width="260" height="46" fill="#3B82F6" opacity="0.18"/>
  <rect x="480" y="80" width="240" height="46" fill="#16A34A" opacity="0.18"/>
  <text x="90" y="108" font-size="12" font-weight="700" fill="#4B5563">ASIA</text>
  <text x="320" y="108" font-size="12" font-weight="700" fill="#1D4ED8">LONDON</text>
  <text x="570" y="108" font-size="12" font-weight="700" fill="#15803D">NEW YORK</text>

  <!-- AMD phases below -->
  <text x="24" y="150" font-size="12.5" font-weight="700" fill="#1F2937">AMD cycle:</text>
  <rect x="40" y="160" width="180" height="30" fill="#9CA3AF" opacity="0.30" rx="4"/>
  <text x="55" y="180" font-size="10.5" font-weight="700" fill="#374151">ACCUMULATION</text>
  <rect x="220" y="160" width="130" height="30" fill="#DC2626" opacity="0.30" rx="4"/>
  <text x="235" y="180" font-size="10.5" font-weight="700" fill="#B91C1C">MANIPULATION</text>
  <rect x="350" y="160" width="130" height="30" fill="#16A34A" opacity="0.30" rx="4"/>
  <text x="368" y="180" font-size="10.5" font-weight="700" fill="#15803D">DISTRIBUTION</text>
  <rect x="480" y="160" width="120" height="30" fill="#DC2626" opacity="0.30" rx="4"/>
  <text x="495" y="180" font-size="10.5" font-weight="700" fill="#B91C1C">MANIPULATION</text>
  <rect x="600" y="160" width="120" height="30" fill="#16A34A" opacity="0.30" rx="4"/>
  <text x="618" y="180" font-size="10.5" font-weight="700" fill="#15803D">DISTRIBUTION</text>

  <!-- price path across the day, HTF POI as horizontal band -->
  <rect x="40" y="230" width="680" height="40" fill="#3B82F6" opacity="0.10"/>
  <text x="48" y="226" font-size="10.5" fill="#1D4ED8">HTF POI (vùng chờ phản ứng)</text>
  <path d="M50,260 L120,255 L180,250 L230,248 L260,246 L290,244 L330,180 L370,250 L420,252 L470,180 L520,248 L580,245 L650,246 L710,244" fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- marker 1: too early, at POI during accumulation -->
  <circle cx="150" cy="252" r="7" fill="#DC2626"/>
  <line x1="150" y1="252" x2="150" y2="300" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="60" y="320" font-size="10" font-weight="700" fill="#B91C1C">① Giá đã tới HTF POI trong Accumulation</text>
  <text x="60" y="335" font-size="10" font-weight="700" fill="#B91C1C">→ QUÁ SỚM, chưa có sweep thật — CHỜ</text>

  <!-- marker 2: valid, sweep at manipulation phase (killzone) -->
  <circle cx="330" cy="180" r="8" fill="none" stroke="#16A34A" stroke-width="3"/>
  <line x1="330" y1="188" x2="330" y2="300" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="350" y="320" font-size="10" font-weight="700" fill="#15803D">② Sweep xảy ra trong Manipulation</text>
  <text x="350" y="335" font-size="10" font-weight="700" fill="#15803D">(London Killzone) → CỬA SỔ TRIGGER HỢP LỆ</text>

  <rect x="24" y="360" width="712" height="86" rx="6" fill="#FEF3C7"/>
  <text x="38" y="380" font-size="11" font-weight="700" fill="#92400E">Đừng săn trigger LTF (sweep → MSS) khi giá mới chạm HTF POI lúc thị trường còn</text>
  <text x="38" y="397" font-size="11" font-weight="700" fill="#92400E">đang Accumulation/đi ngang — thanh khoản chưa đủ để tạo một sweep thật.</text>
  <text x="38" y="414" font-size="11" font-weight="700" fill="#92400E">Chờ tới pha Manipulation (thường trùng Kill Zone London/NY mở cửa) —</text>
  <text x="38" y="431" font-size="11" font-weight="700" fill="#92400E">đó mới là cửa sổ thời gian nơi sweep + MSS có xác suất hợp lệ cao nhất.</text>
</svg>
