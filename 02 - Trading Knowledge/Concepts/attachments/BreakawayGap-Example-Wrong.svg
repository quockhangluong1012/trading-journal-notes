<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — Fade một breakaway thật (kỳ vọng "gap sẽ fill")</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Move đã chạy dài; trader coi gap là "quá xa nên phải fill" và Short ngược — giá tiếp diễn, quét stop.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- prior extended move up (already ran a long way) -->
  <path d="M60,340 L110,300 L150,280 L190,250 L230,220 L270,195" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="60" y="360" font-size="10.5" fill="#6B7280">① Move đã chạy dài trước đó (nhiều leg tăng)</text>

  <!-- true breakaway displacement (mislabeled by trader as "must fill") -->
  <rect x="280" y="150" width="18" height="55" fill="#16A34A" opacity="0.9" rx="1"/>
  <rect x="287" y="140" width="4" height="75" fill="#15803D"/>
  <text x="250" y="132" font-size="10.5" font-weight="700" fill="#15803D">② Displacement bứt phá thật (breakaway)</text>

  <!-- gap left behind -->
  <rect x="262" y="185" width="36" height="35" fill="#F59E0B" opacity="0.25" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="220" y="235" font-size="9.5" font-weight="700" fill="#92400E">Gap — trader tin "quá xa, phải fill"</text>

  <!-- fade trade: short at retest expecting fill -->
  <circle cx="300" cy="205" r="14" fill="none" stroke="#DC2626" stroke-width="1.8"/>
  <path d="M300,205 L320,240 L340,260" fill="none" stroke="#DC2626" stroke-width="2.4" stroke-dasharray="5 3"/>
  <text x="330" y="255" font-size="10.5" font-weight="700" fill="#B91C1C">③ Vào Short "fade" kỳ vọng gap fill</text>

  <!-- but price continues instead: reject fill, hold gap, continue up -->
  <path d="M298,220 L330,205 L370,170 L420,140 L470,110 L520,85" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="380" y="98" font-size="10.5" font-weight="700" fill="#15803D">④ Gap GIỮ — giá không fill, tiếp diễn lên</text>

  <!-- stop hit -->
  <line x1="262" y1="230" x2="716" y2="230" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="560" y="246" font-size="10" fill="#B91C1C">SL của lệnh fade bị quét tại đây</text>
  <circle cx="420" cy="140" r="6" fill="#DC2626"/>

  <!-- alt scenario: mislabeling exhaustion as breakaway -->
  <path d="M540,90 L570,80 L600,95 L630,130 L660,170 L690,210" fill="none" stroke="#F59E0B" stroke-width="2" stroke-dasharray="6 3"/>
  <rect x="600" y="150" width="16" height="14" fill="#F59E0B" opacity="0.8"/>
  <text x="560" y="222" font-size="9.5" font-weight="700" fill="#92400E">⑤ (Kịch bản khác) Đu theo "gap" cuối move —</text>
  <text x="560" y="234" font-size="9.5" font-weight="700" fill="#92400E">thực ra là exhaustion, giá đảo và fill nhanh</text>
  <path d="M690,210 L716,250" fill="none" stroke="#DC2626" stroke-width="2" stroke-dasharray="3 3"/>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Lỗi: fade một breakaway gap thật vì nghĩ "giá đã chạy xa nên phải fill" — breakaway GIỮ và tiếp</text>
  <text x="36" y="450" font-size="11.5" font-weight="700" fill="#92400E">diễn, không fill như exhaustion. Luôn xác định vị trí gap trong move trước khi đặt kỳ vọng.</text>
</svg>
