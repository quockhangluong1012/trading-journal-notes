<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Tính phân dạng (fractal nesting) của IRL/ERL</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">ERL của khung lớn (HTF) chứa bên trong nó một dealing range nhỏ hơn (LTF) với IRL/ERL riêng.</text>

  <!-- LEFT panel: HTF dealing range -->
  <rect x="24" y="70" width="330" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="92" font-size="12.5" font-weight="700" fill="#1F2937">HTF (D1) — Dealing Range lớn</text>

  <line x1="44" y1="110" x2="335" y2="110" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="48" y="105" font-size="10" font-weight="700" fill="#B91C1C">ERL đỉnh D1 (BSL)</text>

  <line x1="44" y1="360" x2="335" y2="360" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="48" y="374" font-size="10" font-weight="700" fill="#15803D">ERL đáy D1 (SSL)</text>

  <path d="M60,340 L100,260 L150,300 L200,180 L250,220 L300,120" fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="245" y="200" width="3" height="34" fill="#374151"/>
  <rect x="241" y="206" width="11" height="20" fill="#16A34A" rx="1"/>

  <rect x="270" y="180" width="60" height="70" fill="#F59E0B" opacity="0.15" stroke="#B45309" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="272" y="174" font-size="9.5" font-weight="700" fill="#B45309">Vùng ERL đỉnh —</text>
  <text x="272" y="264" font-size="9.5" font-weight="700" fill="#B45309">"zoom" xuống LTF</text>

  <rect x="60" y="215" width="90" height="34" fill="#3B82F6" opacity="0.18" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="64" y="210" font-size="9.5" fill="#1D4ED8">IRL D1 (FVG)</text>

  <!-- zoom connector -->
  <line x1="330" y1="215" x2="420" y2="180" stroke="#B45309" stroke-width="1.6" stroke-dasharray="5 3"/>
  <line x1="330" y1="245" x2="420" y2="330" stroke="#B45309" stroke-width="1.6" stroke-dasharray="5 3"/>
  <circle cx="300" cy="230" r="18" fill="none" stroke="#B45309" stroke-width="2.4"/>
  <line x1="312" y1="242" x2="322" y2="252" stroke="#B45309" stroke-width="3" stroke-linecap="round"/>
  <text x="255" y="290" font-size="9.5" font-weight="700" fill="#92400E">Kính lúp: zoom vào</text>
  <text x="255" y="302" font-size="9.5" font-weight="700" fill="#92400E">vùng ERL đỉnh D1</text>

  <!-- RIGHT panel: LTF nested range -->
  <rect x="425" y="150" width="315" height="210" rx="8" fill="#FFFFFF" stroke="#B45309" stroke-width="1.6"/>
  <text x="436" y="172" font-size="12.5" font-weight="700" fill="#1F2937">LTF (H1) — Dealing Range con</text>
  <text x="436" y="188" font-size="10" fill="#6B7280">Nằm bên trong vùng ERL đỉnh D1</text>

  <line x1="440" y1="205" x2="725" y2="205" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="444" y="200" font-size="9.5" font-weight="700" fill="#B91C1C">ERL đỉnh H1 (BSL nội bộ)</text>

  <line x1="440" y1="335" x2="725" y2="335" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="444" y="349" font-size="9.5" font-weight="700" fill="#15803D">ERL đáy H1 (SSL nội bộ)</text>

  <path d="M450,320 L480,270 L520,300 L560,240 L600,265 L640,220 L680,240 L710,215" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="515" y="280" width="2.5" height="30" fill="#374151"/>
  <rect x="512" y="285" width="9" height="18" fill="#DC2626" rx="1"/>

  <rect x="560" y="255" width="70" height="30" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="562" y="250" font-size="9" fill="#1D4ED8">IRL H1 (FVG mới)</text>

  <circle cx="480" cy="270" r="10" fill="#F59E0B"/>
  <text x="480" y="274" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">①</text>
  <circle cx="595" cy="270" r="10" fill="#3B82F6"/>
  <text x="595" y="274" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">②</text>
  <circle cx="700" cy="222" r="10" fill="#16A34A"/>
  <text x="700" y="226" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">③</text>

  <rect x="24" y="410" width="712" height="55" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Cùng một vùng giá: D1 gọi là "ERL đỉnh", nhưng zoom vào H1 lại thấy một dealing range riêng</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">với IRL/ERL của chính nó — cấu trúc tự lặp lại ở mọi tỉ lệ (self-similar / fractal).</text>
</svg>
