<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cơ chế: CISD là điểm thuật toán ĐỔI TRẠNG THÁI giao hàng</text>
  <text x="24" y="55" font-size="12.5" fill="#6B7280">IPDA giao giá theo một hướng cho tới khi có lý do (sweep + POI). CISD = dấu vân tay của lần lật state.</text>

  <!-- state machine -->
  <rect x="24" y="74" width="712" height="150" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="52" y="112" width="180" height="72" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="142" y="140" font-size="13" font-weight="700" fill="#B91C1C" text-anchor="middle">STATE: SELL-SIDE</text>
  <text x="142" y="160" font-size="10.5" fill="#7F1D1D" text-anchor="middle">Algo giao giá xuống</text>
  <text x="142" y="175" font-size="10.5" fill="#7F1D1D" text-anchor="middle">(chuỗi nến đỏ)</text>

  <rect x="290" y="98" width="180" height="100" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="380" y="126" font-size="13" font-weight="700" fill="#B45309" text-anchor="middle">TRIGGER</text>
  <text x="380" y="147" font-size="10.5" fill="#78350F" text-anchor="middle">① Sweep thanh khoản cực trị</text>
  <text x="380" y="163" font-size="10.5" fill="#78350F" text-anchor="middle">② Đóng qua OPEN chuỗi đẩy</text>
  <text x="380" y="179" font-size="10.5" font-weight="700" fill="#B45309" text-anchor="middle">= C I S D</text>

  <rect x="528" y="112" width="180" height="72" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="618" y="140" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">STATE: BUY-SIDE</text>
  <text x="618" y="160" font-size="10.5" fill="#14532D" text-anchor="middle">Algo giao giá lên</text>
  <text x="618" y="175" font-size="10.5" fill="#14532D" text-anchor="middle">(chuỗi nến xanh)</text>

  <line x1="232" y1="148" x2="286" y2="148" stroke="#6B7280" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="470" y1="148" x2="524" y2="148" stroke="#6B7280" stroke-width="2" marker-end="url(#ar)"/>
  <defs><marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#6B7280"/></marker></defs>

  <!-- open-to-open logic panel -->
  <rect x="24" y="238" width="712" height="196" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="262" font-size="13" font-weight="700" fill="#1F2937">Vì sao đo bằng OPEN chứ không phải low/close?</text>

  <!-- candles -->
  <rect x="86" y="300" width="2" height="70" fill="#DC2626"/><rect x="78" y="306" width="16" height="52" fill="#DC2626" rx="1"/>
  <rect x="118" y="320" width="2" height="78" fill="#DC2626"/><rect x="110" y="330" width="16" height="60" fill="#DC2626" rx="1"/>
  <rect x="150" y="352" width="2" height="70" fill="#16A34A"/><rect x="142" y="360" width="16" height="52" fill="#16A34A" rx="1"/>
  <rect x="182" y="286" width="2" height="120" fill="#16A34A"/><rect x="174" y="298" width="16" height="100" fill="#16A34A" rx="1"/>
  <line x1="78" y1="306" x2="360" y2="306" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="366" y="310" font-size="10.5" font-weight="700" fill="#0284C7">OPEN nến đỏ đầu tiên = nơi thuật toán</text>
  <text x="366" y="325" font-size="10.5" fill="#374151">BẮT ĐẦU chương trình bán. Đóng lại qua đây =</text>
  <text x="366" y="340" font-size="10.5" fill="#374151">xoá sạch toàn bộ order flow bán của leg đó.</text>

  <text x="366" y="372" font-size="10.5" fill="#374151">• LOW = chỉ là nơi sweep, không phải nơi ý định bắt đầu.</text>
  <text x="366" y="390" font-size="10.5" fill="#374151">• Đóng qua OPEN = phe bán không còn kiểm soát nến nào.</text>
  <text x="40" y="424" font-size="10.5" fill="#6B7280">Delivery = ý định thuật toán; open là mốc ý định. Đó là lý do CISD đo bằng open, không đo bằng đỉnh/đáy.</text>
</svg>