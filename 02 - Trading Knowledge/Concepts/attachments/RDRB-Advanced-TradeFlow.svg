<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Quy trình vào lệnh RDRB (Bullish)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">HTF bias → RDRB hình thành → retrace về range → drop LTF → MSS trong range → entry / stop / TP.</text>

  <!-- main HTF panel -->
  <rect x="24" y="72" width="470" height="316" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="12" font-weight="700" fill="#1F2937">HTF (Daily/H4 bias ↑)</text>

  <!-- DOL / TP line -->
  <line x1="40" y1="118" x2="478" y2="118" stroke="#B45309" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="300" y="113" font-size="10" font-weight="700" fill="#B45309">TP: draw on liquidity (old high / ERL)</text>

  <!-- range zone y 210-245 -->
  <rect x="60" y="210" width="360" height="35" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.2"/>
  <text x="360" y="233" font-size="10" font-weight="700" fill="#1D4ED8">RDRB range</text>

  <!-- before -->
  <line x1="85" y1="245" x2="85" y2="325" stroke="#16A34A" stroke-width="1.5"/><rect x="74" y="260" width="22" height="50" fill="#16A34A"/>
  <!-- A -->
  <line x1="130" y1="180" x2="130" y2="270" stroke="#16A34A" stroke-width="1.5"/><rect x="119" y="230" width="22" height="30" fill="#16A34A"/>
  <!-- B -->
  <line x1="175" y1="160" x2="175" y2="235" stroke="#16A34A" stroke-width="1.5"/><rect x="164" y="170" width="22" height="60" fill="#16A34A"/>
  <!-- after -->
  <line x1="220" y1="135" x2="220" y2="210" stroke="#16A34A" stroke-width="1.5"/><rect x="209" y="145" width="22" height="25" fill="#16A34A"/>
  <text x="90" y="345" font-size="9.5" font-weight="700" fill="#166534">cặp RDRB</text>

  <!-- retrace down into zone -->
  <line x1="265" y1="140" x2="265" y2="200" stroke="#DC2626" stroke-width="1.5"/><rect x="254" y="150" width="22" height="45" fill="#DC2626"/>
  <line x1="310" y1="170" x2="310" y2="243" stroke="#DC2626" stroke-width="1.5"/><rect x="299" y="195" width="22" height="42" fill="#DC2626"/>
  <text x="255" y="345" font-size="9.5" fill="#DC2626">retrace về range</text>

  <!-- entry marker + rally to TP -->
  <circle cx="335" cy="235" r="6" fill="#16A34A"/>
  <text x="345" y="228" font-size="10" font-weight="700" fill="#16A34A">entry (buy)</text>
  <line x1="355" y1="150" x2="355" y2="228" stroke="#16A34A" stroke-width="1.5"/><rect x="344" y="150" width="22" height="80" fill="#16A34A"/>
  <line x1="400" y1="118" x2="400" y2="160" stroke="#16A34A" stroke-width="1.5"/><rect x="389" y="122" width="22" height="38" fill="#16A34A"/>
  <path d="M411 130 l 14 -8 l -3 11 z" fill="#16A34A"/>

  <!-- stop line below zone + buffer -->
  <line x1="60" y1="262" x2="420" y2="262" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="60" y="277" font-size="10" font-weight="700" fill="#DC2626">stop &lt; đáy range + buffer (dưới wick nến trước)</text>

  <!-- LTF inset -->
  <rect x="510" y="150" width="226" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="524" y="172" font-size="12" font-weight="700" fill="#1F2937">LTF (M5/M1) trong range</text>
  <rect x="524" y="188" width="198" height="26" fill="#DBEAFE"/>
  <text x="660" y="205" font-size="9" fill="#1D4ED8">range</text>
  <!-- LTF: sweep low then MSS up -->
  <line x1="545" y1="230" x2="545" y2="300" stroke="#DC2626" stroke-width="1.4"/><rect x="537" y="245" width="16" height="40" fill="#DC2626"/>
  <line x1="575" y1="255" x2="575" y2="320" stroke="#DC2626" stroke-width="1.4"/><rect x="567" y="270" width="16" height="40" fill="#DC2626"/>
  <line x1="605" y1="260" x2="605" y2="330" stroke="#DC2626" stroke-width="1.4"/><rect x="597" y="300" width="16" height="25" fill="#DC2626"/>
  <line x1="635" y1="230" x2="635" y2="315" stroke="#16A34A" stroke-width="1.4"/><rect x="627" y="240" width="16" height="60" fill="#16A34A"/>
  <line x1="665" y1="205" x2="665" y2="270" stroke="#16A34A" stroke-width="1.4"/><rect x="657" y="215" width="16" height="45" fill="#16A34A"/>
  <line x1="530" y1="255" x2="700" y2="255" stroke="#B45309" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="605" y="252" font-size="8.5" fill="#B45309">MSS (phá cao gần nhất)</text>
  <text x="524" y="343" font-size="9.5" fill="#166534">MSS xác nhận → điểm vào chính xác</text>

  <text x="24" y="414" font-size="11" fill="#374151">① HTF bias (Daily/H4)  ② cặp RDRB hình thành  ③ mark range giữa wick nến trước &amp; sau  ④ giá retrace về range</text>
  <text x="24" y="436" font-size="11" fill="#374151">⑤ drop LTF (M5/M1)  ⑥ chờ MSS trong range  ⑦ entry (buy)  ⑧ stop dưới đáy range + buffer  ⑨ TP = next draw on liquidity</text>
</svg>
