<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Inducement (IDM) — Bẫy thanh khoản trước POI thật</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Sweep IDM trước, rồi mới chạm Order Block thật → Long</text>

  <!-- HTF POI: Order Block zone (real POI) at bottom -->
  <rect x="120" y="330" width="560" height="46" fill="#3B82F6" opacity="0.14"/>
  <text x="128" y="350" font-size="13" font-weight="700" fill="#1D4ED8">Order Block thật (POI HTF)</text>

  <!-- IDM minor swing low - dashed line above OB -->
  <line x1="120" y1="300" x2="680" y2="300" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="600" y="294" font-size="13" font-weight="700" fill="#2563EB">IDM (SSL mồi)</text>

  <!-- Down move into a minor swing low (the inducement) -->
  <!-- candle 1 bearish -->
  <rect x="156" y="120" width="2" height="70" fill="#DC2626"/>
  <rect x="150" y="130" width="14" height="45" fill="#DC2626" rx="1"/>
  <!-- candle 2 bearish -->
  <rect x="182" y="150" width="2" height="80" fill="#DC2626"/>
  <rect x="176" y="160" width="14" height="55" fill="#DC2626" rx="1"/>
  <!-- candle 3 small bull (minor swing low forms = IDM) -->
  <rect x="208" y="200" width="2" height="60" fill="#16A34A"/>
  <rect x="202" y="215" width="14" height="35" fill="#16A34A" rx="1"/>
  <!-- pullback up -->
  <rect x="234" y="170" width="2" height="55" fill="#16A34A"/>
  <rect x="228" y="180" width="14" height="40" fill="#16A34A" rx="1"/>

  <text x="186" y="278" font-size="12" fill="#374151">Đáy nhỏ = IDM</text>
  <text x="186" y="293" font-size="12" fill="#374151">(retail đặt SL/buy)</text>

  <!-- drop down to sweep IDM then into OB -->
  <rect x="260" y="200" width="2" height="120" fill="#DC2626"/>
  <rect x="254" y="210" width="14" height="80" fill="#DC2626" rx="1"/>
  <!-- sweep IDM, wick below into OB -->
  <rect x="286" y="250" width="2" height="110" fill="#DC2626"/>
  <rect x="280" y="290" width="14" height="55" fill="#DC2626" rx="1"/>

  <text x="300" y="372" font-size="13" fill="#374151">↑ Sweep IDM + chạm OB</text>

  <!-- displacement up (MSS) -->
  <rect x="320" y="180" width="2" height="170" fill="#16A34A"/>
  <rect x="314" y="190" width="14" height="150" fill="#16A34A" rx="1"/>
  <rect x="346" y="120" width="2" height="90" fill="#16A34A"/>
  <rect x="340" y="130" width="14" height="70" fill="#16A34A" rx="1"/>
  <rect x="372" y="95" width="2" height="80" fill="#16A34A"/>
  <rect x="366" y="105" width="14" height="55" fill="#16A34A" rx="1"/>

  <!-- MSS line -->
  <line x1="200" y1="170" x2="420" y2="170" stroke="#9333EA" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="395" y="164" font-size="12" fill="#9333EA" font-weight="700">MSS</text>

  <!-- Entry annotation -->
  <circle cx="307" cy="320" r="5" fill="#16A34A"/>
  <text x="430" y="320" font-size="13" font-weight="700" fill="#16A34A">Entry tại OB sau khi IDM bị quét</text>

  <!-- continuation candles toward BSL target -->
  <rect x="430" y="80" width="2" height="70" fill="#16A34A"/>
  <rect x="424" y="90" width="14" height="50" fill="#16A34A" rx="1"/>
  <rect x="456" y="70" width="2" height="60" fill="#16A34A"/>
  <rect x="450" y="78" width="14" height="42" fill="#16A34A" rx="1"/>

  <!-- BSL target -->
  <line x1="120" y1="70" x2="680" y2="70" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="64" font-size="13" font-weight="700" fill="#2563EB">BSL (target)</text>

  <text x="24" y="440" font-size="16" font-weight="700" fill="#16A34A">✓ Đúng</text>
  <text x="78" y="440" font-size="13" fill="#374151">IDM bị quét xong → giá vào POI thật → entry sau sweep, không vào sớm.</text>
</svg>
