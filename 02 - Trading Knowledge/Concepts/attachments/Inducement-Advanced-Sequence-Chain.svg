<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chuỗi sequence bất di bất dịch với Inducement</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Thiếu bước "IDM bị quét", entry tại POI thường non — bạn vào trước khi thị trường lấy đủ thanh khoản.</text>

  <!-- Box 1: HTF Bias / POI -->
  <rect x="24" y="86" width="150" height="64" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="99" y="112" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">HTF Bias / POI</text>
  <text x="99" y="130" font-size="9.5" fill="#6B7280" text-anchor="middle">OB / FVG đồng hướng</text>
  <text x="99" y="143" font-size="9.5" fill="#6B7280" text-anchor="middle">đúng premium/discount</text>

  <!-- arrow -->
  <path d="M174,118 L206,118" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 2: IDM swept -->
  <rect x="208" y="86" width="150" height="64" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="283" y="110" font-size="11.5" font-weight="700" fill="#92400E" text-anchor="middle">IDM (mồi)</text>
  <text x="283" y="127" font-size="11" font-weight="700" fill="#B45309" text-anchor="middle">BỊ QUÉT</text>
  <text x="283" y="142" font-size="9" fill="#92400E" text-anchor="middle">lấy thanh khoản trung gian</text>

  <path d="M358,118 L390,118" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 3: touch POI react -->
  <rect x="392" y="86" width="152" height="64" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="468" y="112" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">Chạm POI</text>
  <text x="468" y="130" font-size="9.5" fill="#6B7280" text-anchor="middle">OB/FVG phản ứng</text>
  <text x="468" y="143" font-size="9.5" fill="#6B7280" text-anchor="middle">(reject, không xuyên)</text>

  <path d="M544,118 L576,118" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 4: MSS + displacement -->
  <rect x="578" y="86" width="158" height="64" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="657" y="110" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">MSS + Displacement</text>
  <text x="657" y="128" font-size="9.5" fill="#166534" text-anchor="middle">xác nhận order flow</text>
  <text x="657" y="141" font-size="9.5" fill="#166534" text-anchor="middle">đã đảo tại POI</text>

  <!-- down connector to second row -->
  <path d="M657,150 L657,178 L283,178 L283,206" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Box 5: Entry at POI -->
  <rect x="208" y="208" width="150" height="64" rx="8" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
  <text x="283" y="234" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">Entry tại POI</text>
  <text x="283" y="252" font-size="9.5" fill="#166534" text-anchor="middle">SAU khi IDM bị quét</text>
  <text x="283" y="265" font-size="9.5" fill="#166534" text-anchor="middle">stop ngoài đầu kia POI</text>

  <path d="M358,240 L390,240" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Box 6: Target external -->
  <rect x="392" y="208" width="152" height="64" rx="8" fill="#EFF6FF" stroke="#1D4ED8" stroke-width="1.5"/>
  <text x="468" y="234" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">Target</text>
  <text x="468" y="252" font-size="9.5" fill="#6B7280" text-anchor="middle">internal trước,</text>
  <text x="468" y="265" font-size="9.5" fill="#6B7280" text-anchor="middle">external liquidity sau</text>

  <!-- Warning callout -->
  <rect x="24" y="300" width="712" height="52" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.3"/>
  <text x="40" y="322" font-size="12" font-weight="700" fill="#991B1B">⚠ Nếu BỎ QUA bước "IDM bị quét" (nhảy thẳng từ POI → entry):</text>
  <text x="40" y="341" font-size="11" fill="#991B1B">entry non — giá còn một nhịp quét mồi nữa, stop của bạn nằm đúng nơi thị trường muốn lấy trước khi đảo.</text>

  <rect x="24" y="366" width="712" height="40" rx="8" fill="#FEF3C7"/>
  <text x="40" y="384" font-size="11.5" font-weight="700" fill="#92400E">Ghi nhớ: HTF Bias/POI → IDM bị quét → chạm POI phản ứng → MSS + displacement → Entry tại POI → Target external.</text>
  <text x="40" y="400" font-size="10.5" fill="#92400E">Trình tự này bất di bất dịch cho cả Long và Short.</text>

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
