<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Bullish MSS — từ leg giảm đến entry, đúng thứ tự</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Bối cảnh: giá đã về discount + chạm HTF POI. Mọi thứ dưới đây diễn ra TRONG/NGAY SAU vùng POI đó.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- HTF POI zone -->
  <rect x="44" y="290" width="660" height="110" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="308" font-size="10.5" fill="#1D4ED8">HTF / H1 POI (bullish FVG-OB) + discount của dealing range</text>

  <!-- down leg with lower highs -->
  <path d="M60,120 L110,230 L150,170 L205,300 L245,235 L285,365" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="70" y="110" font-size="10.5" fill="#6B7280">① Leg giảm ngắn hạn đang chạy</text>
  <!-- LH markers -->
  <circle cx="150" cy="170" r="5" fill="#D1D5DB"/>
  <text x="128" y="158" font-size="10" fill="#9CA3AF">LH cũ</text>
  <circle cx="245" cy="235" r="6" fill="none" stroke="#DC2626" stroke-width="2.2"/>
  <text x="200" y="222" font-size="10.5" font-weight="700" fill="#DC2626">LH gần nhất — mức MSS phải phá</text>
  <line x1="245" y1="235" x2="470" y2="235" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="6 4"/>

  <!-- sweep -->
  <circle cx="285" cy="365" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <line x1="220" y1="373" x2="350" y2="373" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="245" y="394" font-size="10.5" font-weight="700" fill="#B45309">② Sweep SSL (wick quét đáy cũ + reject) — PHẢI xảy ra trước</text>

  <!-- displacement leg up breaking LH -->
  <path d="M285,365 L330,300 L350,318 L420,180" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <!-- body close candle above LH -->
  <rect x="424" y="170" width="2" height="90" fill="#16A34A"/><rect x="418" y="178" width="13" height="70" fill="#16A34A" rx="1"/>
  <text x="440" y="180" font-size="10.5" font-weight="700" fill="#15803D">③ MSS: BODY CLOSE phá lên qua LH</text>
  <text x="440" y="195" font-size="10.5" fill="#15803D">bằng displacement (không phải wick)</text>

  <!-- FVG left behind -->
  <rect x="360" y="255" width="130" height="26" fill="#3B82F6" opacity="0.18"/>
  <text x="494" y="272" font-size="10.5" fill="#1D4ED8">④ Displacement để lại FVG</text>

  <!-- retrace + entry -->
  <path d="M420,180 L455,230 L478,268 L500,240 L540,170 L575,200 L640,110" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="478" cy="268" r="6" fill="#16A34A"/>
  <text x="478" y="296" font-size="10.5" font-weight="700" fill="#15803D">⑤ Entry: retrace vào FVG</text>
  <text x="478" y="311" font-size="10.5" fill="#6B7280">stop dưới swept low; target BSL</text>

  <!-- target -->
  <line x1="600" y1="110" x2="716" y2="110" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="620" y="100" font-size="10.5" fill="#166534">⑥ Target: internal → external BSL</text>

  <rect x="24" y="438" width="712" height="24" rx="6" fill="#FEF3C7"/>
  <text x="36" y="455" font-size="11.5" font-weight="700" fill="#92400E">Bearish MSS đối xứng: leg tăng tạo higher-lows → sweep BSL trên đỉnh → body close phá XUỐNG qua HL gần nhất + bearish FVG → Short.</text>
</svg>
