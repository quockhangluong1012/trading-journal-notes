<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="560" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Case study thật — EURUSD Short 07/05/2021 (Asia): OB "đẹp" nhưng chuỗi phía trước gãy</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Backtest 10/07/2026 · poi_stack OB+FVG (H1, Premium) · entry 1.20805 · SL 1.20931 · kết quả −1R. Lỗi không nằm ở OB — nằm ở bước ② draw và ③ sweep.</text>

  <rect x="24" y="70" width="500" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- External BSL line -->
  <line x1="44" y1="105" x2="504" y2="105" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="48" y="99" font-size="10.5" font-weight="700" fill="#B91C1C">External BSL (đỉnh tuần) — CHƯA bị quét = draw thật sự của giá</text>

  <!-- SL / OB zone -->
  <text x="446" y="152" font-size="10" fill="#6B7280">SL 1.20931</text>
  <line x1="44" y1="158" x2="504" y2="158" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>

  <rect x="44" y="170" width="460" height="46" fill="#DC2626" opacity="0.13"/>
  <text x="48" y="184" font-size="10.5" font-weight="700" fill="#B91C1C">OB H1 1.20884–1.20780 (Premium) + FVG</text>
  <text x="48" y="197" font-size="9.5" fill="#B91C1C">nhìn riêng lẻ: hoàn toàn hợp lệ (có displacement, có FVG)</text>

  <!-- price path: choppy asia, internal sweep, rise into OB, through SL, sweep BSL, then drop -->
  <path d="M60,330 L90,300 L115,335 L140,290 L160,318 L185,275 L205,296 L235,240 L258,258 L285,205 L300,193 L325,150 L345,132 L370,108 L392,116 L420,170 L450,230 L480,300"
        fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- internal sweep marker -->
  <circle cx="140" cy="290" r="5" fill="none" stroke="#B45309" stroke-width="2"/>
  <text x="96" y="272" font-size="9.5" fill="#B45309">chỉ sweep INTERNAL (swing nhỏ trong range)</text>
  <!-- entry marker -->
  <circle cx="300" cy="193" r="6" fill="#DC2626"/>
  <text x="240" y="230" font-size="10.5" font-weight="700" fill="#B91C1C">Entry Short 1.20805 (CE của OB)</text>
  <!-- stop hit -->
  <circle cx="325" cy="150" r="5" fill="none" stroke="#B91C1C" stroke-width="2.2"/>
  <text x="330" y="145" font-size="10" font-weight="700" fill="#B91C1C">✗ SL bị quét</text>
  <!-- BSL sweep then drop -->
  <circle cx="370" cy="108" r="5" fill="#16A34A"/>
  <text x="376" y="97" font-size="9.5" fill="#15803D">giá quét external BSL xong...</text>
  <text x="430" y="196" font-size="9.5" fill="#15803D">...RỒI MỚI giảm thật</text>

  <text x="44" y="415" font-size="10.5" font-style="italic" fill="#6B7280">Cú short "đúng ý tưởng, sai một bậc thang thanh khoản": OB premium nằm NGAY DƯỚI một pool BSL chưa quét.</text>

  <!-- Right column: step gates -->
  <rect x="540" y="70" width="196" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="554" y="94" font-size="12.5" font-weight="700" fill="#1F2937">7 bước — lệnh này:</text>
  <text x="554" y="120" font-size="11" fill="#15803D">① Bias bearish ✓</text>
  <text x="554" y="144" font-size="11" font-weight="700" fill="#B91C1C">② Draw rõ ràng ✗</text>
  <text x="562" y="159" font-size="9" fill="#B91C1C">draw thật là BSL phía TRÊN</text>
  <text x="554" y="183" font-size="11" font-weight="700" fill="#B91C1C">③ Sweep external ✗</text>
  <text x="562" y="198" font-size="9" fill="#B91C1C">mới quét internal — chưa đủ</text>
  <text x="554" y="222" font-size="11" fill="#B45309">④ Displacement yếu (score 1)</text>
  <text x="554" y="246" font-size="11" fill="#15803D">⑤ POI hợp lệ ✓ (OB+FVG)</text>
  <text x="554" y="270" font-size="11" fill="#B91C1C">⑥ Entry ✗ — vào khi chuỗi gãy</text>
  <text x="554" y="294" font-size="11" fill="#6B7280">⑦ Target — không tới lượt</text>
  <line x1="554" y1="310" x2="722" y2="310" stroke="#E5E7EB"/>
  <text x="554" y="332" font-size="10.5" font-weight="700" fill="#1F2937">first_error_step: draw</text>
  <text x="554" y="352" font-size="10" fill="#374151">Session: Asia (ngoài kill zone,</text>
  <text x="554" y="366" font-size="10" fill="#374151">in_macro_time: No)</text>
  <text x="554" y="390" font-size="10" fill="#374151">Liên hệ: Mistake 13 — Trading</text>
  <text x="554" y="404" font-size="10" fill="#374151">Into Unswept Liquidity</text>

  <!-- Bottom lesson -->
  <rect x="24" y="444" width="712" height="100" rx="8" fill="#FEF3C7"/>
  <text x="38" y="468" font-size="12.5" font-weight="700" fill="#92400E">Why — vì sao OB đẹp vẫn thua ở đây?</text>
  <text x="38" y="488" font-size="11" fill="#78350F">Giá không chạy vì "OB mạnh hay yếu" — giá chạy để LẤY THANH KHOẢN. Khi ngay trên OB premium còn nguyên một pool BSL external,</text>
  <text x="38" y="506" font-size="11" fill="#78350F">thuật toán delivery có động cơ đẩy giá XUYÊN OB để khớp buy stops ở đó trước, rồi mới đảo. OB của bạn khi ấy không phải POI —</text>
  <text x="38" y="524" font-size="11" fill="#78350F">nó là chướng ngại nằm giữa giá và draw. Bài học: xác định DRAW trước, POI sau. POI ngược phía draw chưa quét = không trade.</text>
</svg>
