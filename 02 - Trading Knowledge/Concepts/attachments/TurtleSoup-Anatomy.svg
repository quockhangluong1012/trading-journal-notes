<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Turtle Soup Long — chuỗi tuần tự đầy đủ</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Mức hiển nhiên → Quét (sweep) → Reject → Reclaim → Displacement (+FVG) → MSS → Entry → Target.</text>

  <rect x="24" y="70" width="712" height="310" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- prior defined swing / liquidity pool -->
  <line x1="60" y1="300" x2="560" y2="300" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="64" y="294" font-size="10.5" font-weight="700" fill="#1D4ED8">① Mức hiển nhiên (equal lows / PDL / swing rõ) — SSL nghỉ tại đây</text>

  <!-- approach -->
  <path d="M60,160 L110,210 L150,250 L180,290" fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- sweep wick beyond level -->
  <rect x="176" y="298" width="14" height="12" fill="#DC2626" opacity="0.85" rx="1"/>
  <rect x="181" y="310" width="4" height="55" fill="#DC2626" opacity="0.85"/>
  <circle cx="220" cy="335" r="13" fill="none" stroke="#B45309" stroke-width="1.6"/>
  <text x="200" y="392" font-size="10.5" font-weight="700" fill="#B91C1C">② Sweep — wick nhú qua mức, lấy thanh khoản (SSL)</text>

  <!-- reject -->
  <text x="196" y="322" font-size="9.5" fill="#92400E">③ Reject: không acceptance</text>

  <!-- reclaim + displacement -->
  <path d="M188,320 L205,300 L225,255 L250,270 L295,165" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <text x="230" y="255" font-size="9.5" font-weight="700" fill="#15803D">④ Reclaim vào range</text>
  <rect x="298" y="145" width="13" height="65" fill="#16A34A" rx="1"/><rect x="303" y="140" width="2" height="80" fill="#16A34A"/>
  <text x="315" y="150" font-size="10.5" font-weight="700" fill="#15803D">⑤ Displacement (+FVG)</text>

  <!-- FVG box -->
  <rect x="293" y="165" width="20" height="42" fill="#16A34A" opacity="0.15" stroke="#166534" stroke-dasharray="3 3"/>
  <text x="316" y="185" font-size="9.5" fill="#166534">FVG</text>

  <!-- MSS -->
  <circle cx="250" cy="270" r="6" fill="none" stroke="#3B82F6" stroke-width="2.2"/>
  <line x1="250" y1="270" x2="470" y2="270" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="330" y="266" font-size="10" font-weight="700" fill="#1D4ED8">⑥ MSS — phá swing high LTF</text>

  <!-- entry retrace -->
  <path d="M311,145 L350,185 L385,200 L420,215 L470,250 L535,135" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="385" cy="200" r="7" fill="#16A34A"/>
  <text x="355" y="225" font-size="10.5" font-weight="700" fill="#15803D">⑦ Entry tại FVG (limit) hoặc market sau MSS</text>

  <!-- stop -->
  <line x1="176" y1="365" x2="716" y2="365" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="600" y="360" font-size="10" fill="#B91C1C">SL: ngoài cực trị sweep + buffer</text>

  <!-- target -->
  <line x1="535" y1="135" x2="716" y2="95" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="580" y="90" font-size="10.5" font-weight="700" fill="#166534">⑧ Target: thanh khoản đối diện (BSL)</text>

  <rect x="24" y="396" width="712" height="50" rx="6" fill="#FEF3C7"/>
  <text x="36" y="416" font-size="11.5" font-weight="700" fill="#92400E">Trình tự bắt buộc: Mức hiển nhiên → Sweep → Reject → Reclaim → Displacement/FVG → MSS → Entry → Target.</text>
  <text x="36" y="434" font-size="11.5" font-weight="700" fill="#92400E">Thiếu bất kỳ mắt xích nào (đặc biệt reclaim hoặc MSS) = không phải Turtle Soup hợp lệ.</text>
</svg>
