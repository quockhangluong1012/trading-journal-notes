<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ đúng — SD Projection neo trên manipulation leg, -2 SD trùng BSL/FVG HTF</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">NY KZ: Judas quét SSL → displacement + MSS bullish → chiếu SD lên, TP theo confluence</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- discount zone marker -->
  <rect x="44" y="300" width="672" height="60" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="316" font-size="10.5" fill="#1D4ED8">Discount — nơi Judas quét SSL trước khi đảo</text>

  <!-- price path: high -> judas sweep low (manipulation leg) -->
  <path d="M60,180 L130,220 L160,340 L185,300" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="130" cy="220" r="6" fill="#3B82F6"/>
  <text x="90" y="205" font-size="10.5" fill="#1D4ED8">① Điểm A — high trước Judas</text>

  <!-- sweep low point B -->
  <circle cx="160" cy="340" r="7" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <text x="110" y="362" font-size="10.5" font-weight="700" fill="#B91C1C">② Điểm B — quét SSL (Judas swing) = anchor</text>

  <!-- manipulation leg bracket -->
  <line x1="205" y1="220" x2="205" y2="340" stroke="#F59E0B" stroke-width="1.6"/>
  <line x1="200" y1="220" x2="210" y2="220" stroke="#F59E0B" stroke-width="1.6"/>
  <line x1="200" y1="340" x2="210" y2="340" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="214" y="285" font-size="10" font-weight="700" fill="#B45309">leg tham chiếu</text>
  <text x="214" y="298" font-size="10" font-weight="700" fill="#B45309">(1 đơn vị SD)</text>

  <!-- displacement + MSS -->
  <path d="M185,300 L230,330 L270,150" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <rect x="255" y="140" width="13" height="70" fill="#16A34A" rx="1"/>
  <text x="285" y="150" font-size="10.5" font-weight="700" fill="#15803D">③ Displacement + MSS bullish</text>

  <!-- entry -->
  <circle cx="270" cy="200" r="6" fill="#16A34A"/>
  <text x="285" y="205" font-size="10" fill="#166534">Entry (sweep+MSS+FVG)</text>

  <!-- SD ladder from B upward, symmetric multiples of leg -->
  <!-- leg unit = 120px -->
  <line x1="290" y1="340" x2="716" y2="340" stroke="#9CA3AF" stroke-dasharray="2 3"/>
  <line x1="290" y1="220" x2="716" y2="220" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="700" y="216" font-size="10" fill="#1D4ED8" text-anchor="end">-1 SD</text>

  <line x1="290" y1="100" x2="716" y2="100" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="700" y="96" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="end">-2 SD</text>

  <line x1="290" y1="40" x2="716" y2="40" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="700" y="36" font-size="10" fill="#1D4ED8" text-anchor="end">-2.5 SD</text>

  <!-- since -3 would go offscreen, show as label near top edge -->
  <text x="700" y="16" font-size="9.5" fill="#6B7280" text-anchor="end">-3 SD (ngoài khung)</text>

  <!-- confluence box at -2 SD -->
  <rect x="560" y="82" width="140" height="36" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2" rx="4"/>
  <text x="568" y="104" font-size="10" font-weight="700" fill="#92400E">④ Confluence: BSL/FVG HTF</text>

  <!-- price path continuing up through TP1, TP2 -->
  <path d="M270,200 L330,175 L400,220 L470,205 L540,100 L610,120 L660,100" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="none"/>
  <circle cx="400" cy="220" r="5" fill="#3B82F6"/>
  <text x="405" y="238" font-size="9.5" fill="#1D4ED8">TP1 -1 SD</text>
  <circle cx="610" cy="100" r="6" fill="#16A34A"/>
  <text x="600" y="132" font-size="9.5" font-weight="700" fill="#15803D">⑤ TP2 -2 SD (target chính)</text>

  <!-- stop -->
  <line x1="185" y1="352" x2="290" y2="352" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="4 3"/>
  <text x="190" y="368" font-size="9.5" fill="#B91C1C">SL dưới điểm sweep [B]</text>

  <rect x="24" y="410" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Chuỗi: Judas quét SSL (A→B = manipulation leg) → displacement + MSS bullish → neo SD tại A→B</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">→ chiếu -1/-2/-2.5/-3 SD lên trên → -2 SD trùng BSL/FVG HTF = target chính → TP1 tại -1 SD,</text>
  <text x="36" y="466" font-size="11.5" font-weight="700" fill="#92400E">TP2 tại -2 SD; entry vẫn theo mô hình sweep+MSS+FVG, KHÔNG vào tại mức SD.</text>
</svg>
