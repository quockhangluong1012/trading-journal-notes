<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Inducement (IDM) vs Structural Sweep — cùng một range, hai vị trí thanh khoản</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">IDM = thanh khoản trung gian, nhỏ, gần POI, là mồi (KHÔNG đảo tại đó). Structural sweep = thanh khoản chính ở cực range.</text>

  <!-- LEFT: IDM -->
  <rect x="24" y="72" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="13" font-weight="700" fill="#B45309">IDM — thanh khoản TRUNG GIAN (mồi)</text>

  <!-- range edges -->
  <line x1="44" y1="120" x2="349" y2="120" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="48" y="115" font-size="9.5" fill="#9CA3AF">Đỉnh range (external BSL)</text>
  <line x1="44" y1="372" x2="349" y2="372" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="48" y="368" font-size="9.5" fill="#9CA3AF">Đáy range (external SSL)</text>

  <!-- OB near lower area -->
  <rect x="44" y="300" width="305" height="40" fill="#3B82F6" opacity="0.10"/>
  <text x="52" y="316" font-size="9.5" font-weight="700" fill="#1D4ED8">Bullish OB (POI thật)</text>

  <!-- price path -->
  <path d="M60,150 L110,215 L150,185 L200,270 L235,240 L270,290" fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- IDM minor low above OB -->
  <circle cx="200" cy="270" r="6" fill="none" stroke="#F59E0B" stroke-width="2.4"/>
  <text x="90" y="262" font-size="9.5" font-weight="700" fill="#B45309">IDM = đáy nhỏ gần POI</text>
  <!-- push up after touching OB -->
  <path d="M270,290 L300,240 L330,155" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="150" y="358" font-size="9.5" fill="#6B7280">Quét mồi, chạm OB, ĐẢO tại OB (không tại IDM)</text>

  <!-- LEFT box notes -->
  <rect x="40" y="382" width="313" height="14" rx="4" fill="#FEF3C7"/>
  <text x="48" y="393" font-size="9.5" font-weight="700" fill="#92400E">Swing NHỎ, gần POI, là mồi, KHÔNG đảo tại đó</text>

  <!-- RIGHT: Structural sweep -->
  <rect x="391" y="72" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="407" y="94" font-size="13" font-weight="700" fill="#DC2626">Structural Sweep — thanh khoản CHÍNH (external)</text>

  <line x1="411" y1="120" x2="716" y2="120" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="415" y="115" font-size="9.5" fill="#9CA3AF">Đỉnh range (external BSL)</text>
  <line x1="411" y1="360" x2="716" y2="360" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="415" y="356" font-size="9.5" font-weight="700" fill="#DC2626">Đáy range chính (external SSL) — swing lớn</text>

  <!-- price path down to sweep the range low -->
  <path d="M430,150 L470,220 L505,190 L550,285 L590,255 L640,380" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="640" cy="380" r="9" fill="none" stroke="#DC2626" stroke-width="2.6"/>
  <text x="540" y="400" font-size="9.5" font-weight="700" fill="#DC2626">Quét cực range</text>
  <!-- reverse immediately with MSS -->
  <path d="M640,380 L670,300 L690,320 L710,160" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <text x="500" y="145" font-size="9.5" font-weight="700" fill="#15803D">ĐẢO NGAY sau sweep, kèm MSS</text>

  <rect x="407" y="382" width="313" height="14" rx="4" fill="#FEE2E2"/>
  <text x="415" y="393" font-size="9.5" font-weight="700" fill="#991B1B">Swing LỚN, cực range, thường đảo ngay, đi kèm MSS</text>

  <rect x="24" y="412" width="712" height="46" rx="6" fill="#EFF6FF"/>
  <text x="36" y="431" font-size="11" font-weight="700" fill="#1D4ED8">Khác biệt hành động: vào TẠI IDM = bạn là thanh khoản, bị quét. Structural sweep ở cực range thường</text>
  <text x="36" y="448" font-size="11" font-weight="700" fill="#1D4ED8">chính là ĐIỀU KIỆN entry hợp lệ (giá đảo ngay tại đó kèm MSS). Đọc sai loại thì narrative và target ngược.</text>
</svg>
