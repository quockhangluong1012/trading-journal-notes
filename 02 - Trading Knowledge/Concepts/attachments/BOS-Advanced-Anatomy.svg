<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu một Bullish BOS hợp lệ — 5 bộ phận bắt buộc</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Thiếu bất kỳ bộ phận nào, cú phá bị hạ cấp thành sweep / noise — không được dùng để xác nhận tiếp diễn.</text>

  <rect x="24" y="70" width="470" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- uptrend base -->
  <path d="M50,400 L95,330 L125,365 L170,280 L205,320" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="46" y="420" font-size="10.5" fill="#6B7280">① Trend nền: chuỗi HH/HL đang chạy</text>

  <!-- swing high reference -->
  <line x1="150" y1="280" x2="400" y2="280" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="210" y="272" font-size="10.5" fill="#4B5563">② Swing high tham chiếu (protected/ý nghĩa)</text>

  <!-- displacement candles breaking -->
  <rect x="228" y="292" width="2" height="46" fill="#16A34A"/><rect x="222" y="298" width="13" height="34" fill="#16A34A" rx="1"/>
  <rect x="252" y="228" width="2" height="88" fill="#16A34A"/><rect x="246" y="238" width="13" height="70" fill="#16A34A" rx="1"/>
  <!-- big breaking candle closes above line -->
  <rect x="276" y="170" width="2" height="105" fill="#16A34A"/><rect x="270" y="180" width="13" height="80" fill="#16A34A" rx="1"/>
  <text x="292" y="192" font-size="10.5" font-weight="700" fill="#15803D">③ BODY CLOSE trên swing</text>
  <text x="292" y="206" font-size="10.5" fill="#15803D">(không phải chỉ wick)</text>

  <!-- FVG left -->
  <rect x="262" y="296" width="120" height="22" fill="#3B82F6" opacity="0.16"/>
  <text x="386" y="311" font-size="10.5" fill="#1D4ED8">④ Displacement để lại FVG</text>

  <!-- hold + pullback no reclaim -->
  <rect x="312" y="150" width="2" height="60" fill="#16A34A"/><rect x="306" y="156" width="13" height="44" fill="#16A34A" rx="1"/>
  <rect x="336" y="185" width="2" height="55" fill="#DC2626"/><rect x="330" y="190" width="13" height="40" fill="#DC2626" rx="1"/>
  <rect x="360" y="135" width="2" height="70" fill="#16A34A"/><rect x="354" y="142" width="13" height="52" fill="#16A34A" rx="1"/>
  <path d="M345,245 L345,275" stroke="#0EA5E9" stroke-width="1.5" marker-end="none"/>
  <text x="332" y="120" font-size="10.5" font-weight="700" fill="#0284C7">⑤ Giữ giá — pullback</text>
  <text x="332" y="134" font-size="10.5" fill="#0284C7">KHÔNG reclaim vào range cũ</text>

  <!-- Right panel: consequences -->
  <rect x="510" y="70" width="226" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="524" y="96" font-size="13" font-weight="700" fill="#1F2937">BOS hợp lệ kéo theo gì?</text>

  <rect x="524" y="112" width="198" height="70" rx="6" fill="#DCFCE7"/>
  <text x="534" y="132" font-size="11.5" font-weight="700" fill="#166534">Bias: được KHẲNG ĐỊNH</text>
  <text x="534" y="149" font-size="10.5" fill="#374151">Order flow cũ còn hiệu lực;</text>
  <text x="534" y="164" font-size="10.5" fill="#374151">tiếp tục tìm Long theo trend.</text>

  <rect x="524" y="192" width="198" height="70" rx="6" fill="#DBEAFE"/>
  <text x="534" y="212" font-size="11.5" font-weight="700" fill="#1E40AF">Dealing range: VẼ LẠI</text>
  <text x="534" y="229" font-size="10.5" fill="#374151">External range mở rộng lên;</text>
  <text x="534" y="244" font-size="10.5" fill="#374151">đo lại premium/discount mới.</text>

  <rect x="524" y="272" width="198" height="70" rx="6" fill="#EDE9FE"/>
  <text x="534" y="292" font-size="11.5" font-weight="700" fill="#5B21B6">Protected Low: DỜI LÊN</text>
  <text x="534" y="309" font-size="10.5" fill="#374151">= đáy (ITL) cuối cùng trước</text>
  <text x="534" y="324" font-size="10.5" fill="#374151">cú phá; thủng nó → nghi MSS.</text>

  <rect x="524" y="352" width="198" height="70" rx="6" fill="#FEF3C7"/>
  <text x="534" y="372" font-size="11.5" font-weight="700" fill="#92400E">Entry: CHƯA — chờ retrace</text>
  <text x="534" y="389" font-size="10.5" fill="#374151">Vào tại FVG/OB của cú phá,</text>
  <text x="534" y="404" font-size="10.5" fill="#374151">không chase tại điểm break.</text>
</svg>
