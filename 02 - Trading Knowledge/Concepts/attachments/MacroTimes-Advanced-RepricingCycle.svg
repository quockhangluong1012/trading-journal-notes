<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="340" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vì sao Macro tồn tại — chu kỳ repricing của thuật toán</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Mỗi chân mở rộng được mở đầu bằng một khoảnh khắc repricing tại macro.</text>
<rect x="40" y="110" width="150" height="150" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/><text x="52" y="140" font-size="12.5" font-weight="700" fill="#DC2626">① Quét thanh khoản</text><text x="52" y="162" font-size="10.5" fill="#374151">Chạy stop trên/dưới 1</text><text x="52" y="178" font-size="10.5" fill="#374151">mức → lấy đối ứng</text><text x="198" y="190" font-size="20" fill="#94A3B8">→</text><rect x="212" y="110" width="150" height="150" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.5"/><text x="224" y="140" font-size="12.5" font-weight="700" fill="#1D4ED8">② Displacement</text><text x="224" y="162" font-size="10.5" fill="#374151">Nến đẩy mạnh để lại FVG</text><text x="224" y="178" font-size="10.5" fill="#374151">(mất cân bằng)</text><text x="370" y="190" font-size="20" fill="#94A3B8">→</text><rect x="384" y="110" width="150" height="150" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/><text x="396" y="140" font-size="12.5" font-weight="700" fill="#16A34A">③ FVG = bệ phóng</text><text x="396" y="162" font-size="10.5" fill="#374151">Giá dùng FVG làm điểm</text><text x="396" y="178" font-size="10.5" fill="#374151">tựa cho chân kế</text><text x="542" y="190" font-size="20" fill="#94A3B8">→</text><rect x="556" y="110" width="150" height="150" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/><text x="568" y="140" font-size="12.5" font-weight="700" fill="#7C3AED">④ Giao tới DOL</text><text x="568" y="162" font-size="10.5" fill="#374151">Phân phối về draw on</text><text x="568" y="178" font-size="10.5" fill="#374151">liquidity trong ngày</text><text x="40" y="296" font-size="11" fill="#6B7280">Macro dồn quanh các thời điểm chuyển giao phiên (London/NY/PM) — nơi khối lượng &amp; thanh khoản lớn nhất.</text>
</svg>
