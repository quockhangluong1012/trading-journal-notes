<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ ĐÚNG — Bullish Mitigation Block (higher low, không sweep)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">HTF Bias Bullish · Location Discount · đáy cũ giữ vững → MSS → retest MB → Long</text>

  <rect x="24" y="70" width="712" height="298" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- discount zone -->
  <rect x="44" y="270" width="672" height="86" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="288" font-size="10" fill="#1D4ED8">Discount của dealing range</text>

  <!-- STL level held -->
  <line x1="110" y1="325" x2="520" y2="325" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="130" y="341" font-size="10" fill="#15803D">STL — đáy cũ GIỮ (không sweep SSL)</text>

  <!-- STL -> STH -->
  <path d="M60,230 L110,325 L165,210" fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="160" y="150" width="28" height="55" fill="#DC2626" opacity="0.5" rx="1"/>
  <text x="142" y="143" font-size="9.5" fill="#B91C1C">cụm nến giảm = OB cũ</text>
  <circle cx="175" cy="195" r="6" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <line x1="175" y1="195" x2="500" y2="195" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="195" y="190" font-size="10" font-weight="700" fill="#1D4ED8">STH — mức MSS phải phá</text>

  <!-- pullback FAILS = higher low -->
  <path d="M175,195 L235,290 L290,225" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="235" cy="290" r="7" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="200" y="312" font-size="10" font-weight="700" fill="#15803D">higher low — pullback FAILS, không phá STL</text>

  <!-- displacement up breaking STH -->
  <path d="M290,225 L330,195 L350,215 L415,110" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <text x="420" y="120" font-size="10.5" font-weight="700" fill="#15803D">displacement phá STH = MSS bullish</text>
  <rect x="345" y="180" width="110" height="22" fill="#3B82F6" opacity="0.18"/>
  <text x="348" y="196" font-size="9" fill="#1D4ED8">FVG</text>

  <!-- MB zone -->
  <rect x="295" y="210" width="26" height="42" fill="#F59E0B" opacity="0.55" rx="1"/>
  <text x="290" y="268" font-size="9.5" font-weight="700" fill="#B45309">cụm nến giảm cuối = bullish MB</text>

  <!-- retrace + entry -->
  <path d="M415,110 L450,165 L470,222 L495,190 L545,120 L600,150 L660,80" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="470" cy="222" r="6" fill="#16A34A"/>
  <text x="470" y="246" font-size="10" font-weight="700" fill="#15803D">Long tại retest MB</text>

  <line x1="600" y1="80" x2="716" y2="80" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="600" y="72" font-size="10" fill="#166534">Target: BSL phía trên</text>

  <rect x="24" y="378" width="712" height="52" rx="6" fill="#DCFCE7"/>
  <text x="36" y="398" font-size="11.5" font-weight="700" fill="#15803D">Vì sao đúng: đủ chuỗi failure swing (higher low, KHÔNG sweep) → displacement → MSS trước khi gọi MB.</text>
  <text x="36" y="418" font-size="11" fill="#166534">Vùng MB ở discount, đồng hướng bias. Stop dưới higher low; target là BSL rõ ràng.</text>
</svg>
