<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Sai — Short ngay khi giá chạm BSL (chưa quét)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Coi BSL là kháng cự thường; bán sớm, không chờ sweep + MSS → bị cuốn theo.</text>

  <!-- BSL line -->
  <line x1="120" y1="150" x2="700" y2="150" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="144" font-size="12" font-weight="700" fill="#2563EB">BSL (đỉnh cũ)</text>

  <!-- price rallying up toward BSL -->
  <rect x="130" y="330" width="2" height="55" fill="#16A34A"/><rect x="124" y="335" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="156" y="300" width="2" height="55" fill="#16A34A"/><rect x="150" y="305" width="14" height="42" fill="#16A34A" rx="1"/>
  <rect x="182" y="265" width="2" height="60" fill="#16A34A"/><rect x="176" y="270" width="14" height="48" fill="#16A34A" rx="1"/>
  <rect x="208" y="230" width="2" height="60" fill="#16A34A"/><rect x="202" y="235" width="14" height="48" fill="#16A34A" rx="1"/>
  <rect x="234" y="195" width="2" height="58" fill="#16A34A"/><rect x="228" y="200" width="14" height="45" fill="#16A34A" rx="1"/>

  <!-- trader shorts as price touches BSL (premature) -->
  <rect x="260" y="160" width="2" height="55" fill="#16A34A"/><rect x="254" y="165" width="14" height="40" fill="#16A34A" rx="1"/>
  <circle cx="261" cy="166" r="5" fill="#DC2626"/>
  <text x="200" y="178" font-size="12" font-weight="700" fill="#DC2626">Short sớm tại BSL</text>

  <!-- price keeps grabbing the liquidity and expands UP -->
  <rect x="286" y="125" width="2" height="65" fill="#16A34A"/><rect x="280" y="130" width="14" height="48" fill="#16A34A" rx="1"/>
  <rect x="312" y="95" width="2" height="60" fill="#16A34A"/><rect x="306" y="100" width="14" height="45" fill="#16A34A" rx="1"/>
  <rect x="338" y="75" width="2" height="55" fill="#16A34A"/><rect x="332" y="80" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="364" y="90" width="2" height="50" fill="#DC2626"/><rect x="358" y="95" width="14" height="35" fill="#DC2626" rx="1"/>

  <!-- stop hit marker -->
  <line x1="250" y1="120" x2="420" y2="120" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="370" y="115" font-size="12" fill="#DC2626">Stop bị quét</text>
  <path d="M340 80 l 18 -10 l -1 11 z" fill="#16A34A"/>
  <text x="360" y="74" font-size="12" fill="#16A34A">Giá hút BSL rồi đi tiếp lên</text>

  <text x="24" y="430" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="70" y="430" font-size="12" fill="#374151">— BSL là nơi giá BỊ HÚT TỚI để quét buy-stops, không phải kháng cự để bán mù.</text>
  <text x="70" y="448" font-size="12" fill="#374151">Phải chờ sweep + đóng nến quay lại + MSS xác nhận đảo chiều mới Short.</text>
</svg>
