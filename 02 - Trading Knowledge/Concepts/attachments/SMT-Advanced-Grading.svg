<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="300" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Chấm điểm chất lượng SMT (A / B / C)</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Không phải mọi SMT ngang nhau. Càng nhiều điều kiện hội tụ, cấp càng cao.</text><rect x="24" y="72" width="228" height="210" rx="8" fill="#DCFCE7" stroke="#16A34A"/><text x="40" y="98" font-size="12.5" font-weight="700" fill="#166534">A+ — giao dịch mạnh</text><text x="40" y="122" font-size="10" fill="#374151">• Cặp tương quan lõi (NQ/ES, EU/DXY)</text><text x="40" y="144" font-size="10" fill="#374151">• Tại pool HTF rõ (PDH/PDL, equal)</text><text x="40" y="166" font-size="10" fill="#374151">• Trong killzone / macro window</text><text x="40" y="188" font-size="10" fill="#374151">• Thuận Daily Bias</text><text x="40" y="210" font-size="10" fill="#374151">• Có sweep + CISD/MSS + FVG</text><rect x="268" y="72" width="228" height="210" rx="8" fill="#FEF3C7" stroke="#F59E0B"/><text x="284" y="98" font-size="12.5" font-weight="700" fill="#B45309">B — cân nhắc, giảm size</text><text x="284" y="122" font-size="10" fill="#374151">• Cặp tương quan ổn nhưng phụ</text><text x="284" y="144" font-size="10" fill="#374151">• Pool LTF (không phải HTF)</text><text x="284" y="166" font-size="10" fill="#374151">• Ngoài macro nhưng trong session</text><text x="284" y="188" font-size="10" fill="#374151">• Bias trung tính</text><text x="284" y="210" font-size="10" fill="#374151">• Có sweep, trigger yếu hơn</text><rect x="512" y="72" width="228" height="210" rx="8" fill="#FEE2E2" stroke="#DC2626"/><text x="528" y="98" font-size="12.5" font-weight="700" fill="#B91C1C">C — bỏ qua</text><text x="528" y="122" font-size="10" fill="#374151">• Tương quan yếu / theo mùa</text><text x="528" y="144" font-size="10" fill="#374151">• Giữa range, xa pool</text><text x="528" y="166" font-size="10" fill="#374151">• Ngoài killzone</text><text x="528" y="188" font-size="10" fill="#374151">• Ngược bias, không narrative</text><text x="528" y="210" font-size="10" fill="#374151">• Chỉ có lệch pha, thiếu trigger</text>
</svg>
