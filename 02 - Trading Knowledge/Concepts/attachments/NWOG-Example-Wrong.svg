<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — coi gap Chủ Nhật mỏng trên forex là NWOG mạnh, vào lệnh ngược bias</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">EURUSD: phiên Sunday evening thanh khoản mỏng, gap gần như không đáng kể; trader vẫn ép vào lệnh ngược bias tuần tại CE.</text>

  <rect x="24" y="70" width="712" height="322" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- premium zone shading (wrong side) -->
  <rect x="44" y="120" width="672" height="80" fill="#DC2626" opacity="0.05"/>
  <text x="52" y="138" font-size="10.5" fill="#B91C1C">Premium của tuần — bias HTF là bearish (nên short, không nên long)</text>

  <!-- Friday close -->
  <line x1="70" y1="180" x2="230" y2="180" stroke="#374151" stroke-width="1.6"/>
  <text x="72" y="172" font-size="10" fill="#374151">Friday Close</text>
  <circle cx="230" cy="180" r="5" fill="#374151"/>

  <!-- tiny "gap" - almost inside -->
  <rect x="230" y="178" width="20" height="8" fill="#F59E0B" opacity="0.2" stroke="#B45309" stroke-dasharray="3 2"/>
  <text x="256" y="176" font-size="9.5" font-weight="700" fill="#92400E">"NWOG" mỏng — gần như inside (forex)</text>

  <!-- Sunday open almost same level -->
  <line x1="250" y1="186" x2="420" y2="186" stroke="#374151" stroke-width="1.6"/>
  <circle cx="250" cy="186" r="5" fill="#374151"/>
  <text x="256" y="204" font-size="10" fill="#374151">① Sunday Open ≈ Friday Close — gap không đáng kể, thanh khoản mỏng</text>

  <!-- erratic thin sunday session wiggle -->
  <path d="M250,186 L270,175 L285,196 L300,180 L315,198 L330,183" fill="none" stroke="#9CA3AF" stroke-width="1.8" stroke-dasharray="2 3"/>
  <text x="252" y="222" font-size="9.5" fill="#9CA3AF">Nến Chủ Nhật đi ngang/nhiễu (thanh khoản mỏng, spread rộng)</text>

  <!-- fake "CE" drawn on a near-nothing gap -->
  <line x1="250" y1="182" x2="716" y2="182" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="3 3"/>
  <text x="590" y="176" font-size="10" font-weight="700" fill="#B91C1C">"CE" của gap gần như bằng 0 — vô nghĩa</text>

  <!-- price ignores this and trends down against long entry -->
  <path d="M330,183 L380,210 L430,225 L480,255 L530,270 L600,300 L660,330" fill="none" stroke="#DC2626" stroke-width="2.4"/>
  <circle cx="420" cy="220" r="10" fill="none" stroke="#DC2626" stroke-width="2"/>
  <text x="360" y="248" font-size="10.5" font-weight="700" fill="#B91C1C">② Vào Long tại "CE" — không sweep, không MSS, ngược bias bearish</text>

  <!-- SL hit -->
  <line x1="420" y1="255" x2="716" y2="255" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="600" y="270" font-size="10" fill="#B91C1C">SL — giá đóng cửa xuyên thẳng qua, không phản ứng</text>

  <text x="440" y="340" font-size="10.5" font-weight="700" fill="#991B1B">③ Giá tiếp tục giảm theo bias HTF thật (bỏ qua "NWOG" mỏng)</text>

  <rect x="24" y="402" width="712" height="64" rx="6" fill="#FEF3C7"/>
  <text x="36" y="422" font-size="11.5" font-weight="700" fill="#92400E">Sai: forex Chủ Nhật mở gần như liên tục (gap rất mỏng, thanh khoản thấp) — không có "wall of liquidity"</text>
  <text x="36" y="440" font-size="11.5" font-weight="700" fill="#92400E">như index futures. Vào lệnh tại CE của gap mỏng, ngược bias HTF, không sweep/MSS = ép setup không tồn tại.</text>
  <text x="36" y="456" font-size="10.5" fill="#92400E">Bài học: trên forex, hạ trọng số NWOG mỏng; luôn ưu tiên bias HTF + xác nhận LTF hơn là "gap" gần như không có.</text>
</svg>
