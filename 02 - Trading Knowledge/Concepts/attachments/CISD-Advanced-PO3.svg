<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CISD trong Power of Three (AMD): dấu mốc kết thúc Manipulation</text>
  <text x="24" y="55" font-size="12.5" fill="#6B7280">Accumulation → Manipulation (sweep) → CISD → Distribution. CISD là ranh giới giữa M và D.</text>

  <rect x="24" y="72" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- phase backgrounds -->
  <rect x="60" y="120" width="150" height="250" fill="#F3F4F6" opacity="0.7"/>
  <rect x="210" y="120" width="130" height="250" fill="#FEF3C7" opacity="0.55"/>
  <rect x="340" y="120" width="360" height="250" fill="#DCFCE7" opacity="0.45"/>
  <text x="135" y="138" font-size="11" font-weight="700" fill="#4B5563" text-anchor="middle">ACCUMULATION</text>
  <text x="275" y="138" font-size="11" font-weight="700" fill="#B45309" text-anchor="middle">MANIPULATION</text>
  <text x="520" y="138" font-size="11" font-weight="700" fill="#166534" text-anchor="middle">DISTRIBUTION</text>

  <!-- open reference line (session open) -->
  <line x1="60" y1="230" x2="700" y2="230" stroke="#9CA3AF" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="640" y="224" font-size="9" fill="#6B7280">Session Open</text>

  <!-- accumulation: small candles around open -->
  <rect x="78" y="222" width="2" height="26" fill="#DC2626"/><rect x="72" y="226" width="12" height="18" fill="#DC2626" rx="1"/>
  <rect x="100" y="218" width="2" height="28" fill="#16A34A"/><rect x="94" y="224" width="12" height="18" fill="#16A34A" rx="1"/>
  <rect x="122" y="220" width="2" height="30" fill="#DC2626"/><rect x="116" y="226" width="12" height="20" fill="#DC2626" rx="1"/>
  <rect x="144" y="216" width="2" height="30" fill="#16A34A"/><rect x="138" y="224" width="12" height="18" fill="#16A34A" rx="1"/>
  <rect x="166" y="222" width="2" height="26" fill="#DC2626"/><rect x="160" y="226" width="12" height="18" fill="#DC2626" rx="1"/>

  <!-- manipulation: sweep down -->
  <rect x="222" y="240" width="2" height="60" fill="#DC2626"/><rect x="216" y="246" width="12" height="46" fill="#DC2626" rx="1"/>
  <rect x="248" y="270" width="2" height="80" fill="#DC2626"/><rect x="242" y="278" width="12" height="60" fill="#DC2626" rx="1"/>
  <rect x="274" y="300" width="2" height="76" fill="#16A34A"/><rect x="268" y="326" width="12" height="42" fill="#16A34A" rx="1"/>
  <circle cx="275" cy="376" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="292" y="382" font-size="9.5" font-weight="700" fill="#B45309">Sweep SSL</text>

  <!-- CISD line = open of manip leg -->
  <line x1="216" y1="246" x2="430" y2="246" stroke="#0EA5E9" stroke-width="2.5" stroke-dasharray="9 4"/>
  <rect x="436" y="237" width="132" height="18" rx="3" fill="#E0F2FE"/><text x="442" y="250" font-size="9.5" font-weight="700" fill="#0284C7">CISD = open M-leg</text>

  <!-- distribution up -->
  <rect x="300" y="215" width="2" height="120" fill="#16A34A"/><rect x="294" y="222" width="12" height="100" fill="#16A34A" rx="1"/>
  <circle cx="300" cy="226" r="6" fill="#0EA5E9"/>
  <rect x="326" y="180" width="2" height="90" fill="#16A34A"/><rect x="320" y="192" width="12" height="72" fill="#16A34A" rx="1"/>
  <rect x="352" y="150" width="2" height="90" fill="#16A34A"/><rect x="346" y="160" width="12" height="72" fill="#16A34A" rx="1"/>
  <rect x="378" y="170" width="2" height="70" fill="#16A34A"/><rect x="372" y="180" width="12" height="52" fill="#16A34A" rx="1"/>
  <rect x="404" y="140" width="2" height="80" fill="#16A34A"/><rect x="398" y="150" width="12" height="62" fill="#16A34A" rx="1"/>

  <!-- target: BSL -->
  <line x1="430" y1="150" x2="700" y2="150" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="560" y="144" font-size="9.5" font-weight="700" fill="#B91C1C">BSL — draw on liquidity</text>

  <text x="40" y="394" font-size="10" fill="#6B7280">CISD in ra = manipulation kết thúc → an toàn hơn để trade cùng chiều distribution.</text>
</svg>