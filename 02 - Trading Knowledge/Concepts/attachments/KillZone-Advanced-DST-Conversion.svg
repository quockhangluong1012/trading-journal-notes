<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">DST làm lệch giờ Việt Nam của Kill Zone như thế nào</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng một giờ New York, nhưng giờ Việt Nam quy đổi khác nhau 1 giờ tùy mùa DST của Mỹ.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Summer DST panel -->
  <text x="48" y="100" font-size="13" font-weight="700" fill="#166534">Mùa hè Mỹ — EDT (UTC−4) — khoảng 8/3 – 1/11</text>
  <rect x="48" y="112" width="330" height="24" rx="4" fill="#16A34A" opacity="0.15" stroke="#16A34A"/>
  <text x="58" y="128" font-size="10.5" fill="#166534">Việt Nam = giờ NY + 11 giờ</text>

  <!-- Winter STD panel -->
  <text x="404" y="100" font-size="13" font-weight="700" fill="#1D4ED8">Mùa đông Mỹ — EST (UTC−5) — khoảng 1/11 – 8/3</text>
  <rect x="404" y="112" width="330" height="24" rx="4" fill="#3B82F6" opacity="0.15" stroke="#3B82F6"/>
  <text x="414" y="128" font-size="10.5" fill="#1D4ED8">Việt Nam = giờ NY + 12 giờ</text>

  <!-- Comparison table -->
  <line x1="48" y1="152" x2="734" y2="152" stroke="#E5E7EB"/>
  <text x="48" y="170" font-size="10.5" font-weight="700" fill="#374151">Kill Zone (giờ NY)</text>
  <text x="260" y="170" font-size="10.5" font-weight="700" fill="#166534">Giờ VN — mùa hè (EDT, +11h)</text>
  <text x="500" y="170" font-size="10.5" font-weight="700" fill="#1D4ED8">Giờ VN — mùa đông (EST, +12h)</text>
  <line x1="48" y1="180" x2="734" y2="180" stroke="#F3F4F6"/>

  <g font-size="10.5" fill="#374151">
    <text x="48" y="200">Asian Range 20:00–00:00</text>
    <text x="260" y="200" fill="#166534">07:00–11:00</text>
    <text x="500" y="200" fill="#1D4ED8">08:00–12:00</text>

    <text x="48" y="222">London Open KZ 02:00–05:00</text>
    <text x="260" y="222" fill="#166534">13:00–16:00</text>
    <text x="500" y="222" fill="#1D4ED8">14:00–17:00</text>

    <text x="48" y="244">Silver Bullet London 03:00–04:00</text>
    <text x="260" y="244" fill="#166534">14:00–15:00</text>
    <text x="500" y="244" fill="#1D4ED8">15:00–16:00</text>

    <text x="48" y="266">NY AM KZ 07:00–10:00</text>
    <text x="260" y="266" fill="#166534">18:00–21:00</text>
    <text x="500" y="266" fill="#1D4ED8">19:00–22:00</text>

    <text x="48" y="288">Silver Bullet NY AM 10:00–11:00</text>
    <text x="260" y="288" fill="#166534">21:00–22:00</text>
    <text x="500" y="288" fill="#1D4ED8">22:00–23:00</text>

    <text x="48" y="310">NY Lunch 11:30–13:00</text>
    <text x="260" y="310" fill="#166534">22:30–00:00</text>
    <text x="500" y="310" fill="#1D4ED8">23:30–01:00</text>

    <text x="48" y="332">London Close KZ 10:00–12:00</text>
    <text x="260" y="332" fill="#166534">21:00–23:00</text>
    <text x="500" y="332" fill="#1D4ED8">22:00–00:00</text>
  </g>

  <line x1="48" y1="345" x2="734" y2="345" stroke="#E5E7EB"/>

  <!-- Rule of thumb box -->
  <rect x="48" y="358" width="686" height="30" rx="5" fill="#EFF6FF" stroke="#3B82F6"/>
  <text x="58" y="377" font-size="10.5" fill="#1D4ED8">Quy tắc nhanh: Mỹ đổi giờ ~Chủ Nhật 2 tuần đầu tháng 3 (spring forward) và ~Chủ Nhật đầu tháng 11 (fall back). Việt Nam không có DST.</text>

  <!-- Bottom banner -->
  <rect x="24" y="398" width="712" height="42" rx="6" fill="#FEF3C7"/>
  <text x="38" y="416" font-size="11" font-weight="700" fill="#92400E">Ghi nhớ: cùng một Kill Zone NY, giờ Việt Nam LỆCH ĐÚNG 1 GIỜ giữa hai mùa DST.</text>
  <text x="38" y="431" font-size="10" fill="#92400E">Luôn kiểm tra ngày hiện tại đang thuộc mùa nào trước khi đặt báo thức/canh lệnh — đừng dùng con số cũ theo quán tính.</text>
</svg>
