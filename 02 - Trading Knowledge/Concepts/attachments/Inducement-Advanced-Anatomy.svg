<svg viewBox="0 0 760 490" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="490" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu setup Long với Inducement — entry TẠI POI, không tại IDM</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Bối cảnh: HTF bullish, draw = BSL phía trên. Giá retrace về discount, IDM (đáy nhỏ) nằm TRÊN một bullish OB.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- draw / BSL target on top -->
  <line x1="44" y1="102" x2="704" y2="102" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="52" y="96" font-size="10.5" font-weight="700" fill="#166534">① HTF Bullish — Draw on liquidity = BSL (target external phía trên)</text>

  <!-- OB zone (real POI) -->
  <rect x="44" y="330" width="660" height="60" fill="#3B82F6" opacity="0.10"/>
  <text x="52" y="348" font-size="10.5" font-weight="700" fill="#1D4ED8">③ Bullish Order Block (POI THẬT) — vùng discount, nơi smart money khớp lệnh</text>

  <!-- retrace leg down into discount -->
  <path d="M70,130 L130,200 L175,165 L235,255 L275,225 L320,300" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="80" y="150" font-size="10.5" fill="#6B7280">② Giá retrace vào discount</text>

  <!-- IDM = minor low (SSL) above OB -->
  <circle cx="320" cy="300" r="6" fill="none" stroke="#F59E0B" stroke-width="2.4"/>
  <line x1="250" y1="300" x2="470" y2="300" stroke="#F59E0B" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="330" y="292" font-size="10.5" font-weight="700" fill="#B45309">IDM = đáy nhỏ (SSL) — mồi, nằm TRÊN OB</text>

  <!-- push up then sweep IDM -->
  <path d="M320,300 L360,255 L395,285 L420,360" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="420" cy="360" r="9" fill="none" stroke="#F59E0B" stroke-width="2.6"/>
  <line x1="360" y1="365" x2="480" y2="365" stroke="#F59E0B" stroke-width="2.4" stroke-dasharray="5 3"/>
  <text x="360" y="386" font-size="10.5" font-weight="700" fill="#B45309">④ Giá QUÉT đáy nhỏ IDM (lấy thanh khoản mồi) — PHẢI xảy ra TRƯỚC</text>

  <!-- displacement up = MSS breaking a minor LH -->
  <path d="M420,360 L455,290 L475,310 L520,175" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <rect x="524" y="165" width="2" height="95" fill="#16A34A"/><rect x="518" y="175" width="13" height="72" fill="#16A34A" rx="1"/>
  <text x="540" y="188" font-size="10.5" font-weight="700" fill="#15803D">⑤ Chạm OB → displacement tăng → MSS bullish</text>

  <!-- FVG left behind -->
  <rect x="455" y="245" width="115" height="24" fill="#3B82F6" opacity="0.18"/>
  <text x="458" y="238" font-size="9.5" fill="#1D4ED8">FVG của displacement</text>

  <!-- entry at OB after IDM swept -->
  <path d="M520,175 L555,225 L580,255 L610,225 L650,150 L690,120" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="580" cy="352" r="6" fill="#16A34A"/>
  <text x="378" y="418" font-size="10.5" font-weight="700" fill="#15803D">⑥ ENTRY tại OB (SAU khi IDM bị quét) — stop dưới low OB, target BSL. KHÔNG vào tại IDM.</text>

  <rect x="24" y="440" width="712" height="42" rx="6" fill="#FEF3C7"/>
  <text x="36" y="459" font-size="11.5" font-weight="700" fill="#92400E">Bearish đối xứng: giá tăng lên premium → IDM = ĐỈNH NHỎ (BSL) nằm DƯỚI một bearish OB →</text>
  <text x="36" y="475" font-size="11.5" font-weight="700" fill="#92400E">giá quét đỉnh nhỏ IDM trước → chạm OB → displacement giảm + MSS bearish → Short tại OB, target SSL.</text>
</svg>
