<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Định lượng độ mạnh displacement — ba tier breakaway tại cùng điểm break</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng phá một biên range, nhưng body nến so với range trung bình 10-20 nến trước quyết định độ tin cậy.</text>

  <rect x="24" y="70" width="712" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- baseline = range high being broken -->
  <line x1="60" y1="220" x2="716" y2="220" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="214" font-size="10" fill="#1D4ED8">Biên trên range (level bị phá)</text>

  <!-- reference small candles (avg range of prior 10-20 candles) -->
  <g opacity="0.55">
    <rect x="70" y="205" width="10" height="15" fill="#9CA3AF"/>
    <rect x="86" y="200" width="10" height="20" fill="#9CA3AF"/>
    <rect x="102" y="208" width="10" height="12" fill="#9CA3AF"/>
    <rect x="118" y="202" width="10" height="18" fill="#9CA3AF"/>
  </g>
  <text x="60" y="240" font-size="9.5" fill="#6B7280">Range trung bình 10-20 nến trước (proxy ATR)</text>

  <!-- Weak displacement candle -->
  <g>
    <rect x="220" y="196" width="26" height="24" fill="#6B7280" opacity="0.75" rx="1"/>
    <rect x="230" y="188" width="4" height="8" fill="#6B7280"/>
    <rect x="230" y="220" width="4" height="6" fill="#6B7280"/>
    <text x="185" y="252" font-size="12" font-weight="700" fill="#374151">YẾU (weak)</text>
    <text x="172" y="268" font-size="10" fill="#6B7280">body ≈ 0.8x avg range</text>
    <text x="178" y="282" font-size="10" fill="#6B7280">body ≈ 45% total range nến</text>
    <text x="168" y="296" font-size="10" fill="#6B7280">mất 6-8 nến mới phá xong biên</text>
  </g>

  <!-- Moderate displacement candle -->
  <g>
    <rect x="400" y="150" width="26" height="70" fill="#F59E0B" opacity="0.8" rx="1"/>
    <rect x="410" y="140" width="4" height="10" fill="#B45309"/>
    <rect x="410" y="220" width="4" height="8" fill="#B45309"/>
    <text x="365" y="252" font-size="12" font-weight="700" fill="#92400E">VỪA (moderate)</text>
    <text x="352" y="268" font-size="10" fill="#92400E">body ≈ 2x avg range</text>
    <text x="352" y="282" font-size="10" fill="#92400E">body ≈ 65% total range nến</text>
    <text x="345" y="296" font-size="10" fill="#92400E">phá biên trong 2-3 nến</text>
  </g>

  <!-- Strong displacement candle -->
  <g>
    <rect x="580" y="95" width="28" height="125" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="591" y="85" width="4" height="10" fill="#15803D"/>
    <rect x="591" y="220" width="4" height="6" fill="#15803D"/>
    <text x="548" y="252" font-size="12" font-weight="700" fill="#15803D">MẠNH (strong)</text>
    <text x="535" y="268" font-size="10" fill="#15803D">body ≥ 3.5x avg range</text>
    <text x="530" y="282" font-size="10" fill="#15803D">body ≥ 80% total range nến</text>
    <text x="530" y="296" font-size="10" fill="#15803D">phá biên chỉ trong 1 nến</text>
  </g>

  <!-- Decision table -->
  <rect x="24" y="330" width="712" height="112" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="350" font-size="12" font-weight="700" fill="#1F2937">Bảng quyết định: đo độ mạnh displacement tạo breakaway</text>

  <line x1="36" y1="360" x2="724" y2="360" stroke="#E5E7EB"/>
  <text x="42" y="376" font-size="10.5" font-weight="700" fill="#374151">Body / avg range (10-20 nến)</text>
  <text x="270" y="376" font-size="10.5" font-weight="700" fill="#374151">Body / total range nến</text>
  <text x="450" y="376" font-size="10.5" font-weight="700" fill="#374151">Tốc độ phá biên</text>
  <text x="600" y="376" font-size="10.5" font-weight="700" fill="#374151">Tier</text>
  <line x1="36" y1="384" x2="724" y2="384" stroke="#F3F4F6"/>

  <text x="42" y="400" font-size="10.5" fill="#374151">&lt; 1x avg range</text>
  <text x="270" y="400" font-size="10.5" fill="#374151">&lt; 50%</text>
  <text x="450" y="400" font-size="10.5" fill="#374151">6-8+ nến mới phá xong</text>
  <text x="600" y="400" font-size="10.5" fill="#6B7280">Yếu — dễ fake</text>

  <text x="42" y="416" font-size="10.5" fill="#92400E">1.5x – 3x avg range</text>
  <text x="270" y="416" font-size="10.5" fill="#92400E">55% – 75%</text>
  <text x="450" y="416" font-size="10.5" fill="#92400E">2-3 nến</text>
  <text x="600" y="416" font-size="10.5" fill="#92400E">Vừa — cần thêm sweep/FVG</text>

  <text x="42" y="432" font-size="10.5" fill="#15803D">&gt; 3.5x avg range</text>
  <text x="270" y="432" font-size="10.5" fill="#15803D">≥ 80%</text>
  <text x="450" y="432" font-size="10.5" fill="#15803D">1 nến</text>
  <text x="600" y="432" font-size="10.5" fill="#15803D">Mạnh — breakaway tin cậy cao</text>
</svg>
