<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — Neo SD vào swing không sweep, không confluence, limit mù</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Giá xuyên thẳng qua -2 SD và -3 SD vì không mức nào có thanh khoản đối ứng</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- random swing, no sweep -->
  <path d="M60,200 L120,240 L170,210 L210,260" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="120" cy="240" r="6" fill="#9CA3AF"/>
  <text x="60" y="228" font-size="10" fill="#6B7280">① Điểm A — swing chọn đại</text>
  <circle cx="170" cy="210" r="6" fill="none" stroke="#9CA3AF" stroke-width="2.2"/>
  <text x="140" y="196" font-size="10" font-weight="700" fill="#6B7280">② Điểm B — KHÔNG sweep liquidity nào</text>

  <!-- fake anchor bracket -->
  <line x1="235" y1="210" x2="235" y2="260" stroke="#9CA3AF" stroke-width="1.4"/>
  <text x="245" y="240" font-size="9.5" fill="#6B7280">"leg" tùy ý</text>

  <!-- limit order placed blindly at -2 SD -->
  <path d="M210,260 L250,290 L300,240" fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- SD ladder, all floating with no confluence -->
  <line x1="260" y1="210" x2="716" y2="210" stroke="#9CA3AF" stroke-dasharray="6 4"/>
  <text x="700" y="206" font-size="10" fill="#6B7280" text-anchor="end">-1 SD (trống)</text>

  <line x1="260" y1="140" x2="716" y2="140" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="700" y="136" font-size="10" font-weight="700" fill="#B91C1C" text-anchor="end">-2 SD — limit mù đặt ở đây</text>

  <line x1="260" y1="80" x2="716" y2="80" stroke="#9CA3AF" stroke-dasharray="6 4"/>
  <text x="700" y="76" font-size="10" fill="#6B7280" text-anchor="end">-3 SD (trống, không confluence)</text>

  <!-- blind limit marker -->
  <rect x="470" y="126" width="150" height="28" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2" rx="4"/>
  <text x="478" y="146" font-size="10" font-weight="700" fill="#B91C1C">③ Limit mù, chưa chờ MSS xác nhận</text>

  <!-- price blows straight through both levels -->
  <path d="M300,240 L360,180 L420,145 L470,140 L520,90 L580,78 L640,60 L700,45" fill="none" stroke="#DC2626" stroke-width="2.6"/>
  <text x="560" y="65" font-size="10" font-weight="700" fill="#B91C1C">④ Giá xuyên thẳng qua -2 SD và -3 SD</text>

  <!-- stop out marker -->
  <circle cx="470" cy="140" r="7" fill="#DC2626"/>
  <text x="400" y="160" font-size="9.5" fill="#B91C1C">⑤ Lệnh limit dính SL — giá không hề chậm lại</text>

  <line x1="470" y1="154" x2="470" y2="300" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="475" y="310" font-size="9.5" fill="#B91C1C">SL bị quét vì đặt mù, không có cấu trúc xác nhận</text>

  <rect x="24" y="410" width="712" height="60" rx="6" fill="#FEE2E2"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#991B1B">Lỗi: neo SD vào một swing không hề sweep thanh khoản (chọn đại để số "đẹp"); đặt lệnh limit mù</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#991B1B">tại -2 SD kỳ vọng đảo chiều mà không chờ MSS/xác nhận; không mức SD nào trùng liquidity/FVG</text>
  <text x="36" y="466" font-size="11.5" font-weight="700" fill="#991B1B">→ giá xuyên thẳng qua -2 SD và -3 SD, lệnh dính SL.</text>
</svg>
