<svg viewBox="0 0 760 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="450" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cấu trúc nhận diện — Chuỗi 5 dấu hiệu Sweep</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Pool → Spike/wick → Reclaim → Displacement → MSS</text>

  <rect x="24" y="74" width="132" height="70" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="90" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">1 · Pool</text>
  <text x="90" y="120" text-anchor="middle" font-size="10" fill="#374151">equal highs/lows,</text>
  <text x="90" y="134" text-anchor="middle" font-size="10" fill="#374151">đỉnh/đáy cũ rõ</text>
  <line x1="156" y1="109" x2="178" y2="109" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="180" y="74" width="132" height="70" rx="8" fill="#FFFFFF" stroke="#B45309"/>
  <text x="246" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#B45309">2 · Spike</text>
  <text x="246" y="120" text-anchor="middle" font-size="10" fill="#374151">xuyên mức nhanh,</text>
  <text x="246" y="134" text-anchor="middle" font-size="10" fill="#374151">để lại wick dài</text>
  <line x1="312" y1="109" x2="334" y2="109" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="336" y="74" width="132" height="70" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="402" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">3 · Reclaim</text>
  <text x="402" y="120" text-anchor="middle" font-size="10" fill="#374151">đóng nến TRỞ LẠI</text>
  <text x="402" y="134" text-anchor="middle" font-size="10" fill="#374151">bên trong vùng</text>
  <line x1="468" y1="109" x2="490" y2="109" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="492" y="74" width="122" height="70" rx="8" fill="#FFFFFF" stroke="#1D4ED8"/>
  <text x="553" y="100" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1D4ED8">4 · Displacement</text>
  <text x="553" y="120" text-anchor="middle" font-size="10" fill="#374151">nến mạnh đẩy</text>
  <text x="553" y="134" text-anchor="middle" font-size="10" fill="#374151">hướng ngược</text>
  <line x1="614" y1="109" x2="636" y2="109" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="638" y="74" width="98" height="70" rx="8" fill="#FFFFFF" stroke="#7C3AED"/>
  <text x="687" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">5 · MSS</text>
  <text x="687" y="120" text-anchor="middle" font-size="10" fill="#374151">phá cấu trúc</text>
  <text x="687" y="134" text-anchor="middle" font-size="10" fill="#374151">nội bộ</text>

  <!-- chart illustration: SSL sweep -->
  <rect x="24" y="164" width="712" height="204" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="186" font-size="12" font-weight="700" fill="#374151">Ví dụ SSL Sweep (→ Long)</text>
  <line x1="60" y1="320" x2="700" y2="320" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="60" y="336" font-size="10" fill="#DC2626">SSL / equal lows ①</text>
  <line x1="110" y1="230" x2="110" y2="290" stroke="#DC2626" stroke-width="2"/><rect x="104" y="242" width="12" height="40" rx="1" fill="#DC2626"/>
  <line x1="142" y1="260" x2="142" y2="315" stroke="#DC2626" stroke-width="2"/><rect x="136" y="272" width="12" height="40" rx="1" fill="#DC2626"/>
  <!-- sweep candle: long wick below SSL, close back above -->
  <line x1="176" y1="290" x2="176" y2="348" stroke="#DC2626" stroke-width="2"/><rect x="170" y="298" width="12" height="16" rx="1" fill="#16A34A"/>
  <text x="176" y="362" font-size="9" fill="#B45309" text-anchor="middle">wick ② / reclaim ③</text>
  <!-- displacement up -->
  <line x1="212" y1="210" x2="212" y2="300" stroke="#16A34A" stroke-width="2"/><rect x="206" y="222" width="12" height="75" rx="1" fill="#16A34A"/>
  <line x1="244" y1="200" x2="244" y2="255" stroke="#16A34A" stroke-width="2"/><rect x="238" y="210" width="12" height="40" rx="1" fill="#16A34A"/>
  <rect x="218" y="250" width="32" height="34" fill="#3B82F6" opacity="0.12"/>
  <rect x="218" y="250" width="32" height="34" fill="none" stroke="#3B82F6" stroke-dasharray="3 2"/>
  <path d="M182 300 L242 205" fill="none" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
  <text x="258" y="222" font-size="10" fill="#16A34A">displacement ④</text>
  <text x="258" y="272" font-size="10" fill="#3B82F6">FVG entry</text>
  <line x1="150" y1="248" x2="300" y2="248" stroke="#7C3AED" stroke-dasharray="3 3"/>
  <text x="305" y="251" font-size="10" fill="#7C3AED">MSS ⑤ (phá swing high nội bộ)</text>

  <text x="40" y="404" font-size="12" font-weight="600" fill="#B45309">Bắt buộc: pool cụ thể + reclaim + displacement + xác định đáy/đỉnh sweep để đặt stop.</text>
  <text x="40" y="426" font-size="11" fill="#6B7280">Chỉ có wick rồi đi ngang (không displacement) → chưa xác nhận, đừng vào.</text>
</svg>
