<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ SAI — gọi một Breaker (có sweep) là "Mitigation Block"</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Thực ra giá ĐÃ quét xuống dưới đáy cũ = Breaker. Gắn nhãn MB → đặt stop sai → bị quét dù hướng đúng.</text>

  <rect x="24" y="70" width="712" height="298" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- old low level -->
  <line x1="110" y1="290" x2="540" y2="290" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="130" y="282" font-size="10" fill="#6B7280">đáy cũ (Low1)</text>

  <!-- structure -->
  <path d="M60,220 L110,290 L165,190" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="175" cy="180" r="6" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <line x1="175" y1="180" x2="520" y2="180" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="195" y="175" font-size="10" fill="#1D4ED8">đỉnh cũ</text>

  <!-- SWEEP below old low -->
  <path d="M175,180 L235,325 L295,240" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="235" cy="325" r="9" fill="none" stroke="#DC2626" stroke-width="2.6"/>
  <line x1="180" y1="325" x2="320" y2="325" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="180" y="348" font-size="10.5" font-weight="700" fill="#B91C1C">⚠ ĐÃ sweep SSL — Low2 &lt; Low1 (đây là BREAKER, không phải MB)</text>

  <!-- displacement up -->
  <path d="M295,240 L340,190 L410,120" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <text x="415" y="130" font-size="10" font-weight="700" fill="#15803D">displacement phá đỉnh = MSS</text>

  <!-- misplaced MB zone + wrong tight stop -->
  <rect x="300" y="225" width="26" height="36" fill="#F59E0B" opacity="0.55" rx="1"/>
  <text x="335" y="248" font-size="9.5" fill="#B45309">trader gắn nhãn "MB"</text>

  <!-- retest + wrong stop placement -->
  <path d="M410,120 L445,175 L470,248 L495,210 L545,150" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="470" cy="248" r="6" fill="#16A34A"/>
  <text x="470" y="270" font-size="10" fill="#374151">Long tại retest</text>

  <!-- wrong stop: tight, above sweep -->
  <line x1="300" y1="266" x2="560" y2="266" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="360" y="262" font-size="10" font-weight="700" fill="#DC2626">SL sai: sát mép "MB" (theo logic MB)</text>

  <rect x="24" y="378" width="712" height="52" rx="6" fill="#FEE2E2"/>
  <text x="36" y="398" font-size="11.5" font-weight="700" fill="#B91C1C">Lỗi: bỏ qua phép thử sweep. Đáy cũ ĐÃ bị phá (sweep) → là Breaker → stop phải dưới điểm sweep.</text>
  <text x="36" y="418" font-size="11" fill="#991B1B">Đặt stop sát mép (logic MB) khiến giá quét stop khi retrace sâu, dù hướng Long cuối cùng đúng.</text>
</svg>
