<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Order Block — Định nghĩa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Nến ngược hướng CUỐI CÙNG trước displacement phá cấu trúc • Mean Threshold (50%) là mức tham chiếu</text>

  <!-- Bullish OB -->
  <rect x="24" y="70" width="350" height="340" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="14" font-weight="700" fill="#16A34A">Bullish OB — vùng demand</text>
  <text x="40" y="111" font-size="11" fill="#6B7280">Nến GIẢM cuối cùng trước đợt tăng mạnh</text>
  <!-- down candles then OB then displacement up -->
  <line x1="70" y1="150" x2="70" y2="230" stroke="#DC2626" stroke-width="1.4"/><rect x="64" y="165" width="12" height="55" fill="#DC2626"/>
  <line x1="102" y1="180" x2="102" y2="270" stroke="#DC2626" stroke-width="1.4"/><rect x="96" y="195" width="12" height="60" fill="#DC2626"/>
  <!-- OB candle highlighted -->
  <rect x="128" y="235" width="30" height="70" fill="#16A34A" opacity="0.12"/>
  <rect x="128" y="235" width="30" height="70" fill="none" stroke="#16A34A" stroke-dasharray="4 3"/>
  <line x1="143" y1="228" x2="143" y2="315" stroke="#DC2626" stroke-width="1.4"/><rect x="137" y="240" width="12" height="60" fill="#DC2626"/>
  <line x1="128" y1="270" x2="158" y2="270" stroke="#1D4ED8" stroke-dasharray="4 2"/>
  <text x="163" y="240" font-size="10" fill="#16A34A">đỉnh OB</text>
  <text x="163" y="273" font-size="10" fill="#1D4ED8">MT 50%</text>
  <text x="163" y="308" font-size="10" fill="#16A34A">đáy OB</text>
  <text x="40" y="330" font-size="10" fill="#DC2626">OB (nến giảm cuối)</text>
  <!-- displacement up -->
  <line x1="188" y1="120" x2="188" y2="245" stroke="#16A34A" stroke-width="1.4"/><rect x="182" y="135" width="12" height="95" fill="#16A34A"/>
  <line x1="220" y1="100" x2="220" y2="180" stroke="#16A34A" stroke-width="1.4"/><rect x="214" y="112" width="12" height="55" fill="#16A34A"/>
  <rect x="196" y="167" width="40" height="40" fill="#3B82F6" opacity="0.10"/>
  <rect x="196" y="167" width="40" height="40" fill="none" stroke="#3B82F6" stroke-dasharray="3 2"/>
  <text x="240" y="150" font-size="10.5" font-weight="700" fill="#16A34A">Displacement</text>
  <text x="240" y="166" font-size="10" fill="#374151">phá BOS ↑</text>
  <text x="240" y="200" font-size="10" fill="#3B82F6">FVG để lại</text>
  <text x="40" y="366" font-size="10.5" fill="#374151">Giá quay lại mitigate OB → kỳ vọng phản ứng tăng</text>
  <text x="40" y="384" font-size="10.5" fill="#6B7280">Thứ tự: sweep SSL → OB → displacement ↑ → FVG</text>

  <!-- Bearish OB -->
  <rect x="386" y="70" width="350" height="340" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="94" font-size="14" font-weight="700" fill="#DC2626">Bearish OB — vùng supply</text>
  <text x="402" y="111" font-size="11" fill="#6B7280">Nến TĂNG cuối cùng trước đợt giảm mạnh</text>
  <line x1="432" y1="190" x2="432" y2="270" stroke="#16A34A" stroke-width="1.4"/><rect x="426" y="205" width="12" height="55" fill="#16A34A"/>
  <line x1="464" y1="160" x2="464" y2="240" stroke="#16A34A" stroke-width="1.4"/><rect x="458" y="172" width="12" height="55" fill="#16A34A"/>
  <!-- OB candle -->
  <rect x="490" y="135" width="30" height="70" fill="#DC2626" opacity="0.12"/>
  <rect x="490" y="135" width="30" height="70" fill="none" stroke="#DC2626" stroke-dasharray="4 3"/>
  <line x1="505" y1="128" x2="505" y2="215" stroke="#16A34A" stroke-width="1.4"/><rect x="499" y="140" width="12" height="60" fill="#16A34A"/>
  <line x1="490" y1="170" x2="520" y2="170" stroke="#1D4ED8" stroke-dasharray="4 2"/>
  <text x="525" y="140" font-size="10" fill="#DC2626">đỉnh OB</text>
  <text x="525" y="173" font-size="10" fill="#1D4ED8">MT 50%</text>
  <text x="525" y="205" font-size="10" fill="#DC2626">đáy OB</text>
  <!-- displacement down -->
  <line x1="550" y1="195" x2="550" y2="320" stroke="#DC2626" stroke-width="1.4"/><rect x="544" y="210" width="12" height="95" fill="#DC2626"/>
  <line x1="582" y1="260" x2="582" y2="340" stroke="#DC2626" stroke-width="1.4"/><rect x="576" y="272" width="12" height="55" fill="#DC2626"/>
  <rect x="558" y="235" width="40" height="40" fill="#3B82F6" opacity="0.10"/>
  <rect x="558" y="235" width="40" height="40" fill="none" stroke="#3B82F6" stroke-dasharray="3 2"/>
  <text x="602" y="220" font-size="10.5" font-weight="700" fill="#DC2626">Displacement</text>
  <text x="602" y="236" font-size="10" fill="#374151">phá BOS ↓</text>
  <text x="602" y="270" font-size="10" fill="#3B82F6">FVG để lại</text>
  <text x="402" y="366" font-size="10.5" fill="#374151">Giá quay lại mitigate OB → kỳ vọng phản ứng giảm</text>
  <text x="402" y="384" font-size="10.5" fill="#6B7280">Thứ tự: sweep BSL → OB → displacement ↓ → FVG</text>

  <text x="380" y="428" text-anchor="middle" font-size="12" fill="#374151">OB bắt buộc có narrative: liquidity sweep → displacement → imbalance → phá cấu trúc. Khác supply/demand thường.</text>
</svg>
