<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obx" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Lỗi thường gặp với Order Block</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">SAI: nến lớn cô lập, không narrative • ĐÚNG: sweep → OB → displacement → BOS + FVG</text>

  <!-- WRONG panel -->
  <rect x="24" y="72" width="350" height="288" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="14" font-weight="700" fill="#DC2626">SAI — vẽ OB ở mọi nến lớn</text>
  <text x="40" y="111" font-size="11" fill="#6B7280">Không sweep, không displacement, không phá cấu trúc</text>
  <!-- isolated big down candle marked as "OB" -->
  <rect x="60" y="200" width="290" height="44" fill="#DC2626" opacity="0.10"/>
  <rect x="60" y="200" width="290" height="44" fill="none" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="64" y="196" font-size="10.5" fill="#B91C1C" font-weight="700">"OB" tự vẽ (nến lớn cô lập)</text>
  <rect x="96" y="150" width="2" height="60" fill="#16A34A"/><rect x="90" y="158" width="12" height="44" fill="#16A34A" rx="1"/>
  <rect x="128" y="196" width="2" height="86" fill="#DC2626"/><rect x="122" y="202" width="12" height="72" fill="#DC2626" rx="1"/>
  <rect x="160" y="170" width="2" height="56" fill="#16A34A"/><rect x="154" y="178" width="12" height="40" fill="#16A34A" rx="1"/>
  <!-- price returns and slices through -->
  <rect x="220" y="215" width="2" height="60" fill="#16A34A"/><rect x="214" y="223" width="12" height="40" fill="#16A34A" rx="1"/>
  <rect x="252" y="220" width="2" height="96" fill="#DC2626"/><rect x="246" y="226" width="12" height="82" fill="#DC2626" rx="1"/>
  <path d="M266 240 L300 300" stroke="#B91C1C" stroke-width="2" marker-end="url(#obx)"/>
  <text x="284" y="252" font-size="10.5" fill="#B91C1C" font-weight="700">xuyên thẳng qua</text>
  <text x="40" y="336" font-size="11" fill="#374151">Chỉ là vùng supply/demand thường giữa range →</text>
  <text x="40" y="352" font-size="11" fill="#374151">giá không tôn trọng, không có edge.</text>

  <!-- RIGHT panel -->
  <rect x="386" y="72" width="350" height="288" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="94" font-size="14" font-weight="700" fill="#16A34A">ĐÚNG — OB có đủ narrative</text>
  <text x="402" y="111" font-size="11" fill="#6B7280">sweep → OB → displacement → BOS + FVG</text>
  <!-- sweep low -->
  <line x1="418" y1="278" x2="712" y2="278" stroke="#CA8A04" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="418" y="292" font-size="9.5" fill="#B45309">SSL bị quét trước OB</text>
  <rect x="440" y="200" width="2" height="70" fill="#16A34A"/><rect x="434" y="208" width="12" height="50" fill="#16A34A" rx="1"/>
  <!-- sweep candle (wick below) -->
  <rect x="472" y="215" width="2" height="66" fill="#DC2626"/><rect x="466" y="221" width="12" height="40" fill="#DC2626" rx="1"/>
  <!-- OB candle -->
  <rect x="492" y="200" width="30" height="52" fill="#16A34A" opacity="0.14"/>
  <rect x="492" y="200" width="30" height="52" fill="none" stroke="#16A34A" stroke-dasharray="4 3"/>
  <rect x="506" y="198" width="2" height="60" fill="#DC2626"/><rect x="500" y="204" width="12" height="44" fill="#DC2626" rx="1"/>
  <text x="482" y="196" font-size="10" fill="#166534" font-weight="700">OB</text>
  <!-- displacement up + FVG -->
  <rect x="540" y="140" width="2" height="118" fill="#16A34A"/><rect x="534" y="148" width="12" height="98" fill="#16A34A" rx="1"/>
  <rect x="572" y="118" width="2" height="70" fill="#16A34A"/><rect x="566" y="124" width="12" height="54" fill="#16A34A" rx="1"/>
  <rect x="548" y="178" width="40" height="34" fill="#3B82F6" opacity="0.14"/>
  <rect x="548" y="178" width="40" height="34" fill="none" stroke="#3B82F6" stroke-dasharray="3 2"/>
  <text x="592" y="164" font-size="10.5" fill="#16A34A" font-weight="700">Displacement</text>
  <text x="592" y="180" font-size="10" fill="#374151">phá BOS ↑</text>
  <text x="592" y="200" font-size="10" fill="#3B82F6">FVG để lại</text>
  <text x="402" y="336" font-size="11" fill="#374151">Có mắt xích: sweep + displacement + imbalance + BOS →</text>
  <text x="402" y="352" font-size="11" fill="#374151">giá tôn trọng OB, entry có edge.</text>

  <text x="380" y="398" text-anchor="middle" font-size="12" fill="#374151">Hỏi: "OB này quét liquidity nào &amp; phá cấu trúc gì? Còn unmitigated? Đúng location?" Thiếu 1 → chỉ là một cái nến.</text>
</svg>
