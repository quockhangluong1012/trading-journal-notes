<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="mg" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16A34A"/></marker>
    <marker id="mr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/></marker>
    <marker id="mb" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Fair Value Gap — Bối cảnh sử dụng</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">4 loại / trạng thái và bộ lọc: khi nào đáng trade, khi nào bỏ qua</text>

  <!-- Card 1: BISI -->
  <rect x="24" y="68" width="350" height="148" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="92" font-size="13" font-weight="700" fill="#16A34A">Bullish FVG (BISI)</text>
  <rect x="40" y="150" width="130" height="26" fill="#16A34A" opacity="0.12"/>
  <rect x="40" y="150" width="130" height="26" fill="none" stroke="#16A34A"/>
  <line x1="40" y1="163" x2="170" y2="163" stroke="#1D4ED8" stroke-dasharray="4 3"/>
  <polyline points="48,116 86,148 112,161 140,132 164,106" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#mg)"/>
  <text x="196" y="124" font-size="12" font-weight="700" fill="#16A34A">POI tìm Long</text>
  <text x="196" y="144" font-size="11" fill="#374151">• Ở discount</text>
  <text x="196" y="162" font-size="11" fill="#374151">• Sau sweep SSL</text>
  <text x="196" y="180" font-size="11" fill="#374151">• Entry quanh CE (50%)</text>

  <!-- Card 2: SIBI -->
  <rect x="386" y="68" width="350" height="148" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="92" font-size="13" font-weight="700" fill="#DC2626">Bearish FVG (SIBI)</text>
  <rect x="402" y="108" width="130" height="26" fill="#DC2626" opacity="0.12"/>
  <rect x="402" y="108" width="130" height="26" fill="none" stroke="#DC2626"/>
  <line x1="402" y1="121" x2="532" y2="121" stroke="#1D4ED8" stroke-dasharray="4 3"/>
  <polyline points="410,168 448,138 474,123 502,150 526,178" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#mr)"/>
  <text x="558" y="124" font-size="12" font-weight="700" fill="#DC2626">POI tìm Short</text>
  <text x="558" y="144" font-size="11" fill="#374151">• Ở premium</text>
  <text x="558" y="162" font-size="11" fill="#374151">• Sau sweep BSL</text>
  <text x="558" y="180" font-size="11" fill="#374151">• Entry quanh CE (50%)</text>

  <!-- Card 3: IFVG -->
  <rect x="24" y="228" width="350" height="148" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="252" font-size="13" font-weight="700" fill="#D97706">Inversion FVG (IFVG)</text>
  <rect x="40" y="290" width="130" height="24" fill="#3B82F6" opacity="0.10"/>
  <rect x="40" y="290" width="130" height="24" fill="none" stroke="#3B82F6" stroke-dasharray="4 3"/>
  <polyline points="50,262 84,298 108,340 138,315 168,350" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#mr)"/>
  <text x="196" y="284" font-size="11" fill="#374151">• Bị đóng nến xuyên qua</text>
  <text x="196" y="302" font-size="11" fill="#374151">• Bullish fail → kháng cự</text>
  <text x="196" y="320" font-size="11" fill="#374151">• Bearish fail → hỗ trợ</text>
  <text x="196" y="338" font-size="11" fill="#374151">• Retest vùng flip = entry mới</text>

  <!-- Card 4: Liquidity Void -->
  <rect x="386" y="228" width="350" height="148" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="252" font-size="13" font-weight="700" fill="#1D4ED8">Liquidity Void</text>
  <rect x="402" y="268" width="90" height="92" fill="#3B82F6" opacity="0.08"/>
  <rect x="402" y="268" width="90" height="92" fill="none" stroke="#3B82F6" stroke-dasharray="4 3"/>
  <rect x="410" y="280" width="74" height="8" fill="#3B82F6" opacity="0.18"/>
  <rect x="410" y="306" width="74" height="8" fill="#3B82F6" opacity="0.18"/>
  <rect x="410" y="332" width="74" height="8" fill="#3B82F6" opacity="0.18"/>
  <line x1="447" y1="264" x2="447" y2="364" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="442" y="270" width="10" height="86" fill="#16A34A"/>
  <polyline points="510,272 522,300 522,334" fill="none" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#mb)"/>
  <text x="545" y="284" font-size="11" fill="#374151">• Displacement cực mạnh</text>
  <text x="545" y="302" font-size="11" fill="#374151">• Chứa nhiều FVG con</text>
  <text x="545" y="320" font-size="11" fill="#374151">• Draw mạnh — giá thường</text>
  <text x="552" y="338" font-size="11" fill="#374151">rebalance phần lớn void</text>

  <!-- Bộ lọc -->
  <rect x="24" y="390" width="350" height="110" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="412" font-size="12" font-weight="700" fill="#16A34A">Giá trị cao khi</text>
  <text x="40" y="430" font-size="11" fill="#374151">• Sinh từ displacement phá BOS/MSS</text>
  <text x="40" y="446" font-size="11" fill="#374151">• Tại POI HTF, đúng premium/discount</text>
  <text x="40" y="462" font-size="11" fill="#374151">• Sau liquidity sweep, còn unmitigated</text>
  <text x="40" y="478" font-size="11" fill="#374151">• CE trùng confluence (OB / OTE / EQ)</text>
  <rect x="386" y="390" width="350" height="110" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="412" font-size="12" font-weight="700" fill="#DC2626">Bỏ qua khi</text>
  <text x="402" y="430" font-size="11" fill="#374151">• Gap nhỏ giữa range, không displacement</text>
  <text x="402" y="446" font-size="11" fill="#374151">• Ngược Daily Bias / sai phía premium-discount</text>
  <text x="402" y="462" font-size="11" fill="#374151">• Đã lấp toàn bộ / đóng nến xuyên qua (invalid)</text>
  <text x="402" y="478" font-size="11" fill="#374151">• Chưa sweep / ngoài kill zone</text>
</svg>
