<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CE áp cho mọi loại PD Array — công thức chung (high+low)/2</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">CE (Mean Threshold) không chỉ dành cho FVG: mọi array đều có mức 50% làm điểm phản ứng &amp; refine entry.</text>

  <!-- 1. FVG -->
  <g>
    <rect x="30" y="80" width="216" height="170" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.4"/>
    <text x="42" y="102" font-size="12.5" font-weight="700" fill="#1D4ED8">1. Fair Value Gap (FVG)</text>
    <rect x="60" y="120" width="156" height="90" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="60" y1="120" x2="216" y2="120" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="60" y1="210" x2="216" y2="210" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="60" y1="165" x2="216" y2="165" stroke="#F59E0B" stroke-width="2.2" stroke-dasharray="6 3"/>
    <text x="150" y="161" font-size="9.5" font-weight="700" fill="#B45309">CE</text>
    <text x="42" y="236" font-size="10" fill="#6B7280">CE = (FVG high + FVG low) / 2</text>
  </g>

  <!-- 2. Order Block -->
  <g>
    <rect x="272" y="80" width="216" height="170" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.4"/>
    <text x="284" y="102" font-size="12.5" font-weight="700" fill="#DC2626">2. Order Block (OB)</text>
    <rect x="302" y="120" width="156" height="90" fill="#DC2626" opacity="0.10" stroke="#DC2626" stroke-width="1"/>
    <line x1="302" y1="120" x2="458" y2="120" stroke="#DC2626" stroke-width="1"/>
    <line x1="302" y1="210" x2="458" y2="210" stroke="#DC2626" stroke-width="1"/>
    <line x1="302" y1="165" x2="458" y2="165" stroke="#F59E0B" stroke-width="2.2" stroke-dasharray="6 3"/>
    <text x="392" y="161" font-size="9.5" font-weight="700" fill="#B45309">CE</text>
    <text x="284" y="236" font-size="10" fill="#6B7280">CE = (OB high + OB low) / 2</text>
  </g>

  <!-- 3. Liquidity Void -->
  <g>
    <rect x="514" y="80" width="216" height="170" rx="8" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.4"/>
    <text x="526" y="102" font-size="12.5" font-weight="700" fill="#374151">3. Liquidity Void</text>
    <rect x="544" y="118" width="156" height="94" fill="#6B7280" opacity="0.08" stroke="#6B7280" stroke-width="1"/>
    <line x1="544" y1="118" x2="700" y2="118" stroke="#6B7280" stroke-width="1"/>
    <line x1="544" y1="212" x2="700" y2="212" stroke="#6B7280" stroke-width="1"/>
    <line x1="544" y1="165" x2="700" y2="165" stroke="#F59E0B" stroke-width="2.2" stroke-dasharray="6 3"/>
    <text x="634" y="161" font-size="9.5" font-weight="700" fill="#B45309">CE</text>
    <text x="526" y="236" font-size="10" fill="#6B7280">CE = (void high + void low) / 2</text>
  </g>

  <!-- 4. Balanced Price Range -->
  <g>
    <rect x="140" y="270" width="216" height="170" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.4"/>
    <text x="152" y="292" font-size="12.5" font-weight="700" fill="#15803D">4. Balanced Price Range</text>
    <rect x="170" y="310" width="156" height="90" fill="#16A34A" opacity="0.10" stroke="#16A34A" stroke-width="1"/>
    <line x1="170" y1="310" x2="326" y2="310" stroke="#16A34A" stroke-width="1"/>
    <line x1="170" y1="400" x2="326" y2="400" stroke="#16A34A" stroke-width="1"/>
    <line x1="170" y1="355" x2="326" y2="355" stroke="#F59E0B" stroke-width="2.2" stroke-dasharray="6 3"/>
    <text x="260" y="351" font-size="9.5" font-weight="700" fill="#B45309">CE</text>
    <text x="152" y="426" font-size="10" fill="#6B7280">CE = (BPR high + BPR low) / 2</text>
  </g>

  <!-- 5. New Week Opening Gap -->
  <g>
    <rect x="404" y="270" width="216" height="170" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.4"/>
    <text x="416" y="292" font-size="12.5" font-weight="700" fill="#1D4ED8">5. New Week Opening Gap</text>
    <rect x="434" y="310" width="156" height="90" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="434" y1="310" x2="590" y2="310" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="434" y1="400" x2="590" y2="400" stroke="#1D4ED8" stroke-width="1"/>
    <line x1="434" y1="355" x2="590" y2="355" stroke="#F59E0B" stroke-width="2.2" stroke-dasharray="6 3"/>
    <text x="524" y="351" font-size="9.5" font-weight="700" fill="#B45309">CE</text>
    <text x="416" y="426" font-size="10" fill="#6B7280">CE = (NWOG high + NWOG low) / 2</text>
  </g>

  <rect x="30" y="450" width="700" height="0" fill="none"/>
</svg>
