<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — Nhầm consolidation là void, và đòi giá phải lấp 100%</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Trái: dao động lình xình bị gọi nhầm là void. Phải: fade một displacement mạnh vì "chờ full fill".</text>

  <rect x="24" y="70" width="336" height="326" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="372" y="70" width="364" height="326" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- LEFT PANEL: consolidation mistaken for void -->
  <text x="40" y="94" font-size="12" font-weight="700" fill="#B91C1C">Lỗi 1 — Consolidation bị gọi là "void"</text>
  <line x1="40" y1="250" x2="340" y2="250" stroke="#D8DBE2" stroke-width="1"/>

  <!-- choppy overlapping candles with wicks -->
  <g>
    <rect x="60" y="220" width="14" height="24" fill="#6B7280" opacity="0.8"/>
    <rect x="65" y="205" width="3" height="52" fill="#6B7280"/>
    <rect x="82" y="210" width="14" height="28" fill="#DC2626" opacity="0.75"/>
    <rect x="87" y="196" width="3" height="56" fill="#B91C1C"/>
    <rect x="104" y="218" width="14" height="26" fill="#16A34A" opacity="0.8"/>
    <rect x="109" y="202" width="3" height="56" fill="#15803D"/>
    <rect x="126" y="212" width="14" height="28" fill="#DC2626" opacity="0.75"/>
    <rect x="131" y="198" width="3" height="56" fill="#B91C1C"/>
    <rect x="148" y="216" width="14" height="26" fill="#16A34A" opacity="0.8"/>
    <rect x="153" y="200" width="3" height="58" fill="#15803D"/>
    <rect x="170" y="210" width="14" height="30" fill="#DC2626" opacity="0.75"/>
    <rect x="175" y="196" width="3" height="58" fill="#B91C1C"/>
  </g>
  <rect x="55" y="196" width="140" height="64" fill="#DC2626" opacity="0.10" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="58" y="192" font-size="9.5" font-weight="700" fill="#B91C1C">Nhiều overlap + wick dài xen kẽ</text>
  <text x="58" y="280" font-size="10.5" fill="#374151">Đây là dao động hai chiều (chop),</text>
  <text x="58" y="296" font-size="10.5" fill="#374151">KHÔNG phải displacement một chiều.</text>
  <text x="58" y="318" font-size="10.5" font-weight="700" fill="#B91C1C">→ Không có void thật, chỉ là noise.</text>

  <text x="40" y="350" font-size="10.5" fill="#6B7280">Trader vẫn vẽ "void" và chờ giá</text>
  <text x="40" y="366" font-size="10.5" fill="#6B7280">"lấp" — nhưng vùng này vốn đã</text>
  <text x="40" y="382" font-size="10.5" fill="#6B7280">cân bằng cả hai chiều từ đầu.</text>

  <!-- RIGHT PANEL: fading strong continuation expecting full fill -->
  <text x="388" y="94" font-size="12" font-weight="700" fill="#B91C1C">Lỗi 2 — Fade displacement, đòi full fill</text>
  <line x1="388" y1="250" x2="720" y2="250" stroke="#D8DBE2" stroke-width="1"/>

  <g>
    <rect x="410" y="330" width="18" height="50" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="417" y="322" width="4" height="66" fill="#15803D"/>
    <rect x="438" y="280" width="18" height="48" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="445" y="272" width="4" height="62" fill="#15803D"/>
    <rect x="466" y="234" width="18" height="44" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="473" y="226" width="4" height="58" fill="#15803D"/>
    <rect x="494" y="192" width="18" height="40" fill="#16A34A" opacity="0.9" rx="1"/>
    <rect x="501" y="184" width="4" height="54" fill="#15803D"/>
  </g>
  <rect x="406" y="192" width="112" height="188" fill="#F59E0B" opacity="0.12" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="522" y="200" font-size="9.5" fill="#92400E">void mạnh, đúng bias UP</text>

  <!-- short entry expecting full fill -->
  <circle cx="512" cy="192" r="7" fill="#DC2626"/>
  <text x="528" y="180" font-size="10" font-weight="700" fill="#B91C1C">Short "chờ lấp 100%"</text>
  <path d="M512,192 L560,175 L610,200 L660,150" fill="none" stroke="#DC2626" stroke-width="2.4" stroke-dasharray="2 2"/>
  <text x="560" y="140" font-size="10.5" font-weight="700" fill="#B91C1C">Giá không quay đầu — tiếp tục chạy lên</text>

  <text x="388" y="405" font-size="10.5" fill="#6B7280">Displacement mạnh, đúng bias, đúng PD —</text>

  <rect x="24" y="412" width="712" height="50" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11" font-weight="700" fill="#92400E">Bài học: (1) chop nhiều overlap ≠ void; chỉ displacement một chiều mới tạo void thật.</text>
  <text x="36" y="448" font-size="11" font-weight="700" fill="#92400E">(2) Void hiếm khi lấp 100% ngay — đòi full fill rồi fade một continuation mạnh là cách cháy tài khoản.</text>
</svg>
