<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bối cảnh sử dụng — Các loại Liquidity Sweep</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Sweep là TRIGGER cho entry; hai pool hay bị quét nhất: equal highs/lows &amp; PDH/PDL</text>

  <!-- SSL sweep -->
  <rect x="24" y="70" width="232" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="13" font-weight="700" fill="#16A34A">SSL Sweep → Long</text>
  <line x1="44" y1="230" x2="248" y2="230" stroke="#DC2626" stroke-dasharray="4 3"/><text x="44" y="246" font-size="9" fill="#DC2626">equal lows / PDL</text>
  <line x1="80" y1="150" x2="80" y2="200" stroke="#DC2626" stroke-width="1.3"/><rect x="75" y="162" width="10" height="30" fill="#DC2626"/>
  <line x1="108" y1="200" x2="108" y2="265" stroke="#DC2626" stroke-width="1.3"/><rect x="103" y="212" width="10" height="18" fill="#16A34A"/>
  <text x="100" y="278" font-size="8.5" fill="#DC2626">wick ↓</text>
  <line x1="140" y1="130" x2="140" y2="220" stroke="#16A34A" stroke-width="1.3"/><rect x="135" y="142" width="10" height="70" fill="#16A34A"/>
  <line x1="170" y1="120" x2="170" y2="170" stroke="#16A34A" stroke-width="1.3"/><rect x="165" y="130" width="10" height="35" fill="#16A34A"/>
  <text x="40" y="292" font-size="10" fill="#374151">Quét đáy → reclaim → displacement ↑ (discount)</text>

  <!-- BSL sweep -->
  <rect x="264" y="70" width="232" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="280" y="94" font-size="13" font-weight="700" fill="#DC2626">BSL Sweep → Short</text>
  <line x1="284" y1="140" x2="488" y2="140" stroke="#DC2626" stroke-dasharray="4 3"/><text x="284" y="135" font-size="9" fill="#DC2626">equal highs / PDH</text>
  <line x1="320" y1="170" x2="320" y2="220" stroke="#16A34A" stroke-width="1.3"/><rect x="315" y="182" width="10" height="30" fill="#16A34A"/>
  <line x1="348" y1="105" x2="348" y2="170" stroke="#DC2626" stroke-width="1.3"/><rect x="343" y="140" width="10" height="18" fill="#DC2626"/>
  <text x="340" y="100" font-size="8.5" fill="#DC2626">wick ↑</text>
  <line x1="380" y1="150" x2="380" y2="240" stroke="#DC2626" stroke-width="1.3"/><rect x="375" y="162" width="10" height="70" fill="#DC2626"/>
  <line x1="410" y1="200" x2="410" y2="260" stroke="#DC2626" stroke-width="1.3"/><rect x="405" y="212" width="10" height="40" fill="#DC2626"/>
  <text x="280" y="292" font-size="10" fill="#374151">Quét đỉnh → reclaim → displacement ↓ (premium)</text>

  <!-- notes panel -->
  <rect x="504" y="70" width="232" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="520" y="94" font-size="13" font-weight="700" fill="#1F2937">Biến thể quan trọng</text>
  <text x="520" y="122" font-size="11" fill="#374151"><tspan font-weight="700">Turtle Soup:</tspan> phá đáy/đỉnh</text>
  <text x="520" y="138" font-size="11" fill="#374151">"rõ ràng" để bẫy breakout → đảo</text>
  <text x="520" y="164" font-size="11" fill="#374151"><tspan font-weight="700">Internal:</tspan> quét trong dealing</text>
  <text x="520" y="180" font-size="11" fill="#374151">range → move ngắn tới external</text>
  <text x="520" y="206" font-size="11" fill="#374151"><tspan font-weight="700">External (HTF):</tspan> quét PDH/PDL,</text>
  <text x="520" y="222" font-size="11" fill="#374151">PWH/PWL → đảo chiều mạnh</text>
  <text x="520" y="248" font-size="11" fill="#DC2626"><tspan font-weight="700">Failed sweep = Break:</tspan></text>
  <text x="520" y="264" font-size="11" fill="#DC2626">đóng nến ngoài + đi tiếp = BOS</text>

  <!-- high value / skip -->
  <rect x="24" y="314" width="356" height="96" rx="8" fill="#16A34A" opacity="0.07"/>
  <rect x="24" y="314" width="356" height="96" rx="8" fill="none" stroke="#16A34A"/>
  <text x="40" y="336" font-size="12" font-weight="700" fill="#16A34A">Giá trị cao khi</text>
  <text x="40" y="358" font-size="10.5" fill="#374151">Sweep tại POI HTF đồng hướng bias, đúng P/D,</text>
  <text x="40" y="374" font-size="10.5" fill="#374151">trong kill zone, có displacement + MSS sau đó.</text>

  <rect x="396" y="314" width="340" height="96" rx="8" fill="#DC2626" opacity="0.06"/>
  <rect x="396" y="314" width="340" height="96" rx="8" fill="none" stroke="#DC2626"/>
  <text x="412" y="336" font-size="12" font-weight="700" fill="#DC2626">Bỏ qua khi</text>
  <text x="412" y="358" font-size="10.5" fill="#374151">Đóng nến vượt hẳn (break), ngược bias, giữa</text>
  <text x="412" y="374" font-size="10.5" fill="#374151">range, không displacement, hoặc đã chase.</text>
</svg>
