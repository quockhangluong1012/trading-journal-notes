<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Kiểm tra OVERLAP — BPR thật, BPR giả, BPR mỏng</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vẽ hai FVG thành hai dải giá rồi hỏi: chúng có giao nhau không, và phần giao có đủ dày để đo CE không?</text>

  <!-- Case 1: valid -->
  <rect x="24" y="76" width="228" height="300" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="36" y="100" font-size="12.5" font-weight="700" fill="#166534">✓ BPR thật — overlap rõ</text>
  <rect x="60" y="150" width="160" height="90" fill="#EF4444" opacity="0.13"/>
  <text x="64" y="144" font-size="10" fill="#DC2626">SIBI 118–124</text>
  <rect x="60" y="190" width="160" height="95" fill="#3B82F6" opacity="0.14"/>
  <text x="64" y="300" font-size="10" fill="#1D4ED8">BISI 112–121</text>
  <rect x="60" y="190" width="160" height="50" fill="#7C3AED" opacity="0.25"/>
  <line x1="60" y1="215" x2="220" y2="215" stroke="#5B21B6" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="70" y="211" font-size="10" font-weight="700" fill="#5B21B6">overlap 118–121, CE 119.5</text>
  <text x="36" y="330" font-size="10.5" fill="#374151">Hai dải giá GIAO nhau; phần giao</text>
  <text x="36" y="345" font-size="10.5" fill="#374151">đủ dày để đo CE và đặt stop logic.</text>
  <text x="36" y="362" font-size="10.5" font-weight="700" fill="#166534">→ POI hợp lệ, trade được.</text>

  <!-- Case 2: no overlap -->
  <rect x="266" y="76" width="228" height="300" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="278" y="100" font-size="12.5" font-weight="700" fill="#B91C1C">✗ BPR giả — KHÔNG overlap</text>
  <rect x="302" y="130" width="160" height="70" fill="#EF4444" opacity="0.13"/>
  <text x="306" y="124" font-size="10" fill="#DC2626">SIBI 126–131</text>
  <rect x="302" y="235" width="160" height="75" fill="#3B82F6" opacity="0.14"/>
  <text x="306" y="326" font-size="10" fill="#1D4ED8">BISI 110–116</text>
  <line x1="302" y1="200" x2="462" y2="200" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="302" y1="235" x2="462" y2="235" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="330" y="222" font-size="10.5" font-weight="700" fill="#B91C1C">khoảng trống — không giao</text>
  <text x="278" y="345" font-size="10.5" fill="#374151">Chỉ là 2 imbalance rời rạc.</text>
  <text x="278" y="362" font-size="10.5" font-weight="700" fill="#B91C1C">→ Không có BPR. Không trade.</text>

  <!-- Case 3: thin overlap -->
  <rect x="508" y="76" width="228" height="300" rx="8" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="520" y="100" font-size="12.5" font-weight="700" fill="#B45309">⚠ BPR mỏng — overlap mơ hồ</text>
  <rect x="544" y="140" width="160" height="85" fill="#EF4444" opacity="0.13"/>
  <text x="548" y="134" font-size="10" fill="#DC2626">SIBI 120–127</text>
  <rect x="544" y="218" width="160" height="85" fill="#3B82F6" opacity="0.14"/>
  <text x="548" y="318" font-size="10" fill="#1D4ED8">BISI 112–120.5</text>
  <rect x="544" y="218" width="160" height="7" fill="#7C3AED" opacity="0.35"/>
  <text x="552" y="243" font-size="10" font-weight="700" fill="#B45309">giao đúng 0.5 điểm — quá mỏng</text>
  <text x="520" y="345" font-size="10.5" fill="#374151">Không đo được CE tin cậy; nhiễu</text>
  <text x="520" y="360" font-size="10.5" fill="#374151">spread/tick có thể "ăn" cả vùng.</text>
  <text x="520" y="374" font-size="10.5" font-weight="700" fill="#B45309">→ Hạ cấp: cần confluence khác.</text>

  <rect x="24" y="392" width="712" height="26" rx="6" fill="#FEF3C7"/>
  <text x="36" y="410" font-size="11.5" font-weight="700" fill="#92400E">Thao tác chuẩn: ghi hai dải giá bằng SỐ (vd. SIBI 118–124, BISI 112–121) rồi mới kết luận overlap — đừng ước lượng bằng mắt trên chart nén.</text>
</svg>
