<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="560" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Block Family — OB, OB∩FVG, Propulsion &amp; Breaker/Reclaimed</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng gốc "block" nhưng vai trò và trạng thái khác nhau</text>

  <!-- ===== Panel A: OB + FVG overlap ===== -->
  <rect x="24" y="70" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="92" font-size="14" font-weight="700" fill="#1D4ED8">A. Refined entry: OB ∩ FVG (fair value area)</text>

  <!-- OB zone -->
  <rect x="60" y="200" width="240" height="52" fill="#DC2626" opacity="0.10"/>
  <text x="304" y="214" font-size="11" fill="#B91C1C" font-weight="700">OB zone</text>
  <!-- FVG zone overlapping upper part of OB -->
  <rect x="60" y="178" width="240" height="42" fill="#3B82F6" opacity="0.14"/>
  <text x="304" y="190" font-size="11" fill="#1D4ED8" font-weight="700">FVG</text>
  <!-- overlap -->
  <rect x="60" y="200" width="240" height="20" fill="#7C3AED" opacity="0.25"/>
  <text x="304" y="236" font-size="11" fill="#6B21A8" font-weight="700">∩ = entry</text>

  <!-- candles: down candle (OB) then displacement -->
  <rect x="96" y="196" width="2" height="64" fill="#DC2626"/>
  <rect x="90" y="204" width="13" height="46" fill="#DC2626" rx="1"/>
  <rect x="124" y="120" width="2" height="140" fill="#16A34A"/>
  <rect x="118" y="128" width="13" height="118" fill="#16A34A" rx="1"/>
  <rect x="152" y="96" width="2" height="66" fill="#16A34A"/>
  <rect x="146" y="102" width="13" height="50" fill="#16A34A" rx="1"/>

  <!-- mean threshold -->
  <line x1="60" y1="226" x2="300" y2="226" stroke="#B91C1C" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="36" y="272" font-size="11" fill="#374151">Vùng chồng lấp OB + FVG = entry R:R tốt nhất;</text>
  <text x="36" y="286" font-size="11" fill="#374151">Mean Threshold (50% OB, gạch đỏ) là mốc tinh chỉnh.</text>

  <!-- ===== Panel B: Propulsion Block ===== -->
  <rect x="392" y="70" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="404" y="92" font-size="14" font-weight="700" fill="#0F766E">B. Propulsion Block — OB sinh trong OB cũ</text>

  <!-- original OB zone -->
  <rect x="428" y="214" width="240" height="44" fill="#DC2626" opacity="0.10"/>
  <text x="672" y="232" font-size="10.5" fill="#B91C1C" font-weight="700">OB gốc</text>
  <!-- price rallies, retraces INTO OB, forms new down candle (propulsion) -->
  <rect x="452" y="210" width="2" height="52" fill="#16A34A"/>
  <rect x="446" y="218" width="12" height="36" fill="#16A34A" rx="1"/>
  <rect x="478" y="150" width="2" height="90" fill="#16A34A"/>
  <rect x="472" y="158" width="12" height="74" fill="#16A34A" rx="1"/>
  <!-- retrace down candle touching OB top (propulsion candle) -->
  <rect x="504" y="186" width="2" height="46" fill="#DC2626"/>
  <rect x="498" y="192" width="12" height="34" fill="#DC2626" rx="1"/>
  <!-- propulsion zone -->
  <rect x="492" y="192" width="176" height="34" fill="#14B8A6" opacity="0.20"/>
  <text x="600" y="186" font-size="10.5" fill="#0F766E" font-weight="700">Propulsion Block</text>
  <!-- displacement up again -->
  <rect x="530" y="112" width="2" height="112" fill="#16A34A"/>
  <rect x="524" y="120" width="12" height="94" fill="#16A34A" rx="1"/>
  <rect x="556" y="92" width="2" height="62" fill="#16A34A"/>
  <rect x="550" y="98" width="12" height="48" fill="#16A34A" rx="1"/>

  <text x="404" y="272" font-size="11" fill="#374151">Nến giảm test/respect OB cũ rồi tạo displacement mới →</text>
  <text x="404" y="286" font-size="11" fill="#374151">chính nến đó thành Propulsion Block: momentum mạnh hơn OB thường.</text>

  <!-- ===== Panel C: Breaker flip ===== -->
  <rect x="24" y="310" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="332" font-size="14" font-weight="700" fill="#B91C1C">C. OB fail → Breaker (flip vai trò)</text>

  <!-- bullish OB zone -->
  <rect x="60" y="400" width="250" height="40" fill="#16A34A" opacity="0.12"/>
  <text x="64" y="396" font-size="10.5" fill="#166534" font-weight="700">Bullish OB</text>
  <!-- price bounces once -->
  <rect x="96" y="392" width="2" height="54" fill="#16A34A"/>
  <rect x="90" y="400" width="12" height="38" fill="#16A34A" rx="1"/>
  <rect x="122" y="360" width="2" height="52" fill="#16A34A"/>
  <rect x="116" y="366" width="12" height="40" fill="#16A34A" rx="1"/>
  <!-- then body close THROUGH OB -->
  <rect x="148" y="392" width="2" height="96" fill="#DC2626"/>
  <rect x="142" y="398" width="12" height="82" fill="#DC2626" rx="1"/>
  <text x="160" y="500" font-size="10.5" fill="#B91C1C">Đóng thân xuyên OB + acceptance</text>
  <!-- retest from below -->
  <rect x="188" y="416" width="2" height="60" fill="#16A34A"/>
  <rect x="182" y="428" width="12" height="40" fill="#16A34A" rx="1"/>
  <!-- rejection short -->
  <rect x="214" y="428" width="2" height="76" fill="#DC2626"/>
  <rect x="208" y="434" width="12" height="62" fill="#DC2626" rx="1"/>
  <path d="M228 436 L262 468" stroke="#B91C1C" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="240" y="430" font-size="10.5" fill="#B91C1C" font-weight="700">Retest → Short</text>

  <text x="36" y="518" font-size="11" fill="#374151">OB "chết" không biến mất — nó flip thành Breaker; đọc theo [[Breaker Block]].</text>

  <!-- ===== Panel D: Reclaimed OB ===== -->
  <rect x="392" y="310" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="404" y="332" font-size="14" font-weight="700" fill="#7C3AED">D. Reclaimed OB — bị vi phạm rồi giành lại</text>

  <!-- bullish OB zone -->
  <rect x="428" y="400" width="250" height="40" fill="#16A34A" opacity="0.12"/>
  <text x="432" y="396" font-size="10.5" fill="#166534" font-weight="700">Bullish OB</text>
  <!-- price dips through with wick/short-lived body -->
  <rect x="466" y="404" width="2" height="86" fill="#DC2626"/>
  <rect x="460" y="412" width="12" height="52" fill="#DC2626" rx="1"/>
  <text x="404" y="508" font-size="10.5" fill="#6B7280">Xuyên xuống ngắn hạn (sweep qua OB)…</text>
  <!-- strong reclaim -->
  <rect x="494" y="368" width="2" height="118" fill="#16A34A"/>
  <rect x="488" y="376" width="12" height="98" fill="#16A34A" rx="1"/>
  <rect x="520" y="342" width="2" height="70" fill="#16A34A"/>
  <rect x="514" y="348" width="12" height="56" fill="#16A34A" rx="1"/>
  <text x="540" y="366" font-size="10.5" fill="#6B21A8" font-weight="700">…reclaim mạnh trở lại</text>
  <text x="540" y="380" font-size="10.5" fill="#6B21A8" font-weight="700">→ OB "tái sinh" (đã sweep sâu)</text>

  <text x="404" y="524" font-size="11" fill="#374151">Khác Breaker: không có acceptance bền — chỉ quét qua rồi giành lại ngay.</text>

  <defs>
    <marker id="arrR" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#B91C1C"/>
    </marker>
  </defs>
</svg>
