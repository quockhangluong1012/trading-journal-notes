<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="mg" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16A34A"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Fair Value Gap — Quy trình đa khung thời gian</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Top-down: D1/H4 định hướng → H1/M15 chọn POI → M5/M1 xác nhận entry</text>

  <!-- Band 1: D1/H4 -->
  <rect x="24" y="70" width="712" height="108" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="40" y="88" width="92" height="26" rx="13" fill="#1D4ED8"/>
  <text x="86" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">D1 / H4</text>
  <text x="148" y="106" font-size="13" font-weight="700" fill="#1F2937">Bias và Draw on Liquidity</text>
  <text x="148" y="128" font-size="11" fill="#374151">• Xác định Daily Bias (Bullish / Bearish / Neutral)</text>
  <text x="148" y="146" font-size="11" fill="#374151">• HTF FVG còn mở = draw / target — chưa phải entry</text>
  <text x="148" y="164" font-size="11" fill="#374151">• FVG để Long phải ở discount, để Short phải ở premium</text>
  <rect x="560" y="86" width="150" height="34" fill="#DC2626" opacity="0.08"/>
  <rect x="560" y="120" width="150" height="34" fill="#16A34A" opacity="0.08"/>
  <line x1="560" y1="120" x2="710" y2="120" stroke="#6B7280" stroke-dasharray="4 3"/>
  <text x="566" y="108" font-size="10" fill="#DC2626">Premium</text>
  <text x="566" y="146" font-size="10" fill="#16A34A">Discount</text>
  <text x="664" y="116" font-size="10" fill="#6B7280">EQ 50%</text>

  <polygon points="372,184 388,184 380,198" fill="#9CA3AF"/>

  <!-- Band 2: H1/M15 -->
  <rect x="24" y="202" width="712" height="108" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="40" y="220" width="92" height="26" rx="13" fill="#3B82F6"/>
  <text x="86" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">H1 / M15</text>
  <text x="148" y="238" font-size="13" font-weight="700" fill="#1F2937">POI và CE (50%)</text>
  <text x="148" y="260" font-size="11" fill="#374151">• Chọn FVG sinh từ displacement, còn unmitigated</text>
  <text x="148" y="278" font-size="11" fill="#374151">• Đánh dấu CE (50%) — mức phản ứng quan trọng nhất</text>
  <text x="148" y="296" font-size="11" fill="#374151">• Kiểm tra: liquidity đã bị sweep trước khi FVG hình thành chưa?</text>
  <rect x="560" y="226" width="150" height="44" fill="#3B82F6" opacity="0.10"/>
  <rect x="560" y="226" width="150" height="44" fill="none" stroke="#3B82F6"/>
  <line x1="560" y1="248" x2="710" y2="248" stroke="#1D4ED8" stroke-dasharray="5 3" stroke-width="1.5"/>
  <text x="566" y="244" font-size="10" fill="#1D4ED8">CE (50%)</text>

  <polygon points="372,316 388,316 380,330" fill="#9CA3AF"/>

  <!-- Band 3: M5/M1 -->
  <rect x="24" y="334" width="712" height="108" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="40" y="352" width="92" height="26" rx="13" fill="#16A34A"/>
  <text x="86" y="369" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">M5 / M1</text>
  <text x="148" y="370" font-size="13" font-weight="700" fill="#1F2937">Xác nhận và Entry</text>
  <text x="148" y="392" font-size="11" fill="#374151">• Chờ MSS + displacement LTF khi giá vào FVG POI</text>
  <text x="148" y="410" font-size="11" fill="#374151">• Entry quanh CE; stop ngoài distal / dưới điểm sweep</text>
  <text x="148" y="428" font-size="11" fill="#374151">• Target: internal liquidity trước → external (BSL/SSL) sau</text>
  <rect x="560" y="396" width="150" height="22" fill="#3B82F6" opacity="0.10"/>
  <line x1="596" y1="372" x2="596" y2="404" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="592" y="378" width="8" height="20" fill="#16A34A"/>
  <line x1="616" y1="356" x2="616" y2="396" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="612" y="362" width="8" height="28" fill="#16A34A"/>
  <line x1="636" y1="342" x2="636" y2="380" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="632" y="348" width="8" height="26" fill="#16A34A"/>
  <polyline points="652,368 670,348" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#mg)"/>

  <rect x="24" y="458" width="712" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="380" y="481" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">Sweep → Displacement (BOS/MSS) → FVG → Retrace về CE → MSS LTF → Entry</text>
</svg>
