<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="dbn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6B7280"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cấu trúc nhận diện — Ma trận xây Daily Bias</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cộng dồn bằng chứng qua 6 thành phần → kết luận Bullish / Bearish / Neutral</text>

  <g font-size="12">
    <rect x="24" y="74" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="94" font-weight="700" fill="#1F2937">1 · HTF structure</text>
    <text x="38" y="111" fill="#6B7280">D1/H4 giữ hướng delivery; HL/LH được bảo vệ; displacement phá swing</text>

    <rect x="24" y="126" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="146" font-weight="700" fill="#1F2937">2 · Draw on liquidity</text>
    <text x="38" y="163" fill="#6B7280">Pool nào còn mở &amp; quan trọng nhất: BSL trên hay SSL dưới?</text>

    <rect x="24" y="178" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="198" font-weight="700" fill="#1F2937">3 · Premium / Discount</text>
    <text x="38" y="215" fill="#6B7280">Giá ở discount (ưu tiên Long) hay premium (ưu tiên Short) của range?</text>

    <rect x="24" y="230" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="250" font-weight="700" fill="#1F2937">4 · POI / PD Array</text>
    <text x="38" y="267" fill="#6B7280">FVG / OB / breaker / mitigation còn hiệu lực, cùng hướng bias?</text>

    <rect x="24" y="282" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="302" font-weight="700" fill="#1F2937">5 · Liquidity event</text>
    <text x="38" y="319" fill="#6B7280">Đã sweep pool đối diện rồi reject / reclaim + displacement?</text>

    <rect x="24" y="334" width="500" height="44" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="38" y="354" font-weight="700" fill="#1F2937">6 · LTF confirmation</text>
    <text x="38" y="371" fill="#6B7280">MSS + displacement + FVG TRONG POI (không phải giữa range)</text>
  </g>

  <line x1="524" y1="226" x2="560" y2="226" stroke="#6B7280" stroke-width="1.5" marker-end="url(#dbn)"/>

  <rect x="566" y="120" width="170" height="210" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="651" y="144" text-anchor="middle" font-size="13" font-weight="700" fill="#1F2937">Kết luận</text>
  <rect x="582" y="158" width="138" height="42" rx="6" fill="#16A34A" opacity="0.12"/>
  <text x="651" y="184" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">Bullish (đa số ↑)</text>
  <rect x="582" y="208" width="138" height="42" rx="6" fill="#DC2626" opacity="0.12"/>
  <text x="651" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#DC2626">Bearish (đa số ↓)</text>
  <rect x="582" y="258" width="138" height="42" rx="6" fill="#6B7280" opacity="0.12"/>
  <text x="651" y="284" text-anchor="middle" font-size="12" font-weight="700" fill="#6B7280">Neutral (mâu thuẫn)</text>

  <text x="295" y="410" text-anchor="middle" font-size="12" font-weight="600" fill="#D97706">Bắt buộc: ghi range, draw chính, vị trí P/D, POI hợp lệ, và mức invalidation.</text>
  <text x="295" y="430" text-anchor="middle" font-size="11" fill="#6B7280">Bias yếu đi nếu chỉ dựa vào HH/HL hoặc 1 nến D1 mà không có liquidity target.</text>
</svg>
