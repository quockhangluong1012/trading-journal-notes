<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Có IRL vs Liquidity Void — khi giá không dừng lại giữa đường</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Trái: FVG (IRL) thật khiến giá dừng và phản ứng. Phải: không có inefficiency — giá chạy thẳng ERL → ERL.</text>

  <!-- LEFT panel -->
  <rect x="24" y="70" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="92" font-size="12.5" font-weight="700" fill="#1F2937">Có IRL — dừng lại &amp; rebalance</text>

  <line x1="44" y1="112" x2="352" y2="112" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="107" font-size="9.5" font-weight="700" fill="#B91C1C">ERL đỉnh (BSL)</text>

  <line x1="44" y1="360" x2="352" y2="360" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="48" y="374" font-size="9.5" font-weight="700" fill="#15803D">ERL đáy (SSL)</text>

  <path d="M60,120 L100,180 L140,230 L175,225 L210,290 L250,300 L290,340 L330,355"
        fill="none" stroke="#374151" stroke-width="2.2"/>

  <rect x="150" y="205" width="70" height="40" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="152" y="200" font-size="9.5" font-weight="700" fill="#1D4ED8">FVG (IRL thật)</text>

  <rect x="170" y="215" width="3" height="26" fill="#374151"/>
  <rect x="166" y="220" width="11" height="16" fill="#DC2626" rx="1"/>

  <circle cx="175" cy="225" r="9" fill="#3B82F6"/>
  <text x="175" y="229" font-size="9.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">①</text>
  <text x="60" y="272" font-size="10" fill="#1D4ED8">① Giá dừng, phản ứng tại FVG</text>
  <text x="60" y="288" font-size="10" fill="#6B7280">(partial TP hợp lý ở đây)</text>

  <circle cx="330" cy="355" r="9" fill="#16A34A"/>
  <text x="330" y="359" font-size="9.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">②</text>
  <text x="220" y="330" font-size="10" fill="#15803D">② Sau đó mới tới ERL đáy</text>

  <!-- RIGHT panel -->
  <rect x="391" y="70" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.4"/>
  <text x="403" y="92" font-size="12.5" font-weight="700" fill="#1F2937">Liquidity Void — cú chạy thẳng</text>

  <line x1="411" y1="112" x2="719" y2="112" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="415" y="107" font-size="9.5" font-weight="700" fill="#B91C1C">ERL đỉnh (BSL)</text>

  <line x1="411" y1="360" x2="719" y2="360" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="415" y="374" font-size="9.5" font-weight="700" fill="#15803D">ERL đáy (SSL)</text>

  <path d="M427,120 L460,155 L495,190 L530,225 L565,260 L600,295 L635,330 L660,350"
        fill="none" stroke="#374151" stroke-width="2.4"/>

  <!-- thin candles, no overlap, no FVG -->
  <rect x="458" y="145" width="2.5" height="22" fill="#374151"/>
  <rect x="455" y="150" width="8" height="12" fill="#DC2626" rx="1"/>
  <rect x="493" y="180" width="2.5" height="22" fill="#374151"/>
  <rect x="490" y="185" width="8" height="12" fill="#DC2626" rx="1"/>
  <rect x="528" y="215" width="2.5" height="22" fill="#374151"/>
  <rect x="525" y="220" width="8" height="12" fill="#DC2626" rx="1"/>
  <rect x="563" y="250" width="2.5" height="22" fill="#374151"/>
  <rect x="560" y="255" width="8" height="12" fill="#DC2626" rx="1"/>
  <rect x="598" y="285" width="2.5" height="22" fill="#374151"/>
  <rect x="595" y="290" width="8" height="12" fill="#DC2626" rx="1"/>

  <text x="415" y="240" font-size="9.5" fill="#9CA3AF" font-style="italic">(không có FVG / OB nào —</text>
  <text x="415" y="253" font-size="9.5" fill="#9CA3AF" font-style="italic">thân nến mỏng, ít overlap)</text>

  <circle cx="427" cy="120" r="9" fill="#DC2626"/>
  <text x="427" y="124" font-size="9.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">①</text>
  <circle cx="660" cy="350" r="9" fill="#16A34A"/>
  <text x="660" y="354" font-size="9.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">②</text>
  <text x="425" y="330" font-size="10" font-weight="700" fill="#B91C1C">"Liquidity void" / cú chạy thẳng</text>
  <text x="425" y="344" font-size="10" fill="#6B7280">ERL → ERL không dừng giữa đường</text>

  <rect x="24" y="410" width="712" height="55" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Đừng ép một entry limit tại IRL không tồn tại. Nếu không tìm được FVG/OB thật trên đường đi,</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">chuyển sang market-structure-shift entry hoặc chờ giá tới thẳng ERL đối diện.</text>
</svg>
