<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Phép thử sweep — Mitigation Block vs Breaker Block</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng một cấu trúc đảo chiều bullish. Chỉ khác nhau ở MỘT câu: đáy cũ GIỮ hay BỊ PHÁ (sweep)?</text>

  <!-- LEFT panel: Mitigation -->
  <rect x="24" y="72" width="344" height="338" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <text x="40" y="96" font-size="14" font-weight="700" fill="#15803D">Mitigation Block — đáy cũ GIỮ</text>

  <!-- STL level held -->
  <line x1="60" y1="330" x2="330" y2="330" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="66" y="346" font-size="9.5" fill="#15803D">đáy cũ (STL) — không bị phá</text>
  <path d="M55,230 L100,330 L140,250" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- higher low, does NOT break STL -->
  <path d="M140,250 L180,305 L220,270" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="180" cy="305" r="6" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="150" y="298" font-size="9.5" font-weight="700" fill="#15803D">higher low ▲ (KHÔNG sweep)</text>
  <!-- displacement up -->
  <path d="M220,270 L255,220 L300,140" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <text x="230" y="130" font-size="9.5" font-weight="700" fill="#15803D">MSS phá STH</text>
  <!-- MB zone -->
  <rect x="200" y="255" width="24" height="34" fill="#F59E0B" opacity="0.55" rx="1"/>
  <!-- SL logic -->
  <line x1="60" y1="318" x2="330" y2="318" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="180" y="382" font-size="10.5" font-weight="700" fill="#DC2626">SL: dưới higher low (gần) → R:R tốt hơn</text>

  <!-- RIGHT panel: Breaker -->
  <rect x="392" y="72" width="344" height="338" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <text x="408" y="96" font-size="14" font-weight="700" fill="#B91C1C">Breaker Block — đáy cũ BỊ PHÁ</text>

  <line x1="428" y1="320" x2="700" y2="320" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="434" y="312" font-size="9.5" fill="#6B7280">đáy cũ (Low1)</text>
  <path d="M423,230 L468,320 L508,250" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- sweep below low1 -->
  <path d="M508,250 L548,360 L588,275" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="548" cy="360" r="8" fill="none" stroke="#F59E0B" stroke-width="2.6"/>
  <text x="512" y="382" font-size="9.5" font-weight="700" fill="#B45309">sweep SSL ▼ Low2 &lt; Low1</text>
  <!-- displacement up -->
  <path d="M588,275 L623,220 L668,140" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <text x="600" y="130" font-size="9.5" font-weight="700" fill="#15803D">MSS phá High1</text>
  <!-- breaker zone -->
  <rect x="568" y="258" width="24" height="34" fill="#F59E0B" opacity="0.55" rx="1"/>
  <!-- SL logic below sweep -->
  <line x1="428" y1="352" x2="700" y2="352" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="500" y="400" font-size="10.5" font-weight="700" fill="#DC2626">SL: dưới điểm sweep (xa hơn)</text>

  <!-- bottom takeaway -->
  <rect x="24" y="420" width="712" height="38" rx="6" fill="#FEF3C7"/>
  <text x="36" y="437" font-size="11.5" font-weight="700" fill="#92400E">Chỉ khác nhau ở "swing cũ bị PHÁ (sweep) hay GIỮ" → quyết định SL logic khác nhau.</text>
  <text x="36" y="452" font-size="11" fill="#92400E">Giữ → Mitigation (stop dưới higher low). Phá → Breaker (stop dưới điểm sweep). Gọi sai = đặt stop sai.</text>
</svg>
