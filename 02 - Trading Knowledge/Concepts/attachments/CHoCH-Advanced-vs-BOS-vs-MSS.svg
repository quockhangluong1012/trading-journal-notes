<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">BOS vs CHoCH vs MSS — cùng "phá cấu trúc", ba ý nghĩa khác nhau</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Câu hỏi gốc: phá THUẬN hay NGƯỢC trend? Và cú phá ngược có displacement + sweep không?</text>

  <!-- Column 1: BOS -->
  <rect x="24" y="72" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="24" y="72" width="228" height="30" rx="8" fill="#16A34A"/>
  <text x="138" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">BOS — Break of Structure</text>
  <text x="138" y="122" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">Phá THUẬN trend = TIẾP DIỄN</text>
  <!-- mini price path continuation up -->
  <path d="M50,320 L85,270 L110,300 L150,240 L175,265 L225,195" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="150" y1="240" x2="225" y2="240" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="5 3"/>
  <circle cx="150" cy="240" r="4" fill="#16A34A"/>
  <text x="60" y="235" font-size="9.5" fill="#16A34A">phá HH cũ</text>
  <text x="40" y="352" font-size="10.5" fill="#374151">Xác nhận trend đang chạy</text>
  <text x="40" y="368" font-size="10.5" fill="#374151">tiếp tục cùng hướng</text>
  <text x="40" y="388" font-size="10" fill="#6B7280">ICT + SMC · không phải tín hiệu đảo</text>

  <!-- Column 2: CHoCH -->
  <rect x="266" y="72" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.6"/>
  <rect x="266" y="72" width="228" height="30" rx="8" fill="#F59E0B"/>
  <text x="380" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">CHoCH — Change of Character</text>
  <text x="380" y="122" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">Phá NGƯỢC trend lần đầu = CẢNH BÁO</text>
  <!-- mini price path up then break down -->
  <path d="M290,300 L320,240 L345,275 L380,215 L405,255 L440,320" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="345" y1="275" x2="465" y2="275" stroke="#F59E0B" stroke-width="1.3" stroke-dasharray="5 3"/>
  <circle cx="345" cy="275" r="4" fill="#F59E0B"/>
  <text x="410" y="270" font-size="9.5" fill="#B45309">phá HL</text>
  <text x="308" y="330" font-size="9.5" fill="#B45309">xuống</text>
  <text x="282" y="352" font-size="10.5" fill="#374151">Cảnh báo khả năng đảo</text>
  <text x="282" y="368" font-size="10.5" fill="#374151">thuật ngữ SMC · LỎNG</text>
  <text x="282" y="388" font-size="10" fill="#B45309">hay bỏ qua displacement → dễ false</text>

  <!-- Column 3: MSS -->
  <rect x="508" y="72" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <rect x="508" y="72" width="228" height="30" rx="8" fill="#DC2626"/>
  <text x="622" y="92" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">MSS — Market Structure Shift</text>
  <text x="622" y="122" font-size="11.5" font-weight="700" fill="#B91C1C" text-anchor="middle">Ngược trend + displacement BẮT BUỘC</text>
  <!-- mini price path: sweep then displacement break down -->
  <path d="M532,290 L560,235 L582,268 L610,205 L622,215 L682,330" fill="none" stroke="#374151" stroke-width="2"/>
  <path d="M610,205 L682,330" fill="none" stroke="#DC2626" stroke-width="2.8"/>
  <circle cx="610" cy="205" r="7" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="558" y="200" font-size="9" fill="#B45309">sweep BSL</text>
  <line x1="582" y1="268" x2="700" y2="268" stroke="#DC2626" stroke-width="1.3" stroke-dasharray="5 3"/>
  <rect x="632" y="235" width="42" height="18" fill="#DC2626" opacity="0.15"/>
  <text x="636" y="248" font-size="8.5" fill="#B91C1C">FVG</text>
  <text x="524" y="352" font-size="10.5" fill="#374151">Đảo chiều có xác nhận</text>
  <text x="524" y="368" font-size="10.5" fill="#374151">thuật ngữ ICT · CHẶT nhất</text>
  <text x="524" y="388" font-size="10" fill="#B91C1C">body close + displacement + sweep</text>

  <rect x="24" y="410" width="712" height="24" rx="6" fill="#FEF3C7"/>
  <text x="36" y="427" font-size="11.5" font-weight="700" fill="#92400E">CHoCH ≈ MSS (cùng sự kiện). ICT ưu tiên gọi MSS vì chặt hơn — áp chuẩn MSS lên mọi CHoCH: không displacement = không trade.</text>
</svg>
