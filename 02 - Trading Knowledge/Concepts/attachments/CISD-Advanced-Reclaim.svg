<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CISD theo GIÁ MỞ CỬA (Opening-price reclaim)</text>
  <text x="24" y="55" font-size="12.5" fill="#6B7280">Midnight Open / NDOG / NWOG là mốc delivery gốc. Sweep dưới rồi ĐÓNG lại trên = CISD chuẩn hoá.</text>

  <rect x="24" y="72" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- opening price reference (the CISD reference for the day) -->
  <line x1="70" y1="210" x2="700" y2="210" stroke="#7C3AED" stroke-width="2.5"/>
  <rect x="560" y="188" width="140" height="18" rx="3" fill="#EDE9FE"/><text x="566" y="201" font-size="9.5" font-weight="700" fill="#6D28D9">Midnight Open (00:00 ET)</text>

  <!-- price opens, gets delivered below (manipulation) -->
  <rect x="110" y="200" width="2" height="40" fill="#DC2626"/><rect x="103" y="206" width="14" height="28" fill="#DC2626" rx="1"/>
  <rect x="140" y="222" width="2" height="66" fill="#DC2626"/><rect x="133" y="230" width="14" height="50" fill="#DC2626" rx="1"/>
  <rect x="170" y="262" width="2" height="80" fill="#DC2626"/><rect x="163" y="270" width="14" height="62" fill="#DC2626" rx="1"/>
  <circle cx="171" cy="342" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="120" y="362" font-size="9.5" font-weight="700" fill="#B45309">Sweep dưới open + SSL (giá RẺ so với open)</text>

  <!-- reclaim: close back above open -->
  <rect x="200" y="230" width="2" height="80" fill="#16A34A"/><rect x="193" y="256" width="14" height="46" fill="#16A34A" rx="1"/>
  <rect x="230" y="150" width="2" height="130" fill="#16A34A"/><rect x="223" y="164" width="14" height="110" fill="#16A34A" rx="1"/>
  <circle cx="231" cy="200" r="7" fill="#7C3AED"/>
  <text x="246" y="150" font-size="10.5" font-weight="700" fill="#6D28D9">Đóng lại TRÊN open = reclaim</text>
  <text x="246" y="166" font-size="10" fill="#374151">Delivery lật: từ "giá rẻ dưới open" sang "đắt trên open".</text>

  <!-- continuation up -->
  <rect x="262" y="140" width="2" height="70" fill="#16A34A"/><rect x="255" y="148" width="14" height="54" fill="#16A34A" rx="1"/>
  <rect x="292" y="120" width="2" height="66" fill="#16A34A"/><rect x="285" y="128" width="14" height="50" fill="#16A34A" rx="1"/>

  <text x="40" y="352" font-size="11" font-weight="700" fill="#1F2937">Ý tưởng:</text>
  <text x="40" y="372" font-size="10.5" fill="#374151">Open trong ngày = mức "giá trị công bằng" thuật toán tham chiếu. Dưới open = discount, trên = premium.</text>
  <text x="40" y="388" font-size="10.5" fill="#6B7280">Reclaim open sau sweep = biến thể mạnh của CISD, hợp bias bullish trong ngày. Kết hợp NDOG/NWOG càng tốt.</text>
</svg>