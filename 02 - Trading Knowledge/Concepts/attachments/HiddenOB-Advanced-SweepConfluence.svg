<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Confluence: Liquidity Sweep + Hidden OB + LTF CISD</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Sweep dọn entry sớm → Hidden OB giao lệnh (fill) → CISD trên LTF kích hoạt long.</text>

  <rect x="24" y="72" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- swing low SSL line -->
  <line x1="60" y1="330" x2="700" y2="330" stroke="#6B7280" stroke-width="1.1" stroke-dasharray="4 4"/>
  <text x="66" y="324" font-size="10" fill="#6B7280">swing low cũ (SSL nằm dưới)</text>

  <!-- hidden OB box sitting just above SSL -->
  <rect x="300" y="250" width="130" height="70" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.3"/>
  <text x="308" y="245" font-size="10.5" font-weight="700" fill="#1D4ED8">② Hidden OB (vùng fill)</text>

  <!-- price drops, sweeps SSL below swing low -->
  <path d="M90,150 L140,210 L190,180 L240,260 L290,300" fill="none" stroke="#374151" stroke-width="2"/>
  <!-- sweep spike below SSL -->
  <path d="M290,300 L320,340 L340,395" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="340" cy="395" r="9" fill="none" stroke="#B45309" stroke-width="2.5"/>
  <line x1="290" y1="392" x2="400" y2="392" stroke="#B45309" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="120" y="420" font-size="11" font-weight="700" fill="#B45309">① Sweep SSL dưới swing low (dọn stop long non + sell breakout)</text>

  <!-- retrace back up into hidden OB -->
  <path d="M340,395 L365,330 L385,300 L410,285" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="360" y="280" font-size="10" font-weight="700" fill="#166534">retrace vào Hidden OB</text>

  <!-- LTF CISD marker inside OB -->
  <line x1="360" y1="255" x2="470" y2="255" stroke="#166534" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="440" y="250" font-size="10.5" font-weight="700" fill="#166534">③ LTF CISD/MSS xác nhận</text>

  <!-- displacement up to target -->
  <path d="M410,285 L450,220 L500,170 L560,140 L620,120 L680,105" fill="none" stroke="#166534" stroke-width="2.6"/>
  <polygon points="680,105 670,110 673,118" fill="#166534"/>
  <line x1="560" y1="120" x2="700" y2="120" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="560" y="112" font-size="10" fill="#166534">Target: BSL / opposing PD array</text>

  <text x="440" y="300" font-size="10.5" font-weight="700" fill="#1D4ED8">④ Long entry</text>
  <text x="440" y="318" font-size="10" fill="#6B7280">stop dưới wick sweep (distal)</text>

  <rect x="60" y="90" width="0" height="0" fill="none"/>
  <text x="60" y="446" font-size="10.5" fill="#6B7280">Đây là setup xác suất cao nhất: sweep tạo lý do, Hidden OB tạo vùng fill, CISD tạo trigger.</text>
</svg>
