<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ đúng — NQ1: giá về CE của NDOG, phản ứng đúng phía Daily Bias</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Gap down qua giờ nghỉ bảo trì; giá mở discount, kéo lên test CE trong NY KZ, MSS xác nhận trước khi Long.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- discount zone shading -->
  <rect x="44" y="230" width="672" height="90" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="248" font-size="10.5" fill="#1D4ED8">Discount của NDOG — nơi bias bullish tìm long</text>

  <!-- Prior close line -->
  <line x1="60" y1="150" x2="300" y2="150" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="64" y="144" font-size="10.5" font-weight="700" fill="#1D4ED8">Prior Day Close (~16:15 ET)</text>

  <!-- gap down to reopen -->
  <path d="M260,150 L300,230" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="270" y="190" font-size="9.5" fill="#6B7280">Gap down qua giờ nghỉ</text>

  <!-- Reopen line -->
  <line x1="300" y1="230" x2="716" y2="230" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="306" y="224" font-size="10.5" font-weight="700" fill="#1D4ED8">Reopen (~18:00 ET)</text>

  <!-- NDOG zone -->
  <rect x="300" y="150" width="416" height="80" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <!-- CE line -->
  <line x1="300" y1="190" x2="716" y2="190" stroke="#DC2626" stroke-width="2" stroke-dasharray="2 3"/>
  <text x="600" y="186" font-size="10.5" font-weight="700" fill="#B91C1C">CE (50% NDOG)</text>

  <!-- price opens at reopen (discount) and drifts, sweeps liquidity -->
  <path d="M320,232 L360,260 L400,290" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="400" cy="290" r="6" fill="none" stroke="#B45309" stroke-width="1.6"/>
  <text x="330" y="312" font-size="10" font-weight="700" fill="#92400E">① Quét sell-side dưới discount, đóng cửa bật lên</text>

  <!-- displacement up toward CE -->
  <path d="M400,290 L440,250 L470,215 L500,192" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <text x="410" y="260" font-size="10" font-weight="700" fill="#166534">② Displacement + MSS bullish LTF</text>

  <!-- reaction at CE -->
  <circle cx="500" cy="192" r="7" fill="#16A34A"/>
  <text x="440" y="176" font-size="10.5" font-weight="700" fill="#15803D">③ Test CE — phản ứng đúng phía Daily Bias (bullish)</text>

  <!-- continuation toward unfilled NDOG above / target -->
  <path d="M500,192 L540,170 L590,150 L650,110" fill="none" stroke="#16A34A" stroke-width="2.2" stroke-dasharray="5 3"/>
  <text x="540" y="100" font-size="10.5" fill="#166534">④ TP: cạnh trên NDOG / NDOG unfilled kế tiếp</text>

  <!-- entry/SL/TP markers -->
  <line x1="400" y1="290" x2="716" y2="290" stroke="#DC2626" stroke-width="1.1" stroke-dasharray="3 3"/>
  <text x="600" y="304" font-size="9.5" fill="#B91C1C">SL: dưới swing low quét thanh khoản</text>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Chuỗi đúng: xác định discount/premium qua CE của NDOG → chờ sweep + MSS xác nhận → entry đúng phía</text>
  <text x="36" y="450" font-size="11.5" font-weight="700" fill="#92400E">Daily Bias → TP về cạnh đối diện / NDOG unfilled. NDOG là mốc chờ, không phải lệnh tự động.</text>
</svg>
