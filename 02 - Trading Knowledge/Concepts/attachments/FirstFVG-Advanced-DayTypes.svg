<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Hai loại ngày: Magnet (sideways) vs Continuation (trendy)</text>
<text x="24" y="54" font-size="12.5" fill="#6B7280">Cùng một 1st FVG nhưng vai trò khác nhau tuỳ tính chất ngày — đọc đúng bối cảnh mới trade đúng.</text>
<!-- SIDEWAYS / MAGNET -->
<rect x="24" y="70" width="352" height="340" rx="8" fill="#FFFFFF" stroke="#93C5FD"/>
<text x="40" y="94" font-size="13" font-weight="700" fill="#1D4ED8">Ngày SIDEWAYS — FVG là MAGNET (nam châm)</text>
<rect x="40" y="210" width="320" height="40" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.4"/>
<text x="300" y="234" font-size="10" font-weight="700" fill="#1D4ED8">1st FVG</text>
<line x1="40" y1="230" x2="360" y2="230" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="6 4"/>
<!-- price oscillating around the FVG from both sides -->
<path d="M55 230 L80 160 L105 200 L130 130 L155 235 L180 300 L205 232 L230 320 L255 228 L280 170 L305 250 L340 231" fill="none" stroke="#374151" stroke-width="2"/>
<circle cx="130" cy="130" r="6" fill="none" stroke="#DC2626" stroke-width="2"/>
<circle cx="230" cy="320" r="6" fill="none" stroke="#DC2626" stroke-width="2"/>
<text x="90" y="360" font-size="10.5" fill="#374151">Giá bị KÉO về FVG từ cả hai phía —</text>
<text x="90" y="378" font-size="10.5" fill="#374151">fade các cực trị, canh mean-reversion về FVG</text>
<text x="90" y="396" font-size="10" font-weight="700" fill="#1D4ED8">→ trade phản ứng khi giá chạm FVG</text>
<!-- TRENDY / CONTINUATION -->
<rect x="392" y="70" width="344" height="340" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
<text x="408" y="94" font-size="13" font-weight="700" fill="#166534">Ngày TRENDY — FVG là mức CONTINUATION</text>
<rect x="408" y="250" width="312" height="38" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.4"/>
<text x="640" y="273" font-size="10" font-weight="700" fill="#1D4ED8">1st FVG</text>
<line x1="408" y1="269" x2="720" y2="269" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="6 4"/>
<!-- uptrend that pauses at FVG then resumes -->
<path d="M420 350 L445 310 L470 330 L495 285 L520 288 L545 240 L560 200 L585 160 L610 175 L635 120 L660 130 L690 90" fill="none" stroke="#374151" stroke-width="2"/>
<circle cx="530" cy="285" r="7" fill="none" stroke="#166534" stroke-width="2.2"/>
<text x="500" y="315" font-size="10" fill="#166534">pause / retest tại FVG</text>
<path d="M545 240 L560 200" fill="none" stroke="#166534" stroke-width="0"/>
<text x="440" y="378" font-size="10.5" fill="#374151">Giá pause tại FVG rồi TIẾP TỤC theo xu hướng —</text>
<text x="440" y="396" font-size="10" font-weight="700" fill="#166534">→ vào theo trend khi FVG giữ được (continuation)</text>
</svg>
