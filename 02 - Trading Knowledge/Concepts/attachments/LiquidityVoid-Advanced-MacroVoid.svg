<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Macro Liquidity Void — khoảng trống xuyên nhiều nến displacement liên tiếp</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Một void rộng hình thành từ 6-8 nến cùng chiều gần như không overlap, khác hẳn một FVG 3-nến đơn lẻ.</text>

  <rect x="24" y="70" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- baseline -->
  <line x1="50" y1="340" x2="720" y2="340" stroke="#D8DBE2" stroke-width="1"/>

  <!-- long consecutive displacement run -->
  <g>
    <rect x="70" y="300" width="16" height="38" fill="#16A34A" opacity="0.9"/>
    <rect x="76" y="292" width="4" height="52" fill="#15803D"/>
    <rect x="94" y="270" width="16" height="36" fill="#16A34A" opacity="0.9"/>
    <rect x="100" y="262" width="4" height="50" fill="#15803D"/>
    <rect x="118" y="242" width="16" height="34" fill="#16A34A" opacity="0.9"/>
    <rect x="124" y="234" width="4" height="48" fill="#15803D"/>
    <rect x="142" y="216" width="16" height="32" fill="#16A34A" opacity="0.9"/>
    <rect x="148" y="208" width="4" height="46" fill="#15803D"/>
    <rect x="166" y="192" width="16" height="30" fill="#16A34A" opacity="0.9"/>
    <rect x="172" y="184" width="4" height="44" fill="#15803D"/>
    <rect x="190" y="168" width="16" height="30" fill="#16A34A" opacity="0.9"/>
    <rect x="196" y="160" width="4" height="44" fill="#15803D"/>
    <rect x="214" y="146" width="16" height="28" fill="#16A34A" opacity="0.9"/>
    <rect x="220" y="138" width="4" height="42" fill="#15803D"/>
    <rect x="238" y="124" width="16" height="28" fill="#16A34A" opacity="0.9"/>
    <rect x="244" y="116" width="4" height="42" fill="#15803D"/>
  </g>
  <text x="70" y="112" font-size="10.5" font-weight="700" fill="#15803D">7-8 nến displacement liên tiếp — không phải 3 nến của một FVG đơn</text>

  <!-- macro void envelope: true edges = first candle's opening extreme to last candle's closing extreme -->
  <rect x="64" y="124" width="196" height="216" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="270" y="132" font-size="10" font-weight="700" fill="#B45309">Macro Void — biên thật</text>
  <text x="270" y="146" font-size="9" fill="#92400E">edge trên = high nến đầu tiên</text>
  <text x="270" y="158" font-size="9" fill="#92400E">edge dưới = low nến cuối cùng</text>

  <!-- small FVGs inside marked lightly -->
  <rect x="86" y="270" width="32" height="36" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-dasharray="2 2"/>
  <rect x="134" y="216" width="32" height="34" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-dasharray="2 2"/>
  <rect x="182" y="168" width="32" height="32" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-dasharray="2 2"/>
  <text x="270" y="180" font-size="9" fill="#1D4ED8">FVG con rải rác bên trong —</text>
  <text x="270" y="192" font-size="9" fill="#1D4ED8">không cần lấp từng cái riêng lẻ</text>

  <!-- CE of the whole macro void -->
  <line x1="64" y1="232" x2="260" y2="232" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="270" y="236" font-size="10" font-weight="700" fill="#B91C1C">CE của TOÀN macro void</text>

  <!-- retest: fills in one piece to CE, not candle-by-candle -->
  <path d="M254,124 L320,180 L360,232 L410,170 L470,110 L560,80" fill="none" stroke="#374151" stroke-width="2.4"/>
  <circle cx="360" cy="232" r="7" fill="#374151"/>
  <text x="380" y="270" font-size="10.5" font-weight="700" fill="#374151">Retest lấp CẢ MỘT ĐOẠN tới CE trong 1-2 nến,</text>
  <text x="380" y="286" font-size="10.5" font-weight="700" fill="#374151">không phải lấp candle-by-candle từng FVG con</text>

  <!-- far target -->
  <line x1="560" y1="80" x2="716" y2="80" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="580" y="72" font-size="10.5" fill="#166534">Tiếp tục lên target sau khi respect CE</text>

  <rect x="24" y="384" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="402" font-size="11" font-weight="700" fill="#92400E">Khác biệt với FVG 3-nến: biên macro void = high của nến ĐẦU TIÊN trong chuỗi tới low của nến CUỐI CÙNG,</text>
  <text x="36" y="418" font-size="11" font-weight="700" fill="#92400E">không phải biên của một cặp nến 1-3 riêng lẻ. Khi retest, giá thường lấp một cục lớn về phía CE của cả</text>
  <text x="36" y="434" font-size="11" font-weight="700" fill="#92400E">dải rồi đảo tiếp, chứ không dừng lại "cân bằng" từng FVG con một cách tuần tự.</text>
</svg>
