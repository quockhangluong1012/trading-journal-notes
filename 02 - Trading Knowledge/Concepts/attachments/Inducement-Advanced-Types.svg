<svg viewBox="0 0 760 490" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="490" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bốn dạng Inducement thường gặp</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Mỗi dạng là một cụm thanh khoản mồi nằm logic ngay trước POI thật — nơi để CHỜ bị quét, không để vào lệnh.</text>

  <!-- Cell 1: IDM below bullish OB (minor low / SSL) -->
  <rect x="24" y="72" width="345" height="185" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="12.5" font-weight="700" fill="#15803D">① IDM dưới bullish OB — đáy nhỏ (SSL)</text>
  <rect x="44" y="200" width="305" height="30" fill="#3B82F6" opacity="0.10"/>
  <text x="52" y="220" font-size="9" fill="#1D4ED8">Bullish OB</text>
  <path d="M60,120 L110,170 L150,145 L200,185 L235,165 L270,150 L320,110" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="200" cy="185" r="5.5" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="140" y="205" font-size="9" font-weight="700" fill="#B45309">đáy nhỏ = mồi (SSL)</text>
  <text x="40" y="248" font-size="9.5" fill="#6B7280">Quét đáy nhỏ trước → chạm OB → Long</text>

  <!-- Cell 2: IDM above bearish OB (minor high / BSL) -->
  <rect x="391" y="72" width="345" height="185" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="407" y="94" font-size="12.5" font-weight="700" fill="#DC2626">② IDM trên bearish OB — đỉnh nhỏ (BSL)</text>
  <rect x="411" y="102" width="305" height="30" fill="#DC2626" opacity="0.09"/>
  <text x="419" y="121" font-size="9" fill="#991B1B">Bearish OB</text>
  <path d="M427,225 L477,175 L517,200 L567,160 L602,180 L637,195 L687,235" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="567" cy="160" r="5.5" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="500" y="150" font-size="9" font-weight="700" fill="#B45309">đỉnh nhỏ = mồi (BSL)</text>
  <text x="407" y="248" font-size="9.5" fill="#6B7280">Quét đỉnh nhỏ trước → chạm OB → Short</text>

  <!-- Cell 3: equal highs/lows -->
  <rect x="24" y="270" width="345" height="185" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="292" font-size="12.5" font-weight="700" fill="#B45309">③ IDM kiểu equal highs/lows</text>
  <line x1="60" y1="380" x2="330" y2="380" stroke="#F59E0B" stroke-width="1.6" stroke-dasharray="5 3"/>
  <path d="M70,320 L110,378 L150,340 L200,381 L245,335 L295,379 L330,315" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="110" cy="378" r="4.5" fill="#F59E0B"/>
  <circle cx="200" cy="381" r="4.5" fill="#F59E0B"/>
  <circle cx="295" cy="379" r="4.5" fill="#F59E0B"/>
  <text x="130" y="400" font-size="9" font-weight="700" fill="#B45309">equal lows — cụm stop dày</text>
  <text x="40" y="422" font-size="9.5" fill="#6B7280">Mồi càng "ngon mắt" → càng dễ là bẫy</text>
  <text x="40" y="438" font-size="9.5" fill="#6B7280">→ chờ quét cả cụm rồi mới vào POI</text>

  <!-- Cell 4: IDM within a leg (pullback) -->
  <rect x="391" y="270" width="345" height="185" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="407" y="292" font-size="12.5" font-weight="700" fill="#1D4ED8">④ IDM trong leg (pullback nhỏ)</text>
  <path d="M420,420 L460,340 L490,375 L530,300 L560,330 L600,255 L640,285 L690,200" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="490" cy="375" r="5" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <circle cx="560" cy="330" r="5" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <text x="480" y="405" font-size="9" font-weight="700" fill="#B45309">pullback nhỏ giữa displacement</text>
  <text x="407" y="428" font-size="9.5" fill="#6B7280">Lấy stop counter-trend nhỏ trước khi</text>
  <text x="407" y="443" font-size="9.5" fill="#6B7280">continuation — mồi giữa một leg đẩy</text>

  <rect x="24" y="464" width="712" height="18" rx="5" fill="#FEF3C7"/>
  <text x="36" y="477" font-size="10.5" font-weight="700" fill="#92400E">Nguyên tắc chung cho cả 4 dạng: IDM là nơi CHỜ bị quét — entry luôn tại POI SAU khi mồi bị lấy.</text>
</svg>
