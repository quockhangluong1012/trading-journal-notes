<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Turtle Soup vs Judas Swing — cùng gốc sweep, khác bối cảnh &amp; điều kiện</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Judas Swing là false move mở phiên (session-bound); Turtle Soup là fade tại một mức hiển nhiên, không ràng buộc phiên.</text>

  <rect x="24" y="70" width="712" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- divider -->
  <line x1="380" y1="80" x2="380" y2="300" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="150" y="94" font-size="11.5" font-weight="700" fill="#1D4ED8">TURTLE SOUP</text>
  <text x="470" y="94" font-size="11.5" font-weight="700" fill="#92400E">JUDAS SWING</text>

  <!-- Turtle Soup side -->
  <line x1="60" y1="230" x2="330" y2="230" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="64" y="224" font-size="9.5" fill="#1D4ED8">Mức external hiển nhiên (PDH/PDL, equal H/L, swing cũ)</text>
  <path d="M70,160 L110,195 L150,220 L178,228" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="174" y="226" width="12" height="10" fill="#3B82F6" opacity="0.8" rx="1"/>
  <rect x="179" y="236" width="3" height="30" fill="#3B82F6" opacity="0.8"/>
  <circle cx="200" cy="245" r="11" fill="none" stroke="#1D4ED8" stroke-width="1.5"/>
  <path d="M182,266 L220,240 L260,200 L300,150" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="60" y="285" font-size="9.5" fill="#374151">Bất kỳ giờ nào, miễn ở mức hiển nhiên + kill zone tốt hơn</text>

  <!-- Judas Swing side -->
  <line x1="410" y1="230" x2="700" y2="230" stroke="#92400E" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="414" y="224" font-size="9.5" fill="#92400E">Range của London Open / phiên mở cửa</text>
  <path d="M420,180 L450,210 L480,225 L505,228" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="502" y="226" width="12" height="10" fill="#F59E0B" opacity="0.85" rx="1"/>
  <rect x="507" y="236" width="3" height="26" fill="#F59E0B" opacity="0.85"/>
  <circle cx="528" cy="245" r="11" fill="none" stroke="#92400E" stroke-width="1.5"/>
  <path d="M510,262 L550,235 L590,195 L630,150" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="410" y="285" font-size="9.5" fill="#92400E">Bắt buộc trong khung mở phiên — false move rồi "true move" NY</text>

  <!-- comparison table -->
  <rect x="24" y="318" width="712" height="128" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="336" font-size="12" font-weight="700" fill="#1F2937">So sánh nhanh</text>
  <line x1="36" y1="344" x2="724" y2="344" stroke="#E5E7EB"/>

  <text x="42" y="360" font-size="10" font-weight="700" fill="#374151">Tiêu chí</text>
  <text x="220" y="360" font-size="10" font-weight="700" fill="#1D4ED8">Turtle Soup</text>
  <text x="480" y="360" font-size="10" font-weight="700" fill="#92400E">Judas Swing</text>
  <line x1="36" y1="368" x2="724" y2="368" stroke="#F3F4F6"/>

  <text x="42" y="384" font-size="9.5" fill="#374151">Bối cảnh/phiên</text>
  <text x="220" y="384" font-size="9.5" fill="#1D4ED8">Bất kỳ lúc nào giá chạm mức</text>
  <text x="480" y="384" font-size="9.5" fill="#92400E">Ràng buộc: giờ mở phiên (London/NY)</text>

  <text x="42" y="400" font-size="9.5" fill="#374151">Mức bị quét</text>
  <text x="220" y="400" font-size="9.5" fill="#1D4ED8">Swing/liquidity pool bất kỳ khung</text>
  <text x="480" y="400" font-size="9.5" fill="#92400E">High/low của range mở phiên</text>

  <text x="42" y="416" font-size="9.5" fill="#374151">Xác nhận</text>
  <text x="220" y="416" font-size="9.5" fill="#1D4ED8">Reclaim + displacement + MSS</text>
  <text x="480" y="416" font-size="9.5" fill="#92400E">"True move" ngược false move sau mở phiên</text>

  <text x="42" y="432" font-size="9.5" fill="#374151">Vô hiệu hoá</text>
  <text x="220" y="432" font-size="9.5" fill="#1D4ED8">Acceptance ngoài mức (real breakout)</text>
  <text x="480" y="432" font-size="9.5" fill="#92400E">False move không đảo trước NY — thành trend thật</text>

  <rect x="24" y="446" width="0" height="0"/>
</svg>
