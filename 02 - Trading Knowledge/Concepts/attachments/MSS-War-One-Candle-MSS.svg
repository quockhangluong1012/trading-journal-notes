<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">MSS "quá hoàn hảo" — một nến làm cả sweep + MSS, và không bao giờ retrace</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Nến càng lớn, FVG càng xa, xác suất được retrace về entry càng thấp. Ba lối xử lý — chase không nằm trong số đó.</text>

  <!-- chart panel -->
  <rect x="24" y="72" width="430" height="376" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- lower high level -->
  <line x1="40" y1="200" x2="440" y2="200" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="44" y="194" font-size="10.5" font-weight="700" fill="#7C3AED">Lower-High cần phá (MSS level)</text>

  <!-- SSL -->
  <line x1="40" y1="360" x2="440" y2="360" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="44" y="376" font-size="10.5" font-weight="700" fill="#DC2626">SSL (đáy bị sweep)</text>

  <!-- downtrend candles -->
  <line x1="70" y1="130" x2="70" y2="185" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="64" y="138" width="12" height="40" fill="#DC2626"/>
  <line x1="96" y1="168" x2="96" y2="228" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="90" y="175" width="12" height="45" fill="#DC2626"/>
  <line x1="122" y1="212" x2="122" y2="272" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="116" y="220" width="12" height="45" fill="#DC2626"/>
  <line x1="148" y1="255" x2="148" y2="318" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="142" y="262" width="12" height="48" fill="#DC2626"/>
  <line x1="174" y1="300" x2="174" y2="352" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="168" y="306" width="12" height="40" fill="#DC2626"/>

  <!-- ONE GIANT candle: sweep + MSS -->
  <line x1="206" y1="150" x2="206" y2="382" stroke="#16A34A" stroke-width="2"/>
  <rect x="197" y="158" width="18" height="200" fill="#16A34A"/>
  <text x="222" y="152" font-size="11" font-weight="800" fill="#15803D">1 nến = sweep + phá LH</text>

  <!-- FVG far below -->
  <rect x="220" y="316" width="200" height="26" fill="#86EFAC" opacity="0.45"/>
  <text x="300" y="333" font-size="10" font-weight="700" fill="#166534">FVG entry — quá xa</text>

  <!-- 50% displacement level -->
  <line x1="220" y1="262" x2="420" y2="262" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="300" y="256" font-size="10" font-weight="700" fill="#B45309">50% displacement leg</text>

  <!-- runaway candles -->
  <line x1="240" y1="118" x2="240" y2="172" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="234" y="124" width="12" height="42" fill="#16A34A"/>
  <line x1="266" y1="132" x2="266" y2="168" stroke="#DC2626" stroke-width="1.5"/>
  <rect x="260" y="138" width="12" height="22" fill="#DC2626"/>
  <line x1="292" y1="94" x2="292" y2="148" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="286" y="100" width="12" height="42" fill="#16A34A"/>
  <text x="252" y="88" font-size="10.5" font-weight="700" fill="#991B1B">pullback nông nhất chỉ về 25% — không bao giờ chạm FVG</text>

  <!-- options panel -->
  <rect x="468" y="72" width="270" height="376" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="482" y="98" font-size="12.5" font-weight="700" fill="#1F2937">Ba lối xử lý hợp lệ</text>

  <rect x="482" y="112" width="242" height="88" rx="6" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="494" y="132" font-size="10.5" font-weight="700" fill="#15803D">A. Chấp nhận lỡ (mặc định)</text>
  <text x="494" y="148" font-size="10" fill="#14532D">Không retrace = không có entry.</text>
  <text x="494" y="161" font-size="10" fill="#14532D">Ghi missed_valid_setup — đó là bằng</text>
  <text x="494" y="174" font-size="10" fill="#14532D">chứng mình đọc đúng, không phải</text>
  <text x="494" y="187" font-size="10" fill="#14532D">thất bại. EV của chase luôn âm hơn.</text>

  <rect x="482" y="212" width="242" height="100" rx="6" fill="#FFFBEB" stroke="#FDE68A"/>
  <text x="494" y="232" font-size="10.5" font-weight="700" fill="#B45309">B. Entry 50% displacement leg</text>
  <text x="494" y="248" font-size="10" fill="#78350F">Với displacement cực mạnh, retrace</text>
  <text x="494" y="261" font-size="10" fill="#78350F">thường chỉ về 25–50% leg, không tới</text>
  <text x="494" y="274" font-size="10" fill="#78350F">FVG sâu. Limit tại 50% leg + stop dưới</text>
  <text x="494" y="287" font-size="10" fill="#78350F">sweep low. CHỈ khi sweep Tier 1–2 và</text>
  <text x="494" y="300" font-size="10" fill="#78350F">trong kill zone (xem [[35]]).</text>

  <rect x="482" y="324" width="242" height="86" rx="6" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="494" y="344" font-size="10.5" font-weight="700" fill="#1D4ED8">C. Vào sớm bằng CISD</text>
  <text x="494" y="360" font-size="10" fill="#1E3A8A">CISD in trước MSS (đo bằng open/close</text>
  <text x="494" y="373" font-size="10" fill="#1E3A8A">chuỗi nến đẩy). Nếu chờ MSS = luôn trễ</text>
  <text x="494" y="386" font-size="10" fill="#1E3A8A">với dạng nến này → luyện CISD trigger</text>
  <text x="494" y="399" font-size="10" fill="#1E3A8A">riêng, backtest tách nhóm.</text>

  <text x="482" y="434" font-size="10" font-weight="700" fill="#DC2626">✗ Không có lựa chọn D: market order đuổi theo.</text>
</svg>
