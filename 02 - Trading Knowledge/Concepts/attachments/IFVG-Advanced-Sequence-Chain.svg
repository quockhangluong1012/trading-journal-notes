<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chuỗi Bearish IFVG — từ FVG cũ đến entry Short</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">IFVG không đứng một mình: mỗi mắt xích phải có mặt đúng thứ tự thì retest mới đáng trade.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Row 1 -->
  <rect x="30" y="80" width="200" height="60" rx="8" fill="#16A34A" opacity="0.12" stroke="#16A34A" stroke-width="1.2"/>
  <text x="130" y="106" font-size="12.5" font-weight="700" fill="#15803D" text-anchor="middle">Bullish FVG cũ</text>
  <text x="130" y="125" font-size="10.5" fill="#166534" text-anchor="middle">PD array đang là hỗ trợ</text>

  <line x1="230" y1="110" x2="290" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="292" y="80" width="200" height="60" rx="8" fill="#DC2626" opacity="0.1" stroke="#DC2626" stroke-width="1.2"/>
  <text x="392" y="106" font-size="12.5" font-weight="700" fill="#B91C1C" text-anchor="middle">Nến close xuyên xuống</text>
  <text x="392" y="125" font-size="10.5" fill="#991B1B" text-anchor="middle">violation (BODY, không phải bóng)</text>

  <line x1="492" y1="110" x2="552" y2="110" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="554" y="80" width="176" height="60" rx="8" fill="#DC2626" opacity="0.1" stroke="#DC2626" stroke-width="1.2"/>
  <text x="642" y="106" font-size="12.5" font-weight="700" fill="#B91C1C" text-anchor="middle">Displacement</text>
  <text x="642" y="125" font-size="10.5" fill="#991B1B" text-anchor="middle">+ MSS bearish</text>

  <!-- down connector -->
  <line x1="642" y1="140" x2="642" y2="175" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 2 (right to left) -->
  <rect x="554" y="177" width="176" height="60" rx="8" fill="#DC2626" opacity="0.16" stroke="#DC2626" stroke-width="1.4"/>
  <text x="642" y="203" font-size="12.5" font-weight="700" fill="#B91C1C" text-anchor="middle">Vùng đảo cực</text>
  <text x="642" y="222" font-size="10.5" fill="#991B1B" text-anchor="middle">= bearish IFVG (kháng cự)</text>

  <line x1="554" y1="207" x2="494" y2="207" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="292" y="177" width="200" height="60" rx="8" fill="#374151" opacity="0.08" stroke="#6B7280" stroke-width="1.2"/>
  <text x="392" y="203" font-size="12.5" font-weight="700" fill="#374151" text-anchor="middle">Retrace LÊN retest</text>
  <text x="392" y="222" font-size="10.5" fill="#4B5563" text-anchor="middle">giá test lại vùng IFVG</text>

  <line x1="292" y1="207" x2="232" y2="207" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="30" y="177" width="200" height="60" rx="8" fill="#DC2626" opacity="0.1" stroke="#DC2626" stroke-width="1.2"/>
  <text x="130" y="203" font-size="12.5" font-weight="700" fill="#B91C1C" text-anchor="middle">M5 bearish MSS</text>
  <text x="130" y="222" font-size="10.5" fill="#991B1B" text-anchor="middle">confirm tại retest</text>

  <!-- down connector left -->
  <line x1="130" y1="237" x2="130" y2="272" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Row 3 -->
  <rect x="30" y="274" width="200" height="60" rx="8" fill="#DC2626" opacity="0.18" stroke="#DC2626" stroke-width="1.6"/>
  <text x="130" y="300" font-size="13" font-weight="700" fill="#B91C1C" text-anchor="middle">Entry SHORT</text>
  <text x="130" y="319" font-size="10.5" fill="#991B1B" text-anchor="middle">stop trên high IFVG</text>

  <line x1="230" y1="304" x2="290" y2="304" stroke="#6B7280" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="292" y="274" width="200" height="60" rx="8" fill="#DC2626" opacity="0.12" stroke="#DC2626" stroke-width="1.2"/>
  <text x="392" y="300" font-size="13" font-weight="700" fill="#B91C1C" text-anchor="middle">Target: SSL</text>
  <text x="392" y="319" font-size="10.5" fill="#991B1B" text-anchor="middle">thanh khoản phía dưới</text>

  <rect x="24" y="356" width="712" height="52" rx="6" fill="#FEF3C7"/>
  <text x="36" y="376" font-size="11.5" font-weight="700" fill="#92400E">Invalid: giá đóng nến LÊN lại trên IFVG (lấy lại gap) → đảo cực bị phủ nhận → bỏ setup.</text>
  <text x="36" y="396" font-size="11" fill="#92400E">Bullish IFVG là chuỗi đối xứng: bearish FVG fail → close xuyên lên → MSS bullish → retrace xuống retest → Long → target BSL.</text>
</svg>
