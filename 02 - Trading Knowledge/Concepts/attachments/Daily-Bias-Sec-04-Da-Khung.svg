<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="dba" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6B7280"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Quy trình phân tích đa khung thời gian</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">4 câu hỏi: Long/Short/Neutral? • Giá bị hút về đâu? • Vào từ POI nào? • Điều gì chứng minh tôi sai?</text>

  <!-- D1/H4 -->
  <rect x="24" y="72" width="712" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="24" y="72" width="6" height="112" fill="#1D4ED8"/>
  <text x="44" y="98" font-size="14" font-weight="700" fill="#1D4ED8">D1 / H4 — Bias &amp; Narrative</text>
  <text x="44" y="122" font-size="12" fill="#374151">• Bias: Bullish / Bearish / Neutral</text>
  <text x="44" y="142" font-size="12" fill="#374151">• HTF dealing range + vị trí Premium/Discount</text>
  <text x="44" y="162" font-size="12" fill="#374151">• Draw on liquidity: ghi tên level (PDH/PDL/BSL/SSL)</text>
  <text x="410" y="122" font-size="12" fill="#374151">• POI HTF: FVG / OB / breaker còn hiệu lực</text>
  <text x="410" y="142" font-size="12" fill="#374151">• Narrative: delivery từ ___ về ___ vì ___;</text>
  <text x="410" y="162" font-size="12" fill="#374151">   invalid nếu ___</text>
  <line x1="380" y1="188" x2="380" y2="202" stroke="#6B7280" stroke-width="1.5" marker-end="url(#dba)"/>

  <!-- H1/M15 -->
  <rect x="84" y="208" width="592" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="84" y="208" width="6" height="112" fill="#D97706"/>
  <text x="104" y="234" font-size="14" font-weight="700" fill="#D97706">H1 / M15 — POI &amp; Context</text>
  <text x="104" y="258" font-size="12" fill="#374151">• POI cụ thể + lý do hợp lệ (displacement, P/D)</text>
  <text x="104" y="278" font-size="12" fill="#374151">• Đã sweep liquidity chưa? chất lượng reclaim?</text>
  <text x="104" y="298" font-size="12" fill="#374151">• Pullback vs reversal: H1 ngược D1 chỉ là</text>
  <text x="410" y="258" font-size="12" fill="#374151">   pullback nếu đang vào POI HTF</text>
  <text x="410" y="278" font-size="12" fill="#374151">• Không đổi bias vì vài nến H1 ngược hướng</text>
  <line x1="380" y1="324" x2="380" y2="338" stroke="#6B7280" stroke-width="1.5" marker-end="url(#dba)"/>

  <!-- M5/M1 -->
  <rect x="144" y="344" width="472" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="144" y="344" width="6" height="112" fill="#16A34A"/>
  <text x="164" y="370" font-size="14" font-weight="700" fill="#16A34A">M5 / M1 — Confirmation &amp; Entry</text>
  <text x="164" y="394" font-size="12" fill="#374151">• MSS phá swing bảo vệ, nằm TRONG POI</text>
  <text x="164" y="414" font-size="12" fill="#374151">• Displacement dứt khoát để lại FVG</text>
  <text x="164" y="434" font-size="12" fill="#374151">• Entry FVG/OB • Stop sau sweep • TP = liquidity</text>

  <text x="44" y="484" font-size="12" font-weight="600" fill="#D97706">M5/M1 KHÔNG tạo Daily Bias — chỉ execution sau khi HTF narrative + POI + liquidity event đã đúng.</text>
  <text x="44" y="502" font-size="11" fill="#6B7280">Đi từ trên xuống: HTF ra quyết định hướng, LTF ra quyết định thời điểm.</text>
</svg>
