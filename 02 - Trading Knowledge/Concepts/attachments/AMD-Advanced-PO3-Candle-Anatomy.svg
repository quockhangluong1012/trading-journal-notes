<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu một nến Daily Bullish theo PO3 — nến lớn "che giấu" 3 pha</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng một dữ liệu: bên trái là nến D1 bạn thấy; bên phải là câu chuyện intraday thật sự bên trong nó.</text>

  <!-- Left: the daily candle -->
  <rect x="24" y="70" width="200" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="94" font-size="13" font-weight="700" fill="#1F2937">Nến D1 (kết quả)</text>
  <!-- candle: open 300, low 390 (wick), close 130, high 115 -->
  <rect x="122" y="115" width="3" height="280" fill="#16A34A"/>
  <rect x="106" y="130" width="36" height="170" fill="#16A34A" rx="2"/>
  <line x1="70" y1="300" x2="180" y2="300" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="38" y="316" font-size="10.5" fill="#6B7280">Open</text>
  <text x="150" y="404" font-size="10.5" fill="#DC2626">Low = đáy Judas</text>
  <text x="148" y="128" font-size="10.5" fill="#16A34A">Close gần High</text>
  <text x="38" y="430" font-size="10.5" fill="#6B7280">Wick dưới dài = dấu vân tay</text>
  <text x="38" y="444" font-size="10.5" fill="#6B7280">của manipulation</text>

  <!-- Right: intraday path -->
  <rect x="240" y="70" width="496" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="254" y="94" font-size="13" font-weight="700" fill="#1F2937">Đường đi intraday bên trong nến đó</text>

  <!-- open reference line -->
  <line x1="260" y1="300" x2="720" y2="300" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="262" y="294" font-size="10.5" fill="#6B7280">Daily Open (00:00 / midnight NY)</text>

  <!-- Accumulation zone -->
  <rect x="280" y="282" width="130" height="40" fill="#9CA3AF" opacity="0.15"/>
  <path d="M285,302 L300,295 L315,308 L330,297 L345,306 L360,298 L375,305 L400,300" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="292" y="340" font-size="11.5" font-weight="700" fill="#4B5563">A — Tích lũy</text>
  <text x="292" y="355" font-size="10" fill="#6B7280">range hẹp quanh open</text>

  <!-- Manipulation leg down -->
  <path d="M400,300 L430,340 L445,330 L465,390" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <circle cx="465" cy="390" r="9" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <text x="418" y="418" font-size="11.5" font-weight="700" fill="#DC2626">M — Judas swing</text>
  <text x="418" y="433" font-size="10" fill="#B91C1C">sweep SSL dưới range/open</text>
  <line x1="420" y1="392" x2="510" y2="392" stroke="#F59E0B" stroke-width="3" stroke-dasharray="5 3"/>

  <!-- Distribution leg up -->
  <path d="M465,390 L490,320 L505,338 L540,240 L560,262 L600,170 L618,190 L660,130" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <text x="560" y="120" font-size="11.5" font-weight="700" fill="#15803D">D — Phân phối (move thật)</text>
  <text x="560" y="135" font-size="10" fill="#166534">expansion về BSL, đóng gần đỉnh</text>
  <!-- reclaim marker -->
  <circle cx="490" cy="320" r="5" fill="#0EA5E9"/>
  <text x="500" y="316" font-size="10" fill="#0284C7">reclaim + MSS</text>
  <!-- entry marker -->
  <circle cx="505" cy="338" r="5" fill="#16A34A"/>
  <text x="515" y="345" font-size="10" font-weight="700" fill="#15803D">entry (FVG phân phối)</text>

  <!-- session ticks -->
  <line x1="280" y1="440" x2="720" y2="440" stroke="#D1D5DB" stroke-width="1"/>
  <text x="300" y="434" font-size="10" fill="#9CA3AF">Asia</text>
  <text x="430" y="434" font-size="10" fill="#9CA3AF">London</text>
  <text x="580" y="434" font-size="10" fill="#9CA3AF">New York</text>
</svg>
