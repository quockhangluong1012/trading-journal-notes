<svg viewBox="0 0 760 490" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="490" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Bearish IFVG — từ bullish FVG fail đến entry Short, đúng thứ tự</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Điều kiện sống còn: BODY CLOSE xuyên qua FVG (không phải bóng) → FVG đảo cực thành kháng cự.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- old bullish FVG becomes IFVG resistance -->
  <rect x="250" y="150" width="470" height="30" fill="#16A34A" opacity="0.14"/>
  <text x="258" y="145" font-size="10.5" fill="#15803D">① Bullish FVG hình thành trong nhịp tăng (BISI)</text>

  <!-- up leg forming the FVG -->
  <path d="M60,340 L100,300 L130,320 L175,240 L210,265 L255,165" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="60" y="360" font-size="10.5" fill="#6B7280">Nhịp tăng tạo bullish FVG</text>

  <!-- bearish candle body closing DOWN through the FVG -->
  <path d="M255,165 L290,200 L310,215 L340,300" fill="none" stroke="#DC2626" stroke-width="2.8"/>
  <rect x="333" y="150" width="2" height="185" fill="#DC2626"/>
  <rect x="326" y="160" width="16" height="150" fill="#DC2626" rx="1"/>
  <text x="352" y="200" font-size="10.5" font-weight="700" fill="#B91C1C">② Nến giảm ĐÓNG BODY xuyên</text>
  <text x="352" y="215" font-size="10.5" fill="#B91C1C">thẳng xuống qua FVG (violation)</text>
  <text x="352" y="230" font-size="10.5" fill="#B91C1C">+ displacement + MSS bearish</text>

  <!-- MSS marker: break of a protected low -->
  <line x1="175" y1="240" x2="500" y2="240" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="430" y="253" font-size="9.5" fill="#B91C1C">MSS: phá HL gần nhất</text>

  <!-- acceptance below -->
  <path d="M340,300 L370,340 L400,315 L430,355" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="360" y="378" font-size="10.5" font-weight="700" fill="#374151">③ Giá GIỮ phía dưới (acceptance)</text>

  <!-- polarity flip label -->
  <text x="480" y="145" font-size="10.5" font-weight="700" fill="#B91C1C">④ Vùng FVG cũ đảo cực → KHÁNG CỰ (bearish IFVG)</text>

  <!-- retrace up to retest IFVG then reject -->
  <path d="M430,355 L470,310 L500,325 L540,175 L560,168" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="548" cy="168" r="6.5" fill="#DC2626"/>
  <text x="558" y="150" font-size="10.5" font-weight="700" fill="#B91C1C">⑤ Retrace LÊN retest → reject → Short</text>
  <text x="558" y="288" font-size="10.5" fill="#6B7280">stop trên high IFVG</text>
  <line x1="548" y1="150" x2="640" y2="150" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="6 4"/>

  <!-- reject down to target -->
  <path d="M548,168 L580,230 L610,215 L650,320 L690,360" fill="none" stroke="#DC2626" stroke-width="2.4"/>

  <!-- target SSL -->
  <line x1="600" y1="368" x2="716" y2="368" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="600" y="386" font-size="10.5" fill="#B91C1C">⑥ Target: SSL phía dưới</text>

  <!-- symmetric bullish IFVG amber box -->
  <rect x="24" y="410" width="712" height="70" rx="6" fill="#FEF3C7"/>
  <text x="36" y="432" font-size="12" font-weight="700" fill="#92400E">Bullish IFVG đối xứng (bearish FVG fail):</text>
  <text x="36" y="452" font-size="11.5" fill="#92400E">Bearish FVG (SIBI) bị nến tăng ĐÓNG BODY xuyên LÊN qua + MSS bullish → vùng cũ đảo cực thành HỖ TRỢ.</text>
  <text x="36" y="470" font-size="11.5" fill="#92400E">Giá retrace XUỐNG retest → bật lên → Long; stop dưới low IFVG; target BSL phía trên.</text>
</svg>
