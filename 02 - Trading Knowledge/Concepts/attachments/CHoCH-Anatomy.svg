<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Bearish CHoCH — body close vs wick-only</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Uptrend HH/HL → high cuối + sweep BSL → body close dưới protected higher-low + displacement + bearish FVG.</text>

  <rect x="24" y="70" width="712" height="288" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- premium POI -->
  <rect x="44" y="88" width="672" height="66" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="104" font-size="10.5" fill="#1D4ED8">HTF POI (bearish FVG) + premium của dealing range</text>

  <!-- uptrend HH/HL -->
  <path d="M60,320 L110,235 L145,275 L200,175 L240,220 L295,120" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="66" y="338" font-size="10.5" fill="#6B7280">① Chuỗi HH/HL (uptrend)</text>
  <!-- protected higher-low -->
  <circle cx="240" cy="220" r="6" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <text x="150" y="213" font-size="10.5" font-weight="700" fill="#15803D">③ Protected higher-low — mốc CHoCH</text>
  <line x1="240" y1="220" x2="470" y2="220" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <!-- sweep BSL at final high -->
  <circle cx="295" cy="120" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <line x1="230" y1="112" x2="360" y2="112" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="5 3"/>
  <text x="270" y="106" font-size="10.5" font-weight="700" fill="#B45309">② High cuối + sweep BSL</text>
  <!-- displacement leg down body close -->
  <path d="M295,120 L340,185 L360,168 L430,300" fill="none" stroke="#DC2626" stroke-width="2.8"/>
  <rect x="434" y="220" width="2" height="85" fill="#DC2626"/><rect x="428" y="228" width="13" height="68" fill="#DC2626" rx="1"/>
  <text x="448" y="238" font-size="10.5" font-weight="700" fill="#B91C1C">④ CHoCH: BODY CLOSE dưới protected low</text>
  <text x="448" y="253" font-size="10.5" fill="#B91C1C">+ displacement = tín hiệu thật</text>
  <!-- bearish FVG -->
  <rect x="365" y="190" width="115" height="24" fill="#DC2626" opacity="0.15"/>
  <text x="486" y="206" font-size="10.5" fill="#B91C1C">④ Để lại bearish FVG = POI Short</text>
  <!-- retrace + entry + BOS -->
  <path d="M430,300 L465,255 L488,218 L508,245 L555,310 L600,275 L665,345" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="488" cy="218" r="6" fill="#DC2626"/>
  <text x="500" y="290" font-size="10.5" font-weight="700" fill="#B91C1C">⑤ Retrace vào FVG → Short</text>
  <line x1="600" y1="345" x2="716" y2="345" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="588" y="337" font-size="10.5" fill="#B91C1C">⑥ BOS hướng xuống xác nhận flip</text>

  <!-- wick-only comparison marker -->
  <line x1="240" y1="220" x2="240" y2="255" stroke="#9CA3AF" stroke-width="3"/>
  <text x="150" y="275" font-size="9.5" fill="#9CA3AF">so sánh: nếu chỉ WICK chọc rồi đóng lại trên low → sweep, KHÔNG phải CHoCH</text>

  <rect x="24" y="366" width="712" height="42" rx="6" fill="#FEF3C7"/>
  <text x="36" y="386" font-size="11.5" font-weight="700" fill="#92400E">Điểm mấu chốt: BODY CLOSE qua protected swing (CHoCH thật) khác hẳn WICK-ONLY chọc rồi reclaim (sweep/inducement).</text>
  <text x="36" y="403" font-size="11.5" font-weight="700" fill="#92400E">CHoCH chỉ CẢNH BÁO; chờ BOS hướng mới ("đèn xanh") để xác nhận order flow đã thực sự flip.</text>
</svg>
