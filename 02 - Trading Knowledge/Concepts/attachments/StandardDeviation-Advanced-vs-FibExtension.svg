<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">SD Projection (ICT) vs Fibonacci Extension truyền thống</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Hai ladder trên cùng một nhịp giá — khác nhau ở đoạn được chọn làm anchor</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- shared price path: manipulation leg (early) -> recent swing leg (later) -->
  <path d="M55,140 L100,170 L140,300 L190,260 L230,330 L280,200 L330,340 L380,120"
        fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- manipulation / Judas leg (earlier, for ICT SD) -->
  <circle cx="100" cy="170" r="6" fill="#3B82F6"/>
  <circle cx="140" cy="300" r="7" fill="none" stroke="#DC2626" stroke-width="2.4"/>
  <text x="55" y="158" font-size="9.5" font-weight="700" fill="#1D4ED8">① Manipulation leg (Judas — "lie")</text>
  <line x1="150" y1="170" x2="150" y2="300" stroke="#3B82F6" stroke-width="1.4"/>

  <!-- recent visible swing leg (later, for classic fib ext) -->
  <circle cx="230" cy="330" r="6" fill="#16A34A"/>
  <circle cx="280" cy="200" r="6" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <text x="200" y="348" font-size="9.5" font-weight="700" fill="#15803D">② Nhịp swing gần nhất (fib cổ điển)</text>
  <line x1="290" y1="200" x2="290" y2="330" stroke="#16A34A" stroke-width="1.4"/>

  <!-- continuing price into projection zone -->
  <path d="M380,120 L430,220 L480,110 L540,190 L600,90 L660,150 L710,70" fill="none" stroke="#374151" stroke-width="2" stroke-dasharray="none" opacity="0.85"/>

  <!-- ICT SD ladder (blue, from manipulation leg, wider swings) -->
  <line x1="330" y1="230" x2="716" y2="230" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="705" y="226" font-size="9.5" fill="#1D4ED8" text-anchor="end">ICT -1 SD</text>
  <line x1="330" y1="90" x2="716" y2="90" stroke="#3B82F6" stroke-width="1.7" stroke-dasharray="6 4"/>
  <text x="705" y="86" font-size="9.5" font-weight="700" fill="#1D4ED8" text-anchor="end">ICT -2 SD (anchor = manipulation leg)</text>

  <!-- classic fib extension ladder (green, from recent swing leg, narrower swings) -->
  <line x1="330" y1="150" x2="716" y2="150" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="2 3"/>
  <text x="705" y="146" font-size="9.5" fill="#15803D" text-anchor="end">Fib 1.0 ext</text>
  <line x1="330" y1="92" x2="716" y2="92" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="2 3"/>
  <text x="705" y="66" font-size="9.5" font-weight="700" fill="#15803D" text-anchor="end">Fib 1.618 ext (anchor = nhịp gần nhất)</text>

  <!-- confluence zone where both nearly align -->
  <rect x="580" y="84" width="130" height="16" fill="#F59E0B" opacity="0.3"/>
  <text x="586" y="118" font-size="10" font-weight="700" fill="#B45309">③ Vùng hai ladder gần trùng = confluence cực mạnh</text>

  <rect x="24" y="410" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Cơ chế đo giống nhau (bội số của một leg tham chiếu) nhưng LEG được chọn khác nhau: fib cổ</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">điển thường lấy nhịp swing gần nhất, còn ICT SD cố ý neo vào manipulation/Judas leg vì ý</text>
  <text x="36" y="466" font-size="11.5" font-weight="700" fill="#92400E">nghĩa liquidity engineering. Nơi hai ladder trùng nhau là vùng confluence đáng tin nhất.</text>
</svg>
