<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CISD vs MSS — hai thước đo, một cú đảo chiều</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng một chuỗi nến bullish reversal sau sweep: CISD đo bằng OPEN của chuỗi nến đẩy; MSS đo bằng SWING HIGH. CISD in sớm hơn.</text>

  <rect x="24" y="70" width="470" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Down-close candle series (bearish push) then reversal -->
  <!-- bearish candles -->
  <rect x="70" y="120" width="2" height="70" fill="#DC2626"/><rect x="63" y="128" width="15" height="52" fill="#DC2626" rx="1"/>
  <rect x="100" y="150" width="2" height="80" fill="#DC2626"/><rect x="93" y="158" width="15" height="62" fill="#DC2626" rx="1"/>
  <rect x="130" y="195" width="2" height="85" fill="#DC2626"/><rect x="123" y="202" width="15" height="66" fill="#DC2626" rx="1"/>
  <rect x="160" y="245" width="2" height="95" fill="#DC2626"/><rect x="153" y="252" width="15" height="74" fill="#DC2626" rx="1"/>
  <text x="60" y="110" font-size="10.5" fill="#B91C1C">chuỗi nến đẩy giảm (bearish delivery)</text>

  <!-- CISD line: open of first candle of the push series -->
  <line x1="63" y1="128" x2="360" y2="128" stroke="#0EA5E9" stroke-width="1.8" stroke-dasharray="7 4"/>
  <text x="240" y="120" font-size="11" font-weight="700" fill="#0284C7">CISD level = OPEN của chuỗi nến đẩy</text>

  <!-- swing high (LH) line -->
  <line x1="93" y1="150" x2="420" y2="150" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="280" y="144" font-size="11" font-weight="700" fill="#B91C1C">MSS level = lower-high gần nhất (swing)</text>

  <!-- sweep low -->
  <rect x="190" y="300" width="2" height="90" fill="#16A34A"/><rect x="183" y="330" width="15" height="40" fill="#16A34A" rx="1"/>
  <circle cx="191" cy="382" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="130" y="410" font-size="10.5" font-weight="700" fill="#B45309">sweep SSL + reject</text>

  <!-- reversal candles up -->
  <rect x="220" y="240" width="2" height="105" fill="#16A34A"/><rect x="213" y="250" width="15" height="85" fill="#16A34A" rx="1"/>
  <!-- candle closing above CISD level (early trigger) -->
  <rect x="250" y="112" width="2" height="145" fill="#16A34A"/><rect x="243" y="120" width="15" height="128" fill="#16A34A" rx="1"/>
  <circle cx="251" cy="124" r="7" fill="#0EA5E9"/>
  <text x="264" y="106" font-size="10.5" font-weight="700" fill="#0284C7">① CISD in ra TRƯỚC: đóng qua open chuỗi đẩy</text>

  <!-- candle closing above MSS level (later confirm) -->
  <rect x="280" y="95" width="2" height="90" fill="#16A34A"/><rect x="273" y="102" width="15" height="70" fill="#16A34A" rx="1"/>
  <circle cx="281" cy="146" r="7" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <text x="296" y="170" font-size="10.5" font-weight="700" fill="#B91C1C">② MSS xác nhận SAU: body qua swing high</text>

  <text x="40" y="440" font-size="10.5" fill="#6B7280">Trục thời gian → CISD luôn có cơ hội in trước vì open của chuỗi đẩy nằm THẤP hơn (gần hơn) so với swing high.</text>

  <!-- Right compare panel -->
  <rect x="510" y="70" width="226" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="524" y="96" font-size="13" font-weight="700" fill="#1F2937">Cách phối hợp</text>

  <rect x="524" y="110" width="198" height="86" rx="6" fill="#E0F2FE"/>
  <text x="534" y="130" font-size="11.5" font-weight="700" fill="#0284C7">CISD = trigger SỚM</text>
  <text x="534" y="148" font-size="10.5" fill="#374151">Nhạy, entry giá tốt hơn;</text>
  <text x="534" y="163" font-size="10.5" fill="#374151">rủi ro false signal nếu</text>
  <text x="534" y="178" font-size="10.5" fill="#374151">thiếu sweep + POI đi kèm.</text>

  <rect x="524" y="206" width="198" height="86" rx="6" fill="#FEE2E2"/>
  <text x="534" y="226" font-size="11.5" font-weight="700" fill="#B91C1C">MSS = xác nhận CHẮC</text>
  <text x="534" y="244" font-size="10.5" fill="#374151">Cấu trúc thật sự đảo;</text>
  <text x="534" y="259" font-size="10.5" fill="#374151">vào muộn hơn, giá kém</text>
  <text x="534" y="274" font-size="10.5" fill="#374151">hơn nhưng ít nhiễu hơn.</text>

  <rect x="524" y="302" width="198" height="112" rx="6" fill="#DCFCE7"/>
  <text x="534" y="322" font-size="11.5" font-weight="700" fill="#166534">Setup xác suất cao nhất</text>
  <text x="534" y="340" font-size="10.5" fill="#374151">Sweep pool Tier 1–2</text>
  <text x="534" y="355" font-size="10.5" fill="#374151">→ CISD in sớm ngay sau</text>
  <text x="534" y="370" font-size="10.5" fill="#374151">→ MSS body close xác nhận</text>
  <text x="534" y="385" font-size="10.5" fill="#374151">→ entry FVG displacement</text>
  <text x="534" y="404" font-size="10.5" font-weight="700" fill="#166534">Tín hiệu sớm + chắc đồng thuận.</text>
</svg>
