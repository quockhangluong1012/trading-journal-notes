<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vị trí của MSS trong chuỗi ICT 2022 — cây cầu, không phải điểm khởi đầu</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Mỗi mắt xích chỉ có nghĩa khi mắt xích TRƯỚC nó đã xảy ra. Bỏ bước nào trước MSS thì MSS mất giá trị.</text>

  <!-- chain boxes -->
  <rect x="36" y="90" width="120" height="64" rx="8" fill="#EDE9FE" stroke="#C4B5FD"/>
  <text x="60" y="116" font-size="12" font-weight="700" fill="#5B21B6">HTF Bias</text>
  <text x="48" y="136" font-size="9.5" fill="#4B5563">D1/H4: hướng + draw</text>
  <text x="48" y="148" font-size="9.5" fill="#4B5563">on liquidity</text>

  <text x="162" y="128" font-size="15" fill="#9CA3AF">→</text>

  <rect x="180" y="90" width="120" height="64" rx="8" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="206" y="116" font-size="12" font-weight="700" fill="#1E40AF">HTF POI</text>
  <text x="192" y="136" font-size="9.5" fill="#4B5563">FVG/OB/Breaker tại</text>
  <text x="192" y="148" font-size="9.5" fill="#4B5563">premium/discount đúng</text>

  <text x="306" y="128" font-size="15" fill="#9CA3AF">→</text>

  <rect x="324" y="90" width="120" height="64" rx="8" fill="#FEF3C7" stroke="#FDE68A"/>
  <text x="340" y="116" font-size="12" font-weight="700" fill="#92400E">Liquidity Sweep</text>
  <text x="336" y="136" font-size="9.5" fill="#4B5563">quét SSL/BSL + reject</text>
  <text x="336" y="148" font-size="9.5" fill="#4B5563">(pool càng "nặng" càng tốt)</text>

  <text x="450" y="128" font-size="15" fill="#9CA3AF">→</text>

  <rect x="468" y="82" width="128" height="80" rx="10" fill="#DC2626" opacity="0.9"/>
  <text x="500" y="112" font-size="14" font-weight="800" fill="#FFFFFF">MSS</text>
  <text x="480" y="132" font-size="9.5" fill="#FEE2E2">body close phá ngược leg</text>
  <text x="480" y="145" font-size="9.5" fill="#FEE2E2">+ displacement (LTF)</text>

  <text x="602" y="128" font-size="15" fill="#9CA3AF">→</text>

  <rect x="618" y="90" width="118" height="64" rx="8" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="638" y="116" font-size="12" font-weight="700" fill="#166534">FVG/OB Entry</text>
  <text x="630" y="136" font-size="9.5" fill="#4B5563">retrace vào displacement</text>
  <text x="630" y="148" font-size="9.5" fill="#4B5563">leg; stop sau swept point</text>

  <!-- Gate questions below -->
  <text x="24" y="196" font-size="13.5" font-weight="700" fill="#1F2937">Ba "cổng kiểm tra" một MSS phải đi qua (thiếu 1 = không trade):</text>

  <rect x="36" y="212" width="220" height="120" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="50" y="236" font-size="12.5" font-weight="700" fill="#B45309">Cổng 1 — SWEEP TRƯỚC?</text>
  <text x="50" y="256" font-size="10.5" fill="#374151">Đáy/đỉnh đã bị quét + reject</text>
  <text x="50" y="271" font-size="10.5" fill="#374151">TRƯỚC cú phá chưa?</text>
  <text x="50" y="292" font-size="10.5" fill="#B91C1C">Chưa → có thể là BOS/bẫy;</text>
  <text x="50" y="307" font-size="10.5" fill="#B91C1C">stop của bạn chính là mồi kế tiếp.</text>

  <rect x="270" y="212" width="220" height="120" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="284" y="236" font-size="12.5" font-weight="700" fill="#1E40AF">Cổng 2 — TẠI POI?</text>
  <text x="284" y="256" font-size="10.5" fill="#374151">Sự kiện xảy ra tại/ngay sau</text>
  <text x="284" y="271" font-size="10.5" fill="#374151">HTF POI, đúng phía P/D?</text>
  <text x="284" y="292" font-size="10.5" fill="#B91C1C">Giữa range → chỉ là internal</text>
  <text x="284" y="307" font-size="10.5" fill="#B91C1C">repricing, không phải shift thật.</text>

  <rect x="504" y="212" width="220" height="120" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="518" y="236" font-size="12.5" font-weight="700" fill="#166534">Cổng 3 — DISPLACEMENT?</text>
  <text x="518" y="256" font-size="10.5" fill="#374151">Body close quyết đoán, để lại</text>
  <text x="518" y="271" font-size="10.5" fill="#374151">FVG/imbalance rõ?</text>
  <text x="518" y="292" font-size="10.5" fill="#B91C1C">Wick yếu, không FVG → order</text>
  <text x="518" y="307" font-size="10.5" fill="#B91C1C">flow chưa đảo; failed shift chờ sẵn.</text>

  <rect x="24" y="352" width="712" height="28" rx="6" fill="#EDE9FE"/>
  <text x="36" y="371" font-size="11.5" font-weight="700" fill="#5B21B6">Ghi nhớ: MSS là CÂU TRẢ LỜI cho câu hỏi "sau sweep tại POI, order flow đã đảo chưa?" — không phải lý do độc lập để vào lệnh.</text>
</svg>
