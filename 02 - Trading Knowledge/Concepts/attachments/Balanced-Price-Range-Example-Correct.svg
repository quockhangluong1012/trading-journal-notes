<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Balanced Price Range (BPR) — vùng chồng FVG</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Giá xuống để lại SIBI, đảo lên để lại BISI; phần CHỒNG nhau = BPR (POI mạnh).</text>

  <!-- Down leg leaving bearish FVG (SIBI) -->
  <rect x="80" y="110" width="2" height="40" fill="#DC2626"/><rect x="74" y="115" width="14" height="28" fill="#DC2626" rx="1"/>
  <rect x="106" y="120" width="2" height="120" fill="#DC2626"/><rect x="100" y="130" width="14" height="95" fill="#DC2626" rx="1"/>
  <rect x="132" y="215" width="2" height="55" fill="#DC2626"/><rect x="126" y="220" width="14" height="40" fill="#DC2626" rx="1"/>

  <!-- bearish FVG zone: gap between low of candle1 (y=150) and high of candle3 (y=215) -->
  <rect x="70" y="150" width="240" height="65" fill="#EF4444" opacity="0.12"/>
  <text x="200" y="143" font-size="12" fill="#DC2626">SIBI (bearish FVG)</text>

  <!-- Reaction low then reversal up leaving bullish FVG (BISI) -->
  <rect x="158" y="240" width="2" height="60" fill="#DC2626"/><rect x="152" y="245" width="14" height="42" fill="#DC2626" rx="1"/>
  <rect x="184" y="250" width="2" height="55" fill="#16A34A"/><rect x="178" y="255" width="14" height="40" fill="#16A34A" rx="1"/>
  <!-- displacement up candle (leaves BISI) -->
  <rect x="210" y="135" width="2" height="125" fill="#16A34A"/><rect x="204" y="140" width="14" height="100" fill="#16A34A" rx="1"/>
  <rect x="236" y="120" width="2" height="60" fill="#16A34A"/><rect x="230" y="125" width="14" height="45" fill="#16A34A" rx="1"/>

  <!-- bullish FVG zone: gap between high of candle1 (y=155 approx) and low of candle3 (y=180) -->
  <rect x="148" y="170" width="160" height="55" fill="#3B82F6" opacity="0.14"/>
  <text x="148" y="245" font-size="12" fill="#2563EB">BISI (bullish FVG)</text>

  <!-- Overlap = BPR (intersection of the two zones) -->
  <rect x="148" y="170" width="160" height="45" fill="#7C3AED" opacity="0.30" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="320" y="195" font-size="13" font-weight="700" fill="#7C3AED">BPR = vùng chồng (overlap)</text>

  <!-- price returns and reacts sharply at BPR -->
  <rect x="430" y="130" width="2" height="55" fill="#16A34A"/><rect x="424" y="135" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="456" y="150" width="2" height="55" fill="#DC2626"/><rect x="450" y="155" width="14" height="38" fill="#DC2626" rx="1"/>
  <!-- retrace down into BPR -->
  <rect x="482" y="175" width="2" height="40" fill="#DC2626"/><rect x="476" y="180" width="14" height="28" fill="#DC2626" rx="1"/>
  <!-- sharp rejection up off BPR -->
  <rect x="508" y="170" width="2" height="55" fill="#16A34A"/><rect x="502" y="175" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="534" y="120" width="2" height="90" fill="#16A34A"/><rect x="528" y="125" width="14" height="70" fill="#16A34A" rx="1"/>
  <rect x="560" y="90" width="2" height="60" fill="#16A34A"/><rect x="554" y="95" width="14" height="45" fill="#16A34A" rx="1"/>

  <!-- entry + arrow -->
  <circle cx="489" cy="208" r="5" fill="#16A34A"/>
  <text x="498" y="225" font-size="12" font-weight="600" fill="#16A34A">Entry tại BPR</text>
  <path d="M540 130 l 18 -10 l -2 11 z" fill="#16A34A"/>
  <text x="560" y="125" font-size="12" fill="#16A34A">Phản ứng mạnh → đi tiếp</text>

  <text x="24" y="440" font-size="15" font-weight="700" fill="#16A34A">✓ Đúng</text>
  <text x="80" y="440" font-size="12" fill="#374151">— hai FVG ngược chiều chồng nhau tạo BPR; giá quay lại reject sắc bén, dùng làm POI vào lệnh.</text>
</svg>
