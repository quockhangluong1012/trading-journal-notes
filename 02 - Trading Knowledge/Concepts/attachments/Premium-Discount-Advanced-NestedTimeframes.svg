<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Premium/Discount lồng nhau đa khung — khi H4 và M15 mâu thuẫn</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Một điểm giá có thể ở Premium của H4 nhưng Discount của M15 (range con nội bộ) — HTF quyết định hướng, LTF chỉ tinh chỉnh entry.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Large H4 range -->
  <text x="40" y="92" font-size="12" font-weight="700" fill="#1F2937">H4 Dealing Range (khung quyết định BIAS + POI)</text>
  <rect x="40" y="100" width="330" height="220" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.4"/>

  <!-- H4 premium (upper) / discount (lower) -->
  <rect x="40" y="100" width="330" height="110" fill="#DC2626" opacity="0.07"/>
  <text x="48" y="116" font-size="10.5" font-weight="700" fill="#B91C1C">H4 Premium</text>
  <rect x="40" y="210" width="330" height="110" fill="#16A34A" opacity="0.07"/>
  <text x="48" y="316" font-size="10.5" font-weight="700" fill="#166534">H4 Discount</text>
  <line x1="40" y1="210" x2="370" y2="210" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="376" y="206" font-size="9.5" fill="#1D4ED8">H4 EQ 50%</text>

  <!-- price sits at ~35% of H4 range (in H4 discount, lower-mid) -->
  <circle cx="330" cy="245" r="7" fill="#1F2937"/>
  <text x="230" y="240" font-size="10" font-weight="700" fill="#1F2937">Giá hiện tại</text>

  <!-- dashed callout box showing the internal M15 range zoomed -->
  <rect x="300" y="220" width="55" height="50" fill="none" stroke="#F59E0B" stroke-width="1.6" stroke-dasharray="4 3"/>
  <line x1="355" y1="220" x2="430" y2="100" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="355" y1="270" x2="430" y2="320" stroke="#F59E0B" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- Zoomed inset: M15 nested range -->
  <text x="430" y="92" font-size="12" font-weight="700" fill="#1F2937">Zoom: M15 Range nội bộ (nằm trong H4 discount)</text>
  <rect x="430" y="100" width="270" height="220" fill="#FFFDF5" stroke="#F59E0B" stroke-width="1.6"/>

  <rect x="430" y="100" width="270" height="95" fill="#DC2626" opacity="0.09"/>
  <text x="438" y="116" font-size="10.5" font-weight="700" fill="#B91C1C">M15 Premium</text>
  <rect x="430" y="195" width="270" height="125" fill="#16A34A" opacity="0.09"/>
  <text x="438" y="222" font-size="10.5" font-weight="700" fill="#166534">M15 Discount</text>
  <line x1="430" y1="195" x2="700" y2="195" stroke="#3B82F6" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="638" y="191" font-size="9.5" fill="#1D4ED8">M15 EQ</text>

  <!-- same price point but sits in M15 premium (upper zone) -->
  <circle cx="560" cy="150" r="7" fill="#1F2937"/>
  <text x="470" y="140" font-size="10" font-weight="700" fill="#1F2937">Giá hiện tại (trùng điểm bên trái)</text>
  <text x="470" y="165" font-size="10.5" font-weight="700" fill="#B91C1C">→ Nằm ở M15 Premium!</text>

  <!-- conflict banner -->
  <rect x="40" y="335" width="660" height="42" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="52" y="352" font-size="11.5" font-weight="700" fill="#991B1B">MÂU THUẪN: cùng một điểm giá = Discount trên H4, nhưng = Premium trên M15 (range con nội bộ nhỏ hơn)</text>
  <text x="52" y="368" font-size="10.5" fill="#991B1B">Đây KHÔNG phải lỗi vẽ sai — đây là hệ quả tự nhiên của cấu trúc range lồng nhau (fractal)</text>

  <rect x="40" y="385" width="660" height="34" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="52" y="406" font-size="11.5" font-weight="700" fill="#166534">QUY TẮC: H4 (HTF) quyết định BIAS + chọn POI để tìm Long; M15 (LTF) chỉ tinh chỉnh THỜI ĐIỂM/GIÁ entry — không phủ quyết H4</text>

  <rect x="24" y="428" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="446" font-size="11" font-weight="700" fill="#92400E">Ví dụ: Bias H4 Bullish, giá ở H4 discount → vẫn đi tìm Long. Chờ M15 tự retrace về M15 discount của chính nó</text>
  <text x="36" y="462" font-size="11" font-weight="700" fill="#92400E">(hoặc chờ M15 tạo MSS bullish riêng) rồi mới entry — không Long ngay khi M15 đang premium dù H4 đã discount.</text>
</svg>
