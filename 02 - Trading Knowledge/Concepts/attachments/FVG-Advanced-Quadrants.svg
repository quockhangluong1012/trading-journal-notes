<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu FVG — Quadrants, Proximal/Distal &amp; Vòng đời</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Bullish FVG: entry theo độ sâu fill + trạng thái từ Respect tới Inversion</text>

  <!-- ===== Left: quadrant anatomy ===== -->
  <rect x="24" y="70" width="360" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="14" font-weight="700" fill="#1D4ED8">Quadrants của một Bullish FVG</text>

  <!-- FVG zone y150..310, x=90..300 -->
  <rect x="90" y="150" width="210" height="160" fill="#3B82F6" opacity="0.10"/>
  <!-- quadrant lines -->
  <line x1="90" y1="150" x2="300" y2="150" stroke="#1D4ED8" stroke-width="1.6"/>
  <line x1="90" y1="190" x2="300" y2="190" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="90" y1="230" x2="300" y2="230" stroke="#1D4ED8" stroke-width="1.4" stroke-dasharray="6 4"/>
  <line x1="90" y1="270" x2="300" y2="270" stroke="#93C5FD" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="90" y1="310" x2="300" y2="310" stroke="#1D4ED8" stroke-width="1.6"/>

  <text x="306" y="154" font-size="11.5" fill="#1D4ED8" font-weight="700">Proximal edge</text>
  <text x="306" y="194" font-size="11" fill="#6B7280">25%</text>
  <text x="306" y="234" font-size="11.5" fill="#1D4ED8" font-weight="700">CE (50%)</text>
  <text x="306" y="274" font-size="11" fill="#6B7280">75%</text>
  <text x="306" y="314" font-size="11.5" fill="#1D4ED8" font-weight="700">Distal edge</text>

  <text x="98" y="172" font-size="11" fill="#374151">Upper quadrant — displacement mạnh chỉ nhúng tới đây</text>
  <text x="98" y="252" font-size="11" fill="#374151">Lower quadrant — fill sâu, hạ kỳ vọng, cần confirm thêm</text>

  <!-- entry annotations -->
  <circle cx="120" cy="150" r="4" fill="#16A34A"/>
  <text x="36" y="342" font-size="11.5" fill="#16A34A" font-weight="700">● Aggressive: limit tại proximal (chỉ khi sweep + displacement cực mạnh)</text>
  <circle cx="120" cy="230" r="4" fill="#0EA5E9"/>
  <text x="36" y="360" font-size="11.5" fill="#0284C7" font-weight="700">● Standard: entry quanh CE — mặc định, R:R cân bằng</text>
  <circle cx="120" cy="310" r="4" fill="#DC2626"/>
  <text x="36" y="378" font-size="11.5" fill="#B91C1C" font-weight="700">● Stop: dưới distal edge + buffer / dưới sweep low</text>
  <text x="36" y="404" font-size="11" fill="#6B7280">Fill depth = thông tin: chạm proximal rồi bật = rất mạnh;</text>
  <text x="36" y="419" font-size="11" fill="#6B7280">lấp tới distal mới bật = yếu hơn, đòi hỏi LTF MSS trước khi vào.</text>
  <text x="36" y="437" font-size="11" fill="#6B7280">Invalid = ĐÓNG NẾN (timeframe của FVG) dưới distal + giữ giá.</text>

  <!-- ===== Right: lifecycle ===== -->
  <rect x="400" y="70" width="336" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="412" y="94" font-size="14" font-weight="700" fill="#7C3AED">Vòng đời một FVG (state machine)</text>

  <!-- state boxes -->
  <rect x="428" y="110" width="280" height="46" rx="8" fill="#DCFCE7" stroke="#16A34A"/>
  <text x="440" y="129" font-size="12.5" font-weight="700" fill="#166534">1. Fresh / Unmitigated</text>
  <text x="440" y="146" font-size="11" fill="#166534">Giá trị cao nhất — first touch đáng tin nhất</text>

  <line x1="568" y1="156" x2="568" y2="172" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="428" y="174" width="280" height="46" rx="8" fill="#E0F2FE" stroke="#0284C7"/>
  <text x="440" y="193" font-size="12.5" font-weight="700" fill="#075985">2. Respect (partial fill → CE)</text>
  <text x="440" y="210" font-size="11" fill="#075985">Reject tại CE/proximal → FVG đang giữ; entry hợp lệ</text>

  <line x1="568" y1="220" x2="568" y2="236" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="428" y="238" width="280" height="46" rx="8" fill="#FEF9C3" stroke="#CA8A04"/>
  <text x="440" y="257" font-size="12.5" font-weight="700" fill="#854D0E">3. Full fill (mitigated)</text>
  <text x="440" y="274" font-size="11" fill="#854D0E">Imbalance đã rebalance — chỉ trade nếu có POI khác</text>

  <line x1="568" y1="284" x2="568" y2="300" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="428" y="302" width="280" height="46" rx="8" fill="#FEE2E2" stroke="#DC2626"/>
  <text x="440" y="321" font-size="12.5" font-weight="700" fill="#991B1B">4. Invalidated (body close through)</text>
  <text x="440" y="338" font-size="11" fill="#991B1B">Đóng nến xuyên distal + acceptance → hết vai trò cũ</text>

  <line x1="568" y1="348" x2="568" y2="364" stroke="#9CA3AF" stroke-width="1.6" marker-end="url(#arr)"/>

  <rect x="428" y="366" width="280" height="46" rx="8" fill="#F3E8FF" stroke="#7C3AED"/>
  <text x="440" y="385" font-size="12.5" font-weight="700" fill="#6B21A8">5. Inversion (IFVG) — đảo cực</text>
  <text x="440" y="402" font-size="11" fill="#6B21A8">Bullish FVG fail → kháng cự; retest từ phía ngược = entry</text>

  <text x="412" y="436" font-size="11" fill="#6B7280">Mỗi lần bị test lại, FVG yếu đi — first touch &gt; second touch.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>
