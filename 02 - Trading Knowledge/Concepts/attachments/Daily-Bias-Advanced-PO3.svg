<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Power of Three (AMD) trên nến ngày — khung thời gian của Bias</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Ngày bullish: Accumulation quanh Midnight Open → Manipulation (Judas) xuống → Distribution lên</text>

  <!-- time axis -->
  <line x1="60" y1="440" x2="720" y2="440" stroke="#9CA3AF" stroke-width="1.4"/>
  <text x="70" y="460" font-size="11" fill="#6B7280">00:00 NY (Midnight Open)</text>
  <text x="250" y="460" font-size="11" fill="#6B7280">02:00–05:00 London KZ</text>
  <text x="452" y="460" font-size="11" fill="#6B7280">08:30 News</text>
  <text x="540" y="460" font-size="11" fill="#6B7280">09:30 NYSE</text>
  <text x="640" y="460" font-size="11" fill="#6B7280">NY PM</text>

  <!-- midnight open horizontal line -->
  <line x1="60" y1="250" x2="720" y2="250" stroke="#1D4ED8" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="600" y="244" font-size="12" fill="#1D4ED8" font-weight="700">Midnight Open (00:00)</text>

  <!-- phases background -->
  <rect x="60" y="90" width="180" height="350" fill="#6B7280" opacity="0.06"/>
  <rect x="240" y="90" width="180" height="350" fill="#DC2626" opacity="0.06"/>
  <rect x="420" y="90" width="300" height="350" fill="#16A34A" opacity="0.06"/>

  <text x="100" y="110" font-size="13" font-weight="700" fill="#4B5563">Accumulation</text>
  <text x="286" y="110" font-size="13" font-weight="700" fill="#B91C1C">Manipulation (Judas)</text>
  <text x="520" y="110" font-size="13" font-weight="700" fill="#15803D">Distribution / Expansion</text>

  <!-- price path -->
  <path d="M70 252 L100 244 L130 256 L160 246 L190 254 L220 248
           L250 268 L280 296 L310 330 L340 352
           L370 322 L400 288 L430 256 L460 246
           L480 268 L500 232 L530 196 L560 210 L590 168 L620 150 L650 160 L680 132 L705 140"
        fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- SSL line under Asia lows -->
  <line x1="70" y1="352" x2="360" y2="352" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="74" y="370" font-size="11.5" fill="#B91C1C" font-weight="700">SSL (Asia low / PDL) — bị Judas swing quét</text>
  <circle cx="340" cy="352" r="5" fill="#DC2626"/>

  <!-- annotation arrows -->
  <text x="252" y="146" font-size="11" fill="#B91C1C">Giả phá xuống dưới Midnight Open:</text>
  <text x="252" y="161" font-size="11" fill="#B91C1C">bẫy Short + lấy nhiên liệu cho leg thật</text>

  <text x="474" y="300" font-size="11" fill="#15803D">Displacement + MSS trong London/NY</text>
  <text x="474" y="315" font-size="11" fill="#15803D">→ expansion về draw (BSL/PDH)</text>

  <!-- key rules box -->
  <rect x="60" y="474" width="660" height="34" rx="8" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="74" y="495" font-size="11.5" fill="#3730A3" font-weight="700">Bias bullish → kỳ vọng LOW của ngày hình thành DƯỚI Midnight Open trong London KZ; mua dưới open, không mua đuổi trên open.</text>
</svg>
