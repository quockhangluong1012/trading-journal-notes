<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obdw" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#DC2626"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ SAI — dùng CE như luật cứng, bỏ qua SSL bên dưới</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Cùng OB 21,000–21,040 (CE = 21,020) — nhưng đặt limit + stop chặt tại CE mà không kiểm tra thanh khoản phía dưới</text>

  <rect x="24" y="70" width="712" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <line x1="70" y1="120" x2="710" y2="120" stroke="#E5E7EB" stroke-width="1"/>
  <text x="712" y="124" font-size="9.5" fill="#9CA3AF">21,040 (đỉnh OB)</text>
  <line x1="70" y1="220" x2="710" y2="220" stroke="#1D4ED8" stroke-width="1.8" stroke-dasharray="6 3"/>
  <text x="712" y="224" font-size="9.5" fill="#1D4ED8" font-weight="700">21,020 (CE — entry)</text>
  <line x1="70" y1="245" x2="710" y2="245" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="712" y="249" font-size="9.5" fill="#DC2626" font-weight="700">21,015 (stop — quá chặt)</text>
  <line x1="70" y1="280" x2="710" y2="280" stroke="#9CA3AF" stroke-width="1"/>
  <text x="712" y="284" font-size="9.5" fill="#9CA3AF">21,000 (đáy OB)</text>
  <line x1="70" y1="330" x2="710" y2="330" stroke="#B45309" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text x="712" y="334" font-size="9.5" fill="#B45309" font-weight="700">20,995 (SSL pool — không được xét)</text>

  <!-- price path: enters at CE, stopped, then sweeps SSL and reverses without trader -->
  <path d="M100,150 L160,190 L220,220 L280,240 L300,246 L330,270 L360,300 L400,332 L440,300 L480,250 L540,190 L600,130" fill="none" stroke="#374151" stroke-width="2.2"/>

  <circle cx="220" cy="220" r="6" fill="#1D4ED8"/>
  <text x="200" y="205" font-size="10" font-weight="700" fill="#1D4ED8">① Limit đặt cứng tại CE 21,020</text>
  <text x="200" y="218" font-size="9" fill="#1D4ED8">(không kiểm tra SSL bên dưới)</text>

  <circle cx="300" cy="246" r="5" fill="#DC2626"/>
  <text x="308" y="240" font-size="10" font-weight="700" fill="#DC2626">② Bị stop tại 21,015</text>

  <circle cx="400" cy="332" r="5" fill="#B45309"/>
  <text x="360" y="358" font-size="10" font-weight="700" fill="#92400E">③ Giá tiếp tục quét SSL 20,995</text>
  <text x="360" y="371" font-size="9" fill="#78350F">— đúng như dự đoán OB, nhưng trader đã bị out</text>

  <text x="480" y="150" font-size="10" font-weight="700" fill="#166534">④ Đảo chiều thật &amp; chạy — không có vị thế</text>

  <rect x="48" y="404" width="664" height="34" rx="6" fill="#DC2626" opacity="0.07" stroke="#DC2626" stroke-width="1"/>
  <text x="58" y="425" font-size="10.5" font-weight="700" fill="#B91C1C">Bài học: CE là mốc tinh chỉnh, không phải luật cứng. Luôn quét equal-lows/SSL dưới OB trước khi đặt stop; nếu có, hoặc chờ SSL bị quét trước, hoặc đặt stop qua điểm sweep.</text>
</svg>
