<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ba số phận của một cú "vượt swing" — Sweep vs BOS vs MSS</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Hai câu hỏi phân loại: (1) Body có đóng qua không? (2) Cú phá THUẬN hay NGƯỢC trend? Trả lời xong mới được gắn nhãn.</text>

  <!-- Panel 1: Sweep -->
  <rect x="24" y="76" width="228" height="320" rx="8" fill="#FFFFFF" stroke="#F59E0B"/>
  <text x="36" y="100" font-size="12.5" font-weight="700" fill="#B45309">SWEEP — wick qua, đóng lại</text>
  <line x1="44" y1="180" x2="236" y2="180" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="46" y="172" font-size="9.5" fill="#6B7280">swing high</text>
  <rect x="110" y="192" width="2" height="60" fill="#16A34A"/><rect x="104" y="198" width="12" height="44" fill="#16A34A" rx="1"/>
  <!-- sweep candle -->
  <rect x="138" y="150" width="2" height="100" fill="#DC2626"/><rect x="132" y="196" width="12" height="48" fill="#DC2626" rx="1"/>
  <circle cx="139" cy="158" r="8" fill="none" stroke="#F59E0B" stroke-width="2.2"/>
  <rect x="166" y="215" width="2" height="75" fill="#DC2626"/><rect x="160" y="222" width="12" height="56" fill="#DC2626" rx="1"/>
  <text x="36" y="320" font-size="10.5" fill="#374151">Body đóng LẠI dưới swing;</text>
  <text x="36" y="335" font-size="10.5" fill="#374151">displacement ngược ngay sau.</text>
  <text x="36" y="356" font-size="10.5" font-weight="700" fill="#B45309">Đọc: lấy liquidity — cảnh giác</text>
  <text x="36" y="371" font-size="10.5" font-weight="700" fill="#B45309">đảo chiều. KHÔNG trade tiếp diễn.</text>

  <!-- Panel 2: BOS -->
  <rect x="266" y="76" width="228" height="320" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="278" y="100" font-size="12.5" font-weight="700" fill="#166534">BOS — body qua, THUẬN trend</text>
  <line x1="286" y1="180" x2="478" y2="180" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="288" y="172" font-size="9.5" fill="#6B7280">swing high (uptrend đang chạy)</text>
  <rect x="340" y="192" width="2" height="60" fill="#16A34A"/><rect x="334" y="198" width="12" height="44" fill="#16A34A" rx="1"/>
  <!-- breaking candle closes above -->
  <rect x="368" y="128" width="2" height="105" fill="#16A34A"/><rect x="362" y="136" width="12" height="80" fill="#16A34A" rx="1"/>
  <rect x="354" y="205" width="80" height="18" fill="#3B82F6" opacity="0.16"/>
  <rect x="396" y="112" width="2" height="58" fill="#16A34A"/><rect x="390" y="118" width="12" height="42" fill="#16A34A" rx="1"/>
  <text x="440" y="218" font-size="9.5" fill="#1D4ED8">FVG</text>
  <text x="278" y="320" font-size="10.5" fill="#374151">Body đóng TRÊN swing, giữ giá,</text>
  <text x="278" y="335" font-size="10.5" fill="#374151">phá THUẬN hướng uptrend.</text>
  <text x="278" y="356" font-size="10.5" font-weight="700" fill="#166534">Đọc: TIẾP DIỄN — giữ bias, chờ</text>
  <text x="278" y="371" font-size="10.5" font-weight="700" fill="#166534">retrace vào FVG/OB để tham gia.</text>

  <!-- Panel 3: MSS -->
  <rect x="508" y="76" width="228" height="320" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="520" y="100" font-size="12.5" font-weight="700" fill="#B91C1C">MSS — body qua, NGƯỢC trend</text>
  <line x1="528" y1="250" x2="720" y2="250" stroke="#7C3AED" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="530" y="266" font-size="9.5" fill="#5B21B6">protected low (đáy được bảo vệ của uptrend)</text>
  <!-- uptrend then break down -->
  <path d="M540,200 L565,160 L585,190 L610,140" fill="none" stroke="#374151" stroke-width="1.8"/>
  <rect x="630" y="150" width="2" height="55" fill="#DC2626"/><rect x="624" y="156" width="12" height="42" fill="#DC2626" rx="1"/>
  <!-- big down candle through protected low -->
  <rect x="658" y="185" width="2" height="115" fill="#DC2626"/><rect x="652" y="195" width="12" height="90" fill="#DC2626" rx="1"/>
  <text x="520" y="320" font-size="10.5" fill="#374151">Body đóng DƯỚI protected low —</text>
  <text x="520" y="335" font-size="10.5" fill="#374151">phá NGƯỢC hướng trend cũ.</text>
  <text x="520" y="356" font-size="10.5" font-weight="700" fill="#B91C1C">Đọc: cấu trúc SHIFT — ngừng trade</text>
  <text x="520" y="371" font-size="10.5" font-weight="700" fill="#B91C1C">tiếp diễn, đánh giá lại bias.</text>

  <rect x="24" y="412" width="712" height="28" rx="6" fill="#FEF3C7"/>
  <text x="36" y="431" font-size="11.5" font-weight="700" fill="#92400E">Trình tự hỏi: Body close? — Không → Sweep. Có → Thuận trend? — Thuận → BOS (tiếp diễn). Ngược → MSS (đảo chiều). Chỉ 2 câu, hỏi MỌI cú phá.</text>
</svg>
