<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Consequent Encroachment — CE (50%) của Bullish FVG</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">CE = (FVG high + FVG low) / 2. Vào tại CE cho R:R tốt hơn hẳn vào mép trên gap.</text>

  <rect x="24" y="70" width="712" height="386" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- FVG box -->
  <rect x="120" y="150" width="360" height="180" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-width="1.2"/>
  <!-- FVG high line -->
  <line x1="120" y1="150" x2="620" y2="150" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="626" y="154" font-size="11" font-weight="700" fill="#1D4ED8">FVG high [high]</text>
  <!-- FVG low line -->
  <line x1="120" y1="330" x2="620" y2="330" stroke="#1D4ED8" stroke-width="1.6"/>
  <text x="626" y="334" font-size="11" font-weight="700" fill="#1D4ED8">FVG low [low]</text>

  <!-- Premium internal half -->
  <text x="132" y="200" font-size="11" font-weight="700" fill="#92400E">Nửa PREMIUM nội bộ (trên CE)</text>
  <text x="132" y="216" font-size="10" fill="#B45309">fill kém hấp dẫn hơn cho Long</text>
  <!-- Discount internal half -->
  <text x="132" y="290" font-size="11" font-weight="700" fill="#15803D">Nửa DISCOUNT nội bộ (dưới CE)</text>
  <text x="132" y="306" font-size="10" fill="#166534">entry sâu hơn → R:R tốt hơn</text>

  <!-- CE line 50% -->
  <line x1="120" y1="240" x2="620" y2="240" stroke="#F59E0B" stroke-width="2.6" stroke-dasharray="8 4"/>
  <text x="626" y="238" font-size="12" font-weight="700" fill="#B45309">CE (50%)</text>
  <text x="626" y="252" font-size="10" fill="#B45309">= (high+low)/2 [mid]</text>

  <!-- price retrace touching CE with light wick, close back up -->
  <path d="M120,120 L150,145 L200,165 L250,205 L300,235" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="132" y="112" font-size="10.5" fill="#6B7280">① Displacement tăng tạo FVG hợp lệ</text>
  <!-- candle at CE: wick pierces CE slightly, body closes back above -->
  <line x1="308" y1="228" x2="308" y2="262" stroke="#16A34A" stroke-width="2"/>
  <rect x="301" y="228" width="15" height="20" fill="#16A34A" rx="1"/>
  <text x="322" y="278" font-size="10.5" font-weight="700" fill="#15803D">② Giá chạm đúng CE, để bóng nhẹ</text>
  <text x="322" y="293" font-size="10.5" fill="#15803D">rồi đóng nến quay lên (respect CE)</text>

  <!-- entry marker -->
  <circle cx="360" cy="240" r="6" fill="#16A34A"/>
  <text x="372" y="244" font-size="10.5" font-weight="700" fill="#15803D">③ Entry quanh CE</text>

  <!-- stop below far edge -->
  <line x1="120" y1="352" x2="480" y2="352" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="132" y="368" font-size="10.5" font-weight="700" fill="#DC2626">④ Stop dưới mép xa FVG (KHÔNG sát CE)</text>

  <!-- price continues up -->
  <path d="M360,240 L400,200 L440,215 L500,140 L560,160 L610,105" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <line x1="500" y1="105" x2="620" y2="105" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="510" y="98" font-size="10.5" fill="#166534">⑤ Delivery tiếp lên target BSL</text>

  <!-- R:R comparison bracket -->
  <line x1="80" y1="150" x2="80" y2="240" stroke="#9CA3AF" stroke-width="1.4"/>
  <text x="50" y="200" font-size="9.5" fill="#9CA3AF" transform="rotate(-90 50 200)">entry mép trên</text>
  <line x1="96" y1="240" x2="96" y2="352" stroke="#16A34A" stroke-width="1.6"/>
  <text x="66" y="300" font-size="9.5" fill="#15803D" transform="rotate(-90 66 300)">stop từ CE nhỏ hơn</text>

  <rect x="24" y="462" width="712" height="0" fill="none"/>
</svg>
