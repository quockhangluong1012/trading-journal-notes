<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Giải phẫu Reaper IFVG — entry thật ẩn sau Breaker Block</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Giá chạm Breaker (đám đông vào), chạy XUYÊN qua vào discount, tìm support tại Reaper IFVG rồi đảo chiều.</text>

  <rect x="24" y="70" width="712" height="362" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- premium / discount + equilibrium -->
  <line x1="40" y1="250" x2="720" y2="250" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="646" y="245" font-size="9.5" fill="#9CA3AF">Equilibrium 50%</text>
  <text x="40" y="150" font-size="10" font-weight="700" fill="#B45309">PREMIUM</text>
  <text x="40" y="360" font-size="10" font-weight="700" fill="#166534">DISCOUNT</text>

  <!-- prev highs / BSL -->
  <line x1="270" y1="118" x2="716" y2="118" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="560" y="112" font-size="9.5" fill="#166534">Prev highs / BSL (target)</text>

  <!-- SSL -->
  <line x1="60" y1="345" x2="300" y2="345" stroke="#6B7280" stroke-width="1.1" stroke-dasharray="4 4"/>
  <text x="120" y="360" font-size="9.5" fill="#9CA3AF">SSL (đáy cũ) bị quét</text>

  <!-- Breaker band -->
  <rect x="246" y="186" width="454" height="24" fill="#16A34A" opacity="0.13" stroke="#16A34A" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="470" y="182" font-size="10" font-weight="700" fill="#15803D">Breaker Block — mức hiển nhiên (đám đông vào đây)</text>

  <!-- Reaper IFVG band -->
  <rect x="300" y="262" width="400" height="36" fill="#DBEAFE" stroke="#60A5FA" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="470" y="279" font-size="10" font-weight="700" fill="#1D4ED8">Reaper IFVG — entry thật (sâu hơn, trong discount)</text>

  <!-- stop line -->
  <line x1="360" y1="316" x2="560" y2="316" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="5 3"/>
  <text x="362" y="330" font-size="9.5" fill="#B91C1C">Stop dưới Reaper IFVG</text>

  <!-- Candles -->
  <!-- down phase (red) -->
  <line x1="70" y1="150" x2="70" y2="205" stroke="#DC2626" stroke-width="1.4"/><rect x="64.5" y="160" width="11" height="35" fill="#DC2626"/>
  <line x1="92" y1="175" x2="92" y2="235" stroke="#DC2626" stroke-width="1.4"/><rect x="86.5" y="185" width="11" height="40" fill="#DC2626"/>
  <line x1="114" y1="210" x2="114" y2="280" stroke="#DC2626" stroke-width="1.4"/><rect x="108.5" y="220" width="11" height="50" fill="#DC2626"/>
  <line x1="136" y1="250" x2="136" y2="345" stroke="#DC2626" stroke-width="1.4"/><rect x="130.5" y="260" width="11" height="70" fill="#DC2626"/>
  <!-- up displacement (green) leaving Reaper IFVG -->
  <line x1="158" y1="300" x2="158" y2="348" stroke="#16A34A" stroke-width="1.4"/><rect x="152.5" y="308" width="11" height="30" fill="#16A34A"/>
  <line x1="180" y1="208" x2="180" y2="315" stroke="#16A34A" stroke-width="1.4"/><rect x="174.5" y="222" width="11" height="83" fill="#16A34A"/>
  <line x1="202" y1="188" x2="202" y2="262" stroke="#16A34A" stroke-width="1.4"/><rect x="196.5" y="198" width="11" height="54" fill="#16A34A"/>
  <line x1="224" y1="162" x2="224" y2="214" stroke="#16A34A" stroke-width="1.4"/><rect x="218.5" y="172" width="11" height="32" fill="#16A34A"/>
  <line x1="246" y1="138" x2="246" y2="192" stroke="#16A34A" stroke-width="1.4"/><rect x="240.5" y="148" width="11" height="34" fill="#16A34A"/>
  <line x1="268" y1="122" x2="268" y2="172" stroke="#16A34A" stroke-width="1.4"/><rect x="262.5" y="132" width="11" height="30" fill="#16A34A"/>
  <!-- retrace down (red): tap breaker, run through -->
  <line x1="290" y1="128" x2="290" y2="186" stroke="#DC2626" stroke-width="1.4"/><rect x="284.5" y="138" width="11" height="40" fill="#DC2626"/>
  <line x1="312" y1="158" x2="312" y2="216" stroke="#DC2626" stroke-width="1.4"/><rect x="306.5" y="168" width="11" height="38" fill="#DC2626"/>
  <line x1="334" y1="182" x2="334" y2="246" stroke="#DC2626" stroke-width="1.4"/><rect x="328.5" y="192" width="11" height="44" fill="#DC2626"/>
  <line x1="356" y1="208" x2="356" y2="272" stroke="#DC2626" stroke-width="1.4"/><rect x="350.5" y="218" width="11" height="44" fill="#DC2626"/>
  <line x1="378" y1="234" x2="378" y2="300" stroke="#DC2626" stroke-width="1.4"/><rect x="372.5" y="244" width="11" height="52" fill="#DC2626"/>
  <!-- support at Reaper IFVG + reverse up (green) -->
  <line x1="400" y1="258" x2="400" y2="306" stroke="#16A34A" stroke-width="1.4"/><rect x="394.5" y="270" width="11" height="28" fill="#16A34A"/>
  <line x1="422" y1="214" x2="422" y2="292" stroke="#16A34A" stroke-width="1.4"/><rect x="416.5" y="226" width="11" height="56" fill="#16A34A"/>
  <line x1="444" y1="178" x2="444" y2="242" stroke="#16A34A" stroke-width="1.4"/><rect x="438.5" y="188" width="11" height="44" fill="#16A34A"/>
  <line x1="466" y1="152" x2="466" y2="206" stroke="#16A34A" stroke-width="1.4"/><rect x="460.5" y="162" width="11" height="34" fill="#16A34A"/>
  <line x1="488" y1="124" x2="488" y2="182" stroke="#16A34A" stroke-width="1.4"/><rect x="482.5" y="134" width="11" height="38" fill="#16A34A"/>
  <line x1="510" y1="108" x2="510" y2="156" stroke="#16A34A" stroke-width="1.4"/><rect x="504.5" y="118" width="11" height="28" fill="#16A34A"/>

  <!-- circled markers -->
  <circle cx="312" cy="196" r="8" fill="none" stroke="#B45309" stroke-width="2.4"/><text x="322" y="200" font-size="10" font-weight="700" fill="#B45309">①</text>
  <circle cx="356" cy="240" r="8" fill="none" stroke="#B45309" stroke-width="2.4"/><text x="366" y="244" font-size="10" font-weight="700" fill="#B45309">②</text>
  <circle cx="400" cy="298" r="8" fill="none" stroke="#166534" stroke-width="2.4"/><text x="410" y="302" font-size="10" font-weight="700" fill="#166534">③</text>
  <circle cx="510" cy="146" r="8" fill="none" stroke="#166534" stroke-width="2.4"/><text x="520" y="150" font-size="10" font-weight="700" fill="#166534">④</text>

  <!-- legend strip -->
  <rect x="24" y="440" width="712" height="34" rx="6" fill="#FEF3C7"/>
  <text x="36" y="454" font-size="11" font-weight="700" fill="#92400E">① Chạm Breaker (mồi nhử) → ② chạy XUYÊN qua vào discount (drawdown, quét stop đám đông) →</text>
  <text x="36" y="469" font-size="11" font-weight="700" fill="#92400E">③ support tại Reaper IFVG + MSS = entry thật → ④ đảo chiều về prev highs / BSL.</text>
</svg>
