<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ đúng — Bullish Rejection Block: sweep + wick dài + MSS, retest, Long</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Wick dưới dài quét sell-side liquidity dưới đáy cũ, đóng cửa bật lên; displacement + MSS xác nhận; retest RB = Long.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- discount zone -->
  <rect x="44" y="290" width="672" height="96" fill="#3B82F6" opacity="0.06"/>
  <text x="52" y="308" font-size="10.5" fill="#1D4ED8">Discount của dealing range — nơi tìm bullish RB</text>

  <!-- old low / SSL level -->
  <line x1="90" y1="330" x2="520" y2="330" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="96" y="326" font-size="10" fill="#374151">Đáy cũ — sell-side liquidity (SSL) nghỉ dưới đây</text>

  <!-- down-move path into the wick -->
  <path d="M60,150 L120,220 L160,260 L190,300" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="64" y="140" font-size="10.5" fill="#6B7280">① Down-move dẫn tới vùng SSL</text>

  <!-- rejection candle: long lower wick, small body -->
  <rect x="182" y="296" width="16" height="16" fill="#16A34A" opacity="0.85" rx="1"/>
  <rect x="188" y="312" width="4" height="60" fill="#16A34A" opacity="0.85"/>
  <circle cx="230" cy="345" r="14" fill="none" stroke="#B45309" stroke-width="1.6"/>
  <text x="204" y="392" font-size="10.5" font-weight="700" fill="#15803D">② Wick dưới dài quét SSL rồi đóng cửa bật lên</text>

  <!-- RB zone box: from body edge (top) to wick low (bottom) -->
  <rect x="182" y="296" width="30" height="76" fill="#F59E0B" opacity="0.16" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="216" y="300" font-size="9.5" font-weight="700" fill="#B45309">RB zone</text>
  <text x="216" y="312" font-size="9" fill="#92400E">mép body → low wick</text>

  <!-- displacement up + MSS -->
  <path d="M198,300 L230,250 L255,270 L300,160" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <rect x="303" y="150" width="13" height="70" fill="#16A34A" rx="1"/><rect x="308" y="144" width="2" height="86" fill="#16A34A"/>
  <text x="320" y="158" font-size="10.5" font-weight="700" fill="#15803D">③ Displacement + MSS bullish</text>

  <!-- swing high broken -->
  <circle cx="255" cy="270" r="6" fill="none" stroke="#3B82F6" stroke-width="2.2"/>
  <line x1="255" y1="270" x2="480" y2="270" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="330" y="266" font-size="10" fill="#1D4ED8">Swing high LTF bị phá = MSS</text>

  <!-- retrace back to RB body edge -->
  <path d="M316,150 L360,230 L397,296 L430,220 L480,255 L540,140" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="397" cy="296" r="7" fill="#16A34A"/>
  <text x="365" y="322" font-size="10.5" font-weight="700" fill="#15803D">④ Retest mép body RB = Entry Long</text>

  <!-- entry / stop / target labels -->
  <line x1="360" y1="296" x2="720" y2="296" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="600" y="292" font-size="10" fill="#166534">Entry: mép body RB</text>

  <line x1="182" y1="372" x2="720" y2="372" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="600" y="386" font-size="10" fill="#B91C1C">SL: dưới low wick (extreme)</text>

  <line x1="540" y1="140" x2="716" y2="100" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="590" y="96" font-size="10.5" fill="#166534">⑤ TP: buy-side liquidity phía trên</text>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Chuỗi: sweep SSL (wick dài) → đóng cửa bật lên → displacement + MSS → retest mép body RB → Long,</text>
  <text x="36" y="450" font-size="11.5" font-weight="700" fill="#92400E">SL dưới low wick (extreme), TP về thanh khoản đối diện. Wick, không phải body, là điều làm nên RB.</text>
</svg>
