<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Logic Stop Loss — stop DƯỚI Reaper IFVG, KHÔNG trong gap</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Wick retest bình thường sẽ chọc vào trong gap → stop đặt trong gap bị quét oan trước khi giá đảo.</text>

  <rect x="24" y="72" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Reaper IFVG band -->
  <rect x="120" y="196" width="560" height="46" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.2"/>
  <text x="128" y="190" font-size="10" font-weight="700" fill="#1D4ED8">Reaper IFVG (vùng gap)</text>

  <!-- recent swing low -->
  <line x1="120" y1="300" x2="680" y2="300" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="128" y="314" font-size="9.5" fill="#6B7280">recent swing low</text>

  <!-- price entering, deep retest wick into gap, then reverse up -->
  <line x1="150" y1="120" x2="150" y2="170" stroke="#DC2626" stroke-width="1.4"/><rect x="144.5" y="130" width="11" height="32" fill="#DC2626"/>
  <line x1="172" y1="150" x2="172" y2="204" stroke="#DC2626" stroke-width="1.4"/><rect x="166.5" y="160" width="11" height="40" fill="#DC2626"/>
  <line x1="194" y1="186" x2="194" y2="244" stroke="#DC2626" stroke-width="1.4"/><rect x="188.5" y="196" width="11" height="42" fill="#DC2626"/>
  <!-- rejection candle with deep wick into the gap -->
  <line x1="216" y1="210" x2="216" y2="284" stroke="#16A34A" stroke-width="1.6"/><rect x="210.5" y="222" width="11" height="30" fill="#16A34A"/>
  <text x="226" y="278" font-size="9.5" font-weight="700" fill="#B45309">wick retest chọc SÂU vào gap</text>
  <line x1="238" y1="170" x2="238" y2="240" stroke="#16A34A" stroke-width="1.4"/><rect x="232.5" y="182" width="11" height="50" fill="#16A34A"/>
  <line x1="260" y1="130" x2="260" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="254.5" y="140" width="11" height="52" fill="#16A34A"/>
  <line x1="282" y1="100" x2="282" y2="160" stroke="#16A34A" stroke-width="1.4"/><rect x="276.5" y="110" width="11" height="42" fill="#16A34A"/>
  <path d="M216 284 Q260 200 300 110" fill="none" stroke="#166534" stroke-width="1.6" stroke-dasharray="4 4"/>
  <text x="300" y="104" font-size="10" font-weight="700" fill="#166534">↑ đảo chiều</text>

  <!-- WRONG stop inside gap -->
  <line x1="120" y1="228" x2="360" y2="228" stroke="#DC2626" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="366" y="232" font-size="10.5" font-weight="700" fill="#B91C1C">✕ Stop SAI (trong gap) — bị wick quét oan</text>

  <!-- RIGHT stop below -->
  <line x1="120" y1="312" x2="360" y2="312" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="366" y="316" font-size="10.5" font-weight="700" fill="#166534">✓ Stop ĐÚNG (dưới Reaper IFVG / swing low)</text>

  <!-- annotation box -->
  <rect x="430" y="110" width="240" height="150" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="446" y="134" font-size="11" font-weight="700" fill="#1F2937">Vì sao?</text>
  <text x="446" y="156" font-size="10" fill="#374151">Retest hợp lệ thường quét CE / mép</text>
  <text x="446" y="171" font-size="10" fill="#374151">xa của gap trước khi bật lên.</text>
  <text x="446" y="192" font-size="10" fill="#374151">Stop nằm trong gap = nằm trên</text>
  <text x="446" y="207" font-size="10" fill="#374151">đường đi tự nhiên của wick →</text>
  <text x="446" y="222" font-size="10" fill="#374151">stop-out ngay trước khi đảo.</text>
  <text x="446" y="243" font-size="10" font-weight="700" fill="#166534">→ Đặt dưới gap / swing low để né.</text>

  <rect x="24" y="382" width="712" height="46" rx="6" fill="#FEF3C7"/>
  <text x="36" y="401" font-size="11" font-weight="700" fill="#92400E">Đánh đổi: stop rộng hơn một chút nhưng SỐNG SÓT qua cú retest → giữ được lệnh cho cú đảo thật.</text>
  <text x="36" y="419" font-size="11" fill="#92400E">Bù lại bằng cách canh entry sắc hơn ở LTF (sweep + MSS) để R:R vẫn lành mạnh, tôn trọng risk ≤0.5%.</text>
</svg>
