<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="32" font-size="18" font-weight="700" fill="#1F2937">Ba cách đo range trên cùng trục thời gian NY</text>
  <text x="24" y="52" font-size="13" fill="#6B7280">CBDR, Asian Range, Flout — cùng logic (lấy vùng tích lũy hẹp làm đơn vị SD), khác cửa sổ đo.</text>

  <rect x="24" y="66" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- time axis -->
  <line x1="70" y1="330" x2="710" y2="330" stroke="#9CA3AF" stroke-width="1.4"/>
  <g font-size="10" fill="#6B7280" text-anchor="middle">
    <line x1="120" y1="326" x2="120" y2="334" stroke="#9CA3AF"/><text x="120" y="350">14:00</text>
    <line x1="270" y1="326" x2="270" y2="334" stroke="#9CA3AF"/><text x="270" y="350">19:00/20:00</text>
    <line x1="410" y1="326" x2="410" y2="334" stroke="#9CA3AF"/><text x="410" y="350">00:00</text>
    <line x1="560" y1="326" x2="560" y2="334" stroke="#9CA3AF"/><text x="560" y="350">02:00</text>
    <line x1="690" y1="326" x2="690" y2="334" stroke="#9CA3AF"/><text x="690" y="350">London</text>
  </g>
  <text x="640" y="350" font-size="9" fill="#9CA3AF"></text>
  <text x="380" y="368" font-size="9.5" fill="#9CA3AF" text-anchor="middle">giờ New York →</text>

  <!-- CBDR box -->
  <rect x="120" y="100" width="290" height="40" rx="4" fill="#1D4ED8" opacity="0.12" stroke="#1D4ED8" stroke-width="1.4"/>
  <text x="130" y="115" font-size="11" font-weight="700" fill="#1D4ED8">CBDR (~14:00–20:00)</text>
  <text x="130" y="130" font-size="9.5" fill="#1D4ED8">cuối phiên NY, body high–low</text>

  <!-- Asian Range box -->
  <rect x="270" y="160" width="140" height="40" rx="4" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-width="1.4"/>
  <text x="278" y="175" font-size="11" font-weight="700" fill="#B45309">Asian Range</text>
  <text x="278" y="190" font-size="9.5" fill="#B45309">~19:00/20:00–00:00</text>

  <!-- Flout box (merged) -->
  <rect x="120" y="220" width="290" height="40" rx="4" fill="#16A34A" opacity="0.10" stroke="#15803D" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="130" y="235" font-size="11" font-weight="700" fill="#15803D">Flout = hợp nhất CBDR + Asian</text>
  <text x="130" y="250" font-size="9.5" fill="#15803D">đơn vị range "trơn" hơn</text>

  <!-- notes column -->
  <text x="440" y="118" font-size="10" fill="#1D4ED8">→ dùng khi cuối NY tích lũy gọn, sạch</text>
  <text x="440" y="180" font-size="10" fill="#B45309">→ dùng khi phiên Á tích lũy gọn, CBDR bẩn</text>
  <text x="440" y="240" font-size="10" fill="#15803D">→ dùng khi cả hai đều gọn, muốn 1 đơn vị</text>

  <rect x="24" y="380" width="712" height="76" rx="6" fill="#FEF3C7"/>
  <text x="36" y="400" font-size="11.5" font-weight="700" fill="#92400E">Chọn cái nào?</text>
  <text x="36" y="418" font-size="10.5" fill="#92400E">• CBDR: cửa sổ chuẩn, mạnh nhất trên FX khi NY cuối phiên tích lũy hẹp.</text>
  <text x="36" y="434" font-size="10.5" fill="#92400E">• Asian Range: khi CBDR dính đuôi tin NY nhưng phiên Á lại gọn.</text>
  <text x="36" y="450" font-size="10.5" fill="#92400E">• Flout: hợp nhất khi muốn một đơn vị SD trơn, ít nhạy với một range lẻ méo.</text>
</svg>
