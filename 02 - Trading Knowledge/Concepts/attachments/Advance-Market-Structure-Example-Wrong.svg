<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Mislabel — gọi nhiễu nội bộ là "BOS"</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Đo cấu trúc bằng swing nhỏ (STL lẻ) thay vì degree đúng → BOS giả, gãy bias.</text>

  <!-- An uptrend that is really just a pullback inside larger range -->
  <rect x="80" y="150" width="2" height="55" fill="#DC2626"/><rect x="74" y="155" width="14" height="40" fill="#DC2626" rx="1"/>
  <rect x="106" y="165" width="2" height="60" fill="#DC2626"/><rect x="100" y="170" width="14" height="45" fill="#DC2626" rx="1"/>
  <rect x="132" y="185" width="2" height="62" fill="#DC2626"/><rect x="126" y="190" width="14" height="48" fill="#DC2626" rx="1"/>
  <rect x="158" y="210" width="2" height="60" fill="#DC2626"/><rect x="152" y="215" width="14" height="45" fill="#DC2626" rx="1"/>
  <!-- minor bounce -->
  <rect x="184" y="225" width="2" height="50" fill="#16A34A"/><rect x="178" y="230" width="14" height="33" fill="#16A34A" rx="1"/>
  <rect x="210" y="210" width="2" height="48" fill="#16A34A"/><rect x="204" y="215" width="14" height="30" fill="#16A34A" rx="1"/>
  <!-- trader marks "BOS" here on tiny swing -->
  <rect x="236" y="228" width="2" height="50" fill="#DC2626"/><rect x="230" y="233" width="14" height="33" fill="#DC2626" rx="1"/>
  <rect x="262" y="245" width="2" height="58" fill="#DC2626"/><rect x="256" y="250" width="14" height="42" fill="#DC2626" rx="1"/>
  <rect x="288" y="270" width="2" height="60" fill="#DC2626"/><rect x="282" y="275" width="14" height="45" fill="#DC2626" rx="1"/>
  <rect x="314" y="295" width="2" height="62" fill="#DC2626"/><rect x="308" y="300" width="14" height="48" fill="#DC2626" rx="1"/>
  <rect x="340" y="320" width="2" height="60" fill="#DC2626"/><rect x="334" y="325" width="14" height="45" fill="#DC2626" rx="1"/>

  <!-- false BOS label on the tiny bounce high -->
  <line x1="195" y1="225" x2="270" y2="225" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="150" y="218" font-size="12" font-weight="700" fill="#DC2626">"BOS" giả (swing nhỏ)</text>
  <circle cx="211" cy="210" r="4" fill="#7C3AED"/><text x="200" y="200" font-size="11" fill="#7C3AED">STH lẻ</text>

  <!-- Real protected high above -->
  <line x1="60" y1="150" x2="700" y2="150" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="540" y="145" font-size="12" fill="#2563EB">Protected High thật (LTH) chưa phá</text>

  <!-- Real direction is down -->
  <path d="M340 350 l 22 6 l -6 9 z" fill="#DC2626"/>
  <text x="360" y="360" font-size="12" fill="#DC2626">Trend thật vẫn giảm (Lower Lows)</text>

  <text x="24" y="430" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="70" y="430" font-size="12" fill="#374151">— gắn nhãn BOS lên một STH lẻ trong pullback; cấu trúc lớn (LTH) chưa hề phá.</text>
  <text x="70" y="448" font-size="12" fill="#374151">Phải đo BOS/MSS theo đúng degree (ITL/LTL), không theo swing nhiễu.</text>
</svg>
