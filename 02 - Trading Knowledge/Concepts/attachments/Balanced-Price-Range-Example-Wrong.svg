<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Nhầm — hai FVG KHÔNG chồng nhau, không phải BPR</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Gọi một FVG đơn lẻ là "BPR", hoặc dùng vùng đã bị đóng nến xuyên thủng.</text>

  <!-- bearish FVG high up -->
  <rect x="90" y="100" width="2" height="40" fill="#DC2626"/><rect x="84" y="105" width="14" height="28" fill="#DC2626" rx="1"/>
  <rect x="116" y="110" width="2" height="80" fill="#DC2626"/><rect x="110" y="118" width="14" height="62" fill="#DC2626" rx="1"/>
  <rect x="142" y="170" width="2" height="50" fill="#DC2626"/><rect x="136" y="175" width="14" height="35" fill="#DC2626" rx="1"/>
  <rect x="80" y="140" width="120" height="30" fill="#EF4444" opacity="0.12"/>
  <text x="78" y="135" font-size="12" fill="#DC2626">SIBI (cao)</text>

  <!-- bullish FVG far below — NO overlap with bearish one -->
  <rect x="170" y="215" width="2" height="55" fill="#16A34A"/><rect x="164" y="220" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="196" y="250" width="2" height="80" fill="#16A34A"/><rect x="190" y="258" width="14" height="62" fill="#16A34A" rx="1"/>
  <rect x="222" y="290" width="2" height="50" fill="#16A34A"/><rect x="216" y="295" width="14" height="35" fill="#16A34A" rx="1"/>
  <rect x="160" y="285" width="120" height="30" fill="#3B82F6" opacity="0.14"/>
  <text x="160" y="335" font-size="12" fill="#2563EB">BISI (thấp)</text>

  <!-- gap between them: shows NO overlap -->
  <line x1="150" y1="170" x2="320" y2="170" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="150" y1="285" x2="320" y2="285" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="330" y="232" font-size="13" font-weight="700" fill="#DC2626">Không có vùng chồng</text>
  <text x="330" y="250" font-size="12" fill="#374151">→ KHÔNG phải BPR</text>

  <!-- trader's wrong entry / price slices straight through -->
  <rect x="430" y="160" width="2" height="60" fill="#DC2626"/><rect x="424" y="165" width="14" height="45" fill="#DC2626" rx="1"/>
  <rect x="456" y="200" width="2" height="70" fill="#DC2626"/><rect x="450" y="205" width="14" height="52" fill="#DC2626" rx="1"/>
  <rect x="482" y="255" width="2" height="80" fill="#DC2626"/><rect x="476" y="260" width="14" height="62" fill="#DC2626" rx="1"/>
  <rect x="508" y="320" width="2" height="60" fill="#DC2626"/><rect x="502" y="325" width="14" height="45" fill="#DC2626" rx="1"/>
  <circle cx="463" cy="210" r="5" fill="#DC2626"/>
  <text x="472" y="200" font-size="12" font-weight="600" fill="#DC2626">Entry "BPR" sai</text>
  <path d="M510 360 l 18 8 l -3 -11 z" fill="#DC2626"/>
  <text x="520" y="372" font-size="12" fill="#DC2626">Giá xuyên thẳng, không phản ứng</text>

  <text x="24" y="430" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="70" y="430" font-size="12" fill="#374151">— hai FVG nằm cách xa, không có overlap → không có "balance"; vùng vô nghĩa, giá đi xuyên qua.</text>
  <text x="70" y="448" font-size="12" fill="#374151">BPR chỉ tồn tại khi bullish FVG và bearish FVG thực sự chồng lấp cùng vùng giá.</text>
</svg>
