<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Quy tắc Qualify / Disqualify — luật sống còn</text>
<text x="24" y="54" font-size="12.5" fill="#6B7280">Nến FVG có PHÁ range của các nến trước không? Có = inefficiency thật (qualified). Không = bỏ qua.</text>
<!-- QUALIFIED panel -->
<rect x="24" y="70" width="352" height="340" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
<text x="40" y="94" font-size="13" font-weight="700" fill="#166534">QUALIFIED ✓</text>
<text x="40" y="112" font-size="10.5" fill="#374151">Nến displacement phá TRẦN range nến trước</text>
<!-- prior range box -->
<rect x="60" y="200" width="120" height="70" fill="#F3F4F6" stroke="#9CA3AF" stroke-dasharray="4 3"/>
<text x="66" y="288" font-size="9.5" fill="#6B7280">range nến trước</text>
<line x1="60" y1="200" x2="330" y2="200" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
<text x="255" y="195" font-size="9.5" fill="#6B7280">trần range</text>
<!-- prior candles inside box -->
<line x1="80" y1="210" x2="80" y2="265" stroke="#DC2626" stroke-width="1.4"/><rect x="74.5" y="218" width="11" height="35" fill="#DC2626"/>
<line x1="102" y1="205" x2="102" y2="260" stroke="#16A34A" stroke-width="1.4"/><rect x="96.5" y="215" width="11" height="35" fill="#16A34A"/>
<line x1="124" y1="208" x2="124" y2="262" stroke="#DC2626" stroke-width="1.4"/><rect x="118.5" y="216" width="11" height="35" fill="#DC2626"/>
<!-- FVG 3 candles breaking up -->
<line x1="150" y1="200" x2="150" y2="255" stroke="#DC2626" stroke-width="1.4"/><rect x="144.5" y="210" width="11" height="35" fill="#DC2626"/>
<line x1="172" y1="130" x2="172" y2="255" stroke="#16A34A" stroke-width="1.4"/><rect x="166.5" y="140" width="11" height="105" fill="#16A34A"/>
<line x1="194" y1="115" x2="194" y2="175" stroke="#16A34A" stroke-width="1.4"/><rect x="188.5" y="125" width="11" height="45" fill="#16A34A"/>
<rect x="150" y="170" width="180" height="30" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.4"/>
<text x="240" y="190" font-size="10.5" font-weight="700" fill="#1D4ED8">FVG thật</text>
<path d="M172 205 L172 155" fill="none" stroke="#166534" stroke-width="2" marker-end="url(#agrn)"/>
<text x="185" y="330" font-size="10.5" font-weight="700" fill="#166534">Displacement vượt hẳn range trước</text>
<text x="185" y="348" font-size="10" fill="#374151">→ có sự dịch chuyển mạnh = imbalance thật</text>
<!-- DISQUALIFIED panel -->
<rect x="392" y="70" width="344" height="340" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
<text x="408" y="94" font-size="13" font-weight="700" fill="#B91C1C">DISQUALIFIED ✗</text>
<text x="408" y="112" font-size="10.5" fill="#374151">Nến FVG KHÔNG phá range nến trước → bỏ</text>
<rect x="428" y="180" width="150" height="90" fill="#F3F4F6" stroke="#9CA3AF" stroke-dasharray="4 3"/>
<text x="434" y="288" font-size="9.5" fill="#6B7280">range nến trước (vẫn bao trọn)</text>
<line x1="428" y1="180" x2="710" y2="180" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
<text x="620" y="175" font-size="9.5" fill="#6B7280">trần range</text>
<line x1="448" y1="190" x2="448" y2="260" stroke="#DC2626" stroke-width="1.4"/><rect x="442.5" y="200" width="11" height="45" fill="#DC2626"/>
<line x1="470" y1="188" x2="470" y2="258" stroke="#16A34A" stroke-width="1.4"/><rect x="464.5" y="198" width="11" height="45" fill="#16A34A"/>
<line x1="492" y1="192" x2="492" y2="262" stroke="#DC2626" stroke-width="1.4"/><rect x="486.5" y="202" width="11" height="45" fill="#DC2626"/>
<!-- weak FVG that stays inside -->
<line x1="514" y1="195" x2="514" y2="255" stroke="#DC2626" stroke-width="1.4"/><rect x="508.5" y="205" width="11" height="35" fill="#DC2626"/>
<line x1="536" y1="205" x2="536" y2="258" stroke="#16A34A" stroke-width="1.4"/><rect x="530.5" y="215" width="11" height="35" fill="#16A34A"/>
<line x1="558" y1="200" x2="558" y2="255" stroke="#16A34A" stroke-width="1.4"/><rect x="552.5" y="210" width="11" height="35" fill="#16A34A"/>
<rect x="514" y="220" width="70" height="18" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="3 2"/>
<text x="595" y="233" font-size="10" font-weight="700" fill="#B91C1C">gap tí hon nằm trong range</text>
<text x="440" y="330" font-size="10.5" font-weight="700" fill="#B91C1C">Không có displacement — chỉ dao động nội bộ</text>
<text x="440" y="348" font-size="10" fill="#374151">→ không phải inefficiency thật, SKIP</text>
<defs><marker id="agrn" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#166534"/></marker></defs>
</svg>
