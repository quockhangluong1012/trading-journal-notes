  <text x="36" y="397" font-size="11.5" font-weight="700" fill="#B91C1C">Bài học: WICK ngược trend KHÔNG bằng CHoCH. Cần body close + displacement, phá PROTECTED swing thật, có sweep external tại POI.</text>
