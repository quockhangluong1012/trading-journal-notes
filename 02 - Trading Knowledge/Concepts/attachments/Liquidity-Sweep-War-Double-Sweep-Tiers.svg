<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Double sweep phân tầng — pool mồi (Asia Low) trước, pool chính (PDL) sau</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cú quét đầu kéo bạn vào, cú quét thứ hai sâu hơn lấy stop của bạn rồi mới đảo thật. Bản đồ pool phải vẽ TRƯỚC phiên.</text>

  <!-- chart area -->
  <rect x="24" y="72" width="510" height="384" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Asia Low level -->
  <line x1="40" y1="230" x2="520" y2="230" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="44" y="224" font-size="10.5" font-weight="700" fill="#2563EB">Asia Low — pool MỒI (tier thấp)</text>

  <!-- PDL level -->
  <line x1="40" y1="330" x2="520" y2="330" stroke="#DC2626" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="44" y="324" font-size="10.5" font-weight="700" fill="#DC2626">PDL — pool CHÍNH (tier cao, trùng H1 FVG POI)</text>

  <!-- HTF POI zone around PDL -->
  <rect x="40" y="316" width="480" height="46" fill="#FDE68A" opacity="0.28"/>
  <text x="428" y="356" font-size="9.5" fill="#92400E">vùng POI HTF</text>

  <!-- price path -->
  <polyline points="56,110 90,150 120,135 155,185 185,170 215,215 240,244 258,222 276,206 292,224 310,252 330,290 352,346 372,352 388,318 402,282 424,296 444,240 462,252 484,180 506,120"
            fill="none" stroke="#1F2937" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- sweep #1 marker -->
  <circle cx="240" cy="244" r="5" fill="#2563EB"/>
  <text x="180" y="266" font-size="10.5" font-weight="700" fill="#2563EB">Sweep #1: wick qua Asia Low</text>
  <text x="180" y="280" font-size="10" fill="#3B82F6">→ trader vào Long, stop sát dưới wick</text>

  <!-- stop hunt marker -->
  <circle cx="352" cy="346" r="5" fill="#DC2626"/>
  <text x="250" y="384" font-size="10.5" font-weight="700" fill="#B91C1C">Sweep #2: xuyên PDL — stop của Entry #1 bị lấy</text>
  <text x="250" y="398" font-size="10" fill="#DC2626">đảo THẬT chỉ xảy ra ở đây: reclaim + displacement + SMT</text>

  <!-- real reversal arrow -->
  <path d="M 462 250 L 500 140" stroke="#16A34A" stroke-width="3" fill="none" marker-end="url(#arrGreen)"/>
  <defs>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <!-- right side rules box -->
  <rect x="548" y="72" width="190" height="384" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="562" y="98" font-size="12.5" font-weight="700" fill="#1F2937">Quy tắc sống sót</text>

  <text x="562" y="124" font-size="10.5" font-weight="700" fill="#2563EB">① Vẽ bản đồ pool trước phiên</text>
  <text x="562" y="139" font-size="10" fill="#374151">Xếp tầng: Asia H/L → London</text>
  <text x="562" y="152" font-size="10" fill="#374151">H/L → PDH/PDL → PWH/PWL.</text>
  <text x="562" y="165" font-size="10" fill="#374151">Pool nông chỉ là MỒI khi còn</text>
  <text x="562" y="178" font-size="10" fill="#374151">pool sâu hơn trùng POI HTF.</text>

  <text x="562" y="206" font-size="10.5" font-weight="700" fill="#B45309">② Entry tại pool mồi = size nhỏ</text>
  <text x="562" y="221" font-size="10" fill="#374151">Hoặc bỏ hẳn: chỉ trade sweep</text>
  <text x="562" y="234" font-size="10" fill="#374151">tại pool trùng POI HTF + đúng</text>
  <text x="562" y="247" font-size="10" fill="#374151">discount/premium.</text>

  <text x="562" y="275" font-size="10.5" font-weight="700" fill="#DC2626">③ Stop ngoài POI, không sát wick</text>
  <text x="562" y="290" font-size="10" fill="#374151">Stop sát wick sweep #1 chính là</text>
  <text x="562" y="303" font-size="10" fill="#374151">thanh khoản cho sweep #2.</text>

  <text x="562" y="331" font-size="10.5" font-weight="700" fill="#15803D">④ Re-entry MỘT lần duy nhất</text>
  <text x="562" y="346" font-size="10" fill="#374151">Nếu bị quét đúng kịch bản dự</text>
  <text x="562" y="359" font-size="10" fill="#374151">phòng (pool sâu hơn + sequence</text>
  <text x="562" y="372" font-size="10" fill="#374151">đầy đủ) → được vào lại 1 lần.</text>
  <text x="562" y="385" font-size="10" fill="#374151">Không trung bình giá, không</text>
  <text x="562" y="398" font-size="10" fill="#374151">"gỡ" lần 3.</text>

  <text x="562" y="426" font-size="10" font-weight="700" fill="#6B7280">Journal: swept_pool_tier,</text>
  <text x="562" y="440" font-size="10" font-weight="700" fill="#6B7280">re_entry_taken (true/false)</text>
</svg>
