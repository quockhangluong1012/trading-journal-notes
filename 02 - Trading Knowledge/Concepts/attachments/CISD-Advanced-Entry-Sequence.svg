<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Quy trình vào lệnh bằng CISD (bullish reversal mẫu)</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Sweep SSL → CISD close → displacement để lại FVG → entry tại FVG/OB → target BSL. Stop dưới wick sweep.</text>

  <rect x="24" y="72" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- CISD line -->
  <line x1="80" y1="150" x2="700" y2="150" stroke="#0EA5E9" stroke-width="1.8" stroke-dasharray="8 4"/>
  <text x="600" y="144" font-size="10.5" font-weight="700" fill="#0284C7">CISD level</text>

  <!-- target BSL -->
  <line x1="80" y1="100" x2="700" y2="100" stroke="#B91C1C" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="600" y="94" font-size="10.5" font-weight="700" fill="#B91C1C">Target = BSL</text>

  <!-- bearish delivery -->
  <rect x="100" y="160" width="14" height="50" fill="#DC2626"/><rect x="126" y="180" width="14" height="60" fill="#DC2626"/><rect x="152" y="210" width="14" height="70" fill="#DC2626"/>
  <text x="96" y="300" font-size="10" fill="#B91C1C">delivery giảm</text>

  <!-- sweep -->
  <rect x="180" y="250" width="14" height="70" fill="#16A34A"/>
  <circle cx="187" cy="322" r="9" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="160" y="342" font-size="10" font-weight="700" fill="#B45309">① sweep SSL</text>

  <!-- displacement closing above CISD -->
  <rect x="212" y="130" width="14" height="130" fill="#16A34A"/>
  <circle cx="219" cy="140" r="6" fill="#0EA5E9"/>
  <text x="230" y="128" font-size="10" font-weight="700" fill="#0284C7">② CISD close (displacement)</text>
  <!-- FVG -->
  <rect x="206" y="205" width="34" height="30" fill="#DCFCE7" stroke="#16A34A" stroke-dasharray="3 3"/>

  <!-- retrace to FVG -->
  <rect x="248" y="150" width="14" height="70" fill="#DC2626"/>
  <rect x="274" y="175" width="14" height="55" fill="#DC2626"/>
  <circle cx="281" cy="212" r="9" fill="none" stroke="#16A34A" stroke-width="2.5"/>
  <text x="296" y="200" font-size="10" font-weight="700" fill="#166534">③ entry: hồi về FVG/OB tại CISD level</text>

  <!-- rally to target -->
  <rect x="300" y="120" width="14" height="80" fill="#16A34A"/>
  <rect x="326" y="100" width="14" height="70" fill="#16A34A"/>
  <rect x="352" y="95" width="14" height="55" fill="#16A34A"/>
  <text x="380" y="115" font-size="10" font-weight="700" fill="#166534">④ delivery mua đẩy về BSL</text>

  <!-- stop annotation -->
  <line x1="80" y1="330" x2="420" y2="330" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="90" y="325" font-size="10" font-weight="700" fill="#B91C1C">Stop: dưới wick nến sweep</text>

  <text x="24" y="400" font-size="11.5" font-weight="700" fill="#374151">Chuỗi chuẩn:  Sweep → CISD close → FVG → Entry (50% CE / OB) → BE sau IRL → Target ERL/BSL</text>
</svg>
