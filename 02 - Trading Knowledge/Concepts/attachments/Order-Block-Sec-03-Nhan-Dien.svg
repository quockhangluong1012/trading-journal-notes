<svg viewBox="0 0 760 450" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obn" markerWidth="9" markerHeight="9" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6B7280"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="450" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cấu trúc nhận diện — Chuỗi 5 dấu hiệu OB hợp lệ</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Đúng thứ tự mới có edge: Sweep → OB → Displacement → BOS/MSS → Imbalance</text>

  <!-- sequence steps -->
  <rect x="24" y="74" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="89" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">1 · Sweep</text>
  <text x="89" y="120" text-anchor="middle" font-size="10.5" fill="#374151">Quét đỉnh/đáy,</text>
  <text x="89" y="135" text-anchor="middle" font-size="10.5" fill="#374151">equal highs/lows</text>
  <line x1="154" y1="109" x2="176" y2="109" stroke="#6B7280" stroke-width="1.5" marker-end="url(#obn)"/>

  <rect x="178" y="74" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="243" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">2 · OB</text>
  <text x="243" y="120" text-anchor="middle" font-size="10.5" fill="#374151">Nến ngược hướng</text>
  <text x="243" y="135" text-anchor="middle" font-size="10.5" fill="#374151">cuối cùng</text>
  <line x1="308" y1="109" x2="330" y2="109" stroke="#6B7280" stroke-width="1.5" marker-end="url(#obn)"/>

  <rect x="332" y="74" width="130" height="70" rx="8" fill="#FFFFFF" stroke="#1D4ED8"/>
  <text x="397" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">3 · Displacement</text>
  <text x="397" y="120" text-anchor="middle" font-size="10.5" fill="#374151">Thân lớn, urgency,</text>
  <text x="397" y="135" text-anchor="middle" font-size="10.5" fill="#374151">đóng quyết đoán</text>
  <line x1="462" y1="109" x2="484" y2="109" stroke="#6B7280" stroke-width="1.5" marker-end="url(#obn)"/>

  <rect x="486" y="74" width="120" height="70" rx="8" fill="#FFFFFF" stroke="#7C3AED"/>
  <text x="546" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">4 · BOS/MSS</text>
  <text x="546" y="120" text-anchor="middle" font-size="10.5" fill="#374151">Phá cấu trúc</text>
  <text x="546" y="135" text-anchor="middle" font-size="10.5" fill="#374151">có ý nghĩa</text>
  <line x1="606" y1="109" x2="628" y2="109" stroke="#6B7280" stroke-width="1.5" marker-end="url(#obn)"/>

  <rect x="630" y="74" width="106" height="70" rx="8" fill="#FFFFFF" stroke="#3B82F6"/>
  <text x="683" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#3B82F6">5 · FVG</text>
  <text x="683" y="120" text-anchor="middle" font-size="10.5" fill="#374151">Imbalance</text>
  <text x="683" y="135" text-anchor="middle" font-size="10.5" fill="#374151">để lại</text>

  <!-- illustrative chart of the sequence (bullish) -->
  <rect x="24" y="164" width="712" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="186" font-size="12" font-weight="700" fill="#374151">Ví dụ Bullish OB</text>
  <line x1="60" y1="320" x2="700" y2="320" stroke="#DC2626" stroke-dasharray="4 3" opacity="0.7"/>
  <text x="60" y="336" font-size="10" fill="#DC2626">SSL (sweep ①)</text>
  <!-- down move + sweep low -->
  <line x1="110" y1="210" x2="110" y2="270" stroke="#DC2626" stroke-width="1.3"/><rect x="105" y="222" width="10" height="40" fill="#DC2626"/>
  <line x1="140" y1="240" x2="140" y2="335" stroke="#DC2626" stroke-width="1.3"/><rect x="135" y="255" width="10" height="55" fill="#DC2626"/>
  <!-- OB candle -->
  <rect x="164" y="278" width="26" height="52" fill="#16A34A" opacity="0.12"/>
  <rect x="164" y="278" width="26" height="52" fill="none" stroke="#16A34A" stroke-dasharray="4 3"/>
  <line x1="177" y1="270" x2="177" y2="330" stroke="#DC2626" stroke-width="1.3"/><rect x="172" y="282" width="10" height="45" fill="#DC2626"/>
  <text x="195" y="300" font-size="10" fill="#16A34A">OB ②</text>
  <!-- displacement up -->
  <line x1="230" y1="200" x2="230" y2="300" stroke="#16A34A" stroke-width="1.3"/><rect x="225" y="214" width="10" height="80" fill="#16A34A"/>
  <line x1="262" y1="190" x2="262" y2="250" stroke="#16A34A" stroke-width="1.3"/><rect x="257" y="200" width="10" height="45" fill="#16A34A"/>
  <rect x="236" y="245" width="34" height="34" fill="#3B82F6" opacity="0.10"/>
  <rect x="236" y="245" width="34" height="34" fill="none" stroke="#3B82F6" stroke-dasharray="3 2"/>
  <text x="278" y="215" font-size="10" fill="#16A34A">displacement ③</text>
  <text x="278" y="266" font-size="10" fill="#3B82F6">FVG ⑤</text>
  <line x1="150" y1="235" x2="300" y2="235" stroke="#7C3AED" stroke-dasharray="3 3"/>
  <text x="305" y="238" font-size="10" fill="#7C3AED">BOS ④ (phá swing high nội bộ)</text>

  <text x="40" y="404" font-size="12" font-weight="600" fill="#D97706">Bắt buộc: OB gắn displacement phá BOS/MSS + xác định đỉnh/đáy OB + Mean Threshold (50%).</text>
  <text x="40" y="426" font-size="11" fill="#6B7280">Thiếu displacement/sweep → chỉ là supply/demand thường, KHÔNG phải OB theo ICT.</text>
</svg>
