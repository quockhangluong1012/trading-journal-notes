<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Overlap giữa Premium/Discount và OTE (62-79%)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Khi dải OTE của nhịp displacement trùng khớp vùng Discount (Long) / Premium (Short) của dealing range — confluence mạnh nhất.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Left panel: aligned case -->
  <text x="60" y="94" font-size="12.5" font-weight="700" fill="#166534">A. TRÙNG KHỚP — cùng một swing làm dealing range và làm nhịp fib OTE</text>

  <rect x="60" y="104" width="300" height="220" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="60" y="104" width="300" height="110" fill="#DC2626" opacity="0.06"/>
  <text x="66" y="118" font-size="10" fill="#B91C1C">Premium (50-100%)</text>
  <rect x="60" y="214" width="300" height="110" fill="#16A34A" opacity="0.06"/>
  <text x="66" y="320" font-size="10" fill="#166534">Discount (0-50%)</text>
  <line x1="60" y1="214" x2="360" y2="214" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- OTE band 62-79% within same range: height 220px total, 0%=324,100%=104 -> per% =2.2px -->
  <!-- 62%: y=324-0.62*220=188.6 ; 79%: y=324-0.79*220=150.2 -->
  <rect x="60" y="150.2" width="300" height="38.4" fill="#F59E0B" opacity="0.30" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="150" y="173" font-size="10.5" font-weight="700" fill="#92400E">OTE 62-79%</text>
  <text x="66" y="200" font-size="9" fill="#92400E">nằm gọn trong Discount</text>

  <text x="66" y="345" font-size="10" fill="#374151">Fib kéo trên CHÍNH nhịp tạo dealing range này</text>
  <text x="66" y="360" font-size="10" font-weight="700" fill="#15803D">→ OTE + Discount CỘNG HƯỞNG = entry mạnh nhất</text>

  <!-- Right panel: diverging case -->
  <text x="410" y="94" font-size="12.5" font-weight="700" fill="#B91C1C">B. PHÂN KỲ — OTE tính trên swing khác với dealing range</text>

  <rect x="410" y="104" width="300" height="220" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.2"/>
  <rect x="410" y="104" width="300" height="110" fill="#DC2626" opacity="0.06"/>
  <text x="416" y="118" font-size="10" fill="#B91C1C">Premium (50-100%)</text>
  <rect x="410" y="214" width="300" height="110" fill="#16A34A" opacity="0.06"/>
  <text x="416" y="320" font-size="10" fill="#166534">Discount (0-50%)</text>
  <line x1="410" y1="214" x2="710" y2="214" stroke="#3B82F6" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- OTE band computed on a smaller internal leg, landing near/above EQ (near premium) -->
  <rect x="410" y="196" width="300" height="30" fill="#F59E0B" opacity="0.30" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="500" y="216" font-size="10.5" font-weight="700" fill="#92400E">OTE (nhịp nhỏ nội bộ)</text>
  <text x="416" y="242" font-size="9" fill="#92400E">lấn qua gần EQ / Premium</text>

  <text x="416" y="345" font-size="10" fill="#374151">Fib kéo trên một nhịp displacement LTF nhỏ hơn,</text>
  <text x="416" y="360" font-size="10" font-weight="700" fill="#B91C1C">khác swing dùng để đo dealing range → xung đột</text>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="428" font-size="11.5" font-weight="700" fill="#92400E">Quy tắc giải quyết xung đột: nếu OTE (tính trên nhịp displacement đã phá cấu trúc) rơi ra ngoài Discount/Premium</text>
  <text x="36" y="446" font-size="11.5" font-weight="700" fill="#92400E">của dealing range đúng, ưu tiên vị trí Premium/Discount của HTF dealing range — OTE chỉ tinh entry, không đổi hướng.</text>
</svg>
