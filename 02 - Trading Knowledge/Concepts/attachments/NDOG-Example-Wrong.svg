<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — coi "gap" forex mỏng như NDOG thật &amp; vào ngược Daily Bias</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Trên EURUSD (giao dịch 24h), chênh lệch close/open quanh nửa đêm gần như bằng 0 — không phải NDOG có sức nặng như futures.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Panel A: fake forex "NDOG" -->
  <rect x="44" y="90" width="330" height="180" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="52" y="108" font-size="11" font-weight="700" fill="#B91C1C">EURUSD — không có halt thật</text>

  <line x1="70" y1="150" x2="340" y2="150" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="76" y="144" font-size="9.5" fill="#6B7280">"Close" 23:59 ET ≈ "Open" 00:00 ET</text>
  <!-- tiny gap box, exaggerated label to show it's negligible -->
  <rect x="150" y="148" width="60" height="6" fill="#DC2626" opacity="0.35"/>
  <text x="150" y="180" font-size="10" font-weight="700" fill="#B91C1C">① Gap ~vài pip — không phải inefficiency thật</text>

  <path d="M80,220 L160,200 L240,230 L320,210" fill="none" stroke="#374151" stroke-width="2"/>
  <text x="90" y="250" font-size="9.5" fill="#6B7280">Giá vẫn giao dịch liên tục qua mốc này (24h)</text>

  <rect x="60" y="260" width="300" height="18" fill="#FEE2E2"/>
  <text x="68" y="273" font-size="10" font-weight="700" fill="#B91C1C">Lỗi: vẽ box to, coi như NDOG futures thật</text>

  <!-- Panel B: entering against Daily Bias at a real NDOG CE -->
  <rect x="396" y="90" width="320" height="180" rx="6" fill="#FFFFFF" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="404" y="108" font-size="11" font-weight="700" fill="#B91C1C">NQ1 — vào ngược Daily Bias tại CE</text>

  <line x1="420" y1="130" x2="700" y2="130" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="426" y="124" font-size="9.5" fill="#1D4ED8">Prior Close</text>
  <line x1="420" y1="200" x2="700" y2="200" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="426" y="216" font-size="9.5" fill="#1D4ED8">Reopen</text>
  <rect x="420" y="130" width="280" height="70" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="3 3"/>
  <line x1="420" y1="165" x2="700" y2="165" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="2 3"/>
  <text x="620" y="160" font-size="9.5" font-weight="700" fill="#B91C1C">CE</text>

  <text x="404" y="250" font-size="10" font-weight="700" fill="#B91C1C">② Daily Bias bearish (giá dưới Midnight Open)</text>
  <path d="M430,225 L470,205 L520,175 L560,165" fill="none" stroke="#16A34A" stroke-width="2" stroke-dasharray="3 2"/>
  <circle cx="560" cy="165" r="6" fill="#16A34A"/>
  <text x="404" y="266" font-size="10" font-weight="700" fill="#B91C1C">nhưng trader vẫn Long ngay khi chạm CE, không xác nhận</text>

  <rect x="60" y="300" width="656" height="18" fill="#FEE2E2"/>
  <text x="68" y="313" font-size="10" font-weight="700" fill="#B91C1C">Kết quả: đóng nến xuyên CE và cạnh đối diện không phản ứng → SL bị quét, cả hai lệnh đều sai logic</text>

  <rect x="24" y="336" width="712" height="120" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="356" font-size="11.5" font-weight="700" fill="#1F2937">Bài học</text>
  <text x="36" y="374" font-size="10.5" fill="#374151">① Forex giao dịch 24 giờ, không có halt thật như CME futures → "gap" nửa đêm trên EURUSD/GBPUSD/XAUUSD chỉ là</text>
  <text x="36" y="390" font-size="10.5" fill="#374151">   chênh lệch giá xấp xỉ quanh Midnight Open, sức nặng thấp hơn nhiều so với NDOG futures thật (NQ1/NAS100).</text>
  <text x="36" y="408" font-size="10.5" fill="#374151">② Dù là NDOG futures thật, chạm CE không tự động là lệnh — phải đúng phía Daily Bias và có sweep + MSS xác nhận.</text>
  <text x="36" y="426" font-size="10.5" fill="#374151">③ Với forex, hạ trọng số cho "NDOG" và ưu tiên Midnight Open + Daily Bias làm bộ lọc hướng chính.</text>
  <text x="36" y="444" font-size="10" fill="#6B7280">Ghi `ndog_instrument_type` (futures / forex-approx) vào journal để tách riêng thống kê hai nhóm này.</text>
</svg>
