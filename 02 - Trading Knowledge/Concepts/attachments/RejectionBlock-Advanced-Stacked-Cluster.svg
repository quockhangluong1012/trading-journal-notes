<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cụm Rejection Block (stacked/layered wicks) — "rejection shelf"</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">3-4 nến liên tiếp cùng để lại wick nhỏ hơn gần cùng một mức, thay vì một wick spike đơn lẻ.</text>

  <rect x="24" y="70" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- approach into swing low zone -->
  <path d="M70,140 L130,190 L180,230" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="70" y="128" font-size="10.5" fill="#6B7280">① Down-move tiếp cận vùng thanh khoản</text>

  <!-- SSL level -->
  <line x1="180" y1="330" x2="620" y2="330" stroke="#6B7280" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="186" y="326" font-size="10" fill="#374151">Mức thanh khoản chung bị từ chối nhiều lần</text>

  <!-- Candle cluster: 4 candles each with progressively smaller wick near same level -->
  <!-- candle 1: biggest wick -->
  <rect x="200" y="240" width="18" height="20" fill="#16A34A" opacity="0.85" rx="1"/>
  <rect x="207" y="260" width="4" height="66" fill="#16A34A" opacity="0.85"/>
  <text x="195" y="234" font-size="9" fill="#15803D">nến 1</text>

  <!-- candle 2 -->
  <rect x="240" y="235" width="18" height="20" fill="#16A34A" opacity="0.8" rx="1"/>
  <rect x="247" y="255" width="4" height="55" fill="#16A34A" opacity="0.8"/>
  <text x="235" y="229" font-size="9" fill="#15803D">nến 2</text>

  <!-- candle 3 -->
  <rect x="280" y="232" width="18" height="18" fill="#16A34A" opacity="0.75" rx="1"/>
  <rect x="287" y="250" width="4" height="48" fill="#16A34A" opacity="0.75"/>
  <text x="275" y="226" font-size="9" fill="#15803D">nến 3</text>

  <!-- candle 4 -->
  <rect x="320" y="228" width="18" height="18" fill="#16A34A" opacity="0.7" rx="1"/>
  <rect x="327" y="246" width="4" height="40" fill="#16A34A" opacity="0.7"/>
  <text x="315" y="222" font-size="9" fill="#15803D">nến 4</text>

  <!-- envelope box: from highest wick extreme in cluster to nearest body edge -->
  <rect x="192" y="228" width="154" height="98" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-dasharray="4 3"/>
  <text x="196" y="220" font-size="10.5" font-weight="700" fill="#B45309">② Envelope RB — bao trùm cả cụm</text>
  <text x="196" y="352" font-size="10" fill="#92400E">Từ wick extreme thấp nhất → mép body gần nhất</text>

  <!-- displacement out after the shelf -->
  <path d="M338,240 L380,190 L420,210 L470,120" fill="none" stroke="#16A34A" stroke-width="2.8"/>
  <rect x="474" y="112" width="13" height="66" fill="#16A34A" rx="1"/>
  <text x="490" y="128" font-size="10.5" font-weight="700" fill="#15803D">③ Displacement + MSS rời khỏi shelf</text>

  <!-- retest -->
  <path d="M487,120 L520,180 L560,240 L600,190 L650,110" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="560" cy="240" r="7" fill="#16A34A"/>
  <text x="560" y="266" font-size="10.5" font-weight="700" fill="#15803D">④ Retest envelope RB = Long</text>

  <rect x="24" y="386" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="406" font-size="11.5" font-weight="700" fill="#92400E">So với một wick spike đơn lẻ, cụm RB (2-4 nỗ lực từ chối liên tiếp) hấp thụ nhiều thanh khoản hơn</text>
  <text x="36" y="424" font-size="11.5" font-weight="700" fill="#92400E">→ dấu chân institutional rõ hơn. RB zone vẽ như một "kệ" (shelf), không phải một điểm.</text>
</svg>
