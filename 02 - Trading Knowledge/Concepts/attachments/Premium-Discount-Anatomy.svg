<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Dealing Range — Premium / Equilibrium / Discount + OTE</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cấu trúc đầy đủ: swing high/low xác định range, mốc 50% chia premium/discount, dải OTE 62–79% nằm trong discount (cho Long).</text>

  <rect x="24" y="70" width="712" height="350" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Range vertical axis reference -->
  <!-- top = swing high = 100% for a bullish-fib-drawn-low-to-high labeling: here we label 0/50/100 per PD convention (0 at low, 100 at high) -->

  <!-- Premium zone (upper half) -->
  <rect x="60" y="96" width="600" height="140" fill="#DC2626" opacity="0.07"/>
  <text x="70" y="112" font-size="12" font-weight="700" fill="#B91C1C">PREMIUM (50% → 100%) — vùng "đắt", đi tìm SHORT</text>

  <!-- Discount zone (lower half) -->
  <rect x="60" y="236" width="600" height="140" fill="#16A34A" opacity="0.07"/>
  <text x="70" y="368" font-size="12" font-weight="700" fill="#166534">DISCOUNT (0% → 50%) — vùng "rẻ", đi tìm LONG</text>

  <!-- Swing high line (100%) -->
  <line x1="60" y1="96" x2="660" y2="96" stroke="#DC2626" stroke-width="2"/>
  <text x="668" y="100" font-size="11" font-weight="700" fill="#B91C1C">100% — Swing High</text>

  <!-- Equilibrium line (50%) -->
  <line x1="60" y1="236" x2="660" y2="236" stroke="#3B82F6" stroke-width="2.4" stroke-dasharray="7 4"/>
  <text x="668" y="232" font-size="11" font-weight="700" fill="#1D4ED8">50% — Equilibrium (EQ)</text>

  <!-- Swing low line (0%) -->
  <line x1="60" y1="376" x2="660" y2="376" stroke="#16A34A" stroke-width="2"/>
  <text x="668" y="380" font-size="11" font-weight="700" fill="#166534">0% — Swing Low</text>

  <!-- OTE band inside discount: 62%-79% measured from low(0%) to high(100%) -->
  <!-- range pixel span: y=96 (100%) to y=376 (0%), height=280px total -->
  <!-- 62% level: y = 376 - 0.62*280 = 202.4 ; 79% level: y = 376 - 0.79*280 = 154.8 -->
  <rect x="60" y="154.8" width="600" height="47.6" fill="#F59E0B" opacity="0.22" stroke="#B45309" stroke-dasharray="5 3"/>
  <text x="672" y="160" font-size="10.5" font-weight="700" fill="#92400E">79%</text>
  <text x="672" y="206" font-size="10.5" font-weight="700" fill="#92400E">62%</text>
  <text x="500" y="182" font-size="11" font-weight="700" fill="#92400E">Dải OTE (62–79%)</text>
  <line x1="60" y1="178.6" x2="660" y2="178.6" stroke="#B45309" stroke-width="1.4" stroke-dasharray="2 2"/>
  <text x="672" y="182" font-size="9.5" fill="#92400E">70.5% sweet spot</text>

  <!-- Price path illustration -->
  <path d="M90,96 L140,140 L220,178 L300,220 L360,236 L410,270 L470,300 L520,178 L560,140 L610,110" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="470" cy="300" r="6" fill="#16A34A"/>
  <text x="420" y="322" font-size="10" font-weight="700" fill="#15803D">Retrace vào Discount + OTE → Long</text>

  <!-- annotation callouts -->
  <text x="70" y="128" font-size="10" fill="#991B1B">Bearish PD Array (OB/FVG) đáng tin hơn ở đây</text>
  <text x="70" y="352" font-size="10" fill="#166534">Bullish PD Array (OB/FVG) đáng tin hơn ở đây</text>

  <rect x="24" y="428" width="712" height="36" rx="6" fill="#FEF3C7"/>
  <text x="36" y="450" font-size="11.5" font-weight="700" fill="#92400E">Range đúng (swing có displacement/BOS) → EQ đúng → Premium/Discount đúng → OTE 62–79% mới có ý nghĩa để vào lệnh.</text>
</svg>
