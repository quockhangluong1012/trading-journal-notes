<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="mg" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#16A34A"/></marker>
    <marker id="mr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Fair Value Gap — Xác nhận / Vô hiệu hóa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Respect tại CE vs đóng nến xuyên qua (acceptance) → IFVG</text>

  <!-- Panel trái: hợp lệ -->
  <rect x="24" y="68" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="92" font-size="14" font-weight="700" fill="#16A34A">Hợp lệ — Respect tại CE</text>
  <rect x="44" y="200" width="200" height="56" fill="#3B82F6" opacity="0.10"/>
  <rect x="44" y="200" width="200" height="56" fill="none" stroke="#3B82F6"/>
  <line x1="44" y1="228" x2="244" y2="228" stroke="#1D4ED8" stroke-dasharray="5 3" stroke-width="1.5"/>
  <text x="250" y="232" font-size="11" fill="#1D4ED8">CE (50%)</text>
  <polyline points="60,130 96,164 138,226" fill="none" stroke="#16A34A" stroke-width="2"/>
  <line x1="138" y1="226" x2="138" y2="240" stroke="#16A34A" stroke-width="2"/>
  <polyline points="138,226 176,172 224,124" fill="none" stroke="#16A34A" stroke-width="2" marker-end="url(#mg)"/>
  <text x="150" y="252" font-size="10" fill="#16A34A">Reject tại CE</text>
  <text x="40" y="290" font-size="11" fill="#374151">• Chạm CE / mép gap rồi reject, không đóng nến xuyên</text>
  <text x="40" y="308" font-size="11" fill="#374151">• LTF có MSS + displacement xác nhận</text>
  <text x="40" y="326" font-size="11" fill="#374151">• Entry quanh CE — stop ngoài distal / sweep low</text>

  <!-- Panel phải: vô hiệu -->
  <rect x="386" y="68" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="92" font-size="14" font-weight="700" fill="#DC2626">Vô hiệu — Invalidation → IFVG</text>
  <rect x="406" y="170" width="200" height="52" fill="#3B82F6" opacity="0.10"/>
  <rect x="406" y="170" width="200" height="52" fill="none" stroke="#3B82F6" stroke-dasharray="4 3"/>
  <text x="416" y="200" font-size="11" font-weight="700" fill="#D97706">FVG fail → IFVG (kháng cự)</text>
  <polyline points="420,118 452,150 492,252 528,262 556,248 580,226 616,296" fill="none" stroke="#DC2626" stroke-width="2" marker-end="url(#mr)"/>
  <text x="452" y="280" font-size="10" fill="#DC2626">Đóng thân + acceptance</text>
  <text x="612" y="258" font-size="10" fill="#DC2626">Retest → Short</text>
  <text x="402" y="290" font-size="11" fill="#374151">• Đóng nến xuyên toàn bộ FVG + giữ ngoài = invalid</text>
  <text x="402" y="308" font-size="11" fill="#374151">• Vùng đảo cực: bullish fail → kháng cự (IFVG)</text>
  <text x="402" y="326" font-size="11" fill="#374151">• Không gồng lệnh — delivery state đã flip</text>

  <!-- Quick ref -->
  <rect x="24" y="384" width="224" height="72" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="406" font-size="12" font-weight="700" fill="#16A34A">Respect</text>
  <text x="36" y="424" font-size="11" fill="#374151">Chạm CE / mép gap rồi reject</text>
  <text x="36" y="440" font-size="11" fill="#374151">→ FVG còn hiệu lực, tìm entry</text>
  <rect x="270" y="384" width="224" height="72" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="282" y="406" font-size="12" font-weight="700" fill="#D97706">Full fill / Mitigation</text>
  <text x="282" y="424" font-size="11" fill="#374151">Lấp hết gap rồi mới reject</text>
  <text x="282" y="440" font-size="11" fill="#374151">→ cần thêm POI / confirmation</text>
  <rect x="516" y="384" width="224" height="72" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="528" y="406" font-size="12" font-weight="700" fill="#DC2626">Invalidation → IFVG</text>
  <text x="528" y="424" font-size="11" fill="#374151">Đóng nến xuyên + acceptance</text>
  <text x="528" y="440" font-size="11" fill="#374151">→ đảo cực, trade theo hướng mới</text>
</svg>
