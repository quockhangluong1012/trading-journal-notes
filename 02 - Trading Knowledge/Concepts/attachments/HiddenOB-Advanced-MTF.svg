<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Hidden OB đa khung (MTF) — HTF tap → LTF confirm → entry</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Khung trên quyết định VÙNG; khung dưới quyết định GIỜ VÀO qua CISD/MSS.</text>

  <!-- HTF panel -->
  <rect x="24" y="72" width="352" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="12.5" font-weight="700" fill="#1F2937">HTF (H4/H1) — mark Hidden OB</text>

  <rect x="150" y="250" width="120" height="70" fill="#DBEAFE" stroke="#1D4ED8" stroke-dasharray="4 3"/>
  <text x="158" y="245" font-size="10" font-weight="700" fill="#1D4ED8">Hidden OB (2 nến xanh)</text>
  <line x1="170" y1="250" x2="170" y2="330" stroke="#16A34A" stroke-width="1.4"/><rect x="164.5" y="265" width="11" height="40" fill="#16A34A"/>
  <line x1="195" y1="258" x2="195" y2="345" stroke="#16A34A" stroke-width="1.4"/><rect x="189.5" y="270" width="11" height="40" fill="#16A34A"/>

  <!-- price rallies then retraces into zone -->
  <path d="M215,290 L245,200 L280,150 L310,180 L330,260 L345,300" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="345" cy="300" r="7" fill="none" stroke="#B45309" stroke-width="2.5"/>
  <text x="230" y="360" font-size="10.5" font-weight="700" fill="#B45309">Giá quay lại TAP vùng Hidden OB</text>
  <text x="230" y="378" font-size="10" fill="#6B7280">Chờ retrace — không đuổi giá.</text>

  <!-- arrow zoom to LTF -->
  <path d="M300 305 Q360 320 405 320" fill="none" stroke="#1D4ED8" stroke-width="2" stroke-dasharray="5 3"/>
  <polygon points="405,320 395,314 396,325" fill="#1D4ED8"/>
  <text x="270" y="405" font-size="10.5" font-weight="700" fill="#1D4ED8">drop xuống LTF ⤵</text>

  <!-- LTF panel -->
  <rect x="392" y="72" width="344" height="360" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.3"/>
  <text x="408" y="94" font-size="12.5" font-weight="700" fill="#1D4ED8">LTF (M5/M15) — chờ CISD / MSS</text>

  <!-- price inside OB, forms lower then displacement up = CISD/MSS -->
  <path d="M430,150 L455,220 L480,280 L505,320" fill="none" stroke="#DC2626" stroke-width="2"/>
  <line x1="430" y1="330" x2="710" y2="330" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="600" y="325" font-size="9.5" fill="#6B7280">proximal Hidden OB</text>

  <!-- CISD/MSS displacement up -->
  <path d="M505,320 L540,240 L560,255 L600,150" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <line x1="510" y1="200" x2="620" y2="200" stroke="#166534" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="510" y="194" font-size="10" font-weight="700" fill="#166534">CISD/MSS: đóng nến phá cấu trúc</text>

  <!-- FVG -->
  <rect x="545" y="235" width="70" height="24" fill="#3B82F6" opacity="0.18"/>
  <text x="620" y="252" font-size="9.5" fill="#1D4ED8">FVG</text>

  <!-- entry on retest -->
  <path d="M600,150 L630,210 L650,240 L680,180" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="650" cy="240" r="6" fill="#16A34A"/>
  <text x="470" y="370" font-size="10.5" font-weight="700" fill="#166534">Entry Long tại close CISD hoặc retest sạch</text>
  <text x="470" y="388" font-size="10" fill="#6B7280">Stop dưới swing low của CISD/MSS. HTF Hidden OB càng lớn → move càng lớn.</text>
</svg>
