<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chiếu Standard Deviation từ chân CISD để tìm mục tiêu</text>
  <text x="24" y="55" font-size="12.5" fill="#6B7280">Đo đoạn từ SWEEP tới CISD level (leg thao túng) rồi chiếu -1/-2/-2.5/-4 SD làm target khách quan.</text>

  <rect x="24" y="72" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- CISD level -->
  <line x1="90" y1="180" x2="560" y2="180" stroke="#0EA5E9" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="566" y="184" font-size="10" font-weight="700" fill="#0284C7">CISD level (0)</text>
  <!-- sweep low -->
  <line x1="90" y1="300" x2="560" y2="300" stroke="#F59E0B" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="566" y="304" font-size="10" font-weight="700" fill="#B45309">Sweep low (-1 SD anchor)</text>

  <!-- the measured leg bracket -->
  <line x1="70" y1="180" x2="70" y2="300" stroke="#6B7280" stroke-width="1.4"/>
  <text x="30" y="244" font-size="10" fill="#6B7280" transform="rotate(-90 34 244)">1 SD = leg</text>

  <!-- candles: bearish leg into sweep, then reversal -->
  <rect x="110" y="188" width="2" height="60" fill="#DC2626"/><rect x="103" y="194" width="14" height="46" fill="#DC2626" rx="1"/>
  <rect x="138" y="220" width="2" height="70" fill="#DC2626"/><rect x="131" y="228" width="14" height="54" fill="#DC2626" rx="1"/>
  <rect x="166" y="256" width="2" height="60" fill="#16A34A"/><rect x="159" y="282" width="14" height="30" fill="#16A34A" rx="1"/>
  <circle cx="167" cy="316" r="8" fill="none" stroke="#F59E0B" stroke-width="2.5"/>
  <rect x="194" y="150" width="2" height="120" fill="#16A34A"/><rect x="187" y="162" width="14" height="100" fill="#16A34A" rx="1"/>
  <circle cx="195" cy="168" r="6" fill="#0EA5E9"/>

  <!-- projection levels above -->
  <line x1="90" y1="120" x2="700" y2="120" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="566" y="114" font-size="10" font-weight="700" fill="#166534">-2 SD  → T1 / IRL</text>
  <line x1="90" y1="90" x2="700" y2="90" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="566" y="84" font-size="10" font-weight="700" fill="#166534">-2.5 SD → T2</text>

  <!-- continuation candles rising to targets -->
  <rect x="230" y="130" width="2" height="80" fill="#16A34A"/><rect x="223" y="140" width="14" height="62" fill="#16A34A" rx="1"/>
  <rect x="262" y="112" width="2" height="70" fill="#16A34A"/><rect x="255" y="120" width="14" height="52" fill="#16A34A" rx="1"/>
  <rect x="294" y="92" width="2" height="66" fill="#16A34A"/><rect x="287" y="98" width="14" height="50" fill="#16A34A" rx="1"/>

  <text x="40" y="356" font-size="11" font-weight="700" fill="#1F2937">Công thức:</text>
  <text x="40" y="376" font-size="10.5" fill="#374151">1 SD = |Sweep low → CISD level|. Chiếu bội số theo hướng delivery mới: -2 SD, -2.5 SD, -4 SD.</text>
  <text x="40" y="392" font-size="10.5" fill="#6B7280">Ưu tiên chốt tại SD trùng IRL/ERL hoặc POI HTF (confluence) thay vì SD đơn thuần.</text>
</svg>