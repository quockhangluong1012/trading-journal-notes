<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CBDR sai — range quá rộng + đo sai khung giờ</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Range &gt;40 pip do tin tức, đo cả bóng nến, sai khung giờ → SD vô nghĩa</text>

  <!-- wide box -->
  <rect x="120" y="150" width="200" height="160" fill="#EF4444" opacity="0.12"/>
  <line x1="120" y1="150" x2="640" y2="150" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="120" y1="310" x2="640" y2="310" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="144" font-size="12" fill="#2563EB" font-weight="600">CBDR High (đo cả bóng)</text>
  <text x="124" y="326" font-size="12" fill="#2563EB" font-weight="600">CBDR Low — range &gt; 90 pip (quá rộng)</text>

  <!-- volatile candles with big wicks inside (news) -->
  <rect x="150" y="160" width="2" height="120" fill="#DC2626"/><rect x="144" y="180" width="14" height="60" fill="#DC2626" rx="1"/>
  <rect x="180" y="170" width="2" height="130" fill="#16A34A"/><rect x="174" y="200" width="14" height="70" fill="#16A34A" rx="1"/>
  <rect x="210" y="155" width="2" height="140" fill="#DC2626"/><rect x="204" y="185" width="14" height="80" fill="#DC2626" rx="1"/>
  <rect x="240" y="160" width="2" height="145" fill="#16A34A"/><rect x="234" y="195" width="14" height="75" fill="#16A34A" rx="1"/>
  <rect x="270" y="158" width="2" height="140" fill="#DC2626"/><rect x="264" y="190" width="14" height="78" fill="#DC2626" rx="1"/>

  <text x="340" y="180" font-size="13" fill="#DC2626" font-weight="600">⚠ Bóng nến tin tức bị tính vào range</text>

  <!-- SD lines far out -->
  <line x1="120" y1="80" x2="640" y2="80" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="648" y="84" font-size="12" fill="#9CA3AF">+1 SD (quá xa, vô dụng)</text>
  <line x1="120" y1="380" x2="640" y2="380" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="648" y="384" font-size="12" fill="#9CA3AF">-1 SD (quá xa, vô dụng)</text>

  <!-- price never reaches -->
  <rect x="360" y="220" width="2" height="40" fill="#16A34A"/><rect x="354" y="228" width="14" height="26" fill="#16A34A" rx="1"/>
  <rect x="390" y="225" width="2" height="36" fill="#DC2626"/><rect x="384" y="230" width="14" height="24" fill="#DC2626" rx="1"/>
  <rect x="420" y="222" width="2" height="38" fill="#16A34A"/><rect x="414" y="228" width="14" height="26" fill="#16A34A" rx="1"/>
  <text x="370" y="285" font-size="13" fill="#DC2626">Giá lẹt đẹt trong range, không tới SD</text>

  <text x="24" y="436" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="64" y="436" font-size="12" fill="#374151">Range rộng/đo bóng/sai giờ → SD projection mất giá trị tham chiếu</text>
</svg>
