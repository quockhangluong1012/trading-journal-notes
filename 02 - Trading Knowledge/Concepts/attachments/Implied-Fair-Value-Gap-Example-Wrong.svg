<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Implied FVG sai — nhầm với Inverse FVG (IFVG đảo cực)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">"Implied" = imbalance ẩn (4 nến) ≠ "Inverse" = FVG bị xuyên đảo cực</text>

  <defs><marker id="ard2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#DC2626"/></marker></defs>

  <!-- a normal bullish FVG that got broken (this is INVERSE, not IMPLIED) -->
  <rect x="120" y="150" width="380" height="60" fill="#EF4444" opacity="0.12"/>
  <line x1="120" y1="150" x2="500" y2="150" stroke="#2563EB" stroke-width="1.5"/>
  <line x1="120" y1="210" x2="500" y2="210" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="144" font-size="12" fill="#2563EB" font-weight="600">FVG 3-nến cũ bị đóng nến xuyên qua</text>
  <text x="200" y="186" font-size="13" fill="#DC2626" font-weight="700">Đây là INVERSE FVG, KHÔNG phải Implied!</text>

  <!-- 3 candle bullish FVG -->
  <rect x="150" y="220" width="2" height="40" fill="#16A34A"/><rect x="144" y="228" width="14" height="24" fill="#16A34A" rx="1"/>
  <rect x="185" y="120" width="2" height="130" fill="#16A34A"/><rect x="179" y="128" width="14" height="105" fill="#16A34A" rx="1"/>
  <rect x="220" y="120" width="2" height="50" fill="#16A34A"/><rect x="214" y="125" width="14" height="38" fill="#16A34A" rx="1"/>

  <!-- price closes through it downward (inversion) -->
  <rect x="265" y="160" width="2" height="55" fill="#DC2626"/><rect x="259" y="168" width="14" height="42" fill="#DC2626" rx="1"/>
  <rect x="300" y="200" width="2" height="60" fill="#DC2626"/><rect x="294" y="215" width="14" height="44" fill="#DC2626" rx="1"/>
  <rect x="335" y="245" width="2" height="65" fill="#DC2626"/><rect x="329" y="258" width="14" height="48" fill="#DC2626" rx="1"/>
  <path d="M 290 230 L 330 280" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ard2)"/>
  <text x="345" y="290" font-size="12" fill="#DC2626">Close xuyên → đảo cực = Inverse FVG</text>

  <!-- crossed-out IMPLIED label -->
  <text x="120" y="350" font-size="14" fill="#DC2626" font-weight="700">✗ Gọi nhầm vùng này là "Implied FVG"</text>
  <line x1="120" y1="345" x2="430" y2="345" stroke="#DC2626" stroke-width="2"/>

  <text x="120" y="380" font-size="12" fill="#374151">Implied FVG phải xác định từ trung điểm bóng 2 nến lớn (mô hình 4 nến),</text>
  <text x="120" y="398" font-size="12" fill="#374151">không liên quan tới việc FVG cũ bị xuyên thủng và đảo cực.</text>

  <text x="24" y="436" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="64" y="436" font-size="12" fill="#374151">Lẫn lộn "Implied" (ẩn) với "Inverse" (đảo cực) — hai khái niệm khác nhau</text>
</svg>
