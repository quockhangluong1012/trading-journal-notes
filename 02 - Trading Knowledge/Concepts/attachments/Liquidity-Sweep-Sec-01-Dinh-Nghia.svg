<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Liquidity Sweep — Định nghĩa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Quét mức tập trung lệnh chờ rồi ĐẢO • Phân biệt Sweep (wick + reclaim) với Break thật (đóng nến ngoài)</text>

  <rect x="24" y="70" width="350" height="340" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="14" font-weight="700" fill="#16A34A">✔ Sweep → đảo chiều</text>
  <text x="40" y="111" font-size="11" fill="#6B7280">Wick xuyên → đóng lại trong vùng → displacement</text>
  <line x1="44" y1="300" x2="354" y2="300" stroke="#DC2626" stroke-dasharray="5 3" stroke-width="1.3"/>
  <text x="44" y="316" font-size="10" fill="#DC2626">SSL / equal lows (pool)</text>
  <line x1="80" y1="180" x2="80" y2="250" stroke="#DC2626" stroke-width="1.4"/><rect x="74" y="195" width="12" height="45" fill="#DC2626"/>
  <line x1="112" y1="210" x2="112" y2="285" stroke="#DC2626" stroke-width="1.4"/><rect x="106" y="225" width="12" height="50" fill="#DC2626"/>
  <line x1="144" y1="270" x2="144" y2="345" stroke="#DC2626" stroke-width="1.4"/><rect x="138" y="278" width="12" height="18" fill="#16A34A"/>
