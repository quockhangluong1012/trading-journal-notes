  <line x1="180" y1="150" x2="180" y2="290" stroke="#16A34A" stroke-width="1.4"/><rect x="174" y="165" width="12" height="110" fill="#16A34A"/>
  <line x1="212" y1="130" x2="212" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="206" y="142" width="12" height="50" fill="#16A34A"/>
  <text x="230" y="185" font-size="11" font-weight="700" fill="#16A34A">Displacement ↑</text>
  <text x="230" y="201" font-size="10" fill="#374151">+ MSS bullish</text>
  <text x="40" y="392" font-size="10.5" fill="#16A34A">Liquidity đã bị lấy = "nhiên liệu" → tìm Long</text>

  <rect x="386" y="70" width="350" height="340" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="94" font-size="14" font-weight="700" fill="#DC2626">✘ Break thật → tiếp diễn</text>
  <text x="402" y="111" font-size="11" fill="#6B7280">Đóng nến VƯỢT HẲN mức + acceptance → BOS, không đảo</text>
  <line x1="406" y1="230" x2="716" y2="230" stroke="#DC2626" stroke-dasharray="5 3" stroke-width="1.3"/>
  <text x="406" y="246" font-size="10" fill="#DC2626">SSL / equal lows (pool)</text>
  <line x1="442" y1="140" x2="442" y2="210" stroke="#DC2626" stroke-width="1.4"/><rect x="436" y="152" width="12" height="50" fill="#DC2626"/>
  <line x1="474" y1="170" x2="474" y2="235" stroke="#DC2626" stroke-width="1.4"/><rect x="468" y="182" width="12" height="48" fill="#DC2626"/>
  <line x1="506" y1="215" x2="506" y2="300" stroke="#DC2626" stroke-width="1.4"/><rect x="500" y="235" width="12" height="55" fill="#DC2626"/>
  <text x="506" y="315" font-size="9" fill="#DC2626" text-anchor="middle">đóng thân dưới</text>
  <line x1="538" y1="270" x2="538" y2="340" stroke="#DC2626" stroke-width="1.4"/><rect x="532" y="282" width="12" height="45" fill="#DC2626"/>
  <line x1="570" y1="300" x2="570" y2="360" stroke="#DC2626" stroke-width="1.4"/><rect x="564" y="310" width="12" height="40" fill="#DC2626"/>
  <text x="588" y="300" font-size="11" font-weight="700" fill="#DC2626">Giữ giá ngoài</text>
  <text x="588" y="316" font-size="10" fill="#374151">→ tiếp diễn ↓</text>
  <text x="402" y="392" font-size="10.5" fill="#DC2626">Không reclaim → KHÔNG phải sweep, đừng bắt đảo</text>

  <text x="380" y="428" text-anchor="middle" font-size="12" fill="#374151">Sweep là khoảnh khắc manipulation trong chu kỳ AMD — chờ reclaim + displacement, đừng trade ngay trên wick.</text>
