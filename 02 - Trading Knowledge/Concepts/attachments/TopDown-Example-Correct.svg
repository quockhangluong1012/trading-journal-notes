<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="30" font-size="18" font-weight="700" fill="#1F2937">Ví dụ đúng — Ba tầng đồng thuận (discount → bullish)</text>
  <text x="24" y="48" font-size="13" fill="#6B7280">HTF xác định bias &amp; DOL, Intermediate khoanh POI, LTF chờ giá tới rồi mới entry — cùng kể một câu chuyện.</text>

  <!-- Panel 1: HTF D1 -->
  <rect x="24" y="60" width="712" height="110" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.6"/>
  <text x="38" y="80" font-size="12.5" font-weight="700" fill="#1D4ED8">① HTF (D1) — Bias &amp; DOL</text>
  <rect x="38" y="90" width="674" height="70" fill="#3B82F6" opacity="0.06"/>
  <line x1="60" y1="120" x2="720" y2="120" stroke="#374151" stroke-dasharray="2 2" stroke-width="1"/>
  <path d="M60,140 L140,150 L220,118 L300,132 L380,100 L460,112 L540,90 L620,100 L700,70" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="55" y="118" width="90" height="34" fill="#16A34A" opacity="0.10"/>
  <text x="60" y="150" font-size="10" fill="#15803D">discount</text>
  <line x1="700" y1="70" x2="720" y2="70" stroke="#16A34A" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="600" y="64" font-size="10.5" fill="#166534">DOL: buyside [level] (chưa lấy)</text>
  <text x="60" y="165" font-size="10.5" font-weight="700" fill="#15803D">Bias: BULLISH — giá ở discount</text>

  <path d="M380,170 L380,186" stroke="#1F2937" stroke-width="2.2" marker-end="url(#arrC1)"/>

  <!-- Panel 2: Intermediate H1 -->
  <rect x="24" y="190" width="712" height="110" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="38" y="210" font-size="12.5" font-weight="700" fill="#B45309">② Intermediate (H1) — POI</text>
  <rect x="38" y="220" width="674" height="70" fill="#F59E0B" opacity="0.06"/>
  <path d="M60,270 L140,275 L220,255 L280,268 L340,235 L420,245 L500,215 L580,225 L660,200" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="255" y="245" width="70" height="30" fill="#16A34A" opacity="0.35" rx="2"/>
  <text x="255" y="240" font-size="10" font-weight="700" fill="#15803D">Bullish OB + FVG (POI)</text>
  <line x1="660" y1="200" x2="720" y2="200" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="620" y="192" font-size="10" fill="#166534">ERL target</text>

  <path d="M380,300 L380,316" stroke="#1F2937" stroke-width="2.2" marker-end="url(#arrC1)"/>

  <!-- Panel 3: LTF M5 -->
  <rect x="24" y="320" width="712" height="130" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <text x="38" y="340" font-size="12.5" font-weight="700" fill="#15803D">③ LTF (M5, NY Kill Zone) — Sweep → MSS → Entry</text>
  <rect x="38" y="350" width="674" height="88" fill="#16A34A" opacity="0.05"/>
  <path d="M60,410 L120,420 L170,432 L210,405 L250,415 L300,370 L360,385 L420,340 L480,352 L540,320 L620,300" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="210" cy="405" r="6" fill="#DC2626"/>
  <text x="180" y="440" font-size="9.5" fill="#B91C1C">① quét sellside</text>
  <rect x="280" y="360" width="70" height="20" fill="#3B82F6" opacity="0.2"/>
  <text x="282" y="356" font-size="9" fill="#1D4ED8">FVG bullish</text>
  <circle cx="300" cy="370" r="6" fill="#16A34A"/>
  <text x="300" y="358" font-size="9.5" font-weight="700" fill="#15803D">② MSS lên</text>
  <circle cx="360" cy="385" r="7" fill="none" stroke="#16A34A" stroke-width="2.5"/>
  <text x="368" y="390" font-size="10" font-weight="700" fill="#15803D">③ Entry Long (FVG)</text>
  <line x1="540" y1="320" x2="720" y2="320" stroke="#16A34A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="600" y="312" font-size="10" fill="#166534">TP1 IRL → TP2 ERL/DOL</text>

  <defs>
    <marker id="arrC1" markerWidth="9" markerHeight="9" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1F2937"/>
    </marker>
  </defs>

  <text x="38" y="466" font-size="10.5" font-weight="700" fill="#1F2937">Ba tầng cùng hướng bullish — đồng thuận hoàn toàn → lệnh hợp lệ.</text>
</svg>
