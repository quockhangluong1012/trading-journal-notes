<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Daily Bias — Định nghĩa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Giả thuyết có điều kiện về hướng phân phối giá trong ngày — bộ lọc hướng, không phải tín hiệu vào lệnh</text>

  <!-- chart panel: bullish bias example -->
  <rect x="24" y="70" width="452" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <rect x="60" y="130" width="360" height="135" fill="#DC2626" opacity="0.06"/>
  <rect x="60" y="265" width="360" height="135" fill="#16A34A" opacity="0.08"/>
  <line x1="60" y1="130" x2="420" y2="130" stroke="#DC2626" stroke-width="2"/>
  <text x="64" y="122" font-size="11" font-weight="700" fill="#B91C1C">BSL — Draw on liquidity (target)</text>
  <line x1="60" y1="400" x2="420" y2="400" stroke="#16A34A" stroke-width="2"/>
  <text x="64" y="418" font-size="11" font-weight="700" fill="#15803D">SSL</text>
  <line x1="60" y1="265" x2="420" y2="265" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="7 4"/>
  <text x="374" y="260" font-size="10.5" font-weight="700" fill="#374151">EQ 50%</text>

  <!-- HTF POI -->
  <rect x="222" y="340" width="52" height="22" fill="#3B82F6" opacity="0.18" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="150" y="336" font-size="10" fill="#1D4ED8">HTF POI (bullish FVG)</text>

  <!-- price path: retrace into discount, small sweep, hold -->
  <path d="M80 170 L120 240 L150 210 L190 330 L215 300 L235 355 L255 372 L275 330" fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="275" cy="330" r="4" fill="#374151"/>
  <text x="232" y="388" font-size="10" font-weight="700" fill="#D97706">sweep SSL cục bộ</text>

  <!-- expected path -->
  <path d="M275 330 L310 250 L335 275 L365 150" fill="none" stroke="#16A34A" stroke-width="1.8" stroke-dasharray="6 4"/>
  <polygon points="367,142 358,150 368,155" fill="#16A34A"/>

  <!-- invalidation -->
  <line x1="60" y1="385" x2="420" y2="385" stroke="#D97706" stroke-width="1.3" stroke-dasharray="4 3"/>
  <text x="320" y="380" font-size="10" font-weight="700" fill="#D97706">Invalidation</text>

  <text x="40" y="432" font-size="11" fill="#374151">Kỳ vọng: retrace vào discount + POI → sweep SSL → reprice lên → <tspan font-weight="700" fill="#B91C1C">BSL</tspan>; invalid nếu acceptance dưới level.</text>

  <!-- right panel -->
  <rect x="492" y="70" width="244" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="504" y="96" font-size="13.5" font-weight="700" fill="#1D4ED8">Bias = 4 thành phần bắt buộc</text>

  <text x="504" y="122" font-size="11" font-weight="700" fill="#1D4ED8">1. Range</text>
  <text x="504" y="136" font-size="11" fill="#374151">HTF dealing range nào đang dùng?</text>
  <text x="504" y="164" font-size="11" font-weight="700" fill="#1D4ED8">2. Location</text>
  <text x="504" y="178" font-size="11" fill="#374151">Premium / Discount / Equilibrium</text>
  <text x="504" y="206" font-size="11" font-weight="700" fill="#1D4ED8">3. Draw on liquidity</text>
  <text x="504" y="220" font-size="11" fill="#374151">Pool nào còn mở &amp; quan trọng nhất?</text>
  <text x="504" y="248" font-size="11" font-weight="700" fill="#1D4ED8">4. POI + Invalidation</text>
  <text x="504" y="262" font-size="11" fill="#374151">Vào từ đâu; điều gì chứng minh sai?</text>

  <line x1="504" y1="282" x2="724" y2="282" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="504" y="296" width="64" height="22" rx="6" fill="#16A34A" opacity="0.15" stroke="#16A34A"/>
  <text x="536" y="311" font-size="10.5" font-weight="700" fill="#15803D" text-anchor="middle">Bullish</text>
  <rect x="576" y="296" width="64" height="22" rx="6" fill="#DC2626" opacity="0.12" stroke="#DC2626"/>
  <text x="608" y="311" font-size="10.5" font-weight="700" fill="#B91C1C" text-anchor="middle">Bearish</text>
  <rect x="648" y="296" width="76" height="22" rx="6" fill="#6B7280" opacity="0.12" stroke="#6B7280"/>
  <text x="686" y="311" font-size="10.5" font-weight="700" fill="#4B5563" text-anchor="middle">Neutral</text>

  <text x="504" y="348" font-size="11" font-weight="700" fill="#6B7280">Bias LỌC hướng trade —</text>
  <text x="504" y="364" font-size="11" fill="#6B7280">entry vẫn cần sweep + MSS +</text>
  <text x="504" y="380" font-size="11" fill="#6B7280">displacement trên LTF.</text>
  <text x="504" y="404" font-size="11" fill="#6B7280">Không phải màu nến D1 đơn lẻ,</text>
  <text x="504" y="420" font-size="11" fill="#6B7280">không phải dự báo chắc chắn.</text>
</svg>
