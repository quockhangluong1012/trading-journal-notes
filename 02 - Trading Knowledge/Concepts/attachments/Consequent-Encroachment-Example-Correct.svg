<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CE đúng — giá respect mức 50% của Bullish FVG</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">CE = trung điểm gap; giá retrace tới CE rồi reject, entry tối ưu quanh CE</text>

  <defs><marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#16A34A"/></marker></defs>

  <!-- FVG zone -->
  <rect x="120" y="200" width="520" height="80" fill="#3B82F6" opacity="0.14"/>
  <line x1="120" y1="200" x2="640" y2="200" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="194" font-size="12" fill="#2563EB" font-weight="600">FVG High (Low nến 3)</text>
  <line x1="120" y1="280" x2="640" y2="280" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="296" font-size="12" fill="#2563EB" font-weight="600">FVG Low (High nến 1)</text>

  <!-- CE midline -->
  <line x1="120" y1="240" x2="640" y2="240" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="648" y="244" font-size="13" fill="#7C3AED" font-weight="700">CE (50%)</text>

  <!-- displacement creating FVG: 3 candles -->
  <rect x="150" y="270" width="2" height="40" fill="#16A34A"/><rect x="144" y="278" width="14" height="22" fill="#16A34A" rx="1"/>
  <text x="138" y="328" font-size="11" fill="#6B7280">N1</text>
  <rect x="190" y="150" width="2" height="150" fill="#16A34A"/><rect x="184" y="160" width="14" height="120" fill="#16A34A" rx="1"/>
  <text x="178" y="148" font-size="11" fill="#6B7280">N2 displacement</text>
  <rect x="230" y="150" width="2" height="55" fill="#16A34A"/><rect x="224" y="158" width="14" height="40" fill="#16A34A" rx="1"/>
  <text x="222" y="148" font-size="11" fill="#6B7280">N3</text>

  <!-- retrace into CE then reject up -->
  <rect x="290" y="160" width="2" height="50" fill="#DC2626"/><rect x="284" y="165" width="14" height="40" fill="#DC2626" rx="1"/>
  <rect x="320" y="180" width="2" height="55" fill="#DC2626"/><rect x="314" y="190" width="14" height="42" fill="#DC2626" rx="1"/>
  <rect x="350" y="205" width="2" height="40" fill="#DC2626"/><rect x="344" y="212" width="14" height="30" fill="#DC2626" rx="1"/>
  <!-- touches CE, rejects -->
  <rect x="380" y="218" width="2" height="30" fill="#16A34A"/><rect x="374" y="232" width="14" height="14" fill="#16A34A" rx="1"/>
  <text x="392" y="244" font-size="12" fill="#7C3AED" font-weight="600">↑ reject tại CE</text>

  <!-- continuation up -->
  <rect x="420" y="170" width="2" height="60" fill="#16A34A"/><rect x="414" y="178" width="14" height="44" fill="#16A34A" rx="1"/>
  <rect x="460" y="120" width="2" height="70" fill="#16A34A"/><rect x="454" y="128" width="14" height="55" fill="#16A34A" rx="1"/>
  <rect x="500" y="90" width="2" height="60" fill="#16A34A"/><rect x="494" y="98" width="14" height="44" fill="#16A34A" rx="1"/>

  <path d="M 400 240 L 440 200" stroke="#16A34A" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="430" y="120" font-size="13" fill="#374151">Entry quanh CE → R:R tốt hơn mép gap</text>

  <text x="24" y="436" font-size="15" font-weight="700" fill="#16A34A">✓ Đúng</text>
  <text x="78" y="436" font-size="12" fill="#374151">Giá tôn trọng CE (50%) → array còn hiệu lực, entry tối ưu</text>
</svg>
