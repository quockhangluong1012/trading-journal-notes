<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="560" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cụm OB chồng nhau trong một leg — OB nông là INDUCEMENT, OB gốc mới là entry</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Why: retail vào ở OB gần nhất → stop của họ nằm dưới OB nông → chính stop đó là thanh khoản để giá "đi tiếp xuống" tới OB gốc.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Sweep + origin -->
  <line x1="50" y1="395" x2="240" y2="395" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="52" y="409" font-size="10" fill="#9CA3AF">SSL / đáy cũ</text>

  <!-- impulse leg lên với 3 OB -->
  <path d="M60,380 L95,410 L120,340 L145,365 L185,270 L210,292 L255,195 L285,215 L330,120"
        fill="none" stroke="#374151" stroke-width="2.4"/>
  <text x="72" y="432" font-size="10.5" font-weight="700" fill="#B45309">Sweep SSL (wick)</text>

  <!-- OB zones -->
  <rect x="95" y="365" width="600" height="45" fill="#16A34A" opacity="0.14"/>
  <text x="560" y="380" font-size="11" font-weight="700" fill="#15803D">OB #1 — TRUE ORIGIN</text>
  <text x="560" y="394" font-size="9.5" fill="#15803D">ngay sau sweep, gốc của cả leg</text>

  <rect x="145" y="292" width="550" height="26" fill="#F59E0B" opacity="0.16"/>
  <text x="560" y="303" font-size="11" font-weight="700" fill="#B45309">OB #2 — giữa leg</text>
  <text x="560" y="315" font-size="9.5" fill="#B45309">"trạm dừng", không có sweep riêng</text>

  <rect x="210" y="215" width="485" height="24" fill="#DC2626" opacity="0.13"/>
  <text x="560" y="226" font-size="11" font-weight="700" fill="#B91C1C">OB #3 — nông nhất, mới nhất</text>
  <text x="560" y="238" font-size="9.5" fill="#B91C1C">nơi retail vào sớm → inducement</text>

  <!-- retrace path: xuyên OB3, OB2, react tại OB1 -->
  <path d="M330,120 L365,175 L385,160 L415,239 L430,231 L455,318 L468,310 L495,405 L520,372 L560,240 L600,150 L650,105"
        fill="none" stroke="#2563EB" stroke-width="2.2" stroke-dasharray="1 0"/>
  <circle cx="415" cy="239" r="5" fill="none" stroke="#B91C1C" stroke-width="2"/>
  <text x="392" y="258" font-size="9.5" fill="#B91C1C">✗ xuyên OB #3</text>
  <circle cx="455" cy="318" r="5" fill="none" stroke="#B45309" stroke-width="2"/>
  <text x="432" y="338" font-size="9.5" fill="#B45309">✗ xuyên OB #2</text>
  <circle cx="495" cy="405" r="6" fill="#16A34A"/>
  <text x="470" y="424" font-size="10.5" font-weight="700" fill="#15803D">✓ Entry tại OB #1 (origin)</text>

  <!-- stop-run annotation -->
  <path d="M420,250 q-14,26 6,40" fill="none" stroke="#B91C1C" stroke-width="1.2" marker-end="none"/>
  <text x="300" y="292" font-size="9.5" font-style="italic" fill="#B91C1C">stop của người Long OB #3</text>
  <text x="300" y="304" font-size="9.5" font-style="italic" fill="#B91C1C">= nhiên liệu đẩy giá xuống tiếp</text>

  <!-- Bottom rules -->
  <rect x="24" y="444" width="712" height="100" rx="8" fill="#F3F4F6"/>
  <text x="38" y="466" font-size="12.5" font-weight="700" fill="#1F2937">Quy tắc chọn OB khi có nhiều OB trong cùng một leg</text>
  <text x="38" y="486" font-size="11" fill="#374151">① Ưu tiên OB có SWEEP riêng ngay trước nó (true origin) — nó là nơi vị thế thật được xây, không phải trạm dừng.</text>
  <text x="38" y="504" font-size="11" fill="#374151">② Coi OB nông nhất là INDUCEMENT: kỳ vọng giá xuyên qua nó để gom stop, rồi mới phản ứng ở OB sâu hơn.</text>
  <text x="38" y="522" font-size="11" fill="#374151">③ Nếu buộc phải dùng OB giữa leg: yêu cầu FVG confluence + LTF MSS, size giảm — vì thiếu narrative sweep riêng.</text>
  <text x="38" y="540" font-size="11" fill="#374151">④ OB origin trùng vùng OTE 62–79% của leg → xác suất cao nhất: cả fib lẫn order flow cùng chỉ về một chỗ.</text>
</svg>
