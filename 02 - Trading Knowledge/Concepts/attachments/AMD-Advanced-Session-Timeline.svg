<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bản đồ thời gian AMD trong ngày (giờ New York)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Khung giờ chỉ là xác suất, không phải đồng hồ bấm giờ — price action (sweep + reclaim + displacement) mới là xác nhận.</text>

  <!-- timeline bar -->
  <rect x="40" y="90" width="680" height="46" rx="8" fill="#F3F4F6" stroke="#E5E7EB"/>
  <!-- Asia -->
  <rect x="40" y="90" width="200" height="46" rx="8" fill="#9CA3AF" opacity="0.25"/>
  <text x="105" y="118" font-size="12.5" font-weight="700" fill="#4B5563">ASIA 19:00–00:00</text>
  <!-- London -->
  <rect x="240" y="90" width="180" height="46" fill="#FCA5A5" opacity="0.35"/>
  <text x="282" y="118" font-size="12.5" font-weight="700" fill="#B91C1C">LONDON 02:00–05:00</text>
  <!-- NY -->
  <rect x="420" y="90" width="190" height="46" fill="#86EFAC" opacity="0.4"/>
  <text x="452" y="118" font-size="12.5" font-weight="700" fill="#166534">NY AM 07:00–10:00</text>
  <!-- PM -->
  <rect x="610" y="90" width="110" height="46" rx="8" fill="#93C5FD" opacity="0.35"/>
  <text x="622" y="118" font-size="12.5" font-weight="700" fill="#1E40AF">NY PM 13:30–16:00</text>

  <!-- phase labels below -->
  <text x="80" y="164" font-size="12" font-weight="700" fill="#4B5563">Accumulation</text>
  <text x="52" y="182" font-size="10.5" fill="#6B7280">range quanh open; đánh dấu</text>
  <text x="52" y="196" font-size="10.5" fill="#6B7280">Asia High/Low = 2 pool mồi</text>

  <text x="262" y="164" font-size="12" font-weight="700" fill="#B91C1C">Manipulation #1</text>
  <text x="248" y="182" font-size="10.5" fill="#6B7280">Judas London: sweep 1 phía</text>
  <text x="248" y="196" font-size="10.5" fill="#6B7280">range Á, thường ngược bias</text>

  <text x="452" y="164" font-size="12" font-weight="700" fill="#166534">Distribution (± Judas #2)</text>
  <text x="428" y="182" font-size="10.5" fill="#6B7280">NY có thể có Judas riêng lúc mở</text>
  <text x="428" y="196" font-size="10.5" fill="#6B7280">cửa trước khi phân phối tiếp</text>

  <text x="618" y="164" font-size="12" font-weight="700" fill="#1E40AF">Continuation / Reversal</text>
  <text x="612" y="182" font-size="10.5" fill="#6B7280">hoàn tất range ngày;</text>
  <text x="612" y="196" font-size="10.5" fill="#6B7280">cẩn thận move cuối ngày</text>

  <!-- Two day-type rows -->
  <text x="40" y="240" font-size="13.5" font-weight="700" fill="#1F2937">Hai kịch bản đối xứng quanh Daily Open:</text>

  <rect x="40" y="256" width="330" height="140" rx="8" fill="#FFFFFF" stroke="#86EFAC"/>
  <text x="54" y="280" font-size="12.5" font-weight="700" fill="#166534">Ngày Bullish (kỳ vọng theo bias tăng)</text>
  <path d="M60,330 L110,325 L130,332 L150,326 L175,362 L200,352 L215,370 L245,320 L275,300 L305,285 L340,272" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="60" y1="328" x2="340" y2="328" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="252" y="342" font-size="9.5" fill="#6B7280">open</text>
  <circle cx="215" cy="370" r="6" fill="none" stroke="#DC2626" stroke-width="2"/>
  <text x="150" y="388" font-size="10" fill="#B91C1C">Judas XUỐNG dưới open (mua ở discount)</text>

  <rect x="390" y="256" width="330" height="140" rx="8" fill="#FFFFFF" stroke="#FCA5A5"/>
  <text x="404" y="280" font-size="12.5" font-weight="700" fill="#B91C1C">Ngày Bearish (kỳ vọng theo bias giảm)</text>
  <path d="M410,330 L460,335 L480,328 L500,334 L525,296 L550,306 L565,288 L595,340 L625,358 L655,372 L690,386" fill="none" stroke="#374151" stroke-width="2"/>
  <line x1="410" y1="332" x2="690" y2="332" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="600" y="326" font-size="9.5" fill="#6B7280">open</text>
  <circle cx="565" cy="288" r="6" fill="none" stroke="#DC2626" stroke-width="2"/>
  <text x="470" y="276" font-size="10" fill="#B91C1C" transform="translate(0,14)">Judas LÊN trên open (bán ở premium)</text>
</svg>
