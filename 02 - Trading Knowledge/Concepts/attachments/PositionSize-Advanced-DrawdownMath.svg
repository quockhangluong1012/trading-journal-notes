<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="380" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Toán học sống sót — vì sao 0,5%/lệnh</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Chuỗi thua là điều CHẮC CHẮN xảy ra. Rủi ro nhỏ giữ bạn sống qua chuỗi thua để edge có thời gian thể hiện.</text>

  <rect x="24" y="72" width="352" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="96" font-size="12.5" font-weight="700" fill="#1F2937">Sụt vốn sau N lệnh thua liên tiếp</text>
  <text x="40" y="122" font-size="11" fill="#6B7280">(tính trên vốn ban đầu)</text>
  <line x1="60" y1="270" x2="360" y2="270" stroke="#9CA3AF"/>
  <line x1="60" y1="140" x2="60" y2="270" stroke="#9CA3AF"/>
  <!-- 0.5% bars -->
  <rect x="80" y="264" width="18" height="6" fill="#16A34A"/><rect x="110" y="260" width="18" height="10" fill="#16A34A"/><rect x="140" y="257" width="18" height="13" fill="#16A34A"/>
  <text x="70" y="288" font-size="9" fill="#166534">0,5%: sau 10 thua ≈ −4,9%</text>
  <!-- 2% bars -->
  <rect x="200" y="234" width="18" height="36" fill="#F59E0B"/><rect x="230" y="220" width="18" height="50" fill="#F59E0B"/><rect x="260" y="205" width="18" height="65" fill="#F59E0B"/>
  <text x="190" y="200" font-size="9" fill="#B45309">2%: sau 10 thua ≈ −18,3%</text>
  <!-- 5% bars -->
  <rect x="300" y="175" width="18" height="95" fill="#DC2626"/><rect x="330" y="150" width="18" height="120" fill="#DC2626"/>
  <text x="290" y="145" font-size="9" fill="#B91C1C">5%: sau 10 thua ≈ −40%</text>

  <rect x="392" y="72" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="408" y="96" font-size="12.5" font-weight="700" fill="#1F2937">Toán học phục hồi (hố càng sâu, càng khó ra)</text>
  <text x="408" y="126" font-size="11" fill="#374151">Mất −10%  → cần  +11,1% để hòa</text>
  <text x="408" y="150" font-size="11" fill="#374151">Mất −20%  → cần  +25,0%</text>
  <text x="408" y="174" font-size="11" fill="#374151">Mất −30%  → cần  +42,9%</text>
  <text x="408" y="198" font-size="11" fill="#374151">Mất −50%  → cần  +100%</text>
  <text x="408" y="222" font-size="11" fill="#B91C1C">Mất −70%  → cần  +233%</text>
  <rect x="408" y="240" width="312" height="40" rx="6" fill="#FEE2E2"/>
  <text x="418" y="258" font-size="10.5" font-weight="700" fill="#B91C1C">Drawdown không tuyến tính: phòng thủ vốn</text>
  <text x="418" y="273" font-size="10.5" font-weight="700" fill="#B91C1C">quan trọng hơn tối đa hóa lợi nhuận.</text>

  <rect x="24" y="304" width="712" height="60" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="40" y="328" font-size="12" font-weight="700" fill="#166534">Kết luận: với 0,5%/lệnh, ngay cả 10 lệnh thua liên tiếp chỉ mất ~5% vốn — thừa an toàn dưới mọi giới hạn prop firm.</text>
  <text x="40" y="350" font-size="11" fill="#374151">Rủi ro nhỏ = tồn tại lâu = edge có thời gian sinh lời. Đây là lý do quy tắc ≤0,5%/lệnh của vault.</text>
</svg>
