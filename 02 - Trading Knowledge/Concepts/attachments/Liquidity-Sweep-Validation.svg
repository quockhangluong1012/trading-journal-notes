<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Quy tắc xác nhận / vô hiệu hóa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Sweep thành công vs Sweep yếu vs Break thật vs Double sweep</text>

  <!-- 1 success -->
  <rect x="24" y="72" width="230" height="200" rx="8" fill="#16A34A" opacity="0.07"/>
  <rect x="24" y="72" width="230" height="200" rx="8" fill="none" stroke="#16A34A" stroke-width="1.4"/>
  <text x="40" y="96" font-size="13" font-weight="700" fill="#16A34A">Sweep thành công</text>
  <line x1="44" y1="200" x2="244" y2="200" stroke="#DC2626" stroke-dasharray="4 3"/>
  <line x1="90" y1="150" x2="90" y2="230" stroke="#DC2626" stroke-width="2"/><rect x="84" y="160" width="12" height="20" rx="1" fill="#16A34A"/>
  <line x1="120" y1="120" x2="120" y2="205" stroke="#16A34A" stroke-width="2"/><rect x="114" y="132" width="12" height="65" rx="1" fill="#16A34A"/>
  <text x="40" y="252" font-size="10.5" fill="#374151">Wick + reclaim + displacement</text>
  <text x="40" y="266" font-size="10.5" fill="#16A34A">→ tìm entry đảo chiều</text>

  <!-- 2 weak -->
  <rect x="266" y="72" width="230" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="282" y="96" font-size="13" font-weight="700" fill="#B45309">Sweep yếu / chưa rõ</text>
  <line x1="286" y1="200" x2="486" y2="200" stroke="#DC2626" stroke-dasharray="4 3"/>
  <line x1="330" y1="150" x2="330" y2="235" stroke="#DC2626" stroke-width="2"/><rect x="324" y="162" width="12" height="20" rx="1" fill="#16A34A"/>
  <line x1="360" y1="175" x2="360" y2="215" stroke="#9CA3AF" stroke-width="2"/><rect x="354" y="185" width="12" height="15" rx="1" fill="#9CA3AF"/>
  <line x1="390" y1="178" x2="390" y2="212" stroke="#9CA3AF" stroke-width="2"/><rect x="384" y="188" width="12" height="12" rx="1" fill="#9CA3AF"/>
  <text x="282" y="252" font-size="10.5" fill="#374151">Reclaim nhưng KHÔNG displacement</text>
  <text x="282" y="266" font-size="10.5" fill="#B45309">→ chờ thêm, có thể chỉ test</text>

  <!-- 3 break -->
  <rect x="508" y="72" width="228" height="200" rx="8" fill="#DC2626" opacity="0.06"/>
  <rect x="508" y="72" width="228" height="200" rx="8" fill="none" stroke="#DC2626" stroke-width="1.3"/>
  <text x="524" y="96" font-size="13" font-weight="700" fill="#DC2626">Break thật (BOS)</text>
  <line x1="528" y1="150" x2="728" y2="150" stroke="#DC2626" stroke-dasharray="4 3"/>
  <line x1="570" y1="120" x2="570" y2="160" stroke="#DC2626" stroke-width="2"/><rect x="564" y="130" width="12" height="25" rx="1" fill="#DC2626"/>
  <line x1="600" y1="150" x2="600" y2="225" stroke="#DC2626" stroke-width="2"/><rect x="594" y="162" width="12" height="50" rx="1" fill="#DC2626"/>
  <line x1="630" y1="200" x2="630" y2="250" stroke="#DC2626" stroke-width="2"/><rect x="624" y="210" width="12" height="35" rx="1" fill="#DC2626"/>
  <text x="524" y="252" font-size="10.5" fill="#374151">Đóng nến vượt hẳn + acceptance</text>
  <text x="524" y="266" font-size="10.5" fill="#DC2626">→ tiếp diễn, KHÔNG đảo</text>

  <!-- double sweep warning -->
  <rect x="24" y="286" width="712" height="88" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
  <text x="40" y="310" font-size="13" font-weight="700" fill="#DC2626">Double sweep — cái bẫy phổ biến</text>
  <text x="40" y="333" font-size="11" fill="#374151">Cú sweep đầu kéo bạn vào lệnh → cú sweep thứ hai sâu hơn quét stop của bạn → rồi mới đảo thật.</text>
  <text x="40" y="353" font-size="11" fill="#374151">Phòng tránh: vào tại POI HTF lớn hơn, chờ displacement rõ, đặt stop NGOÀI cả vùng POI (không sát mép).</text>

  <text x="380" y="408" text-anchor="middle" font-size="12" fill="#374151">Bị double sweep sau khi vào (đóng nến lại ngoài đáy/đỉnh sweep) → cắt lệnh, không gồng.</text>
</svg>
