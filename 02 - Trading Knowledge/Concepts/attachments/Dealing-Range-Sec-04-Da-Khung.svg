  <text x="558" y="507" font-size="9.5" fill="#D97706">sweep</text>
  <text x="606" y="440" font-size="9.5" fill="#7C3AED">MSS + displacement</text>
  <circle cx="616" cy="464" r="3.5" fill="#16A34A"/>
  <text x="624" y="472" font-size="9.5" fill="#15803D">entry</text>
