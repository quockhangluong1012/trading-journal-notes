<svg viewBox="0 0 760 530" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="530" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Quy trình đa khung — từ Range gốc tới Entry</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">4 câu: Range nào hợp lệ? • External nào còn mở? • Premium hay discount? • Range còn hiệu lực?</text>

  <!-- Band 1: D1/H4 -->
  <rect x="24" y="70" width="712" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="36" y="82" width="86" height="24" rx="6" fill="#1D4ED8"/>
  <text x="79" y="99" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">D1 / H4</text>
  <text x="134" y="99" font-size="13" font-weight="700" fill="#1D4ED8">Range gốc &amp; Narrative</text>
  <text x="36" y="124" font-size="11" fill="#374151">• Đánh dấu swing high/low tạo bởi displacement/BOS — ghi giá hai đầu</text>
  <text x="36" y="142" font-size="11" fill="#374151">• External: BSL (PDH/PWH) trên, SSL (PDL/PWL) dưới — phía nào còn mở?</text>
  <text x="36" y="160" font-size="11" fill="#374151">• EQ 50% → giá đang Premium hay Discount; liệt kê internal FVG/OB</text>
  <text x="36" y="178" font-size="11" fill="#374151">• Kết luận DRAW ON LIQUIDITY: giá bị hút về external nào, vì sao</text>
  <line x1="555" y1="95" x2="715" y2="95" stroke="#DC2626" stroke-width="2"/>
  <text x="690" y="90" font-size="9.5" fill="#B91C1C">BSL</text>
  <line x1="555" y1="185" x2="715" y2="185" stroke="#16A34A" stroke-width="2"/>
  <text x="690" y="181" font-size="9.5" fill="#15803D">SSL</text>
  <line x1="555" y1="140" x2="715" y2="140" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5 3"/>
  <circle cx="600" cy="165" r="4" fill="#16A34A"/>
  <line x1="635" y1="165" x2="635" y2="108" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4 3"/>
  <polygon points="635,102 630,113 640,113" fill="#D97706"/>

  <line x1="380" y1="205" x2="380" y2="222" stroke="#6B7280" stroke-width="1.6"/>
  <polygon points="380,228 374,218 386,218" fill="#6B7280"/>
  <text x="396" y="221" font-size="10.5" fill="#6B7280">HTF quyết định HƯỚNG được phép</text>

  <!-- Band 2: H1/M15 -->
  <rect x="24" y="232" width="712" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="36" y="244" width="86" height="24" rx="6" fill="#0F766E"/>
  <text x="79" y="261" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">H1 / M15</text>
  <text x="134" y="261" font-size="13" font-weight="700" fill="#0F766E">Range con &amp; POI</text>
  <text x="36" y="286" font-size="11" fill="#374151">• Range con nằm TRONG HTF range — dùng để định vị POI chi tiết</text>
  <text x="36" y="304" font-size="11" fill="#374151">• POI = internal liquidity: FVG/OB unmitigated, có displacement, đúng nửa P/D</text>
  <text x="36" y="322" font-size="11" fill="#374151">• Alignment: discount H1 nằm trong discount D1 → cộng hưởng</text>
  <text x="36" y="340" font-size="11" fill="#374151">• Đỉnh/đáy range con = BSL/SSL nội bộ — thường bị quét trước khi đi tiếp</text>
  <line x1="555" y1="255" x2="715" y2="255" stroke="#DC2626" stroke-width="1.6" opacity="0.7"/>
  <line x1="555" y1="348" x2="715" y2="348" stroke="#16A34A" stroke-width="1.6" opacity="0.7"/>
  <rect x="580" y="300" width="118" height="40" fill="#14B8A6" opacity="0.10" stroke="#0F766E" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="584" y="296" font-size="9.5" fill="#0F766E">range con H1</text>
  <rect x="600" y="316" width="30" height="12" fill="#3B82F6" opacity="0.25" stroke="#1D4ED8" stroke-width="0.8"/>
  <text x="636" y="326" font-size="9.5" fill="#1D4ED8">POI</text>

  <line x1="380" y1="367" x2="380" y2="384" stroke="#6B7280" stroke-width="1.6"/>
  <polygon points="380,390 374,380 386,380" fill="#6B7280"/>
  <text x="396" y="383" font-size="10.5" fill="#6B7280">LTF quyết định THỜI ĐIỂM &amp; GIÁ entry</text>

  <!-- Band 3: M5/M1 -->
  <rect x="24" y="394" width="712" height="122" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="36" y="406" width="86" height="24" rx="6" fill="#7C3AED"/>
  <text x="79" y="423" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">M5 / M1</text>
  <text x="134" y="423" font-size="13" font-weight="700" fill="#7C3AED">Confirmation &amp; Entry</text>
  <text x="36" y="448" font-size="11" fill="#374151">• Giá vào internal POI → xác định range M5 cục bộ để canh entry</text>
  <text x="36" y="466" font-size="11" fill="#374151">• Sweep SSL/BSL nội bộ M5 → MSS + displacement TRONG POI, đúng nửa range</text>
  <text x="36" y="484" font-size="11" fill="#374151">• Entry tại FVG/OB từ displacement — ưu tiên trùng OTE của range</text>
  <text x="36" y="502" font-size="11" font-weight="700" fill="#D97706">⚠ Range M5 KHÔNG định nghĩa Premium/Discount của bias — chỉ dùng execution</text>
  <path d="M560 465 L585 492 L602 448 L616 464 L645 425" fill="none" stroke="#374151" stroke-width="1.7"/>
