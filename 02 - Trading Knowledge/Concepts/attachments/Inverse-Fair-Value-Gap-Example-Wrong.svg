<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Inverse FVG — Lỗi: chỉ WICK xuyên, chưa đóng nến đã đảo tư duy</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">FVG bị bóng nến chọc qua nhưng đóng lại bên trong → vẫn là FVG hợp lệ</text>

  <!-- Original bullish FVG zone (still valid) -->
  <rect x="150" y="190" width="500" height="48" fill="#3B82F6" opacity="0.14"/>
  <text x="158" y="184" font-size="13" font-weight="700" fill="#1D4ED8">Bullish FVG vẫn còn hiệu lực (KHÔNG flip)</text>

  <!-- FVG formation up -->
  <rect x="160" y="250" width="2" height="70" fill="#16A34A"/>
  <rect x="154" y="265" width="14" height="50" fill="#16A34A" rx="1"/>
  <rect x="186" y="180" width="2" height="120" fill="#16A34A"/>
  <rect x="180" y="195" width="14" height="95" fill="#16A34A" rx="1"/>
  <rect x="212" y="140" width="2" height="65" fill="#16A34A"/>
  <rect x="206" y="150" width="14" height="45" fill="#16A34A" rx="1"/>

  <!-- candle with long lower WICK piercing FVG but body closes ABOVE -->
  <rect x="238" y="160" width="2" height="120" fill="#DC2626"/>
  <rect x="232" y="165" width="14" height="40" fill="#DC2626" rx="1"/>
  <text x="252" y="275" font-size="13" font-weight="700" fill="#DC2626">Chỉ bóng xuyên — thân đóng TRÊN FVG</text>

  <!-- WRONG: trader shorts thinking it flipped -->
  <circle cx="239" cy="270" r="6" fill="#DC2626"/>
  <text x="252" y="298" font-size="13" font-weight="700" fill="#DC2626">✗ Short sớm (tưởng đã IFVG)</text>

  <!-- price actually respects FVG and rallies -->
  <rect x="290" y="210" width="2" height="80" fill="#16A34A"/>
  <rect x="284" y="225" width="14" height="55" fill="#16A34A" rx="1"/>
  <rect x="316" y="150" width="2" height="100" fill="#16A34A"/>
  <rect x="310" y="165" width="14" height="75" fill="#16A34A" rx="1"/>
  <rect x="342" y="110" width="2" height="80" fill="#16A34A"/>
  <rect x="336" y="120" width="14" height="58" fill="#16A34A" rx="1"/>
  <rect x="368" y="85" width="2" height="70" fill="#16A34A"/>
  <rect x="362" y="95" width="14" height="50" fill="#16A34A" rx="1"/>

  <text x="390" y="150" font-size="13" fill="#16A34A" font-weight="700">Giá respect FVG → tăng tiếp</text>

  <!-- stop hit line for the wrong short -->
  <line x1="150" y1="120" x2="500" y2="120" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="370" y="114" font-size="13" font-weight="700" fill="#DC2626">Stop của lệnh Short bị quét</text>

  <!-- BSL target above -->
  <line x1="150" y1="90" x2="650" y2="90" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="84" font-size="13" font-weight="700" fill="#2563EB">BSL</text>

  <text x="24" y="448" font-size="16" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="64" y="448" font-size="13" fill="#374151">IFVG cần ĐÓNG NẾN xuyên qua, không phải chỉ bóng. Bóng chọc = vẫn respect FVG.</text>
</svg>
