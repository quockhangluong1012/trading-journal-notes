<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Dealing Range — Giải phẫu khung tham chiếu</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Swing high &amp; swing low CÓ Ý NGHĨA, hai đầu đã lấy liquidity → đo Premium/Discount &amp; draw on liquidity</text>

  <!-- chart panel -->
  <rect x="24" y="70" width="452" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- zones -->
  <rect x="60" y="130" width="360" height="135" fill="#DC2626" opacity="0.07"/>
  <rect x="60" y="265" width="360" height="135" fill="#16A34A" opacity="0.08"/>

  <!-- range lines -->
  <line x1="60" y1="130" x2="420" y2="130" stroke="#DC2626" stroke-width="2"/>
  <text x="250" y="122" font-size="11" font-weight="700" fill="#B91C1C">Swing High (External — BSL)</text>
  <line x1="60" y1="400" x2="420" y2="400" stroke="#16A34A" stroke-width="2"/>
  <text x="250" y="394" font-size="11" font-weight="700" fill="#15803D">Swing Low (External — SSL)</text>
  <line x1="60" y1="265" x2="420" y2="265" stroke="#6B7280" stroke-width="1.6" stroke-dasharray="7 4"/>
  <text x="300" y="260" font-size="11.5" font-weight="700" fill="#374151">Equilibrium 50%</text>

  <text x="290" y="155" font-size="11" fill="#B91C1C">PREMIUM — tìm Short</text>
  <text x="68" y="385" font-size="11" fill="#15803D">DISCOUNT — tìm Long</text>

  <!-- internal FVG -->
  <rect x="222" y="330" width="60" height="22" fill="#3B82F6" opacity="0.18" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="290" y="345" font-size="10.5" fill="#1D4ED8">FVG — Internal liquidity</text>

  <!-- price path: sweep BSL, sweep SSL, now in discount -->
  <path d="M80 290 L115 190 L140 112 L165 210 L185 175 L215 412 L245 320 L270 355 L300 300"
        fill="none" stroke="#374151" stroke-width="1.8"/>
  <circle cx="300" cy="300" r="4" fill="#374151"/>
  <text x="308" y="296" font-size="10.5" fill="#374151">Giá hiện tại (discount)</text>
  <text x="150" y="108" font-size="10.5" font-weight="700" fill="#D97706">Sweep BSL</text>
  <text x="150" y="430" font-size="10.5" font-weight="700" fill="#D97706">Sweep SSL</text>

  <!-- draw on liquidity arrow -->
  <line x1="370" y1="280" x2="370" y2="145" stroke="#D97706" stroke-width="1.6" stroke-dasharray="5 4"/>
  <polygon points="370,138 365,150 375,150" fill="#D97706"/>
  <text x="382" y="215" font-size="10.5" font-weight="700" fill="#D97706" transform="rotate(-90 382 215)">Draw on liquidity</text>

  <!-- right panel -->
  <rect x="492" y="70" width="244" height="370" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="504" y="96" font-size="14" font-weight="700" fill="#1D4ED8">Giải phẫu Dealing Range</text>

  <circle cx="510" cy="116" r="4" fill="#DC2626"/>
  <text x="520" y="120" font-size="11" font-weight="700" fill="#374151">External (đầu trên):</text>
  <text x="520" y="134" font-size="11" fill="#374151">swing high = BSL đã bị quét</text>

  <circle cx="510" cy="160" r="4" fill="#16A34A"/>
  <text x="520" y="164" font-size="11" font-weight="700" fill="#374151">External (đầu dưới):</text>
  <text x="520" y="178" font-size="11" fill="#374151">swing low = SSL đã bị quét</text>

  <circle cx="510" cy="204" r="4" fill="#6B7280"/>
  <text x="520" y="208" font-size="11" font-weight="700" fill="#374151">Equilibrium 50%:</text>
  <text x="520" y="222" font-size="11" fill="#374151">trên = Premium, dưới = Discount</text>

  <circle cx="510" cy="248" r="4" fill="#1D4ED8"/>
  <text x="520" y="252" font-size="11" font-weight="700" fill="#374151">Internal liquidity:</text>
  <text x="520" y="266" font-size="11" fill="#374151">FVG / OB / imbalance bên trong</text>

  <circle cx="510" cy="292" r="4" fill="#D97706"/>
  <text x="520" y="296" font-size="11" font-weight="700" fill="#374151">Draw on liquidity:</text>
  <text x="520" y="310" font-size="11" fill="#374151">external còn mở đang hút giá</text>

  <line x1="504" y1="330" x2="724" y2="330" stroke="#E5E7EB" stroke-width="1"/>
  <text x="504" y="352" font-size="11" font-weight="700" fill="#6B7280">Là KHUNG THAM CHIẾU,</text>
  <text x="504" y="368" font-size="11" fill="#6B7280">không phải tín hiệu vào lệnh —</text>
  <text x="504" y="384" font-size="11" fill="#6B7280">entry vẫn cần sweep + MSS +</text>
  <text x="504" y="400" font-size="11" fill="#6B7280">displacement. Range sai thì mọi</text>
  <text x="504" y="416" font-size="11" fill="#6B7280">phép đo Premium/Discount đều sai.</text>
</svg>
