<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Họ Block — Order Block vs Mitigation Block vs Breaker Block</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng "nguyên liệu" (cụm nến ngược chiều + displacement), khác nhau ở bối cảnh: fail chưa? có sweep chưa?</text>

  <!-- Panel 1: Order Block -->
  <rect x="24" y="72" width="228" height="230" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="38" y="96" font-size="13" font-weight="700" fill="#1D4ED8">Order Block</text>
  <text x="38" y="112" font-size="10" fill="#6B7280">nhịp tiếp diễn, CHƯA fail</text>
  <rect x="60" y="150" width="20" height="40" fill="#DC2626" opacity="0.5" rx="1"/>
  <path d="M70,190 L110,140 L150,100 L200,60" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="90" y="215" font-size="9.5" fill="#374151">cụm nến trước displacement</text>
  <text x="90" y="230" font-size="9.5" fill="#374151">→ entry theo hướng move gốc</text>

  <!-- Panel 2: Mitigation Block -->
  <rect x="266" y="72" width="228" height="230" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <text x="280" y="96" font-size="13" font-weight="700" fill="#15803D">Mitigation Block</text>
  <text x="280" y="112" font-size="10" fill="#6B7280">failure swing, KHÔNG sweep</text>
  <line x1="290" y1="200" x2="480" y2="200" stroke="#16A34A" stroke-width="1.2" stroke-dasharray="5 3"/>
  <path d="M290,150 L320,200 L350,165" fill="none" stroke="#374151" stroke-width="2"/>
  <path d="M350,165 L380,192 L410,120" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="380" cy="192" r="5" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <text x="330" y="222" font-size="9.5" font-weight="700" fill="#15803D">higher low (đáy cũ giữ)</text>
  <rect x="360" y="170" width="18" height="26" fill="#F59E0B" opacity="0.55" rx="1"/>
  <text x="290" y="240" font-size="9.5" fill="#374151">→ entry theo hướng MỚI</text>

  <!-- Panel 3: Breaker Block -->
  <rect x="508" y="72" width="228" height="230" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <text x="522" y="96" font-size="13" font-weight="700" fill="#B91C1C">Breaker Block</text>
  <text x="522" y="112" font-size="10" fill="#6B7280">fail + CÓ sweep</text>
  <line x1="532" y1="185" x2="720" y2="185" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="5 3"/>
  <path d="M532,150 L562,185 L592,158" fill="none" stroke="#374151" stroke-width="2"/>
  <path d="M592,158 L620,225 L650,120" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="620" cy="225" r="6" fill="none" stroke="#F59E0B" stroke-width="2.4"/>
  <text x="560" y="248" font-size="9.5" font-weight="700" fill="#B45309">sweep dưới đáy cũ</text>
  <rect x="600" y="165" width="18" height="26" fill="#F59E0B" opacity="0.55" rx="1"/>
  <text x="522" y="265" font-size="9.5" fill="#374151">→ entry theo hướng MỚI</text>

  <!-- comparison table -->
  <text x="24" y="336" font-size="14" font-weight="700" fill="#1F2937">Bảng đặc điểm</text>
  <rect x="24" y="348" width="712" height="132" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <!-- header -->
  <line x1="24" y1="374" x2="736" y2="374" stroke="#E5E7EB"/>
  <line x1="220" y1="348" x2="220" y2="480" stroke="#E5E7EB"/>
  <line x1="392" y1="348" x2="392" y2="480" stroke="#E5E7EB"/>
  <line x1="564" y1="348" x2="564" y2="480" stroke="#E5E7EB"/>
  <text x="34" y="367" font-size="10.5" font-weight="700" fill="#374151">Đặc điểm</text>
  <text x="230" y="367" font-size="10.5" font-weight="700" fill="#1D4ED8">Order Block</text>
  <text x="402" y="367" font-size="10.5" font-weight="700" fill="#15803D">Mitigation Block</text>
  <text x="574" y="367" font-size="10.5" font-weight="700" fill="#B91C1C">Breaker Block</text>
  <!-- rows -->
  <line x1="24" y1="400" x2="736" y2="400" stroke="#F1F1F4"/>
  <line x1="24" y1="426" x2="736" y2="426" stroke="#F1F1F4"/>
  <line x1="24" y1="452" x2="736" y2="452" stroke="#F1F1F4"/>
  <text x="34" y="391" font-size="10" fill="#374151">Failure swing?</text>
  <text x="230" y="391" font-size="10" fill="#6B7280">Không (tiếp diễn)</text>
  <text x="402" y="391" font-size="10" fill="#6B7280">Có</text>
  <text x="574" y="391" font-size="10" fill="#6B7280">Có</text>
  <text x="34" y="417" font-size="10" fill="#374151">Có sweep?</text>
  <text x="230" y="417" font-size="10" fill="#6B7280">Không</text>
  <text x="402" y="417" font-size="10" font-weight="700" fill="#15803D">KHÔNG (swing giữ)</text>
  <text x="574" y="417" font-size="10" font-weight="700" fill="#B91C1C">CÓ (swing bị phá)</text>
  <text x="34" y="443" font-size="10" fill="#374151">Hướng entry</text>
  <text x="230" y="443" font-size="10" fill="#6B7280">Hướng gốc</text>
  <text x="402" y="443" font-size="10" fill="#6B7280">Hướng mới</text>
  <text x="574" y="443" font-size="10" fill="#6B7280">Hướng mới</text>
  <text x="34" y="469" font-size="10" fill="#374151">SL logic</text>
  <text x="230" y="469" font-size="10" fill="#6B7280">Ngoài OB</text>
  <text x="402" y="469" font-size="10" fill="#6B7280">Dưới higher low</text>
  <text x="574" y="469" font-size="10" fill="#6B7280">Dưới điểm sweep</text>
</svg>
