<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="540" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Runaway trend không bao giờ về OTE — re-anchor sang leg mới, đừng nới chuẩn entry</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Lỗi kinh điển sau khi "lỡ tàu": hoặc nhảy vào ở 38–50%, hoặc ôm mãi thang fib cũ. Cả hai đều sai — thang fib phải sống theo cấu trúc.</text>

  <rect x="24" y="70" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Leg 1 -->
  <path d="M60,390 L92,340 L114,362 L150,270 L172,292 L205,205" fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- OTE zone leg1 -->
  <rect x="60" y="310" width="200" height="46" fill="#2563EB" opacity="0.12"/>
  <text x="64" y="326" font-size="9.5" font-weight="700" fill="#1D4ED8">OTE leg 1 — giá KHÔNG BAO GIỜ quay về</text>
  <!-- shallow retrace -->
  <path d="M205,205 L228,248 L242,238 L262,258 L280,244" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="230" y="278" font-size="9.5" fill="#B91C1C">retrace chỉ ~38% rồi đi tiếp ✗ không entry</text>

  <!-- BOS marker -->
  <line x1="150" y1="270" x2="330" y2="270" stroke="#16A34A" stroke-width="1" stroke-dasharray="5 4"/>
  <path d="M280,244 L316,170 L338,192 L378,105" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="316" cy="170" r="5" fill="none" stroke="#15803D" stroke-width="2"/>
  <text x="330" y="160" font-size="9.5" font-weight="700" fill="#15803D">BOS mới → leg MỚI ra đời</text>

  <!-- Leg 2: from 280,244 low to 378,105 high -->
  <rect x="280" y="185" width="420" height="38" fill="#F59E0B" opacity="0.22"/>
  <text x="560" y="200" font-size="10" font-weight="700" fill="#92400E">OTE của LEG 2 (re-anchor)</text>
  <text x="560" y="213" font-size="9" fill="#92400E">62–79% của 280,244→378,105</text>

  <!-- retrace into leg2 OTE -->
  <path d="M378,105 L402,152 L418,142 L442,198 L458,210 L472,200 L492,155 L520,120 L556,88 L596,60" fill="none" stroke="#2563EB" stroke-width="2"/>
  <circle cx="458" cy="210" r="6" fill="#16A34A"/>
  <text x="428" y="238" font-size="10.5" font-weight="700" fill="#15803D">✓ entry tại OTE leg 2</text>

  <!-- old fib ghost -->
  <text x="64" y="374" font-size="9.5" font-style="italic" fill="#9CA3AF">thang fib leg 1 → xóa sau khi BOS mới xuất hiện (nó thuộc về một dealing range đã cũ)</text>

  <!-- three wrong/right boxes -->
  <rect x="24" y="444" width="712" height="80" rx="8" fill="#F3F4F6"/>
  <text x="38" y="466" font-size="12.5" font-weight="700" fill="#1F2937">Ba phản ứng khi giá chạy mất không về OTE</text>
  <text x="38" y="486" font-size="11" fill="#B91C1C">✗ Nhảy vào 38–50% "kẻo lỡ" — phá chuẩn entry, R:R xấu, đây là FOMO mặc đồng phục Fibonacci.</text>
  <text x="38" y="502" font-size="11" fill="#B91C1C">✗ Ôm thang fib cũ chờ mãi — sau BOS mới + re-mapping, vùng OTE cũ không còn ai bảo vệ.</text>
  <text x="38" y="518" font-size="11" fill="#15803D">✓ Chờ BOS kế tiếp → kéo fib cho leg MỚI → OTE mới, gần giá hơn, còn nguyên narrative. Trend càng mạnh càng nhiều leg mới để chờ.</text>
</svg>
