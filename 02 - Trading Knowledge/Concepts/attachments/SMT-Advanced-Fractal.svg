<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Đọc SMT ĐÚNG điểm: so swing tương ứng, không so bừa</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Chỉ so hai đáy/đỉnh CÙNG một cú swing (cùng fractal, cùng thời điểm) — lệch swing = SMT giả.</text><rect x="24" y="72" width="352" height="330" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/><text x="40" y="94" font-size="12.5" font-weight="700" fill="#166534">✓ ĐÚNG — cùng swing, cùng nến</text><line x1="65.0" y1="110" x2="65.0" y2="160" stroke="#DC2626" stroke-width="1.3"/><rect x="60" y="120" width="10" height="30" fill="#DC2626"/><line x1="95.0" y1="120" x2="95.0" y2="300" stroke="#DC2626" stroke-width="1.3"/><rect x="90" y="180" width="10" height="50" fill="#DC2626"/><line x1="125.0" y1="190" x2="125.0" y2="260" stroke="#16A34A" stroke-width="1.3"/><rect x="120" y="200" width="10" height="50" fill="#16A34A"/><line x1="155.0" y1="150" x2="155.0" y2="330" stroke="#DC2626" stroke-width="1.3"/><rect x="150" y="220" width="10" height="50" fill="#DC2626"/><circle cx="95" cy="300" r="7" fill="none" stroke="#6B7280" stroke-width="2"/><text x="70" y="320" font-size="8.5" fill="#6B7280">low 1</text><circle cx="155" cy="330" r="8" fill="none" stroke="#B45309" stroke-width="2.5"/><text x="150" y="352" font-size="8.5" font-weight="700" fill="#B45309">low 2 (LL)</text><text x="230" y="120" font-size="10" fill="#6B7280">NQ</text><line x1="225.0" y1="110" x2="225.0" y2="160" stroke="#DC2626" stroke-width="1.3"/><rect x="220" y="120" width="10" height="30" fill="#DC2626"/><line x1="255.0" y1="120" x2="255.0" y2="300" stroke="#DC2626" stroke-width="1.3"/><rect x="250" y="180" width="10" height="50" fill="#DC2626"/><line x1="285.0" y1="190" x2="285.0" y2="260" stroke="#16A34A" stroke-width="1.3"/><rect x="280" y="200" width="10" height="50" fill="#16A34A"/><line x1="315.0" y1="190" x2="315.0" y2="285" stroke="#DC2626" stroke-width="1.3"/><rect x="310" y="200" width="10" height="50" fill="#DC2626"/><circle cx="315" cy="285" r="8" fill="none" stroke="#166534" stroke-width="2.5"/><text x="305" y="305" font-size="8.5" font-weight="700" fill="#166534">HL</text><text x="335" y="120" font-size="10" fill="#6B7280">ES</text><text x="40" y="388" font-size="10" fill="#374151">So low2↔low2 (cùng cú push cuối) → SMT hợp lệ.</text><rect x="392" y="72" width="344" height="330" rx="8" fill="#FEF2F2" stroke="#FECACA"/><text x="408" y="94" font-size="12.5" font-weight="700" fill="#B91C1C">✗ SAI — so lệch swing / lệch thời gian</text><line x1="425.0" y1="140" x2="425.0" y2="300" stroke="#DC2626" stroke-width="1.3"/><rect x="420" y="150" width="10" height="50" fill="#DC2626"/><line x1="450.0" y1="170" x2="450.0" y2="240" stroke="#16A34A" stroke-width="1.3"/><rect x="445" y="180" width="10" height="50" fill="#16A34A"/><line x1="505.0" y1="190" x2="505.0" y2="330" stroke="#DC2626" stroke-width="1.3"/><rect x="500" y="200" width="10" height="60" fill="#DC2626"/><line x1="530.0" y1="170" x2="530.0" y2="240" stroke="#16A34A" stroke-width="1.3"/><rect x="525" y="180" width="10" height="50" fill="#16A34A"/><circle cx="425" cy="300" r="7" fill="none" stroke="#6B7280" stroke-width="2"/><circle cx="505" cy="330" r="7" fill="none" stroke="#B91C1C" stroke-width="2"/><line x1="432" y1="300" x2="500" y2="330" stroke="#B91C1C" stroke-width="1.4" stroke-dasharray="4 3"/><text x="430" y="360" font-size="9.5" fill="#B91C1C">so đáy A với đáy B ở 2 cú swing KHÁC nhau</text><text x="408" y="388" font-size="10" fill="#374151">Khác thời điểm/khác fractal → "lệch" là ảo giác.</text>
</svg>
