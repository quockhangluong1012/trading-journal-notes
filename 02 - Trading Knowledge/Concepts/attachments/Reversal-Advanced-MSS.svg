<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Tầng 3: MSS — phá swing đối-xu-hướng GẦN NHẤT</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Bullish MSS = phá lower swing high gần nhất (phe bán mất kiểm soát). KHÔNG phải mọi swing đều tính.</text>

  <!-- Panel -->
  <rect x="24" y="72" width="712" height="292" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- downtrend: series of lower swing highs and lows -->
  <!-- swing high 1 -->
  <line x1="70" y1="110" x2="70" y2="150" stroke="#DC2626" stroke-width="1.4"/><rect x="64.5" y="118" width="11" height="26" fill="#DC2626"/>
  <line x1="92" y1="130" x2="92" y2="185" stroke="#DC2626" stroke-width="1.4"/><rect x="86.5" y="138" width="11" height="40" fill="#DC2626"/>
  <circle cx="70" cy="110" r="5" fill="#DC2626"/>
  <text x="60" y="103" font-size="8.5" fill="#6B7280">swing high 1</text>
  <!-- swing low 1 -->
  <line x1="114" y1="170" x2="114" y2="220" stroke="#DC2626" stroke-width="1.4"/><rect x="108.5" y="185" width="11" height="28" fill="#DC2626"/>
  <circle cx="114" cy="220" r="5" fill="#16A34A"/>
  <!-- pullback up = swing high 2 (lower) -->
  <line x1="138" y1="150" x2="138" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="132.5" y="160" width="11" height="35" fill="#16A34A"/>
  <line x1="160" y1="150" x2="160" y2="190" stroke="#16A34A" stroke-width="1.4"/><rect x="154.5" y="158" width="11" height="30" fill="#16A34A"/>
  <circle cx="160" cy="150" r="5" fill="#DC2626"/>
  <text x="150" y="143" font-size="8.5" fill="#6B7280">swing high 2</text>
  <!-- down to lower low -->
  <line x1="182" y1="165" x2="182" y2="230" stroke="#DC2626" stroke-width="1.4"/><rect x="176.5" y="175" width="11" height="45" fill="#DC2626"/>
  <line x1="204" y1="200" x2="204" y2="270" stroke="#DC2626" stroke-width="1.4"/><rect x="198.5" y="210" width="11" height="50" fill="#DC2626"/>
  <circle cx="204" cy="270" r="5" fill="#16A34A"/>
  <!-- last counter-trend pullback = MOST RECENT lower swing high -->
  <line x1="228" y1="185" x2="228" y2="255" stroke="#16A34A" stroke-width="1.4"/><rect x="222.5" y="195" width="11" height="45" fill="#16A34A"/>
  <line x1="250" y1="175" x2="250" y2="220" stroke="#16A34A" stroke-width="1.4"/><rect x="244.5" y="183" width="11" height="30" fill="#16A34A"/>
  <circle cx="250" cy="175" r="6" fill="none" stroke="#166534" stroke-width="2.5"/>
  <!-- most recent lower swing high level line -->
  <line x1="250" y1="175" x2="560" y2="175" stroke="#166534" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="300" y="169" font-size="10.5" font-weight="700" fill="#166534">lower swing high GẦN NHẤT = mức MSS</text>
  <!-- final low then displacement up through the level -->
  <line x1="272" y1="205" x2="272" y2="285" stroke="#DC2626" stroke-width="1.4"/><rect x="266.5" y="215" width="11" height="60" fill="#DC2626"/>
  <circle cx="272" cy="285" r="5" fill="#16A34A"/>
  <text x="255" y="303" font-size="8.5" fill="#6B7280">lower low cuối</text>
  <line x1="296" y1="230" x2="296" y2="290" stroke="#16A34A" stroke-width="1.4"/><rect x="290.5" y="240" width="11" height="45" fill="#16A34A"/>
  <line x1="318" y1="190" x2="318" y2="248" stroke="#16A34A" stroke-width="1.4"/><rect x="312.5" y="200" width="11" height="45" fill="#16A34A"/>
  <!-- break candle: displacement closes above the MSS level -->
  <line x1="342" y1="130" x2="342" y2="205" stroke="#16A34A" stroke-width="1.4"/><rect x="336.5" y="140" width="11" height="55" fill="#16A34A"/>
  <circle cx="342" cy="172" r="9" fill="none" stroke="#166534" stroke-width="2.5"/>
  <text x="356" y="150" font-size="11" font-weight="700" fill="#166534">Bullish MSS ✔</text>
  <text x="356" y="164" font-size="9" fill="#166534">displacement đóng trên mức</text>
  <!-- continuation -->
  <line x1="366" y1="120" x2="366" y2="160" stroke="#16A34A" stroke-width="1.4"/><rect x="360.5" y="128" width="11" height="26" fill="#16A34A"/>

  <!-- WRONG note -->
  <rect x="430" y="200" width="290" height="146" rx="6" fill="#FEF3C7"/>
  <text x="444" y="222" font-size="11" font-weight="700" fill="#92400E">Chọn ĐÚNG swing để phá</text>
  <text x="444" y="244" font-size="10" fill="#92400E">• Chỉ mức swing high đối-xu-hướng GẦN</text>
  <text x="444" y="257" font-size="10" fill="#92400E">  NHẤT mới là MSS thật.</text>
  <text x="444" y="277" font-size="10" fill="#B91C1C">• Phá swing high 1/2 ở XA phía trên =</text>
  <text x="444" y="290" font-size="10" fill="#B91C1C">  chưa đủ; phá một pullback nhỏ bất kỳ</text>
  <text x="444" y="303" font-size="10" fill="#B91C1C">  = tự lừa mình (đó chỉ là BOS nội bộ).</text>
  <text x="444" y="323" font-size="10" fill="#92400E">• Bearish MSS = phá higher swing low</text>
  <text x="444" y="336" font-size="10" fill="#92400E">  gần nhất (đối xứng hoàn toàn).</text>

  <text x="24" y="392" font-size="11.5" font-weight="700" fill="#166534">MSS = xác nhận thứ 3 / gần cuối. Sau MSS: chờ retrace về Breaker/IFVG/BPR/FVG hình thành khi phá cấu trúc, rồi vào.</text>
</svg>
