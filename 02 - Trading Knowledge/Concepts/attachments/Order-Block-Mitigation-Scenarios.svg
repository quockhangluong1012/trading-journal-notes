<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obm" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Các kịch bản giá quay về Bullish OB (A → E)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Từ mạnh (touch &amp; go) tới chết (đóng thân xuyên) • Bearish OB đảo chiều tương ứng</text>

  <!-- A: Touch & go -->
  <rect x="24" y="72" width="220" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="14" font-weight="700" fill="#16A34A">A. Touch &amp; go</text>
  <text x="36" y="110" font-size="10.5" fill="#6B7280">Chạm biên proximal là bật ngay</text>
  <rect x="44" y="190" width="180" height="34" fill="#16A34A" opacity="0.12"/>
  <text x="48" y="186" font-size="10" fill="#166534" font-weight="700">OB</text>
  <rect x="80" y="180" width="2" height="52" fill="#16A34A"/><rect x="74" y="188" width="12" height="34" fill="#16A34A" rx="1"/>
  <rect x="108" y="150" width="2" height="52" fill="#DC2626"/><rect x="102" y="158" width="12" height="30" fill="#DC2626" rx="1"/>
  <rect x="136" y="130" width="2" height="70" fill="#16A34A"/><rect x="130" y="138" width="12" height="54" fill="#16A34A" rx="1"/>
  <path d="M150 150 L184 122" stroke="#16A34A" stroke-width="2" marker-end="url(#obm)"/>
  <text x="36" y="242" font-size="10.5" fill="#374151">OB rất mạnh nhưng entry aggressive, dễ chạm giả.</text>

  <!-- B: CE 50% then reject -->
  <rect x="270" y="72" width="220" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="282" y="94" font-size="14" font-weight="700" fill="#1D4ED8">B. Về đúng CE 50%</text>
  <text x="282" y="110" font-size="10.5" fill="#6B7280">Lấp nửa OB, chạm MT rồi bật</text>
  <rect x="290" y="175" width="180" height="50" fill="#16A34A" opacity="0.12"/>
  <line x1="290" y1="200" x2="470" y2="200" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="474" y="203" font-size="9.5" fill="#1D4ED8" font-weight="700">MT 50%</text>
  <rect x="326" y="150" width="2" height="70" fill="#DC2626"/><rect x="320" y="158" width="12" height="44" fill="#DC2626" rx="1"/>
  <rect x="354" y="196" width="2" height="30" fill="#DC2626"/><rect x="348" y="200" width="12" height="18" fill="#DC2626" rx="1"/>
  <rect x="382" y="130" width="2" height="76" fill="#16A34A"/><rect x="376" y="138" width="12" height="60" fill="#16A34A" rx="1"/>
  <path d="M368 198 L402 128" stroke="#16A34A" stroke-width="2" marker-end="url(#obm)"/>
  <text x="282" y="242" font-size="10.5" fill="#1D4ED8" font-weight="700">Entry sách giáo khoa — ưu tiên số một.</text>

  <!-- C: fill to distal -->
  <rect x="516" y="72" width="220" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="528" y="94" font-size="14" font-weight="700" fill="#B45309">C. Lấp gần biên distal</text>
  <text x="528" y="110" font-size="10.5" fill="#6B7280">Đi sâu tới sát đáy râu rồi quay đầu</text>
  <rect x="536" y="165" width="180" height="62" fill="#F59E0B" opacity="0.14"/>
  <line x1="536" y1="222" x2="716" y2="222" stroke="#B45309" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="540" y="235" font-size="9" fill="#B45309">đáy râu (phòng tuyến cuối)</text>
  <rect x="572" y="150" width="2" height="76" fill="#DC2626"/><rect x="566" y="156" width="12" height="60" fill="#DC2626" rx="1"/>
  <rect x="600" y="188" width="2" height="34" fill="#DC2626"/><rect x="594" y="194" width="12" height="22" fill="#DC2626" rx="1"/>
  <rect x="628" y="140" width="2" height="82" fill="#16A34A"/><rect x="622" y="148" width="12" height="66" fill="#16A34A" rx="1"/>
  <path d="M614 214 L648 138" stroke="#16A34A" stroke-width="2" marker-end="url(#obm)"/>
  <text x="528" y="242" font-size="10.5" fill="#374151">Còn hiệu lực tới khi đóng dưới đáy — cần LTF confirm.</text>

  <!-- D: close through -->
  <rect x="24" y="270" width="350" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="292" font-size="14" font-weight="700" fill="#DC2626">D. Đóng cửa xuyên qua OB — Invalidation</text>
  <text x="36" y="308" font-size="10.5" fill="#6B7280">Nến đóng THÂN dưới đáy OB + giữ acceptance</text>
  <rect x="60" y="360" width="290" height="40" fill="#16A34A" opacity="0.12"/>
  <text x="64" y="356" font-size="10" fill="#166534" font-weight="700">OB (đã chết)</text>
  <rect x="96" y="352" width="2" height="54" fill="#16A34A"/><rect x="90" y="360" width="12" height="38" fill="#16A34A" rx="1"/>
  <rect x="124" y="330" width="2" height="48" fill="#16A34A"/><rect x="118" y="336" width="12" height="36" fill="#16A34A" rx="1"/>
  <rect x="152" y="356" width="2" height="88" fill="#DC2626"/><rect x="146" y="362" width="12" height="76" fill="#DC2626" rx="1"/>
  <rect x="184" y="420" width="2" height="40" fill="#DC2626"/><rect x="178" y="426" width="12" height="28" fill="#DC2626" rx="1"/>
  <path d="M170 400 L204 440" stroke="#B91C1C" stroke-width="2" marker-end="url(#obm)"/>
  <text x="218" y="418" font-size="10.5" fill="#B91C1C" font-weight="700">Bỏ ý tưởng,</text>
  <text x="218" y="432" font-size="10.5" fill="#B91C1C" font-weight="700">không gồng, không dời stop.</text>

  <!-- E: fail -> breaker -->
  <rect x="392" y="270" width="344" height="180" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="404" y="292" font-size="14" font-weight="700" fill="#7C3AED">E. OB fail → Breaker (flip)</text>
  <text x="404" y="308" font-size="10.5" fill="#6B7280">Bị phá rồi test lại từ phía ngược</text>
  <rect x="428" y="358" width="290" height="38" fill="#16A34A" opacity="0.10"/>
  <text x="432" y="354" font-size="10" fill="#6B21A8" font-weight="700">OB → flip role</text>
  <rect x="464" y="352" width="2" height="86" fill="#DC2626"/><rect x="458" y="360" width="12" height="72" fill="#DC2626" rx="1"/>
  <rect x="496" y="378" width="2" height="54" fill="#16A34A"/><rect x="490" y="386" width="12" height="38" fill="#16A34A" rx="1"/>
  <rect x="528" y="384" width="2" height="80" fill="#DC2626"/><rect x="522" y="390" width="12" height="66" fill="#DC2626" rx="1"/>
  <path d="M542 392 L576 432" stroke="#6B21A8" stroke-width="2" marker-end="url(#obm)"/>
  <text x="588" y="404" font-size="10.5" fill="#6B21A8" font-weight="700">Retest → Short</text>
  <text x="404" y="440" font-size="10.5" fill="#374151">Đọc theo [[Breaker Block]]; chỉ vào khi cấu trúc xác nhận đảo.</text>
</svg>
