<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Proximal / Distal &amp; Premium–Discount</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Bullish Hidden OB nằm ở nửa DISCOUNT của dealing range → long xác suất cao.</text>

  <rect x="24" y="72" width="712" height="360" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- dealing range: ERL high top, ERL low bottom, EQ middle -->
  <line x1="60" y1="110" x2="700" y2="110" stroke="#166534" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="600" y="104" font-size="10" fill="#166534">ERL high (đỉnh range) — target</text>
  <line x1="60" y1="252" x2="700" y2="252" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="600" y="246" font-size="10" fill="#6B7280">Equilibrium (50%)</text>
  <line x1="60" y1="400" x2="700" y2="400" stroke="#B91C1C" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="600" y="418" font-size="10" fill="#B91C1C">ERL low (đáy range)</text>

  <!-- premium/discount shading labels -->
  <rect x="60" y="110" width="20" height="142" fill="#FEE2E2"/>
  <text x="86" y="185" font-size="11" font-weight="700" fill="#B91C1C">PREMIUM (bán)</text>
  <rect x="60" y="252" width="20" height="148" fill="#DCFCE7"/>
  <text x="86" y="330" font-size="11" font-weight="700" fill="#166534">DISCOUNT (mua)</text>

  <!-- price coming down into discount -->
  <path d="M100,130 L150,180 L200,160 L250,230 L300,300" fill="none" stroke="#374151" stroke-width="2"/>

  <!-- hidden OB box in discount -->
  <rect x="300" y="300" width="150" height="70" fill="#DBEAFE" stroke="#1D4ED8" stroke-width="1.3"/>
  <line x1="300" y1="308" x2="700" y2="308" stroke="#1D4ED8" stroke-width="1.4"/>
  <text x="458" y="304" font-size="10.5" font-weight="700" fill="#1D4ED8">Proximal (mép gần giá) → điểm VÀO</text>
  <line x1="300" y1="362" x2="700" y2="362" stroke="#B45309" stroke-width="1.4"/>
  <text x="458" y="378" font-size="10.5" font-weight="700" fill="#B45309">Distal (mép xa) → STOP đặt bên ngoài</text>
  <text x="312" y="340" font-size="11" font-weight="700" fill="#1D4ED8">Hidden OB</text>

  <!-- two hidden-OB candles inside box (schematic) -->
  <line x1="330" y1="300" x2="330" y2="368" stroke="#16A34A" stroke-width="1.4"/><rect x="324.5" y="315" width="11" height="35" fill="#16A34A"/>
  <line x1="352" y1="308" x2="352" y2="362" stroke="#16A34A" stroke-width="1.4"/><rect x="346.5" y="320" width="11" height="30" fill="#16A34A"/>

  <!-- bounce up -->
  <path d="M375,340 L420,290 L470,250 L520,190 L580,140 L640,112" fill="none" stroke="#166534" stroke-width="2.4"/>
  <polygon points="640,112 630,116 634,124" fill="#166534"/>
  <text x="480" y="230" font-size="10.5" font-weight="700" fill="#166534">Long từ proximal → target ERL high</text>

  <text x="40" y="430" font-size="10.5" fill="#6B7280">Đảo lại: Bearish Hidden OB trong PREMIUM → short, proximal = mép dưới box, distal = mép trên, target ERL low.</text>
</svg>
