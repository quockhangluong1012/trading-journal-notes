<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="32" font-size="16" font-weight="700" fill="#B91C1C">✗ Ví dụ SAI — CISD giữa range, không sweep, ngược bias</text>

  <rect x="24" y="50" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="72" font-size="11.5" fill="#6B7280">Ngày bias BEARISH nhưng vào long chỉ vì thấy 1 nến đóng qua open chuỗi giảm — giữa range, chưa lấy thanh khoản nào.</text>

  <line x1="80" y1="110" x2="700" y2="110" stroke="#B91C1C" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="560" y="104" font-size="10" font-weight="700" fill="#B91C1C">BSL chưa bị quét (draw thật ở trên)</text>
  <line x1="80" y1="290" x2="700" y2="290" stroke="#6B7280" stroke-width="1.1" stroke-dasharray="4 3"/>
  <text x="90" y="285" font-size="10" fill="#6B7280">SSL — draw on liquidity THẬT ở dưới</text>

  <rect x="140" y="180" width="13" height="45" fill="#DC2626"/><rect x="162" y="195" width="13" height="50" fill="#DC2626"/>
  <line x1="130" y1="180" x2="430" y2="180" stroke="#0EA5E9" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="300" y="174" font-size="10" font-weight="700" fill="#0284C7">CISD level (giữa range)</text>
  <rect x="188" y="160" width="13" height="70" fill="#16A34A"/><circle cx="194" cy="170" r="6" fill="#0EA5E9"/>
  <text x="206" y="160" font-size="9.5" font-weight="700" fill="#B91C1C">long ở đây ✗</text>
  <rect x="216" y="175" width="13" height="55" fill="#DC2626"/><rect x="238" y="200" width="13" height="60" fill="#DC2626"/><rect x="260" y="230" width="13" height="60" fill="#DC2626"/>
  <path d="M 300 250 L 360 290" stroke="#B91C1C" stroke-width="2" fill="none" marker-end="url(#a)"/>
  <text x="320" y="250" font-size="10" font-weight="700" fill="#B91C1C">giá tiếp tục giảm về SSL → stop</text>

  <text x="36" y="372" font-size="11" fill="#374151">Bài học: CISD giữa range + ngược bias + chưa có sweep = tín hiệu giả. CISD phải nằm ở CỰC TRỊ sau khi lấy thanh khoản.</text>
