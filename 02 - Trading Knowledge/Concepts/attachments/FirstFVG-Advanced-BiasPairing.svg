<text x="60" y="394" font-size="10.5" font-weight="700" fill="#166534">hướng, conviction cao</text>
<!-- AGAINST BIAS -->
<rect x="392" y="70" width="344" height="340" rx="8" fill="#FFFFFF" stroke="#DC2626"/>
<text x="408" y="94" font-size="12.5" font-weight="700" fill="#B91C1C">NGƯỢC bias (bullish bias + bearish FVG)</text>
<text x="408" y="112" font-size="10.5" fill="#374151">→ manipulation / fakeout, coi chừng bẫy</text>
<text x="408" y="150" font-size="10.5" font-weight="700" fill="#166534">Daily Bias: ↑ BULLISH (hướng thật)</text>
