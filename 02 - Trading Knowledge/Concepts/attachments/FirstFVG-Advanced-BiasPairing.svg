<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ghép 1st FVG với Daily Bias</text>
<text x="24" y="54" font-size="12.5" fill="#6B7280">Cùng bias = continuation sạch. Ngược bias = cửa sổ manipulation / fakeout, quét thanh khoản rồi đảo.</text>
