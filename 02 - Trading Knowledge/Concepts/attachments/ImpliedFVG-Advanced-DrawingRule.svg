<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Cách vẽ Implied FVG khi KHÔNG có FVG chuẩn 3 nến</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Trước: bóng nến chồng lấp che gap. Sau: dùng CE của bóng hai bên để suy ra vùng ẩn</text>

  <!-- Panel A: BEFORE - no clean 3-candle FVG -->
  <rect x="24" y="72" width="342" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="94" font-size="13" font-weight="700" fill="#374151">TRƯỚC — không có FVG 3-nến rõ</text>

  <line x1="50" y1="260" x2="352" y2="260" stroke="#D8DBE2" stroke-width="1"/>

  <!-- candle 1 -->
  <rect x="90" y="170" width="2.5" height="90" fill="#16A34A"/>
  <rect x="82" y="200" width="16" height="45" fill="#16A34A" rx="1"/>
  <text x="75" y="275" font-size="10.5" fill="#6B7280">N1</text>

  <!-- candle 2 large -->
  <rect x="150" y="120" width="3" height="150" fill="#15803D"/>
  <rect x="140" y="130" width="20" height="120" fill="#16A34A" rx="1"/>
  <text x="130" y="285" font-size="10.5" fill="#166534" font-weight="700">N2 lớn</text>

  <!-- candle 3 -->
  <rect x="210" y="150" width="2.5" height="100" fill="#16A34A"/>
  <rect x="202" y="155" width="16" height="55" fill="#16A34A" rx="1"/>
  <text x="196" y="275" font-size="10.5" fill="#6B7280">N3</text>

  <!-- overlap highlight -->
  <rect x="82" y="200" width="146" height="50" fill="none" stroke="#9CA3AF" stroke-dasharray="3 3"/>
  <text x="220" y="195" font-size="9.5" fill="#6B7280">bóng N1 &amp; N3 chồng vào range N2</text>
  <text x="252" y="209" font-size="9.5" fill="#6B7280">→ high N1 / low N3 vô nghĩa để lấy gap</text>

  <text x="40" y="300" font-size="10.5" fill="#DC2626" font-weight="700">✗ Không có gap 3-nến để vẽ FVG chuẩn</text>

  <!-- arrow between panels -->
  <defs>
    <marker id="rulearrow" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#6B7280"/>
    </marker>
  </defs>
  <path d="M 372 187 L 400 187" stroke="#6B7280" stroke-width="2" marker-end="url(#rulearrow)"/>
  <text x="368" y="170" font-size="10.5" fill="#6B7280">Dùng CE</text>
  <text x="368" y="205" font-size="10.5" fill="#6B7280">của bóng</text>

  <!-- Panel B: AFTER - implied zone using CE midpoints -->
  <rect x="410" y="72" width="326" height="230" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="424" y="94" font-size="13" font-weight="700" fill="#374151">SAU — vùng Implied FVG suy ra</text>

  <line x1="436" y1="260" x2="722" y2="260" stroke="#D8DBE2" stroke-width="1"/>

  <rect x="470" y="170" width="2.5" height="90" fill="#16A34A"/>
  <rect x="462" y="200" width="16" height="45" fill="#16A34A" rx="1"/>

  <rect x="530" y="120" width="3" height="150" fill="#15803D"/>
  <rect x="520" y="130" width="20" height="120" fill="#16A34A" rx="1"/>

  <rect x="590" y="150" width="2.5" height="100" fill="#16A34A"/>
  <rect x="582" y="155" width="16" height="55" fill="#16A34A" rx="1"/>

  <!-- CE line on wick of candle 1 (upper wick portion, facing N2) -->
  <line x1="450" y1="210" x2="620" y2="210" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="470" cy="210" r="3.5" fill="#3B82F6"/>
  <text x="446" y="120" font-size="9.5" fill="#1D4ED8" font-weight="700">CE bóng trên N1 (50%)</text>
  <path d="M 470 155 L 470 205" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="2 2"/>

  <!-- CE line on wick of candle 3 (lower wick, facing N2) -->
  <line x1="450" y1="230" x2="620" y2="230" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="6 4"/>
  <circle cx="590" cy="230" r="3.5" fill="#3B82F6"/>
  <text x="446" y="290" font-size="9.5" fill="#1D4ED8" font-weight="700">CE bóng dưới N3 (50%)</text>

  <!-- implied zone -->
  <rect x="450" y="210" width="170" height="20" fill="#F59E0B" opacity="0.35"/>
  <text x="452" y="223" font-size="9" font-weight="700" fill="#92400E">Implied FVG</text>

  <text x="424" y="300" font-size="10.5" fill="#15803D" font-weight="700">✓ Vùng ẩn giữa 2 mức CE = Implied FVG</text>

  <!-- Numbered workflow -->
  <rect x="24" y="316" width="712" height="142" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="338" font-size="13" font-weight="700" fill="#1F2937">Quy trình vẽ (4 bước)</text>

  <circle cx="46" cy="356" r="9" fill="#3B82F6"/><text x="42" y="360" font-size="10" fill="#FFFFFF" font-weight="700">1</text>
  <text x="62" y="360" font-size="11.5" fill="#374151">Xác định nến lớn (displacement) mà bóng hai nến liền kề chồng vào range của nó — không có gap 3-nến rõ.</text>

  <circle cx="46" cy="378" r="9" fill="#3B82F6"/><text x="42" y="382" font-size="10" fill="#FFFFFF" font-weight="700">2</text>
  <text x="62" y="382" font-size="11.5" fill="#374151">Lấy CE (50%) của bóng nến TRƯỚC, đo trên phần bóng hướng về phía nến lớn (upper wick nếu tăng).</text>

  <circle cx="46" cy="400" r="9" fill="#3B82F6"/><text x="42" y="404" font-size="10" fill="#FFFFFF" font-weight="700">3</text>
  <text x="62" y="404" font-size="11.5" fill="#374151">Lấy CE (50%) của bóng nến SAU, đo trên phần bóng hướng về phía nến lớn (lower wick nếu tăng).</text>

  <circle cx="46" cy="422" r="9" fill="#3B82F6"/><text x="42" y="426" font-size="10" fill="#FFFFFF" font-weight="700">4</text>
  <text x="62" y="426" font-size="11.5" fill="#374151">Vùng giữa hai mức CE = Implied FVG. Vô hiệu khi giá đóng nến xuyên qua toàn bộ vùng này.</text>

  <text x="38" y="448" font-size="10.5" fill="#B45309" font-weight="600">Lưu ý: cần backtest xác nhận ngưỡng thành công của kỹ thuật này trên NQ1/EURUSD/XAUUSD trước khi tăng size.</text>
</svg>
