<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Sau mỗi External BOS — vẽ lại Dealing Range &amp; Premium/Discount</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">BOS không chỉ là tín hiệu; nó là lệnh "cập nhật bản đồ". Không remap = trade trên bản đồ cũ.</text>

  <!-- Before panel -->
  <rect x="24" y="76" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="38" y="100" font-size="13" font-weight="700" fill="#1F2937">TRƯỚC BOS — range cũ</text>
  <!-- old range -->
  <line x1="50" y1="140" x2="350" y2="140" stroke="#6B7280" stroke-width="1.6"/>
  <text x="54" y="132" font-size="10" fill="#6B7280">Range high (old)</text>
  <line x1="50" y1="340" x2="350" y2="340" stroke="#6B7280" stroke-width="1.6"/>
  <text x="54" y="356" font-size="10" fill="#6B7280">Range low (old) = protected low</text>
  <line x1="50" y1="240" x2="350" y2="240" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="54" y="234" font-size="9.5" fill="#9CA3AF">EQ cũ (50%)</text>
  <rect x="50" y="140" width="300" height="100" fill="#FCA5A5" opacity="0.10"/>
  <rect x="50" y="240" width="300" height="100" fill="#86EFAC" opacity="0.12"/>
  <text x="290" y="165" font-size="10" fill="#B91C1C">premium cũ</text>
  <text x="290" y="325" font-size="10" fill="#15803D">discount cũ</text>
  <path d="M70,330 L120,260 L155,300 L210,190 L245,235 L300,146" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="300" cy="146" r="8" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="245" y="126" font-size="10.5" font-weight="700" fill="#5B21B6">External BOS tại đây</text>

  <!-- After panel -->
  <rect x="386" y="76" width="350" height="330" rx="8" fill="#FFFFFF" stroke="#16A34A"/>
  <text x="400" y="100" font-size="13" font-weight="700" fill="#166534">SAU BOS — range mới (remap ngay)</text>
  <!-- new range: from protected low new (ITL before break) to new high -->
  <line x1="412" y1="120" x2="712" y2="120" stroke="#16A34A" stroke-width="1.6"/>
  <text x="416" y="112" font-size="10" fill="#166534">New high (leg sau BOS đang in)</text>
  <line x1="412" y1="320" x2="712" y2="320" stroke="#7C3AED" stroke-width="1.8" stroke-dasharray="7 4"/>
  <text x="416" y="338" font-size="10" font-weight="700" fill="#5B21B6">Protected low MỚI = ITL cuối trước BOS (không phải đáy cũ!)</text>
  <line x1="412" y1="220" x2="712" y2="220" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5 4"/>
  <text x="416" y="214" font-size="9.5" fill="#9CA3AF">EQ mới</text>
  <rect x="412" y="120" width="300" height="100" fill="#FCA5A5" opacity="0.10"/>
  <rect x="412" y="220" width="300" height="100" fill="#86EFAC" opacity="0.12"/>
  <text x="650" y="145" font-size="10" fill="#B91C1C">premium mới</text>
  <text x="650" y="305" font-size="10" fill="#15803D">discount mới</text>
  <path d="M432,300 L472,236 L500,268 L545,160 L575,205 L625,128 L655,170 L685,240" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="685" cy="240" r="6" fill="#0EA5E9"/>
  <text x="560" y="262" font-size="10.5" font-weight="700" fill="#0284C7">retrace hiện tại: đã về EQ/discount</text>
  <text x="560" y="277" font-size="10.5" fill="#0284C7">mới → vùng tìm Long hợp lệ</text>

  <rect x="24" y="416" width="712" height="0"/>
  <text x="40" y="430" font-size="11.5" fill="#4B5563"><tspan font-weight="700" fill="#B91C1C">Lỗi phổ biến:</tspan> vẫn đo premium/discount trên range CŨ sau khi BOS đã xảy ra → thấy giá "còn discount" trong khi trên bản đồ mới nó đang ở premium — và ngược lại.</text>
</svg>
