<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obd2" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#9CA3AF"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vị trí OB trong Premium/Discount quyết định độ sâu cần thiết</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">OB càng gần Equilibrium → cần discount sâu hơn (full); OB càng sâu trong Discount/OTE → shallow đã đủ "rẻ"</text>

  <!-- Dealing range box -->
  <rect x="150" y="86" width="300" height="360" fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.3"/>
  <text x="152" y="80" font-size="10.5" fill="#6B7280">Swing High (100%)</text>
  <text x="152" y="460" font-size="10.5" fill="#6B7280">Swing Low (0%)</text>

  <!-- Premium band -->
  <rect x="150" y="86" width="300" height="180" fill="#DC2626" opacity="0.055"/>
  <text x="300" y="140" font-size="12" font-weight="700" fill="#B91C1C" text-anchor="middle">PREMIUM (50–100%)</text>

  <!-- Equilibrium line -->
  <line x1="150" y1="266" x2="450" y2="266" stroke="#374151" stroke-width="1.8" stroke-dasharray="7 4"/>
  <text x="456" y="270" font-size="10.5" font-weight="700" fill="#374151">Equilibrium 50%</text>

  <!-- Discount band -->
  <rect x="150" y="266" width="300" height="180" fill="#16A34A" opacity="0.06"/>
  <text x="300" y="300" font-size="12" font-weight="700" fill="#15803D" text-anchor="middle">DISCOUNT (0–50%)</text>

  <!-- OTE band 62-79% measured from swing high -->
  <rect x="150" y="336" width="300" height="66" fill="#F59E0B" opacity="0.16"/>
  <text x="456" y="345" font-size="9.5" font-weight="700" fill="#B45309">OTE 62–79%</text>
  <text x="456" y="358" font-size="9" fill="#B45309">(discount sâu)</text>

  <!-- OB #1 near equilibrium -->
  <rect x="180" y="240" width="120" height="46" fill="#1D4ED8" opacity="0.16" stroke="#1D4ED8" stroke-width="1.2"/>
  <text x="184" y="256" font-size="9.5" font-weight="700" fill="#1D4ED8">OB gần Equilibrium</text>
  <text x="184" y="268" font-size="8.5" fill="#1D4ED8">(~45–52%)</text>
  <path d="M300 263 L480 250" stroke="#1D4ED8" stroke-width="1.6" marker-end="url(#obd2)"/>
  <rect x="484" y="196" width="248" height="66" rx="6" fill="#1D4ED8" opacity="0.07" stroke="#1D4ED8" stroke-width="1"/>
  <text x="492" y="212" font-size="9.5" font-weight="700" fill="#1E3A8A">→ Chưa đủ "rẻ" ở tầm HTF</text>
  <text x="492" y="226" font-size="9" fill="#1E3A8A">Cần đi sâu hơn (full mitigation,</text>
  <text x="492" y="238" font-size="9" fill="#1E3A8A">có thể xuyên tới đáy râu) trước</text>
  <text x="492" y="250" font-size="9" fill="#1E3A8A">khi buyer HTF thực sự nhập cuộc</text>

  <!-- OB #2 deep in discount/OTE -->
  <rect x="180" y="352" width="120" height="40" fill="#0D9488" opacity="0.18" stroke="#0D9488" stroke-width="1.2"/>
  <text x="184" y="366" font-size="9.5" font-weight="700" fill="#0D9488">OB sâu Discount/OTE</text>
  <text x="184" y="378" font-size="8.5" fill="#0D9488">(~20–30%)</text>
  <path d="M300 372 L480 380" stroke="#0D9488" stroke-width="1.6" marker-end="url(#obd2)"/>
  <rect x="484" y="350" width="248" height="66" rx="6" fill="#0D9488" opacity="0.08" stroke="#0D9488" stroke-width="1"/>
  <text x="492" y="366" font-size="9.5" font-weight="700" fill="#0F766E">→ Đã đủ "rẻ" ở tầm HTF</text>
  <text x="492" y="380" font-size="9" fill="#134E4A">Shallow tap (chỉ giữa CE–đỉnh)</text>
  <text x="492" y="392" font-size="9" fill="#134E4A">đã đủ để buyer nhập cuộc —</text>
  <text x="492" y="404" font-size="9" fill="#134E4A">không cần discount thêm</text>

  <text x="380" y="472" font-size="10" fill="#6B7280" text-anchor="middle">Xem thêm: [[27 - Premium Discount]] · [[26 - OTE - Optimal Trade Entry]]</text>
</svg>
