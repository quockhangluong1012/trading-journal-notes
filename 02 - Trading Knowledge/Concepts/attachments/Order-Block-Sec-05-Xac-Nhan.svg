<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Quy tắc xác nhận / vô hiệu hóa</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Mitigate sạch (OB giữ vai trò) vs OB đã fail → chuyển thành Breaker Block</text>

  <!-- Left: mitigate sạch -->
  <rect x="24" y="70" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="14" font-weight="700" fill="#16A34A">✔ Mitigation hợp lệ — OB còn vai trò</text>
  <text x="40" y="111" font-size="11" fill="#6B7280">Giá vào OB/MT, để lại wick, reject với displacement ngược</text>

  <rect x="120" y="180" width="150" height="55" fill="#16A34A" opacity="0.10"/>
  <rect x="120" y="180" width="150" height="55" fill="none" stroke="#16A34A" stroke-dasharray="4 3"/>
  <line x1="120" y1="207" x2="270" y2="207" stroke="#1D4ED8" stroke-dasharray="4 2"/>
  <text x="278" y="185" font-size="10" fill="#16A34A">đỉnh OB</text>
  <text x="278" y="210" font-size="10" fill="#1D4ED8">MT 50%</text>
  <text x="278" y="234" font-size="10" fill="#16A34A">đáy OB</text>
  <!-- price wicks into OB then rejects up -->
  <line x1="150" y1="150" x2="150" y2="210" stroke="#DC2626" stroke-width="1.3"/><rect x="145" y="160" width="10" height="35" fill="#DC2626"/>
  <line x1="180" y1="175" x2="180" y2="245" stroke="#DC2626" stroke-width="1.3"/><rect x="175" y="188" width="10" height="35" fill="#DC2626"/>
  <text x="150" y="258" font-size="9" fill="#DC2626" text-anchor="middle">wick vào OB</text>
  <line x1="210" y1="120" x2="210" y2="205" stroke="#16A34A" stroke-width="1.3"/><rect x="205" y="132" width="10" height="65" fill="#16A34A"/>
  <line x1="240" y1="110" x2="240" y2="160" stroke="#16A34A" stroke-width="1.3"/><rect x="235" y="120" width="10" height="35" fill="#16A34A"/>
  <text x="255" y="130" font-size="10" font-weight="700" fill="#16A34A">reject ↑</text>
  <text x="40" y="320" font-size="11" fill="#16A34A">• Unmitigated / mitigation lần đầu sạch</text>
  <text x="40" y="338" font-size="11" fill="#16A34A">• LTF MSS + displacement tại OB → vào lệnh</text>
  <text x="40" y="356" font-size="11" fill="#16A34A">• Stop qua đầu kia OB / qua điểm sweep</text>

  <!-- Right: OB fail -->
  <rect x="386" y="70" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="402" y="94" font-size="14" font-weight="700" fill="#DC2626">✘ OB đã fail → Breaker</text>
  <text x="402" y="111" font-size="11" fill="#6B7280">Đóng thân xuyên đầu kia OB, giữ acceptance, không reclaim</text>

  <rect x="470" y="150" width="150" height="55" fill="#DC2626" opacity="0.08"/>
  <rect x="470" y="150" width="150" height="55" fill="none" stroke="#DC2626" stroke-dasharray="4 3"/>
  <text x="628" y="155" font-size="10" fill="#DC2626">đỉnh OB</text>
  <text x="628" y="205" font-size="10" fill="#DC2626">đáy OB</text>
  <!-- price closes body through and holds below -->
  <line x1="500" y1="140" x2="500" y2="200" stroke="#DC2626" stroke-width="1.3"/><rect x="495" y="152" width="10" height="40" fill="#DC2626"/>
  <line x1="530" y1="160" x2="530" y2="255" stroke="#374151" stroke-width="1.3"/><rect x="525" y="175" width="10" height="70" fill="#374151"/>
  <text x="530" y="150" font-size="9" fill="#374151" text-anchor="middle">đóng thân xuyên</text>
  <line x1="560" y1="230" x2="560" y2="290" stroke="#DC2626" stroke-width="1.3"/><rect x="555" y="242" width="10" height="35" fill="#DC2626"/>
  <line x1="590" y1="250" x2="590" y2="300" stroke="#DC2626" stroke-width="1.3"/><rect x="585" y="260" width="10" height="35" fill="#DC2626"/>
  <text x="605" y="275" font-size="10" font-weight="700" fill="#DC2626">giữ giá ngoài</text>
  <text x="402" y="320" font-size="11" fill="#DC2626">• Không còn là OB — ngừng đọc như OB</text>
  <text x="402" y="338" font-size="11" fill="#DC2626">• Nếu giá flip &amp; test mặt ngoài → Breaker Block</text>
  <text x="402" y="356" font-size="11" fill="#DC2626">• Mitigate nhiều lần = phản ứng yếu dần</text>

  <text x="380" y="418" text-anchor="middle" font-size="12" fill="#374151">OB giữ vai trò ≠ Breaker đã fail. Đóng thân + acceptance qua đầu kia = OB "chết" với vai trò cũ.</text>
</svg>
