<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">NY Midnight Open Theory — bias trong ngày so với đường 00:00 ET</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Giá trên Midnight Open = thiên hướng bullish trong ngày; giá dưới = thiên hướng bearish. NDOG straddle ngay mốc này.</text>

  <rect x="24" y="70" width="712" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Midnight Open reference line -->
  <line x1="60" y1="190" x2="716" y2="190" stroke="#16A34A" stroke-width="2.2" stroke-dasharray="2 3"/>
  <text x="600" y="184" font-size="11.5" font-weight="700" fill="#166534">Midnight Open (00:00 ET) — đường tham chiếu bias</text>

  <!-- above zone -->
  <rect x="44" y="90" width="672" height="100" fill="#16A34A" opacity="0.05"/>
  <text x="52" y="106" font-size="10.5" fill="#166534">Trên Midnight Open → thiên hướng BULLISH cho phần còn lại của ngày</text>

  <!-- below zone -->
  <rect x="44" y="190" width="672" height="100" fill="#DC2626" opacity="0.05"/>
  <text x="52" y="284" font-size="10.5" fill="#B91C1C">Dưới Midnight Open → thiên hướng BEARISH cho phần còn lại của ngày</text>

  <!-- price path scenario 1: opens below, retraces up to MO, rejects, continues up (bullish day) -->
  <path d="M80,230 L140,245 L190,220 L230,192 L260,175 L310,150 L370,120" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="260" cy="175" r="6" fill="#16A34A"/>
  <text x="150" y="130" font-size="10" font-weight="700" fill="#15803D">① Mở dưới MO, kéo lên retest MO, giữ trên → tiếp tục bullish</text>

  <!-- NDOG box straddling the midnight open line around this scenario -->
  <rect x="215" y="165" width="55" height="50" fill="#F59E0B" opacity="0.18" stroke="#B45309" stroke-dasharray="3 3"/>
  <text x="140" y="215" font-size="9.5" font-weight="700" fill="#92400E">NDOG range straddle quanh MO</text>

  <!-- price path scenario 2: opens above MO, fails to hold, drops below, bearish day -->
  <path d="M420,155 L460,175 L490,190 L520,210 L560,235 L620,255 L680,270" fill="none" stroke="#DC2626" stroke-width="2.4"/>
  <circle cx="490" cy="190" r="6" fill="#DC2626"/>
  <text x="470" y="140" font-size="10" font-weight="700" fill="#B91C1C">② Mở trên MO, thất bại giữ, đóng dưới → chuyển bearish</text>

  <!-- annotation of "use as same-day directional filter" -->
  <rect x="24" y="326" width="712" height="112" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="346" font-size="11.5" font-weight="700" fill="#1F2937">Dùng Midnight Open + NDOG làm bộ lọc hướng trong ngày</text>
  <text x="36" y="364" font-size="10.5" fill="#374151">1. NDOG (Prior Close ↔ Reopen) luôn straddle sát mốc Midnight Open (00:00 ET) — hai mốc này nằm rất gần nhau về thời gian và giá.</text>
  <text x="36" y="382" font-size="10.5" fill="#374151">2. Hỏi hai câu cùng lúc: "Giá đang ở premium/discount của CE-NDOG?" VÀ "Giá đang trên hay dưới Midnight Open?" — khi cả hai đồng thuận,</text>
  <text x="36" y="398" font-size="10.5" fill="#374151">   độ tin cậy của Daily Bias tăng lên đáng kể; khi mâu thuẫn, ưu tiên chờ thêm xác nhận cấu trúc (MSS) trước khi vào lệnh.</text>
  <text x="36" y="416" font-size="10" fill="#6B7280">Ghi `midnight_open_side` (above/below) mỗi ngày vào journal để đối chiếu với `bias_correct` của Daily Bias — cần backtest xác nhận ngưỡng chính xác.</text>

  <rect x="24" y="70" width="0" height="0" fill="none"/>
</svg>
