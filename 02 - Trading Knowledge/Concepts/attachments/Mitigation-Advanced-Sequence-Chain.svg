<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="320" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chuỗi ICT với Mitigation Block làm POI</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">MB không đứng một mình — nó là một mắt xích trong sequence. Bỏ bước nào cũng làm MB mất giá trị.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- Row 1 -->
  <rect x="24" y="80" width="150" height="56" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="99" y="104" font-size="11.5" font-weight="700" fill="#1D4ED8" text-anchor="middle">① HTF Bias</text>
  <text x="99" y="122" font-size="10" fill="#1D4ED8" text-anchor="middle">+ Discount location</text>
  <line x1="174" y1="108" x2="212" y2="108" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="216" y="80" width="160" height="56" rx="8" fill="#16A34A" opacity="0.1" stroke="#16A34A" stroke-width="1.3"/>
  <text x="296" y="102" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">② Failure swing</text>
  <text x="296" y="118" font-size="9.5" fill="#15803D" text-anchor="middle">higher low, KHÔNG sweep</text>
  <text x="296" y="131" font-size="9.5" fill="#15803D" text-anchor="middle">(đáy cũ giữ vững)</text>
  <line x1="376" y1="108" x2="414" y2="108" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="418" y="80" width="160" height="56" rx="8" fill="#16A34A" opacity="0.1" stroke="#16A34A" stroke-width="1.3"/>
  <text x="498" y="104" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">③ Displacement</text>
  <text x="498" y="122" font-size="10" fill="#15803D" text-anchor="middle">+ MSS phá STH</text>
  <line x1="578" y1="108" x2="616" y2="108" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="620" y="80" width="116" height="56" rx="8" fill="#F59E0B" opacity="0.18" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="678" y="104" font-size="11.5" font-weight="700" fill="#B45309" text-anchor="middle">④ MB</text>
  <text x="678" y="122" font-size="9.5" fill="#B45309" text-anchor="middle">cụm nến ngược</text>

  <!-- connector down -->
  <line x1="678" y1="136" x2="678" y2="176" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Row 2 (reversed flow) -->
  <rect x="620" y="180" width="116" height="60" rx="8" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.3"/>
  <text x="678" y="203" font-size="11" font-weight="700" fill="#B45309" text-anchor="middle">⑤ Retest MB</text>
  <text x="678" y="220" font-size="9.5" fill="#B45309" text-anchor="middle">lý tưởng trùng</text>
  <text x="678" y="233" font-size="9.5" fill="#B45309" text-anchor="middle">FVG</text>
  <line x1="620" y1="210" x2="582" y2="210" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="418" y="180" width="160" height="60" rx="8" fill="#16A34A" opacity="0.1" stroke="#16A34A" stroke-width="1.3"/>
  <text x="498" y="208" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">⑥ Entry</text>
  <text x="498" y="226" font-size="9.5" fill="#15803D" text-anchor="middle">M5/M1 confirm, SL dưới higher low</text>
  <line x1="418" y1="210" x2="380" y2="210" stroke="#6B7280" stroke-width="1.8" marker-end="url(#arrow)"/>

  <rect x="216" y="180" width="160" height="60" rx="8" fill="#16A34A" opacity="0.16" stroke="#16A34A" stroke-width="1.5"/>
  <text x="296" y="208" font-size="11.5" font-weight="700" fill="#15803D" text-anchor="middle">⑦ Target BSL</text>
  <text x="296" y="226" font-size="9.5" fill="#15803D" text-anchor="middle">internal → external liquidity</text>

  <rect x="24" y="262" width="712" height="42" rx="6" fill="#FEF3C7"/>
  <text x="36" y="280" font-size="11.5" font-weight="700" fill="#92400E">Khác biệt với chuỗi Breaker: ở ② thay vì "sweep đáy cũ" thì đáy cũ GIỮ (higher low, không sweep).</text>
  <text x="36" y="296" font-size="11" fill="#92400E">Đây chính là phép thử tách MB khỏi Breaker — quyết định SL đặt ở đâu.</text>
</svg>
