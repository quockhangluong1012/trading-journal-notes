<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Golden Rule — IFVG phải nằm TRONG chân giá Breaker + đúng vùng P/D</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Reaper IFVG hợp lệ = FVG bên trong chân giá Breaker; bullish → discount, bearish → premium.</text>

  <!-- LEFT valid -->
  <rect x="24" y="72" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.6"/>
  <rect x="24" y="72" width="350" height="26" rx="8" fill="#16A34A"/>
  <text x="199" y="90" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓ HỢP LỆ</text>

  <line x1="40" y1="222" x2="358" y2="222" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="288" y="217" font-size="9" fill="#9CA3AF">Equilibrium</text>
  <text x="40" y="340" font-size="9.5" font-weight="700" fill="#166534">DISCOUNT</text>

  <!-- breaker leg bracket -->
  <line x1="60" y1="120" x2="60" y2="330" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="55" y1="120" x2="65" y2="120" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="55" y1="330" x2="65" y2="330" stroke="#6B7280" stroke-width="1.4"/>
  <text x="70" y="116" font-size="9" fill="#6B7280">chân giá Breaker</text>

  <rect x="120" y="150" width="230" height="20" fill="#FDE68A" opacity="0.55" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="124" y="145" font-size="9.5" font-weight="700" fill="#B45309">Breaker Block</text>
  <rect x="150" y="262" width="200" height="26" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
  <text x="154" y="304" font-size="9.5" font-weight="700" fill="#1D4ED8">Reaper IFVG: TRONG chân giá + discount</text>

  <!-- candles down into reaper -->
  <line x1="98" y1="130" x2="98" y2="180" stroke="#DC2626" stroke-width="1.4"/><rect x="92.5" y="140" width="11" height="32" fill="#DC2626"/>
  <line x1="120" y1="158" x2="120" y2="216" stroke="#DC2626" stroke-width="1.4"/><rect x="114.5" y="168" width="11" height="40" fill="#DC2626"/>
  <line x1="142" y1="196" x2="142" y2="262" stroke="#DC2626" stroke-width="1.4"/><rect x="136.5" y="206" width="11" height="48" fill="#DC2626"/>
  <line x1="164" y1="240" x2="164" y2="296" stroke="#16A34A" stroke-width="1.4"/><rect x="158.5" y="262" width="11" height="28" fill="#16A34A"/>
  <line x1="186" y1="190" x2="186" y2="286" stroke="#16A34A" stroke-width="1.4"/><rect x="180.5" y="204" width="11" height="70" fill="#16A34A"/>
  <line x1="208" y1="150" x2="208" y2="222" stroke="#16A34A" stroke-width="1.4"/><rect x="202.5" y="160" width="11" height="52" fill="#16A34A"/>
  <text x="300" y="352" font-size="26" font-weight="700" fill="#16A34A" text-anchor="middle">✓</text>

  <!-- RIGHT invalid -->
  <rect x="386" y="72" width="350" height="300" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
  <rect x="386" y="72" width="350" height="26" rx="8" fill="#DC2626"/>
  <text x="561" y="90" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">✕ KHÔNG HỢP LỆ</text>

  <line x1="402" y1="222" x2="720" y2="222" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="650" y="217" font-size="9" fill="#9CA3AF">Equilibrium</text>
  <text x="402" y="130" font-size="9.5" font-weight="700" fill="#B45309">PREMIUM</text>

  <line x1="422" y1="180" x2="422" y2="330" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="417" y1="180" x2="427" y2="180" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="417" y1="330" x2="427" y2="330" stroke="#6B7280" stroke-width="1.4"/>
  <text x="432" y="176" font-size="9" fill="#6B7280">chân giá Breaker</text>

  <rect x="482" y="210" width="230" height="20" fill="#FDE68A" opacity="0.55" stroke="#D97706" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="486" y="245" font-size="9.5" font-weight="700" fill="#B45309">Breaker Block</text>

  <!-- IFVG placed OUTSIDE the leg / premium -->
  <rect x="512" y="120" width="200" height="26" fill="#FCA5A5" opacity="0.5" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="516" y="115" font-size="9.5" font-weight="700" fill="#B91C1C">IFVG NGOÀI chân giá (premium) → SAI</text>

  <line x1="460" y1="200" x2="460" y2="250" stroke="#16A34A" stroke-width="1.4"/><rect x="454.5" y="210" width="11" height="32" fill="#16A34A"/>
  <line x1="482" y1="216" x2="482" y2="270" stroke="#DC2626" stroke-width="1.4"/><rect x="476.5" y="226" width="11" height="38" fill="#DC2626"/>
  <line x1="504" y1="240" x2="504" y2="300" stroke="#DC2626" stroke-width="1.4"/><rect x="498.5" y="250" width="11" height="44" fill="#DC2626"/>
  <text x="561" y="352" font-size="26" font-weight="700" fill="#DC2626" text-anchor="middle">✕</text>

  <rect x="24" y="382" width="712" height="46" rx="6" fill="#FEF3C7"/>
  <text x="36" y="401" font-size="11" font-weight="700" fill="#92400E">Nếu FVG KHÔNG nằm trong chân giá Breaker HOẶC sai vùng P/D → đó KHÔNG phải Reaper IFVG hợp lệ.</text>
  <text x="36" y="419" font-size="11" fill="#92400E">Luôn kiểm tra 2 điều kiện cùng lúc: (1) bên trong chân giá Breaker; (2) đúng discount (bull) / premium (bear).</text>
</svg>
