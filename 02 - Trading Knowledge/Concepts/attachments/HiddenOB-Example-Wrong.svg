<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ SAI / dễ nhầm — không phải Hidden OB thật</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Ba lỗi kinh điển: không có wick chồng · ngược bias · nằm giữa range.</text>

  <!-- panel A: no wick overlap -->
  <rect x="24" y="76" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="98" font-size="11.5" font-weight="700" fill="#B91C1C">✗ Không có wick chồng</text>
  <line x1="90" y1="150" x2="90" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="84.5" y="160" width="11" height="35" fill="#16A34A"/>
  <line x1="140" y1="230" x2="140" y2="290" stroke="#16A34A" stroke-width="1.4"/><rect x="134.5" y="245" width="11" height="35" fill="#16A34A"/>
  <path d="M60 215 L200 215" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="60" y="330" font-size="10" fill="#374151">2 nến xanh nhưng wick KHÔNG</text>
  <text x="60" y="345" font-size="10" fill="#374151">chồng nhau (có khoảng hở).</text>
  <text x="60" y="368" font-size="10" font-weight="700" fill="#B91C1C">→ Không đủ điều kiện Hidden OB.</text>

  <!-- panel B: counter-bias -->
  <rect x="266" y="76" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="278" y="98" font-size="11.5" font-weight="700" fill="#B91C1C">✗ Ngược bias / sai vùng PD</text>
  <line x1="330" y1="150" x2="490" y2="150" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="392" y="144" font-size="9" fill="#6B7280">Equilibrium</text>
  <rect x="300" y="110" width="14" height="40" fill="#FEE2E2"/>
  <text x="320" y="126" font-size="9.5" font-weight="700" fill="#B91C1C">PREMIUM</text>
  <rect x="360" y="130" width="70" height="55" fill="#DBEAFE" stroke="#1D4ED8" stroke-dasharray="4 3"/>
  <line x1="378" y1="130" x2="378" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="372.5" y="145" width="11" height="35" fill="#16A34A"/>
  <line x1="404" y1="138" x2="404" y2="210" stroke="#16A34A" stroke-width="1.4"/><rect x="398.5" y="150" width="11" height="35" fill="#16A34A"/>
  <text x="278" y="330" font-size="10" fill="#374151">Bullish Hidden OB nhưng nằm ở</text>
  <text x="278" y="345" font-size="10" fill="#374151">PREMIUM, HTF bias đang GIẢM.</text>
  <text x="278" y="368" font-size="10" font-weight="700" fill="#B91C1C">→ Long ngược dòng → xác suất thấp.</text>

  <!-- panel C: mid-range -->
  <rect x="508" y="76" width="228" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="520" y="98" font-size="11.5" font-weight="700" fill="#B91C1C">✗ Giữa range, không sweep</text>
  <line x1="530" y1="140" x2="712" y2="140" stroke="#166534" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="620" y="134" font-size="8.5" fill="#166534">ERL high</text>
  <line x1="530" y1="360" x2="712" y2="360" stroke="#B91C1C" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="620" y="376" font-size="8.5" fill="#B91C1C">ERL low</text>
  <rect x="580" y="230" width="70" height="50" fill="#DBEAFE" stroke="#1D4ED8" stroke-dasharray="4 3"/>
  <line x1="598" y1="230" x2="598" y2="290" stroke="#16A34A" stroke-width="1.4"/><rect x="592.5" y="242" width="11" height="30" fill="#16A34A"/>
  <line x1="624" y1="238" x2="624" y2="298" stroke="#16A34A" stroke-width="1.4"/><rect x="618.5" y="248" width="11" height="30" fill="#16A34A"/>
  <text x="520" y="330" font-size="10" fill="#374151">Hidden OB treo giữa range, không</text>
  <text x="520" y="345" font-size="10" fill="#374151">có pool thanh khoản nào bị quét.</text>
  <text x="520" y="368" font-size="10" font-weight="700" fill="#B91C1C">→ Thiếu lý do → bỏ qua.</text>
</svg>
