<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Standard Deviation Projection</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Anchor A→B trên manipulation leg, ladder -1/-2/-2.5/-3/-4 SD, confluence tại -2 SD</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- manipulation leg A -> B -->
  <path d="M60,150 L110,180 L140,300 L175,270" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="110" cy="180" r="7" fill="#3B82F6"/>
  <text x="60" y="168" font-size="10.5" font-weight="700" fill="#1D4ED8">① Điểm A — manipulation high</text>

  <circle cx="140" cy="300" r="7" fill="none" stroke="#DC2626" stroke-width="2.5"/>
  <text x="90" y="322" font-size="10.5" font-weight="700" fill="#B91C1C">② Điểm B — sweep liquidity (anchor thấp)</text>

  <!-- bracket for leg unit -->
  <line x1="195" y1="180" x2="195" y2="300" stroke="#F59E0B" stroke-width="1.6"/>
  <line x1="190" y1="180" x2="200" y2="180" stroke="#F59E0B" stroke-width="1.6"/>
  <line x1="190" y1="300" x2="200" y2="300" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="204" y="245" font-size="10" font-weight="700" fill="#B45309">1 đơn vị SD</text>
  <text x="204" y="258" font-size="10" fill="#B45309">(A→B)</text>

  <!-- displacement -->
  <path d="M175,270 L230,290 L260,120" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <text x="230" y="112" font-size="10.5" font-weight="700" fill="#15803D">③ Displacement (hướng chiếu)</text>

  <!-- SD ladder -->
  <line x1="270" y1="300" x2="716" y2="300" stroke="#9CA3AF" stroke-dasharray="2 3"/>
  <text x="700" y="296" font-size="9.5" fill="#6B7280" text-anchor="end">B (0 SD)</text>

  <line x1="270" y1="230" x2="716" y2="230" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="700" y="226" font-size="10" fill="#1D4ED8" text-anchor="end">-1 SD</text>

  <line x1="270" y1="160" x2="716" y2="160" stroke="#3B82F6" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="700" y="156" font-size="10" font-weight="700" fill="#1D4ED8" text-anchor="end">-2 SD</text>

  <line x1="270" y1="120" x2="716" y2="120" stroke="#3B82F6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="700" y="116" font-size="10" fill="#1D4ED8" text-anchor="end">-2.5 SD</text>

  <line x1="270" y1="75" x2="716" y2="75" stroke="#3B82F6" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="700" y="71" font-size="9.5" fill="#1D4ED8" text-anchor="end">-3 SD</text>

  <text x="700" y="46" font-size="9" fill="#9CA3AF" text-anchor="end">-4 SD (ngoài khung, cực đoan)</text>

  <!-- confluence marker at -2 SD -->
  <rect x="500" y="142" width="160" height="36" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.2" rx="4"/>
  <text x="508" y="164" font-size="10" font-weight="700" fill="#92400E">④ Confluence: liquidity pool / FVG HTF</text>

  <text x="285" y="345" font-size="10" fill="#6B7280">⑤ Mỗi mức = bội số đối xứng của leg A→B, chiếu theo hướng displacement</text>

  <rect x="24" y="410" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="430" font-size="11.5" font-weight="700" fill="#92400E">Anchor luôn là manipulation/Judas leg đã sweep liquidity (A→B). Ladder chuẩn: -1, -2, -2.5,</text>
  <text x="36" y="448" font-size="11.5" font-weight="700" fill="#92400E">-3, -4 SD. Mức có confluence với liquidity pool/FVG/PD-array HTF (ở đây là -2 SD) trở thành</text>
  <text x="36" y="466" font-size="11.5" font-weight="700" fill="#92400E">target chính (draw on liquidity); các mức còn lại dùng làm TP từng phần.</text>
</svg>
