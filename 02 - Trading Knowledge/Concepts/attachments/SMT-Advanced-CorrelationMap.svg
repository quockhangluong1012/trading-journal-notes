<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Bản đồ cặp tương quan để đọc SMT</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">SMT chỉ hợp lệ giữa các tài sản CÓ tương quan thật. Tương quan thuận: so cùng chiều. Tương quan nghịch: so ngược chiều.</text>

  <rect x="24" y="72" width="228" height="300" rx="8" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="40" y="98" font-size="13" font-weight="700" fill="#1D4ED8">Chỉ số Mỹ (thuận)</text>
  <text x="40" y="122" font-size="11" fill="#374151">• NQ (NAS100)</text>
  <text x="40" y="142" font-size="11" fill="#374151">• ES (S&amp;P500)</text>
  <text x="40" y="162" font-size="11" fill="#374151">• YM (Dow)</text>
  <text x="40" y="182" font-size="11" fill="#374151">• RTY (Russell)</text>
  <text x="40" y="212" font-size="10.5" fill="#6B7280">So đỉnh/đáy CÙNG chiều.</text>
  <text x="40" y="230" font-size="10.5" fill="#6B7280">NQ vs ES là cặp SMT</text>
  <text x="40" y="248" font-size="10.5" fill="#6B7280">kinh điển nhất.</text>
  <rect x="40" y="300" width="196" height="52" rx="6" fill="#DBEAFE"/>
  <text x="52" y="320" font-size="10" font-weight="700" fill="#1D4ED8">Cặp mặc định:</text>
  <text x="52" y="338" font-size="10.5" font-weight="700" fill="#1E40AF">NQ ↔ ES</text>

  <rect x="266" y="72" width="228" height="300" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="282" y="98" font-size="13" font-weight="700" fill="#166534">Forex (nghịch với DXY)</text>
  <text x="282" y="122" font-size="11" fill="#374151">• EURUSD ↔ GBPUSD (thuận)</text>
  <text x="282" y="142" font-size="11" fill="#374151">• EURUSD ↔ DXY (NGHỊCH)</text>
  <text x="282" y="162" font-size="11" fill="#374151">• GBPUSD ↔ DXY (NGHỊCH)</text>
  <text x="282" y="182" font-size="11" fill="#374151">• USDJPY ↔ DXY (thuận)</text>
  <text x="282" y="212" font-size="10.5" fill="#6B7280">EU tạo LL nhưng GU tạo HL</text>
  <text x="282" y="230" font-size="10.5" fill="#6B7280">= bullish SMT. Hoặc so với</text>
  <text x="282" y="248" font-size="10.5" fill="#6B7280">DXY theo chiều NGƯỢC.</text>
  <rect x="282" y="300" width="196" height="52" rx="6" fill="#D1FAE5"/>
  <text x="294" y="320" font-size="10" font-weight="700" fill="#166534">Cặp mặc định:</text>
  <text x="294" y="338" font-size="10.5" font-weight="700" fill="#065F46">EURUSD ↔ GBPUSD / DXY</text>

  <rect x="508" y="72" width="228" height="300" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="524" y="98" font-size="13" font-weight="700" fill="#B45309">Kim loại &amp; khác</text>
  <text x="524" y="122" font-size="11" fill="#374151">• XAUUSD ↔ XAGUSD (thuận)</text>
  <text x="524" y="142" font-size="11" fill="#374151">• XAUUSD ↔ DXY (NGHỊCH)</text>
  <text x="524" y="162" font-size="11" fill="#374151">• Gold ↔ US10Y (nghịch)</text>
  <text x="524" y="192" font-size="10.5" fill="#6B7280">Vàng vs Bạc "lệch" tại đỉnh</text>
  <text x="524" y="210" font-size="10.5" fill="#6B7280">/đáy = SMT. Vàng vs DXY</text>
  <text x="524" y="228" font-size="10.5" fill="#6B7280">so ngược chiều.</text>
  <rect x="524" y="300" width="196" height="52" rx="6" fill="#FEF3C7"/>
  <text x="536" y="320" font-size="10" font-weight="700" fill="#B45309">Cặp mặc định:</text>
  <text x="536" y="338" font-size="10.5" font-weight="700" fill="#92400E">XAUUSD ↔ DXY / XAGUSD</text>
</svg>
