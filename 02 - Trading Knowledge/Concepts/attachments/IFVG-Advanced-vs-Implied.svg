<svg viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="470" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">IFVG vs Implied FVG — hai khái niệm KHÁC HẲN (dù viết tắt gần giống)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Nhầm hai khái niệm này là lỗi hướng trade kinh điển: một cái trade NGƯỢC, một cái trade CÙNG hướng.</text>

  <!-- LEFT: Inverse FVG -->
  <rect x="24" y="72" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="24" y="72" width="345" height="30" rx="8" fill="#DC2626" opacity="0.12"/>
  <text x="40" y="92" font-size="13.5" font-weight="700" fill="#B91C1C">Inverse FVG (IFVG)</text>
  <text x="40" y="120" font-size="11" fill="#374151">FVG bị ĐÓNG NẾN xuyên qua → đảo cực</text>
  <text x="40" y="137" font-size="11" font-weight="700" fill="#B91C1C">→ trade NGƯỢC hướng FVG</text>

  <!-- mini chart IFVG -->
  <rect x="44" y="215" width="305" height="26" fill="#16A34A" opacity="0.16"/>
  <text x="52" y="209" font-size="9.5" fill="#15803D">Bullish FVG cũ</text>
  <path d="M60,160 L95,190 L120,178 L150,215" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <line x1="165" y1="185" x2="165" y2="285" stroke="#DC2626" stroke-width="2"/>
  <rect x="158" y="205" width="14" height="70" fill="#DC2626" rx="1"/>
  <text x="180" y="235" font-size="9.5" font-weight="700" fill="#B91C1C">close xuyên xuống</text>
  <path d="M165,275 L200,300 L240,285 L280,175 L320,165" fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="288" cy="222" r="5.5" fill="#DC2626"/>
  <text x="200" y="205" font-size="9.5" fill="#B91C1C">retest → reject → Short</text>

  <rect x="44" y="352" width="305" height="40" rx="6" fill="#FEE2E2"/>
  <text x="56" y="370" font-size="10" font-weight="700" fill="#991B1B">Vùng cũ đảo vai trò S↔R.</text>
  <text x="56" y="385" font-size="10" fill="#991B1B">Đi kèm MSS → tín hiệu đổi delivery.</text>

  <!-- RIGHT: Implied FVG -->
  <rect x="391" y="72" width="345" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="391" y="72" width="345" height="30" rx="8" fill="#1D4ED8" opacity="0.12"/>
  <text x="407" y="92" font-size="13.5" font-weight="700" fill="#1D4ED8">Implied FVG</text>
  <text x="407" y="120" font-size="11" fill="#374151">Imbalance NGẦM suy từ cấu trúc nến / overlap</text>
  <text x="407" y="137" font-size="11" font-weight="700" fill="#1D4ED8">→ dùng như PD array thường (CÙNG hướng)</text>

  <!-- mini chart Implied -->
  <path d="M420,290 L455,255 L490,270 L525,225" fill="none" stroke="#16A34A" stroke-width="2.2"/>
  <!-- overlapping large candles implying hidden gap -->
  <line x1="500" y1="215" x2="500" y2="290" stroke="#374151" stroke-width="1.6"/>
  <rect x="493" y="230" width="14" height="45" fill="#16A34A" rx="1"/>
  <line x1="522" y1="205" x2="522" y2="270" stroke="#374151" stroke-width="1.6"/>
  <rect x="515" y="218" width="14" height="40" fill="#16A34A" rx="1"/>
  <rect x="500" y="255" width="29" height="18" fill="#1D4ED8" opacity="0.22"/>
  <text x="470" y="200" font-size="9.5" font-weight="700" fill="#1D4ED8">vùng imbalance ngầm</text>
  <text x="470" y="315" font-size="9.5" fill="#1D4ED8">(overlap bóng nến lớn)</text>
  <!-- price retraces into implied gap and continues SAME direction -->
  <path d="M525,225 L555,265 L580,250 L620,190 L660,175 L700,150" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <circle cx="565" cy="260" r="5.5" fill="#16A34A"/>
  <text x="560" y="290" font-size="9.5" fill="#1D4ED8">rebalance → tiếp tục LÊN</text>

  <rect x="411" y="352" width="305" height="40" rx="6" fill="#DBEAFE"/>
  <text x="423" y="370" font-size="10" font-weight="700" fill="#1E40AF">Không có polarity flip.</text>
  <text x="423" y="385" font-size="10" fill="#1E40AF">Treat như FVG thường — trade CÙNG hướng.</text>

  <rect x="24" y="414" width="712" height="44" rx="6" fill="#FEF3C7"/>
  <text x="36" y="433" font-size="11.5" font-weight="700" fill="#92400E">Khác biệt cốt lõi: IFVG = FVG đã CHẾT và ĐẢO CỰC (trade ngược); Implied FVG = một PD array SỐNG (trade cùng hướng).</text>
  <text x="36" y="451" font-size="11" fill="#92400E">Hỏi trước khi vào lệnh: vùng này đã bị ĐÓNG NẾN xuyên qua chưa? Có → IFVG. Chưa → PD array thường.</text>
</svg>
