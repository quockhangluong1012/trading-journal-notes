<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">IRL &amp; ERL — Lỗi: target nhầm ERL trong khi IRL chưa lấp</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Long từ đáy nhắm thẳng đỉnh range, bỏ qua FVG (IRL) chặn đường → bị reject</text>

  <!-- Dealing range box -->
  <rect x="90" y="90" width="600" height="280" fill="#94A3B8" opacity="0.06" stroke="#94A3B8" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ERL top BSL -->
  <line x1="90" y1="100" x2="690" y2="100" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="540" y="94" font-size="13" font-weight="700" fill="#2563EB">ERL — BSL (target kỳ vọng sai)</text>

  <!-- ERL bottom SSL -->
  <line x1="90" y1="360" x2="690" y2="360" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="560" y="378" font-size="13" font-weight="700" fill="#2563EB">ERL — SSL (đáy range)</text>

  <!-- IRL: a BEARISH FVG (unfilled) blocking the way up -->
  <rect x="90" y="180" width="600" height="42" fill="#EF4444" opacity="0.12"/>
  <text x="98" y="206" font-size="13" font-weight="700" fill="#DC2626">IRL — Bearish FVG chưa lấp (cản đường)</text>

  <!-- price at SSL sweep, then Long -->
  <rect x="160" y="330" width="2" height="50" fill="#16A34A"/>
  <rect x="154" y="345" width="14" height="32" fill="#16A34A" rx="1"/>
  <circle cx="161" cy="362" r="6" fill="#16A34A"/>
  <text x="172" y="352" font-size="13" font-weight="700" fill="#16A34A">Long từ đáy</text>

  <!-- rally up toward IRL -->
  <rect x="190" y="290" width="2" height="80" fill="#16A34A"/>
  <rect x="184" y="305" width="14" height="55" fill="#16A34A" rx="1"/>
  <rect x="216" y="240" width="2" height="100" fill="#16A34A"/>
  <rect x="210" y="255" width="14" height="75" fill="#16A34A" rx="1"/>
  <rect x="242" y="200" width="2" height="90" fill="#16A34A"/>
  <rect x="236" y="215" width="14" height="65" fill="#16A34A" rx="1"/>

  <!-- rejected AT the IRL FVG -->
  <rect x="268" y="175" width="2" height="80" fill="#DC2626"/>
  <rect x="262" y="195" width="14" height="50" fill="#DC2626" rx="1"/>
  <circle cx="269" cy="200" r="6" fill="#DC2626"/>
  <text x="280" y="180" font-size="13" font-weight="700" fill="#DC2626">✗ Reject tại IRL — TP không tới</text>

  <!-- price falls back -->
  <rect x="294" y="200" width="2" height="120" fill="#DC2626"/>
  <rect x="288" y="220" width="14" height="90" fill="#DC2626" rx="1"/>
  <rect x="320" y="280" width="2" height="90" fill="#DC2626"/>
  <rect x="314" y="300" width="14" height="60" fill="#DC2626" rx="1"/>

  <!-- expected TP arrow that fails -->
  <path d="M 360 300 L 360 115" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="368" y="210" font-size="12" fill="#DC2626">Kỳ vọng chạy thẳng BSL (sai)</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/>
    </marker>
  </defs>

  <text x="24" y="440" font-size="16" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="64" y="440" font-size="13" fill="#374151">Bỏ qua IRL trên đường đi: giá phải xử lý FVG bên trong trước khi với tới ERL.</text>
</svg>
