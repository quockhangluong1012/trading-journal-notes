<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ ĐÚNG — chuỗi đủ 3 tầng tại HTF PD array + retest</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Discount HTF FVG → IFVG/BPR → CISD → MSS → chờ retest breaker → entry long, stop dưới đáy MSS.</text>

  <rect x="24" y="72" width="712" height="292" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- HTF discount PD array -->
  <rect x="40" y="270" width="680" height="34" fill="#93C5FD" opacity="0.4"/>
  <text x="50" y="290" font-size="9.5" fill="#1E40AF">HTF PD array (discount FVG/OB)</text>

  <!-- downtrend into array -->
  <line x1="70" y1="110" x2="70" y2="160" stroke="#DC2626" stroke-width="1.4"/><rect x="64.5" y="120" width="11" height="32" fill="#DC2626"/>
  <line x1="92" y1="145" x2="92" y2="215" stroke="#DC2626" stroke-width="1.4"/><rect x="86.5" y="155" width="11" height="52" fill="#DC2626"/>
  <line x1="114" y1="200" x2="114" y2="290" stroke="#DC2626" stroke-width="1.4"/><rect x="108.5" y="212" width="11" height="70" fill="#DC2626"/>
  <!-- FVG being broken -> IFVG/BPR (stage1) -->
  <rect x="102" y="250" width="120" height="24" fill="#FEF3C7"/>
  <text x="126" y="266" font-size="8.5" fill="#B45309">FVG bị phá → IFVG/BPR ①</text>
  <line x1="138" y1="250" x2="138" y2="300" stroke="#16A34A" stroke-width="1.4"/><rect x="132.5" y="258" width="11" height="34" fill="#16A34A"/>
  <!-- CISD level (stage2) -->
  <line x1="160" y1="215" x2="160" y2="270" stroke="#16A34A" stroke-width="1.4"/><rect x="154.5" y="225" width="11" height="40" fill="#16A34A"/>
  <line x1="150" y1="248" x2="330" y2="248" stroke="#1D4ED8" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="250" y="243" font-size="8.5" font-weight="700" fill="#1D4ED8">CISD level ②</text>
  <line x1="182" y1="180" x2="182" y2="235" stroke="#16A34A" stroke-width="1.4"/><rect x="176.5" y="190" width="11" height="40" fill="#16A34A"/>
  <!-- most recent lower swing high level -> MSS (stage3) -->
  <line x1="170" y1="180" x2="430" y2="180" stroke="#166534" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="270" y="175" font-size="8.5" font-weight="700" fill="#166534">lower swing high gần nhất</text>
  <line x1="204" y1="200" x2="204" y2="250" stroke="#DC2626" stroke-width="1.4"/><rect x="198.5" y="208" width="11" height="35" fill="#DC2626"/>
  <line x1="226" y1="170" x2="226" y2="235" stroke="#16A34A" stroke-width="1.4"/><rect x="220.5" y="180" width="11" height="45" fill="#16A34A"/>
  <!-- break candle MSS -->
  <line x1="248" y1="130" x2="248" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="242.5" y="140" width="11" height="45" fill="#16A34A"/>
  <circle cx="248" cy="178" r="8" fill="none" stroke="#166534" stroke-width="2.5"/>
  <text x="258" y="150" font-size="9.5" font-weight="700" fill="#166534">MSS ③</text>
  <!-- retrace back to post-MSS breaker/FVG -->
  <rect x="270" y="195" width="70" height="24" fill="#C4B5FD" opacity="0.55"/>
  <text x="274" y="235" font-size="8.5" font-weight="700" fill="#5B21B6">breaker/FVG</text>
  <line x1="270" y1="150" x2="270" y2="200" stroke="#16A34A" stroke-width="1.4"/><rect x="264.5" y="158" width="11" height="30" fill="#16A34A"/>
  <line x1="292" y1="160" x2="292" y2="215" stroke="#DC2626" stroke-width="1.4"/><rect x="286.5" y="170" width="11" height="38" fill="#DC2626"/>
  <line x1="314" y1="175" x2="314" y2="220" stroke="#DC2626" stroke-width="1.4"/><rect x="308.5" y="185" width="11" height="30" fill="#DC2626"/>
  <circle cx="314" cy="207" r="7" fill="#16A34A"/>
  <text x="322" y="212" font-size="9.5" font-weight="700" fill="#15803D">④ RETEST → entry long</text>
  <!-- continuation up to TP -->
  <line x1="338" y1="150" x2="338" y2="205" stroke="#16A34A" stroke-width="1.4"/><rect x="332.5" y="160" width="11" height="40" fill="#16A34A"/>
  <line x1="360" y1="120" x2="360" y2="170" stroke="#16A34A" stroke-width="1.4"/><rect x="354.5" y="128" width="11" height="38" fill="#16A34A"/>
  <line x1="382" y1="95" x2="382" y2="140" stroke="#16A34A" stroke-width="1.4"/><rect x="376.5" y="103" width="11" height="30" fill="#16A34A"/>
  <!-- stop line below MSS low -->
  <line x1="242" y1="290" x2="430" y2="290" stroke="#B91C1C" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="435" y="294" font-size="9" fill="#B91C1C">stop dưới đáy MSS</text>
  <!-- TP line -->
  <line x1="382" y1="98" x2="430" y2="98" stroke="#166534" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="435" y="102" font-size="9" fill="#166534">TP = ERL đối diện</text>

  <!-- checklist box -->
  <rect x="470" y="120" width="252" height="180" rx="6" fill="#DCFCE7"/>
  <text x="484" y="142" font-size="11" font-weight="700" fill="#15803D">Vì sao tốt</text>
  <text x="484" y="164" font-size="9.8" fill="#166534">✔ Đứng tại HTF PD array (discount)</text>
  <text x="484" y="184" font-size="9.8" fill="#166534">✔ Đủ 3 tầng THEO THỨ TỰ: ①→②→③</text>
  <text x="484" y="204" font-size="9.8" fill="#166534">✔ CISD đánh đúng body, không wick</text>
  <text x="484" y="224" font-size="9.8" fill="#166534">✔ MSS = swing high đối-xu-hướng gần nhất</text>
  <text x="484" y="244" font-size="9.8" fill="#166534">✔ CHỜ retest post-MSS mới vào (④)</text>
  <text x="484" y="264" font-size="9.8" fill="#166534">✔ Stop ngoài đáy MSS, TP về ERL đối diện</text>
  <text x="484" y="288" font-size="9.5" fill="#15803D">R:R lành mạnh, rủi ro định nghĩa rõ.</text>

  <text x="24" y="392" font-size="11.5" font-weight="700" fill="#15803D">Chuỗi sạch: confirmation chồng confirmation tại vùng HTF hợp lý + entry trên retest = xác suất cao nhất.</text>
</svg>
