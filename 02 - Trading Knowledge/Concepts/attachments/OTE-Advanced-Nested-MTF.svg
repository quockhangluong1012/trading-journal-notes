<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">OTE lồng nhau (nested/fractal) — LTF OTE M5 bên trong HTF OTE H1</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Vùng OTE H1 rộng chỉ để chờ; entry thật tinh chỉnh bằng một OTE M5 mới hình thành bên trong.</text>

  <rect x="24" y="70" width="712" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- HTF band wide -->
  <rect x="60" y="190" width="640" height="130" fill="#3B82F6" opacity="0.10"/>
  <line x1="60" y1="190" x2="700" y2="190" stroke="#3B82F6" stroke-width="1.3"/>
  <line x1="60" y1="320" x2="700" y2="320" stroke="#3B82F6" stroke-width="1.3"/>
  <text x="66" y="184" font-size="11" fill="#1D4ED8" font-weight="700">H1 OTE 62%</text>
  <text x="66" y="335" font-size="11" fill="#1D4ED8" font-weight="700">H1 OTE 79%</text>
  <text x="590" y="184" font-size="11" fill="#1D4ED8">① Vùng OTE H1 (rộng)</text>

  <!-- price path from HTF impulse down into HTF zone -->
  <path d="M100,110 L100,150 L160,150 L200,300 L260,270 L260,300" fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="95" y="90" width="10" height="60" fill="#16A34A"/><rect x="98" y="80" width="4" height="80" fill="#16A34A"/>
  <rect x="155" y="120" width="10" height="30" fill="#16A34A"/><rect x="158" y="112" width="4" height="42" fill="#16A34A"/>
  <rect x="195" y="205" width="10" height="95" fill="#DC2626"/><rect x="198" y="195" width="4" height="115" fill="#DC2626"/>
  <rect x="255" y="255" width="10" height="45" fill="#DC2626"/><rect x="258" y="245" width="4" height="60" fill="#DC2626"/>

  <text x="90" y="70" font-size="10.5" fill="#15803D" font-weight="700">HTF displacement phá cấu trúc (H1 MSS)</text>

  <!-- zoomed inset box for the nested M5 zone -->
  <rect x="330" y="110" width="360" height="270" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
  <text x="342" y="132" font-size="12.5" font-weight="700" fill="#B45309">② Zoom M5 — impulse mới BÊN TRONG vùng OTE H1</text>

  <!-- inner nested OTE zone (M5) -->
  <rect x="360" y="260" width="300" height="55" fill="#F59E0B" opacity="0.16"/>
  <line x1="360" y1="260" x2="660" y2="260" stroke="#F59E0B" stroke-width="1.6"/>
  <line x1="360" y1="315" x2="660" y2="315" stroke="#F59E0B" stroke-width="1.6"/>
  <text x="366" y="254" font-size="10.5" fill="#B45309" font-weight="700">M5 OTE 62%</text>
  <text x="366" y="330" font-size="10.5" fill="#B45309" font-weight="700">M5 OTE 79%</text>

  <!-- M5 impulse leg fresh inside the box -->
  <path d="M360,360 L390,345 L420,190 L420,170 L450,170 L450,240 L480,290 L480,315 L510,270 L560,180 L610,150"
        fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="385" y="300" width="9" height="45" fill="#16A34A"/><rect x="388" y="290" width="3.5" height="65" fill="#16A34A"/>
  <rect x="415" y="180" width="9" height="60" fill="#16A34A"/><rect x="418" y="168" width="3.5" height="82" fill="#16A34A"/>
  <rect x="445" y="200" width="9" height="45" fill="#DC2626"/><rect x="448" y="190" width="3.5" height="62" fill="#DC2626"/>
  <rect x="475" y="270" width="9" height="35" fill="#DC2626"/><rect x="478" y="262" width="3.5" height="48" fill="#DC2626"/>
  <circle cx="480" cy="288" r="6" fill="#F59E0B"/>

  <text x="358" y="345" font-size="10.5" font-weight="700" fill="#B45309">③ Entry tại M5 OTE (70.5%) — chồng bên trong H1 OTE</text>

  <!-- push out of box up -->
  <rect x="555" y="165" width="9" height="35" fill="#16A34A"/><rect x="558" y="155" width="3.5" height="52" fill="#16A34A"/>
  <rect x="605" y="140" width="9" height="35" fill="#16A34A"/><rect x="608" y="128" width="3.5" height="52" fill="#16A34A"/>
  <text x="565" y="130" font-size="10" fill="#15803D" font-weight="700">④ Chạy khỏi vùng, target xa hơn</text>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="428" font-size="11.5" font-weight="700" fill="#92400E">Thay vì đặt lệnh dàn trải khắp vùng OTE H1 rộng, chờ giá vào vùng rồi tìm một impulse M5</text>
  <text x="36" y="446" font-size="11.5" font-weight="700" fill="#92400E">MỚI đã phá cấu trúc bên trong — kéo fib M5 riêng, vào tại OTE M5 (62–79%) để entry chặt hơn.</text>
</svg>
