<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Nhận diện trên chart — range hợp lệ vs range chọn sai</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Hai đầu phải tạo bởi displacement/BOS và đã quét liquidity — không phải swing "gần giá"</text>

  <!-- LEFT: valid -->
  <rect x="24" y="70" width="352" height="386" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="94" font-size="12.5" font-weight="700" fill="#15803D">Range hợp lệ — displacement + sweep hai đầu</text>

  <line x1="40" y1="237" x2="340" y2="237" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="42" y="232" font-size="10" fill="#6B7280">EQ 50%</text>
  <line x1="40" y1="118" x2="340" y2="118" stroke="#DC2626" stroke-width="2"/>
  <text x="260" y="112" font-size="10.5" font-weight="700" fill="#B91C1C">Range High</text>
  <line x1="40" y1="135" x2="340" y2="135" stroke="#D97706" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="44" y="130" font-size="10" fill="#D97706">equal highs cũ (BSL)</text>
  <text x="152" y="130" font-size="10" font-weight="700" fill="#D97706">sweep ↑</text>
  <line x1="40" y1="345" x2="340" y2="345" stroke="#D97706" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="44" y="340" font-size="10" fill="#D97706">old low (SSL)</text>
  <line x1="40" y1="357" x2="340" y2="357" stroke="#16A34A" stroke-width="2"/>
  <text x="44" y="372" font-size="10.5" font-weight="700" fill="#15803D">Range Low</text>
  <text x="200" y="372" font-size="10" font-weight="700" fill="#D97706">sweep SSL rồi reclaim</text>

  <!-- FVG -->
  <rect x="110" y="178" width="40" height="30" fill="#3B82F6" opacity="0.15" stroke="#1D4ED8" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="116" y="197" font-size="10" font-weight="700" fill="#1D4ED8">FVG</text>

  <!-- candles: up displacement sweeping BSL, down leg sweeping SSL, reclaim -->
  <line x1="60" y1="250" x2="60" y2="280" stroke="#16A34A" stroke-width="1.5"/><rect x="54" y="255" width="12" height="20" fill="#16A34A"/>
  <line x1="88" y1="210" x2="88" y2="262" stroke="#16A34A" stroke-width="1.5"/><rect x="82" y="215" width="12" height="43" fill="#16A34A"/>
  <line x1="116" y1="160" x2="116" y2="222" stroke="#16A34A" stroke-width="1.5"/><rect x="110" y="165" width="12" height="53" fill="#16A34A"/>
  <text x="70" y="152" font-size="10" font-weight="700" fill="#15803D">Displacement ↑</text>
  <line x1="144" y1="118" x2="144" y2="175" stroke="#16A34A" stroke-width="1.5"/><rect x="138" y="140" width="12" height="30" fill="#16A34A"/>
  <line x1="172" y1="145" x2="172" y2="200" stroke="#DC2626" stroke-width="1.5"/><rect x="166" y="150" width="12" height="45" fill="#DC2626"/>
  <line x1="200" y1="185" x2="200" y2="250" stroke="#DC2626" stroke-width="1.5"/><rect x="194" y="190" width="12" height="55" fill="#DC2626"/>
  <line x1="228" y1="235" x2="228" y2="310" stroke="#DC2626" stroke-width="1.5"/><rect x="222" y="240" width="12" height="65" fill="#DC2626"/>
  <line x1="256" y1="295" x2="256" y2="355" stroke="#DC2626" stroke-width="1.5"/><rect x="250" y="300" width="12" height="30" fill="#DC2626"/>
  <line x1="284" y1="265" x2="284" y2="330" stroke="#16A34A" stroke-width="1.5"/><rect x="278" y="270" width="12" height="55" fill="#16A34A"/>
  <line x1="312" y1="230" x2="312" y2="276" stroke="#16A34A" stroke-width="1.5"/><rect x="306" y="235" width="12" height="37" fill="#16A34A"/>

  <text x="40" y="404" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Đỉnh/đáy tạo bởi displacement, đã quét BSL/SSL</text>
  <text x="40" y="424" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Có FVG (internal liquidity) bên trong range</text>
  <text x="40" y="444" font-size="11" fill="#374151"><tspan fill="#16A34A" font-weight="700">✓</tspan> Đủ điều kiện đo Premium/Discount &amp; OTE</text>

  <!-- RIGHT: mistake -->
  <rect x="384" y="70" width="352" height="386" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="396" y="94" font-size="12.5" font-weight="700" fill="#B91C1C">Sai — range quá nhỏ, không quét liquidity</text>

  <rect x="400" y="118" width="300" height="119" fill="#DC2626" opacity="0.05"/>
  <rect x="400" y="237" width="300" height="120" fill="#16A34A" opacity="0.05"/>
  <line x1="400" y1="118" x2="700" y2="118" stroke="#DC2626" stroke-width="2"/>
  <text x="404" y="112" font-size="10.5" font-weight="700" fill="#B91C1C">Range High THẬT (D1)</text>
  <line x1="400" y1="357" x2="700" y2="357" stroke="#16A34A" stroke-width="2"/>
  <text x="404" y="372" font-size="10.5" font-weight="700" fill="#15803D">Range Low THẬT (D1)</text>
  <line x1="400" y1="237" x2="700" y2="237" stroke="#9CA3AF" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="654" y="232" font-size="10" fill="#6B7280">EQ thật</text>
  <text x="640" y="210" font-size="10" fill="#B91C1C">Premium thật</text>
  <text x="636" y="340" font-size="10" fill="#15803D">Discount thật</text>

  <!-- tiny range picked by mistake -->
  <rect x="466" y="145" width="166" height="60" fill="none" stroke="#D97706" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="470" y="140" font-size="10.5" font-weight="700" fill="#D97706">range "quá nhỏ" ✗</text>

  <!-- small chop candles in true premium -->
  <line x1="420" y1="185" x2="420" y2="215" stroke="#16A34A" stroke-width="1.5"/><rect x="414" y="190" width="12" height="20" fill="#16A34A"/>
  <line x1="448" y1="170" x2="448" y2="203" stroke="#DC2626" stroke-width="1.5"/><rect x="442" y="175" width="12" height="23" fill="#DC2626"/>
  <line x1="476" y1="155" x2="476" y2="190" stroke="#16A34A" stroke-width="1.5"/><rect x="470" y="160" width="12" height="25" fill="#16A34A"/>
  <line x1="504" y1="165" x2="504" y2="200" stroke="#DC2626" stroke-width="1.5"/><rect x="498" y="170" width="12" height="25" fill="#DC2626"/>
  <line x1="532" y1="150" x2="532" y2="183" stroke="#16A34A" stroke-width="1.5"/><rect x="526" y="155" width="12" height="23" fill="#16A34A"/>
  <line x1="560" y1="163" x2="560" y2="197" stroke="#DC2626" stroke-width="1.5"/><rect x="554" y="168" width="12" height="24" fill="#DC2626"/>
  <line x1="588" y1="148" x2="588" y2="177" stroke="#16A34A" stroke-width="1.5"/><rect x="582" y="152" width="12" height="20" fill="#16A34A"/>
  <line x1="616" y1="160" x2="616" y2="193" stroke="#DC2626" stroke-width="1.5"/><rect x="610" y="165" width="12" height="23" fill="#DC2626"/>

  <text x="470" y="222" font-size="10" fill="#D97706">"discount" giả của range nhỏ</text>

  <text x="400" y="404" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Hai đầu chỉ là swing nhỏ gần giá, không displacement</text>
  <text x="400" y="424" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Chưa quét liquidity nào — đỉnh/đáy dễ bị xuyên thủng</text>
  <text x="400" y="444" font-size="11" fill="#374151"><tspan fill="#DC2626" font-weight="700">✗</tspan> Trên range THẬT giá đang ở PREMIUM → Long là bẫy</text>
</svg>
