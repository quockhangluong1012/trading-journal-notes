<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">OTE có Confluence vs OTE trơ — FVG + Order Block chồng trong vùng 62–79%</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">So sánh hai vùng OTE giống hệt về mặt fib nhưng khác hẳn về chất lượng entry.</text>

  <!-- LEFT PANEL: bare OTE -->
  <rect x="24" y="70" width="340" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="13" font-weight="700" fill="#6B7280">OTE trơ — không có gì bên trong</text>

  <!-- OTE zone left -->
  <rect x="60" y="230" width="280" height="60" fill="#3B82F6" opacity="0.10"/>
  <line x1="60" y1="230" x2="340" y2="230" stroke="#3B82F6" stroke-width="1.2"/>
  <line x1="60" y1="290" x2="340" y2="290" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="66" y="224" font-size="10.5" fill="#1D4ED8">62%</text>
  <text x="66" y="304" font-size="10.5" fill="#1D4ED8">79%</text>

  <!-- price path left, no reaction, drills through -->
  <path d="M80,340 L80,300 L120,150 L120,110 L160,110 L160,200 L200,260 L200,310 L240,340 L280,360 L320,370"
        fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="75" y="215" width="10" height="85" fill="#16A34A"/><rect x="78" y="200" width="4" height="115" fill="#16A34A"/>
  <rect x="115" y="120" width="10" height="70" fill="#16A34A"/><rect x="118" y="108" width="4" height="95" fill="#16A34A"/>
  <rect x="155" y="150" width="10" height="55" fill="#DC2626"/><rect x="158" y="140" width="4" height="75" fill="#DC2626"/>
  <rect x="195" y="245" width="10" height="65" fill="#DC2626"/><rect x="198" y="238" width="4" height="82" fill="#DC2626"/>
  <rect x="235" y="320" width="10" height="45" fill="#DC2626"/><rect x="238" y="312" width="4" height="60" fill="#DC2626"/>

  <text x="60" y="355" font-size="10.5" fill="#B91C1C" font-weight="700">Giá xuyên thẳng qua, không phản ứng</text>
  <text x="60" y="370" font-size="10" fill="#6B7280">→ không có lý do để giá tôn trọng vùng</text>

  <!-- RIGHT PANEL: OTE with confluence -->
  <rect x="396" y="70" width="340" height="330" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="412" y="94" font-size="13" font-weight="700" fill="#15803D">OTE có confluence — FVG + OB + sweep</text>

  <!-- OTE zone right -->
  <rect x="432" y="230" width="280" height="60" fill="#3B82F6" opacity="0.10"/>
  <line x1="432" y1="230" x2="712" y2="230" stroke="#3B82F6" stroke-width="1.2"/>
  <line x1="432" y1="290" x2="712" y2="290" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="438" y="224" font-size="10.5" fill="#1D4ED8">62%</text>
  <text x="438" y="304" font-size="10.5" fill="#1D4ED8">79%</text>

  <!-- FVG inside zone -->
  <rect x="470" y="240" width="90" height="40" fill="#3B82F6" opacity="0.25"/>
  <text x="474" y="236" font-size="9.5" fill="#1D4ED8" font-weight="700">① FVG</text>

  <!-- OB inside zone -->
  <rect x="580" y="238" width="30" height="46" fill="#16A34A" opacity="0.5" rx="1"/>
  <text x="565" y="330" font-size="9.5" fill="#15803D" font-weight="700">② Order Block bullish</text>

  <!-- sweep arrow pointing up into zone from below -->
  <path d="M700,380 L660,300" fill="none" stroke="#F59E0B" stroke-width="2.4" marker-end="url(#arrowAmberOTE)"/>
  <text x="655" y="395" font-size="9.5" fill="#B45309" font-weight="700">③ Sweep SSL trước đó</text>

  <!-- price path right, bounces hard at confluence -->
  <path d="M452,340 L452,300 L492,150 L492,110 L532,110 L532,200 L570,260 L570,272 L610,150 L650,90 L700,60"
        fill="none" stroke="#374151" stroke-width="2.2"/>
  <rect x="447" y="215" width="10" height="85" fill="#16A34A"/><rect x="450" y="200" width="4" height="115" fill="#16A34A"/>
  <rect x="487" y="120" width="10" height="70" fill="#16A34A"/><rect x="490" y="108" width="4" height="95" fill="#16A34A"/>
  <rect x="527" y="150" width="10" height="55" fill="#DC2626"/><rect x="530" y="140" width="4" height="75" fill="#DC2626"/>
  <rect x="565" y="245" width="10" height="30" fill="#DC2626"/><rect x="568" y="238" width="4" height="42" fill="#DC2626"/>
  <circle cx="570" cy="267" r="7" fill="#F59E0B"/>
  <rect x="605" y="105" width="10" height="50" fill="#16A34A"/><rect x="608" y="90" width="4" height="70" fill="#16A34A"/>
  <rect x="645" y="60" width="10" height="35" fill="#16A34A"/><rect x="648" y="50" width="4" height="50" fill="#16A34A"/>

  <text x="440" y="360" font-size="10.5" fill="#15803D" font-weight="700">④ Reject mạnh, chạy về target</text>

  <defs>
    <marker id="arrowAmberOTE" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect x="24" y="410" width="712" height="56" rx="6" fill="#FEF3C7"/>
  <text x="36" y="428" font-size="11.5" font-weight="700" fill="#92400E">Cùng là vùng 62–79% nhưng bên phải có FVG + OB + sweep trùng nhau → lý do giá phản ứng.</text>
  <text x="36" y="446" font-size="11.5" font-weight="700" fill="#92400E">Bên trái chỉ có con số Fibonacci — không có gì buộc giá phải tôn trọng vùng đó.</text>
</svg>
