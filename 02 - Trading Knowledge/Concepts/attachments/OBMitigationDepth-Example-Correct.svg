<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="obdc" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#16A34A"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Ví dụ ĐÚNG — NQ1, đọc context trước khi chọn mốc entry</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Bullish OB 21,000–21,040 (CE = 21,020) · có nested FVG 21,025–21,035 phía trên · SSL equal-lows tại 20,995 phía dưới</text>

  <rect x="24" y="70" width="712" height="380" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- price scale reference lines -->
  <line x1="70" y1="120" x2="710" y2="120" stroke="#E5E7EB" stroke-width="1"/>
  <text x="712" y="124" font-size="9.5" fill="#9CA3AF">21,040 (đỉnh OB)</text>
  <line x1="70" y1="175" x2="710" y2="175" stroke="#0D9488" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="712" y="179" font-size="9.5" fill="#0D9488" font-weight="700">21,030 (nested FVG)</text>
  <line x1="70" y1="220" x2="710" y2="220" stroke="#1D4ED8" stroke-width="1.8" stroke-dasharray="6 3"/>
  <text x="712" y="224" font-size="9.5" fill="#1D4ED8" font-weight="700">21,020 (CE)</text>
  <line x1="70" y1="280" x2="710" y2="280" stroke="#9CA3AF" stroke-width="1"/>
  <text x="712" y="284" font-size="9.5" fill="#9CA3AF">21,000 (đáy OB)</text>
  <line x1="70" y1="330" x2="710" y2="330" stroke="#B45309" stroke-width="1.4" stroke-dasharray="3 2"/>
  <text x="712" y="334" font-size="9.5" fill="#B45309" font-weight="700">20,995 (SSL pool)</text>

  <!-- price path: sweep SSL, displacement up, retrace to nested FVG, react, continue -->
  <path d="M100,300 L140,260 L180,335 L220,215 L260,178 L300,196 L340,170 L400,130 L460,150 L520,95" fill="none" stroke="#374151" stroke-width="2.2"/>

  <!-- markers -->
  <circle cx="180" cy="335" r="5" fill="#B45309"/>
  <text x="150" y="360" font-size="10" font-weight="700" fill="#92400E">① Quét SSL 20,995 trước</text>
  <text x="150" y="373" font-size="9" fill="#78350F">(liquidity đã bị lấy)</text>

  <circle cx="220" cy="215" r="5" fill="#1F2937"/>
  <text x="228" y="200" font-size="10" font-weight="700" fill="#1F2937">② Displacement tạo OB + FVG</text>

  <circle cx="260" cy="178" r="6" fill="#0D9488"/>
  <text x="270" y="170" font-size="10" font-weight="700" fill="#0F766E">③ Entry tại nested FVG (~21,030)</text>
  <text x="270" y="183" font-size="9" fill="#0F766E">xác nhận bằng M1 MSS — không chờ CE</text>

  <line x1="70" y1="280" x2="400" y2="280" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="410" y="284" font-size="9.5" font-weight="700" fill="#DC2626">④ Stop dưới 21,000 (qua SSL) — KHÔNG sát CE</text>

  <text x="420" y="120" font-size="10" font-weight="700" fill="#166534">⑤ Delivery tiếp lên BSL target</text>

  <rect x="48" y="404" width="664" height="34" rx="6" fill="#16A34A" opacity="0.08" stroke="#16A34A" stroke-width="1"/>
  <text x="58" y="425" font-size="10.5" font-weight="700" fill="#15803D">Vì sao đúng: đọc đủ 3 lớp (SSL dưới OB, nested FVG trên CE, vị trí trong discount) trước khi chọn mốc — không áp CE như luật cứng.</text>
</svg>
