<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Tầng 2: Đánh dấu CISD level cho ĐÚNG</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">Bearish CISD = giá phá xuống BODY LOW (close) của cây bearish CUỐI trước chuỗi bullish liên tiếp.</text>

  <!-- Main panel -->
  <rect x="24" y="72" width="452" height="308" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="40" y="94" font-size="12" font-weight="700" fill="#1F2937">Bullish delivery → CISD to sell side</text>

  <!-- last bearish candle before consecutive bulls -->
  <line x1="70" y1="150" x2="70" y2="230" stroke="#DC2626" stroke-width="1.4"/><rect x="64.5" y="168" width="11" height="42" fill="#DC2626"/>
  <text x="52" y="248" font-size="9" fill="#DC2626" text-anchor="middle">cây bearish cuối</text>
  <!-- annotate open (top of body) and close (bottom of body) -->
  <line x1="76" y1="168" x2="180" y2="120" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="184" y="122" font-size="9" fill="#6B7280">open = body high</text>
  <line x1="76" y1="210" x2="360" y2="210" stroke="#1D4ED8" stroke-width="1.8" stroke-dasharray="5 3"/>
  <text x="200" y="205" font-size="10.5" font-weight="700" fill="#1D4ED8">CISD level = body low (CLOSE) của cây bearish</text>

  <!-- consecutive bullish candles -->
  <line x1="98" y1="150" x2="98" y2="212" stroke="#16A34A" stroke-width="1.4"/><rect x="92.5" y="160" width="11" height="44" fill="#16A34A"/>
  <line x1="120" y1="120" x2="120" y2="168" stroke="#16A34A" stroke-width="1.4"/><rect x="114.5" y="128" width="11" height="34" fill="#16A34A"/>
  <line x1="142" y1="100" x2="142" y2="140" stroke="#16A34A" stroke-width="1.4"/><rect x="136.5" y="108" width="11" height="28" fill="#16A34A"/>
  <text x="120" y="278" font-size="9.5" fill="#166534" text-anchor="middle">3 cây bullish liên tiếp = bullish delivery</text>

  <!-- price fails, comes back down and breaks CISD level -->
  <line x1="176" y1="98" x2="176" y2="135" stroke="#16A34A" stroke-width="1.4"/><rect x="170.5" y="105" width="11" height="24" fill="#16A34A"/>
  <line x1="200" y1="110" x2="200" y2="165" stroke="#DC2626" stroke-width="1.4"/><rect x="194.5" y="118" width="11" height="38" fill="#DC2626"/>
  <line x1="224" y1="150" x2="224" y2="205" stroke="#DC2626" stroke-width="1.4"/><rect x="218.5" y="158" width="11" height="40" fill="#DC2626"/>
  <!-- break candle closes below CISD level -->
  <line x1="248" y1="195" x2="248" y2="260" stroke="#DC2626" stroke-width="1.4"/><rect x="242.5" y="205" width="11" height="45" fill="#DC2626"/>
  <circle cx="248" cy="230" r="8" fill="none" stroke="#1D4ED8" stroke-width="2.5"/>
  <text x="262" y="248" font-size="10" font-weight="700" fill="#1D4ED8">phá xuống → CISD bán ✔</text>

  <!-- WRONG markers -->
  <line x1="64.5" y1="150" x2="120" y2="150" stroke="#DC2626" stroke-width="0"/>
  <line x1="52" y1="150" x2="360" y2="150" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="2 4" opacity="0.6"/>
  <text x="300" y="146" font-size="9" fill="#DC2626">SAI: dùng wick low</text>
  <line x1="52" y1="160" x2="200" y2="160" stroke="#DC2626" stroke-width="0"/>

  <!-- Side note panel -->
  <rect x="492" y="72" width="244" height="308" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="506" y="94" font-size="12" font-weight="700" fill="#B45309">Nhấn mạnh: BODY, không wick</text>
  <rect x="506" y="108" width="216" height="70" rx="6" fill="#DBEAFE"/>
  <text x="516" y="128" font-size="10" fill="#1E40AF">✔ CISD level = giá ĐÓNG CỬA (close)</text>
  <text x="516" y="143" font-size="10" fill="#1E40AF">của cây đối chiều cuối cùng.</text>
  <text x="516" y="162" font-size="10" fill="#1E40AF">= đáy thân (body low) với bearish,</text>
  <text x="516" y="172" font-size="10" fill="#1E40AF">đỉnh thân (body high) với bullish.</text>
  <rect x="506" y="190" width="216" height="86" rx="6" fill="#FEE2E2"/>
  <text x="516" y="210" font-size="10" fill="#991B1B">✗ KHÔNG dùng wick (đuôi nến).</text>
  <text x="516" y="225" font-size="10" fill="#991B1B">✗ KHÔNG dùng open của cây</text>
  <text x="516" y="235" font-size="10" fill="#991B1B">   bullish đầu tiên.</text>
  <text x="516" y="255" font-size="10" fill="#991B1B">Đánh sai mức = CISD giả, dễ bị</text>
  <text x="516" y="265" font-size="10" fill="#991B1B">quét rồi stop-out.</text>
  <text x="506" y="300" font-size="9.5" fill="#6B7280">Sau CISD: chờ retrace về</text>
  <text x="506" y="314" font-size="9.5" fill="#6B7280">Breaker / BPR / FVG / IFVG hình</text>
  <text x="506" y="328" font-size="9.5" fill="#6B7280">thành trong lúc CISD, rồi vào</text>
  <text x="506" y="342" font-size="9.5" fill="#6B7280">theo chiều CISD.</text>

  <text x="24" y="404" font-size="11.5" font-weight="700" fill="#1D4ED8">CISD = xác nhận thứ 2 (candle-level). Bullish CISD đối xứng: phá LÊN body high của cây bullish cuối.</text>
</svg>
