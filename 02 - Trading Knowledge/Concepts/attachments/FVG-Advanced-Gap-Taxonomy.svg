<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="560" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Gia đình Gap — FVG vs Volume Imbalance vs Liquidity Void vs BPR</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng là inefficiency nhưng khác cấu trúc, khác cách dùng</text>

  <!-- ===== Panel A: FVG (BISI) ===== -->
  <rect x="24" y="70" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="92" font-size="14" font-weight="700" fill="#1D4ED8">A. Fair Value Gap (BISI) — 3 nến</text>

  <!-- gap zone: high c1 (y190) -> low c3 (y150) -->
  <rect x="60" y="150" width="220" height="40" fill="#3B82F6" opacity="0.18"/>
  <line x1="60" y1="170" x2="280" y2="170" stroke="#1D4ED8" stroke-width="1.2" stroke-dasharray="5 4"/>
  <text x="288" y="156" font-size="11.5" fill="#1D4ED8" font-weight="700">Gap: high nến 1</text>
  <text x="288" y="170" font-size="11.5" fill="#1D4ED8" font-weight="700">→ low nến 3</text>
  <text x="288" y="186" font-size="11.5" fill="#1D4ED8">CE = 50%</text>

  <!-- candle 1 (up, small) -->
  <rect x="86" y="190" width="2" height="62" fill="#16A34A"/>
  <rect x="80" y="200" width="14" height="42" fill="#16A34A" rx="1"/>
  <!-- candle 2 displacement -->
  <rect x="116" y="118" width="2" height="130" fill="#16A34A"/>
  <rect x="110" y="126" width="14" height="108" fill="#16A34A" rx="1"/>
  <!-- candle 3 -->
  <rect x="146" y="98" width="2" height="52" fill="#16A34A"/>
  <rect x="140" y="104" width="14" height="38" fill="#16A34A" rx="1"/>

  <text x="36" y="268" font-size="11.5" fill="#374151">Nến 2 = displacement; wick nến 1 và nến 3 KHÔNG chạm nhau.</text>
  <text x="36" y="282" font-size="11.5" fill="#374151">POI entry / draw. Mức quan trọng nhất: CE (50%).</text>

  <!-- ===== Panel B: Volume Imbalance ===== -->
  <rect x="392" y="70" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="404" y="92" font-size="14" font-weight="700" fill="#B45309">B. Volume Imbalance — gap giữa BODY</text>

  <!-- body gap zone between c1 body top (200) and c2 body bottom (180) -->
  <rect x="430" y="180" width="200" height="20" fill="#F59E0B" opacity="0.25"/>
  <!-- candle 1: body 200..244, wick to 185 (wick overlaps c2 wick) -->
  <rect x="456" y="185" width="2" height="70" fill="#16A34A"/>
  <rect x="450" y="200" width="14" height="44" fill="#16A34A" rx="1"/>
  <!-- candle 2: body 138..180, wick down to 196 -->
  <rect x="486" y="130" width="2" height="66" fill="#16A34A"/>
  <rect x="480" y="138" width="14" height="42" fill="#16A34A" rx="1"/>

  <text x="638" y="188" font-size="11.5" fill="#B45309" font-weight="700">Body gap,</text>
  <text x="638" y="202" font-size="11.5" fill="#B45309" font-weight="700">wick chồng lấp</text>

  <text x="404" y="252" font-size="11.5" fill="#374151">Gap giữa close/open hai body nhưng wick vẫn giao nhau.</text>
  <text x="404" y="266" font-size="11.5" fill="#374151">Reference nhỏ, thường được rebalance nhanh trong vài nến.</text>
  <text x="404" y="280" font-size="11.5" fill="#374151">Dùng làm mốc precision cho entry/target LTF, không phải POI chính.</text>

  <!-- ===== Panel C: Liquidity Void ===== -->
  <rect x="24" y="310" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="332" font-size="14" font-weight="700" fill="#0F766E">C. Liquidity Void — nhiều nến one-sided</text>

  <rect x="60" y="360" width="230" height="120" fill="#14B8A6" opacity="0.14"/>
  <!-- 4 rising candles with minimal overlap -->
  <rect x="86" y="440" width="2" height="48" fill="#16A34A"/>
  <rect x="80" y="446" width="14" height="36" fill="#16A34A" rx="1"/>
  <rect x="116" y="408" width="2" height="46" fill="#16A34A"/>
  <rect x="110" y="412" width="14" height="36" fill="#16A34A" rx="1"/>
  <rect x="146" y="376" width="2" height="46" fill="#16A34A"/>
  <rect x="140" y="380" width="14" height="36" fill="#16A34A" rx="1"/>
  <rect x="176" y="346" width="2" height="44" fill="#16A34A"/>
  <rect x="170" y="350" width="14" height="34" fill="#16A34A" rx="1"/>

  <text x="298" y="404" font-size="11.5" fill="#0F766E" font-weight="700">Void rộng,</text>
  <text x="298" y="418" font-size="11.5" fill="#0F766E" font-weight="700">chứa nhiều FVG</text>

  <text x="36" y="500" font-size="11.5" fill="#374151">Cả một đoạn giá đi một chiều quá nhanh (nhiều nến liên tiếp).</text>
  <text x="36" y="514" font-size="11.5" fill="#374151">Draw mạnh — giá thường quay lại rebalance phần lớn void.</text>

  <!-- ===== Panel D: BPR ===== -->
  <rect x="392" y="310" width="344" height="220" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="404" y="332" font-size="14" font-weight="700" fill="#7C3AED">D. Balanced Price Range (BPR)</text>

  <!-- bearish FVG zone (from down move) -->
  <rect x="430" y="390" width="230" height="46" fill="#DC2626" opacity="0.12"/>
  <!-- bullish FVG zone (from up move), overlapping -->
  <rect x="430" y="410" width="230" height="46" fill="#16A34A" opacity="0.12"/>
  <!-- overlap darker -->
  <rect x="430" y="410" width="230" height="26" fill="#7C3AED" opacity="0.22"/>

  <!-- down leg -->
  <rect x="456" y="356" width="2" height="70" fill="#DC2626"/>
  <rect x="450" y="362" width="12" height="56" fill="#DC2626" rx="1"/>
  <rect x="480" y="404" width="2" height="70" fill="#DC2626"/>
  <rect x="474" y="410" width="12" height="56" fill="#DC2626" rx="1"/>
  <!-- up leg -->
  <rect x="508" y="386" width="2" height="92" fill="#16A34A"/>
  <rect x="502" y="392" width="12" height="78" fill="#16A34A" rx="1"/>
  <rect x="532" y="348" width="2" height="76" fill="#16A34A"/>
  <rect x="526" y="354" width="12" height="62" fill="#16A34A" rx="1"/>

  <text x="566" y="420" font-size="11.5" fill="#7C3AED" font-weight="700">Vùng chồng lấp =</text>
  <text x="566" y="434" font-size="11.5" fill="#7C3AED" font-weight="700">BPR (đã trade 2 chiều)</text>

  <text x="404" y="500" font-size="11.5" fill="#374151">Bearish FVG ∩ Bullish FVG → vùng đã được cân bằng cả hai phía.</text>
  <text x="404" y="514" font-size="11.5" fill="#374151">S/R rất "cứng"; CE của BPR là mức phòng thủ đáng tin.</text>
</svg>
