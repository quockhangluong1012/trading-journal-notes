<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Macro trong chu kỳ AMD — Thao túng hay Phân phối?</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Manipulation macro: QUAN SÁT + đánh dấu FVG. Distribution macro: mới VÀO LỆNH.</text>
<rect x="34" y="96" width="222" height="230" rx="8" fill="#F1F5F9" stroke="#94A3B8" stroke-width="1.5"/><text x="50" y="126" font-size="14" font-weight="700" fill="#94A3B8">Accumulation</text><text x="50" y="150" font-size="11" fill="#334155">Asian</text><text x="50" y="182" font-size="11.5" fill="#374151">KHÔNG có macro (cố ý) →</text><text x="50" y="200" font-size="11.5" fill="#374151">đừng trade Á</text><rect x="270" y="96" width="222" height="230" rx="8" fill="#FEF3C7" stroke="#B45309" stroke-width="1.5"/><text x="286" y="126" font-size="14" font-weight="700" fill="#B45309">Manipulation</text><text x="286" y="150" font-size="11" fill="#334155">02:33 · 04:03 · 08:50 · 09:50</text><text x="286" y="182" font-size="11.5" fill="#374151">Quan sát, đánh dấu FVG, chờ</text><text x="286" y="200" font-size="11.5" fill="#374151">MSS — KHÔNG entry</text><rect x="506" y="96" width="222" height="230" rx="8" fill="#DCFCE7" stroke="#15803D" stroke-width="1.5"/><text x="522" y="126" font-size="14" font-weight="700" fill="#15803D">Distribution</text><text x="522" y="150" font-size="11" fill="#334155">10:10 · 10:50 · 13:10 · 14:50</text><text x="522" y="182" font-size="11.5" fill="#374151">VÀO LỆNH tại đây khi thao</text><text x="522" y="200" font-size="11.5" fill="#374151">túng đã hoàn tất</text><text x="40" y="348" font-size="11" fill="#DC2626">Quy tắc: KHÔNG vào lệnh ở macro thao túng; chỉ vào ở macro phân phối sau khi có MSS.</text>
