<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="540" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Bẫy "breaker" từ news spike — sweep + MSS trong chân không thanh khoản</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Cùng thỏa định nghĩa "sweep → MSS → retest", nhưng một bên là chuyển giao vị thế thật, một bên chỉ là spread giãn trong 90 giây.</text>

  <!-- LEFT: fake -->
  <rect x="24" y="70" width="348" height="340" rx="8" fill="#FFFFFF" stroke="#FCA5A5"/>
  <text x="40" y="94" font-size="13" font-weight="700" fill="#B91C1C">✗ FAKE — spike CPI/NFP tạo "breaker"</text>

  <line x1="44" y1="300" x2="352" y2="300" stroke="#9CA3AF" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="46" y="314" font-size="9.5" fill="#9CA3AF">Low1 (SSL)</text>
  <!-- OB cluster -->
  <rect x="60" y="170" width="290" height="26" fill="#DC2626" opacity="0.12"/>
  <text x="64" y="164" font-size="9.5" fill="#B91C1C">"OB cũ" → bị gán nhãn breaker</text>
  <!-- price: range, news spike down through low then V straight back up through high, then chop back down -->
  <path d="M60,230 L85,255 L105,225 L125,250 L145,235 L160,240 L172,340 L184,140 L196,230 L215,250 L240,215 L265,262 L290,238 L320,290 L340,268"
        fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="172" cy="340" r="5" fill="none" stroke="#B45309" stroke-width="2"/>
  <text x="120" y="360" font-size="9.5" fill="#B45309">"sweep" = wick news 1 nến</text>
  <circle cx="184" cy="140" r="5" fill="none" stroke="#B91C1C" stroke-width="2"/>
  <text x="196" y="136" font-size="9.5" fill="#B91C1C">"MSS" = cùng cây nến / nến kế</text>
  <text x="200" y="330" font-size="9.5" fill="#B91C1C">sau spike: giá rơi lại, không acceptance</text>
  <text x="40" y="392" font-size="10" font-style="italic" fill="#6B7280">Toàn bộ "chuỗi breaker" xảy ra trong 1–3 nến M1 quanh giờ tin.</text>

  <!-- RIGHT: real -->
  <rect x="388" y="70" width="348" height="340" rx="8" fill="#FFFFFF" stroke="#86EFAC"/>
  <text x="404" y="94" font-size="13" font-weight="700" fill="#15803D">✓ THẬT — sweep và MSS tách nến, có acceptance</text>

  <line x1="408" y1="300" x2="716" y2="300" stroke="#9CA3AF" stroke-width="1.1" stroke-dasharray="5 4"/>
  <text x="410" y="314" font-size="9.5" fill="#9CA3AF">Low1 (SSL)</text>
  <rect x="424" y="170" width="290" height="26" fill="#16A34A" opacity="0.14"/>
  <text x="428" y="164" font-size="9.5" fill="#15803D">OB cũ → breaker hợp lệ (hỗ trợ)</text>
  <!-- price: swing down sweeps low over several candles, displacement up with multiple closes, retest, go -->
  <path d="M424,215 L448,245 L470,230 L492,285 L510,325 L528,308 L546,270 L562,235 L578,205 L592,150 L610,132 L628,168 L644,186 L658,178 L676,140 L700,112"
        fill="none" stroke="#374151" stroke-width="2"/>
  <circle cx="510" cy="325" r="5" fill="none" stroke="#B45309" stroke-width="2"/>
  <text x="460" y="348" font-size="9.5" fill="#B45309">sweep: nhiều nến, có đấu giá thật</text>
  <circle cx="592" cy="150" r="5" fill="none" stroke="#15803D" stroke-width="2"/>
  <text x="600" y="146" font-size="9.5" fill="#15803D">MSS + các nến ĐÓNG giữ trên High1</text>
  <circle cx="644" cy="186" r="6" fill="#16A34A"/>
  <text x="640" y="212" font-size="10" font-weight="700" fill="#15803D">retest → entry</text>
  <text x="404" y="392" font-size="10" font-style="italic" fill="#6B7280">Sweep và MSS cách nhau nhiều nến; sau MSS giá GIỮ được cấu trúc mới.</text>

  <!-- bottom why -->
  <rect x="24" y="424" width="712" height="100" rx="8" fill="#FEF3C7"/>
  <text x="38" y="448" font-size="12.5" font-weight="700" fill="#92400E">Why — vì sao spike news không tạo được breaker thật?</text>
  <text x="38" y="468" font-size="11" fill="#78350F">Breaker có giá trị vì nó đánh dấu nơi MỘT VỊ THẾ THẬT bị kẹt rồi bị lật (OB fail → phe cũ mất kiểm soát). Trong news spike, market maker</text>
  <text x="38" y="486" font-size="11" fill="#78350F">rút quote — spread giãn, depth trống — nên "sweep + MSS" chỉ là giá trượt trong chân không: KHÔNG có khối lệnh nào được xây, không có ai kẹt,</text>
  <text x="38" y="504" font-size="11" fill="#78350F">không có ai phải bảo vệ vùng. Phép thử: đợi 15–30 phút sau tin — nếu cấu trúc mới được GIỮ bằng các nến đóng bình thường thì mới tính chuỗi breaker.</text>
</svg>
