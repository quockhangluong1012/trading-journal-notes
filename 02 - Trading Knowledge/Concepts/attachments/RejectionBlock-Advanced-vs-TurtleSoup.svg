<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Rejection Block vs Turtle Soup — cùng logic sweep-and-reverse, khác vai trò</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Turtle Soup = entry model (pattern false-breakout); Rejection Block = PD-array (vùng wick từ chối). Chúng chồng lấp, không đồng nhất.</text>

  <rect x="24" y="70" width="712" height="300" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Venn circles -->
  <circle cx="280" cy="220" r="140" fill="#3B82F6" opacity="0.10" stroke="#1D4ED8" stroke-width="1.6"/>
  <circle cx="480" cy="220" r="140" fill="#F59E0B" opacity="0.14" stroke="#B45309" stroke-width="1.6"/>

  <text x="110" y="130" font-size="12.5" font-weight="700" fill="#1D4ED8">Turtle Soup</text>
  <text x="90" y="148" font-size="10" fill="#1D4ED8">Entry model / pattern:</text>
  <text x="90" y="163" font-size="10" fill="#1D4ED8">false breakout của swing point</text>
  <text x="90" y="178" font-size="10" fill="#1D4ED8">+ reversal trong setup cấu trúc</text>
  <text x="90" y="193" font-size="10" fill="#1D4ED8">cụ thể (đã định nghĩa trước)</text>

  <text x="560" y="130" font-size="12.5" font-weight="700" fill="#92400E">Rejection Block</text>
  <text x="545" y="148" font-size="10" fill="#92400E">PD-array / vùng giá:</text>
  <text x="545" y="163" font-size="10" fill="#92400E">wick để lại từ một cú</text>
  <text x="545" y="178" font-size="10" fill="#92400E">từ chối — dùng làm</text>
  <text x="545" y="193" font-size="10" fill="#92400E">POI để retest bất kỳ lúc nào</text>

  <!-- overlap label -->
  <text x="330" y="220" font-size="11.5" font-weight="700" fill="#374151">Overlap:</text>
  <text x="316" y="236" font-size="10" fill="#374151">nến đảo chiều của</text>
  <text x="312" y="250" font-size="10" fill="#374151">Turtle Soup CHÍNH LÀ</text>
  <text x="320" y="264" font-size="10" fill="#374151">một Rejection Block</text>

  <!-- only TS, no RB example -->
  <text x="80" y="300" font-size="9.5" fill="#1D4ED8">VD chỉ Turtle Soup:</text>
  <text x="80" y="313" font-size="9" fill="#1D4ED8">false breakout đảo chiều</text>
  <text x="80" y="325" font-size="9" fill="#1D4ED8">nhưng KHÔNG để lại wick sạch</text>

  <!-- only RB, no TS example -->
  <text x="560" y="300" font-size="9.5" fill="#92400E">VD chỉ Rejection Block:</text>
  <text x="555" y="313" font-size="9" fill="#92400E">wick từ chối trong một nhịp</text>
  <text x="555" y="325" font-size="9" fill="#92400E">tiếp diễn trend, không phải</text>
  <text x="555" y="337" font-size="9" fill="#92400E">setup Turtle Soup chính thức</text>

  <rect x="24" y="386" width="712" height="60" rx="6" fill="#FEF3C7"/>
  <text x="36" y="406" font-size="11.5" font-weight="700" fill="#92400E">Không phải đồng nghĩa: có thể có RB mà không có Turtle Soup (RB trong trend continuation), và có</text>
  <text x="36" y="424" font-size="11.5" font-weight="700" fill="#92400E">Turtle Soup mà không để lại RB textbook. Khi trùng nhau, hai khái niệm CỘNG HƯỞNG (reinforce) lẫn nhau.</text>
</svg>
