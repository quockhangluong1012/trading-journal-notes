<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Lỗi thường gặp — chọn sai range làm lệch mọi phép đo</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Range sai thì Premium/Discount, OTE, draw on liquidity đều sai từ gốc</text>

  <!-- LEFT: range too small / too old -->
  <rect x="24" y="70" width="230" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="93" font-size="12.5" font-weight="700" fill="#B91C1C">1. Range quá nhỏ / quá cũ</text>
  <line x1="44" y1="115" x2="234" y2="115" stroke="#DC2626" stroke-width="2"/>
  <text x="48" y="110" font-size="9.5" font-weight="700" fill="#B91C1C">High THẬT</text>
  <line x1="44" y1="225" x2="234" y2="225" stroke="#16A34A" stroke-width="2"/>
  <text x="48" y="238" font-size="9.5" font-weight="700" fill="#15803D">Low THẬT</text>
  <line x1="44" y1="170" x2="234" y2="170" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="196" y="165" font-size="9" fill="#6B7280">EQ thật</text>
  <rect x="110" y="128" width="90" height="34" fill="none" stroke="#D97706" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="112" y="124" font-size="9" font-weight="700" fill="#D97706">range nhỏ ✗</text>
  <text x="40" y="258" font-size="10" fill="#374151">"discount" giả → thực ra Premium sâu</text>

  <!-- MIDDLE: wrong timeframe -->
  <rect x="266" y="70" width="230" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="278" y="93" font-size="12.5" font-weight="700" fill="#B91C1C">2. Sai timeframe</text>
  <rect x="286" y="112" width="86" height="20" rx="5" fill="#1D4ED8"/>
  <text x="329" y="126" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">D1: Premium</text>
  <rect x="286" y="140" width="86" height="20" rx="5" fill="#7C3AED"/>
  <text x="329" y="154" font-size="10" font-weight="700" fill="#FFFFFF" text-anchor="middle">M5: "Discount"</text>
  <line x1="382" y1="122" x2="470" y2="122" stroke="#DC2626" stroke-width="1.5"/>
  <line x1="382" y1="150" x2="470" y2="150" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="3 2"/>
  <text x="284" y="185" font-size="10" fill="#374151">Range M5 chỉ dùng execution,</text>
  <text x="284" y="200" font-size="10" fill="#374151">KHÔNG định nghĩa bias.</text>
  <text x="284" y="222" font-size="10" font-weight="700" fill="#B91C1C">Đo bias trên HTF range;</text>
  <text x="284" y="237" font-size="10" font-weight="700" fill="#B91C1C">giá đang premium D1 → không Long.</text>

  <!-- RIGHT: not re-drawing after external taken -->
  <rect x="508" y="70" width="228" height="200" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="520" y="93" font-size="12.5" font-weight="700" fill="#B91C1C">3. Không vẽ lại range</text>
  <line x1="528" y1="118" x2="720" y2="118" stroke="#DC2626" stroke-width="2" stroke-dasharray="6 4" opacity="0.6"/>
  <text x="532" y="113" font-size="9" fill="#6B7280">High cũ (đã bị lấy)</text>
  <path d="M540 150 L560 130 L580 105 L600 90 L620 78" fill="none" stroke="#374151" stroke-width="1.7"/>
  <polygon points="624,73 613,78 620,86" fill="#374151"/>
  <text x="596" y="72" font-size="9" font-weight="700" fill="#D97706">external bị lấy</text>
  <text x="524" y="196" font-size="10" fill="#374151">External bị quét → range CHẾT.</text>
  <text x="524" y="214" font-size="10" font-weight="700" fill="#B91C1C">Cập nhật range mới ngay,</text>
  <text x="524" y="229" font-size="10" font-weight="700" fill="#B91C1C">đừng đo draw trên range cũ.</text>

  <!-- BOTTOM: mistake table -->
  <rect x="24" y="286" width="712" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="310" font-size="14" font-weight="700" fill="#B45309">Các lỗi khác cần tránh</text>

  <circle cx="46" cy="336" r="4" fill="#DC2626"/>
  <text x="58" y="340" font-size="11" fill="#374151"><tspan font-weight="700">Lẫn internal với external:</tspan> đặt TP ở FVG bên trong thay vì BSL/SSL ở hai đầu</text>
  <circle cx="46" cy="362" r="4" fill="#DC2626"/>
  <text x="58" y="366" font-size="11" fill="#374151"><tspan font-weight="700">Mua/bán quanh equilibrium:</tspan> R:R kém, dễ chop, dễ bị quét hai phía → chờ</text>
  <circle cx="46" cy="388" r="4" fill="#DC2626"/>
  <text x="58" y="392" font-size="11" fill="#374151"><tspan font-weight="700">Bỏ qua draw on liquidity:</tspan> trade ngược phía external còn mở đang hút giá</text>
  <circle cx="46" cy="414" r="4" fill="#DC2626"/>
  <text x="58" y="418" font-size="11" fill="#374151"><tspan font-weight="700">Đầu range chưa quét stops:</tspan> chọn swing "đẹp" nhưng chưa lấy liquidity → dễ thủng</text>
  <circle cx="46" cy="440" r="4" fill="#DC2626"/>
  <text x="58" y="444" font-size="11" fill="#374151"><tspan font-weight="700">Đo OTE trên range sai:</tspan> vùng OTE 62–79% rơi vào nơi không có ý nghĩa</text>

  <text x="36" y="470" font-size="11" font-weight="700" fill="#15803D">→ Cách sửa chung: chọn hai đầu có displacement/BOS + đã quét liquidity, đúng timeframe, còn hiệu lực.</text>
</svg>
