<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Silver Bullet &amp; ICT Macro Times — phóng to bên trong NY AM Kill Zone</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Silver Bullet là 1 sub-window trong NY AM KZ; Macro là các cửa sổ ~20 phút còn nhỏ hơn nữa, lồng bên trong.</text>

  <rect x="24" y="70" width="712" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- Outer: NY AM KZ 07:00-10:00, scale x = 40 + (h-7)*220/3 -->
  <text x="40" y="95" font-size="11" font-weight="700" fill="#166534">NY AM Kill Zone (07:00 – 10:00 EST)</text>
  <rect x="40" y="100" width="660" height="24" rx="4" fill="#16A34A" opacity="0.15" stroke="#16A34A"/>
  <g font-size="9" fill="#166534">
    <text x="44" y="116">07:00</text>
    <text x="260" y="116">08:00</text>
    <text x="480" y="116">09:00</text>
    <text x="680" y="116">10:00</text>
  </g>

  <!-- Silver Bullet 10:00-11:00 is technically just past 10:00, but common teaching also shows it flush with KZ end; draw as zoomed inset separately -->
  <text x="40" y="150" font-size="10.5" fill="#6B7280">(Silver Bullet chính thức 10:00–11:00 nằm ngay sau khi NY AM KZ khép — xem khung phóng to bên dưới)</text>

  <!-- Zoomed Silver Bullet window 10:00-11:00, scale x = 40 + m*660/60 -->
  <text x="40" y="180" font-size="11" font-weight="700" fill="#92400E">Phóng to: Silver Bullet NY AM (10:00 – 11:00 EST)</text>
  <rect x="40" y="188" width="660" height="30" rx="4" fill="#F59E0B" opacity="0.22" stroke="#B45309"/>
  <g font-size="9" fill="#92400E">
    <text x="44" y="204">10:00</text>
    <text x="205" y="204">10:15</text>
    <text x="370" y="204">10:30</text>
    <text x="535" y="204">10:45</text>
    <text x="680" y="204">11:00</text>
  </g>

  <!-- ICT Macro windows nested: 09:50-10:10 and 10:50-11:10 relative to this axis start 10:00 -->
  <!-- 09:50-10:10 macro straddles the KZ boundary; show partial before 10:00 -->
  <rect x="0" y="230" width="76" height="26" rx="4" fill="#3B82F6" opacity="0.25" stroke="#3B82F6"/>
  <text x="38" y="272" font-size="8.5" fill="#1D4ED8" text-anchor="middle">Macro 09:50–10:10</text>
  <text x="38" y="282" font-size="8" fill="#1D4ED8" text-anchor="middle">(bắc cầu qua mốc 10:00)</text>

  <!-- 10:50-11:10 macro near the end -->
  <rect x="580" y="230" width="76" height="26" rx="4" fill="#3B82F6" opacity="0.25" stroke="#3B82F6"/>
  <text x="618" y="272" font-size="8.5" fill="#1D4ED8" text-anchor="middle">Macro 10:50–11:10</text>

  <!-- guide lines connecting macro to zoomed window -->
  <line x1="40" y1="218" x2="40" y2="230" stroke="#9CA3AF" stroke-dasharray="2,2"/>
  <line x1="76" y1="218" x2="76" y2="230" stroke="#9CA3AF" stroke-dasharray="2,2"/>
  <line x1="580" y1="218" x2="580" y2="230" stroke="#9CA3AF" stroke-dasharray="2,2"/>
  <line x1="656" y1="218" x2="656" y2="230" stroke="#9CA3AF" stroke-dasharray="2,2"/>

  <text x="380" y="298" font-size="9.5" fill="#6B7280" text-anchor="middle">Macro = ~20 phút cuối/đầu giờ, nơi ICT cho rằng thuật toán "khởi động" một nhịp giá mới</text>

  <!-- Nesting relationship table -->
  <rect x="24" y="318" width="712" height="70" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="334" font-size="11" font-weight="700" fill="#1F2937">Quan hệ lồng nhau: Kill Zone → Silver Bullet → Macro</text>
  <line x1="36" y1="342" x2="724" y2="342" stroke="#F3F4F6"/>
  <text x="42" y="358" font-size="10" fill="#374151">Cấp 1 — Kill Zone: NY AM 07:00–10:00 EST (cửa sổ giờ rộng nhất, ~3 giờ)</text>
  <text x="42" y="372" font-size="10" fill="#374151">Cấp 2 — Silver Bullet: 10:00–11:00 EST (cửa sổ 1 giờ, chọn lọc hơn, tìm FVG entry)</text>
  <text x="42" y="386" font-size="10" fill="#374151">Cấp 3 — Macro (~20 phút): 09:50–10:10, 10:50–11:10 EST — timing tinh chỉnh hẹp nhất bên trong</text>

  <!-- Bottom banner -->
  <rect x="24" y="398" width="712" height="30" rx="6" fill="#FEF3C7"/>
  <text x="38" y="418" font-size="10.5" font-weight="700" fill="#92400E">Macro không thay thế Kill Zone/Silver Bullet — chúng chỉ tinh chỉnh THỜI ĐIỂM vào lệnh trong khung đã chọn.</text>
</svg>
