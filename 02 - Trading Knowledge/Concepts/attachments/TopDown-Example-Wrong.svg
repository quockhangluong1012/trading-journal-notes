<svg viewBox="0 0 760 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="480" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="30" font-size="18" font-weight="700" fill="#1F2937">Ví dụ sai — Bottom-up, LTF ngược HTF</text>
  <text x="24" y="48" font-size="13" fill="#6B7280">Trader bắt đầu từ M1 (đẹp) rồi mới ngó lên Daily — sai chiều phân tích và ngược bias thật.</text>

  <!-- Big M1 panel dominates, wrong direction arrow going bottom -> up -->
  <rect x="24" y="64" width="480" height="340" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.8"/>
  <text x="40" y="86" font-size="13" font-weight="700" fill="#B91C1C">M1 — "setup đẹp" nhìn thấy trước</text>
  <rect x="40" y="96" width="448" height="280" fill="#DC2626" opacity="0.04"/>
  <path d="M60,340 L110,355 L150,330 L180,300 L220,270 L260,290 L300,240 L340,255 L380,200 L430,215 L470,160" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="220" cy="270" r="6" fill="#16A34A"/>
  <rect x="250" y="248" width="60" height="18" fill="#3B82F6" opacity="0.25"/>
  <text x="252" y="244" font-size="9.5" fill="#1D4ED8">MSS + FVG (trông rất đẹp)</text>
  <circle cx="300" cy="240" r="7" fill="none" stroke="#16A34A" stroke-width="2.5"/>
  <text x="308" y="235" font-size="10" font-weight="700" fill="#15803D">"Long" — entry vội</text>

  <!-- wrong direction arrow: bottom-up, LTF -> HTF, drawn as upward curved arrow labeled WRONG -->
  <path d="M470,380 C 250,430 60,410 40,320" fill="none" stroke="#DC2626" stroke-width="3" stroke-dasharray="3 4" marker-end="url(#arrW)"/>
  <text x="120" y="420" font-size="11" font-weight="700" fill="#B91C1C">HƯỚNG PHÂN TÍCH SAI: LTF → cố ép story lên HTF</text>
  <defs>
    <marker id="arrW" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 Z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- price continues down after the fake long, stop swept -->
  <path d="M470,160 L500,220 L520,260" fill="none" stroke="#DC2626" stroke-width="2.2" stroke-dasharray="4 3"/>
  <text x="420" y="140" font-size="9.5" fill="#B91C1C">giá tiếp tục giảm — SL bị quét</text>

  <!-- inset HTF Daily panel showing real bias -->
  <rect x="520" y="64" width="216" height="200" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1.8"/>
  <text x="532" y="84" font-size="12" font-weight="700" fill="#1D4ED8">Inset: Daily (bias thật)</text>
  <rect x="532" y="94" width="192" height="150" fill="#DC2626" opacity="0.06"/>
  <path d="M544,110 L580,130 L610,150 L640,175 L670,195 L700,215 L714,230" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="600" y="105" width="90" height="34" fill="#DC2626" opacity="0.15"/>
  <text x="604" y="100" font-size="9.5" fill="#B91C1C">premium</text>
  <text x="536" y="260" font-size="10.5" font-weight="700" fill="#B91C1C">Bias thật: BEARISH, giá ở premium</text>
  <line x1="714" y1="230" x2="732" y2="230" stroke="#DC2626" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="536" y="230" font-size="9" fill="#B91C1C">draw xuống sellside</text>

  <rect x="520" y="272" width="216" height="132" rx="8" fill="#FEF3C7"/>
  <text x="532" y="292" font-size="10.5" font-weight="700" fill="#92400E">"Setup M1 đẹp" thực ra chỉ là</text>
  <text x="532" y="308" font-size="10.5" font-weight="700" fill="#92400E">một pullback nội bộ bên trong</text>
  <text x="532" y="324" font-size="10.5" font-weight="700" fill="#92400E">nhịp giảm HTF — không phải</text>
  <text x="532" y="340" font-size="10.5" font-weight="700" fill="#92400E">tín hiệu đảo chiều.</text>
  <text x="532" y="364" font-size="10.5" font-weight="700" fill="#92400E">Bài học: luôn xác định bias</text>
  <text x="532" y="380" font-size="10.5" font-weight="700" fill="#92400E">HTF TRƯỚC khi xuống LTF.</text>

  <rect x="24" y="414" width="712" height="52" rx="6" fill="#FEE2E2"/>
  <text x="38" y="434" font-size="11" font-weight="700" fill="#B91C1C">Sai chiều gốc: bắt đầu từ LTF rồi ép câu chuyện lên HTF, thay vì HTF → Intermediate → LTF.</text>
  <text x="38" y="452" font-size="11" font-weight="700" fill="#B91C1C">Một entry LTF đẹp nhưng ngược bias HTF là một cái bẫy, không phải cơ hội.</text>
</svg>
