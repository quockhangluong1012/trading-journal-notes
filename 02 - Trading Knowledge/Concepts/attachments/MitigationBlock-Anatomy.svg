<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="420" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="17" font-weight="700" fill="#1F2937">Giải phẫu Mitigation Block — chú thích thành phần</text>
  <text x="24" y="54" font-size="12.5" fill="#6B7280">STL/STH · failure swing (higher low/lower high, KHÔNG sweep) · cụm nến ngược cuối = MB · điểm MSS · vùng retest</text>

  <rect x="24" y="70" width="712" height="280" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>

  <!-- STL level -->
  <line x1="100" y1="300" x2="540" y2="300" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="120" y="316" font-size="10" fill="#15803D">STL (đáy cũ) — GIỮ, không sweep</text>

  <!-- STL -->
  <path d="M55,215 L100,300 L160,185" fill="none" stroke="#374151" stroke-width="2.2"/>
  <text x="45" y="205" font-size="10" font-weight="700" fill="#374151">STL</text>

  <!-- STH -->
  <circle cx="170" cy="175" r="6" fill="none" stroke="#3B82F6" stroke-width="2"/>
  <line x1="170" y1="175" x2="510" y2="175" stroke="#3B82F6" stroke-width="1.3" stroke-dasharray="6 4"/>
  <text x="185" y="168" font-size="10" font-weight="700" fill="#1D4ED8">STH (đỉnh ngắn hạn)</text>

  <!-- OB cu -->
  <rect x="155" y="130" width="26" height="52" fill="#DC2626" opacity="0.5" rx="1"/>

  <!-- failure swing higher low -->
  <path d="M170,175 L230,275 L285,205" fill="none" stroke="#374151" stroke-width="2.2"/>
  <circle cx="230" cy="275" r="7" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="150" y="296" font-size="10" font-weight="700" fill="#15803D">failure swing = higher low (không phá STL)</text>

  <!-- MB zone (last opposite candle) -->
  <rect x="290" y="190" width="28" height="46" fill="#F59E0B" opacity="0.6" rx="1"/>
  <text x="322" y="212" font-size="10" font-weight="700" fill="#B45309">cụm nến ngược cuối = vùng MB</text>

  <!-- MSS point -->
  <path d="M285,205 L325,175 L345,192 L405,105" fill="none" stroke="#16A34A" stroke-width="2.6"/>
  <circle cx="360" cy="175" r="6" fill="none" stroke="#16A34A" stroke-width="2.4"/>
  <text x="370" y="130" font-size="10" font-weight="700" fill="#15803D">điểm MSS (phá STH bằng displacement)</text>

  <!-- retest zone -->
  <path d="M405,105 L440,160 L462,215 L490,180 L540,120" fill="none" stroke="#374151" stroke-width="2"/>
  <rect x="288" y="188" width="180" height="50" fill="#F59E0B" opacity="0.1"/>
  <text x="470" y="235" font-size="10" font-weight="700" fill="#B45309">vùng retest → điểm vào lệnh</text>

  <rect x="24" y="360" width="712" height="50" rx="6" fill="#FEF3C7"/>
  <text x="36" y="380" font-size="11.5" font-weight="700" fill="#92400E">Bearish MB đối xứng: STH/STL đảo lại, failure swing = lower high (không sweep BSL),</text>
  <text x="36" y="398" font-size="11" fill="#92400E">cụm nến TĂNG cuối = vùng MB (kháng cự), MSS phá STL, retest → Short.</text>
</svg>
