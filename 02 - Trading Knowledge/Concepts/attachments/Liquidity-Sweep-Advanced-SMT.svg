<svg viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="500" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">SMT Divergence — xác nhận sweep bằng thị trường tương quan</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">NQ quét đáy tạo lower low, ES từ chối quét (higher low) → "vết nứt" tương quan = sweep chất lượng cao</text>

  <!-- ===== Top: NQ makes lower low ===== -->
  <rect x="24" y="70" width="712" height="195" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="92" font-size="14" font-weight="700" fill="#B91C1C">NQ — quét SSL (lower low)</text>

  <!-- old low line -->
  <line x1="70" y1="200" x2="600" y2="200" stroke="#DC2626" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="604" y="204" font-size="11" fill="#B91C1C" font-weight="700">Old low (SSL)</text>

  <path d="M80 130 L120 176 L160 148 L205 200 L245 166 L290 228 L330 178 L370 150 L420 120 L470 138 L520 104"
        fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- sweep point -->
  <circle cx="290" cy="228" r="5" fill="#DC2626"/>
  <text x="252" y="250" font-size="11" fill="#B91C1C" font-weight="700">Lower low — quét stops</text>

  <!-- ===== Bottom: ES holds higher low ===== -->
  <rect x="24" y="285" width="712" height="195" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="36" y="307" font-size="14" font-weight="700" fill="#15803D">ES — từ chối quét (higher low) → SMT</text>

  <line x1="70" y1="420" x2="600" y2="420" stroke="#DC2626" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="604" y="424" font-size="11" fill="#B91C1C" font-weight="700">Old low (SSL)</text>

  <path d="M80 345 L120 392 L160 364 L205 420 L245 382 L290 404 L330 372 L370 348 L420 322 L470 338 L520 306"
        fill="none" stroke="#374151" stroke-width="2.2"/>
  <!-- higher low point -->
  <circle cx="290" cy="404" r="5" fill="#16A34A"/>
  <text x="252" y="446" font-size="11" fill="#15803D" font-weight="700">Higher low — KHÔNG phá đáy</text>

  <!-- divergence connector -->
  <line x1="290" y1="233" x2="290" y2="399" stroke="#7C3AED" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="306" y="252" width="240" height="52" rx="8" fill="#F3E8FF" stroke="#7C3AED"/>
  <text x="318" y="272" font-size="12" font-weight="700" fill="#6B21A8">SMT: một bên phá đáy, một bên không</text>
  <text x="318" y="290" font-size="11" fill="#6B21A8">→ cú phá là SWEEP, không phải break thật</text>
</svg>
