<svg viewBox="0 0 760 520" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="lsa" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6B7280"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="520" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Quy trình phân tích đa khung thời gian</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">4 câu: Pool nào bị quét? • Sweep hay Break? • Đúng POI/P/D/bias? • Đáy-đỉnh sweep &amp; target ở đâu?</text>

  <!-- D1/H4 -->
  <rect x="24" y="72" width="712" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="24" y="72" width="6" height="112" fill="#1D4ED8"/>
  <text x="44" y="98" font-size="14" font-weight="700" fill="#1D4ED8">D1 / H4 — Bias &amp; Narrative</text>
  <text x="44" y="122" font-size="12" fill="#374151">• Bias: Bullish / Bearish / Neutral</text>
  <text x="44" y="142" font-size="12" fill="#374151">• Pool liquidity HTF: PDH/PDL, PWH/PWL, equal H/L</text>
  <text x="44" y="162" font-size="12" fill="#374151">• Draw on liquidity: giá bị hút về pool nào?</text>
  <text x="410" y="122" font-size="12" fill="#374151">• Sweep phía ngược draw thường mở ra leg</text>
  <text x="410" y="142" font-size="12" fill="#374151">   đi về draw target</text>
  <line x1="380" y1="188" x2="380" y2="202" stroke="#6B7280" stroke-width="1.5" marker-end="url(#lsa)"/>

  <!-- H1/M15 -->
  <rect x="84" y="208" width="592" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="84" y="208" width="6" height="112" fill="#D97706"/>
  <text x="104" y="234" font-size="14" font-weight="700" fill="#D97706">H1 / M15 — POI &amp; Context</text>
  <text x="104" y="258" font-size="12" fill="#374151">• POI: FVG/OB nơi kỳ vọng sweep xảy ra</text>
  <text x="104" y="278" font-size="12" fill="#374151">• Loại pool: equal lows / đáy cũ / PDL — ghi mức</text>
  <text x="104" y="298" font-size="12" fill="#374151">• Chờ nến đóng: trong = sweep, ngoài = break</text>
  <text x="410" y="258" font-size="12" fill="#374151">• Đúng premium/discount &amp; đồng hướng bias?</text>
  <text x="410" y="278" font-size="12" fill="#374151">• Có pool đối diện làm target không?</text>
  <line x1="380" y1="324" x2="380" y2="338" stroke="#6B7280" stroke-width="1.5" marker-end="url(#lsa)"/>

  <!-- M5/M1 -->
  <rect x="144" y="344" width="472" height="112" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <rect x="144" y="344" width="6" height="112" fill="#16A34A"/>
  <text x="164" y="370" font-size="14" font-weight="700" fill="#16A34A">M5 / M1 — Confirmation &amp; Entry</text>
  <text x="164" y="394" font-size="12" fill="#374151">• Reclaim mức + MSS ngược hướng quét</text>
  <text x="164" y="414" font-size="12" fill="#374151">• Displacement để lại FVG → entry refined</text>
  <text x="164" y="434" font-size="12" fill="#374151">• Stop NGOÀI đáy/đỉnh sweep • TP = pool đối diện</text>

  <text x="44" y="484" font-size="12" font-weight="600" fill="#D97706">Đừng trade cú sweep — trade PHẢN ỨNG sau cú sweep. Vào ngay trên wick dễ bị double sweep.</text>
  <text x="44" y="502" font-size="11" fill="#6B7280">Luôn chờ reclaim + displacement; stop nằm ngoài cả vùng POI, không sát mép.</text>
</svg>
