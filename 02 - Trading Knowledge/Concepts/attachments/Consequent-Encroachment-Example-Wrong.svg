<svg viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect x="0" y="0" width="760" height="460" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
  <text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">CE sai — giá đóng nến XUYÊN qua CE (invalidation)</text>
  <text x="24" y="54" font-size="13" fill="#6B7280">Close vượt CE 50% = cảnh báo fill/invalid; cố giữ Long là sai</text>

  <defs><marker id="ard" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#DC2626"/></marker></defs>

  <!-- FVG zone -->
  <rect x="120" y="160" width="520" height="80" fill="#3B82F6" opacity="0.14"/>
  <line x1="120" y1="160" x2="640" y2="160" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="154" font-size="12" fill="#2563EB" font-weight="600">FVG High</text>
  <line x1="120" y1="240" x2="640" y2="240" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="256" font-size="12" fill="#2563EB" font-weight="600">FVG Low</text>

  <!-- CE midline -->
  <line x1="120" y1="200" x2="640" y2="200" stroke="#7C3AED" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="648" y="204" font-size="13" fill="#7C3AED" font-weight="700">CE (50%)</text>

  <!-- displacement up creating FVG -->
  <rect x="150" y="230" width="2" height="40" fill="#16A34A"/><rect x="144" y="238" width="14" height="22" fill="#16A34A" rx="1"/>
  <rect x="190" y="120" width="2" height="130" fill="#16A34A"/><rect x="184" y="128" width="14" height="105" fill="#16A34A" rx="1"/>
  <rect x="230" y="120" width="2" height="50" fill="#16A34A"/><rect x="224" y="125" width="14" height="38" fill="#16A34A" rx="1"/>

  <!-- price retraces and CLOSES through CE downward -->
  <rect x="280" y="135" width="2" height="45" fill="#DC2626"/><rect x="274" y="142" width="14" height="34" fill="#DC2626" rx="1"/>
  <rect x="315" y="160" width="2" height="50" fill="#DC2626"/><rect x="309" y="168" width="14" height="40" fill="#DC2626" rx="1"/>
  <!-- closes below CE -->
  <rect x="350" y="190" width="2" height="60" fill="#DC2626"/><rect x="344" y="208" width="14" height="40" fill="#DC2626" rx="1"/>
  <text x="362" y="222" font-size="12" fill="#DC2626" font-weight="600">⚠ Close dưới CE = invalidation</text>

  <!-- continue down filling and breaking -->
  <rect x="390" y="220" width="2" height="60" fill="#DC2626"/><rect x="384" y="232" width="14" height="44" fill="#DC2626" rx="1"/>
  <rect x="430" y="255" width="2" height="70" fill="#DC2626"/><rect x="424" y="268" width="14" height="52" fill="#DC2626" rx="1"/>
  <rect x="470" y="300" width="2" height="65" fill="#DC2626"/><rect x="464" y="312" width="14" height="48" fill="#DC2626" rx="1"/>

  <path d="M 410 250 L 450 300" stroke="#DC2626" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="300" y="350" font-size="13" fill="#DC2626" font-weight="600">Cố giữ Long sau khi CE bị xuyên → stop out</text>

  <text x="24" y="436" font-size="15" font-weight="700" fill="#DC2626">✗ Sai</text>
  <text x="64" y="436" font-size="12" fill="#374151">Đóng nến vượt CE = array hỏng; vẫn vào lệnh là dễ nhầm tai hại</text>
</svg>
