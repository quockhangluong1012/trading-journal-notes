<svg viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="330" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Hai bối cảnh: Reversal vs Continuation</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Cùng cấu trúc Breaker+FVG, khác vị trí trong narrative.</text>
<rect x="24" y="72" width="350" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="96" font-size="13" font-weight="700" fill="#1F2937">REVERSAL Unicorn</text><text x="40" y="126" font-size="11.5" fill="#374151">• Sau khi quét đỉnh/đáy LỚN (major H/L)</text><text x="40" y="152" font-size="11.5" fill="#374151">• Kỳ vọng đảo chiều xu hướng</text><text x="40" y="178" font-size="11.5" fill="#374151">• Breaker+FVG hình thành tại điểm đảo</text><text x="40" y="204" font-size="11.5" fill="#374151">• Rủi ro cao hơn — cần bias HTF ủng hộ mạnh</text><rect x="386" y="72" width="350" height="240" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="402" y="96" font-size="13" font-weight="700" fill="#1F2937">CONTINUATION Unicorn</text><text x="402" y="126" font-size="11.5" fill="#374151">• Sau pullback/inducement trong xu hướng</text><text x="402" y="152" font-size="11.5" fill="#374151">• Thuận hướng trend đang chạy</text><text x="402" y="178" font-size="11.5" fill="#374151">• Breaker+FVG hình thành sau nhịp hồi</text><text x="402" y="204" font-size="11.5" fill="#374151">• Xác suất cao, thuận dòng — ưu tiên</text>
</svg>
