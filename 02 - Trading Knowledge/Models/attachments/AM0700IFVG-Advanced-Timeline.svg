<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="300" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Thời điểm &amp; bối cảnh — Mô hình 07:00 AM (Lecture 2)</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Ngồi trước máy trước 07:00 NY. Đặc tính đầu tiên của AM-session: HỒI về range phiên London.</text>
<rect x="24" y="76" width="712" height="90" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><line x1="60" y1="130" x2="720" y2="130" stroke="#CBD5E1" stroke-width="2"/><circle cx="120" cy="130" r="5" fill="#1D4ED8"/><text x="120" y="118" font-size="11" fill="#1D4ED8" text-anchor="middle">07:00</text><rect x="120" y="122" width="70" height="16" fill="#FEF3C7" opacity="0.7"/><circle cx="320" cy="130" r="5" fill="#1D4ED8"/><text x="320" y="118" font-size="11" fill="#1D4ED8" text-anchor="middle">08:00</text><rect x="320" y="122" width="70" height="16" fill="#FEF3C7" opacity="0.7"/><circle cx="520" cy="130" r="5" fill="#1D4ED8"/><text x="520" y="118" font-size="11" fill="#1D4ED8" text-anchor="middle">09:00</text><rect x="520" y="122" width="70" height="16" fill="#FEF3C7" opacity="0.7"/><text x="60" y="158" font-size="10" fill="#B45309">30 phút đầu mỗi mốc (pre-session): kỳ vọng move NGƯỢC — xem sơ đồ riêng.</text><rect x="24" y="180" width="712" height="105" rx="6" fill="#F8FAFC" stroke="#E5E7EB"/><text x="40" y="206" font-size="11.5" fill="#374151">• Tham chiếu duy nhất từ trước 07:00: ĐỈNH &amp; ĐÁY phiên London (= draw on liquidity).</text><text x="40" y="226" font-size="11.5" fill="#374151">• Khung thời gian: 15m · 5m · 1m · (thêm) 15 giây cho entry tinh.</text><text x="40" y="246" font-size="11.5" fill="#374151">• Không dự đoán — CHỜ giá tự in relative equal highs/lows trên 5m/1m.</text><text x="40" y="266" font-size="11.5" fill="#374151">• Đặc tính AM: giá hồi lại vào trong range London trước khi quét relative equal.</text>
</svg>
