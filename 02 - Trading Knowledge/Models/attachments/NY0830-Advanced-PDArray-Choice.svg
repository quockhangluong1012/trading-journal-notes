<svg viewBox="0 0 760 250" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="250" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chọn PD array sau MSS — lấy vùng ĐẦU TIÊN</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Ba lựa chọn để lại bởi displacement: Order Block · BISI/SIBI (FVG) · Breaker Block.</text>
<rect x="30" y="90" width="228" height="130" rx="8" fill="#FFFFFF" stroke="#7C3AED" stroke-width="1.5"/><text x="44" y="118" font-size="13" font-weight="700" fill="#7C3AED">Order Block</text><text x="44" y="144" font-size="11" fill="#374151">Nến đối màu cuối trước</text><text x="44" y="162" font-size="11" fill="#374151">displacement</text><rect x="268" y="90" width="228" height="130" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.5"/><text x="282" y="118" font-size="13" font-weight="700" fill="#1D4ED8">BISI / SIBI (FVG)</text><text x="282" y="144" font-size="11" fill="#374151">Khe mất cân bằng trong chân</text><text x="282" y="162" font-size="11" fill="#374151">đẩy</text><rect x="506" y="90" width="228" height="130" rx="8" fill="#FFFFFF" stroke="#B45309" stroke-width="1.5"/><text x="520" y="118" font-size="13" font-weight="700" fill="#B45309">Breaker Block</text><text x="520" y="144" font-size="11" fill="#374151">Nến đối màu sau khi phá</text><text x="520" y="162" font-size="11" fill="#374151">swing</text><text x="30" y="238" font-size="11" fill="#DC2626">Nguyên tắc: vào PD array ĐẦU TIÊN chạm sau MSS — chờ retrace sâu nhất thường lỡ lệnh.</text>
</svg>
