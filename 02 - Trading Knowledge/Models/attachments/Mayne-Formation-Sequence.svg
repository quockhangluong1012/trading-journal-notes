<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="300" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Mayne Model — Chuỗi hình thành (6 bước)</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Quy trình top-down: từ HTF structure đến entry LTF có xác nhận.</text><rect x="40" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/><circle cx="56" cy="128" r="11" fill="#16A34A"/><text x="56" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="48" y="150" font-size="11.5" font-weight="700" fill="#1F2937">HTF Structure</text><text x="48" y="165" font-size="11.5" font-weight="700" fill="#1F2937">+ Bias</text><text x="48" y="182" font-size="9.3" fill="#6B7280">D1/H4: HH-HL hay LH-LL</text><text x="48" y="194" font-size="9.3" fill="#6B7280">→ hướng &amp; DOL</text><text x="147" y="175" font-size="16" fill="#9CA3AF">→</text><rect x="158" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#3B82F6" stroke-width="2"/><circle cx="174" cy="128" r="11" fill="#3B82F6"/><text x="174" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="166" y="150" font-size="11.5" font-weight="700" fill="#1F2937">Chờ Pullback</text><text x="166" y="167" font-size="9.3" fill="#6B7280">Giá hồi về Discount (long)</text><text x="166" y="179" font-size="9.3" fill="#6B7280">/ Premium (short)</text><text x="265" y="175" font-size="16" fill="#9CA3AF">→</text><rect x="276" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/><circle cx="292" cy="128" r="11" fill="#F59E0B"/><text x="292" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="284" y="150" font-size="11.5" font-weight="700" fill="#1F2937">POI</text><text x="284" y="167" font-size="9.3" fill="#6B7280">OB / FVG thuận</text><text x="284" y="179" font-size="9.3" fill="#6B7280">cấu trúc tại vùng hồi</text><text x="383" y="175" font-size="16" fill="#9CA3AF">→</text><rect x="394" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2"/><circle cx="410" cy="128" r="11" fill="#8B5CF6"/><text x="410" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">4</text><text x="402" y="150" font-size="11.5" font-weight="700" fill="#1F2937">OTE Fib</text><text x="402" y="167" font-size="9.3" fill="#6B7280">Vẽ 62–79% (0.705 CE)</text><text x="402" y="179" font-size="9.3" fill="#6B7280">chồng lên POI</text><text x="501" y="175" font-size="16" fill="#9CA3AF">→</text><rect x="512" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="2"/><circle cx="528" cy="128" r="11" fill="#DC2626"/><text x="528" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">5</text><text x="520" y="150" font-size="11.5" font-weight="700" fill="#1F2937">Sweep + LTF</text><text x="520" y="165" font-size="11.5" font-weight="700" fill="#1F2937">Confirmation</text><text x="520" y="182" font-size="9.3" fill="#6B7280">Quét STL/STH → MSS/</text><text x="520" y="194" font-size="9.3" fill="#6B7280">breaker/CHoCH khung nhỏ</text><text x="619" y="175" font-size="16" fill="#9CA3AF">→</text><rect x="630" y="110" width="106" height="120" rx="8" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="2"/><circle cx="646" cy="128" r="11" fill="#0EA5E9"/><text x="646" y="132" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">6</text><text x="638" y="150" font-size="11.5" font-weight="700" fill="#1F2937">Entry / Stop /</text><text x="638" y="165" font-size="11.5" font-weight="700" fill="#1F2937">Target</text><text x="638" y="182" font-size="9.3" fill="#6B7280">Vào lệnh, stop ngoài sweep,</text><text x="638" y="194" font-size="9.3" fill="#6B7280">target = opposing liquidity</text><text x="40" y="270" font-size="10.5" fill="#6B7280">Nguyên tắc: không bỏ bước — thiếu bước 1/2 = chạy theo; thiếu 5 = vào mù không có xác nhận rủi ro.</text></svg>
