<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Stop &amp; quản trị lệnh — Bullish Unicorn</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Stop theo cấu trúc (ngoài wick sweep / cạnh xa Breaker), không theo con số cố định.</text>
<line x1="90" y1="120" x2="700" y2="120" stroke="#94A3B8" stroke-dasharray="5 4"/>
<text x="705" y="124" font-size="10" fill="#64748B">ERL (T2)</text>
<line x1="90" y1="175" x2="700" y2="175" stroke="#94A3B8" stroke-dasharray="5 4"/>
<text x="705" y="179" font-size="10" fill="#64748B">IRL (T1)</text>
<rect x="120" y="205" width="470" height="40" fill="#7C3AED" opacity="0.16" stroke="#6D28D9" stroke-dasharray="4 3"/>
<text x="130" y="222" font-size="10.5" font-weight="700" fill="#5B21B6">Vùng Unicorn — limit tại 50% CE</text>
<line x1="120" y1="225" x2="590" y2="225" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="2 2"/>
<text x="596" y="229" font-size="10" fill="#5B21B6">Entry (CE)</text>
<line x1="90" y1="300" x2="700" y2="300" stroke="#DC2626" stroke-width="1.5"/>
<text x="90" y="316" font-size="10.5" fill="#B91C1C">Đáy wick cú sweep (SSL) — STOP ở NGAY DƯỚI đây</text>
<path d="M110 295 L110 265" stroke="#DC2626" stroke-width="2"/>
<rect x="104" y="270" width="12" height="20" fill="#DC2626"/>
<path d="M150 300 Q250 300 300 225 T480 180 T590 130" stroke="#10B981" stroke-width="2.5" fill="none"/>
<circle cx="150" cy="300" r="4" fill="#DC2626"/>
<text x="160" y="345" font-size="11" fill="#374151">1) Sweep SSL (wick) → 2) displacement + MSS → 3) hồi về CE (entry)</text>
<text x="160" y="365" font-size="11" fill="#374151">→ 4) T1 = IRL, dời BE → 5) chạy T2 = ERL. RR lớn nhờ stop chặt.</text>
</svg>
