  <path d="M 60,130 L 140,160 L 220,150 L 300,190 L 380,175 L 460,230 L 540,210 L 620,280 L 690,350" fill="none" stroke="#DC2626" stroke-width="2.6"/>
  <circle cx="60" cy="130" r="6" fill="#DC2626"/>
