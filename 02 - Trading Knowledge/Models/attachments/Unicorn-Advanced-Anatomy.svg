<svg viewBox="0 0 760 430" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="430" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Giải phẫu Unicorn — Breaker + FVG CHỒNG LẤN</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Vùng Unicorn = phần giao nhau của Breaker Block và FVG. Chồng lấn kép = mạnh gấp đôi.</text>
<rect x="24" y="70" width="470" height="345" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><rect x="150" y="150" width="300" height="90" fill="#F59E0B" opacity="0.18"/><text x="150" y="144" font-size="11" font-weight="700" fill="#B45309">Breaker Block (hỗ trợ/kháng cự cấu trúc)</text><rect x="150" y="205" width="300" height="70" fill="#3B82F6" opacity="0.16"/><text x="150" y="292" font-size="11" font-weight="700" fill="#1D4ED8">FVG (mất cân bằng cần lấp)</text><rect x="150" y="205" width="300" height="35" fill="#7C3AED" opacity="0.30" stroke="#6D28D9" stroke-dasharray="4 3"/><text x="300" y="226" font-size="12" font-weight="700" fill="#5B21B6" text-anchor="middle">VÙNG UNICORN</text><rect x="66" y="300" width="2" height="40" fill="#DC2626"/><rect x="60" y="310" width="13" height="25" fill="#DC2626" rx="1"/><rect x="88" y="292" width="2" height="42" fill="#DC2626"/><rect x="82" y="302" width="13" height="27" fill="#DC2626" rx="1"/><rect x="110" y="284" width="2" height="44" fill="#DC2626"/><rect x="104" y="294" width="13" height="29" fill="#DC2626" rx="1"/><rect x="510" y="70" width="226" height="345" rx="8" fill="#F8FAFC" stroke="#E5E7EB"/><text x="524" y="96" font-size="13" font-weight="700" fill="#334155">Vì sao mạnh gấp đôi</text><text x="524" y="122" font-size="11" fill="#374151">① Áp lực lấp imbalance (FVG</text><text x="524" y="144" font-size="11" fill="#374151">   phải được rebalance)</text><text x="524" y="166" font-size="11" fill="#374151"></text><text x="524" y="188" font-size="11" fill="#374151">② Hỗ trợ/kháng cự cấu trúc</text><text x="524" y="210" font-size="11" fill="#374151">   (Breaker = OB thất bại)</text><text x="524" y="232" font-size="11" fill="#374151"></text><text x="524" y="254" font-size="11" fill="#374151">→ Hai lực cùng điểm giá =</text><text x="524" y="276" font-size="11" fill="#374151">   xác suất phản ứng cao hơn</text><text x="524" y="298" font-size="11" fill="#374151">   hẳn FVG đơn hay Breaker đơn.</text><text x="524" y="320" font-size="11" fill="#374151"></text><text x="524" y="342" font-size="11" fill="#374151">Bắt buộc: hai vùng phải</text><text x="524" y="364" font-size="11" fill="#374151">THỰC SỰ chồng lấn giá.</text>
</svg>
