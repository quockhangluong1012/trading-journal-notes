<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ ĐÚNG — Structure + OTE + confirmation</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Thuận HTF bias, hồi về discount, OTE chồng OB, sweep STL, MSS khung nhỏ trước khi vào.</text><rect x="24" y="70" width="712" height="315" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><rect x="69" y="300" width="2" height="40" fill="#16A34A"/><rect x="65" y="305" width="11" height="30" fill="#16A34A" rx="1"/><rect x="91" y="280" width="2" height="40" fill="#16A34A"/><rect x="87" y="285" width="11" height="30" fill="#16A34A" rx="1"/><rect x="113" y="255" width="2" height="45" fill="#16A34A"/><rect x="109" y="260" width="11" height="35" fill="#16A34A" rx="1"/><rect x="135" y="230" width="2" height="45" fill="#16A34A"/><rect x="131" y="235" width="11" height="35" fill="#16A34A" rx="1"/><rect x="157" y="205" width="2" height="45" fill="#16A34A"/><rect x="153" y="210" width="11" height="35" fill="#16A34A" rx="1"/><text x="120" y="200" font-size="10" fill="#15803D">HTF displacement lên (bias bullish)</text><line x1="180" y1="205" x2="720" y2="205" stroke="#0EA5E9" stroke-dasharray="6 4" stroke-width="1"/><text x="560" y="198" font-size="10" fill="#0369A1">Target = BSL / prior high</text><rect x="194" y="250" width="150" height="50" fill="#8B5CF6" opacity="0.16"/><text x="350" y="252" font-size="9.5" fill="#6D28D9" font-weight="700">OTE 62–79%</text><rect x="194" y="254" width="150" height="22" fill="#F59E0B" opacity="0.22"/><text x="350" y="290" font-size="9.5" fill="#B45309">OB (POI)</text><rect x="199" y="215" width="2" height="50" fill="#DC2626"/><rect x="195" y="220" width="11" height="40" fill="#DC2626" rx="1"/><rect x="219" y="230" width="2" height="55" fill="#DC2626"/><rect x="215" y="235" width="11" height="45" fill="#DC2626" rx="1"/><rect x="239" y="245" width="2" height="70" fill="#DC2626"/><rect x="235" y="250" width="11" height="35" fill="#DC2626" rx="1"/><line x1="194" y1="312" x2="320" y2="312" stroke="#DC2626" stroke-dasharray="5 3" stroke-width="1"/><text x="198" y="326" font-size="9.5" fill="#DC2626">sweep STL (SSL)</text><rect x="269" y="255" width="2" height="45" fill="#16A34A"/><rect x="265" y="295" width="11" height="3" fill="#16A34A" rx="1"/><text x="282" y="250" font-size="9.5" fill="#15803D" font-weight="700">MSS khung nhỏ</text><circle cx="270" cy="272" r="5" fill="#16A34A"/><text x="282" y="290" font-size="10" fill="#15803D" font-weight="700">LONG</text><line x1="194" y1="330" x2="320" y2="330" stroke="#B91C1C" stroke-dasharray="4 3" stroke-width="1"/><text x="198" y="344" font-size="9.5" fill="#B91C1C">Stop dưới đáy sweep</text><rect x="339" y="240" width="2" height="35" fill="#16A34A"/><rect x="335" y="245" width="11" height="25" fill="#16A34A" rx="1"/><rect x="361" y="215" width="2" height="40" fill="#16A34A"/><rect x="357" y="220" width="11" height="30" fill="#16A34A" rx="1"/><rect x="383" y="200" width="2" height="35" fill="#16A34A"/><rect x="379" y="205" width="11" height="10" fill="#16A34A" rx="1"/><text x="560" y="300" font-size="10" fill="#15803D">RR lớn: stop chặt (sau sweep) → target BSL xa</text></svg>
