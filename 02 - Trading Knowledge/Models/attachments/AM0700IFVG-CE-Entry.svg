<svg viewBox="0 0 760 410" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="410" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Entry 50% CE của IFVG + Stop + Fib -2/-2.5 (Bearish)</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Vào tại giữa IFVG; stop trên swing post-07:00; chốt bậc thang Fib.</text>
<line x1="90" y1="92" x2="620" y2="92" stroke="#DC2626" stroke-width="1.5"/>
<text x="90" y="86" font-size="10.5" fill="#B91C1C">Swing high post-07:00 hunt — STOP ngay trên</text>
<path d="M120 96 L120 118" stroke="#DC2626" stroke-width="2"/><rect x="114" y="96" width="12" height="16" fill="#DC2626"/>
<rect x="150" y="120" width="330" height="40" fill="#DC2626" opacity="0.14" stroke="#DC2626" stroke-dasharray="3 2"/>
<text x="160" y="136" font-size="10.5" font-weight="700" fill="#B91C1C">IFVG (FVG đầu tiên trước hunt, đã đảo vai)</text>
<line x1="150" y1="140" x2="480" y2="140" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="2 2"/>
<text x="486" y="144" font-size="10" fill="#5B21B6">Entry = 50% CE</text>
<path d="M150 110 Q250 108 300 140 Q360 175 420 220 T600 330" stroke="#DC2626" stroke-width="2.5" fill="none"/>
<rect x="640" y="88" width="96" height="300" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="688" y="106" font-size="10.5" font-weight="700" fill="#334155" text-anchor="middle">Fib</text>
<text x="648" y="130" font-size="10" fill="#6B7280">0 (swing high)</text>
<line x1="640" y1="140" x2="736" y2="140" stroke="#94A3B8" stroke-dasharray="3 2"/>
<text x="648" y="176" font-size="10" fill="#6B7280">0.5 (CE)</text>
<text x="648" y="230" font-size="10" fill="#6B7280">1.0 (open 07:00)</text>
<line x1="640" y1="235" x2="736" y2="235" stroke="#94A3B8" stroke-dasharray="3 2"/>
<text x="648" y="300" font-size="10.5" font-weight="700" fill="#047857">-2 (T1)</text>
<line x1="140" y1="300" x2="736" y2="300" stroke="#10B981" stroke-dasharray="5 4"/>
<text x="648" y="360" font-size="10.5" font-weight="700" fill="#047857">-2.5 (T2)</text>
<line x1="140" y1="360" x2="736" y2="360" stroke="#10B981" stroke-dasharray="5 4"/>
<text x="150" y="392" font-size="11" fill="#374151">Chốt bậc thang: một phần tại -2 (dời BE), phần còn lại tại -2.5. Đóng hết tại -2 = bỏ lỡ phần lớn move.</text>
