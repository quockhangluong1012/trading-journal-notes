<text x="24" y="54" font-size="13" fill="#6B7280">Sau 07:00, 08:00 và 09:00, trong 30 phút đầu (pre-session range) giá thường đi NGƯỢC bias.</text>
<rect x="24" y="72" width="712" height="160" rx="8" fill="#FFFFFF" stroke="#FEF3C7"/><text x="180" y="110" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">07:00 +30′</text><rect x="110" y="120" width="140" height="70" rx="6" fill="#FEF9C3" stroke="#FDE68A"/><path d="M125,140 L160,170 L190,150 L225,178" fill="none" stroke="#DC2626" stroke-width="2"/><text x="180" y="205" font-size="9.5" fill="#92400E" text-anchor="middle">move ngược để hunt TK</text><text x="380" y="110" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">08:00 +30′</text><rect x="310" y="120" width="140" height="70" rx="6" fill="#FEF9C3" stroke="#FDE68A"/><path d="M325,140 L360,170 L390,150 L425,178" fill="none" stroke="#DC2626" stroke-width="2"/><text x="380" y="205" font-size="9.5" fill="#92400E" text-anchor="middle">move ngược để hunt TK</text><text x="580" y="110" font-size="12" font-weight="700" fill="#B45309" text-anchor="middle">09:00 +30′</text><rect x="510" y="120" width="140" height="70" rx="6" fill="#FEF9C3" stroke="#FDE68A"/><path d="M525,140 L560,170 L590,150 L625,178" fill="none" stroke="#DC2626" stroke-width="2"/><text x="580" y="205" font-size="9.5" fill="#92400E" text-anchor="middle">move ngược để hunt TK</text><text x="40" y="222" font-size="10.5" fill="#374151">Ví dụ: bias bullish nhưng 30 phút đầu giá đi bearish để quét thanh khoản trước khi đảo.</text>
