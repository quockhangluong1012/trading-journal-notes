<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="340" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Chuỗi hình thành Unicorn</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Bias → quét thanh khoản → displacement/MSS → Breaker + FVG chồng lấn → hồi về vào lệnh.</text>
<rect x="30" y="100" width="132" height="170" rx="8" fill="#FFFFFF" stroke="#334155" stroke-width="1.5"/><text x="40" y="128" font-size="11.5" font-weight="700" fill="#334155">① Bias + P/D</text><text x="40" y="150" font-size="10" fill="#374151">HTF bias rõ, giá ở</text><text x="40" y="165" font-size="10" fill="#374151">đúng</text><text x="40" y="180" font-size="10" fill="#374151">premium/discount</text><text x="164" y="190" font-size="16" fill="#94A3B8">→</text><rect x="175" y="100" width="132" height="170" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5"/><text x="185" y="128" font-size="11.5" font-weight="700" fill="#DC2626">② Quét TK</text><text x="185" y="150" font-size="10" fill="#374151">Sweep đỉnh/đáy</text><text x="185" y="165" font-size="10" fill="#374151">(inducement / stop</text><text x="185" y="180" font-size="10" fill="#374151">hunt)</text><text x="309" y="190" font-size="16" fill="#94A3B8">→</text><rect x="320" y="100" width="132" height="170" rx="8" fill="#FFFFFF" stroke="#1D4ED8" stroke-width="1.5"/><text x="330" y="128" font-size="11.5" font-weight="700" fill="#1D4ED8">③ Displacement + MSS</text><text x="330" y="150" font-size="10" fill="#374151">Đẩy mạnh phá cấu</text><text x="330" y="165" font-size="10" fill="#374151">trúc → để lại FVG +</text><text x="330" y="180" font-size="10" fill="#374151">tạo Breaker</text><text x="454" y="190" font-size="16" fill="#94A3B8">→</text><rect x="465" y="100" width="132" height="170" rx="8" fill="#FFFFFF" stroke="#6D28D9" stroke-width="1.5"/><text x="475" y="128" font-size="11.5" font-weight="700" fill="#6D28D9">④ Chồng lấn</text><text x="475" y="150" font-size="10" fill="#374151">FVG nằm trong</text><text x="475" y="165" font-size="10" fill="#374151">Breaker = Unicorn</text><text x="475" y="180" font-size="10" fill="#374151">zone</text><text x="599" y="190" font-size="16" fill="#94A3B8">→</text><rect x="610" y="100" width="132" height="170" rx="8" fill="#FFFFFF" stroke="#15803D" stroke-width="1.5"/><text x="620" y="128" font-size="11.5" font-weight="700" fill="#15803D">⑤ Retrace entry</text><text x="620" y="150" font-size="10" fill="#374151">Chờ hồi về vùng,</text><text x="620" y="165" font-size="10" fill="#374151">KHÔNG vào lúc MSS</text>
</svg>
