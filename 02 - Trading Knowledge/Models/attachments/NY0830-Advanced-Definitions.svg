<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="360" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Định nghĩa chủ chốt (Lecture 1)</text>
<text x="24" y="54" font-size="13" fill="#6B7280">Relative Equal High/Low · Breaker Block · BISI (FVG tăng) · SIBI (FVG giảm).</text>
<rect x="24" y="72" width="350" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="94" font-size="12" font-weight="700" fill="#1F2937">Relative Equal High</text><text x="40" y="110" font-size="9.5" fill="#6B7280">Đỉnh có một swing high THẤP HƠN ở bên phải (swing failure).</text><line x1="60" y1="130" x2="330" y2="130" stroke="#6B7280" stroke-dasharray="5 3"/><rect x="95" y="120" width="2" height="30" fill="#16A34A"/><rect x="90" y="128" width="12" height="17" fill="#16A34A" rx="1"/><rect x="155" y="118" width="2" height="32" fill="#16A34A"/><rect x="150" y="126" width="12" height="19" fill="#16A34A" rx="1"/><rect x="235" y="132" width="2" height="33" fill="#16A34A"/><rect x="230" y="140" width="12" height="20" fill="#16A34A" rx="1"/><text x="228" y="128" font-size="9" fill="#DC2626">thấp hơn</text><rect x="386" y="72" width="350" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="402" y="94" font-size="12" font-weight="700" fill="#B45309">Breaker Block</text><text x="402" y="110" font-size="9.5" fill="#6B7280">Nến đối màu cuối trước cú quét+phá cấu trúc; nến cuối nhạy nhất.</text><rect x="500" y="120" width="120" height="30" fill="#F59E0B" opacity="0.2"/><rect x="435" y="140" width="2" height="35" fill="#DC2626"/><rect x="430" y="150" width="12" height="20" fill="#DC2626" rx="1"/><rect x="455" y="136" width="2" height="35" fill="#DC2626"/><rect x="450" y="146" width="12" height="20" fill="#DC2626" rx="1"/><rect x="475" y="132" width="2" height="35" fill="#DC2626"/><rect x="470" y="142" width="12" height="20" fill="#DC2626" rx="1"/><rect x="495" y="120" width="2" height="55" fill="#16A34A"/><rect x="490" y="132" width="12" height="36" fill="#16A34A" rx="1"/><rect x="515" y="120" width="2" height="55" fill="#16A34A"/><rect x="510" y="132" width="12" height="36" fill="#16A34A" rx="1"/><rect x="535" y="120" width="2" height="55" fill="#16A34A"/><rect x="530" y="132" width="12" height="36" fill="#16A34A" rx="1"/><rect x="24" y="216" width="350" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="238" font-size="12" font-weight="700" fill="#15803D">BISI = FVG tăng (up-closed)</text><rect x="120" y="270" width="150" height="26" fill="#3B82F6" opacity="0.16"/><rect x="95" y="258" width="2" height="62" fill="#16A34A"/><rect x="90" y="270" width="12" height="40" fill="#16A34A" rx="1"/><rect x="145" y="250" width="2" height="50" fill="#16A34A"/><rect x="140" y="262" width="12" height="30" fill="#16A34A" rx="1"/><rect x="195" y="240" width="2" height="50" fill="#16A34A"/><rect x="190" y="252" width="12" height="30" fill="#16A34A" rx="1"/><rect x="386" y="216" width="350" height="130" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="402" y="238" font-size="12" font-weight="700" fill="#B91C1C">SIBI = FVG giảm (down-closed)</text><rect x="482" y="272" width="150" height="26" fill="#3B82F6" opacity="0.16"/><rect x="457" y="250" width="2" height="62" fill="#DC2626"/><rect x="452" y="262" width="12" height="38" fill="#DC2626" rx="1"/><rect x="507" y="260" width="2" height="62" fill="#DC2626"/><rect x="502" y="272" width="12" height="40" fill="#DC2626" rx="1"/><rect x="557" y="270" width="2" height="62" fill="#DC2626"/><rect x="552" y="282" width="12" height="40" fill="#DC2626" rx="1"/>
</svg>
