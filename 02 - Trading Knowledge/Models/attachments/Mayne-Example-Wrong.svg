<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Ví dụ SAI / dễ nhầm</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Ba lỗi điển hình: (a) vào giữa range không OTE, (b) ngược HTF bias, (c) vào mù không chờ confirmation.</text><rect x="24" y="70" width="712" height="315" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="96" font-size="10.5" fill="#B91C1C" font-weight="700">(a) Vào giữa range — không đợi OTE/discount</text><line x1="60" y1="110" x2="260" y2="110" stroke="#9CA3AF" stroke-dasharray="4 3" stroke-width="1"/><text x="60" y="106" font-size="8" fill="#6B7280">high</text><line x1="60" y1="230" x2="260" y2="230" stroke="#9CA3AF" stroke-dasharray="4 3" stroke-width="1"/><text x="60" y="244" font-size="8" fill="#6B7280">low</text><line x1="60" y1="170" x2="260" y2="170" stroke="#9CA3AF" stroke-dasharray="3 3" stroke-width="1"/><text x="200" y="166" font-size="8.5" fill="#6B7280">EQ 50%</text><circle cx="160" cy="165" r="5" fill="#DC2626"/><text x="120" y="155" font-size="9" fill="#B91C1C">BUY quá sớm (premium)</text><text x="60" y="270" font-size="9" fill="#6B7280">→ stop xa, RR kém, dễ bị hồi sâu quét.</text><text x="285" y="96" font-size="10.5" fill="#B91C1C" font-weight="700">(b) Ngược HTF bias</text><line x1="300" y1="130" x2="340" y2="180" stroke="#DC2626" stroke-width="2"/><line x1="340" y1="180" x2="380" y2="240" stroke="#DC2626" stroke-width="2"/><text x="300" y="120" font-size="9" fill="#B91C1C">HTF downtrend</text><circle cx="360" cy="210" r="5" fill="#16A34A"/><text x="368" y="208" font-size="9" fill="#B91C1C">BUY ngược dòng</text><text x="285" y="270" font-size="9" fill="#6B7280">→ OTE đẹp nhưng ngược DOL = bẫy.</text><text x="520" y="96" font-size="10.5" fill="#B91C1C" font-weight="700">(c) Vào mù, không confirmation</text><rect x="520" y="150" width="150" height="50" fill="#8B5CF6" opacity="0.16"/><text x="560" y="146" font-size="9" fill="#6D28D9">OTE</text><rect x="539" y="140" width="2" height="55" fill="#DC2626"/><rect x="535" y="145" width="11" height="45" fill="#DC2626" rx="1"/><rect x="559" y="150" width="2" height="60" fill="#DC2626"/><rect x="555" y="155" width="11" height="50" fill="#DC2626" rx="1"/><rect x="579" y="160" width="2" height="75" fill="#DC2626"/><rect x="575" y="165" width="11" height="45" fill="#DC2626" rx="1"/><circle cx="560" cy="180" r="5" fill="#16A34A"/><text x="568" y="178" font-size="9" fill="#B91C1C">BUY limit mù</text><text x="520" y="270" font-size="9" fill="#6B7280">→ không chờ MSS/breaker LTF → dao rơi.</text><rect x="40" y="300" width="680" height="60" fill="#F59E0B" opacity="0.1"/><text x="52" y="322" font-size="9.8" fill="#B45309">Bài học: OTE chỉ hợp lệ khi (1) thuận HTF bias &amp; DOL, (2) nằm ở đúng P/D, (3) chồng POI thật,</text><text x="52" y="340" font-size="9.8" fill="#B45309">(4) có sweep + xác nhận cấu trúc khung nhỏ. Thiếu một điều kiện = hạ cấp hoặc bỏ.</text></svg>
