<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="360" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">IFVG — FVG bị đảo vai sau MSS (Inversion FVG)</text>
<text x="24" y="54" font-size="13" fill="#6B7280">'Specific': FVG ĐẦU TIÊN ngay trước cú stop-hunt là IFVG nhạy nhất. Vào tại 50% CE của nó.</text>
<rect x="24" y="72" width="350" height="270" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="40" y="96" font-size="12" font-weight="700" fill="#1F2937">① FVG tăng (BISI) trước stop-hunt</text><rect x="120" y="150" width="150" height="30" fill="#3B82F6" opacity="0.18"/><rect x="75" y="150" width="2" height="70" fill="#16A34A"/><rect x="70" y="160" width="12" height="55" fill="#16A34A" rx="1"/><rect x="99" y="158" width="2" height="68" fill="#16A34A"/><rect x="94" y="168" width="12" height="53" fill="#16A34A" rx="1"/><rect x="123" y="166" width="2" height="66" fill="#16A34A"/><rect x="118" y="176" width="12" height="51" fill="#16A34A" rx="1"/><text x="60" y="300" font-size="10.5" fill="#4B5563">Là support khi giá tăng...</text><rect x="386" y="72" width="350" height="270" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><text x="402" y="96" font-size="12" font-weight="700" fill="#B91C1C">② Sau MSS, giá đóng XUYÊN qua nó</text><rect x="500" y="150" width="150" height="30" fill="#DC2626" opacity="0.18" stroke="#DC2626" stroke-dasharray="4 3"/><text x="500" y="145" font-size="10" font-weight="700" fill="#B91C1C">→ trở thành IFVG (kháng cự)</text><rect x="435" y="150" width="2" height="65" fill="#16A34A"/><rect x="430" y="160" width="12" height="50" fill="#16A34A" rx="1"/><rect x="459" y="158" width="2" height="63" fill="#16A34A"/><rect x="454" y="168" width="12" height="48" fill="#16A34A" rx="1"/><rect x="483" y="175" width="2" height="80" fill="#DC2626"/><rect x="478" y="186" width="12" height="64" fill="#DC2626" rx="1"/><rect x="507" y="195" width="2" height="82" fill="#DC2626"/><rect x="502" y="206" width="12" height="66" fill="#DC2626" rx="1"/><rect x="531" y="215" width="2" height="84" fill="#DC2626"/><rect x="526" y="226" width="12" height="68" fill="#DC2626" rx="1"/><line x1="500" y1="165" x2="650" y2="165" stroke="#B91C1C" stroke-dasharray="3 3"/><text x="500" y="300" font-size="10.5" fill="#B91C1C">...đảo thành resistance khi bị xuyên (vào 50% CE)</text>
</svg>
