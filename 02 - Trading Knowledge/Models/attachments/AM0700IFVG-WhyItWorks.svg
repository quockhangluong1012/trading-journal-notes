<svg viewBox="0 0 760 440" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
<rect x="0" y="0" width="760" height="440" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/>
<text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">Vì sao IFVG là entry nhạy nhất — cơ chế đảo vai</text>
<text x="24" y="54" font-size="13" fill="#6B7280">FVG đầu tiên trước stop-hunt, sau khi bị đóng xuyên qua, đảo vai support↔resistance.</text>
<rect x="24" y="72" width="345" height="170" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="196" y="96" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">TRƯỚC: BISI/FVG là support</text>
<rect x="90" y="130" width="210" height="30" fill="#10B981" opacity="0.18"/>
<text x="195" y="150" font-size="10.5" fill="#047857" text-anchor="middle">FVG tăng = hỗ trợ khi giá đi lên</text>
<path d="M70 210 Q140 160 195 145 Q250 160 320 120" stroke="#10B981" stroke-width="2" fill="none"/>
<text x="90" y="200" font-size="10" fill="#6B7280">Giá tôn trọng FVG như sàn</text>
<rect x="391" y="72" width="345" height="170" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
<text x="563" y="96" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">SAU: đóng xuyên → IFVG = resistance</text>
<rect x="457" y="130" width="210" height="30" fill="#DC2626" opacity="0.16" stroke="#DC2626" stroke-dasharray="3 2"/>
<text x="562" y="150" font-size="10.5" fill="#B91C1C" text-anchor="middle">FVG cũ bị đảo vai = kháng cự</text>
<path d="M420 130 Q490 165 540 200 Q590 165 620 205" stroke="#DC2626" stroke-width="2" fill="none"/>
<text x="440" y="120" font-size="10" fill="#6B7280">Hunt + MSS đóng xuyên qua FVG</text>
<line x1="457" y1="145" x2="667" y2="145" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="2 2"/>
<text x="672" y="149" font-size="9.5" fill="#B91C1C">50% CE</text>
<rect x="24" y="256" width="712" height="80" rx="8" fill="#F5F3FF" stroke="#7C3AED"/>
<text x="40" y="280" font-size="12.5" font-weight="700" fill="#5B21B6">Vì sao "FVG ĐẦU TIÊN trước hunt"?</text>
<text x="40" y="302" font-size="11.5" fill="#374151">Vì đó là dấu vết cuối cùng của dòng lệnh SAI hướng ngay trước khi thuật toán đảo chiều. Khi giá đóng</text>
<text x="40" y="321" font-size="11.5" fill="#374151">xuyên qua nó và quay lại test, đây là nơi các lệnh mắc kẹt phải được "giải quyết" → phản ứng nhạy nhất.</text>
<rect x="24" y="350" width="712" height="80" rx="8" fill="#F0FDF4" stroke="#10B981"/>
<text x="40" y="374" font-size="12.5" font-weight="700" fill="#047857">Vì sao AM session (sau 07:00)?</text>
<text x="40" y="396" font-size="11.5" fill="#374151">Đặc tính đầu phiên AM: giá HỒI lại vào range London (draw on liquidity = đỉnh/đáy London). Cú hồi này</text>
<text x="40" y="415" font-size="11.5" fill="#374151">tạo hunt relative equal + IFVG. Lưu ý 30' đầu: giá thường đi NGƯỢC bias để hunt trước khi đảo thật.</text>
</svg>
