<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif"><rect x="0" y="0" width="760" height="400" rx="10" fill="#FBFBFD" stroke="#D8DBE2" stroke-width="1.5"/><text x="24" y="34" font-size="18" font-weight="700" fill="#1F2937">OTE — Optimal Trade Entry (lõi của Mayne model)</text><text x="24" y="54" font-size="12.5" fill="#6B7280">Fib kéo từ swing low → swing high (bullish). Vùng vào = 0.62–0.79; ‘sweet spot’ 0.705 (CE).</text><rect x="24" y="70" width="712" height="315" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/><line x1="120" y1="350" x2="260" y2="110" stroke="#16A34A" stroke-width="2.5"/><text x="112" y="368" font-size="10" fill="#15803D">Swing Low (0.0)</text><text x="270" y="106" font-size="10" fill="#15803D">Swing High (1.0)</text><rect x="300" y="160" width="400" height="41" fill="#8B5CF6" opacity="0.16"/><rect x="300" y="160" width="400" height="41" fill="none" stroke="#8B5CF6" stroke-dasharray="4 3"/><line x1="300" y1="350" x2="700" y2="350" stroke="#9CA3AF" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="354" font-size="9.5" fill="#9CA3AF">0.0</text><line x1="300" y1="230" x2="700" y2="230" stroke="#9CA3AF" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="234" font-size="9.5" fill="#9CA3AF">0.5 (EQ)</text><line x1="300" y1="201" x2="700" y2="201" stroke="#8B5CF6" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="205" font-size="9.5" fill="#8B5CF6">0.62</text><line x1="300" y1="180" x2="700" y2="180" stroke="#6D28D9" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="184" font-size="9.5" fill="#6D28D9" font-weight="700">0.705 = CE / sweet spot</text><line x1="300" y1="160" x2="700" y2="160" stroke="#8B5CF6" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="164" font-size="9.5" fill="#8B5CF6">0.79</text><line x1="300" y1="110" x2="700" y2="110" stroke="#9CA3AF" stroke-dasharray="5 4" stroke-width="1"/><text x="704" y="114" font-size="9.5" fill="#9CA3AF">1.0</text><text x="308" y="174" font-size="11" fill="#6D28D9" font-weight="700">VÙNG OTE (62–79%)</text><text x="308" y="176" font-size="9.5" fill="#6B7280">Entry lý tưởng khi POI (OB/FVG) nằm trong dải này</text><rect x="300" y="300" width="400" height="70" fill="#3B82F6" opacity="0.08"/><text x="312" y="320" font-size="9.8" fill="#1D4ED8">• Bearish: kéo fib từ swing HIGH → swing LOW; OTE vẫn 62–79% (vùng premium).</text><text x="312" y="338" font-size="9.8" fill="#1D4ED8">• 0.705 = Consequent Encroachment (CE) — mean threshold, ưu tiên khi trùng POI.</text><text x="312" y="356" font-size="9.8" fill="#1D4ED8">• OTE chỉ mạnh khi CONFLUENCE với OB/FVG + đúng P/D + sweep, không dùng đơn lẻ.</text></svg>
