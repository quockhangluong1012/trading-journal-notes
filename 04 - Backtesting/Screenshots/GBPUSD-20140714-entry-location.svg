<svg viewBox="0 0 940 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="940" height="640" fill="#ffffff"/>
  <text x="470" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a1a">FVG H1 trải EQ &#8594; OTE: Entry n&#244;ng vs Sweet spot</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#666">GBPUSD Long 2014-07-14 &#183; v&#236; sao gi&#225; qu&#233;t xu&#7889;ng c&#7841;nh d&#432;&#7899;i FVG sau khi &#273;&#227; c&#243; MSS</text>

  <!-- price axis -->
  <line x1="120" y1="70" x2="120" y2="580" stroke="#999" stroke-width="1.5"/>

  <!-- OTE zone band 0.618 (y=395) to 0.786 (y=536) -->
  <rect x="120" y="395" width="660" height="141" fill="#c8e6c9" opacity="0.45"/>
  <text x="770" y="470" text-anchor="end" font-size="12" fill="#2e7d32" font-weight="600">OTE zone (0.618&#8211;0.786)</text>

  <!-- H1 FVG box 1.70833 (y=353) to 1.70591 (y=469) -->
  <rect x="150" y="353" width="600" height="116" fill="#9e9e9e" opacity="0.30" stroke="#616161" stroke-width="1"/>
  <text x="160" y="370" font-size="12" fill="#424242" font-weight="600">FVG H1 (1.70833 &#8211; 1.70591)</text>

  <!-- key horizontal levels -->
  <line x1="120" y1="66" x2="800" y2="66" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="805" y="70" font-size="12" fill="#2e7d32" font-weight="700">TP 1.71444</text>

  <line x1="120" y1="297" x2="800" y2="297" stroke="#1565c0" stroke-width="1.3"/>
  <text x="805" y="301" font-size="12" fill="#1565c0" font-weight="600">EQ 0.5 = 1.70956</text>

  <line x1="150" y1="353" x2="800" y2="353" stroke="#c62828" stroke-width="1"/>
  <text x="805" y="350" font-size="12" fill="#c62828" font-weight="700">C&#7841;nh tr&#234;n FVG 1.70833</text>

  <line x1="120" y1="412" x2="750" y2="412" stroke="#616161" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="115" y="416" text-anchor="end" font-size="11" fill="#616161">CE FVG H1 = 1.70712</text>

  <line x1="120" y1="468" x2="800" y2="468" stroke="#1b5e20" stroke-width="1.3"/>
  <text x="805" y="466" font-size="12" fill="#1b5e20" font-weight="700">0.705 &#8776; c&#7841;nh d&#432;&#7899;i FVG 1.70591</text>

  <line x1="120" y1="477" x2="360" y2="477" stroke="#c62828" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="115" y="490" text-anchor="end" font-size="11" fill="#c62828" font-weight="600">SL 1.70576</text>

  <!-- price path -->
  <polyline points="130,120 190,300 210,353 245,325 262,353 300,430 330,474 360,455 430,297 520,150 600,66"
            fill="none" stroke="#111" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- premature MSS marker -->
  <circle cx="245" cy="325" r="5" fill="#ef6c00"/>
  <text x="240" y="315" text-anchor="end" font-size="11" fill="#ef6c00" font-weight="600">MSS M5 (s&#7899;m)</text>

  <!-- your entry marker -->
  <circle cx="262" cy="353" r="7" fill="#c62828" stroke="#fff" stroke-width="2"/>
  <text x="270" y="345" font-size="12" fill="#c62828" font-weight="700">Entry c&#7911;a b&#7841;n 1.70837 (n&#244;ng)</text>

  <!-- second sweep marker -->
  <circle cx="330" cy="474" r="6" fill="#6a1b9a" stroke="#fff" stroke-width="1.5"/>
  <text x="338" y="492" font-size="11" fill="#6a1b9a" font-weight="700">Qu&#233;t l&#7847;n 2 &#8594; c&#7841;nh d&#432;&#7899;i FVG (su&#253;t &#273;&#7909;ng SL)</text>

  <!-- optimal entry marker -->
  <circle cx="360" cy="468" r="7" fill="#1b5e20" stroke="#fff" stroke-width="2"/>
  <text x="368" y="463" font-size="12" fill="#1b5e20" font-weight="700">Entry t&#7889;i &#432;u (sweet spot) &#8776; 5R</text>

  <!-- TP hit -->
  <circle cx="600" cy="66" r="6" fill="#2e7d32" stroke="#fff" stroke-width="1.5"/>

  <!-- RR annotation -->
  <text x="470" y="612" text-anchor="middle" font-size="12.5" fill="#333">Entry n&#244;ng: risk 26 pip &#8594; RR 2.33 &#160;|&#160; Entry sweet spot: risk ~16 pip &#8594; RR ~5.0 (c&#249;ng TP)</text>

  <text x="470" y="632" text-anchor="middle" font-size="11" fill="#888">Tr&#7909;c d&#7885;c = gi&#225; (discount &#7903; d&#432;&#7899;i) &#183; tr&#7909;c ngang = th&#7901;i gian &#183; s&#417; &#273;&#7891; minh h&#7885;a, kh&#244;ng scale tuy&#7879;t &#273;&#7889;i</text>
</svg>
